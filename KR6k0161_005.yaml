body:
  text: 自下別解初戒有四一制戒意二釋名字三具緣成犯四闕緣義此之四者並有通別諸戒例然一制戒意一通二別言通意者如多論云以結戒滅將來非法二滅將來疑網知輕識重懺除對治故以善護偈中不分輕重名種三招生十利功德正當制意故下文如來出世見眾過失以一義利故為諸比丘制戒乃至正法久住偈言演布禁戒經此是通意義該諸戒下文不更說二等是制戒不聽婬者婬欲之性體是鄙穢愛結纏心躭或難捨既能為之則生死苦增熾燃不絕沉輪三有莫能出離障道之原勿過於此結患之深寧客不禁是故聖制二釋名字亦有通利通者戒是別者不淨行等是言不淨行者是婬慾法所防之過戒是能治之行但治行既通戒相難分寄緣以彰欲使觀過興猒脩不淨觀離染行戒能所通舉故名不淨行戒三具緣成犯亦有通別言通者人解具緣一切諸戒咸具五緣謂一是比丘二有所對三有心四心境相應五事成究竟唯除婬酒闕無相應非無此義太成漫該不存此說今者解釋自有通別通緣有三一是大比丘簡非所被文言若比丘故二制廣教後以其初人教未攝故三無量病壞心簡癡狂等此之三義該括上下故明了論云若人已受大比丘戒若如來已制此戒若人不至癡法是人則犯僧伽婆尸沙且約十三餘類亦爾乃至吉羅皆同此說下不更說言別者此具四緣一有正境二有染心三起方便四與境合若為怨通亦四緣成一正境二怨逼三與境合四者受樂此戒通三別四七緣成犯四闕緣義一解闕通緣全無罪可知亦可闕初及第三或有罪即方便中闕緣方便或無罪可知闕第二全無罪次闕別緣若闕初緣非道道想疑得二偷蘭亦可非道含六如內色外色內外色等是單雙各六得十二蘭闕二三兩緣無犯闕第四緣有二偷蘭從破威儀身手未及輕䦨小眾對手三說悔從身手相及至未成重來重蘭大眾懺應三乞乞已應一白白已亦應三說懺此多論說依十律大眾八人小眾四人此律四人為大眾二三人為小眾准自言毗尼者七聚中已說怨逼闕緣比說可知闕通但一方便闕別有四但五方便次釋其文攝論解毗那耶為四明了論偈曰解戒五相九毗尼釋曰如諸佛所立戒一一戒應了別五相一緣起謂由飢餓難得為緣起二起緣起人謂須提那三立戒謂若比丘共餘比丘乃至不共住四分別所立戒謂此何者為比丘等是五決判是非者三處已下是或依增五毗尼五答一序謂制廣之由二制謂初結戒者禁防違失三重制其相未圓䟦闍隨結四脩多羅略釋戒本是五隨順脩多羅廣分別是依上三處科釋此文義並無嫌今且一解就此婬戒分二從初至正法久住辨結戒相以明行法酬身子第一請第二欲說戒已下辨說戒相以明教法傳持之益酬身子第二請此戒既爾諸戒同然就前文中有三一至呵責已來正明比丘不勝名利廣興有滿壞其略教制戒之緣滿過既興冥須聖禁是以第二告諸比丘已下正明隨其缺犯制廣補略使識相護持離過於前大聖制戒豈唯止惡原欲集生利益之行是以第三集十句下依教奉脩必招十益此三義通諸戒同爾就初緣中文二然大聖制戒不得無事而興要因滿過是以第一從初至種子已來明其犯相過狀顯彰理令呵責是以第二時須提已下廣明呵責示所不應初文復二初至我能為之出其犯緣第二未見已下正明其犯犯緣文三初如來住處示犯制之方第二時迦蘭陀下出犯過人第三時世已下還村受勸犯之緣如來實於聖住梵住天住中住今示說有方故言在此毗舍離毗舍離者此云廣愽嚴事城鼻奈耶秦言廣愽多云因龍名城第二句云迦蘭陀者多云以鳥名村見云小鼠名毗舍離王將諸妓女眠一樹下有一毒虵從穴而出欲螫於王山鼠鳴鳴喚王便得不覺虵害以鼠思故即封此村供奉此鼠田鼠號村故曰也須提那文有錢四十億即賜封長者之位因居此村號曰迦蘭陀長者即是須提那文須提那子者多云此名求得又明了論名善與饒財等者多云一眾生數財謂奴婢馬牛等二非眾生數財謂金銀七寶等更無過者故曰饒財多寶聞佛說法違世無常觀此財寶多生三毒害人善心過世毒虵王賊五家理非定屬深思推己舉自戰慄毛為竪猒心決定故曰持信窂固言出家者謂形法二同言形同者謂捨外財及以親屬除飾好剃去鬚髮故下律云若多若少皆悉捨離故五分云在家逼迫猶如窂獄故須捨棄此出有為家言法同者得戒在己斷惡脩善五分云出家寬廓猶如虗空此入無為故曰出家為道五分善來十中似如羯磨文云剃除鬚髮披著法服餘悉不論就第三犯緣中二第一遠緣二須提那母已下設勸近緣前文有三初生念之由二時須提那已下生歸緣歸緣之念念者欲棄二損而就兩益三作是念下如念還村也近緣文二初舉財以勸拒而不從三勸三拒一文廣出餘二略舉其母捨去已下舉色以勸從而不拒文二可知五分云父母共勸此事甚易我能為之何故須提那作如是言見論云須提心樂道門不欲還俗即自心念若不與種終不置我日夜相惱若暫與子令彼心息不復嬈我我因是得安住道門故作是言第二犯中不見欲穢者未制廣教不見行欲是出眾之𠎝故也既云三行何以言初以未制故故十律伽論並言未制前須提多犯婬是犯不答最初不犯下戒然因辨三人持戒菩薩持戒反而合契到而成順行於非道通達佛道羅漢持戒得與緣聚無煩惱故如那律是凡夫持戒要也離緣緣會難護故經與凡為喻身口如釜業思如水色境如薪內有煩惱火與境薪相應不能不沸即須提那是有鬼處胎等者示欲之過彰生生不絕西音毗闍抲此云種子求種得故五十見論等文並云績種道成羅漢與此文同超過學表勝出獨絕故名尊者就第二呵責中文二初比丘訶責彰所不應二世尊以此已下如來教主親自呵責所以須比丘訶者若理越時情則絕於鑽仰既為同徒所訶明知分在己位理宜剋去謹約不犯故須比丘訶所以須佛訶者玄軌之教出於高範功瑳之益義存我友為彰比丘言不虛設是以佛訶問事歸教主比丘所以呵者欲明比丘是其同徒進止俱遊宜應先知故在前訶又要因舉過方呵責故但大聖道尊德高位殊成隔理無私察義無先知故須後呵問此戒但一有佛比丘訶無俗人訶者起過在屏無俗人見故若爾比丘何因得訶答比丘同徒雖不見作過覩相撿實故得有訶俗道位殊不得撿問出家之人故闕無俗呵如盜三人呵煞但佛俗無比丘呵妄語佛訶或不訶制或外道減年等是不同之義隨文釋之比丘訶中文三初至愁耳發覺所由為呵之緣二諸比丘言已下切𡏦其人正明呵責三諸比丘下舉過白佛請聖制戒禁防違失初文復三一覩己過犯內心燋惱威儀改常二諸同學下覩相撿挍三尋便伏引初文有二一歎須提先有行解顯昔異今二時已下威儀改常彰今異昔前文中謂善知識略教戒行故曰無事不知並能奉修故曰皆行亦堪導物故曰教人今由恥己過非內懷慚負故曰常懷愁憂第二撿問中先問下句汝何愁耶次問初句行解既備理合怡然今何所憂三執事以問理是無憂而反慘結當應是汝不樂梵行耶第三自言我甚樂者答下二問二近在已下却答初問愁慘所由所以訶人無少欲知足但言同學答作在私屏故言同學非不少欲如漏失中諸親友見等第二正訶中總訶不應二於如來已下舉其所應顯其不應三汝今已下結成不應第二言汝於如來清淨法者謂略教之法汝應喪生死因壞生死果修出離因證出離果是汝所應云何反與故二行不淨行呵意既爾次釋名字於欲者此思前煩惱貪染之心愛著前境名之曰欲佛所說法廣彰是過令諸比丘戒防定伏空慧正斬逍然無累稱曰無欲從此貪後發不善業默染淨心能招三塗生死穢果曰垢善修對治離諸惡業字曰無垢思後重貪思求前境轉增愛著如渴思水能暢思業名曰渴愛知其虗詐妄見非實正念現前渴愛自除故曰能斷人天生死在上喻巢三塗生死在下喻窟集因既亡苦果隨喪故言破壞巢窟除眾結縛脩道諦愛盡涅槃證滅諦第三結中汝今云何者為彰應行不行反與故二行不淨行邪經反為故對偶為二名曰故二第三白佛見云不欲令佛獨譽於己薄賤須提遣出清眾又亦不以此惡法相闕亂故依實白佛請聖制戒禁防違失第二佛訶文二初至不淨行來正明如來聞舉即訶恐生諍亂躬在僧眾應機而問取無其自言使過有所歸二爾時無數時已下既得自言正明呵責前文有三一集僧二應機而問三彰自言以此因緣集僧多論五義一現佛不自專故二共眾量宜然後結戒令犯罪者心伏三凡有法事集眾共知法久住故四為肅現在將來微佛成規諮眾取足五諸佛法爾僧有五種一群羊僧二無慚僧三別眾僧四清淨僧五第一義僧今集僧者但集後二不集前三以非法故亦可都集次第二句於中文二初舉問法次正舉法以問知而不問者佛不以己知見輙說罪過證他犯問佛若問者多論四過一不順諸佛常法二違自言治法三令眾生怖懼不安之想四逆說人過非大人儀禮言知而問者佛一切知見現同不知而作疑問多論四益一順諸佛常法二順自言治法三合眾生安隱不生怖懼四順於大人聖主儀禮雖復疑問若不應時則不應問是以次明時問不問來時而疑問有二一要在比丘眾集時問二是結廣教時故問時而不問者亦有二意一沙彌俗人前時不問二非結戒時不問雖復應時若呵責制戒不能滅惡生等亦不疑問是故次明義合不合義合疑問者多論四益一知先作無罪得除憂悔二因之結戒滅將來非法三佛既結戒決將來疑網四能生十利功德有斯四益名為義令無此四益義不合不問但此三中知之與時通損益義合唯益無損故言義不合不問不言義合不問二知時義合下正問三自言者五云情懼金剛故第二佛呵文三一總明佛呵二汝所為非下別列呵詞三爾時下總以結呵無數方便呵責者謂呵前過非責息後犯別列文四初行有違失呵二汝須提那下舉清淨法結彰所不應三告諸比丘下舉情事損益略教以呵四汝須提下舉清淨法結彰不應言所為非者縱放身口違理作惡故言所為非此句總呵所作既非乖身口法式故曰非威儀非息惡之士名非沙門所作垢穢故言非淨行違略起非即非如來順教弟子故言非隨順行第二結訶可知次第三文四一舉情事損益勸捨順行違二何以故已下釋成勸義三何以故已下舉略轉釋四說慾如火已下顯慾多過釋略制斷亦應有一何以故何以略教須斷慾法故言何以故慾多過故文無者略先釋初句毒虵有三種害人一見害二觸害三吞嚙害女人亦有三種害人善法若見女人心發慾想滅人善法若觸女犯殘滅人善法若共交會犯於重罪害人善法此三義同亦應無在但有多異故勸犯毒蛇言多異者一為毒所害但害一身女害無數身二毒害報無記身女害法身三毒害人形女人害心四毒害足數女害不足數五毒害得生人天女人所害隨於地獄六毒害猶得聖果女害不會聖果七毒害者佛所憐愍女人所害為聖呵責損益既殊浮沉天隔是故勸汝寧犯毒虵莫犯女人二何以故者此一何以故通釋上二句第一何以故者何以犯於毒虵現見蛆嚙之苦而我勸汝寧犯義故然犯於毒但有現在暫時之苦無波地獄累劫之殊是故釋言不以此緣墮三惡道第二何以故者何以犯女人現有適樂而我勸汝不聽犯故若犯女人墮於惡道故是故釋言乃至惡道此謂但舉七中第五以釋勸意餘略可知第三舉略轉釋何以故者何以犯女墮地獄故以我略教說斷欲法違教過重故墮地獄說慾多過合諸比丘方便除棄故曰說斷慾法斷於慾想者謂思想女人心也滅慾念者追求前色守境不移名慾念慾勢者二身交會轉增著境名為愛結如來昔教廣彰慾過令諸比丘識相禁斷故曰說斷慾法乃至越度愛結下二轉釋單釋勸捨順意亦應言道何以故何以犯毒不墮惡道義故釋言不違教故又應言何以不違教以毒非過故以釋勸行違意文略第四釋略教斷意慾多過故慾性違害故曰如火婬慾草炬燒人法身之手婬慾果盛害人法身樹枝慾樂不久猶如假借拈骨無膩癡犬咬之以涎唾為美慾樂無味凡夫妄著以不淨為實慾集眾或猶如段肉慾樂非實故曰如夢婬慾峯刃傷人戒足慾消眾善如凡器等婬慾害人如毒蛇頭婬慾傷人遍於五道如轉輪乃行慾之感厄苦之果如在尖標慾重禍深傷人迅速如利乾㓨慾患至極故曰甚可穢惡如來說過故曰呵責第四結訶可知第二制廣補略文二初牒前漏過為結之緣即上若犯有漏法二自今已下制廣補略即上然後結戒告諸比丘者以須提那比丘中一數故須提者其犯人癡人者多云彰是具縛如師呵弟子亦非惡口見云慈悲心言也多種有漏者顯造感生之業不絕最初等者違略二自今已去者與廣時分如祇五年與諸比丘者教網普結戒者制廣准其犯相重輕位定各有分局稱為結戒解此結戒六門分別一制廣補略二解本制之興為除鄣道等業三辨此教託緣不同四結戒具緣五教相所詮六解大聖制意文別義殊初門有四一定廣略兩教二略廣差別三辨制廣略不同所以四制廣補略言定兩教者略且有四一止觀門如是應念等二進脩三覺門諸惡莫作等三善調三業門善護口言等四隨事彰過門說欲如火等此局釋迦若通六佛略教者如戒文說廣教或二或三言二者有三種二門初二者制聽聽者如房長等一切雙持犯是制者如要作不作單持犯是第二二者已未分別復為一對離盜煞等受說安等遮末起之惡如訶人遮滅𣧩罪過諍除已起之𠎝第三二者止作分別復為一對可知或為三者謂上中下如離煞生等制離學問誦經尼聽教授等制脩此為上人教判為上房淨德衣餘食法等教則為中七法治罸捨懺䨱藏有過可治有罪可滅此教為下此據對人故有此三也所以名廣者三義故廣一顯罪名如夷殘等二彰果報文云墮二道又目連問經若犯夷人間日月九百二十一億六十千歲墮泥黎中三具明懺除𣧩滅之方以斯三義故名為廣略無前三等殘二百三十億四十千歲提二十億六十千歲可呵法三億六十千歲吉九百千歲蘭五十億六十千歲墮所以稱略第二廣略差別者一根本枝條二所為利鈍鈍人廣教利人略說此就受法難易若據受法多少廣利略鈍三待犯不待犯略被淨人故無犯說廣待犯故答兼抑許漏起方興四請不請略則直陳廣請方制五罪輕重人言略違一教故吉廣汙兩教夷人言利人故吉鈍根者夷此未必然以其吉名廣教方有何得舉後廣名以名前略今解唯有業道無別罪名如出家人未制已前犯者但業行罪然出家人重於俗人有無作戒可違是以善生云有二人作罪一受戒二不受戒但受戒者重不受戒者輕何以故違佛語故若制廣後犯即有二罪一得業行罪二犯戒罪此對性惡若其遮惡制後犯者唯有犯戒罪第三判兩教不同第四制廣補略並如上辨次解第二凡障道之業不出性遮言性惡者如煞婬等無問聖教禁以不禁作則是違體是不善障道招報損害深重故曰性惡言遮惡者掘地壞生造房等類佛未制前造作此事業性輕微體非不善但以事務紛動妨修道業與理靜相違望障於脩道名為遮惡前煞盜等亦障修道豈非是遮體是不善且從性說此言遮性就事以辨遮性非就罪名種若論罪名種悉是遮惡以未制前作而無犯由聖制後方有罪名故爾事雖遮性一禁已後違教處齊下沉義一俱稱為惡若爾前性亦遮何以言性者以性強故是以智論云十善舊戒五篇客戒次解第三教不孤起必託緣而制境緣雖眾要唯三性謂善惡無記託善緣者如掘地論義女人說法䨱頭人等輙教誡尼實得道向未受具人說或心悕名利讀習受持如斯等輩事雖是善亦乖聖意則生過不輕是以如來興教防之託不善緣興教者如煞盜等一切違緣是不善法託此違緣亦能起作諸不善行性是違害障道處深亦須聖禁故曰也託無記緣興教者謂掘地壞生等業雖無記不招苦果然亦事務紛多障修道業是以如來制不聽為息彼紛動終獲道益故曰也次解第四結戒具緣者必制託緣事假犯請要因八義方興聖結言八緣者一比丘謂被大僧非餘眾故二漏過起謂犯婬事等一一自分以結初戒不防盜等三比丘舉過以須舉覺聖方治故四佛在坐以結是佛結故五集眾以因一犯教細通禁六對眾撿問若不自撿恐鬪亂阿濫七犯者自言若不自言恐濫罸良善八犯局最初此八具滿聖方結戒若緣少缺抑而未許斯之八者位言興結次解第五門既託緣具義教必有詮所詮是何謂一犯二不犯三輕四事指文可知作過緣具現違聖教復自壞行汙本所受名之為犯善興義順受體光輝名為不犯劣弱方便以之為輕增強究竟說以為重此四句中各容二行先明犯法生二行者如五緣成煞等未與犯緣相應是其犯法若與犯緣相應名為犯行犯行無不犯行善惡不俱故此據一心故爾若舉犯法得生犯不犯行可解云何犯法生不犯行聖舉犯法欲使僧尼識而不違離過行成名不犯行若生犯行順犯法成違聖制意生不犯行違犯法成順聖制意二不犯法者有三一止持以明不犯一切無有婬意等是或諸戒諸開緣如不受樂等二進趣作持以明不犯如戒定慧等諷誦三藏是不犯法若其懈怠即有不舉無知便成犯行若䇿進身口習䇿行解成不犯行問已有犯法成不犯行何待不犯法成不犯行答犯法生不犯行但是止持復須不犯法以生作持又問已有不犯法得生犯行何須犯法以生犯行耶答不犯生犯但是止犯故須犯法以生作犯三就具二持以明不犯如處分說淨離衣六年等二行可知三輕法如不成者蘭吉又下三篇等是四重法謂成者夷殘又上二篇等是若重成重行三時俱重及但受樂謂隱之在心不可從緣悔等是重生輕行者謂八業中下七等及本無䨱心可有學悔及媒等亦爾輕生重者打佛羅漢深厚纏等輕生輕者掘地壞生等次解第六三門分別一列數釋名語結而言相非一揆要而有六一日深防二限分三約相四示過五心境六內外等是過犯未窮預加重約禁微防者以護根本如斯等例故曰深防制為當機恒存為分力未堪行雖作不犯此是限分過損理違道俗通禁依王國法准俗制道此名約相罪狀未彰預興過地逆班譏醜使耳目聞見此名示過犯犯不孤起託境關心心想易流緣無定據境有優劣心有濃淡或制心從境或制境從心是名心境犯不自成成由緣集因藉萬差要唯內外名內外制二次辨相深防相者如尼䨱藏飲用蟲水搏比丘及二眾初戒等限分相者如聲聞不制三聚又律議中除意地又就身口除夢中等就覺中故誤故中二眾漏失增上慢等衣食將補疑想等是約相者謂報時處事等就報中有約趣相如煞盜等又約形相如初戒餘可知三辨所以良以過興從緣緣無定據患生不等理無齊抑故致聖制有斯差別其稀數譏過或從境緣等並六所收不須別辨第三益利之行然行不自立託教而成教能出生眾行之本是其能集所生眾善何限斯筭一方犯宜略標二五故稱為十能詮之教表彰曰句所詮之指以之為義此句總舉顯成教益通而論之一切順教俱得十利有四持戒事雖似善不得十利一為勝他故二為名利故三為眷屬四為世報自下別明利體就中文三初有三利戒法能生眾生功德二次六利明別行功德三次一利興建正法行以有上二眾別善成任持正法千載不墜故爾攝取僧者廣教線經任持行者離於身口七支等過如線貫華便不分散故曰攝取身口既攝行合崇和名之為僧既制此戒令諸比丘半月一說相與同導施去違淨故曰歡喜依教奉修必剋大果以自適神故曰安樂自下別行利初二生善次四調伏滅惡未信令信者見云由制此戒令其隨順威儀具足未信見之而作是言沙門釋子難作能作所作極重見如是已便生信心又復外道見佛有毗尼藏而作是言佛弟子等亦有圍陀如我無異而生信心故曰未信者令信見云若有信心出家修學禁戒人見所行甚為恭敬云何盡壽一食而修梵行見如是已復生信心已自有信能生他信故曰已信令增長此二生善自下調伏滅惡行言難調者見云破戒比丘三業不慎心志剛強內無羞恥名曰難調佛為制戒教僧責罸不得動轉改過懺悔奉修聖法教故曰令調順慚媿者謂清淨比丘得安樂者見云佛制此戒治罸惡人不同說恣清淨比丘得安隱作法不為惡嬈故曰安樂斷現在有漏者見云不善䨱五情現作諸惡為人捉打煞縛名現在有漏由佛制戒教䨱五情不起現惡故名為斷斷未來有漏佛為結戒禁守防護現無惡因未來漏果畢竟不續故名為斷自下興建正法正法久住者見云三種一學正法久住謂三藏法由人奉脩攝法在己使不論墜學之所依正法興顯故曰久住二信正法久住謂三藏中十二頭陀禪定三昧等是三得道正法久住謂四沙門涅槃道果等欲說戒者已下第二大段辨教法傳通之益酬前說戒之請就中文二初明戒本說之儀則第二若比丘者已下正明戒本文約相隱難識自非廣辨無由可時無是以次明廣解戒本犯等四句此戒既爾諸戒同然下不繁說戒本文三初明略制二是隨結三滿足戒本欲說戒者當如是說者正是如來欲顯茲戒傳益未伏非教不宣為制戒本傳之未聞以自誡約承旨遵奉半月一說故曰如是說等如是之文在下者是略制對緣但有四句第二隨結文二初明䟦闍心異隨結次辨林中境殊隨結初總分別可為六門一明隨來意大聖結戒本為備防違失開犯顯然若事周悉一結即定若其相未圓更須隨明使教法堅固具足流通故所以爾二疊制明隨犯及不犯犯不犯者以其防過未圓故須隨結若前制理含更須隨開言隨結者如此戒異語食前食後嫌罵掘地等言隨開者如增上夢中別食七緣洒浴五開等三隨結戒本別不別別如假根餘皆合明若對隨開一向無別問假根是隨何以別制一解防巧故爾亦可離合趣就一義四約人初二若隨開者不論初二疊而制犯若離有別最初所謂謗是合則無初如此戒二隨死屍異語嫌罵等是五約違教不同須提初故單違一略䟦闍隨結俱違廣略等是隨結戒本別者亦違一略其隨開者不違廣略六約正制及隨得罪多少林中三罪以道相制故亦有違教䟦闍二罪須提一罪但有惡行自妻故無業道初故無違教此准多論若出家人一切邪者須提但無違教二隨具三也前文七句一心異起犯先疊前制如是世尊與諸比丘結戒者出其前制明後之犯者過同於初已該禁限但以緣異故須更結明非初犯故重舉之心異者謂己非比丘故以上須提情樂道法有戒可犯理在不疑然我情猒道法心悕俗網異想之生不應是犯遂便還家為此過非二彼作是念我當云何者䨱生疑心不知我本情背上法心悕下趣為當失戒無戒可犯為當不失有戒可犯於犯不犯情疑未決故言我當云何三即便已下𢪛託同徒陳己疑狀恥負真聖顏闕無自請進否聽佛故曰隨佛教勅我當奉行四時諸比丘已下愍彼情憂為申疑滯亦同疑故所以不呵五佛判是犯六化儀從緣開令捨戒因䟦闍無心存道雖羸不捨帶戒行非猶亦是犯是故其餘羸而未犯者聽捨戒還家故曰若有餘人乃至還家為彰此人羸而捨者即是去時如法後還非彰復來時有益進退合理故曰若復欲出家乃至受大戒增一阿含僧伽摩比丘七返降魔然後得道自今已後捨而更出家者聽齊七返七隨結戒本加前四句第二境殊隨結文七一對異趣犯二眾多已下發覺生疑三咸共已下伺獲得實四諸比丘下詰責辨違五彼比丘下引制境非彰己下犯六舉以白佛以此境非言或其情故亦無呵七佛判同犯第三滿足戒本一定戒本文八句若比丘者總明受法行二共比丘離明受法共三同戒離明行法同四不還戒明清淨不捨有戒可犯故五雖猒道欣俗隨行羸劣而亦不捨猶同犯位故曰戒羸不自悔六犯不淨行等託境行非第七結罪第八治擯故曰不共住人言九句謂離出乃至共畜生列境界以林中生此何以合辨今解但八所以得知凡隨者績結前制未圓故績舉二結尚共成一戒豈況犯境闕少績辨林中不入對境行犯文中又此別出境界者前言犯不淨行何境起犯以此推思為八者勝二次辨通塞若比丘一句義五文四共同二句義五文初不捨下三文義局此七八義初篇問共同等四並在此戒下三無者何答欲明此戒愛心久習事難卒捨是以佛聽捨戒還家以禮自處欲使去時如法來時有益有捨可對須彰不捨下之三戒若捨戒為煞猶亦是犯捨而無益故不開捨既無捨可對故不須不捨句來共同理有既蘭不捨相與俱無若爾對初開捨豈不失下戒答一切皆失若爾何以下戒無此不捨答以不對之開捨戒故次廣辨相文二初至滅濵來解其犯相二不犯者下廣解不犯相前文復二初大僧犯相二比丘尼下四眾犯相此戒既爾諸戒同然就大僧中分二初至不共住來略解八句成犯之相彰犯相不盡故名為略第二三種行不淨下廣解戒本六七二句對三趣境犯之方法略釋八中即為八文位言各三謂舉釋結或少者略也先解若比丘者一舉章門次釋釋比丘義七門一列數釋名二總別三受隨四聖凡五假教不假教六捨不捨七偏解第八先解七門內中間五門第二總別分別初一總下七別三受隨位四善來羯磨此二唯受乞求割截此兩局隨破結使通兩名為等三一非受名亦非隨名昔解自稱亦受者非也十云賊住故四聖凡位三善來破結此二是聖相似自稱位是其凡名為乞截羯磨等四義兼凡聖五假教不假教善來等二羯磨等少分是聖人故內有明慧不必要假教脩餘是凡故要假聖教曲宣方軌六捨不捨即向不假教等亦無羸捨即前假教者容有羸捨初七二門至文中釋問所以無三歸八敬者一解羯磨替故又明二眾齊八種故若加此二即數十各九故不彰此局亦可是略又既有乞求餘頭陀等類亦應然略不說也祇一比丘十律四比丘五分十一比丘多云若比丘者七種得戒盡在其中見論名為比丘者含下七種及與沙彌都是比丘故曰名為比丘此即總別之義相似比丘者謂犯重人內實破戒威儀相貌似他持戒故曰也自稱者十云謂賊住人自言我是比丘故曰也若其自誓者此有多妨如來金口命之善來故曰也順於聖教以乞資身離五邪命正命自活故曰乞求言五邪者論云一為求利養故改常威儀詐現異相二為求利故自說已得三為求利養強占他吉凶四為求利故高聲現威合人畏敬五為求利故稱昔所得利養以動人心擊發令施離此五邪名如法乞著割截衣有二利一毀其細耎離自貪著二不為王賊之所貪奪常有資身受用之益奉順聖教恒者此衣故曰也破結使理解心中而發具戒故曰也第八可解是中比丘者還疊第八重更解釋問何故偏疊第八不疊前二者答有二義一者第八通於末代故須更疊解具緣義二者前列名中但有前三少第四緣恐有疑濫故須更解餘不類此故不重明若受大戒僧數滿緣白四羯磨作法成就緣得處所結界成就界內不別眾緣住比丘法中身無諸遮難緣此即四法現前謂僧法界事第三是謂比丘義總結前八非局第八以對上二總舉列故共者人殊報別假緣義一切日共餘比丘第三句釋中先辨所同我為弟子結戒彰教法同寧死不犯持行同是中已下解其同義一戒者隨戒體同同戒者禁防義同等戒者名數同第四句有二初正解不捨二云何已下對上明捨前約能所不成捨者反即成捨應下文辨次就法成捨反則不成應上文說綺文互顯故不繁舉就不成捨中文七初有三對重病壞心故不成捨二次三對病壞根故三次兩句中邊相對不領解故解則成捨類同於受四次兩句境心不相應故初句心不當境不當心此中應有靜靜想不成但濫此所對故略如五十二律並有此文第五一句以無心故第六天子已下七句境非所對上四異趣下三人境以前所辨並約人說七二句業不辨了故不成捨若自不語不成捨者即是作書捨明亦不成五見俱云遣使遣書作相等咸不成捨就成捨中初明猒上欣下慮之在心為捨方便二便作是語已下口陳捨戒前文有二初有二句立兩章門謂不樂脩梵行者猒門欲得還家者欣門二猒比丘下釋二門初有二句釋猒上門貪樂下七句釋欣下門先辨義三門一欣猒分別前十一事猒上捨受居家等八欣下捨二頓漸分別是欣下中優婆塞沙彌此二漸捨餘等並頓然猒上中漸捨亦得謂言我捨具戒言我言我捨十戒豈非猒上漸捨文中略無三辨捨緣具有五一有所對謂同地人根具無病相解了者二同地人想以不靜靜想等不成捨故三捨戒等心謂有欣猒心捨戒心決定心四言說分了五前境領解異此則不成廣說可知所捨法體前已辨竟次口陳正捨文三初猒上欣下辨其真捨二若復已下無益有益捨三若復已下毀歎捨初直中先就十一猒上捨言捨佛者若捨過未佛不失戒以不從過未佛邊受得戒故若總言捨佛亦得成捨不同祇律文言捨同和上此是同學亦不從得戒何以成捨以共依師得戒故餘捨類爾捨梵行者總捨比丘所行故捨戒者捨受體作無作戒捨律者教捨學事者一切所防過等欣下可知次我止不須佛但對上法等無益捨略不明下趣有益捨次若復下毀歎捨可知問一切結解並是相對何以故受戒極難捨戒便易者何多論云受捨雖可相對違順路殊難易事別受順難成如上高山退返事易如從高墜又受如集寶要假多緣捨如散寶須臾敗壞故不相類又不同安居成易破難者何答皆為益故第五句文二一舉章開為二門二依門廣釋釋中此二各三謂舉釋結就釋不捨中分二先彰猒欣慮之在心文二如上二便作是言下彰羸於口文三初舉念所欣謂居家法二我欲已下土是所猒境三便欲受持下彰欣於口上來心雖欣猒口亦陳彰不決定故但成戒羸故曰羸而不捨第二羸捨可知第六可解下至畜生者越非人故此約戒相以解畜生除大小故如似解病及樹界等第七自行絕分第八眾法絕分所以不共住者多云有四義一既壞道法無所任用殯出眾外生天龍等信敬心故二現佛法無有愛憎清淨共住犯者出眾故三為息外道誹謗故四為持戒者安樂增上善根為肅將欲破戒者生慚媿心不犯諸惡故自下廣解戒本六七二句造境犯義犯中文二初至偷蘭成犯之相二方便已下明輕重相前文復二初犯不孤起要由託境而成是以第一乃至界亦如是犯家境雖有境界若不設方便亦不犯故次第二若比丘下對境成犯前文復三初總明境緣報殊異類三趣之別二復有已下離明三趣有五種者以五橫配者各有三作十五種者者雖十五形軀體漫未識重境是以第三人婦三處下離十五者為三十九處三婦童女及三二形處各有三合二十七男及黃門者六處二合成十二彼此通收故三十九但列文中為成亦如是故九三六二分為二亦第二正犯中四一先明自心起犯六百二十四句二若比丘為怨下被怨逼造境以彰開犯三千七百四十四句三怨捉比丘下怨逼已境以彰開犯四十八句四從道已下結犯分齊先解自心者雖十五隨相而論有其四義一覺境二睡不覺境此二俱活覺不覺異三新死四少分壞此二俱死壞不壞分此四境上各一百五十六但文好略覺境廣辨下三合說若比丘者先對九三造於覺境人婦處三各有隔等四句即十二句下八類爾合一百八句次對六二人黃門處二各有隔等四句即八下五類爾即四十八句通前合一百五十六句次下三境十五種者隨九三六二各一合三謂成三箇一百五十六并前覺境合六百二十四句下文瞋恚女醉女狂等三女合五此等上下文無者略第二死逼造境所以須明為怨逼者一為釋疑若不出怨怨人情意謂若先深心造境情過可是犯位我先無心怨逼造境不應是犯為遣此疑故須明來但使受樂亦同是犯二為開通若先有心可使境交得重如先無心為怨強逼若不撿挍樂不樂相境合結犯教法太急事難常行故開怨逼雖與境交但不受樂開使不犯先對覺境作九百三十六次對不覺等合作三箇九百三十六先覺境中二初對九三作六百四十八次對六二作六句便成十八此之十八各增隔等四句即七十二下八類爾六二中人黃門處二皆加樂等故十二復各增隔等即四十八下五類爾故云乃至男亦如是合成九百三十六不覺境中先對九三作一千九百四十四句次對六二作八百六十四句九三中九先人婦有三睡新死少分壞等各有三處處則有九此九各加樂等即五十四句句各增加隔等四句合成二百十六句餘八亦爾即是一千九百四十四句次對六二先對人黃門有三各有二處處即有六六中各加樂等六句合三十六十六中又加隔等四句合作一百四十四句下五同爾即八百六十四句通前合二千八百八句并前覺境九百三十六合三千七百三十四句第三怨逼已境應有四十八但略明二十四若具明九境逼已即有九箇四十八又已造他境既分逼不逼別若他造已境亦應有逼不逼異文無自心作境者略又自身為境文亦略無第四分齊可知第二輕重文四一明自作二就教人三死屍下壞境非境四境想應不應此輕重文諸戒通有除第四篇略但文言成者犯對壞略事諸不成者輕咸應相對乘勢故未以未必有初犯不成然如出血是初作不成雖因而制然不成蘭名已先有故自作文中不成者蘭含五方便教人文三一比丘教比丘二尼教比丘三餘眾相教此等寄能所以顯教人之業下盜漏失諫等亦爾問所以須明尼教比丘邪答此中為明五眾自作教他兩業之別上明比丘自作教人下四眾犯尼之自作此言教者謂出尼眾能教之業所以須言餘比丘比丘尼者為結作不作俱吉羅故上四境壞下三非境並言蘭者若非道非道想識境得殘今為迷疑故結蘭罪為斯下文即出犯主若道想若疑一切蘭罪問與下境想四五何別答境事正一但情望不同其義即異此中想疑謂不識境人非此半壞境謂為境故言道想疑為重境故言道疑佛言此是僧殘之境汝謂為重境疑為重境者不得夷殘但得偷蘭遮下境想四五者先識重輕境界本期重境乃為輕境來差迷為重境疑為境是境差蘭此戒及酒局境制是故境想上三究竟下二方便尼俱具戒犯禁位同故結尼夷罪式叉是學法尼沙彌者息慈此下三眾位非具足故尼三對尼結僧二諸同戒等或局尼三或唯僧二或獨結尼或專二具隨義可知是謂為犯犯有六義一汙受體二違隨行三違略教四作過緣具五知是比丘六第二人具六方犯所以可知多云犯一戒三罪一犯戒夷次違佛教提次失威儀吉一一戒中皆爾若懺根本枝條即滅此律初三有文也不犯者二門分別一不犯多少二不犯通局多少有二一別緣不具就中自三一眠者自分明不犯開前逼已二不受樂勝進明不犯開逼向他為命難故開非梵行難謂此即是梵行難故下三篇事輕故俱開二難此二並闕受樂緣三不作故不犯一切無有婬意是謂染心緣闕反前自心造境第二闕通緣於中有兩一初故爾犯二病壞心爾犯此二於通緣中闕二三兩緣通別並論爾犯有五第二通局者一對廣略通局五中最初唯開犯廣餘四開廣略二對諸戒通局位即為三病緣一開事義俱通最初人一義通事局餘三別開事義俱局十云一失財故狂二失親故狂三四大不調故四非人怖故五業報一非人怖故心亂二非人打故三非人奪精氣故四四大不調五業報一風發故痛惱二冷發故三勢發故四和合發故五時發故此之病壞心故不犯要須於三時中不憶是比丘者開若片心自憶不在開限如不癡狂詐為狂者是非法故次明盜戒前就內色起貪制其婬戒此就外財起貪猶繫生死故須復制解有四意一制戒意通如前言不聽盜者凡資財形命之本非此爾濟人情寶重戀著處深出家所為應惙己濟物今乃非理侵奪損惱不輕過中之重是故聖禁二釋名者非理損財故名為盜盜者非戒戒是能治盜是所防舉彼所防以別能治故曰盜戒問損財多名公白強取名之為劫私自往取畏主覺知字之曰偷不與取者謂主不捨此皆損財異名所以獨稱盜者一解損財四名不可並班且以盜名往標故名盜戒又解劫偷名局義不相攝故不立名不與取者名雖是寬通於上三濫犯不犯謂言濫者多論四句或不與取非賊謂有主物無主想取或是賊非不與取如僧中行餅各二盜心受他四五者是又無主物有主想取亦是或是賊亦是不與取謂有主有主想取或非賊非不與取謂無盜心取無主物為有非盜之濫又攝損財義不盡故亦沒名今言盜者名通此彼既無非盜之濫又含損義盡宜就通稱故名盜戒第三具緣通緣如上別緣具五一是有主物盜以損主為宗故須有主物雖有主轉想及疑亦不成重故須第二有主想問想之與知有何差別答有同有異了境之心曰知當境穴徹名想俱能了境知想即同然知唯了境想通迷悟了境穴徹名想迷境穴徹亦名想若作知是有主物於闕緣不便若有主想依文合理想雖當境所盜非五但得輕𠍴是以第三次明重物物雖滿五無心不犯為是第四次明盜心心雖念盜物未離處損主未成屬己不顯故須第五離處經論辨盜成業即足不解輕重但四緣成不須重物律定重輕故要五錢第四闕緣若闕初緣得三偷蘭初句非人物人主物想二畜生物人主物想三無主物人主物想闕第二容有九蘭轉想有三疑心有三雙闕有三三三合九轉想三者初句作人主物取臨至境所轉作非人物想取隱其後心之罪但結前心盜人方便故云人主物非人物想蘭此句既爾餘句同然第二句人主物畜生物想取第三人物無主物想取疑心三者實是人主物生疑為人主物為非人物第二為人主物為畜生物第三為人主物為無主物此三並蘭次雙闕二緣三者第一意欲盜人主物而非人物替人主物處是闕初緣就非人物上復生疑心即闕第二緣為人物非人物此第一句畜生物替人物處復生疑心為人物為畜生物此第二句無主物替人物處復生疑心為人物無主物第三句並亦得蘭闕第三重物作輕物亦蘭闕第四緣無盜心全無罪闕第五緣輕蘭重蘭是等闕緣具七方便就盜戒科文悉同可以比知就制戒緣起中文二初起漏過二大臣已下呵前中文二初至隨喜意自取盜緣二王所留下正盜前盜緣文三初如來住處二時羅聞下出能犯人三在閑靜下正明盜緣緣文有二初明遠離文中十句一覩己屋破默念造作二時比丘下如念經營全成凡屋五云色赤如火風吹作箜篌音三爾時世尊已下如來檢問四諸比丘下報佛所由五爾時下呵責結犯五云作凡屋蘭自現工巧吉六爾時世尊下為斷惡法次第告令除毀見云無捐財之名七時諸下順行佛教八明檀尼請已罪過徵破所由九彰彼無過雪己推佛十審教述成五云檀尼言法王所破我復何言二摩竭王守財人下明邊緣執王昔願聽隨意用言以告守財故曰汝知不等王與我材正盜中言要材者祇云此是公家飛梯之材呵責文三謂俗人比丘佛呵俗呵文三一臣二王三黎遮初大臣發覺呵責文四一覺發得實二時大臣下責過不應三舉過啟王王言爾憶即彰過在前人四攝守材下合典材檀尼俱赴王命二王呵文二初王自問取由更彰發覺文五一問與虗實二答王不虗三王索憶念四引王昔願以彰與以已文三初明檀尼引王初登位時舉前國法要與方取二從今日下明王立願聽取不同舊制但願有二言聽隨意用無主物不得不與而用有主物三王舉前願班告施行十云摩竭國韋提希子阿闍世王與我材木也問引王初時與我材者為先有此心為臨急語邪多云臨急之詞第五王言已下王引昔言陳己說異第二大德應死已下王呵文四可知十云王言我謂無主草木汝今墮大罪中達尼言我出家人寄居王國云何煞我王言比丘去勿復更取如是大打五云我本所施爾及有主恠哉比丘乃作此大方便而取人物我是灌頂之王如何㘝煞沙門可速詣佛法王自當以法治汝祇云達尼本樂閑靜造房多過王呵放已依眾修道晝夜精誠遂剋道果自知作證說自慶三偈第一欲得寂滅樂當習沙門法止則支身命如蛇入鼠穴第二偈上二句同衣食繫身命精麤隨眾得第三上二句同一切知止足專修涅槃道第三佛呵文二初撿問自言次第二呵呵中文三初行有違失呵二我無數方便下舉略教呵三有一比丘下准俗制道此三各二一列呵詞二云何已下執所作事不應以結呵何以獨問此戒餘三不爾一解由盜王材故須依王國法盜多少而制餘三爾由故不須依又多云此戒要依國法盜多少得斷命罪則依而結戒婬煞二戒事成則罪成不問多少妄國無此法是以三戒不問問佛一切智豈可不知何爾直依國法而制何須問也答止誹謗故佛得自在隨意自制若問而後結隨國成法依而結戒則眾生心伏若五錢者現盜爾淨物五錢直者淨不淨物見云為遮惡比丘故兩言之問五錢者是何等錢答隨國所用八種錢中許五成重理亦應是又准十文古大銅錢當今小錢錢別十六八十成重亦可如是且從前解成大集經云佛告頻婆娑羅王言云何名大罪王言故斷人命偷至五錢婬他婦女自為己身故作妄語若犯此四罪者是名不活佛言我今亦為諸比丘制四重罪准如此經俱問國法戒本八句一人二若在村落物之所在盜之處所三不與者主不捨四盜心取盜業盜心五隨不與取者所盜重物六王大臣下出俗治罸法文二一能治人次明治法若捉是王祖治法若縛父王治法若駈頻婆娑羅治法若煞世王罸法次呵責賊詞七結罪八治殯所以須舉王治罰者准俗制道故下七八即結夷罪廣辨相中科與上同今且比丘犯中文二初至如上說略解戒本八句二從三種下廣解第二第三四三句以彰犯相俗人所居曰村僧尼住處名僧伽藍其相一等此但明俗人村下離衣宿具辨二村閑靜者對此須知六蘭若義隨謂他犯法以戒犯行亦可此是疊法隨取何等就廣解中文二初至偷蘭廣解三句成犯之相二從方便下輕重相但戒本文先列處次物後明心業略釋戒本故次第如本此就安物次第廣辨先業次物後處從下向上謂據行盜次第解此三中要束為二第一合解業心物等第二處者已下釋上處門初中有四謂增數為三四五六等增三中五笥三分二初二釋心業後三解不與如斯分二貫通下三前中又二初三解盜業即上取字取有三種初句自盜業下二教人業所以二者現前教人名為者取教人不現稱為遣取自無爾現故但自手次三反釋盜心若他物己想不成盜心故須非己物想雖非己物暫取不犯故須非暫用雖可永取同意想取亦不成犯故須非同意此三展轉反釋盜心次解不與物有三三句並是有主欲解此主可為二門一總解有主諸部寬狹二別解有主即是諸部輕重先解初門五分二主若物屬他他所守護不與而取是名盜心此律文三位分為二初三句者如地中伏藏主心爾知故作他物之名第二三者主心知有屬主義顯作有主之稱雖知不知皆損正主第三三者謂守護主又更一義初三是總凡非己物皆是他物然總相難知復須離辨他有二他一損正主他有主有主想是二損守護他他護他護想是總別有三其唯本主及以護主十誦有四一有我所心有守護二有我所心無守護此二本主三有我所心別守護四無我所心有守護此二護主諸律雖有二三四別其唯主一是本主二是護主護主邊盜有損守護義理合徵償望護主結罪若望此物爾合責償無損護主義者望本主結罪爾得望於二主雙結二罪以其財無二屬義無並損問如何互損二主答如為別人三寶等守護此物若謹攝賞護而致損失不是護主能禁之限不應責償者但損本主若不謹護而致損失理合徵償者但損護主故十云有一比丘寄一鉢與六群是鉢中道便破是比丘作是念我若爾先語六群或多索償及告知訖六群言汝鉢不破而破我鉢償我來比丘曰佛佛言好心捉破不應責償惡心應償又一比丘寄居士物亦爾第二別解有主人主得重三寶如何欲知三寶是主非主三門分別一辨盜二互用三出貸先解初門盜佛物得何等罪此律無文准祇犯重故彼云摩摩帝供養僧者佛亦在中便持塔物供養眾僧佛言用者夷此作僧用猶結夷罪自為私取寧容不重又復餘趣報劣盜得輕𠎝不類人趣佛境尊高故同人重十云盜精舍中供養具佛言有守護者計直犯重此據不定屬佛之物須言守護問盜佛舍利何罪答若尊敬心是我師故清淨無犯多論盜佛像為得錢轉賣闌為供養無罪舍利亦爾言法物者此律盜經佛言計直成重五十伽多並同計直故多云盜經不問供養不供養計直得罪以損主讀習故不同盜像得有遙敬亦可此文互舉犯不像經俱等若經像主本心局為不計通人像同經判若主本心兼不專自己經亦如像言僧物者此律但言有主僧亦成重下文蘭者此惡心蘭本非永損祇云僧物佛用佛言夷故盜明重十云盜僧物五錢已上重蘭四錢下輕蘭隨根之教不得和通善生盜亡人物若未羯磨從十方僧得罪若羯磨已從羯磨得罪五分戒場上分亡人物羯磨佛言不成分犯吉現前僧祇犯越毗尼若戒場上作分亡人物法定不成分望十方得多蘭罪其大界內作是則如法設若不成無心簡別無損物罪但可不應問盜損可爾典僧事人得用僧物以不祇云若損若益應與損者如有賊來詣寺索物飲食若不與者或能燒壞寺塔雖不應與恐損故與益者若作僧房舍及撩理事應與若王及大臣有勢力者亦與十日王臣來索好食薪大等若與畏犯不與懼作惡白佛佛言應立知事人立知事人已不日僧得用十九錢供給若更須白僧又賊來到淨人所索飲食倚託不與遂捉比丘手脚截腰斷佛言如是怖來若索多與多索少與少都索都與不應致大衰惱十云病比丘索僧貴價藥應與兩錢半價藥若多須者應從索直二互用者若三寶相望俱不得互用如祗云寺主以故塔物僧用僧物塔用佛言夷法亦應爾又下文施竹園佛言施佛及四方僧何以故佛物皆是塔廟僧不得用故須及僧故知若本施三寶得有共用若各不同明無互用若寶梁寶印經佛物餘二不得用法物餘二不得用以無能與佛法二物作主故僧物若僧和合作白羯磨得與二用不和不得二當分互用若施心局一隨施心不得以此像物作餘像等法僧亦爾皆不得互或作佛法等物迴作莊嚴龕凾等類並不得互除本心通下文互用尼提僧吉此類亦爾皆違施心故三出貸得否寶梁寶印等二經佛法二物不得出貸以無可諮疇故僧物眾和則得不和不得依祇塔無物僧有物得如法貸用但分明券記某時貸某時還僧貸塔物亦爾十云比丘欲以塔物出息得利供養塔佛言聽令僧坊淨人若優婆塞出息塔物得利供養塔伽云毗舍離商主施偷婆物佛言是無盡物應受使優婆塞淨人知得利供養偷婆或作偷婆准此二文法僧亦應爾問盜業盜心文即結罪下三物上何不結罪答略而不結增四中初之兩三各增離處為成業心次後三三句各增重物為欲簡輕增五中初之二四各加重物次下三四為成正盜各加盜心但業心二五至於增六問物至增五盜業盜心至增六何答物至增五具緣成盜故不更增業心五中但有二緣少故須增問若至增六但有三緣等俱不足何須至六答若五中住人疑業心五亦成盜有此濫故須至增六知未足便罷何故不至增八具緣者略又解五中業上無盜心不成盜業盜心上雖反解盜心無盜心字不成盜心故至增六並加盜心始成盜業盜心所以不增八者此中為解業心不明具緣犯義故不須更增若更增者與前何異問所以須言非己物者何解言若己物非物非己物想縱有盜心亦不成犯故須非己物復作非己物想此二合為一句更加盜心故爾問文言六種亦如是所以得知加盜心者答下增六盜心中云非己物想不暫用相罪親友想重物盜心移處故知此文亦加盜心即下文中更無增至七八等故今亦爾但增六住次解第三處文二初列二十六門前十三就處以明盜物二寄信下八就所取物以明盜三同財下五違要以明盜又此等中乘擔村蘭若所水等八物及處體以明盜自餘十八處中約以彰離處二次第辨初文七句初列處物所在分劑二有主三明盜心四出所取重物五取方法六彰離處七結罪舉有主攝有主想但有四緣亦可略無初門既爾自下類然設少者文略第五取之方法若牽若埋若舉是取之方法如下田中若舉若埋故知若舉之言不專屬離處第六離處離處多種且為二門一辨盜離處二奪賊得不得初門有三一離處多少或離處以明離處多云若舍物不異離地重罪若曳而不離出舍地分方重未離蘭罪若舍物異主離地重罪若曳此物離本處邊際得重如堽成遺成輕重如前一切比知二文書成三言教成四移標相五異色離處謂錢與氍毹異主故也若同主牽離氍毹得重六墮籌謂付受等七轉齒離處又明了論約十二入謂眼等六根盜色等六塵計塵計直得重二得罪此財物乃是共業所以得罪如成論云以彼功強故三得罪多少多云離處有二離處已持去有二種罪一得業道罪以盜他故二得夷罪以佛戒故若舉物已還著本處得一罪舉離處故夷不損他故無業道罪據此以論有損須償二奪賊得不得於中復二一約自物二約僧物自物中二一外物二正報言外物者入賊手已得奪取不答諸文不同如祇五多見若失想捨心後不得取若未作失想未有捨心得取本物故祇云比丘失衣鉢奪得彼物佛言若未失想還取本物無罪若作失想便為賊還却賊次二句亦同餘文可知今依四分不問心之斷否皆不得取故下文言他盜取物奪彼所盜物佛言夷若爾鼠偷胡桃六群作人物想取所以犯夷答畜生無心盜又未必離處故不屬畜生若爾烏鵄撮肉所以無罪答此已離處故不屬女人如是反覆相成為彰入我今若思文撿驗似同餘律如文去寺不遠有村或言林鼠住彼林取胡桃來至寺內以為大聚六群盜取夷觀此文勢亦是離處但人主不知猶作己物未有捨心故不屬鼠撮肉在空明作失心故屬烏鵄明知亦取捨及未捨若爾何故他盜取物不曾問心佛言夷答此文不了既佛判得夷明據捨心如斯推尋諸文無別第二內報若五眾被掠但走無犯十云除自脫身不犯不得橫將物來祇云弟子被掠師應追贖不爾者吉類此餘親亦應如是第二若盜僧物一切得奪以其前人不成自入故乘中一乘上盜物次盜乘體是離本處犯言從至道者此是取前方便如觀軍之類又亦取者之意非謂要待至道方犯壞村體者自設方便損壞他村如機關等或假特他勢謂或依親友等巧言多端互說好惡得令損壞謂如言詞等下損處體多有此三第十一船船若繫著代上臣若不流水解離得蘭若先推船離處然後解即重文言從此岸至彼岸者同前道釋又輸稅者謂白衣有輸稅法而比丘為之隱匿故所以犯如是廣說若比丘為他稅索而自方便得脫並不說有罪以比丘無輸稅法故又非理稅故若此有罪不與賊物亦應得犯第十九若盜奴僕舉兩足犯餘須類知二十二同財業者但共財產私心隱竊或公強不均滿五得重共要者謂契要却偷得財便共而盜心損五故共要犯伺侯者規財便利觀者處所相其通否得財契分故曰伺侯守者為其賞物在外推求得財共分私隱五錢故曰守也言看道者相望通塞防應外人得財共分故曰看道第二輕重文三初十二句舉上自手取明重輕差別二方便教人下十六句舉上遣取看取教人業明重輕差別三有主有主想下八句舉上物中三三句物作有主想重輕差別盜心該通隨配此三文不別舉自盜十二句一求過五二求五三求減五各為四句中初句是則下三通剋漫第一可知第二句剋之漫俱一夷罪良以漫無所局剋唯心局具三同故並得以過五方便成五一重罪第三句得減五若本無剋心今得減五闕重物一闕若剋求過五今取減五容有二蘭一取減五邊究竟偷蘭不得過五一方便蘭不得相成所以不成者過五及減同一主然闕下二故不相成言闕二者一過五減五果罪重輕二此之兩位方便蘭吉既闕此二豈得相成故得方便究竟二蘭第四不得一方便蘭第二四句第二向剋餘通二心第一句二心俱得一夷第二可知三四同前第三四句第三句剋餘通二心求減過一夷問前求過五得減五重輕位別剋結二罪所以此中求減得過重輕位剋得減五方便成過五重夷答前先取重心後求減五因果顛倒故不相成此取減五方便吉羅後取過五方便重蘭臨手輕成重因果相順故但一罪次句同前次句稱求能所中同前十二但教人為異句不異前唯求減五四句中初二句能教局剋故但犯蘭所教通於二心故一向夷問教求減五得五過五望能教人不得減五何以亦蘭答以五過五含減五故第三俱剋第四俱通自下四句斷簡教人能所差別此之四句唯對前八以簡同別以文言教人求五過五不論減五故又以減五能所前已別故此前二句料簡輕重次下二句蘭犯不犯初輕重者前八之中約物數增減能所同犯今此數同而物體異謂青黃等或物同而處異此之二句同上以不答此即不同謂所重能輕故如文說者是次二句者數物處同而以能所心互有無同前八不答亦不同如文說是若定剋漫前二下一能教局剋所通二心或可所漫第三能通二心所剋無心見論就剋有四比丘一是師三是弟子欲益六錢師語弟子汝各偷一我偷三弟子言和上偷三我偷一汝各偷一下二人相教亦爾而得六錢來師自餘三犯蘭教弟子三亦蘭以自作業異教人業異各減五故三弟子各一蘭自減五故各一夷教人滿五故第三境想兩重以辨前四重位次四對輕皆就本迷闕第三句故兩位齊四若對上數上數境想有三但今合五過五咸是重位故為兩對就重位中初文一句夷者當宗理盡次有主疑義合有六直疑有三橫疑有三亦可但三餘無文故次下二句並各為一問所以不對重物重物想作境想者一解已合說竟故文言有主有主想五過五故此決不爾有主犯門五過五重輕門豈容合說但可文略若准此略言上闕緣中對重物須有心差單雙等也減五准前不犯中犯中與想總句主不捨糞掃想取合反三主已有想等三別反盜心
