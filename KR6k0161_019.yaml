body:
  text: 破僧楗度第十五若內無五德舉不知時致有忿諍事成破僧故明之分衆異軌別行法事名之為破廣彰其相故曰僧楗度大文分三初至將五百比丘衆來現在破和第二佛告比丘舍利弗已下舉過去事會其古今第三爾時憂婆離已下問現在破僧方軌破和未來二果前文分二初至一劫不救調達破僧二爾時舍利弗已下現在和僧破中文三初至羯磨説戒正明提婆達破僧二爾時衆多比丘已下舉以啓佛三佛言已下呵責彰過破文分三初至捉籌等王舍城中破僧行法十律提婆達對衆唱説四依非五法是初一唱時唯四伴捉五法籌等復第二唱始有二百五十比丘捉五法籌復第二唱復有三百五十比丘捉籌故合五百不同此文第二爾時阿難已下六十比丘不稟即化五百取籌唯除阿難及一須陀洹比丘時舍利弗目連諸大羅漢皆不在彼布薩會中第三時提婆達已下往伽耶山破僧衆法至此如是信耶具足破正義備第二諸比丘還舉前三具以白佛第三呵中癡人破僧者是佛呵辭二有八非正法已下彰過分文為二初至一劫不救舉破僧發業之緣二若我見已下所為業重彰無救方前文有三一先總舉彰過此八之事非出離真軌故曰非正法為彰調達違順緣轉遇利譽稱樂不能不貪逢衰毀譏苦不能不惡情取不捨名為纏縛能彰未生之善故曰䨱曀又令已起善業為因不成稱為消滅善心永捉三塗故曰趣於非道簡餘輕處故曰在泥梨中顯受報時故稱一劫彰無救方故言不救第二何等八已下別列八法得養曰利無養曰衰故名無利過德而談名譽過分毀呰名無譽餘文多名為毀譽形心極順悅可其意目之曰稱律就前境名為恭敬見過嫌呵心不祈順説之為譏律名不恭敬怨家違境能生內惱名苦此就內心律據前故曰惡知識情樂惡友妄以為適名樂一切衆生咸不離此八調達偏甚第三有如是八已下結成業緣為此緣轉而作破僧故曰業緣也第二業重無救中文三謂法喻合法説文二謂逆順反覆彰無救方救方初先反舉若見少善不盡不記無救二次順説以我但見善盡惡成故記不救文中各三一人二善盡不盡三結記下喻合亦三譬如前人喻初逆順中人沒在屎中者喻第二善盡惡成三有人欲出已下喻第三無救療之方第三今觀已下合喻初調達者破僧人合上譬如人二不見已下合前沒屎中三是故已下合前欲出無方次現在和僧如文依五分三聞達多以足指蹴調達罵釋奴起舍利弗目連以餘方便將諸比丘去矣調達驚起罵言是惡欲比丘有善意如何忽生惡心以方便將我比丘去便大驚懼熱血從面孔出即以生身墮大地獄十律調達見舍利弗目連來即驅迦留羅提舍安目連舍利弗目連化徒衆去調達覺已見講堂空作是念我是釋種姓瞿曇大人不可屈下從他語四弟子言先有外道法隱沒不了我今當發起明了是法汝等當知我今不復屬沙門瞿曇當作是語時即名捨戒第二舉過去事會古今中文三初舉身子過去破以對今和二目連白佛下舉過去法像對今法學三諸比丘已下舉過去違恩以會今背初文問説戒中小罪鄣道何故此中犯偷蘭而得初果答第二故鄣初故不礙文作偷蘭懺者謂此五百仗成群黨是破僧家之伴類故是初無過為彰軌則故言令懺也第二法像中四偈文四初一行誦前過去法像已致苦惱二次一行彰因不息故曰乃至長夜氣不滅等三次三句以有因故顯今學苦惱四有五句廣舉其類喻自毀傷昔以惡教破故墮事海沒死故曰沒海而死今以耶方便故墮生死之海第三文二初問破僧方法二憂波問已下問破和果報破僧義八門分別第一列名釋名第二辨能所體性第三得名第四具緣成犯第五辨破時處亦名方便根本相別第六對出血辨其先後方便究竟初第七捨戒墮地獄時處第八對破羯磨僧以辨同異第一門者名有二種一者破僧二者破輪言僧者一界之內別行法事言破輪者謂捨八正住於五法故四分文言我今寧可破僧輪十律云汝當共破沙門瞿曇和合僧壞破法輪又伽論或輪壞非僧壞捨於八正更説餘道是輪壞一界之內盡集無別非僧壞二或有僧壞非輪壞者不捨八正不説餘道非輪壞一界之內各自恣羯磨不成是僧壞三或俱非壞四或亦輪壞故知有僧輪兩別釋名者若就僧解破有其二義一就本一今別故名為破僧謂本一和合衆今提婆達自稱為佛違心背想倒説耶法誘惑愚癡比丘分僧耶正故名破僧二約從耶以解破唯邪部是破故心論答凡夫壞非聖人若壞法輪以破者亦有二義一就因緣以解壞謂以耶衆行兩法破如來正衆行法故此律言提婆達今日欲斷我四聖種提婆達汝莫斷我四聖種此且約行法以彰破衆正法者以信受五法故衆異軌即破衆法二就行體所損以解壞謂應得不得故名壞是以心論言若未超升離生不超升離生亦無得果亦無禪學問思惟樂生由大千世界法輪不轉俱舍論曰是時佛世尊法輪已破能鄣礙聖道生起故名破輪第二辨能所能者還約前二以説一破僧能所二壞輪能所若破僧根本業道妄語以作無作色為能若依實論無作以非色色心為能若通方便亦有身意業故善見論此戒具三事身口意業若論僧壞無處能心論俱舍謂不和合性不隱沒無記是不相應行若壞法輪能者能破因衆行二法之教以色及非色非心名句味對為能所破因衆行二法及教能亦同論其行者以無貪善根為能若就行法辨所損四依法亦同前約人彰損令其應得不得以非數滅為能第三得名者從所功能得名僧法輪是其所破是功能亦可境用受名僧法輪是境破壞者用第四具緣成犯謂望逆蘭以解具義通緣有三一是大比丘以共佛競化故又已犯逆蘭餘衆即非故律言亦非比丘尼等四衆破故二違佛僧三諫當他餘戒制廣教後以其破僧事是最初得罪同第二故三無重病壞心若解丈比丘者丈夫見行清淨多聞辨才謂簡餘衆受行破戒寡聞訥等故十律九清淨人非餘衆心論見行增上者見行人壞僧惡悕望故愛行者輕動故及多聞辨才等人方能破僧第二別緣有十一已結界故心論未結界不成破僧故文言若於一住處界內二部各作布薩羯磨方成破故二佛在世心論言亦非大師般涅槃無異師故三非初後故心論亦非前亦非後以此二分中僧一味故俱舍論亦爾四已立第一雙故心論亦非未立第一雙以僧壞不徑宿即日還和合故五起惡欲立耶三寶謂未起惡戒惡見息言無破故心論息言未生時無破法輪故六佛不在衆故心論謂大師在衆彼無威光故七伴具數滿是凡非聖故律言此衆一比丘彼衆一比丘行破僧舍羅作羯磨如是不能破但令僧塵垢二人三人亦如是憂婆離若此衆四人若過彼衆四人若過行破僧舍羅作羯磨憂婆離齊是名為破僧是為破和合僧故又復此律年少比丘必當信受又薩婆諸論破法輪是破俗諦以聖人不可破故此律亦言上坐比丘恐不信受八異見異忍説於五法甄餘下六破僧主等九行非法籌諸比丘忍可捉籌十界內別作布薩羯磨此未下二緣謂壞行二法故此律言憂婆離有二事破僧妄語相似語復有二事破僧作羯磨取舍羅辨闕可知第五門問依此律文王舍城説五法五百比丘捉籌即往伽耶山自作羯磨説戒僧祇亦然此二處內於何處時中成根本業道答謂在伽耶羯磨説戒竟時究竟成破所以爾者調達破僧放習如來立二種法一立其耶以為行法𨲙佛八正處二立非法羯磨説戒御衆之軌𨲙佛正羯磨説戒衆法之處是以王舍城時五百捉籌忍可五法始信調達耶行法反破如來正行法竟但是方便後至伽耶山中自作羯磨説戒五百復信耶衆法反破如來正衆法處始是信耶具足破正義備故在伽耶山究竟成破故上律文若一切未諫前欲壞和合僧方便受壞和合僧法堅持不捨一切突吉羅若立邪説五即成破者應犯逆蘭故又復祇律方便亦在王舍後提婆達遠向伽耶城佛語阿難汝去語提婆達來今日僧作布薩羯磨阿難即承教往喚提婆達言我不去從今日後不共佛法僧不共布薩羯磨今日波羅提木叉欲學不學從我意阿難聞是語已作是念此是奇事出是惡聲將無壞僧耶阿難具以白佛佛第二語阿難往喚乃至汝便去廣説上事如前將無壞僧耶阿難還後六群比丘自相諸言沙門瞿曇必當三遣使來我等各正意共作布薩事我等作後世名譽佛在世時提婆達多六群比丘共破僧即布薩竟佛復第三告阿難往喚答言我等已作布薩竟阿難聞已作是念奇哉已壞僧竟即以白佛佛言非法人已作布薩竟如法應作布薩以斯等文證故知破在伽耶不在王舍第六門對出血辨先後方便究竟初二分別言先後者四分五分及以十律並破僧方便在前次出佛身血次更起破僧方便究竟智論所明先破僧輪次出佛身血故彼文云提婆達多大得供養而徒衆鮮少自念我有三十相減佛未幾直以弟子未集若大衆圍繞與何異如是思已心生破僧得五百弟子舍利目連説法教化僧還和合爾時提婆達便生惡心推山佛金剛力士以金剛杵而遙擲之破石迸來傷佛足指蓮華色比丘尼呵之以拳打尼尼即時眼出而死謂犯三逆罪鼻捺耶亦爾又又出血偷蘭是方便所以爾者然調達本心斷佛命意今但出血本情不暢所規未畢擁思之業故是方便又是最初以無逆偷蘭廣教可違故問出佛身血為是制煞人戒前為後耶答調達出佛身血去雙林九年明知是制煞戒之後若爾煞戒之中已言成者夷不成者蘭廣教已彰今出佛身血是第二如何最初答煞戒不成蘭者與出血蘭有二種不同故別有初一可懺不可懺二逆非逆異故爾問若煞凡人方便非逆出血是逆逆非逆異別有初者餘人對父亦是逆非逆別煞父之時應別有初答但有逆非逆異同不可悔故無別初此義稍難凡言初者約於廣教本無今有方辨初二今此逆者佛制不制俱有逆故不得就之以明初二若是蘭名即是第二若爾何故十律九清淨人破僧又心論犯戒者非增上故答言清淨者謂不犯夷事故又可更釋縱是第二人亦不妨破僧經論不同如智論鼻捺耶先破僧後出血四五十等三律先出血後破僧何者為定然十律自言九清淨人復先出血後破僧豈不相違故知不得以一論言若犯餘無簡不得破文以妨諸經也破僧偷蘭是究竟非方便調達本心規奪佛位壞僧斷法今既破得僧徒歸從己見所規事畢思心得暢更無進趣故是究竟又復過狀既彰違教作破故是第二人也是故見論破僧無最初以違僧三諫故又此言第二者破僧是最初以其未有故得罪同第二故言第二非謂調達前已有破僧故問若調達破僧是第二者違諫僧殘亦應第二答破僧是所諫事諫時諫破僧違諫作破僧故調達是第二諫時不諫於違諫僧殘是最初第七門捨戒等時者十律調達講堂空唯有四伴時迦留羅提舍以右腳蹴調達令覺已見堂空迷悶墮牀四伴以水灑之得醒作是念我是釋種姓瞿曇大人不可屈下乃至言我從今不復屬沙門瞿曇作是語時即名捨戒無入地獄時五分三聞達多以足指蹴言釋奴乃至熱血從血孔出即生身墮大地獄無捨戒語智論初破僧次出血又打蓮華色尼死與惡耶富蘭耶外道等為親厚斷善根無愧悔此是捨戒時復以惡毒藥著抓中欲中傷佛欲去未到王舍城中地自然破裂火車來迎生入地獄四分但言熱血從面孔出等並無捨戒入地獄時第八門對破羯磨僧以辨同異多論九門第一人不同破法輪僧是比丘見行等非餘衆愛行若破羯磨通詠二衆以其二衆俱秉羯磨故第二假佛不假佛法輪僧須假一人自稱作佛佛是法輪主故放如來是法輪主故其破羯磨不假稱佛以佛不秉羯磨故爾第三就數多少破羯磨僧下至八人一界內此彼各四別行法事彼此羯磨不成僧不得益故下至八人即成破僧語破法輪下至九人所以爾者然調達將欲破正三寶先立耶三寶調達稱佛𨲙正佛寶所説五耶𨲙正法寶三聞達多等成耶僧寶𨲙正僧寶能破之中要假一人為佛四人成僧下至五人方成能破減則不成所破之中下至五人成佛僧二寶耶正兩分別行法事方成破僧彼此通收應是十人但説九人者如來化主不在僧數既言破僧佛非是僧故唯取四彼此九人別行法事名之為破此就破僧因中耶正相望兩衆合九若就究竟成破要假化得如來徒衆下至四人稟從耶見化方成破僧故言須九若爾何故下文此衆四若過彼衆四若過又五分要於界內八比丘分作二部別行僧事乃名為破耶答此等文者廢主論伴故但言八第四就界內外破羯磨僧要一界內衆各秉羯磨衆法方成破僧不通界外破法輪僧能破之人須秉羯磨要在界內所破之人通界內外但受耶化俱有破義故心論言調達唱五法為是四依非時乃至盡佛化境但隨其聲受從耶化如五百之徒不得聖解故損通內外此二皆就所王之中以辨其破故爾問究竟成破作羯磨竟所以論言唱五法為是即言破僧耶答此二相假今論但奉行法者為彰失解邊故爾非謂不須羯磨第五凡聖破羯磨僧俗諦僧第一義諦二俱有破聖人容有事或故爾破法輪僧唯凡非聖以其聖人不從耶化故爾就凡夫有二一有感凡夫而機是定於此時中定聞如來法輪得益獲聞思之解雖以五法誘化必不可破以感機定故二有感凡夫而機不定若無耶化即於如來法輪得益今為調達五法誘引令生異見致此凡夫應悟理解鄣使不得暫差此時名之為破第六就方寬狹破羯磨僧通三天下除北方以其三方有佛弟子秉羯磨故是以心論三方羯磨壞破法輪僧局在閻浮不通餘三以佛不在餘三方成道彼方比丘自稱為佛欲破僧輪人無信受故不得破又共誰競化是以心論言閻浮提至九是則法輪壞第七就時破羯磨現在未來俱有破義破法輪僧佛現在有涅槃後無故心論言未結界前後牟尼已涅槃息宍未出時及無第一雙於此六時中不名破法輪俱舍論言初者轉法輪言初者轉法輪未久後者世尊般涅槃此二時中大衆恭敬修同一味是故無破心論但言亦非前亦非後以此二分中俱僧一味故餘四易知即案此文有重破義以餘二分中間長遠故是以律言若更有餘比丘欲破和合僧者亦當如此白四羯磨呵諫又言如提婆達此若未出家不應與出家若已出家應滅擯故明佛現在亦有重破也第八得罪輕重於中有三一逆異二結逆總別三教名輕重初門者破羯磨僧但破同徒言教又失事中之益唯局界內以正破正等情過輕微犯偷蘭遮非逆可懺破法輪僧調達是其弟子秉於五耶破師法輪失於理解之益損義寬多犯逆偷蘭不可懺悔第二門者問調達破師法輪復損前人不得聞思之解今結罪時為望斷佛法輪邊得罪為望損僧結逆答此二相假若無其僧法輪不轉若無法輪僧不得益調達今乃以乞食等誘導五百歸從己法即斷法輪亦失理解故即礙法損僧合結一逆無別二罪而名破僧逆也問調達以其五耶破於別人不得理解之益應就損別以得罪而就損僧結罪者何答據其本心欲破僧輪若破得三人已下非其僧位不稱所期思心不遂不成逆罪要破四人已上是其僧位稱本所期思心得暢又復若本不破四別人皆得聞思攬四理解共成僧寶益利世間令由破此四人不悟理解即無所攬不成僧益是故損四人別即是損僧為斯但望損僧結罪第三門者問調達破僧得逆滅擯所以不據主故波羅夷伴者罪輕與偷蘭遮而主伴同名偷蘭者何答破僧事大非可獨成要假主伴方能成破主雖業重伴便是輕然破僧事一復齊究竟何得主伴結其異名宜同偷蘭以其蘭名通含輕重故爾問若事是一主伴同名者如減年受戒亦假主伴受戒事一何不同名而和上結提衆僧吉羅答斯亦不類以作受戒羯磨時別稱主名即有甄簡之異事雖是一得結兩名調達破僧作法之時不別稱主名無甄簡之別事復是一故主伴同蘭問相假破僧伴非逆者違諫何以俱得僧殘答秉法假伴主故結逆俱違僧諫並是心虗違諫得殘第九得報不同破羯磨僧不墮阿鼻一劫受苦破法輪僧得無間獄受罪一劫次釋文初問次答憂婆離問有三初云何破僧者問於調達行何等法斷佛法輪分衆異軌弟子未委故言云何破僧二齊幾者問數多少三誰破和合僧者問能破僧人故曰誰破和合僧次佛告已下答於中初至行舍羅先答初問就中有三先以五耶破正行法就五法中前三相似語後二妄語以五耶法誑戒群心令受耶化故破法輪謂斷四依行法次作非法別衆羯磨行耶衆法破正衆法如文行斯兩法以破衆行故名破僧也次憂婆離一比丘下有二釋一解總答下二問謂數者至八言人者非餘衆等又釋唯答第二數略不答第三問故五分問是中誰破僧佛言作主者是此不如前解以但問人未問主伴故第二文中分三第一問破僧果第二問和僧果第三重問一切破僧主墮不墮義和僧偈中初一偈彰和有益下有半偈以有益故能和報重第三問者如五分泛問一切破僧主墮不墮義不問四伴及以五百也今文中三句一領佛前言泛興後問二佛語已下佛具總答三憂婆離已下重更料簡有墮不墮從法非法乃至説下説是九對中於非法等一邊作頭各作十二句若欲知僧先以初句法破第二句非法改耶從正即是和僧不名為破今解破僧故就第二句非法作頭行化於時破初句法説以為非使耶法興頭正法隱曀方成破僧此九對上咸就第二句上作此十二合有一百八句非謂法上別有十二句也就第二非法作頭十二句者初四句中前三破主墮於一劫後一破主迷非謂是情過輕微不墮一劫初句非法想破非法想説第二句非法想破法想説第三句法想破非法想説第四句法想破法想説先解初句其文有七一若比丘者謂能破主二辨以非法破正文言非法者謂五法不能滅惡生善故言非法執耶説是故曰言法堅持此法者謂行化於時破和合僧通壞二法三彼自知已下彰心知為非言非法想破者謂前方便心了了知非故法想説者謂以五法行化時了了知非故四如是言下然口説為是執此五法能資人心軌故言是法又能滅惡之功是毗尼妄指佛説欲規他信受故曰是佛所教五異見已下結彰前二心見知非口説為是口説乖心所見故言異見亦心安於非口説言是口説乖心所安故曰異忍六行破僧舍羅者略惱損二法並行舍羅略不舉行衆兩法七憂婆離已下結墮一劫第二句非法想破法想説中但有六句除第五句異見異忍釋文如前以其前方便心知己五法為非故言非法想破至於説時迷五法為是故言法想説也亦墮泥梨一劫受苦問第二句前心知非後心迷是其過輕微而犯逆罪一劫苦者如人非人想亦應犯重一解言煞人者前境是事不可學法又無其諫爾語是非迷心犯輕此法可學又復設諫開示是非離復轉想猶犯正罪又可破僧事大雖以心不稱境以前方便心當於境故亦一劫不同人作非人想者以事輕故從心結蘭不從境結如娮酒戒等亦以境上過多不從餘想結罪若爾第四句亦應犯逆墮於一劫解言第四句法雖可學亦有諫法然始從心迷是以不墮不同二三方便內心知是其非惡心故破治心尤重復是可學故不相類問所以無第五異見等者解言此第二句以其口説望前方便心名為異見望後説時心名不異見若言異見不攝異見不異見異復不收異見故二三兩句闕而不論次第三句正以前方便心迷己五法為是故言法想破後心説時知非故言非法想説廣出其文如前無異故言亦如是第四句前後方便心迷己五法一向謂是口説不乖心見故言不異見亦不違心所安故不異忍情過輕微不墮一劫作第二四句非法想上置不疑法想上安不疑初句非法不疑説第二句非法不疑破法疑説為異第三句法疑破非法不疑説第四法疑破法疑説消文輕重準如前説亦前三逆重第四句輕是以文言疑不疑作四句亦如是若作第三四句者非法想上安疑法想置不疑初句非法疑破非法疑説以其俱疑無非法想兼是以不墮第二句非法疑破法不疑説為異由非法起疑無非法想兼過輕不墮第三句法不疑破非法疑説為異此亦不墮第四句法不疑破法不疑説為異是以文言非法想疑四句亦如是問第二四初句與前句同何以別來答不三異故又問第三四中第四與初第四同亦何以來答以上三異故然知第二四非法同前而異後以不疑故法異於上下以法上疑故第三四非法異前兩以疑故法同初而異中以不疑故此就初對非法上作十二句破初句法竟自下各就第二句上作十二句破於初句故言亦如是又解增二文舉十八法法言非法非法言法乃至説不説倒説成耶又增四憂婆問齊幾名為破僧誰破和合僧佛言若比丘犯説不犯不犯説犯輕言重重輕齊是名為破僧和僧反説故知不得專取此文若比丘非法説法即以第二非法説以為法方名破僧若説佛四依以為非法豈不是倒説成耶是破若作是説於法上亦有十二句合論更有一百八對法十二句者如前三個四句各以尾為頭次第倒説即是更不須廣作然直言各以尾為頭者濫計理應云倒説第一四為初四者是倒説第三四為第二四以法上不疑非法疑故然説是為非故上三墮第四不墮到説第二四為第三四以法上疑非法上不疑迷是為非故四俱不墮乃至第九對各作兩個十二合二百一十六句滅諍楗度第十六凡鬪諍之興乖理違和惱亂僧衆事成破僧宜須殄滅息彼不肖方成護法匡衆之化故須次明也七種毗尼能除殄罪諍名之為滅所滅是何所謂四諍兩情乖背彼此紛紜名之為諍能所通舉故言滅諍廣彰其相集在一處目曰楗度故言滅諍楗度就中文三第一至草䨱地毗尼明能治藥既有能治之藥必有所對故次第二爾時拘睒彌已下訖事諍亦如是正明四諍是所治之病既有藥病若不相對藥無能治之功諍無可殄之義故次第三若一比丘已下廣明藥病相對滅之方軌第一先解七毗尼義九門料簡第一列數釋名第二辨體第三得名第四總別通塞第五法體出不出第六用藥對人聖凡分別第七次第第八能滅人多少第九治人滅罪殄諍分別第一門者始從現前終至草覆中間有五此是七藥之名先釋其名言現前者三法五法體非過未集而相對名為現前諍情消殄故曰毗尼言憶念者清人被謗醜嚮外領為他所舉而致忿競僧衆思審知其不犯為作羯磨證彼清淨故言憶念憶念滅諍故曰毗尼言不癡者此人病時實作不癡來不為亦被他舉而致不知僧知此人病時雖作不癡不犯為作羯磨證其不癡無有實犯故名不癡作此法時能殄於諍故曰毗尼次自言者前人隱過雖有三根不取伏罪而行驅殯濫治清人聖制安令自説名種方行治法既引伏罪必無忿競故曰自言又橫諍他犯以生忿競要得前人引過懺悔定罪輕重方能殄息名曰自言毗尼言多人語者謂有往䨱論義諍理耶正別人現前而未消殄要須盡集詳心捉籌表多人語故曰多人語毗尼罪處所者此人實犯為他舉覺前引後違而致不和僧與作法微其前言責罪之實處故曰罪處所毗尼草覆地者或衆僧共犯因評致諍或橫評他犯自言不滅時已淹久紛紜難息若尋究善惡恐諍事深重故聽二衆直乞歡喜不説名種迭相懺謝如草掩泥諍情消滅故稱草覆母論如似以草覆泥令人得過不汙其足名為草覆毗尼第二門定體者若據七法能令諍無之處名毗尼者毗尼名滅謂以非數滅以之為體若就此七能得前滅為此七毗尼者謂五法三法為七之體狀所言五者謂法毗尼人僧界言三者謂前五中除僧界二餘三即是總言五法三法即不離五種現前謂僧人界法毗尼此等僧衆和聚體如瞻波説言人者起諍人在現前言義往返身口二業作無作為體界者文言在內制限者是無別行者可屬故無別法若據緣成假教是聲性等為體若就所依規圓分局相者是無記色法然是生善境界法毗尼二執正道理諧和刊定亦以聲性等為體今若隨相指事以定七體者先解現前須為四門一解五法二解三法三五三同異四乘明一切具法多少先解五法一列數釋名二定體及有無三辨廣略初門者謂法毗尼人僧界等是此之五法各體非過未對而殄諍故曰五法現前如下名為五種現前次定體等言法者謂定諍是非道理諧調進否者故文言好言教語如法如毗尼如佛所教又言云何法現前所持法滅諍者是持謂持前定諍是非道理也言毗尼者謂持前道理勸受息諍者是以下文言此是法是毗尼是佛所教汝當受是忍是下文云何毗尼現前所持毗尼滅諍者是謂持此道理勸受息諍故五分云何謂毗尼現前應以何法以何律以何佛教得滅而以滅之是毗尼現前言人者謂一比丘在一比丘前者是又文云何人現前言義往反者是此能所合名為人若就別名唯起諍行者為人唯就所為故或約能名人故文言受懺者是言僧者能斷事秉法者是文言云何僧現前同羯磨和合集一處不來者囑授在前應呵者不呵者是言界者謂攝僧分齊作法之所者是文言云何界現前在內羯磨作制限者是此謂無結在標內作法結成限約故上來所辨説之次第若行之次第應言僧人界法毗尼也次辨有無者首解毗尼無故無別體或言以法為體謂持此進不是非道理令諍滅故又言用上四法能得於滅謂以四法為體此盡不然若此毗尼是無斯義可爾今此毗尼是有謂以道理正勸受息諍故文言所持毗尼滅諍者是但此五法並是能得毗尼是以七中第一通名現前毗尼然此第五者據終得滅之處偏名毗尼非謂即以無法為體也問如有法時未有毗尼牒有毗尼時已是無法如何現前答一義以相續在現故又可以餘四法對起諍人一一皆現故言五現實不並起故現第三廣略者準於三法此五法中亦要為三謂僧與人同是人法與毗尼同是法攝加界故三但今法分始終人殊能所故廣為五法與三法不類也第二解三法謂法毗尼人解義準前亦有釋名定體等第三有無同異者別人滅中不秉衆法所以非僧亦不假界但有餘三餘三何異五法中人定是所為三法中人能所合名為人以不秉衆法故五中法通語羯磨三中法者定是語法五中毗尼通羯磨語法判諍無處以為毗尼三中毗尼亦定語法判滅第四門僧秉具五三人下三此亦位言就僧秉法中若為殄諍具五可知非滅諍者或四或三或二言二者如結大小界等言三者僧常行等言四者道俗位分道者如受懺處分離衣六年杖囊等並須人現前故具四法為俗但三如學家覆鉢以不對作故二衆互治義亦同此次憶念別相者能舉者執前三根恐有謗𠎝所舉者自準己心懼被治罰是故乖違能舉者憶念執其聞根證前犯故所舉憶念思已清淨僧與憶念尋思此人是清淨故證其不犯僧語能舉人言彼先被謗為是外有聞根我等共住知實清淨此彼無過是以文言云何憶念毗尼謂此罪更不須作舉作憶念者是次不癡者以病時作事能舉者執三根所舉人準已不癡來不作彼此乖競僧知清淨不癡來不作故僧語舉者此人我等共住病時作事不癡已來實是清淨此彼無過是以下文云何不癡毗尼謂此罪更不須作舉作憶念者是次自言者前人實犯為他所舉但使不引即未得治恐濫罰清人故是以要待自言方得治之故下文云何自言謂説罪名罪種懺悔者是又目連觀察見彼比丘去佛不遠語言世尊已知汝便捉臂牽著門外佛言不應如是若於異時亦不應如是令彼伏罪然後與罪不應不自伏罪而與罪自今已去為諸比丘結自言治滅諍應如是説自言治又容二人橫諍他犯輕重未定僧今欲滅要取根本犯者引過懺悔定罪輕重以滅於諍犯者非諍自言能殄他諍者自言治是故文言自説罪名罪種懺悔者是次多人語者以前別人現前未肯伏理僧為差白行籌以滅籌多表語故名多人語是以文言云何多人語若用多人説持法持毗尼持摩夷故見論多覓毗尼者處處多覓知法比丘判故名多覓毗尼言知摩夷者是二部波羅提木叉次罪處所者為他所舉初引後違而生忿競僧與作法微責前時所引罪覆處故曰罪處所凡言前引後違者前言犯後言不犯或前言重後言輕者彼此忿諍僧今作法微其犯處重處是故總言罪處所也問同自言何以偏須責同前引而不信後語者何答前引同舉者之言是故信前後言違舉是故不信以其此人若無實犯初應相違既前言同舉明知違者不實故下文言云何罪處所彼比丘此罪與作舉作憶念者是次草覆此諸比丘皆共犯戒或橫評他犯現欲懺悔執見相違半見提舍尼半見波逸提正欲輕懺見重者謂不滅正欲重悔見輕者復不從即諍輕重礙於懺悔故聽不説罪名種直相悔謝如草掩泥不簡縱橫故稱草覆五分作白二羯磨草布地悔過彼諍比丘應盡來僧中三乞如是三説已皆舒手腳伏向羯磨師一心聽受羯磨師唱言大德僧聽等白二滅也此等七法雖通用五法三法而有斯別狀第三得名若毗尼總名當體受稱以其體是非數滅故若就七法能得他滅名為滅者從所尅立目亦可功能得名若也七之別名得名有四現前一種世局得名不癡罪處所從境立目不癡本對於癡本癡不在僧約於前境又復文言我今不癡從僧乞不癡故也罪處所者罪在前境過不在僧為他所舉前引後違作法治罰微責罪實名當前人故亦從境念憶自言多人語此三功能立目如沓婆被謗聞根外彰為他舉發而致不和僧知清淨舉者非謬作法憶念證彼清淨情諍即滅滅功由僧作憶念故故下文言我今不憶從僧乞憶念明知功能自言者引過懺悔能滅諍故多人語者廣集智人捉籌表多人語定理耶正能殄於諍故草覆者就喻受稱第四總別通塞者於此七中名有總別謂毗尼是總現前等七是別各不相收故若其據體體有通塞謂現前一法體義通六體狀有通塞下六體狀塞而不通問云何現前體義通六體有通塞答五法三法義實該下以名攝用含收五十八現前故然即於中有別現前專對言諍故復體塞問相狀如何答現前五三二法可知如憶念中白及二羯磨皆言諸長老不須難詰問我乃至第三羯磨誰諸長老忍已前此是出不犯道理諧調進不謂是法現前第三羯磨誰諸長老忍僧與某甲作憶念者默然誰不忍者説乃盡結竟此是勸受息諍即是毗尼現前即假僧人界豈非五法義通於下不癡五法準憶念以説自言五者云何自言謂説罪名説罪種懺悔謂是法現前云何治自責汝心生猒離正是諍滅之處即是毗尼現前亦假餘三故五祇律取自言者恐未來世惡比丘誹謗清淨不得自言治便驅出故罪處所五法者如白及二羯磨乃至第三羯磨誰諸長老忍已前盡是微尋前言責罪處所此是法現前誰諸長老忍已後乃盡結竟是諍滅之所即是毗尼現前餘三可知多人語五者文言作如是語者捉不破舍羅作如是語者捉破舍羅乃至十三種行舍羅此是法現前別處數籌已若如法語比丘多者彼應白如法比丘多是毗尼現前餘三可知草覆五法如二衆各言共相咨稟乃至和衆白等謂是諧調進不法現前二衆各言長老我今已下乃至作草覆懺悔是毗尼現前亦假餘三法即是五法義通下六下六事別各不相通為是僧法毗尼及人對下六滅非無有異尋相似説可以思知第五法體出不出者先明出法不出法謂憶念不癡罪處所作法竟時諍情消殄即出法體餘四毗尼作羯磨竟時諍事未除但是方便滅未究竟故但列名如現前中雖作簡衆白等本未滅諍自言中受懺白多人語中差行舍羅人白二草覆和衆白等謂作此法滅未究竟故不出法次出體不出體不出體者問如現前等四不須出法義或可爾此四毗尼可無諍滅之處而並不辨滅體者何答以定不定故憶念等三無三品流轉如憶念者不作不犯不癡者作而不犯人罪處所者亦作亦犯人用藥揩準即出滅體謂即法以辨滅體故餘四毗尼流轉不定如現前中三法五法五法三法乃至用多人語等若欲具彰濫於並用若復隨分少列又謂恆定是故總言應用現前自言懺中或對一二三四又就所引犯等輕重亦是不定多人語中三種行舍羅都辨十三故亦無準草覆地中用法應定然所諍不定或從自言流來或經行草覆故亦不彰滅處之體此言體者謂責滅之究竟處所第六所為人聖凡者阿含經要羅漢被舉得作憶念凡夫不得何以故凡夫有故犯戒羅漢無故犯但有誤犯故見論憶念毗尼者為愛盡比丘下至舥含人不為凡夫諸律不分聖凡似得清淨者通行自餘或通不定第七次第者此七位二凡滅之來從下至上是以初四毗尼擬滅四諍中輕微諍者作一憣列即是對所餘除有一竟第二下三毗尼擬滅上品難除之諍作一番而列即是對所除二竟現前所以先者以其現前衆藥之本又復言諍四中之初先明現前擬滅言諍輕微易殄者覓諍第二是以次明憶念不癡擬滅覓諍易除滅者犯諍據三故次第四明自言毗尼據滅輕犯之藥事諍通用即以此四擬滅事諍易除之病對上品中多人語所以先者對言諍故罪處所以者對覓諍故草覆次者除犯諍故即用此三對事諍難除故次第如此因辨總別離合戒以二分毗尼如向所列二者是對事即四也文中隨名隨名有七以名攝用故又言一切滅滅即十四毗尼或用相假即十三毗尼以其下六各帶現前故對事即二十六又可四十四八十八離言諍為三十四毗尼謂獨現前有八十三種多人語各帶現前故即二十六并前八故三十四餘五毗尼各帶現前即十通前以為四十四也又對事八十八又可為五十毗尼及一百毗尼謂離犯諍中四種自言及草覆假用即十通論覓六及言中三十四合五十毗尼對事諍一切滅滅一百毗尼此謂隨用離明以藥殄諍有爾許種法今但言七者舉名攝用盡故如一現前即攝五十八現前更無不盡餘攝可知故總言七滅隨用一百也第八能滅人者現前自言能滅之人義通三位餘之五滅局僧方秉所以可知人通塞故法亦寬狹此謂具法多少説者即上二滅人有三故法通三法五法餘五局僧故法唯五法若用三法五法相對説者五法通七故所以寬三但二中不通故狹第九治人滅罪殄諍分別者通而言之七俱殄諍言滅罪者自言草覆罪諍俱滅罪處所有罪而不滅餘無罪可滅治人不者餘之六種但使滅諍而不治人以人無過故諍是鬪亂故須消殄罪處所者將治人法以滅於諍以人有違罪過故亦治人亦滅諍以治人故作法竟時奪三十五具行折伏令其引罪已方得為解餘非治人故不論須解祇與作覓罪已是比丘應盡壽行八事一不得度人二不得受具戒三不得受依止四不得受僧次請五不得作僧使六不得作僧説戒人七不得與僧答説毗尼八不得與僧作羯磨人十律作實覓羯磨亦奪三十五五分本言治有二種一可悔二不可悔不可悔者與作盡壽不可悔白四羯磨餘六無斯過故不是治人次釋其文即為七段現前自言多人語草覆此四不出法體故但有列緣結名餘三定故出法藥體其文各三謂列緣辨體結名俱不癡中略無結名也文中自言總言應不應理通七聚下是非亦然藥病相對中唯就可懺者説如對僧懺應攝殘罪以見文如此是以立義專言二人橫諍自言滅之理引通七但為初二非可即了故闕而不論第二次解所治之病於中文二初至呵責已先舉諍過白佛呵責二告諸比丘已下廣辨四諍體相差別初中文二第一起過文言比丘共比丘尼諍者不在四諍之限所以然者若比丘尼論義二衆既別復無破僧不在言攝又無共用藥滅故或比丘舉尼尼舉比丘亦非覓收或比丘與尼諍二衆犯或二比丘諍尼犯或二諍比丘犯皆非犯諍中攝或比丘與尼諍二衆羯磨亦非事收或二比丘諍尼羯磨成以不成此在言攝以得破僧共用藥故二尼諍僧羯磨亦爾互諍雖非四諍之限今文列者彰諍過故第二時比丘聞已下如來呵責第二正辨諍中文分為三第一舉數第二列四諍名第三云何已下廣彰其相廣中文四初至是為事諍明諍境體第二言諍以何為根已下至是為事諍根解其四諍起之因本第三言諍是善不善已下至事諍無記約對三性通局差別第四言言諍已下簡定是非所以須此四文次第者初舉所諍之法即是境體既識所諍因何而起故須第二明其諍根雖知境因但諍是乖背為唯不善為説餘二故須第三義通三性三性之諍無不乖競恐成破損理齊須滅故並諍攝但三性之諍義含是非恐濫行法藥故須第四舉是簡非是者須滅非者不須判文雖爾先擇其義六門分別一列數釋名二辨體三得名四所以五次第六辨諍根三性是非諍有四種謂言諍覓諍犯諍事言諍者理不自斑藉言以顯詳評是非定理耶正彼此諍言遂成乖忿名之為諍諍由言起故曰言諍覓諍者內有三根伺覓前罪因舉詣僧遂生其諍諍由覓起故曰覓諍犯諍緣具作過稱之為犯評犯生評故名犯諍事諍者已起百四十五羯磨相別稱事評事致忿名為事第二體者其義有兩一者諍體二者所諍境體若論諍體謂往復評理舉罪輕重乃至評事以成此諍正以色法聲性及非色非心名句味以為諍體其三性心者助業之因非正業體也若舉十八所諍之法謂境體者對文以釋第三得名者諍雖有四得名有二言覓二諍約因受名犯事二諍從境立目前二約因者謂由言覓而生此二故曰約因次二從境者謂評犯事以生後兩故第四立四者釋有二義一解凡生諍之境不出衆行二法就行法中有二一犯不犯行二輕重行若評此二行理相是非犯以不犯輕重等理而生諍者立為言諍若三根舉覓犯以不犯舉來詣僧不諍理相而生諍者判為覓諍若共評犯作事不同罪之輕重而生諍者名曰犯罪諍就衆法中亦二若未作百四十五理相是非立為言諍若諍已起事而生諍者名為事諍若評餘六對事已未故俱為言諍以斯義故故立斯四收諍斯盡亦可一方化相故立四諍第五次第但理顯由言故聖聽論義因評佛法遂生其諍是以言諍最在初諍評犯義希故在第三事從三起故在第四第六門中若竪義者四文之中先解定體體中四諦即為四段下三各四類亦同然就初言諍有三謂舉釋結餘三類爾正辨言諍體中文四一起淨人文言若比丘共比丘諍言簡餘衆故二引十八事已下舉所諍境界三若以如是已下往復覓理是非四遂彼此共鬪者因而致諍對第二文即辨境體之義若泛評十八理相是非而生諍者並是言諍攝若諍已起十八方生四諍於九對中可為三分一謂犯不犯輕重兩對約行法以辨二約説不説衆法以明三約餘六對以説行法復二若諍犯不犯正生覓諍或生言諍若諍輕重正生犯諍或生言覓衆法中諍説不説但起事諍其餘六對多生言諍先解第一諍犯不犯若事一而見異者即生言諍如或為他舉或二人橫評言不剃髮翦抓者有犯一人言髮抓有命不須剃除不犯而生諍者謂迷聖教要現前多人語滅以藥來驗故知言諍如是一切戒但是引所作事同而諍犯不犯理者咸在言諍中攝云何生覓若有三根舉彼前犯或復清淨言已不犯即含前兩戒可前已引犯引重後還拒諱而生諍者此是正生覓諍謂須憶念等三滅故方是覓攝次諍輕重生三諍者云何生言若評前人所作事同而見有輕重者是知如人橫諍掘地之罪一言得提一言犯吉而生諍者是言諍攝謂須現前等滅故云何生覓若前人實不犯重能舉有根證前犯重所舉自言我不犯重但犯輕重罪而生諍者用憶念滅或癡時犯重不癡犯輕即不癡滅或前引重後言犯輕用罪處所除此諍輕重覓諍中攝云何正生犯諍若二人橫評前犯如見掘地一人言某甲地地想掘犯提一人言前人想疑犯吉而生諍者用自言滅或衆共作罪相朋致諍各執輕重或可自言不能得滅若深重不可尋究名種者草覆懺悔如斯執輕重者正生犯諍衆法成否事諍可知餘六對者謂法非法毗尼非毗尼有餘無餘粗惡非粗惡制非制常所行非常所行等咸是事一見異故多生言諍若依明了論定此十八法與此少異彼論言常行非常行説不説此之二對是阿毗達摩教中所明細解其相前破僧違諫戒已廣説若準斯理全不得以説為事諍境又人以常行非常行制非制為事諍境此亦違論文今依論解覓犯二境如前判事諍境者取毗尼非毗尼為事諍境以衆法為毗尼故釋義如前其説不説回入作餘六中合為言諍境覓諍第二辨中文三一先明起諍人二以三舉事已下辨所覓境界三作如是已下正明舉罪闕少第四句相違第二境中文三一以三舉事者總彰所舉二破戒已下別列所舉境三見聞疑者能舉人所依三根第三正舉中依如是相覓罪共語者正出舉語不妄求伴勢力者求伴助己謂舉者有稱己伴故安慰其意者以方便濡言慰喻開曉若舉作憶念者引證安此事者安有根作事不安此事者不安無根不作事不癡者彰舉者內有解慧不脫者為顯舉者勸辭汝若從我懺悔清淨得脫若不從我舉懺惡業所羈故曰不脫犯諍但有第二所評境界闕有無餘三句之文事諍亦但有第二闕無餘三也言諍中事作等一釋謂斷言諍時用現前多人語滅於中有簡衆單白差人白二即諍此二成不成義者是中諍言事作即斷覓諍時有三白四即諍此三是覓諍中事作斷犯諍時有受懺悔單白及和衆白即諍此二而生諍者是犯諍中事作此釋者匪直理不相當亦是收諍不盡又釋於百四十五已起羯磨但使諍成不成理而生諍者用現前多人語滅是謂言諍中事作如似一白處作二白為他所舉道此不成所舉之人自言初白自成後白浪作而生諍者亦在言諍中事作如瞻波作非法別衆羯磨七人共諍佛判二人是法語餘非法語等類咸是言諍中事作攝若有三根舉彼非法羯磨不成有罪所舉之人或言不作非法被謗有根或癡狂時作或前引後違而生諍者須用憶念等三以滅故類諍百四十五羯磨等並是覓諍中事作若二人橫評他非法別衆等羯磨一人言彼惡心蘭一人言懈怠犯吉事同而見異者亦是言諍中事作二人橫評他作非法別衆等羯磨一人言此人惡心作犯蘭一人言此懈怠心犯吉或一人言彼作非法和合羯磨一人言彼作法別衆羯磨或作羯磨已衆共相朋而生諍者此是事見俱不同須用自言草覆滅故類餘一切羯磨如此起諍者並是犯諍中事作次辨諍根根者生義四諍之興由斯起故所以名根言諍中三不善心三善心為根者謂內因為根故評四種僧義而生此諍諍由僧起故曰僧為根此就境緣説故諍由人起故曰人為根六諍所起為根者就業説根故如中阿含説一渾戾不語二惡性喜鬪三諂曲四貪嫉五無慚愧六邪見十八破僧事者以所諍法為根覓諍根初貪無貪等謂此等心中舉而生諍也舉僧犯故僧為根僧犯由界故就生諍遠緣説根舉人犯故人為根三舉事者謂是所犯事以其不諍理相是非故無十八法此覓諍者但是犯不犯一對故也犯諍根但有貪等據犯因故若就起諍行者亦應有三善心僧等如前説三舉事亦如前六犯所起為根約業具説如僧六辨事諍從三準前以説第三三性者言覓事三得通三性犯無善犯故唯通二若就諍行者應通三性言諍三性者若為名利或折辱他心勝負之情論理諍者是其不善為欲顯揚佛法情存覓理不於利譽者是言諍善非前二心即是無記覓淨文二初總舉通三第二別釋通三即以為三先解善覓於中文三第一總舉人善心伺覓二以三舉事已下別彰覓事三以如是已下正明其舉言別彰者以三舉事等者廣前伺覓第二內有五法已下廣前善心也伺覓有三一三舉者總彰二列破戒等是別列所覓事三見聞疑見覓所依根第二內有五法廣前善心者有二種一出善心前言善心如何是善謂內有五法第二以何知有此五法者即出其相以二義故所以知善一為令前人自行清淨文言無犯等二欲令於衆清淨外無見聞之譏故文言莫令此人有惡名流布第三正舉文義如上次不善分三初總舉不善心伺覓二以三舉事已下別彰釋前三以如是已下彰非法舉別中文二初釋伺覓文三初以三舉事總彰所舉二破戒等別列所舉事三及所依根二內無五法釋不善心有兩一內無五法正解不善心二明不善心相有兩第一欲令前人自行不清淨故文言欲令此人有犯垢穢不清淨罪不出二欲令前人於衆法不清淨外彰見聞之醜故文言乃至流布第三正非法舉中不妄求伴者亦隨妄情非法求助不安慰者內無五法粗言呵責作舉憶念者妄引證明安此事者安無根不犯事不安有根他事內無明慧故癡不脫者非法舉罪俱不免羈纍故無記比説可知犯諍文二初總舉章門不通善性二別釋有兩初不善者凡夫人學人學人者下三果人或以遮過故或凡夫人犯通略廣學人犯略也無記犯者謂凡人學人不故犯及無著人犯十律凡夫人三性俱犯善心犯者如新受戒比丘不知戒相自手拔佛塔邊草等又慈心煞人等不善心謂故犯戒無記心犯者非上二種者是文中不論學人憂婆問羅漢三性心何心犯佛言所有犯者皆是無記心如羅漢不憶有長衣忘不囑授非時入聚落是事諍隨三準説可知第四文簡定是非是非者靜理之言是其言諍餘言餘諍則非言諍伺覓他罪因生忿競是其覓諍餘覓餘諍則非覓評犯致忿是其犯諍餘犯餘諍則非犯諍共諍百四十五羯磨之事已起成否是其事諍餘事餘諍則非事諍是非如此先約言諍料簡是非餘類可知就言諍中文分為三初言言諍等者第一先以諍言互對總為四句第二或有言即是言諍已下對是簡非開分七門第三云何已下廣釋定是簡非之相初文者是中四門一言言諍二言諍言三言諍四諍言定文雖爾然有人説此四句中為簡餘言第一第三以言即諍為簡餘諍第二第四以諍即言然此四中初二以為一對後二復為一對此二對中所以前對言即言諍言諍即言為別後故何故後對言即單諍單諍即言為別前故實理相似為別二對故有單復莫不初與第三同簡餘言第二第四同簡餘諍此義不爾所以然者如第二句言諍言假簡非者即應文云或有言諍非言既云非言若對此文如何得稱為簡餘諍若簡諍者直應言道或有諍非言也所以將言乃至簡非即棄言而獨簡簡諍又復問云前對何以言即言諍言諍即言如何簡非直云諍非言也故今更解此四前二一對以言即言諍以言諍即言者謂以通言別諍遞相即異為簡餘言次二一對以言即諍以諍即言者謂以通言通遞相即異為簡餘言亦簡餘諍云何此諍及言通別相耶如第一言字通是非義故別諍者舉四中言諍故第二對通言如前云通諍者直舉其諍諍通於四今不以言等別之故名通諍問此二對何異異相有二一者語異如向所定二對之別者是二所簡異此二對中各以言對諍同簡餘言各以諍則對言所簡即異故謂第二句以別諍對言使簡餘言第四以通諍對言方簡餘諍故問若據後對已是具足簡言簡諍何勞初對答若唯有下對但得通言通諍簡異餘言餘未諍未有通別諍專簡餘言謂以通諍對言簡諍以別諍對言簡言故須兩對方可盡理若但一對簡異不周故爾本非對諍始終難易及云定諍多少等也第二對是簡非開上四章為七門者若據前門當相正解但應有四各舉非顯是具應成八謂上四句各舉一非故人云第二句舉非一門同第四門舉非文略不彰故但有七今解不爾初一下二此之三句並有舉非顯是即成六門第二句者但出其是亦應舉非道云或有言諍非言非言者非餘不生諍言即為八門已云言諍復云非言恐濫不出故但七門所簡既異本不同第八若此同故不出者初句第二舉非義同第三簡非何以初句亦同舉非文共兒語等二處同有若此非妨者第二舉非亦何獨略故知不爾其七門者第一或有言即是言諍即是初句為簡餘言故以言即諍第二或有言非言諍舉非顯是舉彼妨言非是言諍顯前執言是其言諍第三有言諍即是言即上第二句彰其即是應亦舉非或有言諍非言簡去餘言濫故不舉或可理不得舉第四或有言即諍者正解第三門或有言即上言字即是諍者即第三句中下諍字為簡餘言故將言即諍第五或有言非諍者舉非顯是還舉好言是其諍顯向惡言即是其諍第六有諍即言正解第四門有諍即是第四句中上諍字即是言第四句未言字為簡餘諍故將諍即言第七有諍非言者舉非顯是謂舉餘諍不即是言顯示前諍即是其言第三廣辨定是簡非之相依向七門次第辨釋云何有言即是言諍牒問初問次廣釋之若比丘等者舉起諍人簡餘衆故異類相諍非四攝故比丘既爾對尼亦然謂尼共尼諍謂今且寄比丘以説之云諍言者簡餘三諍以十八事者總舉所諍境界法非法等別列所諍以如是相共諍者總顯諍相互相鬪彼此不和總彰諍過各執己見不從他語彼此相非共相破毀故曰乃至不和是為下結云何有言非言諍者牒問第二若文共見語等舉世間善言類比丘善言非是言諍是為下結云何言諍即是言者牒問第三釋結同前云何言即諍牒問第四釋結亦同云何言非諍牒問第五釋結準前云何諍即是言牒釋第六云何諍非言牒釋第七次解覓諍亦應三門一先以諍覓互對總為四句二對是簡非開分七門三廣辨釋簡非之相今此文中但有初總為四句一覓覓諍二覓諍覓三覓諍四諍覓初兩一對通覓別諍遞相即異為簡餘覓次兩一對通覓通諍遞相即異為簡餘覓亦簡餘諍所以須簡者餘覓不生諍理不須滅餘諍以餘藥滅故非此所收若是覓是諍者可須憶念等滅故須簡之次開七門次釋比前犯事二諍類釋理同故言亦如上自下第三病藥相對殄滅方法分文有三第一至僧亦如是泛明現前是非第二阿難已下訖一切滅滅正明藥病相對滅諍方法第三憂婆離已下泛問自言如非以現前衆藥之本故先料簡是非非者棄捨是者隨用至於對諍不復應彰懸指上文省而義要故爾又下須問自言是非者以上未料簡故初現前中分文有二初至僧亦如是泛明其非彰過使棄二若比丘已下正明如法識是遵修言諍及言諍中事作此二由評理是非而生其諍理為教顯是以三藏法師依教而判定理是非諍情遂息故觸現前即能得滅餘之二諍不評理相是非為是現前不能獨滅要隨配方殄此中現前泛明是非未有當今欲解者且擬一法以釋此文非謂正滅言諍下品也如一白處作二白即坐衆僧諍此羯磨一人言初白自成後白浪作此法成就一人言作法不成彼此忿諍徑人取判定其是非非中十六句位分為二初十二句三法非次有四句五法非三法非十二者一比丘二比丘三比丘作頭各四句如文故文言若一比丘者謂斷諍人次言在一比丘前者謂起諍人能所言義往反合是一人現前好言教語者謂妄定道理諧和彼此總舉欲作説非為是故若繽者略舉所諍之事非謂已治能斷事人非法乃至非佛教此出所斷事前法理實不成非法故也彼作如是言已下説非為是故曰如是言乃至是佛所教此是非法法現前當受行是妄勸忍領此是非法非毗尼現前如是諍事滅已下結其非法謂前實不成妄判為成不合聖教正滅法軌故曰非法亦具三法故稱相似次有十一類亦同然次四五法非亦比前説次辨如中亦十六句初十二句三法如次四五法如一比丘為一比丘中文四一舉三現前二若作如是已下結成如故三是中已下牒名解釋四若比丘已下結發起人罪初文三法現前者若一比丘斷諍人在一比丘前者起諍人以須人現前故此能所合成人現前二好言教語已下且約一事論之如一人持欲忘而不説便作羯磨彼人言既不説欲別衆不成此人言既至衆中雖不説成寄諍此法文言好言教語先説是道理者諧和彼此故言如彼此故言如法乃至如佛教者此舉所諍羯磨實成故曰如法能滅惡生善故如毗尼稱於聖教故如佛教彼如是言已下謂斷諍者亦印可前法為是故曰乃至如佛所教此是法現前汝當受是忍可勸受持流通是毗尼現前次結成現前次釋現前如文可知四結發起之𠎝三人發起一即坐斷事人二後來人三新受戒謂是初諍者初者新也謂對我後來等二人我不在坐望我應同未滅之諍故言謂是初諍佛判但使滅竟皆是已滅非謂望已不滅故説為初俱得提罪次十一同前可知僧為一比丘分為四一五法現前二若如是已下結名成就三牒名解釋四彰發起之罪初五現前中略無其界三解現前者言所持法者持前是非道理故持毗尼者持此道理勸受息諍故義往反以辨人者容通能所合以明之僧現前者謂和合者是在內羯磨作制限者謂作法界簡自然界故發起人四謂加與欲後悔下三類爾次釋第二滅諍方法對殄四諍即為四文言諍有三初總問答用藥多少簡餘五藥故次阿難已下別問別答彰彌滅方法三五種平黨人下斷諍人優劣前總問答者問意既有七藥未知言諍用藥多少故曰幾滅滅佛亦總答此七藥中但用二種謂現前多人語故言二滅滅所以爾者解曰言諍由評理邪正法相是非各言己是不能刊定遂生其諍然法相道理為教所載是以三藏法師依聖教道理刊正判決用現前多人語定理是非耶正既分諍情殄息病藥相當故用斯兩餘五非此對治如覓中三毗尼諍由人起清濁未分是以生諍須用憶念不癡定人清罪處所定人濁清濁既分諍遂消殄是彼對治故言諍評理而生若用憶念等三雖可定人清濁理相不分猶自生諍非此對治故不須用又犯諍之生為諍前人犯之輕重又由執犯輒治生諍故須自言引過定罪輕重若或相朋徑歷年月自言不滅須用草覆言諍評理不諍罪事不同犯有輕重何用自言草覆又復理本清淨何用自言攬過歸己理須顯彰焉用草覆今此二滅但是滅諍不治人滅罪次下釋文如昔解文三初至僧亦如是以單現前滅言諍下品第二彼諍比丘不忍第一僧已下次以現前滅言諍中品第三爾時舍衛國已下總用二藥滅言諍上品也此未必然以其細論品數從一次第乃至多人語九重流轉此九之中若也理清當處除滅即為九處滅如其不定終訖多人語三種互有流轉義故彼言行籌已自收取於屏處若數不如法籌多應更令起相遠坐人人竊語此是法語律語佛之所教大德當捨非法非律非佛教如是語已復更行籌故今解者不須約上中下三品局釋也大文分二初明獨現前滅第二爾時舍衛已下用二毗尼滅前文分二初一問答以上雖言用二頗得獨用現前不用多人語不是其別問佛言有即別問答何以不更問佛頗有言諍用一多人不用現前耶解曰阿難已知現前是衆藥之本故問單用其多人語不離現前故不須問但多人語者唯是能斷諍僧有差別故現前中僧謂界內不盡集唯白簡智慧者斷多人語者是僧皆集不須簡別可界盡集唯除與欲者已外斷理是非與現前大同故多人語不得別行二問言何者是已下次一問答佛生滅之法體隨能滅人即可為八初一比丘滅二二比丘三三比丘滅四僧為比丘訖是中現前義如上此處僧滅五若彼諍比丘道路不得如法已下訖波逸提如上異界僧滅六若彼諍比丘不能中道已下訖波逸提如上異界衆多三藏滅七往二比丘已下至二三藏滅八往一比丘已下異界一三藏滅此八能滅人中若以界分別前四同界人後四異界人若約現前三五者初三後三用三法現前滅四五二僧用五法現前滅若人多少者初四從一至僧後四從僧至一今八分上下者不約法之三五不專約數多少及界同異但約三藏斷諍之人行解勝劣以為次第也第一明一比丘滅亦為四文一三寶現前滅二是為阿難已下結名成滅三解現前義四應有發起之罪文略若一比丘等人現前好言已下至是佛教法現前既欲刊定先其出諍為諍何等如下增十二中文同義異義同等四句刊定盡得今且寄遮性以論如竪義者言粗等性惡重媒房等遮惡輕論義者言既同一篇何有輕重是非未分而生其諍徑於三藏判定是非好言教語者謂依教判是非之語是法是毗尼者謂泛舉竪義者稱理合當能滅惡生善故言是法是毗尼不乖聖説故曰是佛所教彼作如是言等者謂斷諍者印可竪義法師為是愜順佛意故言如法如毗尼是佛教上來法現前受是忍是者勸彼秉納安心勿捨此是毗尼現前餘義如上二比丘滅三比丘滅如上故並言亦如是第四僧滅分二初説僧亦如是對僧判滅二佛語阿難已下道路不對僧前滅前三處滅略無道路滅對僧前滅中約所為境四有先對一人文四如上二三僧亦爾道路滅中文有前三略無發起此雖去詣餘處今若消殄猶是前僧力故第五僧中文二初訖波逸提如上僧而滅二彼諍比丘已下道路思量非對僧滅前文有三初訖捨此諍事付諍方法第二此僧應語彼比丘已訖下應作如是受諍教僧受諍儀軌第三受已下示僧滅諍之法付中有四初至捨此諍事説已諍起因本總由來意請求滅捨第二若長老不能如法已下正明非法滅諍令諍深重怖令如法滅第三不如法下欲明匪直生諍容成破僧住止不樂第四彼諍比丘已下結勸捨法初文有三第一從初至長老所申己來意於中五子句我此諍事總舉次説其因本故曰如是起等次僧作如是滅申前僧滅次我不忍可者申己不受諍未能息次是故等者結其來意第二善哉長老已下請求如法滅法望反前滅第三若長老能為我等已下彰已能捨受諍四句第一至滅此諍事不正明勸如實説我當量宜評其如法滅於中文四一長老諍事者對起諍人總舉其諍事若如是已下責諍因本三如彼僧滅諍者責前僧滅法四若能如實説已下勸依實説量宜評滅第二若長老諍事已下正明説不稱實不審得意判諍令淨深重怖令如法説第三非法非毗尼已下為彰匪唯生諍亦容破僧惱衆之損釋須實意第四結勸受諍方法斷諍文兩一結前第二正斷文四初至當作是滅諍辨正滅諍第二若作如是已下彰結名滅第三現前義已下釋現前義如上第四明發起人罪如上前滅中文四初説如佛所教安諍比丘處二若衆僧作如是念已下訖佐助此比丘簡能斷事人三若彼諍事僧不如法滅已下至亦忍可此事教僧進不四僧即應語彼諍比丘已下正明斷滅初安置諍人如文第二簡人文五一者明僧念評簡擇二佛告阿難已下制白簡集智慧比丘三若比丘有十法已下制具德人五分二語衆中各須出四斷諍事比丘皆二差此律七百事亦同彼祇律當先自思量身力福德力辨才力無畏力事知緣起有如是等力前心識鬪諍事可滅四斷事比丘中已下作白驅遣三人三人如文五若斷事比丘坐中已下具足德人順正義者佐成善伴前為白驅者雖為簡遣不入斷事人限若在界內咸須取欲如七百中説道路不在僧前滅中亦四如上第六衆多比丘滅中廣明法式如上七八二所滅者準第六中説故並云亦如是又以六望七七望於八略無道路滅也自下第二用二滅滅文二初至呵責已舉彰過狀第二告諸比丘已下制用多人語前中文三初訖如上彰諍比丘不忍八滅於中初至不忍可僧滅諍事謂比丘不可前四能滅次聞彼住處已下不可以四能滅第二彼諍比丘已下舉以白佛三世尊已下呵第二正教滅中文二初舉宗制用多人語立二章門一應用多人語門二差行舍羅人者差人章門第二有五法已下廣辨法式於中文二初滅方軌二有十不如法已下辨捉籌是非前中文二第一簡德差人廣第二差人門二有三種已下廣前用多人語門於中文三一舉數二依數列其三名三云何已下廣辨三相即為三文第一顯露第二覆藏第三耳語初顯露中文四初至如是諍事滅正彰滅諍第二是為阿難已下總結其名第三云何已下牒名解釋第四若作如是已下結發起之𠎝滅中分二初至諍事滅當處衆為滅第二若如法比丘少已下外求他衆滅前文有四一明行舍羅五種二應作二種已下制作二種舍羅為表是非二法故十律二種籌一長一短一黑一白祇律亦爾五分如法籌不如法籌不如法籌三作舍羅已已下行籌白法上來法現前四行舍羅已巳已下如法唱滅此毗尼現前餘三現前可知外求他滅中作亂已便起去任五德人相其進不科作一種而去下三段如文次覆藏次耳語此二種中準無顯露中第五句以衆中非法者多是全非故耳語正滅中文應有五加一耳語行法餘準前説次明如非先非以如非中一列十門二云何已下釋也白二白四異羯磨異者謂是全非不得行籌刊定小犯者或念犯罪謂第五犯戒不故作容對手罪或發心作謂起心欲犯此全非犯若評此等不合行籌行即非故又言若評小罪或言對首懺或云何念懺二俱是法若行舍羅定一是一非名為小犯行舍羅如法反非可知第三斷事人如非文五一舉數二列名三云何已下牒名解釋四句身不作口作等者如增四四斷事人第四俱句身現惡口語指授與同見此言身口現惡謂與非法人同見或身表同或口表同非好斷事人餘句俱互準而可知四是中已下校量勝劣令處衆斷理五是為下結第二覓諍文二先總問答用藥多少簡餘三故問所以但用此四不須餘三者何解所論覓諍諍從人起須用現前憶念不癡罪處所等定人清濁諍情遂息藥病相當故覓不評理非此對治何用多人語又復不諍前犯重輕焉須自言草覆故但用四二別問別答用藥法式隨用分三初現前憶念次現前處所問所以不問頗有獨用憶念不用現前者以要假現前是衆藥之本故無此問憶念等三不並可知憶念中先別問答辨用之法式多少分齊二又問已下正示法體於中文四第一正滅第二若如是已下總結其名第三是中已下舉名解釋第四結發起人罪正滅文三初至難詰不止彰其諍過第二阿難僧應與已下聽與憶念毗尼如上第三有三非法已下辨其如非先明三法非如次辨五法非如如文可知牒名解釋此罪不作舉憶念等亦是毗尼現前不癡準憶念説次現前罪處所中亦四如上初正滅中三亦如上第三是非中先就三法非如先非後如各有九三如文若定如非多少相對如瞻波中説次五法如非五非中若本不自言即無可緣微青故須自言若得自言何得與罪處所也答由前自言好解諱故文言不清淨謂實犯夷前已引故不合治取若文清淨者好不合治故治是非法以諱罪故故言此罪更須作舉憶念者是第三犯諍文二初總問答對餘諍故辨用藥多少但用現前自言草覆等三所以不用餘者此中衆共犯罪諍其輕重或橫評他犯緣紜長諍僧若欲滅要取自言引過即非濫治清人又知輕重諍情息滅若相朋難滅須作草覆藥病相當故用此三既不許理焉用多人語又已言評犯輕重不諍清濁何用憶念等三第二阿難已下別問別答文有其二先問現前自言次問現前草覆前中文二初一問答辨用藥多少分齊次何者是已下彰用藥法能於中約法分齊分二先對三境三法現前自言二若欲在僧中已下五法現前自言今對能滅人分以為四如文可知先對一人文亦有四一現前自言滅第二若作如是已下結名二滅第三是中已下解釋第四發起罪正滅中此對首懺故但得懺從殘輕蘭及人皮等蘭提提舍尼餘非此對一人悔法四如常辨能所相對人現前二從始至如是三説竟是法現前彼應語自責汝心等二是毗尼現前次對二比丘次對三比丘定文如前各具五法其所懺罪但得悔從事輕從殘重蘭尼薩耆破僧違方便吉羅等餘非此除次對僧懺唯除夷邊重蘭四伴及破羯磨僧等蘭及尼薩耆破僧逆近方便吉羅等餘非此對文位有四如上但正懺中五法一乞懺二受懺者白三正懺四呵責治五領受闕無第二請懺主文計理應六於此四位類皆未二毗尼現餘是法現前第二現前草覆文二初一問答知用多少二又問已下用之法然文亦有四一正滅二結名滅三解釋四支起罪正懺文四初訖不安樂彰其神諍過第二阿難彼一衆中已下正兩衆遞相量可求作草覆第三阿難彼比丘已下制白羯磨和其二衆第四阿難是一衆中已下正制二衆各作草覆懺悔以滅罪諍母言滅諍不滅罪所懺者即前自言中罪自言不滅相朋難定者是而非一切且約如衆共食尼讚嘆食半見波逸提半見指授食提舍尼如是各執名種不定不得懺者故聽不説名種作草覆懺第一衆首應起作如是説諸長老我今此諍事謂牒前諍己所犯罪謂所諍罪牒重罪謂夷殘等屏不可懺又非對手滅法遮不至白衣家要須懺悔白衣非謝僧得了故草覆不滅亦須除之亦可重罪上諍草覆不滅故須除也作草覆懺者迭相辭謝自此已外並草覆除第四事諍以位別故須舉總問此以然從三諍原無別狀故總答言一切滅滅若更別問不殊前三隨種類所對故不勞別問又恐濫俱用故言隨所犯因辨諸部同異五分四諍一言諍二教誡諍三犯罪諍若比丘犯夷乃至惡説又若鬪諍相罵起身口意惡是名犯罪諍四事諍其次列藥現前為初乃至本言治為第七十律四諍一鬪諍事二無根事三犯罪事四常所行事祇律四諍一相言諍二誹謗三罪諍四常所行諍若辨藥病相對者五分言諍以二滅滅現前多人多人語行籌已若如法多用白二羯磨正滅教誡諍以四滅滅現前憶念不癡本言治本言治有二種可悔不可悔不可悔者應與作盡壽不可悔白四羯磨犯罪三滅滅現前自言草布地草布地者鬪諍此比丘胡跪白僧言大德僧聽我等共鬪諍相罵作身口意惡業復作是念我等共鬪諍相罵作身口意惡業今寧可於僧中除罪作草覆地悔過不今從僧乞草布地悔過如是三説已皆舒手腳伏向羯磨師一心聽受羯磨師唱言大德僧聽等白二正滅何謂草布地彼諸比丘不復説鬪原僧亦不更問事根本事諍者僧常所行事一切羯磨及諸有所作以此致諍故用七滅隨事滅十律鬪諍二滅滅現前及多覓無根諍四滅滅現前憶念不癡實覓犯罪諍三滅滅謂現前自言草布常所行諍以一切滅滅祇律相言諍用三滅滅現前多覓草布多覓草布中諍通道俗共滅不諍事唯道分滅滅自言覓罪相覓罪相與羯磨竟奪八事不得作常所行事者若僧所作事如法如律辨如法結集如法捨如法與如世尊弟子比丘衆所行之事皆於七滅諍正一一事滅相言諍中拘睒彌比丘先諍水有無蟲草淨不淨人有羞無羞等因諍是法非法乃至律非律先以多人論戒不止次以草布地滅此諍事若下坐有過失應詣上坐所頭面禮足言長老我所作非法侵犯過罪我今懺悔不復作上坐應以手摩頭扶起手抱語言慧命我亦有過於汝當見怒若是上坐有過應至下坐所捉手言我所作非法有過於汝我懺悔不復作下坐應起禮上坐如上懺悔佛告阿難此一切諍事如相打搏牽出房種類兩舌無根謗如是等皆應如草布地滅也此應草布滅諍似有罪不滅也明了論偈言了四羯磨及寂靜衣釋曰律中説羯磨依有四種一依諍羯磨二依善教羯磨三依罪失羯磨四依所作事羯磨此四依羯磨由七種依寂靜所滅一現前毗尼二憶念毗尼三不癡毗尼四隨誓言毗尼五罪惡毗尼六隨多毗尼七墮草毗尼由七依寂靜云何能滅四依羯磨若依諍羯磨此以於罪不同執為相為二依寂靜所滅謂由現前毗尼隨多毗尼若依善教羯磨此以問難為相為四依寂靜所滅謂由現前最惡憶念不癡等毗尼若依罪失羯磨起此以牽出事次第為相為三依寂靜所滅謂現前隨誓言墮草等毗尼若所作事羯磨起此以一切所作事羯磨為相如應道理為七依寂靜所滅廣説如律應知此文初列四諍次七藥次以藥對病也第三自言是非問餘六不問獨問自言者何答自餘毗尼是非俱明如草覆中除重罪等自言之中但舉其是憂波致疑為如法故不明其非為無非故所以不辨佛答非一切如法亦有非法於中分三先明非法自言二憂婆離已下明如法自言三時有比丘已下正明憂婆識自言得失亦可對餘比丘即出自言不成之事非法中分二先對不犯非法二憂婆離是中比丘犯已下對犯辨非法不犯中二初不作憶念作四十九句二作舉作憶念四十九句以對七聚各作頭有七故有七七以實不犯而自言犯故説非對犯分二初實犯不作舉不作憶念作四十二句次實犯作舉作憶念作四十二句亦對七聚雖可實犯以各引不相當故亦非法各作頭有六故成七六如法中有二七句皆實犯初七不作舉不作憶念反前各初四十二次七作舉作憶念反前各第二四十九四十二以其各引過狀相當故曰如法自言對憂婆離出自言不成之事如文可知
