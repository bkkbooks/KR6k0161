body:
  text: 與尼期同道行戒第二十七為別別緣有六一尼三衆相逢者不甄去異吉四除具釋上二可知者疑已下釋第三道界分齊若比丘下解女弱要馮丈夫以為伴授情過是微所犯吉五分從此聚落到彼聚落及無聚落處番句犯提與尼期同乘船戒第二十八譏過同前止以船為異別緣有六一是尼三衆共期三同乘一船除異船不犯此戒四作㥧流上下之意為度船失師濟不犯五無因緣甄命梵力勢所不得多論若船有多衣期無罪六隨境業多少犯爾處譏損非輕別船並去及期同乘船雙言者舉乘船之意與俗女同船亦犯此略不彰下房舍文共女人上言佛言聽直度知上下明亦同犯若准此義第一緣應言人女戒本五句一人二與尼共期但同道船行情各別趣故開不期坐無所為同處譏重故不假期三同船上下意四除直度者以直度非久故聖亦開五結罪辨相之中別解上三下兩合釋祇律十多並越界方犯不同此律食尼教化食戒第二十九有四種過故一者遣尼歎己德行相美求利長己貪結懷於正命知足心故二偏心曲歎現情親好招致外譏損處不輕三令施主隨言供養無德之人即是損惱主𨷂奉福田獲反報之益四毀呰好人令他施主於勝福田不生敬重又是總亂賢善具斯多過是故聖制別緣具四一是尼歎德教化食二知歎三受得四食之咽咽犯提不被歎者聽食無罪以其屏歎不對衆前無應呵不可之咎是故聽食不同提舍尼中對衆指授詳心容隱默不受呵舉衆情過咸犯可呵祇尼言某甲從衆多聞精進當須通請一切是讚若言衆主多聞為是比丘通請二十人一人是讚餘人非讚若有如是讚食時展轉相貿食不得持去若比坐不淨不喜貿者當念此鉢中是某甲許我食無罪所以不開病者俱但使不歎病與無病得食無罪何須開病若欲病者高德必毀呰好人猶是犯位何有病開所以不開別食七緣凡聖人制戒開則通其益遮則防其過彼施心欲令益彼故開諸緣此無施心歎而求索惱他招譏故不開七又未曾成足故不除餘食法開又開成損故緣起二初至龍已來毀歎求食起有漏過二居士已下呵滿足戒本六句一犯人二知三讚歎教化四得食五除開緣六結罪此六句中第五除緣略而不解一三四句別解彼比丘下合釋二六兩句文三一正釋犯提二外用犯輕三境想四句差降衣所以輕者財物利重情著難捨又是別屬理無通用勸捨義希致受不數是以犯輕食無獨食勸辨義易致受義數是故制重燈油外用歎勸亦希是以犯輕大僧歎歎尼義致受不數故尼犯輕與婦女期同道行戒第三十制意同前唯以俗女為異別緣具六一是人婦女二共期三同一道行四不離見聞處行五無難等緣六隨所越界分齊便化但使共期問第三人多少皆犯以非同法不類於尼開多伴行昔解開第三人者下文無故十云若與王夫人等期行不犯祇與母姊妹行息發去時呼言來勿不及伴犯提若言去勿伴無罪滿足戒本五句一犯人二同行之境三共期四同道行五結罪辨相具上五施一食過受戒第三十一篤信居士割捨家珍造立住處樹心一食俟他僧衆宜量其分稱總而受即彰內有廉節之心外不總施主今久正不去過受他食長貪總物敗善增惡過損不輕故所以制別緣具五一非親居士限施一食二知限一食三無病請住因緣受食五食則便犯別食七緣獨開病者然病人苦惱去則成損住則有益施主體知不生譏總是故聖開別衆食中開施主請與開六無損此戒一食後無施心若六緣開便成損惱故無餘六曾前一食更不聽食餘法不治故亦不除滿足戒本五句一施一食處二無病者反舉開緣三比丘犯人四應一食者食之分齊五若過下結犯辨相之中先解第三人次解初句一食處次食者已下解初句第四句中食謂時食除三藥輕故次病者已下順釋開緣次若無病比丘下解第五結犯所以食重衣輕答食資最急人喜過受又復受用體懷損惱施主故所以重施主故所以重施主造立福舍安襯身衣聽一夜受用不聽將去過受義希雖過受用衣體不壞猶屬施主損惱義微故所以輕燈油塗足油等雖體盡壞身外受用過受義希是故犯輕展轉食戒第三十二然篤信居士供辨美食延請衆僧怖存受用而今許而後違使他飲食徒設而已無供僧之益損惱施主其過非輕是以聖制受前請已復受後請互背彼此稱為展轉故曰展轉食戒別緣具五一先受前家五正食請二體清淨堪飽足三更異處受五正食請四無因緣謂除有病及施衣時捨請因緣不犯五隨食即犯以初二緣前請對第三後可為三對四句一前後俱正提中二差五次一俱不正下三背吉羅次足不足為四初前後俱足背犯提罪次三差互等並得吉羅次淨不淨為四俱淨前淨此二背提餘二背吉羅緣文二初至如法治在阿那頻頭食稠粥背請二爾時世尊已下在羅閲祇食五正背請前犯文二初因沙㝹請故聽食粥因緣二有少信大臣已下食稠粥背請前文中三初至啓尊已來明施粥緣二爾時世尊下聞聽食粥遂受三種藥粥一是時藥謂胡麻乳二七日藥謂蘇油三盡形受藥謂薑椒畢鉢佛歎食粥五利如文祇有十利如偈言持戒清淨人所奉等三時阿那已下諸居士等慶得修福第二背請起過中文三一舉二請以為犯緣文二初受前請謂是所背二時阿那已下送稠粥復受後請第二諸比丘先受下正明食稠粥犯三少信大臣下呵責於中文三初至莫𪫦發覺所由二少信嫌之已下呵以白佛讚歎說法別合悟道三以此因緣下呵責立制文言若書不合不得食若食如法治者若先無請及不更食全自無犯今言如法治者或先受請即犯背請或後更食但成足緣名種未揩欲以一文結前背足但言如治問受他請已請旦自食稠粥粥或中時不去白食己食或食僧食等犯背請不答應赴不赴但犯非小不犯背請以盡非是請故不名受後背前惱微小罪故五分云若食僧食私食不犯第二食五正背中文三一是犯緣謂前後二讚如上時諸比丘下正彰背請三爾時樂師已下呵呵中反三如上滿足戒本四句一人二展轉食三除開緣不犯四結罪時者已下誦前第三問戒本所以不言衣已竟等答除餘時者是以此文中先舉其犯後除不犯前長衣等者先除不犯以取犯時以其專不專不故所以語異亦可此等三戒時與施衣合故對下解便所以語異辨相中解第一可知二從展轉下釋第二從病者已下解第三從若今日下釋第四結罪輕重所以開病者病人苦惱若不開所宜形命難立又施主體知不譏惱故背無罪非情所欣十二月常開不局時限施衣開者有二義故一為益比丘有待之形假衣資養施則不受後須難得恐無理求多生患二者為利後家施主使衣食二施獲得兩種反報之福為斯二益故聖開許衣利既重或長貪結故以時開之罪非一切時故文言一月五月若復有餘施食及衣者前言一月五月是時捉時望衣食衣食是時家之餘單時無開要假施食及衣故言若復有餘施食及衣依十律若就時中前家食請作頭三句一前家食請後家衣食請德背無罪二前家食請後衣請取衣無犯還前家食若取衣已竟日不食違信吉羅三前家食請後亦食請背之犯提又若以前家衣食作頭有三句一前衣食請後亦依衣食請背之犯提又若以前家衣食作頭有三句一前衣食請後亦食衣請聽背無罪以其後衣成可多及腳好故二前衣食請後單衣請如前三前衣食請後食唯請犯依五分第三戒本言若比丘數數食除因緣波逸提因緣者病時依時施衣時准此即似施衣一切時開衣時者一月五月單時無衣亦開無背此不同彼時假衣食單時不開外亦無開亦可同彼細解至下別衆中釋問別食七中開二餘不開者何解言作衣行道船行大會彼以飲食難得施主請食比丘有益復不惱施主是以須開此中既有兩家請食便豐何容得因作衣等四開背取後便生貪結惱前主損而無益故此不開沙門施食彼戒為欲少益外道復無施主可惱由是聽許此中若開背佛弟子受沙門食者損佛弟子失利深重開成大損是以須禁餘食法者亦非對治次解第四文二先教捨請不犯二若比丘不捨前請已下正結背請先釋前文若得多請自受一請餘施與人無背請罪要須實捨即使前人有得食之益又念施主無徒設之惱此理應爾同五祇二律作念而捨方便開通得防背罪然前無實益饌猶塵陳五分阿難受長者食忘先受請垂食為憶言可攝食我先受請長者恨言云何受已中悔阿難馳往白佛言若有是緣應先心念施作是念我請分與某甲比丘然後可食因此遂解僧祇六念四門解釋一列數釋名作二念方法三辨對治所防四解妨難初門列名者比丘當知日數應施食知臘數憶所受持衣別衆病不病於此六法繫心不忘稱之為念念體無六隨緣有別於六生念第二門者第一念彼文言若人問今日幾不得逆問昨日是幾日當一日二日乃至十四日及十五日及月大小悉應知故須月大日大小日數心念口言之一說第二念比丘清且當作施食念今日得食施某甲某甲於我不計我當食三說第三念文言日日自憶若干臘數者念已受戒太歲所在日月時節夏臘分多少一說第四念文言當憶受持三衣及不受作淨者應念我三衣受持長則已說未說淨旨念當時說淨一說第五念不別衆食一說第六念文言若病不病作法應言有病念當療治或若無病之時冥念依衆行道一說第三門辨對治者謂正以作念法有對治然念所為有兩一為生行二為防𠎝言生行者念雖有六義令為二第一念者知月日大小為識說戒時節念遵修清淨行法既識戒相次須赴行行要分二初之三念明修自行次下二念成衆法行自行復兩二四兩念內外資緣節量之行治義雖同內異故須分二念第三一念若慢高在心法水不住正憶年臘離高慢行衆法行中初一揣食不乖修和合行又表法食無隔次明榮進趣道之行言防過者對於五篇准說可知第四門所以第二念偏須三說餘五但一解言第二念一防不作念吉二防背請逸提防二罪故所以須三餘之五念但防不作念吉本不防根本之罪𨷂此一義故但一說問第四念何以不作念竟防不說淨長波逸提解言衣本別屬不得即當說淨是以不防食味是通是以得防若爾別衆食亦是味通作念竟時應防別衆之提解若當聽者致今乖破為是不類上來作此防二罪故須三說者謂依祇說提吉合懺作念緣防亦除提吉故須三說又解不爾如第四念作念雖竟已外猶有根本可使根本之外別有不作念罪今第二念正防根本作念竟時無別根本何有猶不作念得提罪時根本之外別有不作念罪如似羯磨正防離宿若無法離宿犯尼薩時捨墮之外無別不作法罪此亦同彼又如六年說粗䨱藏處分說淨等二持犯者類亦皆然是第二防根本無別不作念罪問但防根本義容可爾所以須三者答防根本故根本提罪已起三悔今防未非故還須三餘之五念正防不作念故已起之罪一說責心今防未非故還一說若爾提寶掘地壞生同誦中若不言者是知是是等得吉羅者豈非根本之外別有不作法罪答不同此約目背故唯根本無別失法之罪捉寶等類並就教中人說故使別有失法之罪頗有作知淨語得目掘壞畜寶等以不故知非類既知三一所以若准祗時不問有請無請成須三說防提以彼名為處處食戒豈可一日全無食處但使標心定處背皆有罪故爾若此律十誦名背請戒復存後釋一三說者若也無請此第二念令不須如其有請或不作念或可一說三說也以對自起或可互背前後二請故爾所以獨防根本者以味通故餘義如前自下正解背請結罪旦如一日受十請若食最後犯一提八吉以其初一是前餘八是後若背後九得九羅若食中間比說可知伽論若受前請往至請家坐上未食若更有後家送食若食後家犯背請罪若先食前食已即坐上更食後家食不犯開文若請與非請處隨食不犯或食已更得食者受前家食已更受後家食或容犯足不犯背請或一處前食後食者謂一施主并設五正食雖有二施主一故亦無背罪或容犯足別衆食戒第三十三制不聽別衆食者有二義一慈愍白衣家故然揣食有限事難普周人劣易供多則傾竭生總損重利淺故所以制二為攝難調人故恐目結別衆羯磨以總衆僧為斯二義故制不聽同情別食次第二釋名義并解與別衆羯磨并同異相言別衆食者能別之人食處成衆以衆別他不共同味處得罪故曰別衆食所別之處豈可無衆然下律文別衆食者謂四人若過故知就能受名以所別中一人亦犯若就所名衆者濫別犯故五分若於衆中別請四人已上是名別請衆食尼如是若始受別請衆食既往而分受異請不復成衆不犯言其破僧約就所者以彼三人不犯故爾次辨同異有七不同一諍名不同所以別衆食中不言別僧破羯磨僧中不言破答人雖有四不秉法故但言別衆破僧彼此並有四人俱秉衆法故與僧名若互名者此彼各濫若此名僧謂待康法若彼名衆謂不秉法犯是以伽論此衆四人作羯磨時所別之處乃至百千但不秉法皆名別衆不名破僧故知不秉法者但得名衆即是僧名是局衆名是通若爾僧伽西音此方名衆何得西音即局漢名是通故知不爾今解僧之與衆梵漢之別名彼此互彰斯皆無妨此舉名彼從梵本細解如破僧違諫中說二能別不同別食能別要四人已上是犯位三人不犯文言但請三人故所以爾者四人已下上有其兩過一揣食有限事難普周人少易供多則叵濟恐惱施主故制四犯二來四人已上同情別食恐合計興謀破僧事起為遮此二是以制犯三人已下無上二損故聽無過法食無限理宜詳遵多則轉妙故能別處不限人之多少但使作法皆應盡集別則成犯三所別不同多論食難得處所別四人已上開使不犯以食無倍供故若別三人已下犯以容兼濟故若食易所別之處莫問多少能迷犯別若依此律村落既小食復難得彼此限局各不相通所別之處不問多少悉開不犯法則不爾所別之處始於一人乃至百千斯皆是犯以法食無限理宜詳遵唯多為妙為是成犯第四得罪不同又復食中別若食若不食或食正非正能別之處一品提罪法中不問多少但不秉法能唯犯吉設秉對手亦但吉羅四人已上秉正衆法方妨破蘭為以食是事資即惱情重故一切犯提法就正非正別所以階降又復此二能所各定不定可以思知五約時不同如別衆食時中成別故立具緣言須在時中法則不爾謂取秉法以辨時故下文言同一界內作羯磨時有不來者六就處不同食中當時以無即秉法故自然作法二處俱成法中能別三人已上亦同於食四人已上其唯作法但除結界七開緣有異食開僧次以是人不定故表無同情又兼益施主故須僧次但食資食方成益故無與欲設若與欲猶望僧無福既無僧次不免同情故無欲開法食無限多則轉妙何有難濟開僧次法若當差往不免乖別理須盡集故無僧次如七百結集中簡衆取欲亦非僧次也法食理資遙心表和此彼和此彼獲益故開與欲次解具緣通緣如上別緣有七一有施主二別請別乞三五正食體清淨在時中四食處成衆五知界內不盡集六無因緣七食便犯先釋初緣所以須有施主者甄去四方僧食無別衆罪故爾多論若遮護僧食犯盜僧祇罪故報恩經知事人與容惜食九十億劫生屎尿之中其形似人多手足若現前僧各自出食共一處食雖別他不與不犯別衆以各自食己食故言施主者論釋不同善見一解要是俗人作施主有別衆罪以其在家白衣儲畜食具容有別請受心供養恐人多難濟損惱施主為是聖制不聽別衆是以律言慈愍白衣家故出家之士少欲自居乞食濟己何有別請作施主之義明知出家施主不犯故論言沙門施食不犯者或同法沙門或外道沙門若依多論道俗施主皆犯別衆故論言一比丘出食三人無食共一處食餘三人犯提食主無犯以自食食無所惱損故又此律言沙門施食者在此沙門釋子外諸出家者及從外道出家者是故知內道沙門亦是犯限前言慈愍白衣者且就俗說次第二緣雖有施主若僧次請者情無簡別本自無過是故須明別請別乞但僧次請有二真言僧次請者可知或復若言次第上坐若干人亦是僧次所攝以人不定故如五分說上頭無人即是上坐故知不定別請亦兩一若標名以請故宜別請二以法取人亦是別請如或言禪師十人即不攝法師律師即有甄簡之異明非僧次故律鹿子母白佛及別請五百羅漢明日食佛默然受請阿難明日與佛請食分庶子母先喚阿難入舍已閇門往日時到五百時人各以神力乃至坐上出者然後行食阿難先自食已方送佛食分到已授食阿難白佛言今日庶子母別請五百羅漢食佛知故問僧中請一比丘不答曰無佛言庶子母別請五百羅漢食佛知故問僧中請一比丘一答曰無佛言庶子母無智不善不僧中請一人佛語阿難若僧中請一人者因是後身大功德得大果報得大利益佛語阿難若僧中請一人得大福德勝別請五百羅漢其福甚少准斯文說故知以法請人明非僧次假雖別請若界內有僧次者亦是不犯故多論云若大界內有檀越別請四人與食不請界內僧不送一分食與雖界外僧次來猶犯別衆要請界內僧次一人或送一分食不犯若去寺道遠不得送此一分食者應即取此一分食次第行食即是僧次食亦表無過既言要須界內僧次是中別請僧次相對四句料簡或前僧次後當處遮約即成別請或前後俱別此二犯提或前別請當處無遮後成僧次或復前後俱是僧次此二無犯若比丘於其食處有餘比丘教化勿遮若不能不遮應教施主次第唱臘而入乃至一人入已餘者縱遮皆無別過若長時請食於初月唱已乃至九十日供養皆不須唱若初日不唱須日日唱方無別罪若聚落中先無僧寺有施主別請四人與食應打揵推表無情乖不問男裏比丘有無一切無過也言別乞者或四人一時乞或令別乞各不相知而同一主但使食處衆滿而共食者犯別衆故律文言調達別將四人通己為五家家乞食佛即呵制為二事利故多論云若四人各自乞食於一處食亦無別罪若唯見論四句中初及第四是犯可爾第二句各去一時受食各處食犯以受食一時故此義稍難豈可受食時犯不約咽業故此兩筒四句義不須論次第三緣若非正食無有充軀長道之義故須五正食是以文言食者飯赴等問正食犯者者法別衆中亦可衆法方犯別衆答法中無僧即對手等法豈可無僧不成衆時唯食非正故非類也若食不淨不合與諸比丘同味不犯別衆須言清淨若爾非法羯磨不合同遵應不犯別衆答非法詳聚容可翻非為如故制有別衆食已不淨設往不能回令作淨往而無益是以不犯故如文言非法別衆若爾何故觸惱戒不與欲戒開中若非法羯磨喚來不來及否與欲不犯答彼是事非如破僧損減等故所以開此言非法謂是七非故亦有別也食雖是淨若在非時亦無同味假別無𠎝故在時中也食雖五正若食處非衆亦自無罪故須第四緣食處成衆謂同類好比丘四人已上一時受食有異計義方犯別衆故多論云三比丘一尼三比丘一沙彌三比丘一柱心三比丘一滅擯三在地一在空三界內一在界外尼等狂擯不落僧數在空界外復是異界不相足數並悉不犯又善見云若四人中一人覆鉢不食亦不成犯是故要須是同類好比丘同界內一處食方是食處成衆簡上異類一人䨱鉢等是中多論四句一食主一盡集一處食大善無過二食一處異彼此雖別以食味同故亦是不犯若界內更有餘人二衆俱犯三食別處一如僧盡集一處未食僧食有一施主就坐上次第別請四比丘與食此四比丘犯別以有僧食可食不落大落大衆開緣四食別處別彼此二衆若不互請一人及送一分食此彼俱犯食雖成衆若界內集亦自無罪故須第五界內不盡集多論界有二種謂自然復二謂蘭若拘盧舍聚落自然方七十三少半此等自然及布薩界內若別一人不盡集作有比丘想犯提疑心輕無想不犯若別狂擯及以沙彌不集無罪第六第七至文中解𨷂緣比說滿足戒本四句一人二別衆食三除開緣四結犯下言餘時者誦前第三不屬第四釋開緣中六門分別一定開緣及釋名二長短三共別四寬狹五相攝強弱六對餘同異先解初門釋名對文說言定緣者此開緣中病及下四此還為五作衣施此二義含作衣時者謂一月五月為作衣故求食作衣事恐難成佛開別請衆食言衣時者一月五月福饒時故即得別食施衣者泛爾施食并施食者亦聽別衆即可為三謂作衣一直衣時二施衣時三通及前五八種開緣問所以知者答五分數數食戒第一隨開除病故文若比丘數數食除因緣波逸提因緣者謂病時第二時世尊聽諸比丘受迦絺衣不犯五事諸比丘念為是衣時不犯數數食衣竟亦不犯取白佛佛言衣時不犯過衣時犯若比丘數數食除因緣波逸提因緣者謂病時衣時第三有諸白衣知比丘不得數食念言我當方便為諸比丘作衣來受并得供養即便作衣往請比丘比丘言我不得食但與我衣白衣言若食我食乃當與比丘念言佛聽我以施衣故數數食者可不乏衣白佛佛言聽為施衣數數食應如是說若比丘數數食除因緣者病時衣時次至別衆食戒牒制隨開中第一除病次言衣時施時如數數戒說次作衣等開未下滿足戒本言因緣者病時衣時施衣時作衣時行路時船上行時大會時沙門施食時具列此八今此律中總言施衣時下廣解中施衣時者一月五月及餘所施食及衣類彼五分亦可為八二長短者分二病及施衣道行等四合有六開病及道行等五以前緣為時緣既無准豈得定時婉十二月有則便開施衣一種雖情所貪以衣利重故一益施主得二反報亦利比丘施時不受後須難得恐無理求索妨廢修道隨施聽受故亦時長衣一間受利時定故限一月五月不問有衣無衣雖別不犯作衣時一亦唯一月五月故律文自恐已迦提月中作衣恐比丘不得食疲苦故請比丘佛言聽受文中不言及餘時作衣故不通問直就時中自得別衆何須言作衣耶一解文言乃至衣上作馬齒一縫故言作衣又可是作衣月中此舉受衣時無竟本計長時故極至一月五月受時最少下至作一繼衣亦是時富饒故曰乃至一繼第三共別者施衣大衆沙門此三共有施衣沙門以據前境又復相假為大衆故此三開但有必共餘五不定非無共義四寬狹者以斯八開對於僧次僧次緣寬益自他故又福利施主故餘但開緣無僧田益故所以狹八自相望前三共緣不辨益及自他以共有故餘五俱狹但能自益不能潤他故下文言無緣者白出以餘有緣不益我故五相攝強弱若在施衣大衆沙門此三開中假有餘開但大衆等三緣中攝以其不以餘緣故開以無餘緣亦不犯故餘五相望縱令離緣人食各自緣攝或同可知六同異者七八局此水陸兩行通於洗浴有同不同衣時等三通在德衣利戒病緣少寬然有差別隨前所說次對戒本唋釋開意病人苦惱若不開者無以存濟又無異計惱僧之義是以開許作衣久延恐廢正業故施衣者益及道俗故真言衣時一月五月是受利時故道行船行此二多對又復食難求故大衆集者衆多難濟故所以開沙門施食者為少益外道故問如外道請等無意如何乃言為益外道聽別請食益此文不了如五分瓶沙王第名曰迦留事一種道而年年普誦九十六種沙門作一大會釋子不受別請衆食而力不能廣及衆僧以是𨷂無佛道沙門愁憂不樂念言云何致沙門釋子唯當委王然後可果便以皇皇以第意白佛佛因遂開沙門會時受別請衆食此以准餘並是不盡故言但請三人明有所別又有人言請者作別請之心受者作別之意四人食犯不假所別者深違經論上來病等五個別緣但能自益不能潤他若及他者令三人不犯所以無緣者白出若爾者何故見論病人足四一切不犯解彼言病人不謂癡狂等病以足四一切無過此中病者輕故自益不能及他彼論五種足四不犯一不請二乞食三沙彌四鉢盂五病人故知彼病不同此輕下辨相中前二可知病者已下釋第三開緣餘如前大衆集者五分諸佛常法歲二大會春未月夏未月諸方問訊以衆多故次請甚踈乞求難得比丘念言若佛聽我等大會時受別請衆食者不致此苦白佛遂開但大衆集者解有二義一大衆者謂八人已上名為大衆食無信供又是難得開使不犯七人已下名為小衆食雖難得容有兼濟故亦不開是以律文將開大衆集時不犯反解小衆是犯故言食足四人長一人為患以不開故由此一人令他四人得罪名之為患又更一解大衆者四人已上名為大衆故下尼律不白大衆令知廣解文言大衆者謂四人若過以斯文證故知四人已上名為大衆又復此文大衆集時者食足四人長一人為患此是兩家聚落東家限與四人食西家限與一人彼此二家施心限局各不相融餘處乞食復是難得若不開者西家一人與東家四人作患由是患故開使不犯此謂舉患以開不患如是乃至百人長一人為患者但使食難得悉開不犯是名大衆集時次解第四結罪文二初先教比丘食之方軌二若比丘下違而結犯前文四句初四一對初句無緣聽白出第四有緣聽白入中二一對人少隨意食人多分衆食初四白入出者謂有緣無緣雜釋疑白入出初句無緣須白出者彰餘非僧次但是有緣故食不能益我故須白而出外人無緣不得入此遣衆外疑故爾第四句有緣須白入者為顯我非僧次但是有緣故食不能益他若其無緣者須出去此除衆內疑此二白入出者謂對餘五說不論三共緣白入出也中二句者初句衆少隨意食次句分二衆食此兩純無緣無疑可釋故不須白入出但使衆不成故聽隨意不明純有緣者謂三共緣及餘五有共義等此亦不須白第二違教結罪一結別衆提問別衆食何不計境多少而言咽咽從業者何答佛本制意為慈愍白衣恐惱衆僧制不聽別不是專為損於所別何須偏約所別隨境結罪又假衆方犯貪心故食但隨業得罪問所以但結緣不白不結無緣不白耶一解得食不得食別故爾亦可文略取歸婦價客道糧過三鉢戒三十四然歸婦價客捨己塗糧施諸比丘理宜將護依限而取今乃過取三鉢令食磬竭長貪違教損惱不輕故以制別緣具五一歸婦食價客道糧二知是三無因緣除有病緣不犯四取過三鉢多論若上鉢取一鉢無罪取二鉢犯中鉢取二不犯三則便犯下鉢取三不犯四鉢方犯文言過三鉢者謂就下鉢為言若一人取一鉢前三人不犯以不過限故後一人犯以前三語莫持來而故往取過在後人又復過三是以後犯五出門便犯就緣二人二初取歸婦食起有漏過伽若乖此名瞎眼十名睞眼如五分不復須汝瞎女祇中此女端正恐王強取我當為作不吉之名王果欲取以名不吉遂適餘人二波羅捺下取價客食犯滿足戒本三句一犯人二至白衣已下開受分齊食之方軌文三初施塗糧二若比丘下教受分齊所以開齊三者為令施主獲反報之福亦令比丘資長道三還僧伽灆下教食方法第三若比丘無病已下正明過取違教結犯反上第二開受等文此出門犯不分小罪文不了故所以別衆八緣但開病者病人苦惱若不開者無以齊命又施主體知不生譏惱故所以開餘緣若開或有損惱既出門犯何假殘法辨相具解第一可第二白衣已下乃至三鉢來正釋第二教受分齊食之法於中文三一解白衣家與食二病者戒本文略不解今此解前除病三若比丘下合解開受方法食之儀軌文中食及持來告知等文四可知第三若比丘下解戒本第三結犯輕重四文一提三吉五分過受及不分比丘食俱犯提罪祗中亦爾又言若女及僧客去後不犯足食戒第三十五凡食以充軀為用過則長貪少復不足事須節量但四大身力報有強弱致聖將補有四種之差始於一揣終至作餘食法咸是節量隨根之法令第四人不作殘法再食五正長貪妨道違教𠎝深故所以制別緣具五一是足食二足食想三捨威儀四無因緣除有病及作殘法因緣不犯五更食隨咽犯提緣中有二初至得便食之下明不作餘法起過第二呵責前文復二初至法食開作餘法二舍衛已下不作起犯初文有四為上行人說一食法二時諸病比丘雖得已下病人苦惱開聽午前數食無罪三時諸病比丘若得已下病人殘食體是可惡不須更作餘法聽食無罪四聽食已下正明非病人殘是其淨食作餘法而食初文有三一說一食法二時比丘聞已下說一坐上飽滿了前一食之制三諸比丘下了前第飽滿之教初說言一食法者謂對上行說一食法嘆譽一食法者嘆一食功能省緣知足亦可嘆彼能行依此聖教成知足行第二文四一依前聖教服不當法致身損瘦二時世尊下慈悲撿問三阿難已下具以啓和四佛告已下了前一食故曰於一坐上食飽滿第三文四一雖依飽滿通正非正故猶損瘦下問等可知即是了前飽滿故曰於五種食一一令飽滿第二開病文四如第三亦四第四開作餘法因制一食故棄餘聖者為益施主比丘無損故開殘法於中文兩初僧食作殘法二復有長老下因乞食餘謂檀越衣作殘食法此二文中各四可知昔解凡作餘食法應先淨人邊手受食已對未足食比丘作之列祇要具五法方成謂五不離如彼文說有五非法不名作殘食法一離處比丘行時與敢住坐臥說殘法是不名作殘法餘三威儀亦多論若比丘行洗口時有檀越與五種食比丘應食應行受殘食法不應住坐臥若住坐臥當知壞威儀不名受若以此為受食者提二離食不與噉作殘法便說與是名不如法三離境界者放地作殘法非手中不名作殘法四離申手申手外作殘非申手內不名殘法五離說口不作是言我手中鉢中食我一切不須是殘食是不名殘食法中先辨非法欲使識非有五如法作殘注謂反上離以為五一不離處謂此處受食還此處受食還此處作法與二不離食謂少許食食之三不離境界謂自手捉食與他四不離申手謂申手內作成五不離說謂語言大德我已足食已知是者是彼人食已復言我已食手中鉢中一切不須作殘法成上來法者但是儀式然猶未具若准此律要具四如方成殘法一人如法人有其兩一能作人有三謂是比丘除餘衆又五處足又身無病反此名非名非法二所對人謂是比丘非餘衆又未成五處足故文言足食已為作餘法不成吉羅此等五者是人如法二時如法謂豐非儉儉開無足故又是時中除非時非時不令更食令前得罪自己𠎝有故三食如法一謂時食前二五是除奢耶尼苦酢辛鹹等二是新食除病人殘三是清淨食非殘觸見聞疑等多論殘宿惡捉不淨潔不名受殘食法四威儀如法又有二義一能對威儀一須併手受二顯露謂不好䨱好不成故三自手捉非遣淨人及置地四由手內五說謂言我已足食已長老看是知我是作餘食法若反上說不成能對威儀二所對具六一不離處食三不離境界謂自手捉四不離申手謂須申手內五不離說謂須言我止汝取食之六還本食主謂非盡持去具是等法名成餘法若一一互𨷂或得失法不免提罪或但失法無根本之𠎝唯說可知所以足及勸足有餘食法開餘之十二戒不開餘食法何答此之二戒曾前成足貪心更食須作殘法息彼貪情是其對治藥病相當此二有開自餘十二謂讚嘆二食背請別衆過三鉢索美藥請非時殘宿不受飲酒飲蟲水前之七戒除過三鉢餘之六戒未曾成足一往即犯非彼對治故不須開非時等五亦未成足又是非時等過體不清淨若開餘法令前得罪已自招殃非對故無取過三鉢出門即犯餘法非治別衆八緣所以開病餘亦無者別衆食中未曾成足故以七緣開之使充軀進業此或曾前已足堪得一日資身長道若以七緣等開令更轉增貪心非對治故次第二起過文言不知足食不足食者不知何是正食成足何者非正食不成足亦復不知具幾因緣作餘食法成𨷂幾不成故言不知餘不餘戒本三句一人二正明曾前成足三不作餘食法下違開結犯第二句食竟者謂食私己食僧食五處成足或時受請者謂食檀一越食五處戒足此二足竟皆須除法若不作犯提非謂作餘食法開無背請下辨相中文二初至波逸提略解戒本三句犯相二尊者憂彼下廣解戒本三句成犯之相下文比丘知行時豈可不是解第一若比丘句故廣釋三略中初句可知食者已下解第二句足食已捨威儀下釋第三就釋第二但解食竟即是同釋受請於食竟中文三一食者解食字二於五種食中已下釋竟字三有五種足已下辨成足之緣食五者見論謂粳米穄米粟麥等作粥初出釜時盡不能合者飯所攝日𭨃合燥名為乾飯若豆作乾非正食收餘粟等是正食攝魚之與肉將作粥若相現如芥子大名為正食以容命得故不同米粥要書不合此五資強名五正食次解竟者於五種食中若食一一合飽足飽足有兩一飽足足謂自恣足二境界足若前境食多堪得足我一日充軀雖食一口捨威儀竟亦名飽足故觸總開文若不作餘食法不起不犯故知境多亦是其足次解足緣有五一知是飯者善知五正食犯足非正食不犯足二如持來者一解知彼持來若多成足少不成足故曰知持來又解謂他將來時自心了知飯作飯想名知持來三知遮者五正食聖教所制一日不得二時飽食故曰知遮即知前坐食多堪飽障於日中少食不彰故曰知遮祇中八遮自恣足一義可得同此餘不須護𨷂而不論四知威儀者行住坐臥等五知捨威儀者制行至住等故曰捨威儀亦言足者具向五處即成足緣遂遮於後第三結犯即是成犯緣言足食已即上二緣足食足食想二捨威儀三不作餘法四食之咽咽犯五自下廣釋略相難知故於中文二初明五處足食成犯之相二從足食已為他已下正解作法成以不成輕重之相前又復二初至亦如是正明五處足竟捨威儀已食五正犯二往𨷂尼食已下先食五正五處足已食往闍尼前文復二初約行威儀廣辨其相二餘三略說初文有一憂波請問所以問者以上略中但言知威儀知捨威儀未了其相故寄行威儀以問成足二佛告下總以酬答有五處足食所言處者即上知是飯等成足之所稱之為處三云何一句重以徵問四憂波離下廣彰其相五憂波離是為下結就第四廣中約五正食即可為五初飯作頭有兩句初食飯五處成足竟捨行威儀更食犯還解上三言比丘者是人次知行時下舉五處足即第二食竟次足食已下即解結罪成犯緣一句既爾餘皆類然二於一坐上雜食餘四五處足已捨威儀更食犯下四食各爾即是五對十句餘三威儀亦各有十即四十句以彰犯相其理亦足然有人釋舉飯作須有十六句單食飯一以餘四食一一和飯作四句又以餘四二二來和為六二二來和為三以四辨和為一下以佉闍尼和為一合十六句餘四各爾合成八十餘三威儀亦各八十合三百二十句容可如此今且依初說二佉闍尼以彰犯中九佉闍尼細未磨謂麵等是十云磨稻大麥等所以須明者此佉闍尼未食五正不成足隨意食無罪若曾食五正成足捨威儀已更欲食者亦是犯位油蜜等與時食雜故須作餘法若獨食者是非時藥故隨無過所以知者如檀行十事中和問言云何和答謂足食已捨威儀以蘇蜜油生蘇石蜜和酪一處得食不離波多言不得問言何處制答舍衛國不作餘食法中制波指此文故知此中須作餘法是雜時故若此非雜如何制波而有人言此油蜜等若加口法得七日服若無口法直爾服者但得時服是以此文不作餘法提者此義非若此非雜所以和指同於此第二輕重文二初至吉羅作法成不二足足食食想下境想重輕前中八句對別有四初二愚闍相對次二恭慢次二道俗次二慳貪相對若成不成分但可為二第六在淨人前對大比丘作餘食法成而有罪以不應對俗故得小罪餘七不成有罪以失法故吉不成故提下境想四句就正食上作二句心境相當情過故提第二句且起食時實是稠粥而心疑於中食上更食小罪以心輕故所以無第三足食非足想者一解情迷無罪故即下開文食作非食不犯又可亦有轉想如前心作正食想臨食時轉作非食想吉羅略故不彰第三句實是薄粥非正食徑時稠故作正食想於中食上更犯食以罪從心生故犯小罪實非正食故不犯提第四句於非食生疑為異多論尼足食犯小罪與比丘異所以爾者以無餘食法開故所以輕此文亦輕五分不作殘食法口口提尼亦如是觀足戒亦云尼亦如是問尼既同犯所以吉羅答以離合不同故結小罪以彰別義不犯中食作非食想如旦食稠粥決作薄粥想中食上不受作餘食法不犯開前足食想疑二句無犯非食不作餘食法者開非足食足食想二句亦可食作非食想者如旦食稠粥決作出釜時薄粥想或可中飢不堪耐謂前不足故言不受者明一向不食故作餘食法者作餘法故非食不作餘法者謂前食薄粥故自手取作餘食法開前第五使淨人持食句若置地作餘法此脫不字反前置地者二人風病不得捉食故聽置地作餘法即是開前置地彼無病故是以不成作餘法乃至手乃處總開不離境界等五具故成就總反七不成若與他反前第三自捉他與己反前第八盡持去一一別開中但略反四餘四句無勸足食戒第三十六制意有三一不聽勸意二解同犯意三釋合離意所以不聽勸他足者出家之人理須益物迎相匠導勸修衆善今乃惡心勸彼令他得罪己自招𠎝人我俱損理所不應故所以制次同犯意者問食有數戒所以此戒勸同犯者答良由此戒有餘食法開容可不犯今不犯今不作法惡心勸他令他喜為又復情俠隱沒其事同彼不周䨱相令犯欺內過重所以同犯餘無開緣人不喜為故所以輕如尼無餘法勸人則輕故此亦爾若爾勸人不受亦有受法開緣人之喜為勸應同犯何故得輕答勸足容不犯是故即同犯以違制及開故不受無不犯故勸不同犯若爾受法豈非是開緣答若受非不受自有是勸而不犯勸故使不類若爾漏心衣食亦是無不犯何以同犯答彼就言中謗佛擊㓨必受是以同但同犯之義流類大多趣約一義不須互決次離合意同所以足及勸足離為二者多義差珠一起業不同謂足食貪心起勸足瞋心生二業具有異足食口止共身犯勸足口止作業假他身三開緣別足食病緣開勸足則無四食不異足食要食犯勸足自身不食犯有斯別狀不得合別緣具五一他足食竟二知食三惡心勸彼欲合他犯四不作餘法五前人食犯緣起文二初至食之勸足起過二從珍食已下呵滿足戒本四句一能勸犯人二知三明他食二種食成足己意四不作餘法已下勸足結罪以是因緣者結能勸者意欲使他犯故非餘者謂非不犯及供養意等下釋中一三別解二四合釋文兩第一舉八句輕重初句情重二俱二俱犯提下七並吉以前人不犯故是以能輕第二境想四句輕重初重三輕尼無餘法勸他義稀人受不數假令有者何須重制故犯吉羅下開中略不反前與病人餘句悉反非時食戒第三十七凡食無時節數則致患事須限約軌剋合定是以始從平旦寅終至日午順應法名之為時過則非宜長貪妨道招世機過事不應法廣生罪纍名為非時故所以制多有四義一始從日出乃至日中其時轉盛名之為時聽食無過從中後乃至後夜分其時滅沒故曰非時二從旦至中是作食時節乞不生惱是名為時從中至後夜分俗人宴會遊戲入村乞食多所觸惱故名非時三從旦至中俗人種種事務淫惱不發乞不生謗故名為時從中已後事務休息淫戲言入村乞食或被誹謗受諸惱辱故名非時四從旦至中是食乞時為濟身修道事順應法故名為時從中已後宜應修道端坐經禪非是行來乞食時節故名非時又依毗羅王昧經旦天食時中法食時午後畜食時夜鬼食時出家之人同於天法二食名之為時過午已去非上二食時節名為非時故曰非時食戒十律過日中至地了是別緣有四一非時二非時想三時食四食便化緣中跋難陀觀看伎樂非時噉食逼暮方還迦留陀夷夜巡家乞驚恐主人以彰起過戒本四句一人二非時三食四結罪辨相具解初句可知總決釋下三句文二初對時食以解三次非時過非時下對餘三藥以釋下三此謂約二受以分故亦可為三一約時時以解非時二次兩藥失受以解非時三盡形已下無病緣以解非時以病為時故或可為四謂約四藥即為四文以下三此之三釋並通殘宿不受俱用斯等三法消文迷背有理今且存第二分三為勝一就時藥解三者一解非時先反解時却而順釋二食者已下辨第三食謂上二五是三若比丘下解結罪第二約失受以解三句者謂八種將水徑明相已失於二受過開時分即是非時七日亦爾第三盡形壽藥無過時故不得約失受解直以無緣名為非時次境想五句五分想疑俱提開文麥今皮不破漉汁飲之五分病人不及食腹中空悶聽以塗身故不差麵塗身猶故不差蘇和塗又不差以湯洗若不差瓫盛肉汁坐中如是等足以至曉一切不得過食唯中見出還咽不犯者開非時中咽咽不犯殘宿食戒第三十八凡飲食繁穢近則長貪合人不節又體現交盡義無儲畜故宜別處理無共宿是故聖制別緣有三一是殘宿食二知是殘三食即犯今日所食是昨日之餘日殘徑夜日宿五分殘者已受之食留之徑宿十律舉宿者大比丘今日手所受食舉至明日也是中四句一是殘是宿得一提內宿惡觸二吉二殘而非宿謂以此餘食置界外不共宿無內宿有餘二罪三宿非殘但犯吉羅四非殘非宿謂清淨食二知是殘宿食便犯祇不待徑宿但一日夜有三十須臾但中後停食徑須臾即犯故彼言停食食戒本三句一人二殘宿三食結犯辨相先總解初句次合釋下兩其文亦三一時食成殘以解下二言宿食者已下至及肉解第二句且列二五應有奢耶尼文略次解結罪次二藥失受以釋殘三盡形藥但結無緣罪下境想四句十云道行食難得聽自持糧與他博聽噉祇淨洗鉢已不聽以手及物摩拭比丘食當護淨手若摩頂捉三衣一切雜物泥洹僧等更以水洗十律沙彌持不淨鉢與師師白佛佛言若無急事不應使持鉢若使持應從受伽論若鉢缺食餘著器極用意三洗膩時用食不犯不受食戒第三十九所以制者多論五義故制一為斷盜竊因緣故二為作證明故從非人受食得成受不成受不成證明謂在曠野無人之所為是開聽若在人中非畜無知小兒悉不成受三為止誹謗故四為成少欲知足故五為坐他信敬心故為令外道得益故爾別緣具四一是食二不受三知不受四食即犯滿足戒本五句一人二明不受三食體四除水等五食而結罪辨相先總解初句可知二不受者已下解下四句文三一就時藥解下四句上二別解下兩合釋別解中先不受文兩初正解不受二受者已下反解二五受法顯前不受凡受食法舉器離處一切受意成受不爾不成置地者開次佉闍尼已下解第三食體具列三五食體祇云水濁者須受性黃者飲無罪雪雹亦受若無淨人聽食五分若水性醎不著聽不受飲次若比丘已下合釋四五兩句第二約下二藥失受以彰不受第三盡形下結無緣罪次境想四句五分為人作食得嘗但不得咽戒本云若比丘不受食著口中除嘗食揚枝水波逸提索美食戒第四十出家之士特宜廉潔今耽著美味求索好食長己貪結惱亂施主招世譏過所以須制別緣具五一是美食二隨非親居士乞三自為己乞四無因緣五食即便犯滿足戒本四句一出四種美食二若比丘出能犯人三如是美下無病四自為己索而結犯辨相中先解第二能犯人食者已下却解初句病者已下反解第三句若比丘下正釋第四結犯尼所以吉者尼是女弱求索美食女人所諱為之義希故犯可呵此云吉羅結方便罪大僧大夫身報力強喜乞美食取資身之益數故得重與外道食戒第四十一與外道食有三種過一異學情反恆懷疏外難與理親雖夏惠施不荷其恩反生譏謗二耶見乖宗非真福田今以施主之食授與外道損他施主不得勝田獲反報之福三躬自持食授與外道容生或倒謂外道是勝比丘不如以斯多過故制不許別緣具六一是出家外道甄去在家外道白衣犯輕故爾所以然者出家名同真僞難分容生惑故制得重在家白衣道俗位別不生人或所以犯輕二知是出家外道三非親理甄去與父母外道恩重故聽四是食甄去衣犯小罪食味大錯是是與之義數故制以重衣本別屬情著難捨與希故輕五自手與除置地遣人與不犯以食味通理無獨食又不生惑倒開使不犯六彼領受即犯五分持己食分一揣別著使自取不得持僧食與若乞兒㺃鳥等應量己多少然後減與不得持分外與就緣中明與外道女食起過次與外道男犯所以不呵者以無情過故𨷂無呵滿足戒本四句一人二外道男女三自手與食四結罪辨相具解可知尼亦犯提但是犯同緣異戒故結方便吉羅先受請前食後食至他家戒四十二三過故制一凡俗里多務為善事難惙其家業專崇福會已許受請行詣他家脫若事差惱處不輕二既有食處宜息緣修道無事遊散妨廢所習三共衆受請背入聚落令他施主見僧不集竟不設食稽留大衆使不得飽滿惱衆殊深以斯過故是以聖禁別緣具五一先受受他請二不屬授三向白衣家除向僧伽藍不犯故爾四無因緣除病作衣施衣等緣不犯五入門便犯戒本有三一略結前食二次明隨隨有二種初一牒制隨結謂制後食次有四文牒制隨開一開囑授大有請處已有請故又可大有餘事請喚故聽囑授次開病次開作衣次開施衣三滿足戒本五句一正明是比丘先受他請二食前食後至他家三不囑授四除開緣五結犯餘時者已下誦前第四辨相具釋第一可知前食者下解第二餘比丘者下解第三囑授要囑界內同受請者容有不見義不同非時得展轉相白病者已下釋第四開緣一病二作衣三衣時與施衣合若衣時一月五月即是時開除此已餘時勸化等者謂非時分施衣故開已如別衆食戒說即是互開謂通前囑授故若施主先自有心辨食施衣請我者得輒去若本無心比丘先住其家勸化作食并施衣者以利多益重故亦聽轉去故曰勸化等若比丘不解第五文二初失囑分齊一中還失二更詣餘家失三更往庫藏處等一庫藏二聚落三邊房邊房者即界內邊遠零尼之所四往尼寺失五出本白衣家失此是中前時促存護衆僧故隨白處直去更餘徑過即失囑授不同非時入聚落時長僧無交惱故作白已雖徑餘處不失以波文無失故亦可同此也二若比丘下結犯衆多家敷坐具者謂衆多家共成一會各敷坐待僧隨至何家皆是請處是故不犯食家中有寶強安坐戒第四十三凡在家俗人婚會無時久坐不去妨彼耶心遂相逼適厈理非所宜又復出家離穢愛染之所事須防違容自懷心行水涉醜故所以制別緣有四一是食家甄去斷淫欲家及二俱受齊不犯十律若斷淫欲若俱受齊不犯若互二句去但不受文提五分若夫婦受八戒不犯二夫婦常所居屏處三無第四人四申手不及戶處坐便犯戒本三句一人二食家有寶三強坐結犯十律隨起隨坐隨爾所提辨相易知與俗女屏處坐戒四十四制意同前唯以無第三人為異緣成犯一是俗女二屏處三無第三人四申手不及戶處坐戒本四句一人二食家有寶三屏處四結犯與俗女露坐戒第四十五制意同前四緣成犯一是俗女二是露處三無第三人此是離見聞屏而非重物鄣故稱露故與前戒並開第三人四在申手內若申手外犯輕相去一尋已餘不犯十律相去一丈犯提丈五犯吉二丈不犯又此戒中緣起戒本彰露廣解稱屏真是離見聞屏相對受名亦即屏露合制無寶立二有寶立二又此三戒前二露屏第三雖見聞對二不定但初戒攝以此三戒坐是屏故戒本四句一人二女三露處四結犯辨相具解驅他出聚落戒第四十六凡出家人理懷實忠信自居先許他食而竟不與惡心驅出時限已過使他一日不得食以充軀惱處至重故所以制六緣犯一是大比丘二先許三不與食四無因緣謂有舉擯命梵等難不犯故爾五惡心驅出六相雖見聞或彼去已去故戒本三句一人二語餘下及至與汝食正明將至聚落許與彼食三彼比丘竟不已下不與彼食遣去結罪以此因緣者謂是惱亂因緣非餘者非餘不犯等緣如無威儀等辨相具解過受四月藥請戒第四十七然篤信居士供辨美藥延請僧衆受心供養施心有限宜應將護稱施而受令過受他藥長貪惱物敗善增惡損處不輕故今聖制別緣具六一是藥請二施心限定三知期限定四過限而受五無因緣六食咽咽犯先解初緣藥請者四藥之中過受三藥俱犯提罪故伽論過受時食亦犯提罪七日盡形此律下文醫所教服藥故知是犯如施一食過受上犯豈況過四月受寧不犯提十律過四月已後索蘇等七日藥及終身中椒畢鉢薑鹽等犯提若索毗醯勒等三吉羅非時藥賤又療患義微過受義希故犯小罪問施一食中過受蘇油犯輕此受蘇油何以便重答彼據身外塗足燃燈既是外用過受義希故彼犯輕此施內過受義數故得問提罪又見論若檀越四月與油索蘇吉羅故知索藥罪輕過受重所以爾者解施主先為好心四月與藥期限已滿供養心息過受致惱損敗處深又復乘前供養人善過受故過受重若索藥者以其居士先無施心乞任彼與損惱義微又以施主先無心故乞希故輕與衣不同衣資義寬與乞過受二俱是數故齊犯尼薩緣中彰索藥過者藉此為緣制過四月受藥之罪餘緣可知滿足戒本六句一人二藥請四月三無病下教齊四明過四月受五除開無罪六過受結犯下辨相中釋不次比解二可知從病者已下先解第五除開從請者有四已下却解第三應齊四月受之方法從彼比丘下合解四六二句過受結罪就釋第五開緣言常請者師可常來以無定限故開無過言盡形者以二人形要故爾解第三中文四一者舉數二列四請之名三云何已下別解四請各舉釋結四是中已下斷簡四請初三兩請應四月受二四兩請應隨施受除開中攝藥有分齊者分請是俱無分齊者常請盡形是觀軍陳戒第四十八凡軍陳凶險兵刃交競實則傾敗俄爾戲便令心獲逸招譏損道𠎝深過極交違慈愍故不聽觀多論三義故一為佛法尊重故二為滅誹謗三為滅諸惡增長善法四緣故成犯一是軍陳二故往觀者三無因緣謂被請及軍陳後至水陸急難等不犯故四往見便犯緣中六軍者天子六軍諸候大國三軍征猶行也討猶愸也滿足戒本四句一人二觀軍陳三除開緣四結犯下略不釋除緣句初句可知二解所觀軍車幕七聚稱軍行列相對名陳於中文二先解陳次釋其軍軍中兩初約本軍數以列四軍故曰一二四軍也二次第辨釋即為四段一軍中兩初舉一軍謂今一軍祇書寫力最大四人從之成一象軍馬力次弱八人從之成一馬軍車軍次弱十六人從成一車軍三十二人帶伎成一步軍第二解其純義以無雜故下二軍等中純雜並有而不解純義以討軍數一軍中純四二軍中純四雜六合十也三軍中純四雜三合七四軍中純四雜一合五部合二十六軍若比丘下解第三結犯輕犯重從道至道者觀之方便有緣至軍宿過三夜戒第四十九制意同前五緣成犯一有因緣至軍中宿二曾徑二宿三第三宿不離見聞處四無因緣謂二道斷命梵等難不去無罪五過三夜明相出犯戒本三句下釋可知有緣至軍二宿往觀軍陳合戰戒第五十過不異前既有因緣聽至軍中宜應坐住復方便往觀過同於初故所以制五緣成犯一先至軍中宿二軍合戰三方便往觀四無因緣謂有所白請喚二道諸難等不犯故五往見即犯戒本五句一人二有緣先在軍中三或時觀者正明觀業四軍陳已下所觀之境有四一軍二陳三鬪四勢力五結罪廣釋五中略不解第二有緣軍中宿謂是前戒所開餘四具釋第一可知二鬪者下解第四所觀於中文四少不次比一釋鬪二解軍三辨勢四解陳之形相彼比丘下合解三五結犯輕重飲酒戒第五十一酒為毒水飲則成患令人志性猖狂廣興諸惡妨修廢業損道招譏生患之本寧容不禁是故聖制別緣具三一是酒二無重病緣三飲之即犯緣中文二初至飽滿飲酒起過二娑竭陀從坐起下發覺呵責前文復二初至繞已而去神力伏龍施酒因緣二明日清且已下正明飲犯佛呵文一失本了心呵故曰況復大龍二告阿難下酒有多過呵三告阿難下弟子衆所不攝呵世間毒龍但害人無常身命損處輕微名為小龍三毒煩惱能害人功德善財法身慧命毒中之毒名為大龍令裟伽癡人為酒所醉失醒了心不能入定發通降此小龍況能發知降彼三毒煩惱大龍又可依祇為酒所懷三不能降蝦蟇小龍況能降伏石室大龍此律唯波以衆鳥為小龍五分汝先能降伏惡龍今能降伏蝦蟇不答言不能十失分五初有三失於根為損次有四失瞋增報虧以廢産業次一現招醜名次一迷理彰解次一𠎝招重報戒本三句一人二所飲之酒三飲而結犯廣解中初句可知酒者已下釋第二酒於中文兩初列五酒如文可知第二木酒者已下偏舉木酒料簡疑濫中文兩第一從初至不應飲以是酒故制不應飲第二從非酒酒色香味已下以非酒故所以應飲前文有三初列木酒差別有六二梨汁酒已下雜醞方法釋向六種成酒之義第三雜酒者已下四句以無雜醞則體是酒或徑分變成是酒所攝假無似酒色香故不應飲第二應飲四句者以斯等木汁元不雜醞體則非酒又復時促未是變成縱令色香味等有似酒之濫但非時漿收故並言應飲良由木汁有茲濫故所以偏餘之四種是酒無濫不須料簡第三彼比丘已下解結罪五分咽咽波逸提此律文中略不言咽咽十律酒糟甜酒酢酒等飲咽咽提此律吉羅食麴吉羅者謂酒裏之麴境想上三究竟提罪下二方便若下四酒境想一句對初木酒事有疑濫故成五也五分若先習酒人不得者氣絶欲死飲食不消聽𭊴酒器若不差者以酒著粥中令食不差者以酒與飲漸漸斷之水中嬉戲戒第五十二多論四義故制一佛法尊重理宜奉敬令入水遊戲損壞匪輕二理宜威儀庠序外長信敬入水遊戲動越威儀招世譏過三宜息緣修道入水遊戲妨廢正業四宜修正念入水遊令心散失正念故為斯等義以聖禁三緣成犯一是水二無因緣三入中遊戲即犯大雲經說王見遊戲說偈向夫人言吾聞諸比丘久已離塵羈戲暴泥水中云何為人師諸比丘遊戲已即入定知心遂以神力鴈行而去夫人見而向王說偈吾家諸比丘久已離塵羈沙彌尚如是何況釋迦師王因生信擊攊他比丘戒第五十三事雖是輕過容至重人之喜為特宜須禁故所以制五緣成犯一天比丘二作惱亂意三手腳十指四無因緣若服觸令與一見行來誤觸等不犯故五觸著即犯不受諫戒第五十四凡出家之人理宜離惡為宗然己迷情將欲作過他理諫復不從順苟且為非違損處故須聖制別緣具五一己所作非法事二他如法諫三知己所作非前人諫者四諫不受五隨所作犯根本不從語波逸提戒本三句一人二不受諫三結罪下辨相具解但使知已為非知諫者是故違情重是以提罪若謂己所作是前諫者非情過輕微故得吉羅隨所作事邊以識事故作不以不知得犯根本罪此違一人諫不隨前事結罪輕重但就心辨虗故罪重心實故輕文中先結心實之吉次結心虗提問違僧諫中諫竟即犯不待作事此中所以諫竟未犯要待作事方犯違諫其義何也解言僧諫中有僧命衆法可違情過是重故諫竟即犯不犯待作事此中既是一人諫無僧命衆法可違是以諫竟未犯要待作事方違諫義成以是不類若爾下拒勸學戒亦是一人諫無衆命可違何以諫竟即犯與此相違耶解言彼諫止犯先是不學止犯之人發言拒諫道已不學即是止犯表違成故所以犯此諫作犯雖言拒諫道我作者仍猶未作表違未就要待作事違諫義成亦非一類更有一義如下辨恐怖戒第五十五凡出家人宜須將護不相惱觸令以六塵等事遞相恐怖令彼惶悸廢修正業惱殊深故須制斷別緣有五一大比丘二作恐怖彼意三以六塵等事一一說示四言辭了了五前人見聞觸知便犯不待前人怖以不怖以怖是難知故又是口業分齊故緣起文二初至我是鬼反披拘執以色聲怖佛起過二世尊已下正明呵責既對佛恐怖為過公顯故無別舉人亦不問自言前反披拘執作其惡色是身業不善沙門我是鬼是口業不善非但二業是惡心亦不善使於身口故言心亦是惡正彰三業俱是過也帝釋常謂僧中純善而忽遇斯變是故驚訝衆中亦有如此人耶佛言此人現報生身道契無著故言此生得清淨法帝釋讚佛內心清淨離世八法得利譽稱樂不以為歡逢衰毀譏苦未以為惱不為此八違慎所轉故曰毀譽不移動等佛說偈者對帝釋原意常謂佛有怖故爾佛遂集僧呵制戒本三句一人二恐怖三結犯辨相初句可知若以色已下合解二三兩句文三一列六塵章門二云何已下一一行怖成犯之法若比丘下結犯輕重分齊欲怖之法要先以言告然後方用色等六事一一不爾之舉其前言以釋犯相故言若說而了了提不犯文三一舉色聲二事無不欲示所以不犯二若以色下辨舉五塵不無怖意所以不犯三若有是事不獨舉法塵說無怖意過半月洗浴戒第五十六十律洗浴有五利一除垢二身清淨事值澡除但晈潔過常令身光澤玩著色身無心猒背正違出離故須限約半月一洗若過即犯則緣具五一曾前洗浴二未滿半月三更洗浴四無因緣五澆身半犯滿足戒本四句一人二明半月一洗不得過三除開緣四結犯餘時者下誦前第三此言不得過者非謂不得半月洗謂於半月不得弄洗故曰不得過祇云應隨洛日數要滿十五日乃應更洗辨相中略不解第二時節勢時已下解第三除緣不犯天竺勢早故從三月初至五月十五日此兩月半聽洗無罪如此方勢脕亦得用此兩月半時日滿便足是名熱時作時者十律乃至掃僧坊內地五尺多論五六尺五分乃至掃屋內地若比丘下解第四過洗結罪無事然決戒五十七凡火性焚熾事變無恆容有燒壞不可不禁又復然火詳聚多著俗活廢修正業是以聖制別有四一是無因緣甄去因緣不犯雖無因緣若在䨱鄣處生患義微亦是不犯故須第二露地三然草木等甄然炭生過義微但犯小罪燒便犯此中但制無事然火罪不言壞地傷五生種罪上已制竟故爾戒本三句一人二明無病因緣除有病不犯三自為已然火結犯藏他衣鉢戒第五十八所以須制者一調戲宣煩列因事相惱藏他衣鉢覔不得時今彼惶怖惱處匪輕二容生盜心臨危事險可懼之甚三假無盜心致彼言謗清白難分莫能自拔以斯諸過故合聖制別緣具四一是大比丘衣鉢事等二作驚動彼意三無因緣或物主慢藏為戒敕故或借他故或因此物有於二難等不犯四取藏舉便犯戒本三句一人二出所藏衣鉢三若自藏下正明自他藏而結罪上至故惱越取戲猶尚犯況為故惱故曰下至戲笑下辨相中略不解第二句餘二具釋
