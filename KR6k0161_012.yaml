body:
  text: 真實淨施不問主取用戒第五十九凡淨施之法為去封著之情遠同大行事既付彼取用之時一須諮問不問輙取理違聖教又復前人既不見物謂成失奪惱他不輕故所以制捨與前人不虗稱為真實此物不復染心名為淨施故曰真淨施輙取戒別緣具四一是己物二作真實淨法三不諮主令知四取用便犯戒本三句一人二正明作淨施法三輙取結罪辨相具解初句可知衣者已下解第二文四一總解淨施衣二列淨法三解二淨差別四是中已下料簡問否彰輙有元欲解淨施五門分別一須淨意二對人分別三對物分別四約法分別五失淨不失淨初門言須作意者凡淨施法元去封滯遠同大士離著之行雖復未能凡所受畜悉為成就但大慈方便教作淨法常作屬他之情己無貯畜之過福利施主饒益比丘復無譏嫌故制淨法多論九十餘種中無假為此法異外道故爾作法付彼故曰真實彼此傳施遞為物主故稱展轉並是絕貪惠他字為淨施斯之二種皆是作法若爾云何真實答一往直付物在彼邊問方得用故言真實對展轉故爾二門者人有二別一能作淨人謂唯五眾內教攝故佛教作淨二所對人人別復兩一是淨主義通七眾於中二俗為寶施主出家五眾為衣等施主見論若展轉施主得五眾立為以其不對施主說淨又復物不付彼不生譏過為是大僧得以尼三眾尼以僧家二眾名為展轉施主真實淨法要僧尼當眾三二不得立為以其墨服是同而男女相別何有大僧得物對尼又物付彼容生染習招致外譏故若爾何故多論云若淨主死遠出異國應更求淨主除錢寶一切長財盡五眾邊作淨又復祗律憂波問長衣何等人邊作淨佛言比丘等五眾邊作淨又何故此戒是真實淨文列五眾者何若准此等諸文明知二淨俱通五眾一解此是僧尼同戒故通舉五眾詠僧尼故又解下列二種淨法顯有輙無輙故使戒本通對二淨例其五眾理實不通亦有人立義執此文通隨見住情祇律又問遠近得從作淨佛言至二由旬知其存亡又問沙彌邊作淨受具云何佛言稱無歲比丘若死云何云言得停十日於餘知識邊作淨二所對作法人其唯具戒及當部謂展轉故爾真實及寶隨所對淨主共作法也第三門者有兩第一物體分別二物量分別比丘四物謂衣藥鉢寶尼加十六牧器比辨是非者如似綾羅綺繡人髮馬毛皮樹皮捨墮衣等並不合作淨重物之中除十六牧悉同於上第二尺量分別衣尺六八寸故文言長如來八指廣四指是隨何等衣類但有應量即須說淨立及令減並悉不須鉢量可知藥無其量謂取七日加口法者餘悉非也寶無多少但金銀錢第四就法一是請施主法若當眾大者須威儀等後方陳請小及餘眾直申言請𨷂無威儀尼當同爾若請大僧亦有威儀真實比說法第二是說淨法謂約物及境作法有差如常可知識不對施主面現前淨施當餘人邊作淨十律有現前作淨與他已不肯還遂生鬪諍佛言不應現前與若與不還者佛言是名不真實為清淨故與是人應還索得者善不得者應強奪教作吉懺此謂展轉淨也又此淨法期唯對手之法不同十律獨住人阿蘭若定禪人長病人飢餓時親里問行人此等聽作七種心念中謂心念淨施五分獨房聽遙淨應偏袒右肩脫革屣互跪捉衣心念口言我此長衣淨施某甲從彼受用或有人即對人作又展轉法問言我持是衣與誰答於五眾中隨意與之又不應語所稱名比丘五失淨不失祇至三由旬知其存亡十多出國休道擯舉命終咸失淨法此既無文任依一部淨法若失祇真言於餘知識邊作淨多論應求持戒多聞有德者而作施主後設得物於一比丘邊說淨主名而說淨法除不見擯惡耶不捨擯六罪人謂出佛身血破僧犯四重但犯一事不得作淨主請施主已除三衣五衣受持鉢等皆須更說以其不成真實展轉故爾以真實者物須付彼其展轉者逕歷三人有迊為之義釋此四文可知其說淨之法依此文作三若比丘已下解第三結犯白色三衣戒六十凡壞色染衣道服標戒內遣著情外長信敬令不染畜著非是沙門道服之標內長貪著外招譏損過是弗輕故須聖制別緣有四一是三衣二者是己物三不淨壞四著便犯戒本三句一人二得新衣已下教法方法三若比丘下以不壞故違反聖教畜著結罪依十要三色相現壞色衣畜著無罪純色悉犯祇純色不點壞犯著白色衣輕點淨不得並作或一三五七九為點大齊四指小如豌豆故此律著白色便重不點犯輕三色之中趣以一一色壞則成沙門衣辨相具解重衣不作淨吉謂妨長被褥等不作點淨法故煞畜生戒第六十一形命之重事勿有過貪生畏死詎簡人畜今乃侵害前境損惱事深招譏壞道是以聖制故多論三義故制一出家之人恒以四等為心今反加害違其慈道非憐愍故二自壞惱他正是生死根本鄣道之原三為長信敬息誹謗故別緣具五一是畜生二畜生想三有煞心四起方便五斷命便犯祇成就五法煞畜提謂畜生畜生想煞心赴身業命斷等是滿足戒本四句一人二故煞者自他煞業三畜生者出所害境界四結犯下辨相中初三別解二四合釋初列十九章門二作如是方便下結罪輕重飲虫水戒第六十二制意同上前戒是限分中制要斷命方犯此戒為養護物命深防中制但使知水有虫飲用結罪不待命斷為異不同十律別緣具五一是虫水二虫水想三不作漉法四飲五隨咽結犯若虫命斷屬前戒若就俱是虫水無殊應為一戒但以性惡故為重物命外內兩用分為二戒壞生種中若約外內兩分亦應為二以遮輕故且就生種無別生罪緣同故但合為一戒戒本可知下辨相初解犯輕重次解境想四句漉水之法外用中解竟祇云比丘受具已當畜漉囊應法澡灌伽論畜便清淨聽畜物䨱瓶口下文半由旬行不得無漉囊五分聽半由旬內無水囊行亦可以衣角漉與他作疑惱戒六十三凡出家所期標心處遠盡形畢命專志崇道今以生年等六令他疑惱內心壞惑癈其正脩事惱殊深是故聖制別緣具五一是大比丘二作疑惱意三於六事中一一說之四言辭了了五前人聞知不問惱不惱但使聞便得罪下戒本言少時不樂者此就能惱之意非謂要待前人少時不樂方始結罪戒本三句一人二故惱他三結犯下辨相中初句可解第二中先列生年等六惱亂之法次一一者舉章門彰惱方法此六之中初四舉受為疑下二據隨為疑疑若比丘已下辨上第三結罪分齊下不犯中次第開前六事其事實爾者謂前人實有此事復作實心利益彼意不欲為疑故五並言其事實爾第三與四咸言還本處受戒者謂復本沙彌未受之所如法受戒故言還本處也開第六文又復若彼為性麤疎不知言語者謂前問法人便言已下等者以不知言語復麤疎故妄引我言以彰惱彼故曰如汝所說者等非比丘行或戲咲語等下通開前六覆藏麤罪戒第六十四凡出家之人見他犯麤理須發露彰己內心清淨亦令前人徵於後犯彼我俱益眾法清顯理所宜然今故相隱慝致令前人造罪滋漫永不可改自壞心行彼我無潤損敗眾軌故所以制前不聽說為護於外恐生不信辱損佛法此為內護制不聽覆潔淨眾心防過不起別緣具七一是大比丘蠲去十三難沙彌等二犯麤罪除於下三無壞眾義過復輕微但犯小罪初二過重假僧治罸若不發露無以治罸壞於眾法故所以重若覆二逆理亦應同濫餘偷蘭輕故所以不同義同於說問所以覆初二篇齊波逸提不類於謗答謗中以重事誣人治重永擯惱處尤深故初篇重以殘謗人可懺之事非永甄眾外損徵故輕此中覆藏以不發露眾無治罸之義同是麤罪壞眾義齊故俱提罪不類於謗三知麤罪四作覆藏以五不發露六無因緣下文無人可說等或說有命梵難不犯故七明相出便犯滿足戒本三句一人二知犯麤罪三覆藏結罪辨相初二句可知彼比丘下釋第三文四一覆大比丘文二覆他上二提下三吉二自覆七罪吉前覆藏他麤罪彼我俱損故所以重自覆麤罪但有自損闕無損他故與下篇同吉三覆餘眾四境想四句還望初二覆他以辨境想麤罪非麤罪想謂向非罪迷故是以入開與年滿未受具戒第六十五夫年滿二十者志幹成立情標處遠堪能持戒及忍眾苦脩道進德有功成之益理宜濟度然年不滿者志性軟弱不耐眾苦遇緣退敗進道無由違教受具損道不輕故須禁斷是以大集經言佛問王王子年幾不得入宮王言年滿二十佛言我今亦為弟子制戒年滿二十受具足故然遮難非一斯皆不許但難無得戒之義自餘諸難遮戒復體足非可進否或即時方便容可如法或難不應得戒得罪年歲不爾未滿是遮待滿即得理宜消息而輕心慢法故為非理令不得戒故所以重餘便犯輕別緣具五一年未滿二知年未滿三與受具戒四作和上簡餘眾輕五三羯磨竟緣起文四初度未滿人二諸童子已下索食發覺三如來撿校四世尊告阿難已下制不聽度此戒之中闕無呵責所以爾者從斯已前佛自聽度未禁年限是以比丘度無情過又不違略故闕而無呵既無呵責亦無癡人多種有漏最初之言滿足戒本三句一先出主滿應與受具二出能犯人三知年已下未滿受具違教犯所以文言可呵癡故者本受戒時為欲得戒師僧有授法之益然知彼年減不能發戒知而故受從勞僧眾遇過之極事合可呵故也不閑進否迷心慢法名為癡故下辨相中第一年滿略而不解第二犯人可知其受戒人已下解第三結犯文二初至無犯來與減年受戒心境相應不相應犯不犯相二彼比丘已下辨輕重相就初段中有十六句以從和上四心位分故爾如知謂疑不知等是四心也和上了了知年不滿故名為知未滿作滿想但覩其相作必滿之意名之為謂猶豫不決名疑都無所了稱為不知僧緣彼境四心亦爾以僧四心對和上知心作四句下二三四句對僧亦爾故總十六此十六中初三兩四和上犯提第二第四和上不犯僧十六中各初三吉羅二四無犯初四句和上正主復知年減情過不輕故四皆提罪僧非正主情過稍微知之與疑犯二吉羅謂及不知無犯其受戒人或言滿等六句者對六人說之問和上知心而受戒人言滿所以亦提答受戒人雖有此言和上決知不滿故次和上謂心和上無犯僧二吉罪次和上疑心四提眾僧二吉問和上疑心應輕所以犯提答前受戒人有情可撿何不安詳細檢取實然後受戒今懷疑慢法而與受具令不得戒惱他處深故制與知同次和上不知亦四無犯僧二吉羅問其受戒人六答中言我不滿而和上無犯耶答前人雖如是答和上都無所知故無情過二結罪輕重可知謂結知疑八心和上不犯中聽數胎等日月者此謂和上生疑要是受戒後疑方開數前不正日月故文言若受戒已疑佛言聽數胎中日月等若逆數而受非此開分故定不受以其明白心中知不滿故又此為知和上犯不犯下受戒中明者為明弟子得戒文同義異又此言開者教其數閏等驗前成否為犯不犯非是已犯數之方開問數之云何一釋數法若受戒時俗年不滿日月復少一向不聽數胎潤等若俗年滿而日月少者開數胎等足滿二十本受戒時三羯磨竟弟子得戒和上無罪若日月少者弟子不得戒和上犯提又和上四心開知疑二心餘之二心本自無罪不須論開也但前知疑二心文中約教故隨分結提今開數胎等反驗知前為犯不犯若驗得滿者即是其開若人於十二月三十日生者至年二十已上入正月即受戒者雖俗年二十計日月年有十八歲猶少二十四月不滿二十和上知日月年不滿佛聽數在胎九月據此國法三年一潤十八年中其六潤配前胎月合有十五月下云數一切十四日布薩者非是減十八大布薩作十四日布薩二十八日為一月取十八日計為年數足為二十也故依伽論所以有潤月者由十四日布薩故是以有潤不須更數十四直以前十五月猶少九月謂從正月至九月受戒者弟子不得戒和上犯提若十月初已去受者得戒無罪如是隨其生月准說應知今解潤者不是專由十四日故數取非妨以其日行周天以十二月乘十一日計於三年有三十三日餘故使未至年則有一潤若真以十四為潤則三年不足故爾若欲數取減十八日大布薩盡為十四日如一年中得十八日謂十年中一百八十日八年一百四十四日合成三百二十四日以三百日為十个月以其九月足前十五月已滿二十歲猶有五十四日明知羯磨竟時弟子得戒和上無罪五分隨文言聽數胎中月年又聽以潤月足若復不滿又聽以沙門年足故知亦取十四日也亦有用乘五十四日更向前開義則不爾以俗年全不滿故問受戒中亦言數胎等與此何別耶答此驗和上犯不犯下彰弟子得或不得戒文同義異也知諍事滅已後更發起戒第六十六凡四諍之興乖理違和惱亂僧眾備德斷理消殄事怙輙便發起更增凶熾助惡揚波轉成彌漫惱眾之深故所以制別緣具五一是四諍事二僧如法滅三知僧如法滅四輙使發起五言童了了就緣起中二從初至不除滅發起四諍二時比丘不呵責不善觀者道僧不識四諍體相起之因本言彼闇心斷理故曰不善觀觀謂觀察若作如是觀者不成正觀不善解者道僧不達七藥體相差別義故曰不善解解謂決了若作如是解者畢無終益不成正解不善滅者道僧不識藥病相對除滅之軌違理判諍故曰不善滅作如是滅者不能究竟消殄故曰不成滅此三句發起皆犯提罪未有諍事非謂本來無諍名為未蓋就如法滅竟當時無諍名為未有而諍事起者更發令生不可消殄故曰而不除滅滿足戒本四句一人二是四諍事三如法滅已四發起結犯辨相具釋初句可知如法下先解第三解諍者已下却解第二彼比丘下辨上第四結犯輕重文四一起他諍初結提罪非分橫起重諍故犯吉罪二起已諍事有相忓又可希故所以吉羅三除比丘下餘四眾諍四觀觀想下境輕重令對四諍觀等四句觀不觀想據迷故無若對七藥及藥病相對亦各四句境想合有三種四句文無者略與賊期同道行戒第六十七斷姧禁非王者之法既知賊伴與共同行跡同賊相清白難分招世譏醜過損非輕故須聖制別緣具七一是賊二知是賊三共結要四同一道行五不離見聞處六無因緣下文逐行安隱命梵二難力勢所持等不犯七越界便犯滿足戒本五句一人二知是賊三共結要四同道行五結犯辨相具釋尋文可知惡見違諫戒第六十八制意有三一所以不聽說欲不鄣道意欲是生死根本罪鄣道之原既能口說身喜為之永淪生死鄣礙出道故爾二須諫意有倚傍故以見在家二果猶有欲事故如五分諸比丘問汝云何是解利吒答言今有質多須達多二長者及諸優婆塞皆在五欲所吞為欲所燒令得須陀斯陀以是故我作是解然聖辨鄣道結有強弱上品鄣見諦下品鄣思惟以見須達等道成初果猶有欲事執如是義說欲非鄣言同意理須標別聖言非鄣者以治道品殊各敵對而遣當分鄣除異則非此斷故有非我鄣非謂不鄣於彼若生勝解此或斯除而令偏執言欲非鄣耶正殊途理在於此須僧設諫開示是非三解結罪意僧既設諫欲使返迷從正固執不捨違法惱僧是故制罪違理滅善稱之曰惡耶心徹目之為見固執拒僧故名違諫別緣具六一是惡見二屏諫三不受屏諫四僧如法諫五不肯從觀六三羯磨竟分釋同上利吒執見審定而言此是真實餘皆虗妄以心實故迷情謂是違諫故輕隨順惡見被舉比丘戒第六十九制意有三一須舉意者有三義故所以須舉一此人謬執說欲不鄣僧諫不捨耶心成就鄣於學路於佛法中無長用故二來此人執見心成若不治舉永無改𠎝懺悔從善須僧舉罸析勒身心使思𠎝改過有入道之益三來欲順人情或多信受今以舉治絕化道故第二解不聽順意亦有三事一若聽隨順前人謂己見為是轉增熾盛即是損他二來既隨順彼必同所見染著欲事便成自壞三來僧既舉治今輙順違惱僧眾故不聽隨第三解隨順三舉結罪重輕意三舉義齊所以此舉隨順罪重自餘二舉但輕者何解言說欲不鄣言說相似濫於聖教以滅正法有壞他義又自壞行鄣於學路亦是順情多喜隨順故制提罪餘二條然是非更無兩濫滅法之過壞他義微隨順義齊唯有自壞是以犯輕別緣具五一是惡見舉人二知是惡見舉三隨順同事四無因緣謂力勢所持及二難等不犯故五隨所同事一一結罪就緣起文二初至止宿言語隨順起過二時比丘開下呵責前文有四一違僧諫三配成就是其情過二時諸比丘下呵拒僧諫三耶見心成無所長益從佛告已下作法治舉四時阿利吒下隨順起過滿足戒本四句一能犯人二知如是下正明惡見舉人未捨未解第三共同事食宿四結罪第二句中文四一如是語人謂惡見語人二未作法謂未為解三如是耶見謂惡見說欲人四而不捨者謂拒違僧諫辨相具解第一可知如是語者下釋第二四句供給所須下解第三若比丘下解第四結罪就解第三中初解法財二事次同羯磨止宿屋有四壁一切覆一切鄣一切覆不一切鄣或一切鄣不一切覆或不盡覆不盡鄣及不下開中九成室戒並准此文說者善餘文不具隨順被擯沙彌戒第七十制意有三一解須擯意亦有三義如前戒說問所以沙彌作擯名者入道之來惡由信心沙彌既未受戒說欲不鄣違僧三諫耶心成就於後受戒事容難剋故須加其重法與作擯名怖以從道大僧既先得戒故真舉治不須擯怖又但口說未作重過故今加擯明為怖之是以文言共行不淨者謂第二篇事若實犯重何須諫後方擯又復多論若解擯已應與受戒故知不是犯重伽論沙彌說欲眾僧和已彼若懺悔還當攝授問沙彌不見不懺同是耶見何不作擯而舉稱此獨鄣擯其義何也解言不見不懺條然是非與教不濫又無諫可違情過輕微後無順情化人之義作舉名不加擯稱說欲不鄣濫於聖教又違僧諫復順情行化故作擯名與彼不類第二解不隨順意第三結罪意同前戒說別緣具五一是被擯沙彌二知是三同事止宿四無因緣甄去二難力勢等五隨事緣起文二初至止宿隨順起過二諸比丘下呵責前文有四初至不捨違諫不捨耶見心成無所長用二時諸比丘不呵所不應三告諸比丘下作法治擯四時六群下隨順起過就初段中復有四文一說欲不鄣諫所為事二時諸比丘下呵責三告諸比丘下秉法設諫四彼二沙彌下說欲拒諫堅執不捨滿足戒本五句一犯人二知沙彌下正明說欲不鄣違諫不捨即上諫五句來一說欲不鄣二彼比丘下屏諫之軌文二初諫莫說欲故言莫謗等二世尊不作已下顯佛教說鄣釋成諫意三彼比丘下拒屏諫四彼比丘下僧諫五不捨者執見心成第三彼比丘應語下正明作法治擯即牒上擯治言三宿者謂第三宿明相未出已還故曰三宿無上二三同宿事故曰無是事汝出去下結成擯治第四若比丘下隨順起過文三初重舉能犯人二知是擯治沙彌三而誘將已下同事止宿第五結提下辨相中但解初句三四五等句第二略而不釋文顯可知亦可但解第一第四節五三句拒勸學戒第七十一昔解屏諫為兩謂不受諫諫作犯人拒勸學諫止犯人以其所諫不過止作故總立二戒若也僧諫多就作犯唯就倚傍止犯之事但可不學更無僧諫雖有此釋義未必爾據理言之拒非違諫若是違諫雖言了犯何不同前緣心虗實罪有二階故知不爾文言我今不學此戒者非於法止未必止犯是故文言我當唯問餘持律比丘故今更解屏諫唯一事該七聚義通止作虗重實輕今此戒者乃是輕人不受訓道故結提罪是以文言我今不學此戒當唯問餘持律者五分比丘數數犯戒諸比丘諫言汝等數數犯戒莫作此行貞人信施六群言我不學是戒我當先問持法持律智慧勝汝者佛因結戒准此文意但數數犯戒斯亦所學義通止作直言不學此戒未必專止若作此解應名輕人不受訓導戒第七十一上列二部諫戒義中皆除此一次解制意凡行不自成必須訓導方能筞進有趣道之益故善知識者入道之良緣然以癡心陵蔑勝德如法諫勸理應順奉假說異求不肯承槀即是內無進脩之誠復無從善之意自壞招譏是故聖制別緣具五一前人如法諫導二輕蔑諫者三發言不從訓導四無因緣謂為知為學次難問無罪五言辭了了戒本四句一人二前人如法諫勸三不受結罪四開無不受之𠎝為學為知故應反難審定辨相略不解第四句餘三具釋不犯中其事實爾者謂前勸非理更諮勝德所以無違毀呰毗尼戒第七十二然戒為眾善之本滅惡之原超生死之舟趣涅槃之正路理宜讚嘆令人脩學使戒法興顯千載不墜令反毀呰乖隔人心使不誦習致令正法於茲淪滅敗損非輕所以須制別緣具五一是毗尼前比丘誦毗尼時甄去未誦時呵誦竟呵皆犯小罪故爾三作滅法之意四發言毀呰五言辭了了犯便緣起文二初至憂總毀呰起過二餘比丘已下辨呵責文言用此雜碎戒為者多論若誦初篇中一戒呵言雜碎者一提如是一一戒皆得一提若通言何用此四戒為正犯一提若誦戒序呵言雜碎亦得提罪多論問曰戒序非戒何以得罪答戒序序說二百五十戒義若呵序者即是通呵一切戒是以得罪戒本三句一人二前人誦毗尼時三作是語下毀呰結犯於中文三一毀不誦習二說是戒時已下釋前毀意謂令人惱令人愧令人懷疑故三輕呵已下彰過結罪辨相中具解彼比丘自說下解第二句言通四種謂說有自他誦亦自他文中總言誦時次作如是說語下解第二結罪一一結提諸隨經中有毗尼相毀呰同犯所以然者多論有四義故重一戒是佛法平地萬善由之而生二一切佛弟子皆依戒而住三是趣涅槃之初門若無戒則無由入涅槃城四是佛法瓔珞能莊嚴佛法具斯四義功強於彼故毀罪重輕無此義故所以輕此謂小乘契經若毀大乘其罪極重不攝耳聽戒第七十三凡解不孤起惡藉說假聽方能開曉心懷識達耶正犯相輕重順教奉脩有出道之益今反癡心怠墮不肯聽法迷於聖教事等面墻動成滯礙莫由進道輕慢聖法失利處深故所以制別緣有四一是說廣戒時二身在說戒眾中坐三作不聽之意四說過五篇便犯提罪隨其中間一一戒不聽小罪祇律中間不聽小罪故知就緣起文二初至說戒經來正明自知有罪恐他發舉自言始知望得無過二諸比丘察知已下正鄣呵責戒本三句一人二說戒已下自言始知三餘比丘下證其久知結罪屬彼若二若三逕於說戒足應得知何況多也若實久知而言始知犯妄語提若也本來無知無解者無妄語罪便有不攝耳聽法罪由不聽故不識戒相故曰無知無解以不知故遇緣起過自壞心行故曰若犯罪如法治不以無知得脫以識事故應更重增無知罪者根本罪上緣而不了復犯無知之罪故曰重增不能生善益己故曰汝無利重加無知故曰不善得等所以有此無知者由不聽而生故下結根本不聽之罪下辨相中具解上三初句可知彼比丘下釋第二若自說時若他說時若自他誦時對此四時發言始知唯他說戒方有不攝耳餘比丘下解第三說戒時不善用意一心聽法無知故重與彼放逸提者非但無知故犯根本罪由先不聽故此二罪之外復有不攝耳罪故言重與不犯中初二句開無不攝耳戲咲已下開無妄語可亦通開不攝耳罪本曾間說者受戒已來未逕說戒未曾聞廣說者或聞心念三語等亦曾開略說故同羯磨僧物與知事已後悔謗僧戒第七十四物僧共有眾情非一既詳和作法賞知事人已輙便悔反謗僧隨愛而與驗動群情喜生諍競遞相苦惱不得安樂脩道故制斯戒別緣具四一是僧物謂僧得施物非常住僧物其常住僧物衣裘票帛田地園林不得賞知事人如其與者與受俱獲罪也祇律僧物者若眾中分物僧伽梨等如是一切應分故十律僧應分物二同作羯磨賞知事已三輙便悔反傍僧隨愛四言辭了了便犯所以不諫者已自共僧作法而與若僧有愛彼亦有愛更無有濫何須設諫戒本三句一人二同作羯磨賞知事人三後如是言下謗僧隨愛結罪文三一隨親友二以眾僧物與三結罪辨相中第二句略而不釋餘二具解下三眾犯者口唱和同後悔得罪無同羯磨犯不與欲起去戒第七十五如法僧事理宜詳遵許無乖隔今隔僧作法輒便捨去心不和同鄣礙僧事惱眾非輕是以聖制別緣具五一是如法僧事簡不犯中事可知二知如法三不與欲四輙起去祇若大小行須臾還不廢僧事無罪十云若大小便若不離見聞不犯伽論起大小行不捨見聞處不名離眾捨見聞離眾准如斯文若正作法不得行來有竟未竟中間蹔往來者可如上說五雙脚出戶便犯五分屋下作法隨出提若露處面去僧一尋地去多多逸提神通去地四提滿足戒本三句一人二眾僧作法三不與欲下去而結罪辨相具解初句可知僧者已下釋第二句一解僧二釋事謂十八法五分作法三羯磨提若不作法吉羅若比丘下辨第三句與欲已還悔戒第七十六凡如法僧事理宜順可先與欲已見治同從以偏私之情輙便悔反說言不成相朋毀法惱眾不輕故所以制別緣具四一是如法羯磨二如法與欲三輙便後悔說言不成四言章了了便犯緣起文二初至不與此事欲來正明如法與欲悔言不成二諸比丘聞已下呵責戒本三句一人二如法與欲已三悔而結犯辨相具解下之三眾不得與羯磨欲後悔罪亦得餘事情和後悔犯吉屏聽四諍戒第七十七凡公言則理顯屏語喜隨情今徐行竊步盜聽彼語傳於彼此情存鬪亂過是不輕是以聖制別緣具五一先起四諍事二前人評量三作鬬亂彼意四往波盜聽不令覺知五聞語便犯問若聞語犯者何故戒本聽此語向彼說提答此就屏聽者意本屏聽此語為欲向彼說作鬪亂意聽時得罪不待向彼說也若向彼說得罪者落在兩舌戒不在此攝問此戒所以聽時即犯前兩舌戒待傳彼此方犯者何解言前戒先未有諍一往聽時未必生諍要說方犯此戒先有諍事若往聽者必生其諍過情深重是以聽時得罪戒本三句一人二先共鬪諍三聽此已下屏聽結罪辨相具解上三瞋心打比丘戒第七十八凡出家之人理須居忍堪耐惱緣今乃內懷瞋忿加打前人自壞心行忽逼前境過損非輕故須制也別緣具四一是大比丘二瞋心三作打彼意謂有病等緣不犯四打著便犯手摶他比丘戒第七十九前戒限分中制打著始犯此戒深防中制以手擬摶即犯不待打著著前戒攝無根謗戒第八十制意犯緣多少與四重謗同唯為輕別戒本五句一犯人二瞋心三無根四舉殘法誣人五結犯下辨相中略不解第二餘者悉釋初二別解四五合辨亦可具釋謂二四五句合而廣解准上亦應具約六心以防巧情及舉書使手印輕重相等易故不論及對謗四眾其文亦略假根亦犯此等並略突入王宮戒第八十一凡王者自在情多奢婚縱禮無時容相逼斥彼此懷愧理非所宜又復王宮采女艶色豐動亂人心容生染著自壞心行過在匪輕是故聖制別緣具五一是剎利王二王與夫人同在一處三王未出未藏寶四無因緣謂有奏白被請諸難等不犯五突入宮門便犯五分入王宮雙脚過提隨入遠近多多提緣起文二初至此事無苦正明突入起過二迦留已下發覺呵責前文復二初至無有鄣礙王與夫人信敬心故聽比丘入宮突入緣起二迦留已下入而起過前文有三初至第一夫人正末利奉獻佛食現為夫人二既得現報荷恩處深是以從高樓已下禮謁致問說法生信三還至宮中已下化生俱信聽諸比丘入出無礙就第二致問文中有三初報恩致敬問佛因果四句疑事二爾時佛告已下廣為解釋令生信解後如是末利已下一一結示三爾時末利重白已下正明末利心領發願受道獲益末利夫人雖第二第三重受五戒乃可增其善心更不重發猶本所受此多論釋又如成論及心論說悉重發戒已如上說戒本四句一人二是剎利王甄去其餘小王不犯三王未出下正明王與未人同在一處四而入已下突入結犯辨相具解初句可知王剎利下至澆頭種解第二句未出者下釋第三句若比丘下解第四結罪重輕捉遺落寶戒第八十二寶物利重入情多貪既落在地事是難近雖好心拾取為欲還主致彼誣謗清濁難分莫能自拔又復既取此物容生盜心臨危事嶮行非高節敗損不輕故所以制若非遺落捉犯小罪別緣具五一是遺落物二是寶及寶莊餝具三非僧伽藍內及奇寄宿處四無盜心為欲還主意甄去有盜心不犯此戒五捉取便犯所以聽僧伽藍內及寄宿處取不犯者解言若不取者脫有異人將去猶不免譏謗是以聽取待主諮當還以自心譏過故爾滿足戒本五句一人二所捉遺寶三自捉下能捉之業四除藍等處不犯五結罪若比丘下誦前第四除藍等句辨相之中略不釋第三業第五結罪句餘三具解初二句可知若比丘在僧伽藍下正彰二處捉之方法待主欲還久久不來祇言金等無人來取至三年聽隨三寶分中得處當界分用十律過五六戒四方僧用五分十二年不取者集僧平價作四方僧用後來索者出僧物償之非時入聚落第八十三凡出家脩道理無遊散時為濟命事須往反既是非時無緣而入妨廢脩道招致譏醜損處不輕所以須制別緣具五一是非時分二向白衣村三無啟白請喚諸難等因緣四不囑授五入門便犯若住處無比丘可囑有三寶緣聽入無罪若行至夜欲入村宿祇律應展轉相自無罪不白犯依此律容可不白不犯五分若行經聚落若暮往宿及八難起不犯非時入村此律不犯中道由村過不犯滿足戒本五句一人二非時三入聚落四不囑授謂不行開法五結罪辨相具解過量牀戒第八十四高牀長慢理非所宜事須依法不容過限過則長貪違反聖教故制不聽別緣具五一是牀二為己作三過量四自作使人作五作成便犯戒本三句一人二立法限量三截竟已下過而結罪辨相具解祇律高牀下戒並言應先截壞然後悔過兜羅綿紵牀戒第八十五以其多生細小諸虫用損物命違於慈道所以不聽亦五緣成一是兜羅綿二貯木牀三為己四自作教人作五成便犯戒本三句一人二貯木牀三結罪辨相具釋此上二戒十律隨坐坐提罪骨牙角作鍼筒戒第八十六以其小物用功甚重事無多益勞苦繁數癈損家業招致譏過故須聖制戒緣別具五一是牙角二作針筒三為己四自作使人作五作成便犯尼多在等不喜遊行作之義齊但犯小罪過量尼師壇戒第八十七自下四戒並不聽量過者信施之物理宜應法趣得遮鄣資身便罷今過量而作長己貪求外損信物作無用之費經求癈道患累處深是以聖制尼師壇者此方名覆臥衣謂覆鄣眠處護臥具故別緣具五一作尼師壇二為己三自作使人作四過量五成即犯下之三戒犯緣並同唯以體殊為異緣起文二初至尼師壇過量起過二時諸比丘呵前文復二初制畜坐具鄣身受用二六群已下因聖聽作過量起過滿足戒本三句一人二出量數之法廣狹長短三過作結罪佛搩手五分長二尺長中長五尺廣中四尺是名應量過則是犯五猶尚犯何呪俱過計通明尺重理應如是但因迦留各增手搩戒本別增致人有或謂要須續此義不爾過量覆創衣戒八十八過量雨浴衣八十九此等二戒其義並同故不煩釋問所以此中上二下一尼但犯輕過量雨衣與僧同犯其義何也解言雨衣外用女人漏形恐醜相外彰喜廣長作故同犯提餘之三戒隨身著用尼好小作過希故經過量三衣戒第九十問上之三戒佛搩手定出量限此三衣戒所以隨身量不定者何解言餘之三戒非是沙門道服水儀隨其大小皆得受用故定出量數此三衣戒是三世諸佛道服之標若依佛手定出量限者人有小大皆不稱體威儀醜惡故隨己身量稱形故爾以衣不定故得與佛等量戒餘三定故更無等過之義所以緣起須制難陀着黑衣者解言難陀色身與佛相濫諸比丘見謂之為佛彼此懷慚制著黑衣異佛衣色故所以爾諸比丘衣色與佛同等六羣比丘見己衣色既與佛同謂量亦應等遂使與佛等過而作故須明之問衣制過量戒鉢何不爾解衣若過量得截而用人喜過作故所以制鉢若過量截無用義人不喜過故不須制又復衣體同佛謂量亦等喜與等過故有斯戒鉢體異佛不喜等過故不須制問佛之衣鉢所以有同有異答一切諸佛法畜石鉢是以如來棄人中石鉢取天細膩石鉢著人中衣表人天師良厚福田由著人中衣故與比丘三衣體同鉢非人鉢故使不同問比丘所以不畜石鉢者比丘福淺不能感物又此難得恐癈正脩又擔持重故人中石者復不任用故制不聽畜畜得蘭罪四波羅提提舍尼法七門分別一解來意釋名二解置四所由三次第之相四違制不同五持犯方軌六自分勝進七二部同異初門來意者上篇雖明威儀若離譏嫌進道莫由是以次明離譏嫌進道莫由是以次明離譏過行西音波羅提提舍尼此名向彼悔故下文言我今向諸大德悔過是名悔過法又可名為可呵法亦是文言我犯可呵法所不應為故第二門者凡起譏過託二眷屬一內眷屬二外眷屬內中有二謂若私屏及以眾中初戒私屏起過比丘與尼黑服是同而男女相別在聚落自手取食容生染穢招譏損道對離斯過故制初戒若於眾中偏心指授跡涉回私嘿受不呵於眾不顯對遣此過故制第二外眷屬中就聚落蘭若二處以興過譏謂學家過受令他罄竭招世譏嫌對離此過故制第三蘭若起者懈怠逈嶮安坐受食致賊觸嬈送食婦女招譏不輕對離此過故制第四始末差分有斯四益第三門者內眾情親又是師義喜起此過故在先明俗人外眾致犯義希故在後說就內眾中私屏為數眾中是希故有先後之別外中聚落喜犯蘭若不數次此之宜理所然矣第四門者就此四中第三戒違僧制得罪此學家羯磨實是亦佛教諸比丘作此羯磨然佛不自秉若諸比丘未為作學家羯磨無僧制可違受食無罪由僧作法制而生故曰違僧制得罪此制不異佛制隨人異故自餘三戒咸違佛制無僧制可違第五門者此四戒中二四兩戒具二持犯言二持者若見尼指授心而不食即是上持若見事時即順聖教作法而呵大姊且止身業食時不生罪過名曰作持此之二持名體俱別二犯者若見過不呵食便得罪由止而生故曰止犯雖止不呵若身業不食無此止犯復由身業食食而生乃名作犯望前名止望後為作此罪體一而名有別又可二持亦是體一名別如作法呵名為作持以其呵故雖食無過反前作犯豈非止持第四蘭若止而不食名為止持若順聖教語言檀越莫送食來而施主知故復送來雖食無罪名為作持二犯者不語檀越名為止犯而受食食即是作犯餘之二戒止則是持作便是犯第六門前之三戒自分行中以離譏過第四一戒勝進分中以離譏過第七門二部同異尼並吉羅總是希故隨事論之至文中釋在白衣舍從非親里尼自手受食戒第一大僧上尊尼是下眾敬上情殷所有飲食皆悉捨施竟不籌量得便受之致彼飢困癈脩道業又復非親容生染患招致譏醜損壞非輕所以須制別緣具五一在俗人舍二是非親里尼三無因緣除病緣故四自手取五食方即犯所以除親者上明共坐同舟等外相不練譏患無殊故親亦犯此中俗人家內情相委練實親無譏故所以開病人苦惱不容生過為濟命故亦開無犯四直地遣人表敬相不絕無譏故聽滿足戒本四句一人二明在村中有非親里尼三若無病下正明自手取食食四是比丘下違教結罪隱其梵名就漢稱結罪故曰悔過法辨相具解可知尼得輕者大僧上尊自手授食與尼義悕致受非數故但吉羅在白衣舍偏心指授食戒第二凡眾貴清美不容穢跡然今此尼以偏私之情公於眾中越次指授似成回私汙辱處深大眾既覩其過嘿受不呵即表眾心不淨容隱惡人故制舉眾並不得食問所以不開親及病者何答既是眾中偏心授食招過無殊故親之與病皆合可呵今嘿受不呵舉眾情過故所以不開別緣具四一是白衣舍二偏心越次授食三大眾嘿受不呵四食之便犯戒本四句一人二正明白衣舍尼越次指授食三比丘應語言下佛教比丘作法呵止四若無一比丘下不呵結罪辨相具解可知尼得輕者大僧指授與尼義齊致受不數又復下眾呵上義難情過是微故所以輕學家受食戒第三凡受施之法宜自限量不容過分今此學家見諦弟子於三寶所乃至身肉不惜然此比丘竟不籌量前人有無取索無節令彼罄竭因福致困生外不信又現受者貪取過度心無慈愍今僧制遮護知而故受事是無理所以制也別緣具五一是未妻俱得見諦二僧眾與作學家羯磨除未作故祇律夫婦互有凡聖不得為作羯磨若夫婦於三果中或俱是或互是得與作羯磨五分亦爾三無因緣除病請等不犯四自手取除置地使人與為表敬相不絕故爾五食之咽咽犯緣起文三初至之盡正明起過二比居諸人下正辨呵責三告諸比丘下慈愍學家教僧立制約勒四方不聽受食此羯磨與人相應法謂與比丘相應四方僧制故下學家乞解者乞解僧制也五分若其家財物竭盡者僧有園田應與之使畢常限餘以自供若無僧有異供養時令其家作使得遺餘若復無者乞得食時就其家食與其所餘若不爾父子安置比丘寺婦女送置尼寺給其房舍臥具乃可分衣物悉皆與之然今此律且立僧制滿足戒本四句一先明學家僧作羯磨二若比丘次出能犯人三作如是已下正明無緣自手受食食四是比丘下違教結罪下辨相中先解第二能犯之人却解初句學家犯之境緣餘文可知尼是下眾感彼情薄必無傾竭之惱故所以輕不犯中學家乞解者此文但言財物還多乞解僧制佛即聽解十律若學家財物減損不增者若乞不乞不捨若財物增多者若乞不乞皆應捨學家羯磨若財物不增不減者若乞應捨不乞不應捨若作法竟五眾俱不得取若捨羯磨竟五眾隨意取蘭若安坐受食戒第四凡在蘭若事須翹懃方乃安坐受食非進道之宜又復逈嶮多有賊難送食往反因致困辱惱壞其心招世譏累是故聖制五分若軍行逕過與食若賊來自持與受不犯若送食人忽至僧坊比丘不知者佛言聽一人受自出一分餘行與僧以己食分從僧中一人貿食不犯若送食是賊見不得去應與袈裟著若故不得去者應獲與剃髮著法服送令去別緣具五一是蘭若嶮難處二先不語檀越三無病難因緣四自手食除置地使人與不犯故五食之咽咽便犯滿足戒本四句一人二明在蘭若險難處三先不語已下在險難處安坐受食食四應向已下違教結罪第三句中先不語檀越者若語莫來來而得受故曰先不語雖先不語藍外得受故曰藍外不受食而在藍內受食雖可藍內病緣不犯故言無病置地亦開故曰自手受食食如此釋時唯在蘭若藍內受犯餘道路藍外村中並悉不犯義似順初戒本又復一釋藍外道路有難處亦不得受唯在聚落受之無犯故緣起文語諸婦女莫出道路有賊恐怖若已出城應語言莫至僧伽藍中路有賊恐怖既二處俱犯釋此文時若先不語檀越者若語檀越莫送食來藍及道路受俱無罪以不約束二處受犯然文反學舉不行約束法中語檀越二處不受但舉藍外道路不受略無藍內不受故言先不語檀越乃至不受食次正舉受犯以不語故二處受犯但言藍內受犯略無道路受此乃綺互下無病等餘緣可知若如時立緣之中應言蘭若道路有嶮難處辨相可知尼無蘭若假有齊輕第七段眾式叉迦羅尼法此言應當學直言其眾不列數者解言此篇威儀違失乃有無量不可以限數往故但言眾若就所防彰目應言眾突吉羅篇今隱其所防治行受稱故名為學式叉言學迦羅尼名應當以語例故論其學也實通上四唯此所以偏彰者然此篇威儀微細自非專翫在心懃加護持其行難成故加勸學之目又復能持具足無缺學行之絡彰學功義顯故獨受學稱語其威儀事乃眾多今且採要百戒重而喜為輕心易犯集在此明餘者雜威儀中辨於中身口分別有二十戒自口作業假他身犯如持仗人說法等餘應身犯其相可知次持犯分別若就應學以辨並二持犯謂起心脩習名為作持望不作高下著衣等事即是止持無心崇習說為止犯而作高下著衣等事名為作犯若言作法得作前事名作持者唯杖囊一戒容二持犯餘咸止持作犯若如前釋上之四篇亦應悉二持犯何獨於此答理實應然不犯此中名應當學故餘不類此且作是釋文分為四初有五十一戒敬僧威儀行二不恭敬人不得為說法下有八戒敬法威儀行三不得止宿佛塔中下有二十六戒敬佛威儀行四人坐已立下有十五戒能敬之人於四威儀雜明敬上三寶之戒先敬僧者據住持三寶故爾所以須明敬僧行者然衣裳服餝行坐進止飲食出入皆是僧之威儀齊整端嚴舉動應軌彰己內有道法之心外覩信敬生長世善光顯佛法益利僧眾違則自壞心行外長他惡於彼僧寶情生輕薄汙辱不少故須制彼敬僧威儀人不自成功由於法故敬法法者療生死之良藥展開道之眼目若敬而順行則超越眾累清昇彼岸慢而輕毀則永沉生死長淪苦海殃累之深持宜須敬法不自弘宣由道主故須敬佛佛為尊導獨拔累表解超眾聖萬德圓極大悲開化利益群品其恩深厚事須敬以求度世是故須制尊塔靈庿潔淨安處夙夜展虔敬之儀式以上別收未盡復須雜明四威儀中敬三之行就敬僧中分文有四初有二戒正明教諸比丘著衣裳法使齊整端嚴應法無失自行成立外生物喜違則制罪初戒著涅槃僧次戒著三衣第二從不得反抄衣已下說不得戲咲坐亦如是有二十三戒入村受請行來進止從用意受食已下訖洗鉢水有二十三戒食上方軌第四生草上大小便下有三戒便利進止因緣廣辨皆彰威儀違失之過唯戒本中偏彰能治之行舉以勸學不明所防互舉故爾以故作者故違聖教作不齊整著衣犯根本突吉母經對手一說懺此亦篇義妨今解責心非威儀吉羅者不應故違聖教非但犯根本之罪復得不應而作失威儀罪此亦嘖心悔一切戒犯皆有二罪非若此篇如上好樹不應故斫而斫犯壞生種提復非威儀吉如語上生坐舉臥具出門提復得非威儀吉類知一切若不故作者此識事作故然不作故違聖教之意猶犯根本責心小𠎝無失威儀吉羅斯之三吉雖有根樤減責心悔篇中所攝此一既爾下戒同然第八段七毗尼法於中文三一至說戒經來牒舉章門由言七悔過法除已起之諍就所滅名之故爾二若有諍事下二句勸學滅諍三應與已下別列七戒是中應與七滅而不與者犯突吉羅即上戒式叉迦羅尼應當學義故尼律中尼不為他滅諍提下文比丘吉彼含此離遂為七戒上來百戒自行威儀以彰應學此據眾法除諍滅罪以顯應學二處戒本並不舉所防直言應當學應與現前等故知一類但以眾別有殊故分為二問都收一百七戒總成第五篇也七滅道理文義苞富不可輕言下當廣說第二分比丘尼律三門料簡一僧尼離合二先後次第此之二門已如上釋三尼之同戒最初有無一釋雖可形別起患義等但使大僧先犯禁該二眾設後犯者無別有初廣教頌故尼若犯者即是第二又復五分可是同戒憂波問為一部一部持佛言皆作二部持十律佛在僧前結同戒已語諸比丘汝等以是戒向比丘尼說作是語已入室坐禪爾時諸比丘遣䟦提比丘汝今往詣王園精舍為比丘尼說之䟦提即承僧命往至尼所令集一處語尼言佛為我等制同戒我及汝等應共受持爾時長老比丘尼皆言善好受持時偷蘭難陀尼在眾中語䟦提言汝愚癡不了不能定知我等可以汝語故持不持耶我等當問餘比丘持修多羅者若應持者當持不應持者不持如來即制比丘尼輕呵比丘戒以斯推驗明知同戒無別最初問若使同戒無別初者減年受戒與外道食長鉢大僧犯尼應第三所以尼中別有最初答此就罪同應無別初但有緣異謂減年有學無學與外道食境緣寬狹鉢時有長短非類故若爾尼離五衣宿俱犯提罪比丘離三衣宿提餘二衣吉亦是寬狹理應別初何以直列答若據不同應別有初莫不皆對受法明違故無別初又若爾所以同戒要因大僧先犯以制尼眾無有一戒因尼制僧尼不同戒因尼先犯以禁比丘豈可當時先因比丘併犯同戒禁尼眾說尼眾方犯不同戒耶此實難解答此等同不同戒僧尼二眾犯應雜亂為分人別是故同者列之在初餘不同者併後列之若爾先後可爾何同戒無有一戒因尼制僧又更一釋大僧與尼男女位別何得因此制彼又復望尼偏過未起如何逆制謂二眾同犯皆別有最初所以知者如尼初戒與僧同犯下開亦言最初不犯故知別初如斯解時可同犯戒應更別出起過之人呵責制戒但大僧中已明起過呵制若更出者不異於前為離繁文略而不出直列戒本餘二律中告尼眾言二部持者此謂告知同別共學不共學非是由此制彼名共以是義故各別有初尼律六文總為四門一五篇二七聚三方便四持犯委釋其義如前已辨第二別解即為六段先解初夷於中亦兩一總二別總解十門一三毒起成二身口差別三自作教人四犯境寬狹五尅漫不同六餝悞不等七諫不諫別八僧尼同異九尼下二眾任運有無十持犯軌初門者位以為三婬觸八事三起貪成二有四戒煞盜䨱隨三事起成三妄語一戒貪癡起成所以可知第二門者一義判時位亦為三謂婬盜煞觸若身業犯妄語七八此三唯口口有同異八事一戒通於身口又更一判婬觸害身盜煞二戒身正口兼妄語一戒口正身助八事一戒身口通犯䨱一口止共身犯隨舉違諫自口止業假他口作業犯有六差別第三門者位可為三初一下四此之五戒自重教輕煞盜二戒自作教人彼我俱犯妄語一戒自作正犯教同不同第四門初戒境通三趣餘七唯人婬觸八事此三男報䨱藏局女餘之四戒義該男女隨舉少異可知七八局道前六義通道俗七八唯具餘亦義通第五門初戒漫剋俱犯下之七戒盜煞與妄漫一切犯尅心之中有犯不犯觸等下四局在剋犯以取染心知人名種隨順違諫豈可漫心而成此罪故專在剋第六門前四同戒若配錯悞位為四定同比丘中說下之四戒攝同妄語所稱錯之與悞並悉不犯亦可解八容有悞犯餘無可知第七門前之七戒無倚傍可執故不須諫第八有倚傍故堅執有濫故須設諫第八門初之四戒僧尼同有而於四中下盜煞妄全無有異婬之一戒境界飜到下四深防尼有觸等位以為二前之三戒重輕不同觸戒有四差別尼重僧輕八事之中僧犯三罪捉手犯觸殘共諸共期容犯麤語捉衣犯蘭餘容小罪覆藏一戒境有寬狹隨順一戒有無不同尼倚八敬隨順須諫故犯重夷僧無倚不諫故無第九門初一下四無教人為己故無任運盜煞妄等有自作方便或復教人為己容任運犯第十門䨱藏一戒具兩持犯以有作法發露義故餘各止持作犯次下別解不淨行戒一制意犯緣悉同可知文分二初至久住明結戒相略舉三文一略舉犯文二告言已下還是制廣補略三集十句下招生十利第二欲說戒者已下明說戒相以彰教法文亦有二初明戒本但有四句所以無共同等者答祇五二律悉具八句同於大僧此律文略十律尼戒本同者文不別列故知亦有共同等四也其比丘尼捨戒為成來去無鄣故爾尼中捨者恐在俗汙犯所以須捨如十律說無重出家故彼文問頗有比丘尼捨戒更與受戒不犯耶佛言有若比丘捨戒已轉根作男子與受戒不犯者是第二若比丘尼下廣辨於中文二初解犯相二不犯者下解不犯相前文復二初尼犯相二解四眾犯相前文復二初略解戒本四句成犯二有三處已下廣解二三兩句對三趣行非成犯之相就中復有二初至亦如是犯差相別二若比丘下明輕重相前文復二初舉成犯境緣二若比丘尼下廣辨造境成犯方法境界文二先總舉三趣二復於三種已下望三趣橫列各三三合九謂重非之境成犯文三一自發心犯二若比丘尼下為怨賊逼己造境犯三若比丘尼下為賊怨等逼尼身犯自心犯中分二先造覺境犯後對不覺境犯覺境分三謂男子二形次及黃門男中復三人非人畜生初人中先以三處對人男子境作三句次以隔等四望於三處有十二句下二男亦爾合三十六黃門二形類亦同爾便成一百八句不覺境中分三謂男二形黃門等是男中復三人非人畜生人男復三謂睡眠新死及少分壞等尼自以三處對前作九次加隔等四有成三十六下二男亦爾合一百八句男中既爾餘二形黃門類然併成三百二十四通前覺境都四百三十二句次怨逼中分二先造覺境後對不覺覺分境境分三謂犯男及二形黃門犯中男分三先犯人男謂以自身三處犯男作三句次加樂等六又加隔等四合七十二句下二男亦爾合成二百一十六句二形黃門亦然合成六百四十八句不覺境分三謂男二形黃門男中復中復三人非人畜生人男三謂睡眠新死少分壞等尼以自身三處犯男即九次加樂六句合五十四句又加隔等四句合成二百一十六句餘二男亦爾合成六百四十八句男中既爾二形黃門亦然令一千九百四十四句此謂三个六百四十八合以作法通前覺境合二千五百九十二句第二怨逼中境應通九今且約人三逼已三處即九又加樂等六又加隔等四合成二百一十六句又前樂中文但有五謂於二時不樂中少出時樂前二時不樂句准上僧中故言六樂初自作輕重二教人文三一比丘教尼二尼教尼三餘眾相教問䨱藏他夷還犯夷罪所以教他而犯輕解言教人行非前人未必定隨我教又復容有發露之理故犯蘭罪覆他解義前人先已作過惡心流利但使䨱藏必作不疑既是䨱藏復無發露之義故得夷𠎝又且教人限分中制所以犯蘭䨱是深防中制為是結夷二制既殊所以非類盜戒第二煞戒第三妄語第四摩觸戒第五凡女人之性染愛情深既受摩觸適悅處重又人輕易陵義無自固容成大惡臨危事嶮可壞之甚故方便之內制以深防但使受樂即結夷罪通結如上別緣具六一是人男子二人男子想三俱有染心四掖已下膝已上腕已後身分甄去輕境染微無逼不須深防但得輕罪尼以輕觸男重男以輕境觸尼重亦犯未必要取二俱重境五二身相觸除去衣互有無不犯重故六受樂便犯問尼解男犯夷名深防制者如解衣互有男何故僧尼俱犯蘭罪答女人重境身分生他染強畏致陵逼故方便之中制與重罪名為深防若衣互有無境麤染微陵逼義蘭故使僧尼俱齊限分亦可蘭名通含輕重深防蘭重限分便輕義何有妨分文解釋如大僧無異可以此知緣中文二初明起過第二守房小沙彌尼下呵責戒本六句一犯人二明尼有染心三所摩境界染心男子四從掖已下以其重境受他摩觸文三一出分齊二身相觸者謂俱無衣三若提下摩業五是比丘尼下違教結罪六是身相觸者制名尼摩角戒對僧料簡有四不同一大僧解戒不就陵逼莫問前女死治俱犯尼據陵逼簡死取治二比丘不問女之小大但使受樂亦得殘罪尼取逼義要大非小三比丘觸女但自有染不假前染尼約逼義非但自染要須俱染故此文言受染汙心男子四僧摩前境重輕俱殘是故文言若捉手若捉髮尼唯重境以其得境處深垢情厚重容有陵逼故制重罪若得境處殘垢情微薄復無凌義但得輕𠎝落在八事辨相具釋上五略不解制名下三戒同爾文言掖已下者解第四摩業文三一解上定境深殘二身者已下解身相觸俱無衣語三若提摩下釋上第三列其摩業次第釋初境淺深中問此據已下夷明去掖已上蘭何以故八事中捉手者及至腕蘭解云前就身中辨分齊故言腋下膝上下捉手者就據中以別分齊故言腕已上夷腕已下蘭五分摩髮際已下膝已上肘已夷男作男想已下釋第五結罪文二初至突吉羅解成犯相二若比丘尼已下輕重相前文有三初至偷蘭遮二俱無衣樂重犯夷二男作男想已下互俱則情涉得偷蘭遮咸是方便有趣重勢故未必同僧三男作男想已下俱則情薄犯突吉羅其間是非癈立多少一同比丘而可知唯除死等三境不犯俱無衣中五及俱設有九九業各爾合八十一夷是男疑八十一蘭餘之二位通不受樂故並說合一百六十二也重輕文五一當趣就業二異趣三女人已下約其形報四男子提足禮下境心有無五境想五句八事成重戒第六前戒得境處深染情垢重故制深防一觸成重此戒亦是染心所為觸境處淺染心微薄要假八事相資過集積增垢情轉著趣重必然故須抑制滿八成重別緣具五一人男子二人男子想三俱有染心四犯前七事未懺悔五作第八事便犯若八過捉手不成重罪以事是一故或一男犯八或八男犯八若一時犯八乃至八年犯八亦無次第但使滿八皆攬成重戒本六句一人二內有染心三犯之境界四受捉手已下正作八事五結罪六制名辨相亦解上五捉手者已下釋第四八事上二觸境下六非觸入屏處下四在屏處餘非屏處彼比丘尼下解第五結罪文言以為樂者釋成八事並以染情著境故言為樂問下入闇室入屏障處犯提何意此中犯蘭解下對譏過不待俱染但犯提罪此謂俱染容成大惡故悉犯蘭次天子已下異趣次女人者下形報以辨下不犯中八事別開問下入闇室犯提此開不犯答下下無所為涉譏犯提此有福緣布施求法懺洗之流故令無過䨱比丘尼重罪戒第七出家尼眾遞相禁約使離過行成光顯僧眾今知他犯重故相容匿致犯劇淪陷前人白壞損僧汙辱不次故加深防制重夷罪別緣具六一是大尼甄下二眾罪名輕故䨱不成重二犯重除犯下四初篇罪重一刑永鄣故須深防制䨱成重下四可悔不須深防限分中制䨱同大僧三知犯重甄去不知不識名種不成䨱故四作䨱藏心甄去入護心無記心不犯故護心有兩一者自護雖䨱不犯律之若說者有命難梵行難不得說不犯祇律若比丘尼見比丘尼犯重應向人說若犯罪人凶惡可畏有勢力恐有命梵難者當作是念言行業果報彼自應知自勑身心寧死不犯喻如失父燒舍但當自救焉知舍即為是䨱車之誡何有過哉若不善心中奄遏前罪不令外聞是名䨱藏心五不發露甄去作法發露不犯若發露者要對未知者成若彼已知俱有遏若對發露者不須更別發露有無窮過故如尼犯第八諫竟成犯大眾咸作䨱心亦成䨱藏不得亦向發露若彼犯者即向此眾發露不成以俱有覆過故若大眾不作䨱心向發露得成若犯人發露竟餘人皆不成䨱以根本發露故六明相出犯滿足戒本六句一人二知他犯重三不自發露下正明不發露不自發露者不對一人不語眾人謂不對二三人不白大眾者不向僧發露四後於異時下自言引䨱五是比丘尼下違教結罪六䨱藏重罪故者制以立名辨相解前五句初句可知者已下解第二僧已下解第三言僧者解不滿戒本大眾者下解滿戒本此正一義梵漢別故言休道者下釋第四自言但文五句此亦五舉前二戒本中釋之尋而可知彼比丘尼是已下釋第五結罪於中文三一䨱尼有二一重二輕二自䨱重罪蘭以深防氣分故問所以大僧自䨱夷罪犯吉尼自覆蘭解言比丘限分故唯犯吉尼自䨱蘭生他䨱夷深防少分故不相類三䨱餘下眾累無境想五分䨱從晨朝王初夜初分時時皆吉從初夜初分至明相未出時皆蘭至明相出夷隨順被舉比丘違尼僧三諫戒第八不聽隨順者有三種過故長彼耶見永無懺悔改過從善二同彼染著自壞心行三大僧舉竟不聽共語輙便隨順違法惱僧犯突吉羅二解諫意然此比丘尼倚傍八敬又倚佛教開親不犯故文言此是我兄今不供養更待何時堅執此二相濫難分須僧說諫開示是非敬教及開親者謂是正見清淨比丘有法益尼可須虔奉雖可是親耶見心成無法益尼不得隨順開曉心壞識是須敬非者不須冀彼改迷從正棄惡就善故也祇律我是其母是我所生是故隨順五分此是我弟十律此比丘姉妹七人出家作尼故或言兄第等三僧既設諫是非理分固執己心不肯從勸違法惱僧過是不輕故結重夷別緣具六一是被舉比丘二知被舉不捨不懺三隨順四尼眾如法設諫五拒而不從六三羯磨竟問所以隨順被舉比丘須諫隨被舉尼不須諫何須答佛教制尼恭敬大僧濫故須諫同類無濫故不須諫料文分齊如上可知戒本六句一諫所為事文三一人二知被舉比丘四句一僧舉如法二不順從三未懺悔四未解下文具解三而隨順者正諫家所為第二諸比丘尼下屏諫第三拒屏諫四彼比丘尼下僧諫五若不捨者下結違諫罪六制名此等四戒並別制名者釋成結夷但是深防故辨相具解上五比丘說可知若未白前隨被舉比丘一切突吉羅者問等是隨順僧尼兩眾已有諫不諫別何以隨順復提吉不同答尼是同類假伴行宿隨順義數是故第三犯提前二犯吉比丘非類為伴義絕故隨三舉並得吉羅此是總言今隨闡陀同尼犯吉以前二舉故比丘突吉羅者比丘於尼既無倚傍為之義希設若隨尼犯吉不諫尼十七僧殘法七門料簡一例名數多沙定能犯人二身口三自作教人四性遮五持犯六二部同異七下眾任運此律十七祇律十九謂此令獨戒離二謗違諫故十七戒祇中離三獨戒合二謗加父母夫主不聽輙度故成十九也人位有三謂解舉助破此二僧犯不同可知亦可助破亦別可知次有四戒人通三位謂媒言二謗次有十一唯別人犯謂獨受等第二門身口身口位三獨受二戒唯身業犯二有九戒是其口犯謂勸受口作犯八諫口止違三有六戒該通兩業於中位四度賊一戒自身假他口解舉一戒若秉法者其唯口犯餘僧同度賊身假他口若論二謗口正身兼媒言二戒身口正犯第三門自作教人位約為四勸受一戒專教人業二謗兩戒同比丘判媒言兩戒自作正犯教人同不同餘之十二自重教輕即是五戒有教人同犯第四門性遮遮唯媒戒餘並性惡第五門度賊解舉此之二戒具兩持犯如度賊若白王大臣等名為作持若令不度是其止持不白王大臣等名為止犯而度受具是其作犯解舉亦爾若白眾僧僧聽解者名為作持或令不解謂是止持今不白僧故說止犯而復解舉豈非犯自餘十五心持作犯第六門七戒同犯餘十不同十不同中自習近住違尼三諫中言比丘隨所犯謂䨱罪等故爾自外九戒比丘並吉所以可知是中輕重有無推而可識第七門即上教人五中除勸受一餘之四戒得教人作容有任運勸受一者文唯自教言了犯故前九初犯八乃至三諫九初犯中前三同故略出戒本後六不同一一別釋言人戒四所以不聽言人者有三過故一出家之人應懷四等陳辭舉告損惱前人即非益物二者女人之性理無外涉是非難究不閑進否雖理灼然言不自雪醜累佛法譏損處重三自壞心行鄣道根本具斯諸過故所以制通緣如上別緣有四一詣格人斷事官所二言白衣居士三辭列其事四官人下手疏犯緣起之中言他呵制戒本文三一對言他略制戒本二牒制隨開謂被他言聽往官所於中文五初為他言佛開對事二時彼尼已下限陳其事三諸斷事官下斷官錯判四時諸比丘下聖決是非前施是施後施非法此謂如法人故五波斯王下依佛判故治斷事官女人少解理不自申詣官醜損事在於此三滿足戒本五句一人二詣官言三居士所言境界四出其時節五是比丘尼下結犯尼是少知並言應捨五分若尼為人輕陵應語父母或親族者或比丘比丘尼憂婆塞憂婆夷有力勢者語時應言彼經陵我為呵我諫不應言之若詣官言人一往反一殘辨相具解上三別釋若比丘尼下合解下二比丘譏損義微故吉不犯中更無餘開明為三寶亦在犯限度賊女戒第五出家尼眾理宜勝人崇集光顯僧眾外長信敬今此女人身行不端過狀外彰既羅公網輙度出家招致譏醜汙辱處深損壞不輕故所以制別緣具六一是賊女罪應死者二知是三不問王大臣四度與受具五和上尼六三羯磨竟滿足戒本五句一人二知是賊女三人所知四不白王等五便度已下違教結罪辨相中多人知者下解第三不依人下解第四彼比丘尼下釋第五和上主重餘眾犯輕十律和上殘餘師偷蘭五分三羯磨未竟一切吉竟者羯磨師一殘餘師偷蘭又此言三羯磨竟和上殘者謂約比丘羯磨應非本法以彼未竟故諸度人戒咸准斯釋僧不須伴度希故吉人可即度此女故言吉羅界外輙解三舉戒第六輙解舉者有三種過一前比丘尼耶心成就鄣於學路僧既治罸情見未捨偏心輙解長彼耶見永無懺悔改過從善二容同彼見自壞心行三輕尼違法惱僧具斯諸過故制殘罪問輙解成不一解有心乞領是故成解不同淨地無心領受羯磨法故是以不成問若解舉須問有心領受輙成解者三舉治人無心領受治不成治然治成治不問心者非法解舉何獨問心今釋但使如法僧秉治解俱成非法背僧解治不成若當背僧作法成解惡人無有可治之義善人無有得食之理故下文言解者是不淨不解者淨別緣具六一前人有三舉事二尼僧如法舉三未隨順未悔懺四輙與解謂不白僧僧不約束五無因緣謂僧移或死違行休道賊將水漂等緣亦不犯故六三羯磨竟犯戒本四句一人二知尼僧所舉未隨順等四句一為僧舉如法二不順從三未懺悔四未為解三為愛已下不白眾僧四出界外已下輙解結罪辨相僧者已下解二句愛故不問下釋第三句出界外下解第四結罪句但豫羯磨俱犯僧殘又不牒師名即無主伴故同一殘謂是僧犯不同度賊有主伴別故罪有階降殘蘭之異五分未羯磨竟一切吉竟者羯磨師一殘餘師偷蘭十律和上殘餘師偷蘭比丘吉羅以不須伴故解舉希吉四獨戒第七凡女人志弱事無獨立人輕易陵容成大惡假伴相授方能離過故制不聽獨水是難處夜分姧非村是俗男所居曠野及道容有惡緣故並皆制獨犯僧殘獨度河別緣有四一是河水二獨度若前尼疾疾入水蘭獨越河過雙脚上堓犯僧殘後尼獨入蘭上堓時前尼為伴不犯僧殘若二人俱入水俱上堓無犯或乘車畜等無度河威儀並是不犯三無因緣甄去命梵難等伴命終賊將去等緣不犯故四獨越河過便無犯伴既隔河脫有難起不能相救故爾人言水為難體不對人陵故文言水者獨不能渡此義不然與緣起文違獨行入村別緣具四一是俗人村落無問大界裏村及藍內村獨入皆犯生難處強故二獨入甄共伴不犯三無因緣除二難伴命終等不犯四越界便犯若至村門不待後伴䨱足入村門犯若村中先有尼則不犯以前尼為伴故若入城門亦爾若真直過者隨越村界分齊無村十里犯戒獨宿別緣有三一離申手處宿甄去申手內不犯尼寺及村同牀別牀要申手內如祇互相撿挍不問此律若申手外悉犯僧殘本相近後若睡相遠無情過故所以無犯二無因緣謂二難伴大小行來樂靜作業等不犯三隨脇轉側一一殘罪獨在後行別緣有四一在道行二捨伴見聞若見聞互離應輕三無因緣謂二難伴命終賊將水所漂等不犯四行便犯戒本三句一人二別其四獨三是比丘尼下結犯下辨相中解三二兩句還為四文渡水中先出河水但言獨不能渡不論廣狹深淺但使脫脚褰衣而渡異陸行威儀皆犯僧殘不須准五分解又界及藍裏有河俱犯彼比丘尼下辨犯初明殘法中先教不犯法後彰犯法文言疾疾入水殘者此是渡過非入即犯次明蘭法先此堓不犯犯後若至彼已下彼堓不犯犯此等以非令渡故結蘭罪入村中先教不犯若比丘尼下明其犯法有二先明殘法二句文言至村殘者謂入村殘及越村殘言無道處行者謂無道分齊故取皷聲如上同行無村道處十里如摩登耆經七弓弓長四肘肘有二十四指為一鼓聲間後蘭法二句可知宿文有二先藍中宿不犯犯法次村中宿不犯犯法獨在後行亦有不犯犯法不犯中具開上四上二文顯三若二尼共宿下開藍內宿有此緣不犯四與二尼共行下開前獨行五若一尼大小行下開村中宿五分亦有四獨水者廣十肘深半䏶殘共伴行在後老病疲不及伴不犯獨行無聚落半由旬若有聚落從一聚落至一聚落皆殘十律獨宿從日沒獨至地了殘如是從初中後外各三時獨宿至地了殘獨行者若夜若晝夜者從地了去至日沒時來殘如是從日出時食時禺中日中日晡日沒時去至日沒已來還皆殘獨入村者若晝若夜有水道陸道獨行往聚落殘若無聚落空地乃至一拘盧舍殘獨渡水者有河水池水渡有脫衣渡不脫衣渡脫衣河水殘塞衣渡河水蘭脫衣渡池水蘭塞衣渡池水吉祇獨行者若捨伴下道出界犯殘若道中垣在申手內若離申手外一足過蘭二足過殘若餘人中間過者蘭獨宿一夜三往手相尋者當初中後夜雖一時頓三不聽
