body:
  text: 第二次辨受體四門料簡第一釋名出體二戒先後第二受隨同異第三辨發戒緣三世唯現在心得防三世非第四所發無作頭數多少第一門中復為三門一列數釋名二次辨體三明先後初門復二一列數釋名者戒相雖衆義要二種一曰作戒二無作先釋別名作與無作次解通名所目之戒言作者謂方便身口起動造趣稱之為作故心論言作者身動身方便言無作者身動滅已與餘識俱彼法隨生名為無作如善受戒穢汙無記心現在前善戒隨生惡戒亦爾次釋通名戒者此作無作俱為懸防咸稱為戒依善生依善生經通為五名一名為制制斷一切諸不善故故名戒又名迮隘雖為諸惡性等容受故名戒又名清涼遮煩惱熱令不入故又名為上能上天堂至無上道又名學調伏心智故名為戒此五咸是義用得名是故從用立名稱之為戒然復五中迮溢清涼是義名餘三用名又依心論波羅提木叉律儀作時即彼剎那無作為七種名彼一切惡戒對治名為律儀二防護惡戒故入七衆故名彼羅提木叉律儀若言防護惡戒者辨律儀義入七衆者翻木叉義義名解脫以入七衆數不為惡衆縛故名解脫三於一生衆生所得故善作故名為妙行四得愛果故思願道故名為業道五最初隨順解脫故名波羅提木叉六作所起故名業七名尸羅者淳善不害心起故後諸無作為五種名除波羅提木叉以非前故除業道思故願後此七名中第五從果立名第六從因受稱餘五義用立名此等諸名通作無作故但今從用且名為戒第二引證問所以知為作無作者心論云第三羯磨一剎那作及無作根本業道又根本業無作或復説又為作云身口作前二為對身口無作俱不可見無對多云初念戒為身口教及無教第二念唯為無教無為為教又十住毗婆沙云律儀善根為二種一者為作二者無作作者是色無作非色非心以斯文證明知戒二問所以要須作無作者答若無其作無作無所從生若無無作不可一形防非故須兩戒此位言耳如上法得戒以道力故得無作戒第二定二戒體先依多論並是色法為體若解此義可為六門一為無分別二為為中三聚分別三色聚中三色分別四就色聲中報方便分別五三性分別六始終分別先解第一為無分別者二戒俱是為為法聚非三無為第二為為法中三聚分別者作無作戒並色法為體心及四相不相應法是其戒因故論云作及無作假色是分別色陰又涅槃經云以是無作色因緣故故知唯色所以然者良由聲聞力劣但防身口故發戒之時還從身口獲無作色以防七支故作無作並局是色第三色聚之中三色分別一可見有對色謂色入二不可見有對色謂五根四塵三不見無對色謂法入中無作若言作戒前二色收無作戒者第三色攝故伽心二論云身作可見為對口作不可見為對身口無作俱不可見無對非三為對故名無對以無作戒法入法界中攝是故非三為對三為對義此應廣説但三色中義猶寬通故須局定論其身作前二色中唯色入攝口作戒者是聲入收非餘八色其二無作並法入攝此作無作俱是色陰第四就色聲等中報方便分別色雖通報及方便然身作是方便非報故心論云作者身動身方便口作唯方便以聲非報法故問身作是方便非報者一色者二色何異答報與方便亦一亦異鼓動報故而成方便義言為一如離水外無別為波但報酬往因故是無記方便現起體通三性復是其異如水濕為性波以風動為性以斯異故唯取方便為作戒體身口二無作非報非方便故涅槃經非異色因不作異色因果非異色因謂非報色報色是方便色因報非方便故言為異非異色果謂非方便方便是報色果方便非報故稱為異故知無作非報非方便又更一釋作既方便非報無作異前明知非是報色及方便色然經文未必證成非報非方便義今解異色因等者唯就方便色中辨之如彼經説菩提王子意疑比丘餘二性中所以不名失戒佛即答言非異色因非異色因果其心雖在惡無記中本所受戒不名漏失言非異色因謂非受中之作以彼作者但一念故不作異色因果者謂非隨行之中及以處中作與無作以彼作無作短故既非此二仍是比丘明知為彼受中無作形俱長故縱入餘心不名失戒故言非異色因非異色因果第五方便色聲等三性分別者身口色聲是善非餘兩故心論云以善清淨心動於身口名善作等即問初色為二十種前十二唯無記後八高下長短方圓正不正通三性局取善邊身作戒體三聲之中謂除第二因不受四大聲如風鈴等唯無記故就初因受四大聲第三因俱聲此二通三性中亦取善聲邊為口作體泛論身口無作通於二性今論戒故是善性攝第六始終分別此善作中通於始終取終不取始謂始從請師終至羯磨未竟要心未熟善而非戒第三羯磨一剎那頃要期心滿思願成就善而是戒故局取終然為人立義始終通取為作戒體若局第三一念者前兩不如亦應發戒故知通取又身口之體俱色然當時身止之色為眼所得口止之業非耳所得若局取第三當時無聲可無口作戒體故須通取方便淳熟至此但諸論師剋取論文第三剎那是作戒體方便非者令無口戒亦可唯局第三不妨而得口業之體此即互造謂因身作得口作業第二德宗解二戒體無作戒者定用非色非心為體是故論云已知無作非心為是色為是心不相應行邪答是心不相應行陰所攝以色等五法是無記性無作非無記故又色等是惱壞性無作非惱壞故故知無作定非色心但作戒者取文不定或為取文色心為體故論文言口業者非直音聲要以心力助成故知身業亦以心力助成明知二業色心為體又引論文以心為體故論言離心無思無身口業故知二業用心為體又解色為身口業體故論云身口業依止四大意業依心若身業非四大為體性者意業依心亦不應以心為體然意業依心故即説意業用心為體故知身業以四大動為業業無別體即用四大作體口業者四大相擊於中出聲聲成音曲為所表彰以為名字句用此名字句為口作業業無別體用聲作體是以論云是法名聲性法入所攝故以遠從四大生故名依止四大即聲成成故用聲為體身業近依四大故即用所依止為體問若色為作業體者何故論云口業者非直音聲要力以心助成答此以聲為業體以心助名成字句用此名字句以為口業心是助業之因非是業體問論言離心無思無身口業而心為思體身口業亦不離心亦應用心為身口業體邪答此破外人義思與心同時別體故言心即是思然心不必思思必是心故亦破外道身口二業不假心助故説離心無身口業問色即無記色陰攝作戒善惡性行陰收如何善惡用無記法為體答以不即不離故不即故作戒是善惡色是無記陰攝不同以不離故色動名業動無別體用色為體聲成名字句此名字句以為口業此名字句無別體即用聲為體是以論云是法名聲性法入所攝故如似四相即於色心用色心為體色是色入等四相及今根是法入攝此亦同爾問色等是無記無作是善惡性是故不用色為體作戒亦是善惡性何因用色為體答無作問一在後作戒所依色滅盡已然始續生若以色為體則定是色若是色者則是無記故不以色為體作戒與所依色同時而生體用相依不即不離故用無別體故言作戒用色為體問第三羯磨竟時身業為眼意所得可使説有身作戒體口業依聲名句之業既不為耳意所得應無口作戒體答身業依色然青黃等為眼所得故即青黃長短等業亦為意所得即是身作業體口業依聲聲雖無記而是方便不可當為故不為耳得以無即業之聲故此口業非意所得雖可第三竟時身業為眼意所得而口業不為耳意所得俱以遠從要期生故並有二業之體亦可身能互造口業或口作得身業等第三二戒先後者依心論説似一時得故文言第三一念作及無作根本業道又多云初念戒為教及為無教後次第生戒但為無教無為為教故知一時然無作三時為非戒者一者同時無作但是作俱非今戒體二是果時無作無作為二一是作俱二是形俱形俱一種方是戒體三謂果後唯局形俱此是戒體以其果時為形俱故明一時得若依此宗似先後故成實云問曰云何名為無作答第二念須名為無作以作戒為初念故名無作為第二念唯羯磨竟所為無作是茲戒體前二時中位是作俱所攝又善生經方便心異作時心異衆緣和合得名為作以作因緣發生無作作已過去唯為無作其心雖在惡無記中本所作業不名漏失據斯以辨明先後發第二受隨同異昔解受隨義一譬如一楯能捍衆敵為破斯義故立此門受隨二法並作無作先解無作無作多種作俱事在從用異緣心俱欲俱要期助緣形俱等位可為三形俱定受前六局隨要期助緣二通受隨助緣通受者如遣信受因使得故亦為人解七種無作二定共無作三形俱四要期如日夜及處中要期等五隨業無作如隨戒無及作處中隨作業發者是六事在如塔常橋船等事在時念念發無作等七隨用無作即前事在為人用時復發無作者是或可更之助緣互緣無作者義推不異前七故但為七就此七中形俱定受要期通二餘五定隨次辨同異受隨無作同義為三謂名體義異便為六第一受中無作義均一品隨中無作乃為優劣第二總別第三懸對第四短長第五三性為無第六根條兩別言受中無作一品者若本上品心受所發無作心增上故戒亦上品或容犯罪或終至羅漢更無增減以其酬本一品心故中下心受義亦同然三品為定故言義均一品問所防五篇輕重為殊所以能防體均一品答受戒之時一品心中總斷一切惡意心因既是一品致所發無作酬一品心因故無五品之別然所防之罪非是一心備犯五篇蓋是託事先後而犯心為濃淡境為優劣犯為輕重五品之別故不相類問若言一品何為肥羸答今言肥羸乃至望隨行為隨資受説受作肥若無隨行顯受無力名受為羸為以肥羸望隨為無故戒體猶一品故羅漢人成就下戒云何優劣隨中無作隨事修成所防罪事既為五篇之殊致能治之行所發無作亦五品優劣又後根本上品心受得上品無作還起上品心持持亦上品若次下心持持還次下中下心受持各為三類亦如是隨中無作多品不定故為優劣對五篇辨此優劣者若就根條初勝乃至五劣若自分勝進五勝乃至初劣即應五篇次第之義又可一一篇一一戒心為增微事別不等即有九品之持故隨無作為斯階降第二總別受中無作發心總斷一切惡意於生非生數頓得律儀故稱為總隨行無作次第漸成不可頓起故名為別第三懸對受中無作懸為防非未即行持中無作對事防非行成皎潔問懸未為非對即隨行受為何用答若無其受隨不成隨以共成一治故第四長短受是形俱説之為長持行無作從修行發非形俱故目之為短第五有無者受中無作通三性體唯是善隨無作者體非二性亦不通兩此據剋性分別受隨俱善便二並狹今約有無有通不通受是形俱通在餘二性中故説為寬隨是作俱等局善性中所以言狹此就一心自作為言若先後心及以教人餘二性中隨亦通為如教相所詮犯不犯中亦同此狹故犯行中無不犯行若通就先後心及教人犯行中亦為不犯行此即受隨俱寬作此解者然須約以為三若局善性俱狹受隨同善性故若隨中教人等俱寬以通三性故若以自作隨行對受分別方為寬狹此準多論有四五不同若依實論不別寬狹長短然後受中無作定是長寬隨無作者具於二種以道無作寬長故爾第六受是根本隨是枝條第二次解二作同義有五謂名體義寬狹長短等不同為四一一品多品二總別三亦懸對四亦根條比説可知既有此殊豈同昔解受隨義一第三緣境發戒若薩婆多別解脫戒唯緣現在以過未非衆生故若防通根本眷屬不同禪無漏通於三世唯局根本若也曇無德宗發戒之時不在過未心得戒以非衆生數故現在相續心中發戒以是衆生然受戒時要須三世境所為之惡皆作斷方能發戒還防三世境上非所以然者過去之境能生惡心故論云如人供養過去所尊是亦得福律儀亦爾未來之境亦生惡心故須普緣總作斷意方能發戒又若過未不發戒者三世諸佛戒不齊等以其諸佛戒品齊等故緣三世以發戒也問戒防未非毗尼終已起何故得言緣三世境發還防三世非也答境雖過去非非過去以斯義故猶防未非第四發戒多少語戒雖衆不過二種謂作無作作已過去唯為無作一形相續此無作戒乃為多品以所防之惡既為無量戒寧是一故多論云於一切衆生數非衆生數而發律儀言於衆生數者上至非想下至阿鼻可殺不可殺可誑不可誑等一一衆生乃至如來就根本而言不過為身口七惡三因緣故一貪故起七二瞋故起七三癡故起七三七二十一惡對防此惡受戒之時謂從無貪等三善根心各得身口七支合二十一種戒善乃至三千大千一一衆生皆亦如是若十戒五戒得十二種戒故故心多二論於一切衆生一切時戒不斷或十二種或二十一種故經云衆生無邊戒亦無邊若非衆生數乃至草草木生種大地非法衣食等及一一罪處本受戒時要期不作還得爾所戒善功德故善生經云大地等無邊戒亦無邊出家僧尼佛聖弟子位尊人天實由於此又準了論四萬二千福河謂四萬二千學處一切恆流其猶河水灑除破戒煩惱言四萬二千者根本戒為四百二十所以爾者如婆藪此律戒為二百多明輕戒優婆提舍戒為一百二十一多明重戒比丘尼別戒九十九合成四百二十是一一戒為攝僧等十功德一一功德能生十種正行謂信等五根無貪等三善根及身口二護一戒即百合戒為四百二十豈非四萬二千又解無願毗尼者謂第三羯磨竟時四萬二千學處一時並起無一戒不生故稱無願據斯以驗故知戒量不可稱數問僧尼二衆戒數各別何以無願毗尼真言四萬二千邪一解此據總二衆以説若取實理各隨本戒又釋以轉根義證俱為四萬二千受戒法問門竟自下隨戒寄文中説第三解律題名言四分者蓋是一百年後之名百年已前總為一部大毗尼藏未有此名若欲料簡分不分義可為四門第一如來本制已有五意不分之義二解佛説法及以時節三解佛去世後五師任持四解分為五部次解初門佛從鹿苑終訖雙林隨根制戒少有差殊良由衆生根器不同樂聞有異致聖制輕重緩急差如祇父母夫主不聽輒度僧殘此律犯提又涅槃云或説偷蘭以為四重或説四重以為偷蘭何故世尊作不定説如四錢三角祇説蘭為夷此律説夷為蘭如此律謗二衆俱互並得殘罪十律謗尼犯吉此即説殘為吉吉為殘也乃至犯不犯等皆有差降制雖輕重而各稱根性奉行之益以斯文證明知聖制本有五意所以不分者一教主是一共誰諍競而得分五二者所被衆生不相是非各目體解隨化差別以斯二義總為一部大毗尼藏又遺教三昧經佛因羅旬喻比丘現在分僧五部服色者此乃一部隨機之説然説未分處衆且依前文等次解第二如來在世但説略教不説廣教所以爾者略教法輪言雖是略理處包含通於輕重是以如來説此總教通被五種衆生各稱根性皆為奉行之益故但説略廣有五差輕重不等若為説廣益利不普是以見云一切諸佛但説教授波羅提木叉不説威德波羅提木叉略無名種但名教授廣有名種令怖而不造稱為威德又戒經云為無事僧説是戒經故知説略然説之時節經論不定依祇五年已前為無事僧説於略教五年已後因犯制廣行不清淨不得聞戒付諸弟子説廣略二教見論如來成道二十年前説教授木叉二十年後付諸弟子説威德木叉若此律十誦增一阿含十二年前為無事僧説是略教從是已後廣分別説付諸弟子蓋隨根同所見異故亦可僧祇五年制廣時節餘文見論説之時分所以見論不同者或可十二二十此是言到且從經律十二為正問五年制廣便是有事如何乃言十二年前為無事僧答廣教雖興最初無過猶名無事如下正説文證可知第三五師任持者大聖化緣既周衆生感盡將欲涅槃以三藏法付大迦葉於佛滅後任持理行二教具足無缺將欲滅度即以此法付屬阿難於雞足山現十八變立誓入滅盡定待彌勒佛出世阿難有二弟子一名商那和修二名末田地阿難將欲滅度付此二人三藏教法付屬已竟在恆水中船上入滅商那和修在中國教化末田地在罽賓國流通商那和修將欲滅度復以此法付屬憂波毱多此人善能説法度人無量但無三十二相時人號為無相好佛傳通聖教具足無缺然此五人皆懷明內朗體道殊方任持聖教秉宗被時仍令一部大毗尼藏號八十誦第四分為五部者依三藏傳云一百年後分五部二百年後分為十二部四百年後分十八部分五部者憂波毱多在世末後育王大集論師共論佛法是時諸人各情見不同為所偏執毱多不能刊正遂分此藏以為五典如釋論云毱多即受持十誦在罽賓國流通故名罽賓律師此亦一經所明大集經云佛告憍陳如我涅槃後我諸弟子顛倒解義顛倒説法名曇摩毱多法名四分受後三世及以內外凡所問難悉能答對是故名為薩婆帝婆此名三世有法名十誦説無有我及以受者轉諸煩惱猶如死尸是故名為迦葉毗部此名解衆生解脫但有戒本不作地相水火風相虗空識相是故名彌沙塞部此名廣解義法名五分廣博遍覽五部經書是故名為婆蘇富羅此名衆首法是摩訶僧祇此名大所持善男子如是五部雖名有異而皆不妨諸佛法界及大涅槃四分之名至此方生分為十二部者薩婆多部中分出婆蹉婆蹉部中復出三部一名法上二名賢三名六識此本末合五迦葉遺中分出二部一僧伽提二淺摩提本末合三以三配五合八彌沙塞部分出一部名中間見以二配八合為十部曇無德僧祇此二不分通前合有十二部分十八部者但僧祇部中分出六部一名唯迹二名彌多三名施設四名毗陀五施羅六名止施羅六兼十二合十八部文殊問經為二十部云何分別部云何根本部佛言根本部二一摩訶僧祇老少同會共集律故二名體毗履老宿共集此律一百年後此二部起於二百歲中僧祇出七部一名執一切語言二出世間語言三高拘梨柯是律主姓四多門多門智故五只底柯六東山七北山此三所居處此七從祇展轉相生非一時俱從祇出於百歲中從體毗履出十一部一一切語言二雪山律主所居之處三名犢子是姓四名法勝五名名賢此二是名六一切所貴為人重故七芿山是處八大不可棄律主初生母棄於井父追尋之雖墮不死九法護名也十迦葉毗姓十一修妬路執此義故此十一亦展轉從生非一時合二十部偈言摩訶僧祇部分別出為七體毗履十二是謂二十部十八及本二悉從大乘出無是亦無非我説未來起此經所明亦不杆五部辨別故來隨文釋中文雖浩博聖凡見異分釋多種如增五文毗尼五答一序謂知時已前二制謂僧戒本三重制謂尼戒本四修多羅犍度下是五隨順修多羅謂調部已下又結集文亦以為五謂比丘律尼律犍度條部毗尼增一以為毗尼藏今且分三謂序正流通定三文者第一從初至知時來明其序分第二從毗舍離已下是其正宗第三五百結集已下是流通分次釋三名顯宗由致發起之端稱之為序正序正明犯以不犯輕重等相被時之益正當聖意當於序興又當機感故曰正宗法傳季世目之為流流而不擁名之為通故曰流通次釋所以者説經制戒必為由藉故須序序分既彰宜宣宗本故次正宗正説之文豈唯現在亦欲開演大文流傳像季末代等聞企渴同悟故須流通就前序中復分為二初盡偈來正明律主將欲流傳聖教被及遐代恐時不信歸敬三寶歎戒功能勸信奉修序第二蘇羅婆已下請制發起序於斯二序六門解釋一明二序意三義故爾一人為師徒謂曇無德如來之別二時為現未三經體不同如來經者出於金口曇無德經傳於竹素以斯三異得為三經經故為二須立二序第二序名不同謂就法以辨勸信發起若也約人曇無如來雖名為殊且約前説第三總別偈序是別長行是總總別可知第四所明旨異流演聖教非信不傳故此偈序寄歎戒功勸信奉修以明序義蘇羅婆下大聖制戒非請不陳故須啓請以彰發起第五先後次第問發起前及在後謂勸信偈後回在前明所以爾者人解若發起序前二種不便一彰身子請序隔於勸信發起不便二顯曇無勸信不具若勸信前明順前兩義故回發起次於後説又可不勞為妨理而言之勸信之偈乃在流通事後何以不對正宗等以辨先後故知不爾但勸信雖後位須前明第六隨文釋偈文分三初稽首禮三字是云何敬敬之儀式二諸佛已下七字是何所敬顯所敬境三今演已下是何故敬彰其敬意所謂略廣歎戒勸信欲解三文先釋其義三門分別一能敬體二所敬體三辨敬意第一能敬者謂律主等行者身口意業身業恭敬口業稱揚讚歎意業信敬尊重此就業具成身口意若局明敬體其唯信數二所敬體者即是三寶謂佛法僧佛者西音此方稱覺具一切智通達諸法自覺覺人故名為佛法者為二義一就體解法法名目體二就用名法行者軌則所言僧者亦是西音此名和合衆謂四人已上於理於事絶去違諍名和合衆通名寶者斯之三種世所珍貴咸稱為寶三寶不同略為別相一體之異今此小乘戒律未證真如法界故不論一體就別相中又分大小且就小明如薩婆多説成佛乃為四階第一三僧祇劫修為漏四波羅蜜除禪定般若為種智因第二百劫中修相好因第三最後身出家已後修為漏四禪四無色定斷八地煩惱始從欲界乃至無所為處唯除非想所為漏行欣上猒下方能斷惑非想地無上地可欣為漏行於彼無能故不得斷第四菩提樹下修三十四心次第成佛三十四者見諦為十六心觀欲界四諦法忍法智觀上二界比忍比智先觀欲界苦苦法忍苦法智次觀上二界苦苦比忍苦比智此則苦下四心乃至道諦亦四是為十六於此十六心中四法忍法智不斷煩惱以欲界煩惱修禪時已捨離故四比忍比智斷非想地一地見諦煩惱四禪三無色見諦煩惱先已斷故不須更斷次斷非想修道煩惱凡為九品斷一一品皆為二心一無礙道二解脫道故為十八下之八地修道煩惱修禪定時先已斷故不須更斷於此三十四心前三十三是菩薩學心最後一種佛無學心隨義以論具為三佛無漏五分法身以為法佛父母生身及報生四陰以為報佛化作佛身於餘方施化以為應佛若據大乘此之三種皆是化佛言大乘三佛者三僧祇劫滿金剛心後頓得當住五陰是為報佛真如法界第九淨識本隱今顯以為法身慈悲大願化作色身生兜率天乃至涅槃為化身佛今律主所敬且約小説次明法寶異論四種一是教法所謂三藏十二部經二是理法謂四諦三乘聖人同觀四諦入於聖道三是行法謂戒定慧等四是果法謂盡智無生智二種涅槃次明僧寶謂四向四果諸聲聞衆緣覺菩薩不在僧數緣覺出無佛世無羯磨等法菩薩獨一是故非僧但是法寶所攝若説為福田僧義容可爾非羯磨僧收第三敬意者初先別明敬佛四意一佛是教主將傳聖教寧不致虔表師咨為在二報恩供養三開示僧尼遵奉之儀四請威加護敬法三意一法是所傳之旨真益軌聚故亦宜敬二示遵奉之儀三請威加護敬僧三意一僧有傳持之功益利於我報恩供養二示遵奉之儀三請威加護次總敬三意心論云開發衆生佛法僧念成論云三寶最吉祥故我經初説今律主敬者為演毗尼是其大意次釋三文頭頂暨足身業致虔故曰稽首禮又稽者屈也首者頭也故曰稽首也所禮是何所謂諸佛衆聖非一稱之曰諸宜敬教主而兼禮餘佛者顯教道理均化儀無二諸佛平等故須齊敬佛如前解以上稽首貫下通下二目之為及所及是何謂是法僧法如前解比丘者能成之因僧者所成之衆總別合舉故曰比丘僧比丘西音智論有多義一名乞士二意故乞一為資身長道離邪活命邪命為四一者下口二者仰口三者方口四者維口離此四邪正命自活故曰比丘二為益施主謂僧田行施獲反報之福是故須乞二名破煩惱比名破丘名煩惱能破煩惱故名比丘三曰怖魔能怖於魔及魔人民故名怖魔解比丘竟僧如前釋次釋何敬文分為三初有兩行半偈略歎戒功勸信奉修二今説十句義已下廣歎戒益以彰勸信三末下半偈正明律主歎勸意申重更稽首結竟止彰就前略中復分為四初為半行總申敬意為演毗尼勸時生信稟化相傳為久住之益二次為半行顯己所傳理非私謬親承我師毱多之訓遠稟憂波離之遺誨傳持為由證成可信三為半行略歎戒要勸時敕聽四為一偈但能順教奉修獲益不虗以成耆舊先解初文於茲吐宣故曰今演所演是何謂毗尼法毗尼西音此方稱滅剋滅由於行教就功能彰名故説此教為毗尼法毗尼之名乃為多義如三藏義説一能引生是毗尼義謂第三羯磨竟時能引生四萬二千功德一時並起二能教身口清淨及正直是毗尼義謂離業濁煩惱濁故名身口清淨清淨正直故向涅槃三為滅義是毗尼義性離諸惡業非不生故名滅四引勝故名毗尼謂引俗入道引小入大令凡入聖等五勝人所行是毗尼義謂一切聖人同行此法總攝律教一切都盡既為多義今翻滅者謂能得於滅且當第二向涅槃第三滅義但經教廣略此律八毗尼如增二説祇五毗尼一略謂五篇戒二謂廣謂二部戒三方面如輸奴國聽五事四堅固如受德衣捨五罪五應法謂法和合羯磨夷論五毗尼謂懺悔隨順滅斷捨毗尼等明了論九毗尼一比丘毗尼如故意出不淨等二尼毗尼如獨行等三二部如淫盜等四罪毗尼謂八緣起所生如法對治五惑毗尼如三界五部惑九永斷智及滅者此約滅惑釋毗尼六觸毗尼謂十種學處即沙彌十戒攝未來事所以名欲若受十戒則不得具足此戒是具足方便能攝未來事故名為七無觸毗尼正羯磨竟時四萬二千學處一時並起無復一戒不生故名無觸八一處毗尼如受戒洗浴等處為二義一國土為處如邊方開等十二時即為處如昔三歸得戒今即不得者是中就時謂中國熱時便聽等九一切處毗尼如不殺等一切處共學伽論為十毗尼謂比丘比丘尼具分少分處一切處滅三毒滅罪滅諍等斯等名數教門廣略攝此行教義無不周今解毗尼隨舉一數以消此文故曰今演毗尼法衆行之執稱為正法法由人弘人能通法法在人故更興不墜故曰令正法久住故祇律初云欲建立佛法當盡受持此律二令正法久住者三不欲為所疑悔請問他人四為諸破戒僧尼犯罪恐怖為作依怙五欲遊化諸方而無礙者為得此五事利故篤信男子當盡受持此律既獲斯五故得久住又見論云持律五事利一自能持戒二能斷他疑三入衆無畏四建立正法五正法久住亦同此説第二憂波為首者親餐聖説傳通之初稱之曰首及餘者謂五師皆阿羅漢具二解脫故言身證者問五師傳持中無憂波離名今此並彰其義何也答曰五師善解理行二教故標其名憂波但解行教不達理教非是具足傳通故沒名不彰此律中直欲流通行教故律主並引證傳為由顯成可信義問何故此引憂波戒經云首舉其七佛答此列憂波稟承次第故爾以不親奉佛説故不引七佛但戒從此出不須重引稟承通説略教故引七佛次第三於茲宣吐故言今略説歎戒功能滅惡生善出離中勝稱曰要義咸皆也餐採之徒非一曰諸並為和直之行稱賢冀仁者齊去詳餐故言咸共聽次解第四深戒者解為三種一明戒善體幽理玄津潤無涯名之曰深二者能發生定慧深解三者能防三業深重之故名為深説必被物非器不益一為專精自利故言為樂持戒者二為稟行兼益名曰諷誦自行善成剋用屬己名之曰利開己所得令他獲潤目之為益益利非一曰諸二行具足以成耆舊名曰長老自下第二廣歎戒益上文雖言深要其狀未顯難以寄意故下廣彰深要之相就中為二初為三初為三偈法説戒利舉宗以勸修法説相微理隱難識自非喻況無由可曉是以第二衆山已下廣明喻説戒益殊狀持則為益十利功德剋之不虗毀則為損三塗火鑊必趣不疑汝等云何不棄損以就益捨惡以行善初法説為三第一半偈總舉利數結法屬人第二兩偈廣彰利體第三半偈結成如來制戒本意原在斯益然戒利塵沙何限斯十且就一方化儀略標二五故稱為十詮利之文表彰曰句句下所詮功德曰義次明第二十利體相下為正文不繁廣釋略屬而已令僧喜永安者第二第三利攝取於僧初利不信者令信第四已信者增廣第五斷不持戒者第六令邪道入正第八第九利慚愧者第七久住第十次第三原制戒之意為在斯益故今結言是以世最勝等釋第二喻説其文為四初至羅云已來喻嘆戒法能生善滅惡善調三業生善滅惡託教以立是以第二從所以立王至龍中來與五篇罪相輕重作喻既識其相必能奉持使惡無不離善無不積是以第三師子已下至久住正明戒能生成行益功能作喻教行既宣宜勸崇習是以第四乳母已下勸修勸説喻就初中文三初為二偈喻戒能生善衆德之本二除結一偈歎戒能滅惡然生善滅惡必由三業行乃可就是以第三從夫欲造善已下正明善調三業生善滅惡之本初文為二初一偈喻戒能生善次一偈舉前戒益以勸修初偈上半喻説下半合説衆山之中須彌最者然須彌能持大地使不傾耶一切百卉因之增長持地中勝勿過須彌故稱為最喻萬行之中戒行功德能持行者身口大地離於七支傾邪之過一切善法因之增長集生中勝義同須彌故為最故經云依因此戒得生諸禪定及滅苦智慧大海淵廓潤澤無涯踰於百川目之為最喻戒善理深資潤無窮超於萬行喻若於海下舉教以合衆經合上衆山流戒為第一最合上須彌大海若就行論之定除細亂慧斷煩惱所以是勝根條往別戒是根本定慧從生戒復是勝約教辨為餘詮定慧故二藏勝若詮本行毗尼為勝今言最者根本故最夷論云最為四種一生善勝名最二滅惡中勝故最三依世間戒得出世戒故四依非心戒剋於心戒行要既宣宜務斯益是以次偈舉最以勸修但能奉持勿替於心第一勝利剋之不虗然若欲求前行中第一最者非持戒不剋故言今世謂現在僧尼後世謂未來僧尼當持此禁戒必獲益不虗過去僧尼無持戒義故不勸也次釋第二滅惡解興惑喪萬纍斯損故曰除結無罣礙凡欲遣縛信在明慧但慧興為本由於淨戒推功歸本故曰由此解然解不虛剋必須護持淨戒故宜省己之違順準教以自觀以此律教驗一生已來行之淨穢了了斯現目曰觀察猶若懸鏡高堂好醜斯故言如鏡照面像次釋第三備具三種業能生二善如持犯所説意成身口善惡之本故勸審觀羅云為輕義婆羅門三業加惱忍不反報到愍前人我痛須臾間那汝長苦何顯持戒中勝故引以之曉第二罪相輕重中文二初為二偈能詮教興作喻第二次為十偈與所詮罪相作喻初文中二初一偈半喻説下半合喻喻中復二初一行教興所由喻次半行教興所為喻此一部律教尊貴可重為僧尼所欽喻若於王責此教興所由故言所以立王者由世諍詔者喻由諸比丘罪故衆人舉者喻諸比丘舉過白佛請聖制戒古昔當法喻三世諸佛咸待犯請然後制廣古今恆式故曰當法次教所為人者所以立此廣教戒律王者為二種人一為犯己能悔人使識病知藥懺除對治殄滅之方故言犯罪者知法二為專精不犯人使順教奉修對治行立故曰須法者成就合喻可知次第二罪相輕重中文二初為二偈總喻五篇第二次為八偈別喻五篇總中二偈前喻後合喻文中二初句識病別藥喻下三句療治得所喻此一部律教能詮罪相輕重分明故曰如醫觀衆病下三句中初之一句立二章門下二釋成下四須懺目之為進初篇過重理不可悔稱之曰止但進為四義一殘等枝條二不定障道三為從緣殄滅四現足僧數是故稱進夷反前説亦具四義是故名止進否合儀故曰得所可治釋上進不可釋上止次合喻初句合初句下三合下三四事一句合止得所不可者捨可救二句合進得所可治即進藥又一義合者初句合初三字四事十三餘者合衆病二字不可治合止得所門可救不須救合進得所門此四事攝不可治盡不答一分劑盡母經就性四不可治今約教相故局此四即簡蘭提吉等舉篇非聚亦是除於二逆唯僧非尼則甄觸等故言四事不可治也次明別喻初二偈初篇作喻次為二偈第二篇喻次為二偈與三四二篇何故合者答如四犯畏為取畏故怖微者沒名以增四門故遂離三四今明五篇而三四合者對不對分第五之一對中僧別三四對別故所以合却就僧中救不救分故唯四喻然初二篇異多故離一可治不可治夷有覆不覆別殘罪覆不覆盡可懺除二者懺殘為限懺夷學悔盡形三者殘罪覆懺中重犯與本日治夷中重犯更不聽懺四足數不足數別雖俱對僧為多異故須為兩喻三四二篇若據三説一説之別應離為二然同義多一俱對別人二同是可懺三覆與不覆皆聽懺四並足數故合為一喻次釋初喻前喻後合初句自行絶分喻次句衆法絶分喻次句作法除棄喻次句穢不在淨喻若犯初篇一形永障絶於慧命名之曰死不成治比丘用名之為尸尸為五義如下所辨為業既重淨衆不納故言大海不容受作白羯磨驅殯治之喻疾風所飄永甄衆外故言棄之於岸上合中上二合初句第三合下三第四勸持次第二喻上半喻持下半喻破念捨智等禁防六根名曰守門對治行成畢竟清淨不為緣壞稱曰窂固不懼外非劫人善財故言不憂失財物第二篇行衆法綱網義同垣墻遇緣毀為缺壞慮失戒財故曰憂懼合喻可知次第三喻上半喻破下半喻持三四兩篇威儀微細易為壞義同壞器遇緣起過字曰穿漏覩己罪過恐墜三塗名曰憂愁戒行善成為資身之用喻若完具內心躍踴度己所持喻若眷屬歡喜此先破後持前喻先後犯綺文故爾次第四喻第五篇罪惡中之微喻若飈火微惡易犯持宜須禁故曰慎莫謂為輕相續善心如似草木一念微惡性是違害能開不善門焚燒善心使不現起故曰燒盡無為餘何等五不善門一能燒人善根二從惡起三為聖所呵四退失道果五死墮惡趣第三段生成行益中文二初為二偈愚智二人喻第二和合下生成行益初愚智喻者為成上生下義言成上者明五篇罪過實是可畏何人不懼無惡不造所謂愚夫何人能畏患無不離所謂智人即是成上畏不畏喻言生下者何人不能持所謂愚夫何人能持所謂智人即是生下作能持不能持喻也初偈喻説下偈合喻上半偈與愚人不畏喻下半偈與智人能畏喻初篇重罪業障深厚能喪法身絶於慧命可畏之甚如師子虎吼愚癡凡夫三毒迷醉不懼斯惡故曰醉者不恐怖此舉重況輕重既不畏輕則亡言解下半偈突吉羅罪惡中之微故曰小獸聲雖微智人能畏情生戰競故曰醒者聞則懼此舉輕以況重輕既尚畏重則亡言次合喻如是三活人合上醉者一切惡合師子吼不懼合上不恐怖智者合上醒者於微惡合上小獸聲雖微當懷於恐畏合上聞則懼第二生成行益中復分為二初為十偈與生成自行作喻第二如先自窂衆已下正明能生撩理僧徒衆法和合興建正法行就初中為五喻十偈初為二偈與受隨相應對治修行猶如良藥能療衆患喻第二次為兩偈歎戒如腳足能涉險道喻第三次為兩偈明戒如浮囊體性上升擔負行人越度三為喻第四次為二偈戒如階陛趣涅槃要路喻第五次為二偈正明戒如伎藝但能修學感果畢然不墜惡趣喻次解初偈喻説下偈合喻就喻中為四句初句名正念修戒喻既正念現前無惡不離故次第二句明對治伏業喻既伏七非尸羅清淨能發生定慧斷除煩惱惑是故第三句明資成斷結喻業結既除逍然無纍剋證大果以自適神是故第四次明因圓剋果喻念智捨等護本所受受隨相應義同和合對治之行非一稱之曰衆治行既成能滅於惡目之曰藥釋猶除也良猶善也正念行成必伏斷七非故曰除去不善者九十八使諸結煩惱嬰纏行人𮄊臥生死名曰病者尸羅既淨集生三昧定心澄靜剋理觀在心稱之曰服解興惑喪故曰除愈業結既除得涅槃道果以自適神故曰身康得安樂次合句別相當次第二喻初偈喻説下偈合上半喻持下半喻破涅槃淨天出生死之表稱曰遠路發意將趣故曰若欲涉意雖發趣若無戒足無由可階故曰當自護其足下半偈可知求天若涅槃合上若欲涉遠路守護戒合上護具足下半偈破戒舉持反合第三喻假名行者發心欲越生死暴河故曰如人能度河受戒之善體性上升擔負行人使不沉沒喻若浮囊護本所受義同用乎生死無涯名曰雖深受隨相資對治善成不懼淪溺故曰無沒憂達到涅槃彼岸之果故言到彼岸諸佛子合如人欲度河修行合用乎禁戒本合浮囊終不者以一終不括下二句即合下二亦可總合第四喻涅槃正法之堂蔭覆行人免生死寒暑喻若帝釋堂以三十七道品瑩鏤涅槃正法之堂故曰雕飾衆寶城趣果由戒喻於階陛賢聖遊履故曰天人所行下合可知第五喻方便正念修止作二種持戒之善名為善學世間也持戒行成內為幹正之能曰伎外為妙用無窮曰藝衆行非一故曰一切既持戒成終必不墮下趣惡報猶如世人為王所念不墮貧賤非但不墮三塗復得道果以自適神故曰以是得安樂合中上半到而別下半順而總第二生衆法行中文二初偈能成衆益次偈聖所嘉美前中上半喻説下半法合若欲秉御護持必須善衆相得故曰如先衆既和密資成僧用不為惡衆所壞故曰窂自惡在善外名曰彼軍伏從正化故稱為破下合可知次偈上半聖所嘉讚下半久住釋所以次解大段第四中為二初八偈舉上行益功能勸修次二偈舉上教益功能勸説初二偈戒能養護行人喻戒善資人使法身成立曰養防護行人使外惡不忓曰護下釋護義一切水火者出所護事三塗逼惱如水火難戒善功德防護行者使不墜三塗故言護使不傷害合中上半合上半次言終不墮合上護使不傷害畜生等三合上水火難次為二偈戒能生成真實功德喻內為剛決護戒之心曰勇覺察外非罪相輕重曰猛能破生死曰將如增一阿含為五戰夫一持伏入軍遙見風塵即怖二見高幢即怖三見飛箭即怖四見他所捉或斷命根第五人者至死不怖能壞他軍比丘亦爾一為比丘覩見女人捨戒還家二或與女調戲三或與女身手相加捨戒四或為觸女起於欲想返戒五戒為比丘能觀不淨便得解脫四智究竟今言勇猛當第五人善修止作二持之行名曰善習持犯相違義同戰鬪對治行成能喪犯戒等業故曰降伏等心怖真實功德寧死不悔故曰沒死等次合佛子合上猛將善學於戒合二三兩句五蔭散壞時合上沒死終不等合前不顧命次第三崇真捨偽喻前偈崇真法生真實資成慧命故曰是真生下半引成事為證次偈捨偽得戒真生明知捨戒絶於慧命故稱為死恐濫俗死故言於佛法為死下半舉損勸持如世人護命故曰故如護命次第四二偈除擁通物喻上喻下合上半喻持下半喻犯念捨智等護本所受故曰得印行立清升不為業羈故曰無罣礙犯下四篇字曰毀缺若犯初篇義同全失次合如文第二舉教益勸説中初喻下合佛本制戒為於二人一專精人二犯己能悔人二人非一故言為一切人此之二人為業煩惱魔繫羈繫三為不能出離如來大悲為制此戒教修對治斷除惡業故曰降伏諸魔鬼神仙五通人喻佛造設於呪術喻五篇戒為彼慙愧者合上一切人不愧合上魔鬼如來合第三立禁戒合第四半月半月説舉益勸説非合喻修行之本皆由慙愧隨行塵沙今且論一二慙者先不作罪即專精人愧者發露向人即能悔人耻己作惡曰慙即無惡不離止行成就慨己善不滿足修令滿足曰愧即無善不修作行成就內自顧不作惡曰慙外顧於人不作惡曰愧慙者羞天屏不起惡愧者羞人露不作罪反上慙愧即不愧慙第三半偈結竟單意難明寄意以彰申壞讚美立宗勸信若久談德則廢所通之法宜奄己情息歎歸禮自下發起序就中文二第一從初訖未來世云何正明請制處所所以先明者但以啓請之來必託處由事作請之端序故見論云爾時身子請佛結戒是時佛在毗蘭若國第二從舍利弗下託處興請發起所説就前段中分文為五第一至樹下已來正明大聖遊化棲託處所第二從毗蘭若已下正明國主聞佛功德信心慶遇第三從爾時毗蘭若已下設敬請佛福田行施第四從世尊已下正彰佛趣彼請而食馬麥第五大目連下請佛避粗如來抑止就初段中與者俱義大比丘者見論云一功德大二果大三徒衆大故言為大至毗蘭若者五分云此是邑名波斯匿王以邑封此波羅門故佛至此國者見論多義一為慈愍白衣故二為四大故三為制戒故四為説法度國主故那鄰羅者見論云夜叉鬼名濵者水涯洲者水中可居曰洲曼陀羅者練木樹夜叉依此樹故佛在夜叉樹下故曰濵洲樹下等何以佛依樹下見論云為人寂靜故為使弟子倣佛成規住在樹下除房舍惡欲故亦為安身故專在此樹下者此樹茂兼復近城往來便易就第二文三一從初至樹下正明聞佛遊化來至己國二此沙門已下出所聞功德十號響班三輪化益三從善哉已下信心慶遇就第二文中初明十號後明三論言此沙門為如是大名等者總舉其號此者其人沙門者息惡舉其種性故曰瞿曇比是如來名稱功德然為通利釋迦彌勒阿閦善德等是其別名如來等十是其通號應相須分故立別名實德須顯故為通稱佛德無量依德立名豈局斯十今據一數且言十號所謂如來乃至世尊今經總舉言為如是大名稱凡召體曰名表德為字名實相應曰稱響班人天曰號自下別列十中前五自利德號後五利他自利五中分為兩對初二一對前明道圓後彰滅極初如來者西音多陀阿伽度此云如來龍樹論云乘如實道來成正覺此據證通以解如來地云非不如説故名如來約教道釋如來滅經云乘六波羅蜜十一空來就不住通以解如來二無所著者地持云何一切義故所以應供義者大般涅槃故言滅極或云阿羅漢者此言無生或言無著無著者如下文我是世無著絶二縛故是故應供言無所著者內為大悲故於空不取證內智具足故緣為而不染空為兩泯故曰無所著次三一對前二解行具次一果滿於前二中等正覺解圓明行足行圓等正覺者契窮法性平等真照故曰等正覺亦名正遍知遍猶覺明者三明行者謂六波羅蜜行由解立故曰明行足者圓果酬於往因曰足萬善備修趣證菩提故曰善逝善者好逝者去以如來好去故曰善逝故持論云第一上升永不復還故曰善逝下五利他上四德能化物下一為世欽敬四中初一化生之智解了世間次無上士調御丈夫化生之能能調物心次天人師化生之德師德具足次一佛者化他之行覺行窮滿善達衆生世間根器利鈍故曰世間解進達窮原人天莫過能調人天丈夫伏後聖化故曰無上士等言天人師者能教衆生斷惡修善故名為師如來實是六道之師人天益多故曰天人師善達法界三聚之法自覺覺人覺行窮滿故名為佛德為時欽故曰世尊就第二三論中初神足教化謂神力善巧令人生信於人既信事須修行故次修習梵行者彰其起行梵名菩薩是道能到故曰修習梵行言彼於諸天謂天衆魔謂欲界魔梵謂初禪已去沙門是正衆波羅門謂俗衆於此諸衆獨證神通故曰作證等所説不改故曰常説説理非邪稱為正法上善等者見論多解一謂初中後言悅契群心名之為善二謂戒定慧等三謂三種菩提等並稱當益物故名上中下善所詮之旨以之為義能詮教者名之為味理教相應故曰清淨等第三善哉等者此國主者慶遇之詞己及眷屬故曰我等言得見者當為所見故曰得見言無著人者所聞德中且舉一號具足應言乃至三論化益人我今宜往等者自申己利我若禮覲必聞法歡喜敬養福田合時多益故曰宜往問訊等第三設敬請佛中文五初至一面坐來三業致敬二時世尊已下稱根説法三聞佛已下信心請佛四時世尊已下默許受請五毗蘭若下遂請歡喜致敬還歸釋初句中到已共相問訊者亦應禮敬又應口言起居輕利教化為勞等意業尊重但此文含故總言問訊言一面坐者見論身體布地聽法安故至宿德所以避六法等可知語言莫算故曰無數方便令波羅門解心創啓曰開忽為名化稱機欲故曰令得歡喜第三子句聞法歡喜等者經家序國主信敬之情次即白佛已下彰其請詞謂請佛僧夏興供養第四受請所以默受請者見云佛已應世間人以身口益今用忍心默然受請為愍衆生顯佛三業俱益見佛聞法是身口益默許受請是其意益譬如藥樹根莖枝葉俱能愈病如來法王亦復如是三業俱益多云止誹謗故不發言受問所以此中默然受請涅槃經默然不受發言受供邪答此中以其佛是應供請佛者少故對國主默然受請涅槃會上唱言涅槃又請供者衆是以發言受純陀供寄興常理為此不同次第五文見世尊受請者問佛既默受非眼識得所以言見答覩佛怡悅之色是故言見敬戀不已請退還歸故曰繞已而去就第四文中為四一赴請安二時為波離國下明得馬麥之所三時世穀貴下食麥之緣四爾時比丘下時食馬麥食麥緣中一時世乏食二毗蘭雖請者魔惑國主為斯二緣故食馬麥何以故者若波羅門先不請佛今不供養未足為疑然波羅門信心請佛理應供養何以今忽不供養故答為魔所惑失本信心故不供養五分云非我無物亦非心悔魔在我心故不供養如何在心十云魔惑國主耽於五欲內語不出外語不入我九十日五欲自娛故曰皆是魔波旬所作故問佛受請時知魔惑不見云佛知若知何故受請見云一夏安居竟為度國主故二因受此請請聖制戒故三設往餘方亦不得免唯此為麥可依安居故問魔王所以不惑販馬人邪見云魔王已去販馬人後至問何不更來見論云四事不可全弊一期中供養二湯藥三光明四壽命正食馬麥其文為四一往造求食二次生施念三如念行施祗云五百延馬日給一斗為一馬王日給二斗各減其半以奉佛僧故曰乃至一斗四佛僧食異完未不同故曰所食各異十中佛以殘食與阿難天味加之故言為異問佛所以食此馬麥者答百緣經説佛為宿因如來過去作五百婆羅門主遊行見迦葉佛衆人供養發言如是好食宜供養我此沙門等應與馬麥身子在中不可此言以斯口業本因魔惑為緣故食此麥十云當佛食此麥時身子口業善因故在不空道山中受毗沙門天王釋夫人供養第五文四初兩一對直請縱答次兩一對兼請抑答問大目連者神足第一何不輒以神力回反大地取自然粳米供養衆僧而請佛者見云輒作神通則與如來並神力乖弟子法是以須請除不在佛前為利益故問如來何以止目連者見論若聽往者現在為神力能爾當來比丘無神力者值儉乞食人生慢言佛在世時弟子持戒具足神力取彼粳米以供養衆今者比丘持戒不具內無神力不能取米供養於彼比丘更生輕薄復不少施以倒見故死墮地獄見此無益故不聽往遮之義永故重言止止第二託處興請文四從初至不久住來託處思詳久不久義既為疑念在心理須咨決是以第二從靜處起下如念請問何佛住滅如來略答久不久人雖知其人未解所以情疑未盡理須重請是故第三從舍利弗下問久不久所由廣答所以第四舍利弗下乘前答勢請聖結説同於四佛久住之益如來抑許初文問身子智惠何不自觀而問者何見云身子自觀正可知佛久與不久未知所以故須請佛又可身子神力觀之不離為依止如來住為顯佛尊上故請佛也又解所以請者但舍利弗智拔群表性樂推審故思六佛住滅久近作興請之端第二文二初請為三一至退坐經舉請由二白佛言下次申疑意三為開示正顯請詞謂請佛披演使我解心啓悟名之為開顯在心首故稱為示第二佛答四佛久住二不久住十誦無此請文五分佛答惟衛尸棄隨葉三不久住拘留拘那含迦葉此三人住與此不同見論住滅一同五分祇身子在舍衛國祇洹林請問久不久事佛直答言説九部經結説故久不爾疾滅不辨人之名號身子即請説九部為聲聞結説準知此文似是並請化制二教第三文三初問住滅所由二佛告已下廣答住滅所以三以此因緣下結成住然此三文問中先問其久次問不久答先釋不久次答其久結中先結其久後結不久文次如是初門者身子問言以何因緣者謂此六佛同常住等正覺以何緣故而為住滅就第二答中初答第二問不久所由義二文四四者初心説二爾時彼佛以下但為説略三又舍利弗下説略之益現在流布四若彼佛滅度下無廣之損故不久住二者初二一對止廣説略次二一對為略現益無廣後損先釋初文為二初明無廣教二故諸弟子下彰無廣機釋不説廣意先總舉二佛化主無其廣教故曰乃至不廣為弟子説法次別明不説文二初舉其二佛所不説法體第二不為人廣説已下正彰無其廣教但正不説中具為化制二教明知所不説法體中但為十二闕無制教謂少結戒訖戒之言此十二部經者以聲為經體佛語語性故通為名句味謂色行二陰中攝翻名釋名者一修多羅此言契經二祇夜謂重誦偈三和伽羅那此名授記四伽陀此名不重誦偈律名偈經五憂陀那此云無問自説謂不由咨請如來自説律曰句經六尼陀那此名因緣經七阿波陀那此云譬喻律在第十一八伊帝曰多伽此云本事謂説他往古如云拘留孫佛法名甘露鼓等律曰善道經九闍陀此云本生謂自陳己報十毗佛略此云方廣十一阿浮陀達摩此云未曾有十二憂波提舍此云論議大小隱顯故説十二謂方廣部是菩薩藏餘十一部是聲聞藏若大小有無互顯各有九部故成十八謂大乘中除因緣譬喻論義小乘除方廣授記無問自説故各九部大小具義論云各具十二今之所明小乘十二第二不為人廣説已下正彰二佛不説化教亦不結戒者亦無制教次明無廣機文言故諸弟子疲猒者謂此等衆生聞廣嫌繁佛知疲猒不為説廣是其無廣所以義故故言法不久住第二但説略中文初明説略法體二乃往已下説略處言是應念者見云當念無常苦不淨無我是不應念者無常莫念為常不淨莫念為淨是應思惟者三善根應思是不應思惟者三不善根莫思次下一對總結修捨是應斷者謂第四句識過須捨是應具足住者謂初句第三句須念思故云具足住此但出二佛化教之略不辨制略制略教者不謗亦不嫉等是隨葉佛略心莫作放逸等是拘那含佛略第二乃往昔時下舉其二佛説略處所者此恐畏林猒惡情猛入道則易故依此處第三説略益者以有略教佛僧在世佛法流布謂略教益第四無廣故滅中有三法喻合法中有四一滅法人二出家彰此等人入佛法中三是故已下明滅法之損四何以故下釋疾滅意種種名者見云惑名曇無德薩婆多等種種姓者或姓目連迦葉等種種家者貧賤富貴等家然此衆生亦剃髮染衣入佛法中故曰出家雖染佛法無廣可依各自用意處當佛法不相承受又復根鈍於略不攝法在己隨緣壞行是以疾滅不久所滅法者謂化制略教等何以故者然此等人信心出家應合興顯所以疾滅正法故言何以故以無廣教線經任持行者故問此人出家何法受戒人言準義謂是羯磨或可如是喻中亦四種種華者喻初句散置案上喻第二出家風吹則散喻第三滅法法何以故者喻第四無廣教線經次合喻亦四可知問所以初欲舉滅法之人兼舉第三在世流布者答為彰以無廣故雖可現益未來有損故相對辨答四佛久住中亦四一有廣教二弟子疲猒下亦為説略三如是舍利弗下有略廣故明其現益四若彼佛已下以有廣故未來久住第二説略但應化宜之略無制教中略謂忍辱第一道乃至一切惡莫作等不同廣中具有化制但應是略言廣略二教者多種差殊一定二教少多二根本支條三人有利鈍四罪名輕重等如下辨但修多羅中廣略二教先後不定以其化生遇感便宣逢緣即闡良以衆生利鈍不定故所以爾毗尼教中要先略後廣以其略是根本被於利根行淨人等一往即説廣是枝條被於鈍根犯寄事故須後制又四佛先明説廣亦結亦説後方説略者謂對略辨廣為彰四佛非但説廣亦説略教仍不是先廣後略及戒本中以廣為宗故七偈後説終不得今説在下謂後説問涅槃云迦葉佛法住世七日此云久住答經云七日據利根者説律彰久住就鈍根者論又此住滅為明興請理齊廣略即如五分見論三住三滅又增一阿含阿難問毗婆尼佛乃至迦葉乃至幾時生瑕穢弟子多少云何説戒佛答第一佛一百年前説略百年已後付諸弟子説於廣略第二佛八十年第三佛七十年第四佛六十年第五佛四十年第六佛二十年第七佛十二年前乘明彌勒千年之前未有瑕穢但説一偈口意不行惡身亦無所犯當除此三行速脫生死淵以此驗之故知齊廣俱略第四正請中文二初請就中先請威儀可知次白佛已下正請二佛無廣未來不久四佛有廣乃得久住欲同四佛久住之益勿同二佛疾滅之損故曰乃至久住等今正是時者謂其正是制廣教時唯者專獨之義故曰唯欲也結戒説戒等者二部戒本是其結戒説戒揵度是説儀軌餘受戒等是修梵行法亦可戒戒之中各前結戒酬於此結各後説戒及説戒揵度復答此請餘受安等是修梵行法請制斯廣勿同二佛疾滅之損同於四佛有久住之益故曰久住所以不請説化教者梵王請訖但制教者非俗分故是以今請若準祇文似如俱請第二答請文三一立二章門二釋二門三結二門言且止者止謂抑在交頓止而非永故復言且故是抑門佛自知時者許之賖漸賖謂待犯漸據隨禁故是許門釋此二門一解句則有六對便有三釋唯兩謂初三五釋抑門二四解六許意於此三對釋二門時宛轉相釋可知義少不便今解初二句釋上抑許第二未得利養已下兩對近釋生漏不生漏遠釋且止知時意舍利弗如來未得結戒者釋上且止所以未得結者未犯有漏法故若漏未起而先制者見云二過一重誹謗想如我等輩貴族出家棄捨財色奉持戒行不惜身命於世名利無所悕求云何如來反以木叉繫縛我等即是如來不能善莂世人心器反生誹謗獲大重罪二者於我所制亦復不生敬重之心令法則滅即見此無益不得先制故言且止若犯有漏法者釋上智時上言知時者知何等時謂知漏法起時然後結戒者見云二益二者讚歎是好醫師善治我病二者於我所制生敬重之心令法久住佛知此時結戒有益故言知時又復若犯有漏即是生下論起過文文皆應此然後結戒者即是諸戒制廣之文咸對斯説欲斷有漏者便是招生十利又復下文如來出世見衆過失為諸比丘結戒以一義利故攝取於僧等也此等正宗之文並應賖漸之益文言若犯有漏者教行俱缺然後結戒因犯制廣補前二缺問云何補教補行若如來成道説於略教利根之徒奉教修行無所缺犯教禁群機有被時之益鈍根之流違教起非又不奉修令教毀壞無禁時之用是名教缺即違教成犯汙本受是名行缺是以如來制彼廣教彰諸惡之名諸善之體二教相順相成還令略教有被時之益義同補教既聞制廣呵責示過悔己所犯永斷相續已起惡業不能為因未來苦果畢竟不受還令戒淨名為補行又以廣故行者識相護本所受專精皎潔踰勝於前資成不斷亦名補行問若漏未起制廣二過者略教直陳所以不待犯請答有二義一略教根本法輪故得直制仍不待犯廣是枝條法輪若根本未壞何用廣為是以要待根本既壞須制枝條以補隤輪以此根條兩異制法不同二略教所被機根淳熟調柔易化故不待犯廣教所被根鈍難犯不得先制要因有犯寄事而結以此利鈍不同制法有殊故爾第二生漏不生漏緣舍利弗比丘乃至未得利者近釋不生漏遠釋且止意乃者越時節也若得利養便生有漏等者近釋生漏遠釋知時乃為結戒者是乃厈之詞未有名稱者近釋不生漏遠釋且止若得名稱乃至多財者近釋生漏遠釋知時此言乃者越為人識等結二可知寶永七寅六月冒暑自寫冀子子孫孫令律法久住於世往昔鑑真過海大師傳法礪南山二宗恰如鳥兩翼今南山宗廣行于世法礪一宗傳之者少非我子孫豈能流之有志之徒思之思之位山天安精舍過海末葉沙門慧晃山識之
