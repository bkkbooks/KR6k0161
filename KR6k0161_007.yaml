body:
  text: 自下第三餘離行同人二經營客比丘中功德覆藏而手出父光者何十五俱云入火光三昧答曰多論八義故手出光明一為止誹謗顯己無愛瞋故如佛為婆羅門女謗自説我有十力四無所畏以表清淨故二息學問坐禪比丘見營僧事者喜生輕毀手出光明滅相輕毀故三為折伏山林比丘常謂城傍比丘恆在亂心是故沓婆羅雖立事亂神力放光分僧臥具伏彼高慢心故四為見精進果報以勵懈怠慢恣故五為增長施主善根故六為現被謗心不退故七欲現衆僧有大威德分一具比丘神力乃爾諸大德等寧不高勝八為愛惜正業不令廢缺故問何以處分事亂而得有光明者何答凡作事先心期所作已從欲界善心入淨定心次入通慧心次入欲界化心化作光明還從化心却入通慧心後却入淨定心後入欲界散善心已隨本所期化事遠近以是定外用事故爾斷理合法悅可群情勸勉彼心明須讚美故世尊讚言乃至第一第二近緣者則能犯戒人文二初至受請已來因得弊房惡食瞋謗之由二羅閡尼已下正興謗計有七子句一慈地致虔啓問二乘前悉言默元所説三請求己𠎝問默所由四舉事相擊以申默言五問其所欲請設方便六示以謗儀望遂本情七印述所言彰己能作祇中自謗不云教妹十五多見並教妹謗與此律同第二正謗自下辨呵文二初比丘呵二世尊爾時已下佛呵比丘呵中文三初發覺所由二比丘呵責三舉以白佛發覺中兩初沓婆自言清淨以明發覺次撿挍慈地自言以彰發覺沓婆中五初明佛問二彰己聞知請佛為證三世尊不可四自言清淨五為聖嘉讚言未曾夢中者若據凡望聖以昔説今若約事辨以難況易問佛是一切智人善知淨穢所以不證沓婆清淨慈地是犯而問自言者何多云若佛證一是一非生人誹謗論佛愛憎故故今不證止誹謗故二若證沓婆是犯現在不犯若言不犯以過去惡果果報熟故又後不順自言治法故也撿挍慈地中文三初佛告撿問彰妄枝重𠎝比丘信順佛教二諸比丘下承教撿問三雪彼無犯申己謗情以彰自言撿挍本者比丘末者慈尼次比丘呵次白佛第二佛呵文二初行有違失呵次得報畢定呵故文言一向入地獄者彰之過辭餘之三律沓婆自言清淨故與作憶念毗尼比丘尼以身謗他故則與滅擯白四但十律五分中不言有惡但以自言則與擯治五分一比丘唱言大德僧聽故問下文不犯自言犯不成自言何故五分作自言擯答文言不成者謂不識法人此無情過故不得依彼自言治之五云與擯者謂是識法人故誑謗情過不輕故得與擯亦可二律不同未得消通若依祇中尼自言犯則是實犯故令與擯以尼餘處犯戒有身來至兄所兄與誰惡我為兄以身謗之兄言善好沓婆惱我不少可為我謗故僧與擯戒本七句一犯人二瞋心三所謗境界是清淨人廣解不淨者為顯謗他穢他淨穢俱犯四無三根五以波羅已下重事加謹顯己情故言欲堵等六自言非則謗時故曰異時彼彼清淨顯己謗情故七若比丘結犯三六二句文略不釋餘咸具解釋第一句可知第二瞋者有十惡法者依祇三世九惱通非情處起瞋是名為十惡法因緣廣説可知解第四句持解無根先反解有根若解此根四門分別一列數釋名二定根多少虗實並不並等三定得名有無四與小妄同根者生後之名根義不同略標三別謂見根聞根疑根觀示青等稱主為見納嚮餐聲名之為聞故論言眼識隨生見耳識隨生聞見聞之後猶豫不決心無定執號之為疑此之三種咸生舉語故齊名根問此疑從何心起答五識後言識生此疑心以從見聞故又多論見者必使清淨審諦可依唯聽實眼不得天眼天眼説過妨亂事多故伽云以天眼舉比丘不朱出罪天眼非事故問何以但從見聞後生疑而不從見疑後生聞聞疑後生見者解釋可知第二門定多少者尋文有四謂自他想疑等二不生舉語但可通於見聞疑故不得名根今通説故故言有四言有虗實者以境而言此四並虗以清淨者不妨有根犯者無根是以文言清淨清淨相似以此謗彼不淨不淨相似以此謗彼故然就四中前二是實後兩説虗以言橫想疑故於前二中各見聞是實疑又是虗以不定見聞故雖有虗實但具此三咸聽舉罪言並不並者若有前二則無後兩虗實不俱故若有第三則無餘三若有第四亦無餘三此謂前二容並後之兩種自不得並所以可知問何以從他文中但有見聞無疑者何一釋親強故有疏弱故無若爾餘三有三從他但應二如此釋時略不出之下小謗中五同此文言舉謗朱不朱者自他二種有則朱舉無則朱謗想心三者有不朱舉證正義弱故亦不朱謗以心實故若無或朱舉謗不朱舉謗疑心三者有不朱舉謗則朱謗則朱謗謂隱疑心舉實根往謗非是此疑朱也無同於想第三門得名有無者問無徹當境名見根當聞故名聞根然舉見聞別二杛從見聞後不決了猶豫名疑根不以見聞名疑根耶答以事雖是有是實然疑通見聞又通有無故則見聞時未定若聞別疑攝疑不審故總言疑此義通四可知問若言通有無等者如小妄中疑見疑聞何以得舉見聞以別疑又説戒中見疑亦如是聞疑亦如是答若準此文亦應得舉見聞以別疑今且就總又問想通見等三以三門別三想疑亦姣於三何為不以見等別三疑直言彼有疑耶答根中無想名事無監泏故得舉三別三相根中有疑名若舉見聞疑以別二別三疑監彼三中疑故不以見等別三疑謂謗朱不朱故又寬狹故問如何別相答根疑從見聞事生不從前二根生謂別有不了見聞生而不疑見聞但疑事犯不犯下疑是橫起不因見等生而疑見等三為見不見等又寬狹異又謗朱不朱恐監根中疑故但言有疑若爾想心三者亦是橫起所以不監答一想與實根同緣故俱於犯起又三中無想根故使不同又可想者類前二根故以三名別三相疑類第三疑隱別而就通第四門者問小妄有八語此無六語者何答下明妄故得有八語此謗翻舉舉但有三故謗還爾所以舉唯三者以其發言但得言見聞疑三可朱證犯若言不見等四但得是妄若也對舉便朱讚歎故無餘四又問等就見等四中獨以見聞別根無餘觸知二法者何答以其二境離中生知前人作過不出身口口所作業為我耳聞身所造者為我眼見因此見聞能生後舉故以見聞別根犯非觸知之境故今不以觸知別根從二生疑亦聽舉罪故使根中但有三名則翻舉辨謗故取見聞疑三以彰境無無而言有所以名謗為此但有無三舉三謗更不得有餘語若言小妄違相轉心則朱妄語是故境語通有八法中見根但約前三戒無其妄語以是語以是聲故非見境界聞則通四從見疑中略約前淫煞二戒從聞生疑還具有四次除此已下煩解無根彼人不清淨下合解五七二句謗之方法文二初其文煩來朱犯相二若比丘下輕重相初段文中有七章門初實無三根以三根往謗作六句二無一見根以聞疑從二根往謗作六句三無一聞根以見疑謗作六四無一疑根以見聞謗作六下文煩中有三章門第五無見聞二根以一疑根謗作六第六無見疑二根一聞根謗作六第七無聞疑二根以一見根謗作六六七四十二句位約為三初一以三根往謗次三以二根往謗次三以一根往謗位雖如是且從七説解初章門六句則是六心對於此文二門分別一解此六心二對小妄辨異然此六心人解不定昔解具八八有同異一種人釋第一有相不忘心第二有相忘相心三四有疑心忘不忘五六無疑忘不忘問初句但云不見聞疑言見聞疑犯本無有相之言所以乃言有相心耶解曰以第二心驗三四心證故所以知問所以無無相妄不妄者略故但六如此釋者以初句是有相不忘心八心俱朱謗罪又一人釋所以六心者根對而言不過有四心一者不生橫相名為無相二曾生橫相名為有相相對為二心一者曾生橫疑名為有疑二者不生橫疑名為無疑亦相對為二心故有四心所以六者有疑分為二句一曾生橫疑及至謗時便言無疑我實見聞疑二曾生橫疑後忘疑便言我見聞疑就無疑中亦分為二一者無疑言有疑便言見聞疑二者無疑忘無疑便言見聞疑以四配前無想有想合有六心問有疑心中得作二句第二有相中亦應二句何以但出有相忘不出有見聞疑相及至謗時便言我無見聞疑相我實見聞疑犯起答昔解此實朱謗前言無見聞疑相後言我見聞疑犯前後相違監故不出是以但有一句若爾第三句是中有疑及至謗時便言無疑我實見聞疑前言無疑後言有疑亦是相監何故得出答第三句中單於疑根前後相監見聞不監監不具足是以得出今有相中三根前後具足俱監故不得出問監具足不得出者若爾下第五章門無見聞二根單舉一疑根往謗中第三心不見聞彼犯是中有疑及至謗時便言我無疑我實疑犯亦是具監何以得出彼此違負實難消通又解實亦應有得失具謗略故不出若具足者無相立二心有想立二心應有八心上二家立義並言理八略故六也今者正解道理但六並非二釋等就六中單同後解現六者是謂一者無相不忘心二有相忘想心三有疑言無疑心四有疑忘五疑言有疑心六無疑忘問有想心中但有忘想心所以無有想不忘心應作文言不見聞疑彼犯是中有見相聞相疑相便言我見聞疑彼犯起答略以五義來證不成謗故所以不出一者若不忘三相而言見聞疑者則是口説稱心實故豈得朱謗以其謗假口違故爾如小妄第二心欲發言道不見要不忘見相方朱違心故此亦爾第二若有相心朱謗犯者謗便不藉虗朱既假虗朱故知有相理不合出第三朱上判五妄下二妄語不問境之虗實唯取心虗結罪若有相心理合有者心實亦犯第四小忘六心第二有相不忘不朱俱違句如彼見相若還道見便是實語更不朱妄故此亦爾寧得成謗第六小妄開文主有見想便説尚不朱小妄何得朱謗據斯五義明不朱謗然言朱者理在可怪問若爾有疑言無疑亦不朱謗答無却橫疑則是虗心朱謗故來是以文言是中有疑便言我無疑我實見聞疑若爾我亦無却橫相舉實報朱謗答相犯上起心是穴徹一向是有不知是非故不得無之以朱謗如人非人相等豈可知是橫起故此亦然疑是橫起緣根復是猶豫通於有無言我為見不見等知其非實故得無却舉實根謗為此得言有疑言無疑我實見聞疑犯如似人疑有緣人心故重於相問無想心中但有無想不無無相忘心者何答無想忘則有想不忘有想不忘不朱謗故此無相忘心亦不得出若爾無疑忘則有疑不忘何以得出答無疑忘雖則有疑不忘有疑不忘朱謗故相對今有以防巧故問初句是無相不忘者所以文中不言無相等答不見則無相何須言無相若爾不見則無疑何用言無疑解言無疑中得發言我有疑故言先疑不得發言我有想何須言無想所以然若先有想尚忘而朱謗況今先無而須言有故不對有以言無想不同疑中得隱之朱謗辨心差別防巧故爾想不得隱是故非類又可初句根本不須言無想及忘不忘等下五枝條為別前故以有想等別前據此推思故但故但六心定心既爾消文可知無三舉三謗第一門竟第二無一見根以聞疑謗亦作六句初不見彼犯便言聞疑犯問聞疑為有無若是有者可得獨言一不見然不應朱謗若無故朱謗者亦應言道不聞疑何以獨舉一不見答自下六門並實無三根與前無別及至謗時舉根多少前章舉三謗須有三章舉二謗為別次文煩中三異單舉一根謗為異故有七門之殊論其理實並無三根今律文所以乃云無一見根者此據謗者情不欲舉見謗欲以聞疑二根謗故言無一見根欲顯己聞疑是異望僧生信治擯前人是以律文就謗者情説故言無一見根不言無聞疑然昔來有人更作難作解者非以初心是無想不忘心何處得有想心聞疑朱故知不爾自下同然問第二句不見彼犯是中有見想忘見想以聞疑謗者亦可無三第二心為舉三謗不言舉三想忘三想解言道理章門中三根俱無位立一不見今亦三相俱有忘三相如何不得立一有見想忘見想俱言一不見三根俱是無且道有見相將知有餘二且忘二所以須忘者若不忘二想不朱謗故問欠俱有並忘何以但言一見想見者答以互橫相背無起有上立不見故對立有見相既一相不聞疑故無聞疑相忘聞疑相如似無三中無三故還言有三相若爾為舉三謗何以言有三相答彼據理説今舉謗情故立多少防巧故爾下句類然如此解時但有四十二句更不煩作多句二對小妄同異者此處六者並是境心俱虗以三忘心入三不忘作下小忘初六中初三五而狹於彼以無不觸知故望下此應廣説下六中初三五個是翻到二處二四六境順心違與此個殊可知輕重文三一謗比丘謗尼三謗下衆就比丘文三初句以四重法謗比丘但使內無三根莫問實自作遣使皆朱謗罪則上四十二中一一以語了了重殘不了了蘭第二以比丘法十三難事內無三根謗實比丘了了重殘不了了蘭若實十三難人雖無三根置伏説著比丘想故但得蘭罪不同四重謗人然是汙戒比丘故也若於十三中比丘犯五逆邊罪謗亦僧殘以教從理同合擯故若十律云出血破僧此二謗人得蘭餘者吉羅以名輕故則是彼律以理從教第三除此比丘下餘篇謗人以辨輕重先解其義三門分別一謗䨱説他二自謗䨱説三在謗䨱説初門者問何以謗初二篇殘提兩別䨱之與説同結一提答謗據治罰損境輕重故有二階如謗初篇治擯出衆故得殘罪若謗人第二行阿浮呵那故唯犯提論䨱説初之二篇雖有輕重同是壞衆䨱據內堵故䨱俱提説就外損但聞粗罪皆生深嫌故説初二亦二亦並提罪亦可希數初覆説希第二䨱説數故覆説上二文結提罪問若爾何故下三謗䨱説者同得吉羅答謗初二篇治罰不等故謗清降譯下三篇雖少不同治罰輕微故同得吉羅若謗第五還得吉羅者極下罪故問謗罪三階䨱説二品結罪不同所以毀呰疑總不受諫等並通五罪而得一品提罪者何答謗據治罰階差䨱説約堵不壞異咸是就罪故有差別毀呰疑總泛爾總境不就階差又不專罪如七法毀中犯但一門豈得就就獨為差降耶不受諫者亦是不就治罰故爾第二門者但前謗他不前自謗聞惡觸諱誰肯自謗自説亦爾若爾自䨱義多何以䨱七但一品吉答此不就希數須據堵有多少中結䨱他堵多自覆堵少故爾第三門者互謗䨱説以文唯説一同當衆次辨謗尼亦同前釋十中謗尼但得吉羅五分僧謗比丘殘謗尼四衆吉尼謗尼殘謗比丘提謗餘衆吉羅理有境想文無者略不犯中説實者謂説根實見言見等假根謗戒第九此戒要假實事上有見根取彼事見以謗此人見雖相當事不相當名為假如見言聞等則是無根前戒中攝前言犯緣悉同前戒唯以假根為異文篠聖前故曰我等前聞以無根法謗欲明今是有根故作是言戒本七句一犯戒人二瞋心三假異分上根四所謗境界清淨五以無根重謗六自言七結罪廣解中上二可知第四第六略不釋異分者下第三第五第七合解異分謗相文初明異分謗之犯相二若比丘下輕重相前文之中五種分一異趣異分如緣説但假見根略無聞疑二若不犯下異罪以解異分第三不清淨下異人以解異分四見本在家下異時五自語下假嚮異罪中四旬一解初二不犯夷謗言犯夷次二犯殘謗言犯夷故有四句亦可初四二句謂犯下六謗言犯夷二三一對見犯下六謗言犯夷假於餘六見謂故言異分也亦應類知聞犯下六疑犯下六謗言犯夷總為四六文無者略異人中四句初二以不淨上根謗不淨淨次二句以清淨上根謗不淨淨又文直言以此人事謗彼據理並得通舉異分三根也異時但舉見聞本在家時略不言疑假嚮中局對聞根以餘二根非所對故破僧違諫戒第十自下第二護衆教法諫戒之初四門分別一諫不諫別二諫所為事謂破僧等三立戒多少四明違諫輕重并解舉不舉義初門之中自有三門第一總別諫戒多少比丘有七尼便十三合二十諫戒然此諸諫比丘七諫則婉二衆便成十四尼別有六故二十也第二僧屏分別大僧諫戒僧五屏兩屏兩通尼餘之十一尼違僧諫若欲解釋僧屏二諫六門差別一設諫人別二所秉法殊三諫處不同四諫事不等五得罪差殊六在戒多少初門人位中有四一人有道俗異二具非具差三就具戒中形殊男女謂僧尼二衆也四約二報衆數多少謂一衆多僧也二法位但一謂語法羯磨羯磨一法唯僧諫中有若也止語法該通僧屏三處位有兩一作法自然二小大差別義可準知四所諫事殊者僧諫中事悉是作犯屏諫有兩一諫作犯犯成方得罪故不受諫戒是二諫止犯言了得罪故拒勸學是又更一解不受諫戒事通止作以所諫事婉七聚故拒勸學一專唯止犯以不肯學故又可拒勸學者輕人不受訓導戒本非拒諫以至文中不約心虗實結罪故如是解時屏諫唯一謂不受諫事通止作以所諫事通七聚故則是比丘諫夷之中除却此一但有六夷尼亦除一故唯十二兩衆令論十八諫戒五得罪差殊於中有兩一輕重多少二結罪前却初多少者謂違諫之罪若以名別據究竟説者但有夷殘提吉若通方便以名往收便有其五更加一蘭也若以種及因果分此五名便有十罪如夷殘各不具分蘭故四二提各不具分吉則四屏諫心實及違六衆故合有十於此十六僧四屏屏有一提三吉違僧諫中夷殘提二蘭一吉等然僧諫提吉心實結罪餘就心虗以辨問所以心虗而有重輕一解深防防限分故爾又可違諫一二故致夷殘夷殘也蘭是戒殘方便故亦心虗二前却者屏約事成以無衆命可違故爾如屏諫戒説僧諫為約作法分齊故不就事六立戒多少者屏諫就通齊是須諫無問倚不倚總立一戒事寬立戒少僧諫隨事故有衆多事局立戒多也上朱六別細於十一斯對二破得具此等下諸諫戒於十一中闕於初三所以可知第三正解諫不諫言若語屏諫一切皆須故文展轉相諫不受諫中心虗結提心實第五乃至此中違諫之事亦須設諫故文中言莫為僧所呵更犯重罪故知語諫通於一切言僧諫者具四義者有不具者無言四義者一性惡二顯露三總僧四傍傷上三義可知言倚傍者前之九戒條然是非更無兩監傍傷聖教是非先分過顯多識何須設諫開示其人此四戒等皆有倚傷言説相似濫理行二教是非交雜真偽難分須設諫開示是非曉悟其懷異彼愚迷棄思就善捨耶從正故須設諫如初二諫戒倚傷如來四依之教唱説相似執乞食等名同故曰倚傷汙家僧者執六人同作而擯不擯監第四戒倚傷釋種輕凌諸比丘倚傷之義此應廣説為如斯義須僧設諫闕者無諫今問有無不同九殘所以不諫蓋同生罪之緣所以僧殘罪齊下四因諫而生前九作便則結此謂一切事中具四義者須諫違而結殘餘無倚傷等不假僧諫但以事重直作則犯雖可諫不諫實殘位同故是以共篇第二諫所為事一者總解凡言諫者一為人故興諫人有迷悟二句二為事故諫事有已未廣説可知二別解所為謂是破僧下有正文至彼當解謗僧及惡性易不煩釋第三立戒多少問前二違諫立於二戒餘謗僧等但立一義耶答破僧事大非可獨立要假主伴影嚮方得成破是以諫主不捨違如結初當諫主時四伴影助僧則設諫開示是非伴而不捨故制第二餘則獨成故但一也亦可離合多少出在聖情義非一準如誦呪術及足食等自他立二餘自他令塗摩身戒自作教他立於七戒比丘七或尼但一提尼四可呵僧一素美故知不定今此主伴有無故爾第四門同違僧諫衆法處齊此四便重而不須舉則吒違諫所以則輕而須治舉一解前二破法輪僧所為事大僧諫心重事諫俱重故僧殘後二諫戒事雖非重皆犯二罪如惡行汙家犯根本罪或得僧殘乃至吉羅復非理謗僧犯突吉羅過集積增所為不輕三諫不捨亦結殘罪惡性拒僧容犯下六復違屏諫恃己凌物過集積增三諫不捨故亦殘罪下利吒説欲不彰道事非是重又復口説未犯根本更無集積所為輕微故違諫提若爾調達是主破僧得逆事真是重違諫僧殘理則可爾然四伴小罪然是可懺違諫應輕所以不捨罪同調達又尼立伴影嚮破僧但合塵垢不能畢破事真是經違諫應輕所以亦殘又一人諫中所諫之事有七聚之差所以違諫一品提罪以斯文證未必就事輕重結罪陟降故今正解就心虗實故罪輕重此之四戒所諫之人了了知己所作事非僧諫者是故違僧命不言衆法情過是重違諫謂殘利吒説欲迷情執實謂己見為是僧諫者非不作故違僧諫之言情過輕微違諫提罪又以所諫事證如調達破僧非法相等前三罪重第四句輕豈況違諫寧不約就心虗便重心實則輕又一人諫中心虗提罪心實吉羅豈況僧諫不就心之虗實以明輕重問所以得知此虗彼實答此戒克言我身滅後可得名稱故知此虗下戒文言唯是真實餘皆虗妄故知不同次言舉不舉者解言舉法難成準祇文説者不然彼名諫為舉厚律下文亦言莫為僧所舉彼此俱同本不須問今所問者謂問治舉舉利吒説欲有順情義恐多信受舉絶化道今此二破到説是耶明亦須舉所以不舉者何答若望應不應如增二説若據作法如呵責辨今此明諫何次出舉若爾利吒亦爾何以出舉答事相由故以其言明隨舉若不出所隨之舉無以結能故則出舉以其隨及違諫俱提故爾此假明隨唯吉非殘故不出舉此謂理合治舉不須此明若爾汙家擯法所以則辨答為彰擯時謗故相由故來不二非取無順情義故不須舉今言無舉者對於利吒無第三舉非謂無前二舉又更一解舉為治取前二破僧分衆而去若與舉者非是對治下二非眼何以須舉故四違諫並是理不須舉別解初諫亦有四言一制言者有三一不聽破僧言二須諫言三結罪言解初所以不聽破僧者僧衆和同義無乖淨理應詳遵猶如水乳今反倚傍聖教説相似語或亂群情堵僧斷法墜陷無辜為惡滋甚是故聖制次諫言者然調達倚傍如來四依八正然佛所説乞食等是生聖之緣趣泥洹之遠因説緣為聖種八正道趣泥洹之近因是聖種然稱法如談名為正見而今調達説乞食等以為聖種泥洹近因八正道然説為非種趣泥洹遠因顛倒説法是非支監真偽難分執情為惡事是可愍須僧設諫開示是非冀彼改耶從正棄惡就善為是須諫次結罪言者然彼僧衆詳心設諫明宣是非曉喻其㥩開示令捨而得固執己心不肯從勸違衆情重故結僧殘二釋名耶法改真分衆稱為破僧固執不捨名曰違諫三次具緣通緣如上別緣如具五一立耶三寶謂是諫所為事故二行化於時若不行化則無設諫違諫等罪故爾三如法設諫如法簡非法設諫簡不設諫故四因執己心不肯從勸以若從諫不成重故五三羯磨竟以若未竟但結輕罪故須言竟四次闕緣若闕初緣亦是闕於第二不行取化則破僧心息便下四單有立取三寶方便小吉若闕第三若不設諫則無違諫容違屏諫犯於小罪復得前二緣破方便罪若僧諫不成知不成者亦無違諫正有破僧方便究竟之罪若作如法之心拒得蘭罪闕第四緣若未白前捨無違諫罪有違屏諫若白竟捨一蘭乃至第三未竟捨四蘭闕第五緣類前可知自下釋文大段文二同如初戒然結戒中文三亦同就緣起中文二初至呵責已來諫不孤起必有所為是以第一正明破僧等事是諫所為有破事耶正難分須僧設諫開示是非故須第二從佛告已下秉法設諫違而未犯起有漏過初文復二初至不食魚肉已來正顯破僧是諫所為過狀克顯具須呵責是以第二衆多比丘辨其呵責前文有五初至清淨行來出能破僧人二佛在羅閲下教化世王以為外境佛徒衆三以佛呵不付乘此表心從提婆達下墓奪勝位害佛煞異四惡名斷利別食同情佛則制斷不聽別衆食五則生此念下立耶三寶破壞僧輪初人中文二初出家之緣二先度憂波離下出家受戒修道剋獲前文復二初生念之由大智云父王見子朱道千梵志弟子外相不美則令釋種中家別一人出家侍衛故曰諸釋出家第二時有釋子兄弟二人已下慨無出家歡師求度於中文四初明那律跋提猒俗之首二時阿那律已下正明譯釋受歡雲集方將詣諸聖三各淨洗浴已下進詣致四白佛言已下正祈請度前文有二第一那律出家主緣二跋提之緣那律文三初明在俗俗禮自娛二摩訶男下己推讓人有所歸五分那律是第也三辭母而去文三初三請三抑文言而況生別者死則至賤尚不欲離況生可貴何得聽別亦可死至難排尚欲抑而不受況生離我而聽汝去二母思念下設抑方便三念已已下發言要抑第二跋提中二初共相要勸顯己由彼辭母出家二時跋提下請停出家畢己俗言前文有五一對跋提三勸三拒二那律下以己要彼則是釋勸所由三彼報言已下青要所以四那律下申己勸情五跋提下受勸辭母文三如前第二諸釋雲集者問那律跋提相要可爾餘六釋子忽亦出家五分此七釋子跋提那律阿難難提調達婆婆金盧等先立契要若有所作誓不相違那律鄰心跋提不從舉要更語遂則相許二人申契六亦折然故諸釋子俱並出家第三進詣文四一出城進詣文言亦如亇日者以昔比今二猒捨車服以賞憂波已下不捨寶尋從四時諸下俱往致散第二白佛正情求度第二出家文三一出家受戒佛度五人餘三無緣故餘上坐度又止誹謗故五分八人並佛自度故彼文言佛則先度七人後烏大莊嚴論為佛強勸先度憂波時諸釋子受勸先度地為震動憍慢山崩故遣波下明道剋證次拂疑通化第二求外言中文四第一化王子生信念畜徒衆文二可知第二迦休已下目連白佛佛則不可為彰是應非真文五可知第三爾時已下重見神通增信彼利就中文四一現通生信文五一改刑説法二王子怖懼三發言安慰四請後本刑五益增行敬二厚得利養三比丘白佛四佛告已下制令揀心有法喻令第四摩竭王下嫉姤失通求索僧徒呵罵不付文四一姤佛利重退失神通釜者器名六斗四舛曰釜二便作已下念索從衆三佛呵不付四生不忍心前得利養順情之重今失通呵罵違心之極故生不忍心第三頑墓勝位中文二初立二糸門二時提婆下正作二事則釋上二先釋初門害佛有二初至不然害一人就因辨權實於中文六一三立斗害佛二佛念本緣謂彌佉摩納等事三二人無因念害不前捨害見佛四世尊漸漸已下聖慈説法彼利悟道五教還復道破前立計六到調達所已下白知驅擯六中前二辨權後四顯害以令此二人及多人入聖道故五多展轉乃至三十二人皆得初果第二乘此悉言下就果以彰權實初明調達有因出血彰權論云佛有補魚出血之因故爾二衆多比丘下顯實文四一比丘護佛二從窟下問答所由三佛告比丘下已勝諸怨正明顯實不須護四告諸比丘下舉五須護顯不須諸以現作惡後受苦報故曰後自當知戒據受體見慧就解言説顯教命謂耶命法律外者隨行乖法下五反説可知此就不可斷以分因果若取本期咸是方便第二可差舍利弗已下差令説乃釋上第二門於中文二初令説乃文四一差令説乃二乘疑請白佛為除遣三奉差往説為彰乃是調達不忓佛僧亦彰惡名則是治罰遠生下文作得脫之緣四大衆已下忍不忍異第二受教害父文六一受教害王二發覺得實三時守門下詳評治罰四則衛守已下舉以啓王有可不可一切沙門不應盡煞者上已唱剋過非佛僧不悅初言何以故者是調達教王害父正應合死而言不應煞故是提婆等作亦不應煞佛法僧治人唱如死罪不重加故曰不應五告諸臣下勑令赦過六不平王言第四別食文四謂舉過呵制第五立耶破僧文三初始以方便二提婆達則往已下共伴興計立耶三寶三時提婆達則以五法下以其耶化誘誑新學初始心中有其二心一破僧心二頑名心文有其四一生念之由次正興破念次求名之心次得名之由第二中文四初以名誘進勸助己破二時伴三聞已下將恐不果拒而不從三提婆言下正明設計立耶三寶四時三聞達下謂必能破發言嚮順第三立計中文二初立耶三寶第二當語已下示行方執前文後有三初舉正三寶第二我今已下立邪三寶我是邪佛亦有者是邪五法樂出離者三開達等是僧佛僧已知未識耶法故須第二盡形壽下正五耶之法別三相似後二妄語言同意別故曰相似佛寶不斷假説言斷故是妄語亦可前三若出不受亦是妄語以出所受故言相似後二若出所受亦是相似若不食肉可不食菜腐爛藥等以出不受故言妄語蘇鹽著味故令一斷魚肉害生復同為一十律五法盡形壽著著納衣受乞食受一食受露坐受斷肉法若有比丘受是五法疾得泥洹五分五法一盡形壽乞食二裸形露坐三不食魚肉四不食蘇五不食鹽祇無五法但改佛經律纍字暴句第等三我今持此已下結成然破第二當語諸比丘言示行方軌彰必能破文三一示行方軌還舉前文對機而説二人有違順三由此已下結耶三之功心洺二解聖位已去理解決定難可破堵名為上坐降斯已還他分容破故曰年少信受又後一解得忍凡夫永不可破名為上坐自斯已還自分不破他分可破故曰年少成論得生空已去是上坐于慧已前有可堵義是年少次第二呵中文三一以法之化舉以啓佛二佛告已下説正四依顯五法是耶欲使比丘識達種正三時世尊下先於呵無戒正彰呵責問衆多比丘不呵者何答言監相似或彼所説未審是非故闕無呵知有法故舉白佛次釋第三今日欲斷我四聖種説四依顯五法是耶耶法曀真故曰斷聖種問上來諸戒舉過則呵何故此戒先説四依顯五法是耶後方呵責答上來犯者皆乃顯群心於呵無或是以則呵此説五法藍佛四依言同意異若則呵者或佛所説持增迷倒莫知所趣故先説正顯五是耶後方呵責四聖種義五門分別一先説衆行二單律行法立四立四意三行法次第四行法開遮五以正顯種能斷聖種初門法雖衆多要唯衆行言行法者謂四依八正學之所依生行軌則故曰行法言衆法者謂説戒羯磨理頃詳遵同崇莫二方能衆法成就網納義立軌朱僧益故曰衆法所以須此二者佛若爾説行法無法可依行何由朱行真不朱則迷墜生死何然扝除惡業終狹道益雖有自行善朱若無衆法何然揀受衆徒朱僧寶之益故須衆法秉御辵化今調達亦學如來説此二法一立五以為行法反破如來四依八正二者非法羯磨以為衆法望反如來正衆法處若比丘信受始是信邪具足破正義備次第二門四一列數釋名謂衣食受藥等是依者馮也此四非依各為他託故並稱依憑仗此四資朱已行故曰四依又是生聖之緣後並名種二次定體者若約事辨四塵四大等是若就行分別順本要斯緣中節偷作與無作俱是聖種心論唯取無作蓋望受中要期説之謂無貪善引心中所教無作是無貪善性又無貪邪二謂少欲知足今取知足為聖種非少欲以知足於現境起故現在不取一錢難非未成轉輪王知足勝故知足為聖種三次立四意者行藉資朱事須將補資緣雖衆略唯內事各須兩便朱四依乞食及藥此二內充衣與攝下此兩外資形須弊明道藉學故使外須衣處兩別又以四大病爾病異故於內資食藥不同合以內外通論故曰四依又後對治四種供養故於此四修知足行是以但四第四與頭陀辨異可知次第三門所言依者無時不須要故先明是以第一依糞掃衣衣死彰形若無食充軀烏然修道故次乞食資道緣備宜託處修道故次第三依攝下坐須藥義希故次第四草就行之次第不同頭陀先後雜亂次第四門良由如來善達根性稱機授藥知足上行報為資強前糞掃衣為分堪忍不以為總資身離著有長道之益故爾何故開著檀越施衣次下人輩報力微劣若制同上行不稱根性無長道之功是以聖者開著施衣資身受用有長道之益由佛開故三人通得依而修道咸然會聖故曰聖種餘三制開類而可知次第五門如來所説四義故正一慈心所説原為益物二善識根性稱機長道三由識根性故善解開遮非但開於中下若上行人無糞掃衣受聽著施衣由此開遮三品通行俱能會聖下三開遮類以可知四佛説乞食等四能生八正故説緣為種趣泥洹遠因八正道是聖種然能趣泥洹近因稱法而談故曰為正調達不具四義以之為邪一惡心所秉破僧求名以之為種二不識根性無長道之益三唯制無開上行難朱豈訖中下寧不絶分四多論云調達説八正道是泥洹近因者説為遠因趣道反難執乞食等法是泥洹遠因者説為近因踰於八正入道最速倒説法故所以是種以此立起行化於時死法興顯正法須論故曰斷四聖種何等四聖出聖種無數方便説衣服趣得知足者謂嘆上行著糞掃衣此有二利棄同糞掃然是賤物毀其細軟離自會著故曰趣得知足二不為王賊貪奪資身長道有斯二益佛所讚美我亦歎説等者謂開中下著檀越施衣亦有二益一資身長道二福利言開遮通行皆然會聖故佛並歎下三合説無數方便説飯食者謂乞食牀具者謂攝下資身具等醫藥者謂腐爛藥此三上土所行然生知足俱然會聖故為佛歎我亦無數説飯食者謂開中下僧及請食等牀臥具者謂房石室中資具等物藥者謂蘇油等有療患之功依此四法然會於聖故曰聖種第三呵責文二初問自言文可知二爾時下呵呵中文三初總舉呵二別列呵辭三總以然呵子中文三初有四句呵其所行所斷諫勸修捨於中文二初二句呵所行所斷故文言汝云何以五法教比丘如上此呵所行次提婆下是呵所斷故曰莫斷等如上第二有兩句舉前行斷諫勸修捨文言莫方便等者舉前所行諫令不行即是斷前所行又言汝當與僧和合等者舉前所斷勸令順行共崇水乳即是行人前所斷第二是故下然呵勸言且對呵然一是汝五非行化破和合僧故即是初三句也二是汝斷我四依不同水乳義故便是二四句也以是義故當墮泥梨故亦呵汝若對勸然者是汝斷彼五非不破和合僧故即是反前初三句是汝修行四依共崇水乳義故相反前二四句便不墮泥梨得大功德故我勸汝文無者略第三時世尊下呵諫之益大段第二秉法設諫違而朱犯中又三一佛教比丘作白四諫法二僧為已下奉命設揀得增殘之所代應廣彰諫勸法用顯在辨相結罪勢便故爾三爾時諸比丘下舉以白佛因茲廣辨諫法嫁通被於一切問比丘覩調達違諫所以不呵更有多解上下有妨但是文略自下第二制廣補略問何以無癡人多種有漏等答以明諫法婉通乘勢亦略上來結戒相竟自下説戒初明戒本第二廣辨戒本文五初明諫所為事二彼比丘諸善比丘屏處諫勸三是比丘固執己心不肯從勸四彼比丘下衆僧設諫勸之令捨五不捨者下朱違諫初句文二若比丘者出犯人則是所諫之者二欲諸已下正明破僧諫所為事欲堵者牒前始心方便方便已下牒前立死三寶堅持不捨彼前行化屏諫文二初舉上呵諫中初三句勸捨故曰彼比丘應諫乃莫方便等二大德應與已下舉上呵中二四勸同水乳等然諸大德行雖有別所稟師同學法無二理應和同而無相猶如水乳和合相得故曰同一師學如水乳合亦可水與水合乳與乳合故曰如水乳合第三句是比丘者謂諸善比丘如是諫時謂諸善比丘屏諫之時堅持不捨者謂調達比丘執心拒勸第四句三諫捨者善聞則從順止不破僧一無違諫僧殘二無破僧蘭罪離斯二乃故曰捨者善問其實白四而言應三諫乃至三諫捨者善答謂取白及二羯磨故曰三除第四諫所以爾者一犯不犯位分前三未犯殘説第三竟犯殘二輕重別前三犯蘭第三得殘故言三諫捨者善以未犯重犯殘故據其道理實是白四又尼殊文言犯三法應捨者謂乃三法不捨者入犯重位故第五句結罪自下廣解戒本就比丘犯相中具解上五一解諫所為事二若比丘解上屏諫方法三若不用語者解上拒屏諫四應作白下解上僧諫方軌五從第三羯磨竟下解結罪輕重第一文中比丘可知二諫所為事但牒始心一句欲㥩二字未釋先解和合僧以二法解和合用四人等衆義以釋謂僧正以衆翻僧故云僧者四比丘若十乃至無數和合衆以番僧破者已下解前㥩字一舉破語數故言十八二列名解釋三是為者結四住破僧者囑當能破行死法然第二釋中法非者者八正真直然執生正解是泥洹之近因名法調達説為非法五死不能執生真解是非法説以為法律非解者在説亦爾犯不犯者夫言髮抓佛制勢剃而今調達謂髮抓有命若不剃前説為不犯如心念作惡理雖有違凡夫未制名為不犯調達説犯輕者遮乃調達見堵樹葉墮長壽龍中便言煞一切草木其罪最重初篇業重一形永鄣以見須提初作不得重罪則言一切盜淫悉皆是輕有殘者犯下四篇非是永鄣是其有殘説為無殘無殘者謂犯初篇永喪道牙字曰無殘説為有殘母云粗惡者初二篇方便若身若口無慚愧心犯得重偷蘭名無粗惡説為非粗惡提罪已下及餘蘭等皆非粗惡説為粗惡常所行者八正五法互説制者謂五篇禁戒金口吐宣名之為制説為非制非制者即五法非佛金口名為非制戒説以為制説者四禁是重餘是輕此是正教名之為説佛為非説重輕倒説此非佛教名非説而説以為説若明了論釋律中佛説有十四然破僧和合此中非法者五耶道分法者五正道分毗尼者三正道分非毗尼者三耶道分罪者乃如來所立前非罪者隨順如來所立制重者有二一田罪重二田前重輕者亦爾各各學處應知輕重言有殘者僧殘等無殘者四夷不可治者四戒十三中隨一一若已犯二邊不可知僧所立最惡滅諍羯磨如此等翻此名可所治粗者有二種有由犯意有一由罪翻此名非粗論云非如來説非如來教彼説是如來説是如來教是如來説是如來教彼説非如來説非如來教三藏解言如來説五陰十二入十八界十二緣生二十二根等八萬法門對治衆生煩惱行以此法門今其觀察是如來教十二部經如此文句是如來説彼反説之論云是如來所作及所習彼説非如來所作及所習非如來所作及所習説是如來所作及所習解云利益衆生事是如來所作入定現受法樂及常威儀是如來所習彼亦反説之此下兩雙四句出律阿毗達磨中並律中十四合有九對若準彼文以驅此律如來教如來説似當此第九説不説如來所作所習當此常所行非常所行以上十四中無此二故人言十八亦似合説次第二屏諫文舉四衆理應通七以不別秉法故第三若不用語者此拒屏諫竟得何罪答此但吉羅以無衆法故又所諫人破事未成違諫未滿要待事成攬吉成提問若違尼等屏諫為得何罪答文中雖無義應吉羅此中上下四重因果一破僧二違比丘屏諫三違六衆屏諫四違僧諫此之四重起雖先後四因具顯果但結殘餘之三重文不在此若以因望果殘之一種四因中後四果中前餘蘭提吉等四因中前四果中後以約法事不同故四因前後其位還四及論得果階級唯兩蘭等三果一時得故其謗僧等因果次比第四衆諫如文第五若不捨者下結罪中文二初自作違諫輕重二教人輕重文有二初結違諫罪二一功未白下諫所為事未作諫前但有逆方便吉羅前文中兩第三羯磨竟殘者具緣朱重若白二羯磨竟捨者三蘭下闕義諸諫同然問第三竟時得僧殘者為攬因朱果不合如五分但藉前方便葉思勢分相資令後心之業次第增著得僧殘時猶有蘭吉前須懺悔以其業思輕重不同感果有異故不相朱此律所明但但使作惡生生有罪如生福文證步步有福又得多論如欲盜煞步步偷蘭此律亦言羯磨竟三偷蘭明因中為罪然得果之時覽因朱果故下律文白未竟有吉羅作白竟直結偷蘭不言別有吉羅可懺乃至三羯磨竟朱僧殘時不言別有三蘭須懺故知因雖有罪以因朱果又祗云攬一切偷蘭以朱僧伽婆尸沙又多論前突吉羅變滅以成後果故知三羯磨竟攬四偷蘭共前一僧殘問文中但言二羯磨竟三蘭何故攬四共來犯答祇云攬四準此亦爾問前三偷蘭要違白羯磨竟方蘭未竟吉羅類於前文第三未竟應吉非蘭答蘭用吉朱違白竟得偷蘭其因寧重是以作白未竟但得吉羅第三竟時果是僧殘因寧得輕又後鄰近重境藉勢相資其業轉重為是第三未竟即得蘭罪不類於前又欲為吉因果同名過故蘭用吉朱不同吉羅極下罪故還用吉朱自有因吉羅朱因吉羅謂利吒白朱竟吉羅朱白竟吉羅自有因吉羅不朱因吉羅如白竟吉羅不朱初羯磨吉羅以法隔故又後俱作波逸提因故爾文言捨者三蘭非是捨心有是蘭罪申前方便違諫而起以其後心名前心罪故曰捨者蘭一切未白方便欲堵等乃至不捨一切突吉羅謂始心行化等俱吉故言一切亦可隨時長短乃至未羯磨前故曰一切乃以氏文故知在伽論教人文三一比丘教二尼教三下衆教應有諫作諫相法相五句如祇文有諸諫類然文無者略餘衆類説可知不犯中初語時捨通開三種謂不犯吉蘭殘等三罪故次非法別等五及非法非律猶七中初非六非等諫法不朱開無偷蘭僧殘二也亦可開三若彼惡友等為於益故開無破罪即無違諫又六非開者以諸諫等罪屬於別人故用僧非以開別不同於下減耳諸度人等戒罪屬於衆僧故用別事以開僧如文信父母諸皇大臣等助破違諫戒第十一衆僧作法諫調達時四伴別嚮助成破僧僧尋設諫拒而不受故曰助破違諫戒別緣有六一調達作破僧事二如法設諫三遮僧設諫助朱破僧四僧衆如法言此助五拒而不從六三羯磨竟此等六緣須意可知闕緣比説可解分文如前今就緣起中文二初至呵嘖已來助來破僧諫所為事二告諸比丘下秉法設諫違而未犯前文復二初至忍可正明四伴影嚮提婆助來破僧二諸比丘聞下呵所不應此戒既爾諸諫悉同下不復科初文有三一牒調達作破僧事二時諸比丘下牒前衆僧諫勸調達三時提婆達下伴黨影嚮助成破義正諫所為事問前戒比丘不呵此所以呵答前戒未達是非故闕無呵佛説四依又諫調達訖是非既分呵亦何爽違諫犯中亦三如前問四伴助伴僧位已上如何後諫答如別人求僧僧所酙量唯別作故有八難但至三人不得至衆又衆行治罰七羯磨等理亦別行故下文言僧舉僧是為非法此等要別又有容得為僧作者如滅諍中直據聖教刊定是非衆亦無如又如此諫非治罰又別不求僧直是破僧事大衆詳勸止修為多人設諫亦容得或可如是又可此是出其謀法不分衆別據其道理要必別諫如祇十二律差人自恣文言某甲某甲比丘豈即合差此亦如是任情所存戒本五句一諫所為事二彼比丘下屏諫方法三是比丘下拒諫四僧衆設諫五不捨者然罪初諫所為事文三一總明其人助破僧者二伴黨黨數三正明助破文兩一勸僧莫諫調達二此比丘下釋勸僧言所以我今勸僧莫諫者以人如法是故初二句人如此提婆達發言有軌故稱法語復能滅惡生善故曰律語次二句法是故然今我等慶遇所聞故曰喜樂稱合道理安心從順是故忍可二屏諫文四一領前諫辭遮其影助二然此已下人法俱非顯影助非理三大德莫欲已下是非相對勸其捨棄正是諫辭所謂諫捨助順勸崇水乳四大德下明和有益釋其勸言廣中具釋初句三中一人二先解第三助順已上有順從義故印可調達豈非從二種順從咸須設諫三伴黨下却解第二伴黨之數無共興謀名為伴黨要四人已上始成耶僧若佐成群侶名助伴黨若一二三若衆多此二伴黨皆須設諫祇中四句見異説同見説俱同此二須諫見同説異見説俱異此不須諫餘文悉同謗僧違諫戒第十二制戒言有六一解所以聽依聚落意有其二意一有待之刑假資方立須衣鄣形食以充軀濟身長道為朱自利故二為益施主僧田行施獲反報之福二不聽汙家惡行者克依聚落廣興諸過身非威儀即非自利四種汙家堵彼時人平等淨善之心亦非利物故結其罪三須擯者為過情深內外俱堵若不治罰永無改𠎝入道之益又增俗人以非為是故須治擯除其二堵四解謗僧言倚傍六人同作祇云三聞達多摩醯沙達多走至王道聚落迦留夷闡陀逆路懺悔此四不治迹涉愛增故五須諫言既有治不治似有愛增相監難分須僧因理諫彼顯己內無怖瞋之言六解結罪言衆僧自理諫彼是非理分固執拒勸三諫不捨故結僧殘釋名可知別緣有七一作汙家惡行二心無改悔三作法治擯四非理謗僧五如法設諫六拒而不從七三羯磨竟闕緣誰説若闕初緣全無輕重闕二直有汙家等罪闕三闕四同於闕二闕五謂作七非容得七位蘭結當位中未闕緣或一二三蘭諸諫闕如法諫緣準此闕六七同五餘諫闕緣準此制戒緣中文二初至呵責來非理謗僧諫所為事二告比丘下秉法設諫違而朱犯前文復二初非理謗僧二時舍利下正明呵責前文有三一至呵責來汙家惡行謗之緣起既自他兩堵須僧治擯是以第二告舍利下作法治擯三阿澤彼下倚傍謗僧前文有二初至戲笑正明作汙家惡行二時有衆多已下呵責以此四法堵他俗人淨善之心故曰汙家種種不淨之業穢汙恬濁又得惡果故曰惡行為此二乃近者目囑故言亦見穢嚮盈流遙者耳餐故曰亦聞但明惡行略不列汙家在辨相中故所以無比丘呵者佛既聽依聚落今順教起乃若輒呵者反生諍見此無益故闕無呵佛何以遙呵者將欲就彼聚落治擯作俗生信若喚來呵者終歸須請為是遙呵若爾可擯竟謗僧不須更治何故且遙答遠表謗有三時脫若未擯謗僧猶須彼治故亦遙呵亦可宜聞第二擯中文二初訖三匝而去佛立儐法以付身子二時舍利下奉命行罰前第二文六一進詣羈連將五百人者五分為怖前人令調伏故祗云阿難將六十比丘二阿漯彼等求其外護誹謗二聖三舍利弗下乞食充軀二輪教化四居士見下承教誹謗未受訓導五即為已下調伏生信遂無影護六尊者已下正行治擯第三謗僧如文身子親為他謗理不得呵但舉破佛第二設諫起過亦三如前文言若已擯者作擯竟故正與作擯法相應故曰若擯時始欲作法謂擯家方便故曰若未擯於此三時謗僧者莫問儐法竟以未竟告須設諫是故列此三時謗僧戒本五句一非理謗僧諫所為事二從諸比丘下自理屏諫三是比丘下拒屏諫四彼比丘下僧諫五若不捨下結違諫罪初文有四一犯人二依聚落下正明起過自他俱堵三諸比丘下牒過驅儐四是比丘下非理謗僧謗僧辭者謂不治逆路者名有愛懼於走者名有怖謂僧瞋我二人名有悉此三皆非解心所為不達治罰之方名有癡有如是同罪下顯己謗言二屏諫文三一諫莫謗僧故曰莫作是語等二而諸比丘下明僧自雪己心故曰而諸比丘不愛等逆路懺已無罪可治名不愛走人不現後不得治名不怖汝等二人進不懺悔退不巡走身過俱現理合治罰名不悉善達治擯故名不癡三大德已下推過屬彼故曰大德汙家等下三可知廣解五句初句四文中俱解初二比丘可知汙家文三一總舉四數列名二云何已下一一舉釋結三三是為已下總結開中初開無違諫輕重等罪二若與父母下開無汙家惡行罪惡性拒僧違諫戒等十三制意有三一制惡性不受諫意人非性智義無獨善要賴善友在相匠導方能離過修善有出道之益而今闡陀迷心造非不自見過他如法諫理宜從慎方復倚傍勝人尊處其己望人師敬反欲迬衆非分自處情過深厚是故聖制二須諫意有四種人咸須設諫一年耆宿德二久居衆首三薄學淺識謂智能過人四共勝人參居今此諫戒正當第四人然法由人弘人能通法德人懷道明達取捨理宜馮仗請決進否是以聖教勸依三藏開導迷愚以成咨訓而今闡陀內實無德聞勸不受反倚傍勝人恃己陵物言佛是我釋種法是我家佛所説我是佛法根本我應教諸大德大德何用教我為言説相似愚迷謂是須僧設諫開示是非有德相諫理宜慎從改迷從正棄惡就善是以須諫三結罪意衆僧詳諫勸依三藏在相受語是非見分不肯從慎故違僧法情過是重三諫不捨故結僧殘別緣有六一自身不能離惡將欲作罪二諸善比丘如法勸諫三不受勸導恃己陵物聖人師敬四如法設諫五拒而不捨六三羯磨竟制戒緣起文二初聞諫不受恃己陵物諫所為事二告比丘下秉法設諫違而成犯前文後二初起過二呵責過中文三第一先明不受語二舉多喻二合三是故已下結拒諫意就初文不受諫中二種持戒慎理若物名好二種犯戒違理起非名惡大諸莫語我二種好惡此明拒諫我應教大德者倚傍勝德望人師敬二何以故者釋不受道理次二喻者水喻行教有資潤之能風喻化教有靡草草用見論云佛是我家佛我將佛入山學道不見長老一人侍從佛得道已説化行二教法是我家法以佛所説理行二法攝受汝等庶姓之人依附我家佛法如似風水吹飄草木聚在一處我是佛法根本故我應教汝等汝等依我佛法出家何以反教我為見云為輕陵僧衆不受訓導不言僧是我家僧結文可知設諫文三準前以説戒本五句一初至莫諫我來明諫所為事二彼比丘下比丘屏諫勸相受語三是比丘下拒諫四彼比丘下僧諫五不捨下結違諫罪初諫所為事文三一出能拒人惡性不受語二於戒律中下諸善比丘如法呵諫三自身已下不受訓導望人師敬文四一不受勸導二言諸大德下汝莫語我三我亦不語汝四諸大諸下出不受道理謂恃己陵物又引契經但自觀身行等故言且止也屏諫文二一先諫前人互相受語二如是已下顯諫利益相受語故道根日進故稱增益將為前惡諫令不作故稱相諫未修善方便令生已興諸善修習增廣故曰相教已起惡業方便除遣故曰懺悔各彼此互為咸稱展轉諫言大德前止作二持所以成者良由義知識等互相匠導如何大德不德受語問經中佛説但自觀善不善云何此中展轉相教等多云佛隨時制教言乖趣令不相違背若見前人心有愛憎發言有損故云但自觀身行若見前人內有慈心發言有益故言展轉相教又見前人少聞無智出言無補故云但自觀身行若多聞有智言前有益故云展轉相教下三句可知廣解戒本五即為五文其事如是者實謂己所行是無其情過亦可我實應教汝故曰其事如是二不定義五門分別一來意釋名出體等二與諸篇罪初二同異三解二不定不入篇聚四此中義有三毗尼與七同異有無五增尼有無初門有四一來意二釋名三辨不定所防過四約就人處以辨通局初門來意者若也通論五篇能治皆有防非齊稱為戒故下文並言最初犯戒與比丘結戒等若據身口進止咸有法式皆名威儀故上文言非威儀等今且位分為兩前二所防乃粗能治稱戒下三犯細能治威儀今置在戒下威儀上者為彰可信女人得通舉七五上收於戒下捨威儀故爾是以十律憂彼問所信舉下四品罪得在不定中治否佛答言得二釋名釋名有三一釋二不定名義二彰以具多罪故成不定三對其篇聚攝罪盡不盡言釋名者昔來解言屏露兩殊稱之為二是中四法有無揩準字曰不定言四法者一犯不定謂或犯夷或犯殘或犯提或並犯三或得犯二多少差殊故二舉不定犯既不定可信稱事而舉故亦不定三自言不定舉既多少自言引罪寧容一準或可自言不犯四治罪不定若自言夷滅擯治之若自言犯殘別住治之等乃至若不自言引罪罪處所治故曰治罪不定也今解二不定者準明了論説云何名不定既對可信舉來至僧未定分別僧亦未得定結其罪故曰不定所言二者謂於屏露且對二坐一威儀中屏容犯七露或犯六今舉者直言見與之坐然僧雖得可信此言於戒七罪六罪名四無準中未得定結故對二坐言二不定若也具約餘三威儀二行二臥等名或七罪六罪名四無準又未審決便成八不定五可並言二不定則是四對二不定今據總語但言二不定此律文中自言所趣處則是行威儀自言到處威儀自言坐坐威儀自言臥臥威儀等又十律言云何名不定可信女人不知犯不犯不知何處起不知犯名字但言我見女人是處來去坐立亦見比丘來去坐立不見作淫奪人命觸女煞草過中食飲酒如是露事不決定故名不定如此二文亦亦對四威儀説云四威儀七罪不定故了論偈云能善簡擇罪三角釋曰此二或名三角或名三道此二是二不定名諸罪三角三道故不定者於此中諸罪不定譬如不定聚能通一切罪中故説不定三藏釋言言三角角者聚義聚有其三一定聚二不定聚三定不定聚言定聚者若可信女見行淫事及摩觸等此是定聚言不定聚者謂可信女但見對坐舉以白乃是不定所以爾者然此坐時或已犯淫後方乃坐二乃是犯蘭或乃五六語取與左衣乃是犯提取尼食等謂犯可呵乃犯夷事或己觸等乃是犯殘或方趣上或不應坐語犯突吉羅既含此理今但言坐豈得定結要須窮撿方落篇治是中未審故稱不定撿問之治須喚比丘及以女人各處問之若語相應如比丘治之若不相應罪處所治之三定不定聚者如見治病平脈針灸等事事雖似定謂但治病而罪亦容不定以其未知意趣何事此三聚中若罪在初聚乃是其定本非不定以後二聚未得定結其罪故有不定二坐克爾餘三類然乃是屏處約四威儀二十八罪各四無準露四威儀二十四各四無準落餘二聚故是諸罪中並未得定結故曰四對二不定也或言三道道是通行之處若罪行初角名為定道罪行第二角乃不定道若罪行第三角名定不定道似如三聚中不定聚人故論言譬如不定聚第二以具多罪釋成不定者論云後次此二不定是諸罪因故一切罪彰聚説緣起所生諸罪於中悉具足故此重解二不定名此之二處何因不定以斯屏露具生多罪既容多罪則舉之時有四無準露下二聚未有決審寧得定結故使不定言罪部者五部罪篇是聚者謂七聚説謂五種説戒所防之罪緣起者謂八緣起所生諸罪如從身不從口意生等謂此等罪於二處中並得具生生既如是故容不定第三門者問此三二處既具生多罪對於篇聚寬狹如何答罪雖七五非是數足以其不通二百五十故爾謂於愛染舉分及對女境招外譏等為所信舉者落下二聚在此不定中揀如違諫等長衣鉢藥別衆食輒教授不揀耳聽減年受戒等事中不相開涉者不定中無是謂罪足非數足故論言有餘師説此二不定似律本義以數少不得如律本義則是此略彼廣若人能引略入廣謂以不定中罪之篇聚相應或諫廣入略謂舉篇聚義中入不定相應若能如是引略廣揀廣從略是人於律則明了第三辨不定所防乃然者昔解舉屏録三罪初不定體若廢處論罪罪則是定廢罪論處處亦是定舉處録罪得言有不定之舉露録二罪為第二不定義亦如前所以知用三罪二罪者以三處求故又云準多論亦爾同三罪舉思輕重各異如何來三以為一戒合二為一若爾豈所要待作夷殘提方妃初戒作於殘提始違後戒若犯一即違何待具三又後上言收戒威儀故安此者為彰可信得舉五篇克理通五何如不言總以五罪為屏不定以下四罪為露不定但言三二耶又引多論者義後不爾多論文言佛坐道場已決定五篇戒輕虗通塞無法不定所以言不定者直以可信不識罪相輕重不識犯名字但見共女一處坐不知為作淫事為作摩觸為作粗惡語為乃五六故言不定觀此文意亦不專以三罪以為所明直解不得定結之義與十律文同又人言以非法自言為所明又以衆僧治罪不如或言疑似如第義咸是刀刀非見正理人語並不煩破之今辨正義論於二處四威儀中為可信女人舉事告僧僧衆既聞應須窮撿於屏二十八露二十四罪中未獲實者是所防之過無別罪名離染清淨不於二處行住坐立是能治行若爾三罪二罪豈非罪名耶答此是所撿之事若未獲實攝在不定定即篇聚非此所收今此所明制令撿審既言不定何有罪名若爾如何是戒答戒經二種一隨事立制是故名戒論篇聚等是不定未定不立彼篇聚戒中故自言是非中無二不定以彼約定罪以辨自言是非故世二隨事禁勒不制罪名亦名為戒論二不定亦在戒攝問所以是戒而無罪名者何答既就所撿猶未能定何得於此不定中復制定名名即定故然以戒故廣略十五具有二不定又云最初犯戒自今結戒得十利故又增二中制戒之利有二不定又如五戒十戒未制罪名豈非戒耶今此不定以能禁防離此應須撿據事故故得是戒次第四門處人通局但處有其四謂僧尼俗處及非上三於離見聞屏等是然就緣就俗處未知餘處竟後如何計其道理類亦應同論僧尼住處中可信舉告亦應落在不定中治今局執文但對俗處對人辨者文唯俗人故得不定比丘達名種故故無不定約亦宗説若就多少亦於不定即是或有或無此義不爾若隨事多少生不定者此亦是定以隨前事多即舉多少便舉小故非不定不得就此以解不定人六解言不定者只以犯戒多少重輕無準故於不定未達名種未得定結何罪故曰不定尼及俗男亦或不定未必專在俗女且據緣説第二門辨甚初二者僧屏三露二還對篇中五罪以諍初二不于餘罪今釋初二異於昔解何者是也若就所撿三罪二罪是其第二如二三篇與此不定以其人是一故然彼篇中已制初人明知不定從若獲實即當第二初夷亦爾若取應須撿窮使定而未能定名不定者此是初人對此已前未有犯故故使文中最初犯戒故此初二比於篇然見不同條然有異問此初人所以無開答若就所撿辨者真未定得其犯開何所開又約應須撿挍是其初者亦要窮審撿挍便定是故無開以其所撿是第二故第三門入篇不入者真知體殊無乳犯名明不入篇聚然是戒故須問清淨謂須問言於屏露處四威儀中無有可須撿問佛不以若未定須為定訖得與同説故問清淨問所撿之罪理通七五今若默妄為三罪二罪舉名撿問有默妄去餘亦有耶答默妄吉者從問緣生此處既三二問者可有默妄餘不舉名明有氈無其默妄以無問緣可違故又此生默者謂於三二應須撿問而生默妄非此三二自生默罪生則定故是以但有二處犯默非三處犯第四門毗尼同異者二不定中義言有三毗尼謂如比丘治即是自言毗尼如憂婆私治即是罪處所毗尼此二毗尼要假三五現前故須有現前毗尼所以無餘四者慢念不癡清人破謗用二毗尼以滅於諍可信女人舉事告僧本欲謗亦不諍何用憶念不癡多人語者定理耶正以滅於諍俗人舉事不詳理之正眼何用此為草䨱地者為諍輕重此中舉過本不生諍約不配引何用草䨱就此三中但是通名毗尼本無罪可滅無諍可殄如自言中但引上三不下二下自言中曰一引下三不言上二彼取自言懺悔能殄於諍故乃出藥若舉上二言未則殄故且言三下是非中具引五篇通俱相似若罪處所前引後違故宜治罰若令不引亦罪處所望女舉罪義同前引一向不引義同後違故亦治罰多論初言爾後言不爾或言不往不作並實不見毗尼故下文言若不自言所趣向處乃至不自言作如憂婆私治則是一向不引亦須治之下七毗尼前引後違作罪處所若一向不引大衆後不知者要待自言方得治罰以不前聖人舉通凡聖故不得義同前引一向不引不得義同後違故不相類現前毗尼隨配此二亦是通名第五門僧尼有無一釋比丘前三後二故有不定尼前戒二後戒但一故無不定此未必爾屏七露六豈此但就三二以辨可以當時事一日一就三二以論則使可信舉七如何治軀又解佛前舉罪男女二衆造相監察見乃須舉使無造作罪之地如大僧有犯同徒舉乃若女衆見亦須舉自然尼弟子恐違敬不得舉師是以可信俗女傾尼舉罪由俗聖女多喜得實又不識名種致有差殊故使比丘有二不定尼若造之出家男女二衆得舉既舉義備何須俗男傾僧舉尼有不定義故無不定此或容爾又有一義尼無不定者以前伴故論若被舉僧問有伴以不若言無伴先治獨罪恐治獨故便應引伴伴則定故亦或無犯進退有妨故無不定次釋文前戒意者多論一為止誹謗故二為除鬪諍故三為增上佛法故出家之人理宜迹絶塵染為人天所崇以道化物而與女人屏説非法上違聖旨下失人天敬之心四為斷耶道惡法次第故釋名如上別緣有五一屏處二人女三無第三人四於四威儀説非法語不見實事五所信告僧事未決審具此五者入不定撿下戒亦爾但露處為異闕緣比説毗舍見乃所以不呵者既信樂之人敬護佛法云何得呵戒本四句一其非法語犯不定二有住信下舉不定三是坐比丘下自言不定四如住下治罪不定此四無準中各含四威儀二十八罪為是此四成不定義下戒亦爾二十四罪各通其四廣解戒本則為四文初文六句一一釋女人者祇云若母女姊妹親疏老少在家出家二住信樂下解第二句三若比丘下一句解第三自言不定四若比丘下五句解治罪不定此二不定應對坐中七罪六罪在引不引餘三威儀亦爾然由可舉信坐威儀故還約此總舉一一威儀在引不引理通七罪六罪也釋治罪中昔解初句不舉上四泿引前四本舉第五不引第五此不必然今見與坐舉來白僧餘三威儀理亦同爾故今總四威儀並含七以説雖文中別引不引但使有不相當未得天定者如斯等類乃須窮撿名種使定非謂舉一不舉四等餘句類爾唯約不別多少有無罪處所治法文中自言作者未必唯作夷事此言作者通四威儀中有作七罪今總言作下戒無夷乃除作者且約夷説計理通七十律若比丘自説我有是罪而不比隨比丘語治若言法不犯是罪亦如比丘治若言不治無罪隨可信語治與作實不見白四不應受依止等若不如行者盡壽不得出是羯磨五分若於三事一一法中諸上坐應問是比丘汝法彼家不若言法未應治得應濡語與女坐不粗語不行淫不若言不上坐下坐應切問汝實語莫妄語如憂婆夷説不若言如憂婆夷説然後乃可隨説治沙彌應犯文無者略當時迦留亦須撿審故不開最初以無最初等俱略下戒並同唯以露處六罪為異
