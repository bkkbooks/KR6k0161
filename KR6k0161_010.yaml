body:
  text: 沙門法礪撰述九十單波逸提法祇中九十二提五分九十一十律九十少有同異可知此律九十總為七門料簡第一身口二自他兩業第三辨其遮性四持犯方軌五違制不同六二部同異七下衆任運有犯不犯初身口者位分為三有二十戒口業成犯二有三十一戒身業致𠎝三有三十九戒身口合犯口二十者謂妄語毀呰兩舌同誦說粗法過五六嫌罵輒教譏教一十日暮恐怖疑欲不鄣拒勸學毀毗尼同羯磨悔與欲已悔無根謗二十辨相可知此中亦有身業助成之義且以宗判身業三十一者二宿強敷坐脫覆作衣尼坐過受別衆三鉢十非時殘宿不受外道食藥請三坐前二軍陳十如非時食咽咽犯者豈非通名身業此一既爾餘類可知第三軍陳飲滴水戲過洗擊歷白色三衣二隨打博十突入一此等身犯口身合犯三十九者位以為三第一有兩戒身口止作業共身犯謂屏露二敷具若自敷身作業若教人敷口作業去時不自舉身止業不教人舉口止業出門出界犯豈非共身犯第二有七戒口家止業共身犯謂覆藏粗罪見論身心犯以見聞他犯此是通名身業未即成罪若發露無過由口止不發露故心地覆藏徑夜便犯是名假口止業共身六戒皆有口業作法本自無過由口止故身作前得其罪謂皆請足食二入聚落輒著不與欲是等假口止業共身犯第三有三十戒口作共身犯於中位四一有十九戒自口作業假他身是中若論自作唯身心犯且約教人邊說如教壞地言雖了了未即犯提要假前人身業壞他教者方犯是名自口作業假他人餘皆類然教人壞生掘地牽他出房用蟲水勸足無事燃火藏他衣鉢煞畜生驅他出聚飲蟲水遣使持己衣與尼捉寶高牀下次第七戒此等戒是第二有四戒自身假他口謂讚食減年受戒不攝耳聽屏聽此等是如尼讚食戒若尼不讚但爾直食本自無犯假尼口讚食方成犯減年受戒和上得提假羯磨竟餘者可知第三有五戒自身口假他身如四期索美食第四有兩戒自身口假他口謂異語觸惱身口兩業假僧作白又須喚問故假他屏諫所作之事通於七聚豈非身口要假他犯故第二門勸足一戒唯教他業足食一戒唯自作業自他兩業分為二戒有二十一戒有教人同犯而不別立自他之異既知斯義位約為四一唯教人謂勸足是第二有十一戒自他俱犯謂掘地壞生牽出二蟲水恐怖然火藏衣鉢煞畜生無根謗捉寶於中掘壞捉寶此三大護佛法故餘總境重故但使教人一切同犯第三有十戒教人同不同謂屏露二敷持衣與尼高林下七教人作此於己有潤是以同犯若直教人於己無益但得輕𠎝第四餘四有六十八中六十七戒自重教輕足食一但自作業第三門三十是性餘悉輕遮其三十者謂妄毀兩粗異嫌強牽用譏驅諫恐煞飲疑覆起說隨擯掘毀同欲悔聽打博謗此等性惡氣分餘並遮𠎝第四門持犯之方有十三戒具二持犯謂五雙三隻如得羯磨一隻說粗教戒尼受功德衣復有一雙不犯背授一雙二入聚落作餘食法得無足食勸足七日盡形作口法受不犯殘宿不受淨施問主無其輒罪知粗發露僧事與欲此復三隻合十三戒由聖開聽作其口法若順聖教作口法竟作此十三而無罪過名為作持止不作法而身作事有違名為止犯據作事邊復名作犯此止作二犯業思體一而名是別若止法止事名為止持作持止持名體各別亦可作法作事望作法邊即是作持以作法故縱作前事而無犯反却作犯豈非止持此亦體一名異問如功德衣亦蔭食前食後所以但言背別者以彼時外對非時入聚俱開囑授故闕不論又背請中時非捨請亦有作持所以不論者為對別衆唯有時利故且配彼非謂非時無其作持即背請食前食後此二十二月中成咸作持別衆唯五月內是餘時即非餘七十單持犯中不攝耳一作持止犯餘止持作犯如此釋時不攝耳一唯作持止犯十三少分作持止犯餘七十六及十三少分通論八十九止持作犯犯持品別已如上辨第五門異語論欲反以二隨此違僧制餘違佛制通而言之並一是佛制但諸羯磨要須僧秉若不作此羯磨法作無所違故言違僧制得罪第六門二部同異三種不同一有三戒有無同謂輒教日暮譏教戒師大僧則有尼無可知二有十三戒輕重不同謂食三衣五坐行三牙角針筒大僧便重尼衆咸輕多以大僧數故便重尼故輕謂讚食勸足索美是三食與尼衣作及三過量是衣五有五戒犯同緣異謂背請足食犯同而開緣不同亦可離合不同與外道食犯雖是同與緣不同減年一戒受緣不同過量浴衣生犯緣同用緣不同亦可名字不同此等俱得提罪名為犯同緣有異故下尼別制不同之義至文中解餘以同故至尼法中直列戒本此是位言於中細論加覆藏僧寬尼狹戒有境界翻到隨義有異如兩舌毀呰二宿過五六語等反說可知第七門前自他四位第二第三教人犯中二十一戒除屏露二敷餘十九戒容有任運餘無可知自下隨文自有科分以解釋者今且隨戒別論之故妄語戒第一所以制者出家之人理宜稱實寧喪身命許無虗謬今反違心背想欺誑前人令他虗解自失聖利過中之甚是以聖制言不稱稱實所以名妄彰之在口曰語無心不犯故曰故妄語戒通緣如上別緣有六一人二作人想三違想說四知違想說五言了了六前人聞知𨷂緣比具七方便多少是中四句戒有是妄語非兩舌非惡口傳他語時以不實故是妄語不分離心非兩舌𣽈語說故非惡口第三是惡口非兩說第四具有三下毀呰兩舌作法亦有四句類說可知戒本三句一犯人二故妄語三結犯下具解三初句可知二知而妄語已下合解二三兩句於中文二初至皆是妄語廣解妄語方法差別之相二於大衆中已下辨輕重相前文復二初至逸提對於六識違境轉心廣釋妄語二所見異已下對於想受行心所得之事以明妄語前文有三一解八種不淨語境界差殊離合之想二若不見不聞下舉前八種不淨語境界誑人犯義三本作是念不解妄語前後方便多少前文又兩一列八種不淨語境界二見者已下解此境界離合之相列名中先舉不見等四後列見聞等四第二釋中先解後四見聞觸知却解前四不見聞觸知言見者眼識能見解後四初見字是不淨語境眼根五緣能通生識了莂名見一眼根淨二有色塵三假空四須明五作發識意故名為見耳識能聞者有四緣故聞一耳根清淨二者聲塵二假空四作發識意餘三三緣能觸一二根不壞二有觸塵到根三發識意意知一切俱能知故辨離合者三根性利力用偏多故還為三三根性鈍力用處少分為一覺又復三根遠取境界離中生知故名為一三根近取境界合中生知故為覺故心論云二境不近受遠近境界一餘一向近受故又三根神通性故雖餘非故合不見已下釋前四境言不見者解初句不見字除眼識者除猶無謂無眼謂名為不見後時言見即是妄語又言餘五識語是者亦不見境以五識所得誑他言見即成妄語亦是不見言見下三類爾如是解時不見等四以無為境所違境寬如似直爾不見是名不見餘五識所得亦是不見故文不見者餘眼識餘五識是下三類然所稱體狹謂對不見言見見唯眼識是故言狹下三亦爾類而可下知四見等以有為境所違境狹謂唯眼識所稱體寬但言不見即是違境若實有見舉五識所得答他聞等亦是妄語故所以寬若與八相違故為非聖語若慎八說即是聖語也下正辨妄中但對不見舉見對見舉不見不廣分拆若依此上八文應舉不見并觸舉聞觸知發言道見次不聞并見觸知發言道聞次不觸并見聞知發言道觸次不知并見聞觸發言道知作文亦爾但不見言含故總說也若舉見等發言不見等亦應并言聞等以成妄謂語亦是總言下對聞等三義亦同爾第二就辨妄語中初不見等約六心作二十四句須作四門分別一定心多少二對謗六心以辨有無三就有中以解同異四隨文辨相初門者位有四心一無想心二有疑心四無疑心今者言六者初無想有想當位立一次有疑無疑各生單違心句故成六心即是無想唯俱違有想單違心有疑中具二無疑亦具二是故初三五俱違句二四六單違心也問所以初無想中不同無疑有單違心耶答無疑之中得稱有疑成妄故來無想心中不得稱言有想不見等若真言不見便是是實語不說心違故所以無問有想心中有單違心句不同有疑心立俱違者何答亦為疑隱成妄故來想不得隱若言見者即稱心實非妄故無如此有想不成俱違妄語者豈得成謗故謗戒中亦無此句句第二門者謗中初三五即此初三五心境俱違位正是一彼二四六謂三忘心義約不得來問所以有想妄忘謗有此無者答彼舉見聞往謗若不言妄見聞疑想全稱心實故須著忘成謗無濫此戒本實不見橫生見想若忘此見想還語他不見則是實語不成虗誑故無此忘若爾何以不著忘此見想發言道見應成妄語所以不論答實成妄語即是心境俱違與初句無異又生人疑要謂心境俱虗方成妄語故不言妄見想也有疑妄即是無疑中兩句故亦不有無疑妄即有疑中二句此等皆就同相故無問有疑忘即無疑二者無疑忘即有疑二者此二即是相狀云何答如有疑忘竟即是無疑若言疑見即是初句心境俱到若言疑不見即是第二單違心也無疑忘即有疑二者若言見無疑即疑中初句若言不見無疑即便是單違為此同故故所以無今此直舉不忘心中生出單違故爾以其小忘所稱語體通見不見左右俱犯故謗淨所稱語狹唯有俱違故出忘相對坊巧故爾又可謗中為取俱違等同俱違坊巧情故離忘為六全今此小妄對單違故攝三忘心入三不忘故無三忘心也第三門同異者謗中境唯不見聞等言唯見聞疑妄此小妄中境界有八語亦有八又望初六對謗初三五辨別可爾若對後六初三五俱虗義同事全翻到兩處二四六其相天殊第四隨文者就不見境誑有六句一不見言見此無想心心境俱違第二不見謂見誑言不見此有想心中境順心違句第三實不見內生疑心不知為見為不見誑言見無疑心境俱違第四實不見疑心同前誑他不見無疑此境順心違第五實不見無橫疑發言疑見此亦境違俱第六實不見無橫疑發言我疑不見境順心違下不聞觸知等三境各為六句四境各六故成二十今律文好略舉不見等四境一心上并作四句歷於六心故成二十四句次此應廣說謂舉後四就見聞觸知境妄語之比前類知三前後多少者正是八業差別為取根本提罪故但列四初三時有心次有二句二時有心一時無心末句根本有心前後無心此四提罪前後有心根本無心前一有心後二無心後一有心前二無心此三得吉三時無心不犯第二明想受行等妄語者唯所見異者行心之中見於虎狼言見佛像答他異本所見故所見異領納違境安苦受名之為忍對他言樂受異本所忍故曰所忍異緣於財色悕須名欲即得聞法故曰所欲異坐禪行中實得令觸言得熱觸此所觸異無生怨想言有親想故曰也行心緣此答言緣彼故云所心異輕重相一當宗結提二默妄吉羅如十律對此文中即列五妄不見等四開前六中初二五見等四開後廣說六初三五此二並反妄語意有見想便說開前六第二句理更須有意有不見想便說開後六第二句復應言有疑便說開前二六各三四句復應言意無疑便開說前二各五六句也亦可不見等四反前二十四見等四反後二十四意有見想便說開所見異等毀呰戒第二夫人之法宜出奉言迎相讚嘆令彼歡喜勇進修道反以下賤之言形呰前人令彼慚愧廢修正業傷切人心甚於劒割惱處不輕故所以制別緣有六一大比丘二是呰毀語三知是毀呰語四作折辱意五言彰了了六前人聞知此毀呰亦有四句此前而說戒本三句一犯人二毀呰三結犯初句可知釋下兩句文二第一惡法毀呰二若說善法不善法毀呰就惡法罵中文兩第一惡法罵於中文三初列七惡法次列三章門次而面罵者下行罵方法第二若比丘已下結罪重輕祇中有七事種性業相根病罪罵結使初三各有三品上中下若以下毀比丘及比丘父母提毀他和尚阿闍梨蘭毀他比丘知識親友越毗尼若中毀比丘及父母蘭和上等越親友等越心悔已上毀比丘及父母越和尚及知識等越心悔後四種悉下無中上得罪階降如前下種姓說也然此四分七種者悉是下品全無中上也善法罵中亦二一解罵法對前第二句第二若比丘下結罪輕重對前第三解前句中文三一先列三罵門二說善法者下舉其善法十二頭陀雜行法等三說善面罵以下行罵方便此犯同緣異尼罵尼提罵比丘提別制一戒僧罵僧提罵尼得吉尊毀下人總微故輕兩舌語戒第三夫出家同住無心生別專搆私屏傳於彼此令僧未有諍事而生已有諍事不可除滅鬬亂僧衆惱壞虗重是故聖制別緣為六一若大比丘除餘衆破僧助伴等二說鄙惡事三傳於彼此四作離別意五言章了六前人知聞論中鬪亂大比丘提餘衆罪輕以鬪比丘容有別部破僧事起為斯故重亦有四句比前以說戒本三句一犯人二兩舌語三結罪解初句可知二兩舌者釋第二文二第一別出十衆是鬪亂境界出家在家在衆各分五故十比丘犯提餘九悉輕比丘作頭鬪亂有十餘九各爾合有百句第二鬪亂者下所傳鄙惡之法正是虗辭又前妄語事順前情故七衆犯毀呰兩舌違情總重大比丘第三若比丘破已下解結罪句前戒善法毀人對面懷惱故所以列此是屏傳全可無惱故不列善法兩舌語女人同室宿戒第四男女形殊理無同居境界交涉容生穢染人致譏醜真能自拔患纍不輕是故須制緣五一是人女二室相成就三共同室宿四知共宿五隨臥轉側結罪言人女者四五二律局取人女人簡餘趣女簡異男等但是人女不問道俗親疏大小五分乃至初生具非具除死女也祇十二律通三趣女謂祇中云母女姊妹大小道俗咸是犯境十律云三趣女共宿並犯若駝馬牛羊若臥若立等鵝鴈孔雞等若一腳立頭置頂上即名宿犯乃至他舍有女人容猫子處宿亦犯四知共同宿者但知宿即犯不同二行要須共期方犯五分若母女姊妹近親病若有知男自伴不臥皆不犯此律下開自病不犯對此病開亦應立緣除因緣也緣起文二初至從坐而去寄相起過二還僧伽藍下句呵嘖前中文二初至在前寄相似犯二淫女室中然燈燭已下彰實不犯於中文三初不犯緣二彼淫女初夜已下至本處坐來明不犯行三那律即下已下度令得道鄣下犯位呵責制戒中無癡人多種處者此大羅漢具二解脫癡愛斯盡是以闕無藉為緣故戒本四句一犯人犯二女人三同室宿四結犯廣解釋犯於中文兩初成犯相二若天女以下異趣形報以辨輕重盡一曰婦女立比丘臥吉者非宿非坐故與未受具人同宿過三夜戒第五凡道俗路乖情事相反始習未聞事多相總近則生慢亂道廢業故宜別處存道益敬為是須制然出家之人栖止無定事有遊行投人宿止存形清命又沙彌離俗憑蔭在此更無所伏事須眷接是以開聽限期二宿然禁則防其過開開則通其益開制之宜理所應然別緣具五一未受具人男子簡去女人所以女人無過三夜者答佛制不聽與女人宿隨轉側犯本不開二夜何有過三之名伽論與女相續過三夜但有同室宿罪無過三罪若曾前與男子二夜竟第三夜與女人同宿隨臥轉側犯二提罪又復下文天男阿修羅男宿犯明知甄去天女故人知中亦簡人女無過三夜罪二室相成就三共室宿是中句人一室異過三夜犯或室一人異戒人室俱一或人室俱異此等並犯四知共同宿五過三夜犯十律過二夜提第三夜隨脅著地提隨臥犯又比丘病沙彌看病過夜不犯四分下開自病不犯五分不犯中同覆各有隔若病不能起居若有諸難若常坐不臥若更坐更臥不犯若開病者立緣應言除病緣戒本文三一略制二制牒隨開二夜三夜佛既不聽與未具人宿驅出羅云應是順教何以呵言癡人無慈不護我意答夫為弟子有事之時理須咨啓佛因事開輒爾驅出乖弟子之儀無慈之甚以佛呵癡人無慈親是佛子尚不慈念豈況餘人寧有存愍五分佛呵責汝愚癡人云何野狐驅逐師子讚嘆持戒亦聽共未受具人宿若過二宿至後夜時以脅著牀及轉側皆提三滿足戒本四句一犯人二未受具人三共宿過三四結罪前開文中若隨第三宿明相未出應起避去若至第四宿自去若使未受人去者若不避明相似應越明相至第四日旦即犯一提若避明相旦時未犯於第四夜隨宿轉側一一提罪今戒本中直對不避明相為法一邊而結故言過二宿至三宿提若避明相過三未犯第四夜犯祇若三夜犯竟若未懺悔無二夜開隨宿宿結罪若懺竟得開二夜問此戒初禁其宿後開二三夜即犯無一夜犯所以觀軍戒中初制直見犯後開二三宿別立戒猶有直見戒耶答未具同室犯由於宿後開二三宿曰宿開宿永無一宿犯軍中由觀後藉緣故開二三宿別立過三戒然觀軍非宿因緣開見軍不犯若宿緣猶不聽觀還犯觀戒是故不類問三戒俱開二三夜何故斯二戒本中除屏敷戒中亦開二三而不在戒本答此二由住故犯去則不犯故列二三開位定故彼戒去有暫永犯通暫永去故不在戒本中除下辨相中具解四句第四句中文兩第一對宗結犯此據第四宿故言脅著地犯小轉犯謂是避明相人不同戒本二若天男下餘趣結輕與未受具誦戒第六凡理藉言宣教為表旨言辨理通辭亂隱曀通益智明曀增情或故多論四種義故一為異外道故二為師與弟子位別故三為分別言語分了故四為依實義不貴音聲故為斯四益是故須制別緣有五一是佛所說法二字句味三未具人四齊聲同誦五言說了了便犯戒本四句一犯人二未受具人三同誦四結罪解上二別解句義已下合解三四二句於中文二初至諸天所說正明所誦之法謂字句味二若比丘下結犯輕前文復二一出三句法體二佛所說下是佛說等謂非餘人前文復二列三種法謂句義等是二句義者已下解此三法句義者二人音聲同句義表三行理周名為句義犯提論云音聲句異吉羅非句義者前人說諸惡莫作未竟後人抄前言諸惡莫作使前人言教表止行不圓故曰非句義亦犯提罪以句同聲相接故又此正令前教表理不成專是過體何以非犯音聲同句表無常理同有資神之益名曰句味抄奪前言表理不周無資神之用故曰非句味音聲同誦表名體理圓名為字義抄奪前言名體不圓故曰非字義二佛所說法者見論一切律藏阿毗曇修多羅是佛所說後五百羅漢結集此法同誦悉犯提罪若自以己意撰集文字此非佛說無罪若聲聞諸天佛力加說或得佛述成此猶佛法同誦犯提不得佛力及以述成同誦非過第二結罪中一說者舉前句義二說者舉前句未三說者舉前字義亦可隨於句義中一二三說皆犯故言一二三說味字同爾文且舉三為法餘亦同犯若口提授謂說而抄奪若書授謂寫而截句次異趣次結失法之𠎝向未受具人說他粗罪戒第七出家僧衆理宜清顯美名外彰生人信敬以此比丘粗惡之事向俗人說前人聞之於彼僧寶情生薄淡失其信敬崇重之意損壞處深故所以制具緣有七一是比丘二犯粗罪三知粗罪四向未受具人說五無因緣除被著故六言辭了了七前人聞知滿足戒本五句一犯人二知犯粗罪除犯下三說之過微初二同粗有壞衆之義過重故提出血破僧此二偷蘭名雖是輕其業深重說亦壞衆同前犯隨若爾何以辨相但彰初二不列二蘭答輕重若列名者監餘偷蘭為此但言除僧羯磨已顯不得羯磨說出佛身血明同是犯不同十律問說初二篇罪同得提謗他初二便有輕重答謗據治罰損有淺深故有階降說他粗罪即無治罰就懷衆處音同結提罪三向未受人說四除羯磨不犯五結罪辨相具解此五唯先解第三却解第二為異所以爾者為將粗罪合除僧羯磨偷蘭說之以但是粗罪故解第五中文四一說比丘罪文二謂粗別可知二自說粗所以輕者良由說他義數故須重制自說義希故但犯輕又說他過多一有自壞二有總他三者壞俗自說過少𨷂無總無他是以但吉三說下三衆四境想四句此望說他以階重輕第三粗非粗想落在開中以其全謂非罪故爾若據轉想亦有吉羅實得道向未受具人說戒第八論云有二義故所以制一為大人法理宜功德䨱藏諸惡發露今自說德行隱匿罪過非大人之法二自顯聖德即賢愚有異前人聞之偏心專敬失於平等淨善之心是故聖制緣五一有實德蠲去增上慢人境虗不犯二自言己有三向未受具人說四言辭了了五前人聞知十律比丘實是四果得四向或得四禪四空或成就慈悲喜捨不淨阿那波那等說者皆犯提罪或實見諸天龍鬼來至我所說者亦提問說已得聖罪別事提所以現通但有去罪罪答若論口說義通凡聖事前簡虗實虗則過重實者𠎝微故別夷提神通聖能更無有濫但得吉羅問夷境所對婉七衆犯實除二具現神足者唯二俗犯所以不同答咸據過有增微故此階降也然復此戒不別有緣舉夫妄語中或有實者以制斯戒此聖人制竟不復更犯謂是制聖遮凡戒本四句一人二前境三說己所得四結罪下具解四上三可知若彼真實下解第四文三當宗以辨二天子下異趣三若實得向非同意下對前境非類非同意以辨輕重更無別緣故增上慢開通中說與女人說法過五六語戒第九凡說法生善事須應時不請而說理無強授本無信敬情懷奢慢脫因斯次致與過非不免世呵又女人形礙福緣難遇若全不說無由生善於法長隔永淪苦海故復聽說齊五六語過則制犯緣六一是人女二知是人女三不請四無有智俗人二男子五言辭了了六過五六語便犯若請隨說多少文言女人請故聽齊五六語者謂緣起也滿足戒本五句一犯人二所為女人三說過五六見論若過已外說己聲相接不斷一罪若句句提四除開五結罪解文可知五分為說五六竟從坐起去更有因緣還坐為說不犯若五六竟為後女人說如是相因為無量女人說不犯掘地戒第十制戒意多論有三種益故不聽掘地壞生一為不總衆生故出家修慈宜愍物命制不聽掘離惱害故二為止誹謗故三為大護佛法故若佛不制此二戒者一切國王當使比丘種種作役事務紛動遮鄣修道以制此故國王息意不復䇿役得令比丘息緣修道終成出益緣五一是生地二作生地想三自掘四使人掘時不作知淨語五隨傷便犯戒本文三一自掘故略制戒本二教人掘時下行淨前制未圓更復績結三滿足戒本五句一犯人二自作業三所傷地四教人業五結犯初句第三別釋若用鋤下二四五句合而釋之第三句地者見論生地者無有沙石瓦礫純土是名生地若四分沙一分土此非生地自壞無罪祇地有二種生作也生者大地作者有二種一基作者露地壁二上作者重閣屋上覆土是悉犯提五律須泥無淨人淨復無𡶤坼土聽比丘水洗地持草布上踰使成泥不犯此文二就已掘已掘中或二或三可知不問覆露但使是前二地壞犯提罪除土不犯正解第二第四第五句壞地犯中第一地壞結犯見論教人二種一遙教淨人汝為衆僧某處掘地斫木身不親見雖壞不犯若身親自現前指示掘是斫是犯提此律教人不作淨語無問現不現悉皆犯提若教大比丘雖作淨語亦未免犯祇律掘地草竟曰不止者提若中間息一一提也第二境想一句第三結教人失法罪壞生種戒第十一制意如上犯緣亦同此戒不別有緣舉前房戒緣中斫樹以為緣起戒本五句一人二壞業三鬼神村四所傷之境五結犯初略釋四句初句可知次解第三次釋第四次解第二村有五種已下解前村壞之結犯文兩初廣解所壞境界謂一切村二若生生想下自他壞之以明結犯前文中三第一舉數第二列名三五村生雖有五義合有三第一種根生二種枝生三種子生根種分二不假節生者作根種之名根中假節者作覆羅之稱枝種亦二枝中不假節生者作枝種之名假節生作節生之目子子種中當體立一始未差分雖成有五第三出其事相見論呵梨陀薑者漢云黃薑律文胡漢並彰故也憂尸羅者香菜貿他致吒漢云頭香蘆揵者黃連也陀樓外國草名柳可知舍摩者菩提樹羅婆醯陀者貝多樹蘇摩那華與末利華相似其華騰生蘇羅婆不得其名𮑱醯那外國草名第二壞之結犯中二第一五生種就地離地俱犯提罪於中約境想五句一境心相應提餘四句吉二草木七種色已下非是生種就地壞提亦五如前離地無犯問打杙樹上隨打多少一一提罪煞畜生何不隨斫得提要待斷命耶答草木有多生相故隨壞處皆彰一分生不起是以隨壞得罪畜生報者一假名要斷方犯異語惱僧戒第十二凡身口業綺微而難制過不至重惱衆非輕事須衆僧作法呵制仍作不止違法惱僧其過不淺故隨得罪緣五身口業綺二數作不止三作白呵制四僧如法喚問五更違犯未作制前未有僧命衆法可違但犯小𠎝制後違者方犯提罪口業綺者作異語之名身業綺者作觸惱之稱雖前後二結違制處同合為一戒口餘三過妄毀兩惱境事重直作即提此之綺者事似輕微惱衆不少故制方犯提戒亦三謂略及隨結滿足戒本辨相可知不犯中初開餘語二若欲作非法羯磨下開前觸惱嫌罵戒第十三凡僧務事廣處之不易故簡備德之人如法斷理宜應讚歎令彼勤營反懷恚忿發言嫌罵令彼生惱廢營僧事損壞不輕故所以制緣六一羯磨僧知事人二知是三如法經營無愛恚等四說嫌罵語五言彰了了六前人見而不聞聞而不見便犯與前罵戒何別答前非知事人此是事人又復前戒實不實犯此實不犯虗方結提次釋名者見而不聞處說有愛恚名嫌聞不見處名罵雖前後二結同總知事合為一戒問上言面罵此言面嫌也答此嫌罵之名文之倚說對非知事人要見聞內方究竟提若互雖見聞但犯輕𠎝此是僧知事人欲令尊敬見聞互離嫌罵亦提不待但在見聞之內戒本三句辨相具解露處敷僧臥具第十四多論三義故制舉臥具一四方僧物皆是篤信檀越所捨供僧受用利益事廓理宜賞護資身行道得安樂故二既是施主之物詳心愛惜常存受用為令增長信敬心故三觸即收舉使僧物不壞合受用功德反資施主善根成就故為茲三益是以聖制別緣有六一四方僧臥具二知是僧物三露處四自敷使人敷為己受用五去時不自舉不教人舉六出門便犯十律出門三十九祇二十五肘犯緣起文二初至不淨已來不舉起過二諸比丘食還已下呵責戒本四句一犯人二是僧物三露地已下正明為己敷僧臥具露地受用四捨去已下結不舉之罪辨相具解初句知二僧物者下解第二僧物等前回僧物中唯取以許僧餘非彼境今此二戒亦列三物人言初物不舉提第二無罪第三句物以入僧寄當亦未定入僧不舉小罪然細觀此文與初大監亦可初物吉第三物提文勢似到三若比丘下解上自為己用四去時已下解第四不舉結犯文二初至方便去已來欲解不舉之𠎝先反解舉之方法二若比丘不作上來如是舉者名此不舉出門犯提五分比丘見僧敷露地以不自敷故不收犯提白衣來至僧坊敷僧臥具不舉亦提白衣請僧借僧臥具於家敷之諸比丘坐去不舉亦提僧尼坊中敷僧臥具不舉亦提屏處敷僧臥具戒第十五制意同前六緣成犯一是僧物二知是僧物三是屏處四為己敷開五去時不舉六過限便犯犯戒本五句一犯人二於僧房者謂屏處三敷僧臥具謂所用僧物四若自敷下為己受用五去時已下結不舉罪辨相具解初句可知僧物者下解第三彼比丘下合解二四兩句去時已下解第五下舉結犯於中文二初永去不犯犯於中復二第一從初至作而去來付囑舉賞示不犯法二若比丘下違而結犯第二若即還不久二宿下暫去不犯犯謂開二宿過二宿提問既開二宿何故戒本不牒而除之答去有永暫違而並提欲決一文收二犯盡故不牒開也不犯還兩開初開先永二若時還不久已下開後暫去強敷臥具戒第十六凡物有限事局彼此情同則我為彼有意隔事須進否然知他先得住處意不籌量輒便於中強敷臥具共相逼惱非出家之戒故所以制別緣有六一先得住處安止已定二知先住三作總彼意四強敷臥具五無因緣謂無親舊人及病與二難等緣六隨臥犯提滿足戒本四句一犯人二知他先得住處三後來下強敷相惱四作是下結非威儀罪作如是因緣者謂作故惱因緣非餘者非病等諸緣故非威儀者彰顯其過昔言不解第二今論具解初三別解若比丘下合辨二四兩句牽他出房戒第十七然四方僧房衆人共有理無偏屬先至斷理安止已定後來之徒宜共受用瞋心牽出自壞惱他諍之本損處不輕是以須制六緣成四犯一方僧春冬房二先至安止已定三作惱亂彼意四瞋心牽出五無因緣謂舉等不犯故六隨出門便犯問前房開親不簡淨穢此戒局淨不除親者答前是他物屬先借者親則無強非僧住處故不簡淨此是僧房淨有共住不淨無共驅出無犯戒本四句一犯人二內心瞋忿三是僧房甄去私房不犯四若自已下牽出結罪昔言辨相不解第二今釋具辨謂初三別解二四合釋五分若後屋牽至前屋前屋牽至戶外戶外牽至𨓍中𨓍中牽至𨓍外皆犯提罪重屋上坐脫腳慎戒第十八凡事宜審危險須慎重屋薄覆脫腳之牀放身坐臥容有墜墮傷於下人惱處不輕是故聖制別緣有四一重屋二薄覆三脫腳牀四放身坐臥戒本四句一人二重屋三脫腳牀四坐臥結犯下具解四句用蟲水和泥戒第十九慈濟物命道之正要知水有蟲而故受用將損物命違其慈道家存自營所為無理事是非輕故所以制別緣有四一是蟲水二知三不作法漉四隨所澆犯戒本三句可知辨相具解境想四句五分內外二用合制一戒蟲水者漉囊所遮肉眼所見十律眼所見漉囊所遮自澆草及和泥及使人和隨蟲一一提境想六句祇一息一提隨息多少一一提多論若作住處先應看水用上細氎一肘作漉水囊令持戒者審悉看漉水竟器中向日諦看若故有蟲者應二重若三重作漉水囊若故有蟲此處不中住四分下雜法不得用蟲水聽作漉水囊佛言如杓形若三角若作宏槨若作漉瓶若患細蟲出聽安沙囊中沙送水中又比丘半由旬行不應無漉囊若無以僧伽梨角漉水五十同爾看覆屋過三節戒第二十凡物有限事成為要貪不知量重覆不已令屋崩倒損喪功業譏過不輕是以聖制別緣具四一自為己作屋二使人覆三三即未竟不雖見聞處四第三節竟便犯戒本四句一人二作房法戒三指授已下開音三節未竟指授無罪四過三節犯辨相具解上二可知從覆者已下至不聞處解第三句若比丘節已下解第四句見聞俱不離提見聞互離吉二節之相事在難識如緣起中草三重覆見論若過三節竟在邊者隨用草把把提伽論頗有過三覆不犯耶答有謂用草覆者是五分博繫薄疊作於四壁極重覆之覆重壁地若至第四重若草若凡若機一一草凡板皆提准此等文不問一切似以三重為三節也僧不差教授比丘尼第二十一制意有三一尼須教授意者尼是女弱闕於遊方咨未聞迷於理行二教宿若夜遊故須教授曲示行儀大僧丈夫形無鄣礙處處咨永故不別教授二須差意者教授事難須備德行故委任衆量簡遣有德慈心訓誨開曉心懷令生解行終登道益故須差遣三結罪意者今不被僧差輒往教授濫行風教乖軌導之方失於風靡之化輕法自尊損處不輕故得提罪專任自由不蒙僧命稱之為輒宣陳化行開曉未間名為教授故曰輒教授尼戒通緣如上別緣有五一有少德為簡令無德者永無教授之義理不合差故無輒教尼罪少謂極五如增五說有五法得教戒尼謂十德中初二八九等是問若也無德佛不聽差而差不成者如有難妨不聽處分若也處分亦應不成然彼既成此亦應爾解彼具二義故成一處分防不處分罪不防難防所防不同二難處造房義容受用為斯二義處分得成此戒僧差亦防不差不防無德既所防不同理合應成然此無德永無教授之益所以不成若竪義者應解十德雖備上德若被僧差本自無過故須次第二僧不差雖不被差不作衆法教誡亦自無犯故須第三集尼衆衆雖已集若說八敬生過義微但得小罪故須第四說法除八敬第五隨所說法了了結罪緣起文二初至空而去開聽教授二時六群已下因聖開聽輒教起過前文有三一明尼衆請教授師二時佛告阿難已下差教授師既被衆差須往教誡是以第三般陀已下進詣王園為尼教授前文復二初至安居正明尼衆依僧安居二大愛道下為尼衆故請教授師前中先列僧僧十二人名等取五百謂是尼衆依憑之主次列能依十五人名等取餘者所以須依比丘者恐憂有疑滯無咨決處故制依安居第二請中文三初進詣佛所請僧教誡二佛告已下遂請聽許三爾時已下既蒙佛許致敬還寺問尼衆所以但請比丘不請佛者何答若當請佛有二種違一違八敬之教二違本要期受誡之心有斯二過故不請佛請比丘者有二種煩一順佛敬教二順本受戒之心若爾八敬教中已遣半月請僧教授愛道何不詣僧自請而須白佛請聽者何答尼雖蒙佛遣依大僧然諸比丘未被佛遣教授尼衆愛道懸知請而不得故更白佛佛因差遣文言教誡說法者請說理行二法說其理相因果耶正開曉心懷令生信解明其理法雖於理信解若無其行不能前一除惡業故須說行法行法有兩一者教誡說其罪相禁勒離惡是其止持二者教授說其行善授與前人令如說行是其作持二行義成方能進道次解第二差教授人文三初告令差遣問佛所以不自教授而遣差上坐者何答多有四義一現佛無吝法故二師與弟子知見同故三為顯般陀有有功德故四為彰比丘於尼衆有緣應受化故第二奉命差遣初再差再拒二言世尊差故默然受差第三預生譏毀所以然者為明教授師難要是具德方生信敬今既呵毀正彰般陀有宜聞之失又復生下二種教化為有信人說法教化為預生譏人神足教化故所以爾自下第三進詣教授文二初至一面坐來說法方便二爾時愛道下正明說法前文有四一將伴詣尼二尼衆迎逆三尊者就坐四尼衆赴集祇律尼老病服藥衣鉢等應言我某甲與教誡欲三說教授時應如女想尼於教戒人如父想此律尼法中三寶瞻病聽囑授二正教授中文二先為信人次為無信現神足教化前文有三謂三請三說三中各四一愛道請二說法三說法三說已入禪四尼衆譏敬唯第二說中𨷂無第四就前初說偈者此是般陀得道之偈就中分二上有半偈正明定慧是其能治有為解脫體下一偈半正明所治三煩惱無處畢竟寂滅是無為解脫略不明戒義亦可通有也心鑒於法稱之為入與理靜相應絶去紛動目之曰家既得法沾心內生勇悅故曰歡喜此說定法心既澄靜能發於智是以次明證理觀在心照法顯境智雙舉故曰見法理解沾心泯然取適名曰安樂自下所治三煩惱初瞋次貪次癡解興或喪瞋結斯盡名曰無恚不為煩惱勞亂名為最樂瞋結既除慈行成就悲愍前生永不加害故曰不害於衆生解除貪患名曰無欲以法自娛稱之為樂內貪既盡雖緣塵境永不生染故曰離於愛欲剪除無明癡心八使故曰調伏我慢癡慢既無永離勞亂之苦名曰第一樂次說已入禪次尼衆譏敬自下頻煩重請說向者偈正彰得法情殷樂聞無猒故爾自下為無信人神足教化如文十律云諸比丘尼聞般陀說法或得須陀洹乃至羅漢發聲聞因緣辟支佛因緣又發無上道因緣第二起過呵制中文二初口差起過如來呵責制羯磨差二時六群作是言已下界外自差起過如來呵責制具十法此二文中各有三文謂起過呵責立制就前起過文兩第一非法教授方便於中文三初告尼衆知當他問可不義二六群夜過已下進詣尼所三集尼衆第二六羣比丘教戒已下明非法教授文四一明六群所不說者且舉三科法門餘亦不說二但說王者下出其所說之非反前正法三或笑已下非法威儀反前神足四尼衆欣敬不同反上譏敬次第二愛道白佛正彰呵責次第三制羯磨差第二過中三文者第一起過文三初輒自相差遣告尼衆二比丘聞知所不應三六群尼下為告尼衆當他報可否處文無非法教授者略亦可尼衆先和聞即告佛故無教授等文第二舉過呵中文兩初時大愛道聞下二衆白佛二來呵責第三制具十法此十德中六門分別一具德問所以須具十法等若不間三藏暗於所緣自迷發足烏能導物或雖少知行不依理進止施言動乖法式自沒長津何能救溺是故要須明經解律行潔玉氷辭清辨理德備兼物方堪教授故須斯十第二列數釋名對文釋第三辨其德體位合為三初及卒此之三德身口業色為體二三四五八斯等五德以慧為體六七二德無記報五陰為體第四自利利他報與修成分別初一自利餘九利他為教戒尼故須此等若報與修成六七報法第三一德若取善巧以慧為體即是修成若取音聲感得清淨四大由施鍾零此是報法若道聲非報法亦是修成自餘七德並是修成第五辨同異謂初與九第五與八對說辨異義在可知六有德無德成差以不如上已說次釋名具持二百五十戒專精不犯犯已能悔令戒行光潔皎故曰具足母云善解修多羅阿含理教有廣見之長字曰多聞善誦二部行教字句分明音聲流利言辭辨了令人樂聞故曰誦二部戒利匪直能誦亦善解其義犯相輕重開曉人心豁然生解故曰決斷無疑為尼說法初中後言皆稱法相純一清白正見無耶故曰善能說法生處高明人標望美故曰族姓出家顏貌端正有其二義一諸根豐美離於醜惡名為端正二威顏肅物不生物染覩者發敬故曰端正善順人情稱機授與令生信解故曰堪任與尼說法勸令歡喜前第五德善能說法稱法而談無顛倒過未必稱機以此為異論云若行尼三衆摩觸二粗犯此重法竟雖懺悔清淨不得教授尼若見者不生敬重心故是以次明第九終不為佛出家竟披三法衣而犯此重法以不犯故堪能教授生尼敬故爾與初德何別者解言若曾汙尼信敬故爾與初德何別者解言若曾汙尼三衆悔已具初𨷂無外化不具第九犯餘罪未悔不具於初故須明第九不犯重法及餘戒不犯犯已能悔望於自行即是具初望於利他亦具第九自他兩異故分為二即是第五同異義竟雖具上九若夏未滿年少輕躁易可敗退不生人善要二十夏持法堅固多無壞方生物善故爾三戒本四句一犯人二僧不差三輒往教授四結僧不差說法之罪應言說法提而言教授者以教戒尼時先說八敬從初作名故曰教授而實教授但得吉罪下有正文也若得僧差即無所違應如說粗罪戒僧羯磨但舉不差有犯明知被差反前不犯互舉言之辨相具解第一可知僧者已下解第二句戒本不差今廣釋中反解僧差應順釋言不作如是差故曰僧不差文中略爾教授者下釋第三句文三一牒章舉數謂八不可違法五分不可越法十見重母經師法了論八尊法戒八敬等諸文不同有此差別二何等八者假以徵問三若百歲下廣列八事解此八敬五門分別一釋名辨敬意二立八所由三解次第四違之輕重五約人分別第一釋名辨敬意諸部同異者此之八事尼須欽重不可過越故曰不可違等言須敬意者體無貴賤有道則尊法戒軌要出於大僧敬法重人事須致敬敬而言之斯事皆宜但此八法尼之偏要故須別敬諸部之中八數大同五分說法日暮戒云尼曾聞八敬不即列八敬其數及事全同此律先後不次初列後三四式叉受戒五不罵六不舉七悔八禮拜十律一禮拜二受戒三悔殘四安五次心六半月從僧受八敬法七請聽問三藏義八不得說比丘三根罪無此罵謗謂彼雖六為二故亦有八祇八者一禮拜若往僧處一切應禮尼若老者聽總禮僧往尼處亦爾二文字人受戒三不得罵說比丘罪四不得先受衣食房牀蓐等若受越毗尼第五已下同此律謂合二三為一更加先不受故亦成八子論八尊法本音瞿婁達摩此言尊法一受戒二禮三半月受尊法四隨犯一尊法二部中行摩捺多五不罵謗六不問難比丘及教文子七依僧安居八依自恐愛道比丘尼經卷上說八敬全有不同可具解第二立八者法由人弘人能通法理宜䖍仰敬人之來不出身口初身二口二口者違法罵謗當相而談名罵無而橫加曰謗故立第二順法舉故有第三法是良藥故下須敬敬法雖衆不過受隨亦可生善滅惡故亦具兩法生生有由必須承請承請有三初則生解次兩起行一者生善二者滅惡亦可安恣立二八之所由旨在於斯亦可化宜故有此八次第者人能秉法建初敬人敬人三中身敬粗著相顯初明口敬相微次宜後說罵謗總故所以前明遮舉損微是以次辨亦可罵謗不須具德數故先彰舉須具德義希後說法由人通故次敬法受為根本是以前明隨行中缺故次後列人法既具必須請承請承三中教戒生解次兩興行安居時長故在初辨共住九旬須表清美故恣第八此即位束為三人法及請三事分別第四門初一下三戒本結提第三四五此三吉羅第二一敬義含殘提有此三別問所以得戒義齊違便輕重答須敬義第等故得戒無優劣違之有希數故致輕重殊問等是受法何以違敬有其罪名餘善來等受不約有違結犯耶答即以八敬為隨行故餘受異此為斯不同第五門者若就根本愛道具八即取所戒分別並是具戒如第四敬以不與式叉詣僧受戒故所以吉若就所為分別第四一敬為未具人以戒具人故下文言已學於學式叉餘七大尼故文即言若比丘尼問又復懺殘愛道初受本未有犯如何逆制答以有同犯戒故是以佛言二衆中悔次釋文者敬別文三一百臘者舉能敬人二對境修教三盡形下舉前敬儀約時要制不皆類然唯第四教中舉所為人也言百臘者尊中之極舉尊況卑初受戒人卑之下舉卑況尊次於說戒時已下解第四結罪句於中文二初滿和無病廣教授法二比丘僧病已下減別多病問訊法前文復二初欲結不差先反解差若僧不差下正解結差不罪前文有三初請及差時二比丘應劫時下問可否時三若聞教授來下迎逆教授時定文既爾須解其義差法有四一約時分別二約處分別三約人分別四就法分別一時者雖時有多總可為五一尼衆差請人時二囑授時三僧說代請謂正說戒及為差時四問可否時五迎逆教授時謂除前三及後二祇律說如白月十五日一日至三日是名時未至十四日十五日是名時已過中間十日科取一日要與此時相應方免日非之罪時必託處處唯作法法界非餘小界斯之處定通於五時處中有人故次辨人人謂二衆迷須滿五俱是四人僧於中分別一滿不二和三病不病復有所囑人謂非病非遠行非容非愚癡等祇律尼囑授受除五人不得受尼欲一上坐二教戒尼人三謂木叉人應各自說不應受四字房人五病人此二自言我不至僧中更與餘人若言我是乞食等大德人不受者越毗尼既滿和非病理合差遣故須第四作法法位有三但白二法非餘可知此彼二衆請差同爾若准此義文略不出與一之二時謂在尼法中說若欲釋文舉上義門對解可知二正解不差謂不作與一來如是差遣是名不差結罪輕重一解若僧不差者舉不差種或非教授日舉被差人日非種說八教得吉羅者雙結兩人不差日非以同吉故此謂不被差人無其日非以無是日可對故爾此義不然此中文意不差為戒本何用差人結日非也又復被差日非猶得吉罪況不被差復非日往過甚於他寧無日非如似非時食豈無不受之𠎝此亦同爾故今正解但約不差人說若僧不差說八敬吉以八敬文定生患義微故犯輕罪說法寬慢耶正難分容說耶法壞在心行生患義多故犯提罪若日非說二同犯吉罪以俱日非不聽教授更無餘過故同小罪是日非日已如說通對被差人可為四句不差有二若不差非日即得四罪三吉一提是日二罪一提一吉若被差日非犯二吉罪是日往者輕重無犯若僧不差或非教授日說八敬吉者一得不差說敬吉罪二犯日此吉羅並得二罪是故雙結容是日往所以言或次明不差說法提問所以說法但舉不差不牒日非耶答前說八敬不差日非同犯吉羅以一罪名括二罪種故須並牒此中不差說法罪重日非便輕非但種別羅名亦異濫故不牒非謂說法日非吉問此戒差不差日非但犯吉羅亦可差不差但有日暮提答僧差日暮有法攝尼尼不敢去過在大僧故得提罪不被差者無法攝尼尼無罪過由義微是明犯輕但波逸提不含輕重故作異名非之中亦被差者重不差者輕但吉羅通輕重同結一名理亦階降又解不作日差不差犯無重輕不同日暮所以爾者日暮假僧差不差結輕日非不假差不差但犯吉罪無輕重一問云何日暮假僧差耶答以不被差言即犯輒不待日暮故知有日暮罪者明差故言假差差者罪重不差即輕如以女宿宿即隨緣脅結罪何須就之制過三夜男開二三故制過三明假非是女人故立緣言未具人男子也其日非教授發言即結不是由無不差後結日非故知不假差不差是以日非犯齊也此律但有廣教授法無略教授准餘律說尼吉羅者謂不被差尼輒來請教授師罪尼下二衆不蒙尼遣輒往大僧寺禮拜問訊罪沙彌亦是無事住尼寺罪說法至日暮戒第二十二凡男女有別居不同處僧衆舉動須避譏涉生人信敬日詳沒聚致外情疑容自壞行過損不輕故所以制別緣有六一是僧差甄去不差二集尼衆三教授說法四日暮相六說法不止便犯五分日沒語語提多論難陀好聲者別有難陀非是佛弟戒本三句一犯人二為僧所差三教授下正明為尼說法日暮結解上二可知教授者下解第三日暮結罪輕重文四一教授尼提二餘受經等吉三為餘女誦經衆事吉四境想五句尼日暮至大僧寺犯吉羅下三衆亦然開中若至尼等寺中說法不犯者謂因大會𠆩說法非是僧差亦可以是都教授處非尼寺中故如緣譏嫌若當尼處無上過故所以不犯五分比丘語尼言般陀次教授汝汝當就彼聽受般陀食還自取繩牀於邊坐禪尼到般陀所聽教已日沒捨去不及城門觀此文時似就僧寺教授譏呵教授師戒第二十三然備德之人蒙僧差遣慈心教授情存為法不怖飲食而見他得利內生嫉姤發言譏呵惱亂賢善事絶兼益損處不輕是故聖制別緣具六一是僧差二情存為法不悕飲食三生嫉姤心四發言譏呵五言辭六前人聞知犯文言生嫉姤心者若見他得利心生熱惱稱之為嫉忌他有德恥彼勝己字之為姤戒戒本二句可知尼吉羅者譏呵請教授師人得吉羅故亦可大僧教授師希故吉罪尼下二衆譏請教授人沙彌呵大僧教授師罪與非親里尼衣戒第二十四凡男女形殊理無交雜無緣取與事招外譏因交致染容壞梵行損敗不輕為是聖制別緣具四一是比丘尼論與尼三衆俱犯提罪律雖無文義亦應然不同浣衣廢業多少中制又有希數五分與尼提與下二衆吉作衣亦爾任以說二非親里三虗心與衣物除貿易不犯四彼尼領受便犯多非親里親里想疑俱犯提罪十律亦准彼不須第三非親里想滿足戒本五一犯人二非親里尼三所與衣體四除貿易五結罪具解五句上二可知第二衣者有十種如上竟不出大小多論應量衣提不應量吉羅鉢亦犯提不應量鉢鍵𨩲等吉羅若二比丘共與一尼衣或一衣與二尼並犯吉羅此律不問大小應盡犯提尼與大僧吉羅者若就布數大僧與希應犯輕罪尼與義數宜應犯提然此戒者誡無譏無譏制大僧上尊與尼譏重故得提罪尼是下衆奉於上尊生譏義微故所以輕五分若為斷理功業事若為說法若為多誦經戒與衣不犯與非親里尼作衣戒第二十五制意同前唯以作衣為異別緣具五一是比丘尼二非親里三自送衣遣比丘作四無因緣下文若借著浣染治還主無犯五隨所作便犯以不待作成而隨針針得罪者何答是中多過故爾大僧上尊為下人作衣多生染患又招外譏廢修正業容作非法之衣具斯諸過故隨作得罪如尼造塔磚磚得罪此並過多遮之義永故爾滿足戒本四句一人二非親里尼三作衣四結罪與尼屏露坐戒第二十六過與女人同宿無異屏坐為別別緣具四一是尼三衆五分多論三衆俱犯理亦應然譏染不殊故爾若也俗女不犯此是屏露處因緣露坐戒本明屏故知俱犯三無第三人四坐便犯多論戒比丘坐住尼起已更坐隨坐多少一一得提比丘起而更坐一一得罪若二人俱坐一日正犯一罪祇屏坐一比丘俱坐一尼益食益食去時一一提比丘應起不得默起使尼疑應語言我起不爾尼起也若通料簡兩門分別一離合差別二開親非親離合有二一道俗離合二具非具初門者問所以觸通道俗二女合而總制此中坐戒道離禁何意如是答觸對結罪義便故合此對結罪不便故離以文言比丘觸女即通解道俗二女俱殘下云比丘夷者即亦通結二男故隨便合制此坐之中僧對二女坐俱結提罪實亦應合但結尼罪不便以尼共俗男坐提共比丘坐若合制者正欲結尼僧邊吉羅謂俗亦犯吉正欲結尼俗男坐提謂僧邊亦提有斯不便是以離制若爾尼制五衣俱得提罪如比丘對二女坐大僧離三衣提如尼對俗男坐提大僧離餘二衣吉如尼對僧坐吉亦望比丘結罪不便所以尼離衣宿戒合制者何答若據三五結罪非便實雜莫不皆對受法以辨離宿之義是故合一又對二女坐者且就道俗有寶無等寶故須離制又問前同室宿二女合制坐及同行所以道俗即雜答同室宿中若俗別邊應立二戒且就女境無殊結尼罪便故合為一此屏坐中若以女境處齊亦應合一且就異相道俗兩別寶無寶異結尼罪不同是故別制又開緣異僧與二女坐盡有教授不教授別尼對二男並無教授若論同宿俱無義等又行中開異不開與女無開尼有恐處故道俗兩別問所以與尼同坐屏露合制俗女之中屏露兩分其義何也答今就尼境不別無寶別處齊合一就俗女境同亦應合一但屏露有異別故屏露離制問所以俗女屏坐更分復兩尼中即無答俗女對夫故有常處可言強坐尼無可知坐開四人屏開三人有斯別狀道女一戒俗女制三第二具非具觸者及粗宿等過緣如上並婉二人與衣作衣偏尼具戒作與義數故所以制下之衆異此不犯亦可准多五二文與衣亦同犯限第二開親非親者與衣作作直是營造中過人不同處所以開親不犯自餘觸宿坐行乘船等戒以是處同外人但見宿坐等事生譏義等故不開親戒本四句可知辨相具釋尼所以輕者上尊共坐盡容教授志不自由情過是微故所以輕不盲不聾開前盲而不聾句不聾不盲開前聾而不盲句所對有異有故兩句自下諸戒有如此文咸同此釋
