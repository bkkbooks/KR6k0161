body:
  text: 大文第三謗不謗者文有七對一謗不謗二不受善教三違如來四堅持與如來淨五不奉如來六不值如來七於如來所粗鐄無慈心謗不謗中有五一總明謗不謗彰謗佛罪重二約十八法三約二處四約二事五約二見此後四對各舉初文以説一不信樂謂增嫉謂搆己耶心專執自見説不稱法故名為謗二信樂不解受持故為曰為謗者然佛法理深非情所測解若豪露自謂窮盡情無分齊談於聖説故名為謗若也自識分齊解唯及此且依情量隨分而説諸餘深義唯聖乃知反增福慧何有過哉今言謗者自謂窮極故是故告汝謗如來得大重罪等者為彰謗佛罪重餘不得比第二十八法中分二初舉增一三對六次舉增二中九對十八法合名十八法次二處次二事次二見此等若總説者謂到説增一三對六增二四對八名為謗順説增一三對六增二四對八名不謗今言增二四對八者謂法非法等即二見初十八法者是二處增二初輕重二是也二事者波羅夷等二十一對是也二見者酒見非酒等是作文不異前故曰亦如是初文又總解二謗下之判説即前二謗謂執己耶解誣聖説故第二門執己耶心拒違聖説故曰不受善教第三門見乖聖方故曰違如來第四門執見為是難可曉示故曰堅持與如來諍第五門自師己心不依聖教稟故曰不奉如來第六門耶解差修去聖彌隔故曰不值如來第七門執見既成慢瞋自恃故曰於如來粗錯無慈心此六門各有總別三對六四對八等作文廣説不異於前故並云亦如是大文第四二衆文四先列二衆第二佛告已下能舉所舉各自觀過淨得消殄是名如法衆不自觀過淨轉增熾是名非法衆第三二種癡已下二種癡故是名非法衆二種智故是名如法衆第四佛告已下能滅諍是如來不滅為非二衆中二初就法明二衆第二國法已下對法喻以明二衆前二衆分三初明等衆次明不等衆末明等不等衆此言等者純如非故也等衆五句第一舉數二列兩衆名三何等已下釋四此二衆中已下讚歎五奉行第三釋二衆中不用法毗尼者説乖行衆二軌故使犯下四篇應教懺悔不教懺悔而便共住若犯夷罪應滅不滅而住是非法衆反説即是如法衆不等衆中亦五如前列名解釋交絡如前釋中先非後如非法衆中初有兩對彰人力不等次有三對舉前非法人所行之法興耶隱正次釋如法衆處分亦爾三等不等衆中人言有六種等不等一頭數齊名等力伴有無名為不齊名不等四數力俱有名等對伴有無名不等五數伴俱齊對力有無六力伴俱齊對數多少各對三句法有行滅故得別其是非二衆也解其如非同前故曰亦如是喻中有二初與非法比丘強盛喻次如法比丘有力喻有五子句第一法王力弱如法比丘無力喻二衆賊熾盛與非法比丘有力自在喻三法王不得安樂出入者與如法比丘為破戒所嬈入出不安喻四邊國小王不順教令者與諸小比丘不順如法比丘教令如説修行喻五國界人民産業休廢者與優婆塞等不得純修五戒十善産業休廢喻次合非法有力者合上第二衆賊熾盛喻是法比丘無力反合初句法王力弱喻如法比丘不得安樂者合上第三法王不得安樂喻若在衆中不得語合上入若在空處已下至是法不行合上出彼不勤行已下合上第四邊國小王喻則合諸天人民已下合第五喻第二喻中亦五第一王力強與如法比丘有力喻二衆賊力弱已下乃至逃竄非法比丘力強喻三時法王已下與如法比丘出入安樂喻四邊國小王已下諸小比丘順從教令如説修行喻五境內已下與諸俗人得修三歸五戒十善自恣喻次合如法比丘有力合上第一王力強非法比丘已下乃至衆惡合上第二喻於中言非法無力者合上合賊力弱人前非法比丘來隨教令者合上皆來歸伏言若當逃竄不作惡者合上逃竄爾時如法比丘已下至非法不行合上第三法王安樂喻勤行已下合上第四則令諸天人已下合第五此如非兩喻總喻於上一切二衆第二觀過文三初至不得安樂兩故損第二若比丘共諍舉他比丘已下各觀過益第三佛説已下歡喜受持各觀中文三初總能所二人各觀過益第二諸比丘云何已下別教能所觀過之方被舉人自觀過者應作是念由我犯非故致來他舉若我不犯使不見舉彼深愍我我應懺洗去來能舉人自觀過者以彼犯非致我見舉若瞋心舉他過逾於彼何能濟他為是應起好心善意必令罪除諍息第三若比丘有諍已下總結觀益第三愚智二人者即舉脫不脫文準前已説第四制斷諍法文三舉制斷諍之利且彰一門餘利略無二鄣能所內須具德亦略舉一門第五正法住滅者上來是非相番合説今此文中如非離辨光明先明疾滅二辨正法久住初文七門一疾滅正法二不能生善三自破壞四犯罪五智者呵六多得衆罪七墮地獄如箭射此七位分為三初之一門所明其疾滅正法次有五門彰於人有損末下一門以前因成𠎝招重根第二人損五中不生善法者以到説八故見不依理即便未生善法不能得生言自破壞者已生之善不復續起故曰破壞言犯罪者隨見起非故也聖説其過故曰智者所呵觸緣起犯故曰多得衆罪此之七門各是對説增二中二法二處二事二犯四對八有上七損磨別應七但今文中初二第七各各別明餘四合辨此云二犯猶上二見犯據境説見謂解心次辨久住亦有七門各有四對反説即是六第六作法治舉是非中文三初明合遮舉等是謂對所舉彰是過合舉故名為應二如法舉已下對事明遮舉如法謂對能信法人施藥當病故曰如法三復有二法應與呵責已下有病藥正行治罰初中有六種一舉二憶念三自言四遮阿䨲波陀五遮説戒六遮自恣初就舉中到説二法憶念等五義同故曰亦如是次以第二二處三二事四二犯俱通前六故曰亦如是次如法遮舉中六門各有四對文中先彰其舉有其四對次作憶念已下餘五門各有四對也又此二文前應舉等者彰四到説是過合治故以四過為位各應須加舉等六治即是四個六也今如法舉中僧秉稱法故以舉等六治為位各治四過即成六個四也次七羯磨治中呵責四對廣列其相次擯已下略而亦前謂若對衆僧前到説此四功然無慚鬪亂上下與作呵責若對俗前到説此四壞時人之信須與擯治若到説此四數作不止志無因立與依止治若到説此四罵謗違惱白衣者理須悔謝與遮不至治因到説此四有罪問言不見或見而不懺或説欲不鄣等患生者與三衆治第七漏增不增中且約七對略明謂慚無慚淨不淨猶二見文犯不犯重輕餘無餘猶是殘無殘也法非法制非制也廣舉二見等文乃至有多種第八捨戒二二為法可知第九戒利文二先舉其利有九個二初四二可知於二世漏中離為五對之怨者對境逼惱為言下言怖者據情懼境為因言漏者義通因果故言不善法者現在業因言重罪者未來惡果第二次舉戒謂約二百八十戒法各九個二法於中呵責廣文餘皆略指也增三已下戒之利益各含多三四五等咸準斯説增三中文五第一至破威儀羯磨明三羯磨除罪滅諍調伏之法第二有三學已下正明三學進修功德第三復有三聚已下離明衆行違順之相第四捨戒第五持益初文有二第一辨羯磨如非并明師德第二有三事挊失已下廣約諸戒犯不犯差前文復二初以三羯磨者以體攝用隨用差分百一之殊依此律一百四十五等三體往收無不統攝故言攝一切也二廣就遂事隨用以辨如非如法憶念中彼廣憶念者謂被舉受能氣者言廣尋自己有犯事以不故言廣憶念也言犯小罪如法懺悔從僧乞憶念名如法者此諍輕重生覓諍也三種調法者謂是治人調伏之法三三法故七中略舉前三治法也三種滅法者謂彌四諍究竟處故也有三法作羯磨者一喚比丘現前二作白三作三羯磨故也比丘喜鬪諍與作三羯磨以鬪亂僧衆故與呵責於聚落中鬪亂俗人令他失信故與擯治即以鬪亂喜諍者便是無知數犯過故與依止治之次辨受戒師德可知言破戒作呵責者謂犯殘罪以此重事互相加誣鬪亂僧衆犯第二篇是名破戒合與呵責若犯夷戒覆藏之人理須擯治若不覆者自可學悔非此所明也若在聚落與女人同床坐起説粗惡語犯殘與擯治之若以犯殘事故罵謗白衣遮不至治以破戒故志不自立須與依止破戒故言不見或言不懺或因犯殘故説欲不鄣等須以三舉治之破見破威儀咸須七法治罰類説可知有三法應為解舉應見而見應懺而懺應捨而捨既言應見見見已為解故知應懺懺懺已為解理亦非妨以其教懺正違本見何有隨𠎝故也文言應信不信與舉治者謂到説十八等故此亦是耶寬通諸法然非第三舉中設或隨此舉者理同前二以其不局順情數作事故言稱量比丘者若是好人忽爾罵謗白衣尋生慚愧不應為治若無愧恥自不治罰無由息過故曰稱量比丘稱量白衣者若篤信隆愍具於五法合治比丘若五法有鬪不須為治稱量事者若為利益故呵罵此不合治若作損減意是則須治故法和合應作故言稱量羯磨稱量犯者若犯初篇治則無益即有不須治若犯下四即須治故實不實辨三根有無作不作謂犯之虗實第三稱量白衣同上次釋第二就戒相辨中三初略就殘夷二相第二有三種人犯已下寄人能所如不如第三有三種正語已下約舉罪根境以明如非初中約大妄語辨不得言得者謂出妄語所攝聖法境界犯不孤起要藉身口是以次下有五個三句正辨身口犯之差別業不自成由或而發故次三句明三煩惱也身欲害已下有三正明暢思成業一身犯者謂身業作書表已得聖口業可解身口犯者兩業並為第二句三種相者身現者如脫著僧伽梨等口現相者謂語白衣言明日至汝家説法是聖人也明曰造彼為其説法令他知解者是身口俱易知第三句三種呪者一身光者一身呪謂作符書厭禱表己得聖令他知解口況者謂口説呪辭呪令變動顯己得聖身口俱者兩業並為也第四句三非威儀身非威儀者謂千針投體服氣斷穀等表己得聖口非威儀者謂口誦自然經書言從佛出身口非威儀者兩業並為也第五句三耶命者一身耶命謂現佛相端坐不動作為聖也口耶命者説己在嶮難處師子虎狼所不能害及諸神亦恆來供養我表己有聖也身口俱者二業並為也自下約人初有三三對單提已下明之次有三犯者對尼薩耆説三默然者約人有愚智等故知而默者謂善解是非默然忍述不知默者謂未學比丘不達如非默然忍可癡而默然者謂學而不解愚心默可也語生空已去資成戒品不為緣壞故曰戒住得真空無漏圓解明白堅固不退名為見住善解諸法稱教而作呵不能壞故曰羯磨住離下三篇微細之過名威儀住絶去五耶正命自居名為命住有三種人諍已下有七個三句位以為四初三三句對能諍人説次第四一三能所相對次有二三對能斷諍人説末下一三舉上起諍三人令得除殄委細如文四諍三人起但覔諍局對僧滅餘之三諍通三人殄差別思知若據秉藥七中現前自言通三人秉餘之五藥局在僧用差別可以思而準説次下第三初一三正語謂所覓之境次有一三覓所依根次有三將破戒等對覆露如非次有一三若不發露自心懺除者正行治罰謂作三羯磨治三種放逸人故名三種放逸羯磨三法門故且言三放逸也大段第二三學進修其文有四第一至學此三學略辨除得第二阿難已下為三人別説三學第三爾時佛告諸比丘有三學已下廣明三學除得第四復有三學已下三學體相初文有二第二舉三學體謂所學法二爾時衆多比丘已下寄興問答彰學除得前中復二初彰三學體次復有三學於戒學中約行以辨初就體者始於外凡專加護持悟達生空資成窂固踰勝於前故曰增戒學四現理靜絶去紛動定品成就之始故曰增心學入無相已去證真空無漏決定明白故曰增慧學次行辨者習下三篇對治之行身口進止各有法式故曰增威儀學善修上二對治行成絶去違染名增淨行學善識戒相輕重分明故曰增波羅提木叉學第二文二初比丘請佛佛答比丘略彰所除第二佛審比丘比丘對佛略顯所得前比丘問中三初比丘問佛故言云何為學二佛告已下佛答所學明其所除初至是故言學教修三學三學是學戒者為彰二學不出止作並戒門收故二彼增戒學增心學彰有所初除至愚癡盡者謂除煩惱次彼得貪等盡已下不造不善明不起業不作謂諸惡苦果隨己第三歡喜受持第二佛審比丘初為二問一云何學者問諸比丘學之方軌言何為學者問汝比丘為求何等果報先對初問如世尊所説我等如説修行是名為學此答修學方法復有三學已下對第二問我等為祈四果學此三學不求世報第二別為三人者初明阿難為波羅門舉行三學顯如來制意二為迦葉懺人讚毀以明明三體三為跋闍略説三學也第二迦葉文四初至數恐我等愚癡不信謗而獲罪二於是世尊移住王舍已下求哀悔謝第三佛告比丘言汝自懺悔已下佛受懺悔第四時迦葉禮佛足已下對比丘讚毀以彰損益是中約人如非兩個三謂各上中下坐也次約喻以彰三學如非對前人説破戒比丘比丘威儀不同行步亦異故喻如驢持戒比丘進止應法出言成軌喻牛也二種衆法俱集一所故稱共行自言我是比丘者謂我是好比丘毛喻於戒淨穢兩殊全不相似故毛不似牛腳喻於定靜亂不同故腳不似牛音聲喻慧愚智有異故聲不似牛如是癡人合驢隨逐如法比丘合上共行自言我是比丘合上自言是牛無有僧戒合毛增心合腳增慧合聲第三文二初明純修滿學除得第二復有三學已下兼修滿學除得前文有三初佛告諸比丘有三學者舉所學法體第一何等已下別列三人以彰除得第三滿足行者已下結前純滿第二別明三人者初人純修戒第二人修戒兼定第三人具修三學初人五句一微問二舉其心求不修餘二以隨力故三彼於此戒已下正明學戒四彼斷下五使者顯所除五於上涅槃已下彰其所得第三學戒若犯輕者謂下四篇以非一生永鄣故曰為輕得有從緣除遣故言懺悔文喻可知若是重戒謂是夷罪犯則永鄣如破器破石故稱為重理合專精故曰竪持文言善住於戒者凡言戒法是起定慧之根跱趣菩提之正路是以論言道品樓觀以戒為柱禪定心城以戒為墎入善人衆要佩戒印是以持須尊重勿贊於心稱法而修與五支相可名為善持於戒言五支者一根本業清淨戒二前後眷屬餘清淨戒三非諸惡覺覺清淨戒四護持正念念清淨戒五回向阿耨菩提戒支者因也別也五中位二前四是行後一發心回向就前四中初三是止惡第四生善前止中復二初二止業惡第三折伏煩惱惡就前業一離根本業道惡如離煞生斷命惡盜舉離處惡等二離方便業惡如煞生時牽來繫縛一打二打等是前方便於後彼皮剝切割等是後方便此二成前根本故名餘今持戒善業道捨前根本有根本淨捨前後方便有方便淨此之業所以得成由無惡覺折伏煩惱或本既無故不起業云何離覺功由正念謂念戒體功能及三寶生善境界功德以為對治故無惡覺上來行成若不回向或招三有是以第五回向菩提是以心論根本眷屬淨不為覺所壞攝受於正念隨順涅槃道一一諸戒咸具斯五今此律文略舉前二言應親近行者方便持戒之善治彼業道前方便惡不染汙行謂善隨喜心治彼後方便惡業此二合是眷屬餘清淨戒第二不毀闕行正捨根本業道之惡即是善業道根本故曰不毀闕行餘三略無總結學戒故曰常修如是此次第四斷彼下五使者是所除問戒但伏業何以今言斷下五使耶答據本説故理實不斷言五下使者謂身見戒取疑貪瞋是也言下使者三義故下一下人心中起謂前三是三界見諦或凡夫心中起貪瞋二結是欲界修道或故下二果心中起二潤下生前三閏三界凡夫生後二閏下二果欲界下生三鄣下果前三鄣初果後二鄣斯陀阿那二果故言下使若得那含必須除此故言斷下五使五於上等者明其所得既斷下使謂證那含不還欲界故第二人如上第三人三句一具修三學二彼得漏盡是其所除三得無漏心解脫已下明其所得結中滿足行者結第三人不滿足行者結前二人為彰行因必也感果但隨因具否果有勝劣必不虗設故曰無有虗指上來所明純修滿學隨分所行不了教説自下兼修滿學了教之唱於中文二第一先舉所學法體故曰乃至增慧學第二何等已下別列三人初人中三句即是三重謂約三果果説力分不堪故以行不滿故不得第四果也先望那含有三一列戒具兼修二行二彼斷下五使彰其所除便於上涅槃下辨有所得二却望斯陀含文亦應三略不舉行但彰除得以力分劣故故曰若不能等謂薄三結等是所除得斯陀含是所得三却望初果能斷三結是所除得須陀洹是所得也問三結是何謂身見戒取疑等是問須陀洹人斷八十八結何故但言斷三結也答以十使為根本十中六使唯見道斷三轉隨轉三三轉者謂向三者是三隨轉謂身見斷邊見隨戒取斷見取隨疑斷耶見隨己説轉當知已説隨轉也即是八十八也論云又一種二種四種故此三使亦攝盡也一種者謂身見唯在下故二種謂戒取通苦道故四種者隨疑通四諦故第二人如上者如前兩處各如初人第三人如上者如上第三人第四文二初明三學體二復有三學已下偏廣慧學前文復二初舉三學名數二何等已下次第廣辨具持木叉者正彰戒行舉果名因是初二篇能治行也成就威儀者不犯下三故也持輕若重故曰乃至金剛將輕齊重故言等學也定慧二學如文可知偏明慧學文三初對五蓋次對六根次七覺意就五蓋中先約貪蓋有六句三對第一對觀貪欲有無次對觀貪生不生三對修二正勤下四同然合成三十故曰亦如是次對根者文中但舉貪恚二蓋對根各六一根有十二合總作兩個三十六句餘三蓋中悔疑眠三局在意地恐濫故不舉若以睡掉比貪俱通六識亦有二三十六為與悔眼合故所以不説也次七覺意者略無喜覺意文但有六六中初念覺意但五句略無第五應云未生念當令早生也第三大毗尼有三答者未必有言即相答對但迷於律藏恆欲求解義同於聞因見此文豁然生解除疑却滯名為見答從聞生解故名聞答靜心思量忽爾生解能決疑情名為忍答三使謂傳師化行教法三子者辨行優劣也偈誦中初半偈勸求二子下半偈勸捨不等子次一偈半顯勸求二子意初病或重垢深若得教授不得教授俱墮生死其若福命俱盡人第二病者積行曩久患纍輕微教戒教授若得不得俱能出離第三人事是不定得蒙教授便即出離不得便墮必須得法方能補閏以合前機不可識故此三種人並須教授故説三病也知而作布薩者謂善明説戒事故不知而作者謂學而未善了故見而作者謂先自無心見他布薩始學他作故通知不知也癡而作者一向不學人等愚於布薩事亦作説戒故曰癡而作也身作者謂身現相表己清淨戒説戒事故或口者謂口唱和及與欲等身口可知評斷事者序謂隨戒中序制謂戒本重制謂隨結等凡斷事人應撿此三處宜善知之若違此三制之入犯如其不違開令清淨三種淨不淨者謂行有違順若與前三犯法相應名三不淨與前不犯法相應名為三淨也若順三善法無過者聽故曰三聽若順三不善法有過者制故曰三不聽次釋其文或有犯序不犯制重制謂與尼露坐是或有犯制重制不犯序者如過後畜戒是或有犯重制不犯前二謂死尸上行悲也言比丘辨者外凡夫比丘淨持戒行事中無違未有勝行可彰就人受稱故言不放逸者內凡已去理解資成禁守根門離諸染著故曰不放逸辨得道共無作名清淨行辨自恣知不知等準同説戒第四捨戒第五持益含有多三準説可知增四文五第一明四大教驗説耶正第二衆僧四種斷事人已下明斷事人德優劣差殊第三此中羈連有四比丘已下雜明衆行即所斷事第四四語已下捨戒第五以四義已下明制戒持戒等益然初文有五一舉數敕聽比丘樂聞二何等為四者假間微數第三若比丘已下列四説之別四是為下結五歡喜受持先解初文此四廣者為彰驗人耶正和法是非故十律問何故佛説是四默印答欲説真實佛法故未來比丘當了了知是佛説是非佛説是故説四默印何故説四大印為成就大事不令諸比丘錯謬故母論四大廣説者所説事多故若廣説我今教授大法故名大也我今説大法大毗尼故名大廣説亦言大人所説名之為大言大人者謂佛世尊次釋此文中者教亦無二隨人分四一是其師三是弟子此四人所説成其教詮故言四種廣説也然理不自斑藉教以顯教詮理本是契方之要文持須善達詮方明間取捨雖聞此説皆須廣尋三藏驗人所説若不與三藏相應不成教詮速捨勿行過愚之甚若與三藏相應方成教詮宜嘆所説受持忽忘也然此四非廣以聞斯四廣尋三藏故曰四廣説第二次明微數故言何等四三若比丘已下隨人分教即以為四謂初從佛聞次從和合僧聞次從衆多大德聞次從一三藏聞從佛聞中分四初親從佛聞流通傳授二若聞比丘説已下具須稟領三應尋究下正是廣説驗知耶正是非四是為下結尋究中二初總彰所準三藏應驗二若聽彼比丘説已下推究知其是非於中分二第一驗己知非勸捨勿行有五初推尋究驗二若不已下驗己知非三語彼比丘言已下告彼彰過四何以故下釋説過所以五長老不須以下勸須自捨亦勿行化自他有損故次若彼比丘説已下驗己知是勸使同修亦有五句一推尋究驗二若與已下驗己知是三語彼比丘已下告彼顯是四何以故下釋顯是所以五勸令自行化物第四數次結者可知次三準説下結及受持如文可知第二斷事人其位有五但初位有兩四句初四句辨德優劣次四句為彰失之多少內無慚耻情過須呵不闍經文非己力分無其情過故不言可次以破戒不破戒配暗經文不暗經文四句類前下三同爾故有五個四也第三雜明衆行文四一雜明衆行二有四四受戒師德三次四四持律諍已下還是雜明先解初文前非法起事者謂舉罪雖有三根內不備德舉不知時生忿諍故曰前非法起事後非法作者謂衆僧見他舉得犯下四篇不教呵懺悔而共住或舉夷罪不擯而住故曰後非法作下三準説四種利法先列四章次依章釋初章門中分二初至利養明非法求二有所偏為已下明非法與求不應軌廣生罪纍故言非法求匪直求時乖法施時復生𠎝咎是故次明非法而就中分二初有所偏為者總明施主屏處情逐意量籌人物三取是已下別明非法與初至莫與爾許簡好惡多少二彼可與已下一句量人好惡合不合義前中有三對六句初至莫取爾許一對兩句屏簡好惡多少二取是來已下一對兩句正明索將詣僧時簡好惡多少三與此已下一對兩句正行施時簡物好惡多少餘句類説可知次第二有四個四受戒師德可知次第三四四持律如文自下雜辨四犯畏中分四初犯畏中文三初明犯二智人已下喻能畏人三此是下結犯中文三初玉持力與犯作喻二玉大衆中等者自言引羅為喻三時諸大衆已下治罰為喻犯中言男子喻犯戒人被拔著黑衣者喻三根外彰衆法中不淨故也持刀者喻犯夷罪能喪法身絶於慧命故喻如刀也至大衆中喻至衆僧中也正明白言故曰乃至斷顯罪受僧殯默故曰隨汝所喜我當作正治罰中取彼自言堅執不捨如似提縛詳聲唱殯故喻打惡聲鼓也結過屬彼故曰為現死相穢嚮盈流咸知其惡故喻順路唱令將指治罰門故曰從右出右者是陰陰其煞故曰右門至秉法淨衆人喻至煞處正與擯法故喻煞之喻能畏中分二初喻説彰畏二如是比丘下合也喻中分三先明智人有能畏者二見已下舉前犯是所畏事我今已下正喻畏自禁勸人終已下不犯法合中三初比丘比丘尼者合別知人二前波羅夷法者合前所畏生大已下合前畏一專精不作二犯無覆心次結中是名第一犯畏言犯者結初段言畏者結第二段下三犯畏準斯以釋但第二次死即未傷人如合鞘刀打喻覆藏罰第三輕微如杖打人第四物一柱如似合掌也清淨布薩者心念説戒波羅提木者謂僧廣説自恣之法亦顯心淨故贊布薩阿毗波羅妄語者謂是輕心雜碎戲笑不實語也四損法者由內有明慧能分別是非名之為智能唯是一隨位分四忍是聞慧親者思慧能解者修慧能斷者無相無漏慧以此法能除煩果故曰四損言四信者初至令信正明息教他令信二彼比丘語言已下一比丘勸令教他生信三汝若不能隨順已下衆多人勸令教他生信若復不能已下僧勸教他生信亦可又釋前二如向能三汝若不能已下對住處與奪怖令教他生信四對三十五事與奪怖令教化生信下之二種同是僧勸第四捨戒第五利益增五文四初明三師德行弟子淨穢隨行如非第二五種與欲已下雜明衆行違順之相第三有五語已下辨捨戒法第四如來出世已下彰其利益就初文中有五十九個五法位以為二第三十一個五對師弟子約受門以説第二有五法與人依止已下有二十八個五約就隨行如非以辨前文復二初有二十六五正明和上兼餘二師謂依止教誡尼人也是中第二十一五一不持戒二不多聞三不能教弟子增戒學四弟子有疑不能解釋五不能決定諍事如是增心已下更有五個五於前五中餘四恆定常援第三謂以增心等五頓增戒學廣説可知故曰如是五五為句如上是中不教僧戒學者對增心增惠總言增戒學又可通學漏無漏戒不增威儀者不教習下三篇行也不增淨行者謂不教修上二對治行也不增木叉者謂不識輕重等相也上來所辨增數故有一百三十究其正體人言三十二依者不然細檢比校應有五十七也又且十四十七十八十九及與未下增心等五略合九個五全同餘尋可知備上衆德其心柔軟故調順也情無怯憚故無畏也能有宣吐故曰堪能語言也自有此事者謂內具斯德也復能誘導故得攝受二衆也第二有五種人不得受戒下五個弟子淨穢如文可知第二隨行中二初有十八個五依止如非第二有十個五二師對過呵責之方初依止中三初有二五攝受弟子法也次有五法不得無依止而住下有十個五明依止須不須增數五十體有二十七尋文可知毗尼阿毗曇恆為二法也第八文少一法謂少一不知諍者謂不識四諍體相簡定是非等二不知諍起者謂不了知諍根三性等由三不知諍滅者謂不善知藥病相對正滅之方如七藥中毗尼現前是四不知向滅諍道謂不知趣滅方便如諧和進否等法是五不滿五歲三有六五失依止義於前受戒法八五中除弟子命終休道二五故但六五第三二師呵責攝受中二初有二五能呵之藥次有八五所呵之病體數可知第二雜染法五法失欲中乘別六法為彰更有多五故四種和上中二種和上應以五法懺謝而去所以爾者凡出家人無心為法不悕衣食師既無德不能悔以道法乳養心神令生解行虗明攝受闕於匠益故須辭謝已去受學請有德咨稟流訓故也如法不知者謂請教白事等法不解悔鄉師弟子之方不如法不知者謂不行上法不知以時教示三若我犯戒捨不教呵謂任行非法四若犯亦不知者謂不識犯相重輕亦不知除罪之法故也毗尼有五答者或先自恆有求解之心未得決了義同於問尋斯五處豁然生解以釋己心故名為答或對事須決義亦同問亦準此五處稱彼決了亦名為答何等是五如如發起大律名序大僧戒本禁止違緣名制比丘尼伴名為重制受戒已下盡七百來受隨二行是戒之宗本名修多羅條部已下解釋修多羅中犯相輕重名隨順修多羅若就一戒亦有五答謂須提那犯戒緣起是制戒由致名之為序結戒禁防稱之為制前制未圓防過不用故須隨結是以跋闍下文是其重制滿足我本名攝多羅廣分別者隨順修多羅謂尋此五決了疑情故曰毗尼五答也有五法名為持律有五個五合二十五體但十一謂上一有五次三各一下五上三故十一也是五五中前對四者康宗律師下之一五格文律師觀此文時廣誦三十事者即似略中之廣大僧春秋冬不依文中上四持律吉羅夏不依第五犯提若論尼者不簡前五但使憂中不依比丘皆無犯提罪持律五功德數離有五義分為三初一自行次三匡衆之行二行善成便能秉法被時千載不墮是故未一是興建正法行也念捨智等令戒清淨不為緣壞故曰堅牢破戒之人與持者相違義同於怨內心清淨超勝於彼故曰善勝諸怨既無瑕舋處衆斷理情無懼憚故曰決斷無畏曉了持犯能決人疑滯故稱善能開能第五可知業煩惱等能劫人善財害法身慧命名之為賊隨緣彰五故曰五種賊心前三煩惱賊後二業滅無明迷理愚於所緣故曰黑暗心貪心違理隨塵妾名為耶心志火燒心能喪慈善名曲戾心從此三根發生思業名為不善心思心籌慮復暢身口假斯他物故曰常有盜他物心言五犯者緣具違教壞行行受名之為犯重輕之差故言五犯一犯合多種類皆稱名五犯聚禁勤離犯名五種制舉人對前緣而不了故曰愚癡五犯等次以愚於前三因興七患理須治罰略舉呵責也自下對藥以辨或有犯心念懺者謂第五篇或有犯小罪從犯懺者謂第四篇也具有犯中罪亦從他懺者謂第三有犯重罪從他懺者謂第二有犯不可悔者謂初篇有五法作七羯磨者謂以重有相誣謗鬪亂衆僧犯於僧殘故曰破戒與呵責若在聚落粗語摩觸破戒與領若數作不止作依止治因斯罵謗惱亂白衣遮不至治若以破戒不見不肯懺悔説欲不彰三舉治之下破見等四類亦同爾被舉人有五法不應為解一罵謗比丘二千比丘作損減者謂先有之利合損耗故三無別者謂未得之閏應得不得故又可於比丘作惡名聞故四無住處者破壞處所故五若在界外已下總名界外違於七五中事故有五應解反上説被舉人五法自觀者一不共説戒自恣明法事不同三不一房宿三不同牀坐起四不隨大小次第五不得禮拜亦可一不羯磨二不説戒此三不自恣四門一房已下合名不同事五不執手迎逆已下明不共言語也事通三舉舉他比丘以此五觀察可知初一五者稱量白衣次有四個五句並是稱量比丘犯戒人有五事損一未得物不得二已得不能護三若隨所在衆已下於諸衆中慚者四無數由旬內稱説其惡五犯死隨惡道五事留僧伽梨一恐怖二兩三作未成四説染五深藏舉也五事留兩衣一受界外清渡水二若病飽食三未成四院染五深藏也五法差教授尼於十中初二來三也五種滅法分二上三法主有過下二受學者不是法主三者一不諦受忘語教人不具謂粗略學問人學不師受等故二雖可文義具足放捨戒行三吝己所得故受學過者一不受學善言二喜鬬諍亦求長短故自下有六五損益相對言損滅者有五惡法能損滅善法故一有犯者惡業起時燒人善根使不現起名為損減二為聖呵責彰無益之失三門得罪無量已下從罪生罪染汙於人不作無犯四受彼自言已下正明不如自言法治故罪不得脫善互不生五不知言説遠近損減謂應見不見等名不知言説也作法治罰折勤形心名近損減未復有三塗之惱名遠損減下二五可知下言六經如上説謂損此文但此對自行下約衆法以此為別也下坐對上坐懺具五法初列五法可知謂悔前方便法次應説罪名種已下正是懺法非五法之理也禮上坐有五法如文五分佛塔前禮比丘犯墮世賊有五長一壽住無定處二有好伴黨三若大富已下行貨求故四若有大人已下勝人為友五遠處作賊惡比丘亦五長壽一無寺舍難可治罰二有伴已下有好伴黨多聞有智三若能得已下多以衣物貨賄智人四若有大人已下勝人為友五若在空處已下明處遠難知故也內有五法得舉他者一身不清淨不得舉他要身淨聽舉生他善故二言不清淨三命不清淨此二句若作經文如身口無異故言亦如是四不知修多羅不得舉解修多羅應舉五不知毗尼不應舉善解毗尼應舉有五滅法分二初一是滅下四弟子滅也然法之興廢實在於人是以弘法之士特須敦崇善住威儀敬法傳通情存為法勿怖名利即是行紹聖蹤有嗣隆之益是名至心説法也若輕心薄法專祈名利不敬而説者故曰不能心説法法不在心名之為滅也且彰其一善生經十六者如彼文具説二經者亦爾三設後豎持已下明不能內心思量簡擇是非迷於耶正故也四不能如説修行已下既不知義何能如説修行謂無自利行也第五以前行不立焉能化物故曰亦不利人明無利他行也受學之人有斯四損名為咸法此且彰四也善生經弟子聽法亦有十六事謂時聽等如彼具説也時有異比丘已下請知是非教誡修捨分二初明出離行對業名為次明離過行對三根煩惱名為初言出離行謂善修對治離於財色斷除三受就中有三初至不放逸正明清法二佛告已下正説五種法相是非三時彼比丘已下如説修行獲其果證王説文中先明五非彰過令棄次明五如顯是令修五非者一汝知世法不能出離者謂世財色能羈礙行人縛在三有故曰非出離此就境緣説過二汝知有受不能越度者謂趣於識想取第三心緣於財色起於三想因於三想而生三受妄納違順繫在三有故曰非越度三從樂受後起於重貪纏纍行人故曰有欲非無欲也四因餘二受起瞋癡二使拘繫行者故曰是有結非無結此二因於財色起煩惱染也五正明因前三根發生思業業是牽生正種故曰是親近生死不得無親近若行此之五非不合出世真軌故曰非法亦不能滅惡生善名非毗尼不稱聖説故非佛教五如者一道性清升不為五塵所羈故曰是出離非世法二離於三受忘納違順超升彼岸故曰是越度非受法三真慧既興貪結斯亡故曰是離欲非有欲四解喪嗔癡逍然無礙故曰是無結非有結五患或既己業種自然不能牽起來報故曰不近生死非親近次令出離真執名法能滅惡生善名毗尼稱聖説故名如佛教次離過行文三如上第二教授中先非後如也五非者欲明因於財色起三相煩惱以為過也貪中分二瞋亦分二癡一故致為五一於未得之財廣生馳之心故言多欲言多欲非少欲二於已得之財受用無能故曰令無厭不知足又云於外資生貪名多欲於內資多求名不知足也於衆生起瞋名難護於非衆生起瞋名難養又可緣於外資違境行心起瞋燒人善心使不現起名難護不易護於內資違境行心起瞋喪人善財無資身義故曰令難養五從第三受復起無明八使暗於所緣故曰愚癡無智慧也五如法者於未得之財不生馳求故曰是少欲於已得物節量自濟故曰是知足非無欲反第二解可知三於衆生處所違瞋不瞋故曰易護於非衆生不起不忍故曰易養反第二解可知五種觀分明絶於暗障故曰是智慧非愚癡次有四個五句正明説法教相是非違順之義第一五句正説無過者聽第二五句正明有過者制第三五句於上制法有違事須遮止第四五句於上聽法慎而行之無過不遮初四相對明是二三相對顯非也初五順善法得句字説成其教詮此是善法汝等應行説以為體聽第一句總舉法體是善無過故曰是我所聽次有三句離明所聽第二句波陀舍者此是偈也謂談善法偈何䨲波陀舍者順善法偈説也第三便暗那者謂談善法句也阿䨲便闍那者謂順善法句説也第四句惡叉羅者謂談善法字阿䨲惡叉羅者謂懼善法字説五應如是作者勸如説行也第二五初句總舉不善法此是惡法有過須制故曰如我所不聽下三離明第二波陀舍者謂談不善法偈阿䨲波陀舍者順不善法偈説第三便闍那謂談不善法句阿䨲便闍那者謂順不善法句説第四惡叉羅者談不法字阿䨲等者謂慎不善法字説五應呵已下勸惡法應故曰應可不應隨順次下二五準説可知入衆五法者凡欲入衆之法要備五法者善調心志動成物軌和合相得猶若水乳出離之要勿過於此一修慈愍物離於瞋垢故二卑下意折伏貢高故三善知坐起離於諂慢故四説於法言離無義語五見過修默息諍訟次釋文凡欲入衆先修慈愍物與樂故曰應以慈心也然拭塵巾體攬穢歸己顯物令淨入衆之心亦宜收過向己推直於人故曰如拭塵巾也見上坐不應安坐謂離慢也見下坐不應起立謂離諂也然衆法事重持宜謹意何得雜説世言自壞惱衆宜法宣言以曉群心故曰不得雜説世言乃至為人説法也然衆無容穢見過須呵所以默者或是非時或言不鑒物若當斷理必成敗損宜須忍默以息諍訟故曰應作默然此中有六種如上自損滅中説謂損增五中文不異前故言如上以此文言五法在僧中應語故知此中對僧中明也文言如上自損減説明知上文對自行辨有斯別狀故此復明初五一有犯二智者呵責三得罪無量乃至不作無犯四取彼自言不如自言法治五不知言説遠近有損減此五僧中不應語反上應語是非相反二經竟第一不解所此可言二不善識彼語三應難不難四有難不能解五不持木叉有此五非不應反上是如應語四經竟一喜瞋恚二不放捨三增益他語四受不善語五離善語有此五非不應語反上應語六經竟應舉德中初有二五一具持二百五十二多聞三善於言語四有憶念五有智慧第二五者一有意愍心二有欲利益三令增長四懺悔五清淨次欲舉他罪已下指遮中七種五法慰喻呵責次有五法非法舉已下有五德五德舉非彰過不應舉是則應舉初五廣辨次不善善等四常換第五以不善顯前第五瞋恚不以慈心為五不應舉以善𨲙前慈心不以瞋恚為五應舉自下非毗尼是毗尼乃至損減利益恆次第展轉顯第五句是非相反以為五對類説可知第三損減據前所舉人此第五損減對能舉人説也若作此解合十四個五文釋爾謂不善善等釋前五德損益若使不具德而舉他者違理損物名不善具德舉者順理益物名之為善不具德舉者不能滅惡生善名非毗尼具德舉他能滅惡生善稱為毗尼次以世間損減釋不具德以出世間利益釋前具德類亦同爾故曰亦如是若如此者但有十個五法也問舉罪之德通論上下或有十一個五及下增十及十七有何異狀耶解言位為三一上文身清淨五及此初五二五專望能舉遠離嫌呵須此二五於中身清淨一五是本此中初五謂前五中差別如初五持戒即身淨善言即口淨多聞即知二藏智慧知毗曇藏多聞之類憶念者謂慧之伴數也第二有慈悲心下有其九五並望所舉損益故須此等但時非時一五是本餘盡是時非時五中差別初一五者一慈悲心即五中慈心下之四法總是利益不以損減中收故也第三增十及七十二門通望僧別能所以離故也時與非時此句無第三者謂無利益不以損減則不應舉實不實無第三者謂無柔濡不以粗礦下三作頭展轉除三皆不冷舉且言無第三若約二四五等除之類亦俱得作此解者單釋闕德不成舉也又可更釋時與非時無第三者謂但得有時非時相對更無第三亦時亦非時句故云無第三下皆類然此義合理斯謂釋如非謂時等一邊具德應舉非時一邊闕不應舉更無亦應不應是故須稱無第三句言等以簡之第三捨戒第四持益此三四中義合多五準前以説增六之中文有七六分文為三初有一六辨遮如非次有一六教誡尼德下有五六約業具境緣所稱法等六犯所起者如明了論八緣所生諸罪令具約彼以定此文一由身非心口者如不明戶臥及共非大戒眠等二起口不以身心如善心為女人説法過五六語三從身口不以心者如善心為男女行媒便等四從身心非口者如故心出不淨等五口心非身者如染汙心對女人説顯示淫欲語等六從身口心如有染汙心為男女行媒使等盜業一六次盜心一六須準此文以釋盜戒者善略無捨戒持益二門增七合有十四個七於中分五初有四七雜明衆行二有七持律秉宗之德十律有七大律師謂七佛是三有一七離慢如非行四有一位捨戒五有一位持益四五二門義合多七也增八之中有其八個八位分為五初有一八辨遮如非次有一八教誡尼德次有一八尼之受緣次有四八互治如非使伴之德次瞻波城已下教僧撿校罪實有八馬八人及損益八喻若離此總合有十個八也就撿罪實中分三初至信樂受持制舉罪返增瞋恚第二爾時佛告比丘已下因前瞋故遂舉八種惡人如八惡馬第三爾時世尊在拘薩羅已下對前惡人彰其損益勸棄損就益前文有三一明其德人依根舉罪二當舉罪時彼比丘已下諱犯瞋恚三佛告已下教僧觀察於中有二初即對此人以彰撿審故言應審定問此人無狂也二譬如已下教以四親近行久時觀察於中分二初長行喻三即為三文初農夫與共住久處二行作喻次當鳳竹從揚與智慧作喻第三井蘭與深觀察作喻初喻文二先喻後合喻中有四一譬如農夫者與衆主比丘能斷理人作喻二田苗已下至而為妨害與所斷理衆持破相似不可別喻三乃至秀實已下正明共住久處驗得罪實過彰露喻過既彰顯宜治罰是以第四既知非穀已下滅擯除棄喻第二難分中言田苗稊稗參生者謂持破共住苗葉相類不別者善惡相濫也而為妨害者彰惡能損善故次合中比丘亦復如是合上農夫有惡比丘已下乃至不出罪時合上第二相似難分喻既出其罪已下合上第三方知非穀喻四既知其異一為作滅擯已下合上既知非穀藝除根本喻第二喻四一農夫喻衆主二治穀喻所斷理僧衆淨穢相濫猶若穀粃難分喻二當風一從揚正明與智慧風驗其罪實善惡兩分喻四好穀已下滅擯除棄喻下合中略不合初喻餘三比説第三喻亦四譬如有人與衆主作喻二從須木已下至如貞實者不異正明雖須好木而淨穢相似難分喻三至於叩時已下明深觀察驗得罪實喻四既知內空已下與治罰為喻第二喻中清淨衆有律潤之義如似於井治罰簡取共授佛法故曰須木作井蘭戒法防非如似於城舉罪善心從律內而起義同從城中出秉明慧在心名手執利斧往彼林中喻入僧衆井中遍叩諸樹者喻與智慧深觀察之人人各取自言若是實中者喻持戒比丘言行相覆空中虗犀者喻破戒比丘言行相反而彼空樹乃至不異者明惡人監善難可分別第三喻中至於叩時方知內空者因撿自言虗實殊分也第四喻中既知內空總舉其過即便已下正明行治若獲夷罪理合滅擯故曰斫伐如大虗犀不任用故僧殘可救與波利阿浮呵那故曰截落枝落枝葉第三次輕三説而遣故曰先去粗朴提舍尼罪一説懺洗義同釿剗粗重既無吉罪心悔稱細治自離罪垢名為內淨除見聞之醜字為外淨既是第二白法堪為僧用共護佛法故曰以作井蘭下合中略不合初句餘可準知就偈中有三初有一偈半總誦上合喻中第三段以四親近行驗得罪實文二次有半偈總誦上喻説中第四段治罰文第三有二偈總誦上合中第四段治罰經文就初段中初一偈誦共住久處二親近行驗得罪實文次半偈誦上智慧觀察驗得罪實義也第二惡馬文三初先總舉二惡八數舉汝曹諦聽二何等八已下別別列八馬八人三我已説八種已下總以結勸第二文二第一先列八種惡馬第二法喻相對明惡人惡馬也兩文之中各有其三一者假徵故曰何等八二各別列八相三是為下結列中惡馬者喻惡比丘難可禁制故也此是因前被舉增瞋恚故果別餘七併合有八謂第五惡馬者乃是初緣被舉解推增瞋恚人故也以䩛切勒控制惡馬不得動轉喻以三根證彼前犯不得違返義同授勒也言與鞭者喻與彼罪遠情總義言與鞭也欲令其去者謂怖令懺悔有長道之益故也抵躓不去者喻惡比丘不肯引過懺悔滅也下列八人中一一有三初舉法説二猶如已下以喻況顯三我説此人者合就初法中言或有惡比丘者似惡馬也見聞疑者如控勒也罪者如與鞭令去也而彼言我不憶者狀似抵躓不知去也次猶如已下喻言惡馬者喻惡比丘授勒者喻舉三根言與鞭者喻前言罪言欲令去者喻令懺清淨言而更等者喻合不須也我説此人亦如是者亦如惡馬也自下同者不須釋隨異者須解也二惡馬中倚傍犯不犯兩轅三惡中顛厥足者喻自壞及折轅軸喻惱他四惡中而更却行者喻惡比丘反呵五德不受教訓長老亦自癡者合却行也五惡中趣非道者喻惡比丘作餘語答僧不引本罪也折軸者喻惡比丘反生嗔恚惱亂衆僧合喻可知六中不畏御者喻惡比丘不畏衆僧也亦不畏鞭喻不畏所犯罪也嚙銜不可制者喻不受五德語以座具肩上而去七惡中雙腳人立坐吐沫者喻惡比丘反抄衣舉手大語不可制也八惡中蹲臥者喻惡比丘得他舉故反捨戒休道也第三彰損益中文二初審諸比丘彰其損益二世尊説時已下人有利鈍獲益不同進退四階也前文損益事雖有八義約為三初一火聚舉違順二憶以彰損益勸捨順行違第二次有二文熱戟及斧破戒人受人恭敬以明違順舉益勸持第三以鐵衣已下五事對衣食粥房牀受人供給以辨損益勸持亦略無捨戒持益多八之文增九四位初一九法對白衣家信有淳微次一九法辨遮如非次捨戒次位持益下二得有多九謂十十中有二十個十法位分為三初有十二個十就資緣衆行雜明應不應第二有十法不應授大戒已下五個十就受戒師德斷諍應否第三阿難從座起已下有三個十生諍不生諍諍根非諍根破不破義初文十二中分之為七初有兩個十衣物資緣次有兩個十辨遮如非次有一十教戒尼德次一舉德次捉籌如非次一戒宗之利次不應犯已下四個十法雜明就第四舉德中如上五五法中説者解有二種一釋此中更有三個增十今依文者一身清淨二口清淨三命清淨四不多聞不應舉多聞應舉五不誦二部毗尼不應舉誦應舉此一五竟又第二五十一四常定以廣誦毗尼顯前第五有第二五復以堅住毗尼顯前第五為第三五復以善能滅諍顯前第五為第四五故言如上五五法中説下復以常五德配前四五有四個增十又解不爾上增五中但有初五餘者悉無何容謬指下三五如上今言此中總指料簡五德應舉不應義如前增五無異故言如上五五法中説也非別更有三五下以常五德配故但成一個十也準此文時凡言舉罪自須遠離嫌呵復利益所舉言具十應舉也第二師德等中初有兩個十受戒師德第二十法一不持戒二不多聞三不教毗曇四不教毗尼五不能教捨惡見六不知木叉者謂不能戒相輕重持犯等相七不知木叉説者謂不能衆法説之儀則不知布薩者不知自行除罪不知布薩羯磨者不識衆法除罪也十不滿十歲次三斷諍之德有十法不應斷事者一不持戒二不多聞三不廣誦毗尼四不善巧言語令人易解五不能問答教呵令彼歡喜六有諍不善滅者謂不解四諍用藥多少進否之儀七不知木叉八不知木叉説九不知布薩十不知布薩羯磨又作第二十時前六常定更以四句配之一不解斷了鬪諍事二不知諍起三不知諍滅四不知趣滅諍道是為十又以不愛等四顯前四即第三十第三生諍不生諍等如文增十一但有捨戒如文增十二有二初就覓諍有兩增十二或可有三下就言諍有一個十二覓諍中初十二者初諍根有三滅中有四以身清淨等五德配之是為十二初諍根非諍根中先總舉列數二何等已下依數辨相三是故已下結辨中先非後如言三法疾滅者謂三善根疾滅也言三法增長者謂三不善根增長也三疾滅中念出離者無貪善根清淨無染故曰念出離也念無嫉姤者是無癡善根也三法增長反前可知總結中二初是已下者謂舉諍過以結損第二是故已下者總結應知三法疾滅三法增長損益義也次若比丘已下以如反非三不善根滅三善根增即是和合次滅諍四者一一是非合説四對初彼此不忍諍唯增熾各懷忍默諍則消殄二不以七滅一一而滅故增用則除滅三三不共上中下坐評宜不可除殄共評則滅四不與持法摩夷共評為異下以五德配之一身不清淨二口不清淨此合明三命不清淨四寡聞此二合辨五不知毗尼言不辨了此五不應舉反前應舉此五足前七法合有十二又有説者上來事諍以其文言以七滅諍一一滅之故知也若爾以用七故是事諍者理即謗三不專覓中事作何須五德身清淨等今言以七滅滅者此謂總舉七藥若當滅者十滅之中隨滅滅之意取憶念等也次第二十二第一若此比丘有愛恭敬已下至信樂受持有六句量宜應舉不應舉合以為一第一有愛恭敬二無愛有恭敬三有恭敬無愛此句文錯應言無恭敬有愛乃言有恭敬無愛此是到言也四無愛無恭敬能令捨惡行善應舉五若無愛恭敬然常中有所重比丘應舉第六全闕無益正明捨棄惡馬治之次憂波問已下有三謂初一問答破戒見破威儀是所舉事復一問答有三謂舉所依根次一問答謂以利益所舉五德合成十二也此二中五德前配遠離嫌呵五此配滅成善五也次下文者有説但是量宜應舉是非不是增十二數或若作勸學我法者莫數數舉他以明十二義亦不妨次定文者從跋闍已下至而為説法審撿比丘使體解説意即是一句二佛言汝等已下至和合修學既詳説意於我所説勸應修學有第二句三若歡喜和合已下乃至住於善法勸莫數舉或若舉者制汝能舉罪人觀察應不有其七句一不合自惱二亦不害他三彼犯罪者不善瞋恚四不結怨嫌五不難覺悟六自能除罪七能捨不善住於善法并前成九次若作如是已下對前七種觀察具者大善儻或不具量宜應不有其三句第一從初至則應舉罪對前七闕第一第五具餘五故益物應舉於中文二初對制法以明闕兩第一彼比丘應作是念已下量應否第二比丘作是念已下至餘如上説闕第一第三然具餘五益物聽舉第三比丘復念已下闕一二三及以五六雖有餘二謂是四七以損物故故不應舉故使言於我得惱害彼喜瞋恚難可解悟不疾捨罪若我舉者多生瞋恚不須復舉以三足九豈非十二也前應舉中具作兩句若更以一法作頭以餘相配二二闕之便成多句為成十二文不綺該也次如是比丘和合歡喜已下明言諍十二句也此文意勢還是傳從前佛説意來謂汝比丘若和合學我所説前勸莫舉今勸評理莫生鉾盾故文言如是比丘和合歡喜於阿毗曇中種種諍語若作是説於僧十二中分文又為二初兩個十二直就舉罪第二跋闍已下勸學以明兩個增十二一勸勿疾舉次前文十二者是二勿生諍此文是也次解文初説若作如是和合評四種法而生其諍第二衆僧有僧事起已下明觀過三句第三若作如是諍事滅已下明滅諍五句合成十二初四句者一初至如是語評文義相應法如僧尼二部各有五篇竪義者言文義相應論義言者既分二説文義俱不相應而生言諍也第二句復作是言已下至如是言其竪義者言文雖少異而義是同如用飲蟲水二敷臥具打摶等類論義者言文既是異何得義同而生諍也第三復作如是言竪義者文同義異如前胎潤等月及人法了不了中憶一不憶一等如增十七利益損減等論義者言文既是同何得義異而生諍也第四其竪義者言文義俱異至論義者料以一文漫相比決而生諍也次觀過三者初至留難觀諍是留難二復問言已下彰是可呵三復問已下明不能進善次滅諍五者初至滅此諍事付諍祈滅二彼比丘應答言已下受諍為判三若彼比丘聞已下明捨諍消滅四比丘作如是説已下衆主比丘謙卑下意離於慢高五如是餘比丘已下正明斷理應法無可呵之失增十三文易知十四五六法門此三闕次略而不舉增十七者一身不清淨文中廣辨二口不清淨三命不清淨四不多聞五不誦毗尼六不觀修多羅七言不辨了八於善比丘無慈心作破壞意不應舉反非乃應舉廣文同前故言亦如是九復次已下明有實犯應舉十取彼自言如自言治十一善能言泥辨了十二有利益復以常者五德配之便成十七也問第四不多聞與第六不觀修多羅何異耶答第四不多聞者謂不解二藏法相因果耶正不應舉反前應舉不觀修多羅者謂不能觀經中合舉不合舉如各自觀身行等即不合舉多聞有智慈心愍物發言有益有是合舉問第七與十一俱言辨了此有何異答第七辨了謂直言詞流澤音聲清妙但可悅可未必當機十一者善巧方便稱機授與契快群心故曰辨了又問第八慈心與五德中慈復有何別前八慈心於善衆有慈德中慈心愍所舉人故又問第九實不實與德中真實竟復何殊前實望犯罪虗實德中實者謂三根有無又問十二利益德中利益如何取別望自身於己無惱德中利益於所舉無惱故也增十八九二十二十一此門亦略增二十二中初是師德生善以説後是斷事人德滅惡以明師德中初十八法有成十八十九不知可懺者謂不識下四篇是可悔法二十不知不可懺者謂不識夷等罪是不可懺故十一不知懺悔者謂不識能治之藥成不之義二十二不知懺悔清淨者不識藥病相對滅惡生善也若不具此師訓不成焉能攝受制不聽度人反則為如生善滅惡故聽度人滅諍德中有二初有十一自行善成是其德能下有十一違離嫌涉初十一者一持戒二多聞三知阿毗曇因果耶正四知毗尼善解行教相差殊五既是衆生為前滅諍何有反生他忿故曰不與人諍亦不堅住此事者謂不受偏辭執以為是六犯下四篇應教呵然後共住七若犯夷等應滅便滅次不愛等四故有十一遠嫌十一者一飲食二衣鉢三供養四入村五期要以此五事對此彼二衆説即成其十并後來以坐故復十一合二十二也
