body:
  text: 沙門法礪撰述呵嘖揵度第十一上品專精無過可罰次品自悔不勞折伏此七種惡人有過相續理須調御順行道法方成護衆生救之益故次明之寺內兩舌須呵嘖治人之喜為從初彰名故曰呵嘖七法非一集在一處故曰揵度先釋其義八門分別第一列數釋名第二置七所以第三輕重次第第四離合第五足數不足數第六隨順有無第七解懺先後第八諫不諫異初門有二第一釋名第二得名言釋呵嘖名者此人輕蔑僧衆情存鬪亂對僧倒說破壞彼此不受訓導為過處深須加治罰故曰呵責作羯磨法呵責前人故曰呵責羯磨五分亦爾祇律名折伏言擯者此人於白衣處倒說佛法汙家惡行壞彼信心以非為是作法加罰遣出本處為使折伏改悔從善還生俗信故曰擯羯磨涅槃名為驅遣羯磨十律名驅出言依止者此人在道雖久自無解慧與白衣雜住倒說四事隨緣起過行不自立須僧治罰依伏明德請稟法訓以成己益故曰依止羯磨涅槃名為置羯磨謂置在有德人所故曰也言遮不至白衣家者謂於有信白衣前倒說佛法謗毀三寶罵辱白衣損壞俗信而便捨去名為不至作法加罰差八德送懺為使申謝還生俗信遮其不至要令自往故曰遮不至白衣家羯磨涅槃名為舉罪羯磨彰過於外俗人前悔故曰舉罪十五二律稱為下意祇律發喜謂發白衣歡喜言不見舉者不信善惡二因得苦樂兩報耶心在懷彰於學路宜加折伏舉棄衆外目之為舉作斯舉法治不見人故曰不見舉涅槃名為未可見羯磨言不懺舉者然罪無定性既從緣而生理有悔除從緣而滅今耶見在心不信緣能感業垢鄣尤深進道無由須僧折伏令信懺滅罪故曰不懺釋舉同前涅槃名為滅羯磨治罰前人使信懺滅罪故惡見不捨者見欲不鄣耶心穴徹名之為見見心違理目之為惡治舉惡見之人甄在衆外不任僧用故曰惡見不捨舉涅槃名為未捨惡具舉依明了論合三舉為不共住羯磨故彼偈曰及五依羯磨所依事有五能依羯磨亦有五若比丘高心不敬非他大衆為此人作怖畏羯磨即此可責也若比丘未明了律中罪非罪阿毗達磨中滅非滅或離依止或受沙彌依止及作大戒依學於明了人所作練磨羯磨猶此依止也上言罪者惡業非罪者戒滅者涅槃非滅者生死不了此者須行練磨若比丘於俗住處起惡汙行作驅出羯磨即此擯也若比丘於在家人邊謗毀佛法作拭除辭謝羯磨言謗三寶者言佛無一切智法不能盡苦僧無清淨行等須加此罰即此遮不至也若比丘不見自有罪若見不肯行對治法或不捨耶見作不共住羯磨第二次辨得名於中位二前四從治作名以治人名別故後三約過立目以治人名同故若辨舉名從喻受稱第二門三門料簡第一應治不應治第二攝治盡不盡第三立七之意初門凡行七法謂起過犯若對僧前或對比丘到說十八二處二事等惱亂大衆與作呵責若說前十八等令他白衣失平等善心作擯出治若與白衣雜住共相親附數作數懺因前到說而生過者與依止治或因到說前事惱謗白衣遮不至治若因前事有不見病生與不見舉又因生不信懺悔與不懺舉治因到說言欲不鄣道與不捨舉治故增二文言有二比丘應與作呵責羯磨非法說法法說非法乃至說不說如是𢷤依止遮不至舉羯磨亦如是二處二事二見亦如是又增三文中有三法僧應與呵責羯磨破戒破見破威儀如是乃至舉羯磨亦如是雖可實犯要須有根故增四文有四法作羯磨等非法非毗尼不成不得處所謂無根破戒破見破威儀破正命有根成得處所反上是又得作須應法如九三說第二盡不盡者凡治罰法多且彰斯七以六義故攝治不盡一局在治人不論治罪即甄覆等四法第二秉行衆法異於惡馬第三為欲治取不同滅擯第四專是治人不為滅諍異罪處所第五但為治道亦甄覆鉢第六僧尼二部當衆行罰即別於不禮等立治之法據此道理豈可不是治法衆多攝而未盡第三門等不攝餘所以七者七中位二前四壞行不壞於信後三信行俱壞四壞行中行雖無量略明二種一內護行謂出家人順教修行衆法成立攝法在己千載不墜名為內護佛法行二外護行謂在家俗人敬信三寶授護佛法使不墜沒名為外護內護有二謂衆法內護自行內護若壞衆法內護行者作呵責治若壞自行內護者作依止治外護亦二謂有違順若順情生過不問總別多家一家並須擯治即是護令生於正信若違情惱物不問多一皆不至治便是護令無惱以罵生惱故隨事差分立四治法就後三俱壞中行雖無量不出二種一者信善惡二因感苦樂兩報是入道之初門二依信起行今要而言亦唯有兩一是止持行謂信罪懺滅者是二作持行謂見欲是鄣修離染清淨行是此是三修反此三修即成三耶對此三耶故立三舉又更一義言此三法並是不信耶見之人見不孤起託境而生境略藥病不懺一種對藥起耶自餘二見皆從病起謂不善業有於二能一能感苦不信此者即初舉治二能障道言不障者第三舉治彼此合論故有三舉問增三云不信舉者何舉所收答凡言到說十八並是須舉今言不信者不信善招勝報不信聖教是非者不過十八咸初舉中攝以第三舉局故第三門前四壞行不壞信故過微治淺判之為輕後三俱壞鄣於進道自非重治無以息過舉無僧用名之為重問所以五篇先重後輕此七先輕後重者解言五篇犯相次第重過先勒故在初明此就治人次第先輕後重若爾呵弟子中何以先重答此等亦是說之次第問若此輕重者何以行法同奪七五答莫不皆是治人之法俱非勝次故爾如罪處所覆藏等法學悔之類豈不輕重直以並奪勝次治人義齊故同七五第四門前四唯離後三離合俱成所以爾者前四治人名別理無並牒四過合加治罰唯離方成三舉事雖是別治人名同故得並牒三過一時舉罰離合並成一人三過合在可知假使三人各過合亦應得一以人不滿衆故二治人名處同故是以律文三單三雙一合事在於斯第五門前四治輕得足僧數後三耶故治罰法重不滿僧數第六門隨順有無者後三有隨以其耶見壞人心行故爾前四足數無隨順罪二就有罪中除師徒尼伴亦無隨罪所以爾者師徒以其共行七法互相勸匠早隨順故尼被差故如五分憂蹉尼僧與作不見擯啼泣言願為我解我愚癡或可更犯粗罪佛言應白二差一尼為伴共行止住三就餘人有罪中重輕分別前二犯吉後一得提四多少分別亦可知若據自違行法者一有罪無罪者七皆有罪以並違行法故二有罪中重輕分別七俱吉羅以不就希數等故三亦多少可知第七門前四無隨順過故得無懺後解如遮不至先懺白衣竟然後方解此七羯磨但治其人不治其罪為是懺竟治法不謝故要須解以治人時不牒罪名作法故爾三舉過重恐犯隨故是以先解後懺如受戒中說解舉已若懺悔者善若不悔者更為作舉以斯文證先後自明又釋如增三文有三種人應為解舉應見見應懺懺應捨如應見應見已為解故知應懺應懺己解義亦不妨若為懺悔除耶乃是正見何有隨舉故使三舉先後俱得第八門前六羯磨無倚傍無倚傍故不須設諫後一倚傍倚傍聖教言說相似是非難分須僧設諫開亦是非改過從善次下釋文七種治法即為七文就呵責中分文有四第一從初至不除滅先明過狀第二諸比丘已下發覺呵責第三告諸比丘已下作法治罰調伏攝取第四若衆僧在小食上已下隨順為解下六分文咸同三十四就第三收中分文有二第一至應如是作教諸比丘作治罰之方第二衆僧為智慧已下奉教治罰舉以白佛廣辨三法五法是非之相作法文二第一至如是持作羯磨之軌文言與智慧盧醯那二比丘作呵責者出法之辭理合一一別治不合治也下擯阿濕波等亦爾又云增罪治者謂作惡馬治之十律隨此比丘幾時作不清淨行惡口不止隨爾前時與作苦切羯磨七法並爾又言增罪治者若不調伏增其日月令行三十五事未得為解故十律若不如是法行者盡壽不得離此苦切羯磨第二僧為作呵責已下教奪七五初五奪其眷屬二五奪其智能三五制令隨順四五息相續後犯自是非人一不應更犯此罪餘亦不應犯如本為殘罪呵責者謂提罪為餘若為提罪呵責以可呵為餘也二若相似若從此生言相似者與本罪種類故若從此生者謂從根本前方便之罪三若復重於此者謂提以殘為重類說可知四不應嫌羯磨呵法五及羯磨人謂呵人五五不得受他供給六五不得受他恭敬七五不得舉罪輒忤他事第二奉教行罰中一正作法治罰二舉以白佛三佛言已下廣彰如非如非分二初就三法辨如非次約五法三中先非二十七初有兩個三舉列章門下有六個三一一舉前皆加非法別衆以成六三未有一三舉不現前對非法別通收九三次如二十七九三反前而說此是以少番多如瞻波義中已說五非五如准三而辨多少如前治文四至白佛已來伺衆集時改過求懺二佛言已下應解教僧以彼七五量應解否三應如是解已下自表殷勤求僧三乞四衆中已下正明為解依止治法中以餘所稱方國土等五皆不定故不得稱之俱語言應受依止以表繫心憑法故就遮不至中文四初至胡麻滓罵謗起過第二彼質多羅已下呵責第三告諸比丘已下治罰第四佛言聽差使已下正彰懺解第三治法文三謂三稱量先以五法稱量白衣次以十法稱量比丘隨犯一一第三應如是集僧已下稱量羯磨解中文二初至即共懺悔先謝白衣第二時善法比丘已下隨順為解前文有四一稱量使人之德二佛言聽僧差阿難已下明差使白二三僧差使竟至自往懺悔已來教其悔謝進否之式四如是阿難已下正明懺謝十律若居士不受懺悔者是居士有多知識有大力勢有官力賊力能自作惡事惱亂僧衆若令人作僧應語是比丘言是居士有如是損力汝當離是住處去若比丘強住不去衆僧無罪次解如常不見舉解文略無乞辭不懺舉可知惡見不捨文四如前初文復四一欲說不彰諫所為事二諸比丘聞已下呵三告諸比丘已下秉法設諫四波阿利吒已下違僧三諫耶心成就正是舉家所治情過十律三舉人皆不共中食怛鉢那人揵度第十二釋此揵度治殘方法者前七羯磨折伏形心雖已調柔猶有罪在事須悔除故次明之若就行法應名懺悔揵度今約能懺行者以標其目故名為人度明人懺集在一處故稱人揵度先解義門後隨文釋初義門者依明了論偈曰及上起罪五種方釋曰五方者如人犯殘求得出離若人欲為彼作提舍那羯磨此人定應先憶持五種上起方後作羯磨一觀僧殘罪相二為簡擇人知藏罪不藏罪相三觀業聚學處為簡擇四部等衆四觀業相應學處為行白四等羯磨五觀於十三殘罪中一日夜等藏不藏為顯有藏無藏等地立宿住摩捺多等斯之五方僧須觀察始可為人上起罪也方猶法也釋此五法即為五門所以名上起者往前墮在犯罪處故名為下罪相續故遮隨或無作不生今若懺悔約遮相續還受持清淨對治護故或法續生稱之為起第二白法番前犯罪時下故名為止是以懺悔總名上起法也知提舍那者此名發露謂此懺悔是發露法故欲行上起須知五方第一方者謂須撿定是殘非殘即知具𨷂之義具緣成重𨷂緣便輕故論立一觀僧殘罪相者於故意出不淨罪中根本相若人已受大比丘戒若如來已制此戒若人不廢法若人有欲心出不淨若不淨已出等此人則犯僧殘於餘略說相亦如是廣說如波羅提木叉論說准論解律上來即是通別二緣謂不至癡法已前是通緣若人有欲心已下是別緣具便犯殘𨷂或犯蘭乃盡十三一一別緣以驗前犯究竟方便及以不犯恐無過加罰成非法故又祇律持律比丘與他出罪時有罪亦知謂廣知五衆罪無罪亦知第二方者論曰覆藏相者若人於僧殘罪中起僧殘罪見不欲從彼上起由無發露心覆一夜於此人此罪已被藏此謂憶識不疑不發露故若人不知不憶或疑或起非罪見故藏此罪不被藏准識解律須以二門分別第一解等就成殘惱約位法心等定覆非覆第二唯就道分位中簡覆非覆初門者若定不覆有五一如四能道沙彌形老非覆二癡狂等三重病緣差三三舉等治法差故四發露法者謂作法差故五不憶疑不識等謂心差故此等五者不合治覆故容呵文憶者與覆藏善不善憶者與覆藏不善應與摩那埵僧作突吉羅懺覆成反前非此五差是覆須治又此五者位法心合也若細分別前三是位次一是法次一心迷言定位者即八緣若位非比丘故謂初二體非次三體是病壞心故落在非覆次三治重僧數不收故言次一法者謂發露法正反覆藏故也言次一心迷者謂不憶等無覆殘情過故此之五位若具如向辨細分說者便十三種非覆不須治十律獨住比丘無人可向發露雖覆不成覆祇律覆亦知謂知罪作覆藏心不覆亦知不覆者不作覆心未得發露若忘若罷道若入定若命終是名不覆又言知是罪不作覆心作是念待時待方待人當如法作是名非覆非發露此二律儀於此有同有異異者或可無用可知第二門道分位中簡覆非覆謂取前五中下二離為五對一覆不覆二憶不憶三疑不疑四識五乞不乞所以須此等者如發露者即不成覆隱即成覆故須覆不覆來除發露者却就覆中自有憶不憶不憶非覆却就憶中有憶而生疑有憶而不疑疑者非覆又就不疑中有識不識不識非覆然就識中有乞不乞不乞成覆乞不成覆故須展轉簡取覆憶不疑識不乞者是覆須治故爾問憶識不疑但是一法何須辨三者答理實是一所對有異故須辨三謂不識非疑疑非不憶故也問憶不憶等名義如何答凡言憶者不妄妄故不憶疑者疑其輕重謂實殘罪向餘六疑故不猶預故非疑識者謂作殘意不識者殘謂餘六故問所以疑罪鄣說此不成覆答重輕七聚俱鄣說或雖疑輕重非全無犯故亦鄣說唯殘治覆餘不治覆故疑非覆問所以簡覆非覆須前五對但便覆中是餘文或四或三者何答皆以當處文意不同故其竪義者懸舉以釋講對文辨第三方者論曰觀業聚學處為簡擇四部等衆者四部謂四僧僧雖位四今此懺境前二四人僧後一二十衆異此則不成若行時假境說者前一下至有一人此一局對僧出罪一席法第四方者論曰觀業相應學處為行白四等羯磨者以其法位雖三此治殘法事並上品故齊白四就此用法位極有四謂波利婆沙摩那埵本日治何得呵那等欲解此四須以六門分別竪義者此中懸解講者對文以釋問所以第三方名業聚第四方名業相應並稱學處耶答西音羯磨此方或稱辨事或名所作或名為業業者謂羯磨也此指瞻波法中辨羯磨之處明四種僧故曰業聚正辨如非等者是羯磨法體故曰業相應然後佛制令其誦習不習獲罪是故此兩並名學處謂舉瞻波中辨能秉僧及所秉法故爾第五方者論曰觀於十三殘罪中一日夜等藏不藏為顯有藏無藏等地立宿住摩㮈多等地者處所之名謂波利婆沙等四位於此四位中若有藏即行宿住地謂別住法要須經宿行別住法故曰宿住若無藏直行摩捺多故言有藏無藏等地立宿住摩捺多等即是有覆行三法無覆行二法用藥分齊病藥相對法也但所治之罪藏不藏別對病設藥位亦有兩謂一者治覆二治不覆於此二中復俱有二各不壞法及壞法藥故成四別謂覆有不壞壞不覆亦有不壞壞先辨覆中不壞及壞法者不壞法三壞法位五以其別住六夜各帶本日故此謂新罪與本日准異種合行重治本日中說若取約時重犯法中新舊似別即成七法也謂本覆法一新犯覆法二舊犯本日治三次六夜亦三次合出罪故言或七故文言若行覆比丘中間犯罪知日數覆藏僧應隨中間犯罪與覆藏羯磨與覆藏羯磨竟與本日治行覆本日治竟與摩那埵與摩那埵竟應為出罪五分有比丘故出不淨犯殘不覆從僧乞六夜於六夜中復犯不覆白佛佛告比丘今聽彼比丘更從僧乞行摩那埵僧應與六夜白四彼比丘行摩那埵竟應復更從僧乞行本摩那埵僧應白四與之作法云何謂彼比丘更從僧乞言我某甲比丘先故出不淨犯殘不覆藏從僧乞行摩那埵僧與我行摩那埵我於六夜中更犯不覆藏今從僧乞行摩那埵願更與我摩那埵如是三乞應一比丘如乞辭白四與之彼六夜行竟復更從僧乞行本六夜摩那埵言我某甲比丘先故出不淨犯僧殘不覆藏從僧乞行摩那埵僧與我行摩那埵我於六夜中更犯不覆藏復僧乞行六夜摩那埵我已六夜行摩那埵竟今從僧乞行六夜摩那埵願僧與我行本六夜摩那埵如是三乞與法如前彼行六夜竟應與阿將呵那若犯覆作法亦如上准四分五分此之二文新舊罪別行事須知然覆不壞中得法差殊位言且四第一一罪一得法即建首文是第二多罪一得覆共行三法如犯僧殘覆藏一夜二夜乃至十夜合乞行者是又祇律云憶夜不憶罪者與無量罪別住第三多罪多得覆共行三法如第一七句中前四句是第四一罪辨得法如犯僧殘覆藏兩月文是亦可或二三四五六多得法也且舉再得亦其軌模廣如下辨於此四位位各通三謂所治之罪有知日數不知日數或知數不知數以三對四合十二頭異今者但約得法往收且從四位以說第二壞覆中位行五法或七法即上四位及十二頭具有此壞五法等然重犯行中義有四時先約對行覆時重犯辨壞治救方法於四位三頭即成四個各二十七人以彰種異即約時重犯中總略說者是又此三頭頭下九人者謂法同故言三頭即各九人別也或有第二重壞當位各更倍成二十七各加舊新或離合法或第三重四五重犯亦可知今且言第一而說於下三時中重犯壞者亦然故下文言行覆竟亦如是乃至行六夜竟亦如是便十六個二十七人合四百三十二人起犯不同即四百三十二個頭種別法異或二三重等作法皆別也問如一罪中品知數不知數此二門可爾既言一罪何處得亦知不和合也解言得有如犯一罪或一年覆但百日已來分明記憶百日已前數不能定若欲治罰雖可記憶少時以有不知定數義亦治長故有此門理亦非妨此四得法位各合多義廣如文中五門四門等分別者是竪義對此中說上來十二者對識不識若用憶不憶門疑不疑門義常無別是故治法長短中通約憶疑識等三門說也豈可知不知得有本日餘憶疑等無其重犯故使得法位亦各四約法長短門四各有三故並十二也若約壞法者於前十六二十七憶等三門具有斯法據此以說法乃無窮如羯磨本但舉三番依此即欲明治周盡者如大海一渧須彌一塵也第二治不覆中不壞壞者不壞位三一一罪一得法即略中三番是二多罪一得法三多罪法此二准覆以說但無一罪再得法者以其六夜不隨長短故爾於三位中有有知不知等三三三合九又且得法位三同上覆法若約知不知作法者牒辭異故三各有三而不欲分長短之別第二壞法中謂有二時各有三個二十七人起犯治救餘准覆說上來所以須約五方解者以下文中一一治法咸須此五謂皆知具𨷂成覆不成覆能秉僧所秉法及用藥分齊是故此中總解若對下文應須舉斯五方約法一一作心加被之即知成否之狀次下分文昔解分三初明其藥次所治之病三等覆已下藥病相對即自釋言前藥有病舉病為成其藥病中明藥舉藥為明其病此義不爾此等上下一一舉病隨以藥治一文即是一事當分設治治無不周何有初文獨舉其藥次專彰病又第三文頗有舉第二中病乃取初文一一設治之處以不故知此文與滅諍非類不得妄准彼文以定斯旨但列法略廣雖可俱用白四牒事差殊終不得以此中法初至識不識亦如是為簡是覆須治廣前初覆第二時有互治餘病若如所辨皆不成故今解此揵度大文有二初至如是持略治僧殘第二時有比丘犯衆多殘罪或有覆藏一夜乃至十夜已下廣治僧殘於此二中文各有二略文二者前明治覆次治不覆藏以其僧殘不過但有覆異故所以爾廣文亦二第一從初至識不識亦如是為簡是覆須治廣前初覆第二時有比丘犯戒殘不覆藏已下訖揵度未明本無覆治之方軌廣後不覆此即義二文四所以得知諸略後廣舉上五種方中第五方義驗此前後足知初略後廣就前略中先解初覆於中四法文還為四謂覆一本日治二六夜三出罪四也先解義門此四羯磨六門分別第一列名番名釋義二所治分別三有無長短四先後次第五諸部同異六僧尼不同初門者謂波利婆沙等乃至阿將呵那言波利婆沙者此方名為覆藏就所治情過受稱故爾此律多言覆藏故文佛言聽僧隨覆藏曰與覆藏羯磨亦名別住如祇五十等三律及以伽論並名別住明了論名宿住就行悔行法得名以其同聚妨循廢業制令別住思𠎝改過深自悔責因行方成有殄業之義言摩那埵者明了論名摩捺多言此名悅衆意或名發喜由作此慶己罪纍將得除殄內心欣躍故稱發喜亦名下意由作此法折伏貢高卑心柔軟故曰下意羯磨問覆藏摩那俱不同宿所以彼稱別住此名下意解言覆藏非僧中宿又不日日白彰下意不顯故與別住之名此摩那埵是僧中宿復日日白彰下意義顯故存具目本日治者復本日行罰故曰本日治不知西音字何許阿浮呵那明了論名阿也悔此方或名喚入衆法以六夜前未清淨今清淨已故名喚入亦攝拔除罪法此律文言出罪以作此法人從罪出故或由作法罪得除滅故此四齊名羯磨羯磨非出罪等以因作此羯磨故行別住乃至出罪故曰也第二門者覆藏一法所治有二一治覆藏情過不治其罪以不憶疑不識等不治覆故是以下文言先懺覆藏突吉羅然後與覆藏羯磨二治冒涉清衆之過若在道分即治其覆如罷道等不須治故摩那埵者正治造殘情過兼是治殘方便本日治者此治自違行法及違僧命罰令復本其新犯隨覆不覆治得本日已後行法同前二伽論言本日治者調伏故使諸比丘知是長老如是煩惱熾盛犯罪慚愧更不作故阿得呵那者是摩那埵功德利以下意調伏求清淨自求出罪故諸比丘愍而為出罪便得清淨正治僧殘又云有二本日治罰令戒具故第三門有無長短言有無者謂有覆無覆先對餘篇以辨有無問所以上一下三不治覆冒僧殘一罪獨治者何解言初篇過重理不可悔何須治彼枝條之過下之三篇根本既輕不假僧悔直懺覆吉不治枝條此篇可悔中重假僧而滅覆冒之𠎝宜加苦罰身心折伏因行成就故次就四法以解有無覆及本日不正治罪有無不定有則具四或五無或三二也謂兩個三唯一個二言長短者覆隨曰治本以經宿成覆過故摩那定六夜以其造殘情過不假日成故也本日隨前雨第四門先後者十律何以行別住為六夜故何以本曰治為折伏心故若還從本日行是事令心折伏何以出罪為戒清淨故比丘為作當令此人得從罪出故問覆治情過而吉羅先懺次罰情過出罪正治僧殘所以先治情過却方治罪答以其各就先輕後重故又若懺吉猶有殘在若先治殘即名清淨何須六夜故使不類第五門四分五十斯之三律若當重犯並治本日祇不壞本法但隨日補之就此三律四分具行覆等乃至出罪二如法罪方得出反此不成故文言如法中覆藏如法彼比丘行覆藏竟與六夜如法行六夜竟與出罪如法清淨罪得出既言行覆竟六夜竟故知具行也十五二律設覆不具滿亦容成就故十律言犯殘覆藏不行別住六夜但與出罪佛言得名出罪諸比丘犯吉羅次不行六夜行餘二法次不行別住行餘二法俱名出罪諸比丘犯吉羅若覆具行三法不覆二法得名出罪諸比丘無罪准如是文覆若不滿或容成就十律又有六人懺悔殘者彼言一上座比丘二大德多知識比丘三有比丘犯殘行別住等彼言我寧反戒以羞愧故四重病不堪胡跪此等四人佛言若一心生念從今日後更不復作是時即得清淨五有比丘外求滿二十衆中道自死六此衆不清淨外求清淨僧遇賊煞死此二人佛言若一心生念如法懺悔是清淨不墮惡道得生天上彼律子注此人者不得妄用及有僥幸罪亦不滅五分諸比丘或行別住摩那埵時阿得呵那時命過白佛為是具或命遇為破戒命過佛言皆是具戒祇律不壞本法但隨犯奪夜故彼文行別住人語比丘言我犯問言本罪中間罪答中間罪問何時犯答別住中犯問覆不覆答覆語長老先行別住已如法行但少一夜令覆者應更乞別住合行是名別乞波利共行波利共行六夜共行出罪次六夜中犯覆語言長老先別住已如法行六夜已如法行但六夜少一夜令覆者應更乞別住行已更乞六夜應合行是名別乞別行別住別乞六夜共六夜共行出罪次句行乃至出罪竟言犯問何時犯答言別住中犯問覆不覆答覆應語言先別住已如法行但少一夜六夜出罪不成就今罪更乞覆是名別乞別行別住合乞合行六夜出罪次句行乃至出罪竟言有犯何處答六夜中間犯覆乃至語言出罪不成就准此行覆要須日滿方成也又祇言或罪長非夜長如竟日犯殘知足罪向人說者是或夜長非罪長者犯一殘知覆不向人說者是三俱長者竟日犯殘知罪覆半說半應是合前二句四俱非長者犯知罪不覆心向人說是中初三兩句行別住時當少與食多與作務若故不止者當使淨人縛手腳著牀應語言若更犯者僧復重治汝是名比舍遮腳以數量犯不能行法滿故第六門者一有無分別尼無別住為遮罪續故亦可相番謂由聚而生犯令行別住由別而致犯者故不行覆二有中長短尼行半月以其女弱因行難成故三行之法則如常所說五分尼犯媒佛言聽二部僧白四與半月即具出半月羯磨已尼中順行又將一伴往比丘住處可作者作文日欲暮還尼住處此律無文但尼中行之問半月所以不同受戒作其本法方大僧作法也答受須和上故須本法屬和上尼此無斯義故半月出罪直大僧秉之次隨文解釋覆中文五第一比丘犯殘舉以啓佛文言不知云何者以見初篇不治覆過下三亦爾第二篇罪未解法式故曰不知云何佛下答言乞而行覆第二佛言聽僧已下隨病施藥第三應如是已下對衆陳情以明乞法第四衆中已下正與作法第五應列七五行折伏等法六夜亦爾但今行法總回在下覆法中明為離繁文故也下諸羯磨分齊皆同文言隨覆藏者出法之言若憶數須稱日數若不憶覆日數者乞清淨已來覆藏十律伽論從受大戒來為清淨也又復要必須言乞清淨已來百日一年二年乃至十年覆藏不得直言乞清淨已來覆藏不稱日數者不知竟之分齊故爾僧與法中亦有二法准乞而作本日治中但言重犯不舉罪種及覆不覆並以文略不盡理故又攝藥病不同故餘文及治不覆等准說可知上來略文已竟自下第二廣辨治殘文二如前判就初廣明治覆中略為三門第一斷判經文第二定文宗意第三釋文初門者就此治覆中文分十段第一至如是持多罪一得法人短長合行法第二時有比丘二僧殘二俱覆藏已下七句多罪多得法人離合共別是非相顯法第三時有比丘犯僧殘罪覆藏兩月已下七句一罪多得法人離合共別是非相顯法第四時有比丘二僧殘已下至亦如是約時緣差重不重人治舊新法第五時有行覆藏比丘中間重犯下訖不覆藏亦如是約時重犯壞不壞人治舊新法第六爾時有比丘犯僧殘知日數不知日數已下至如是出罪異種合行重壞本日人治舊新法第七若衆僧為彼出罪不如法已下訖亦如是為明成覆合治人衆僧設藥如非法第八個時有異住處已下訖是為不覆藏以人對人簡覆非覆法第九時比丘犯僧殘謂是波羅夷已下訖亦如是通約六聚廣釋憶寸三法覆不覆相設藥次第法第十異時住處已下局簡覆藏羯磨治有長短法亦名料簡有覆人治有長短法若作如此科釋文者謂此揵度略廣分二若據兩中各有覆不覆別即可二往分為四文又可長通細分十三段如略中第一謂是一罪一得法人治舊新法第二不覆已下根本無覆過重壞六夜人治舊新法第三已下十文名字如前所判即成十二第十三廣辨無覆重犯壞法人治救方此十三文中初一第三已下十段合十一分略廣治救有覆人第二第十三此之兩段略廣治救無覆人此中上下種類事別犯狀治救不過有此十三之差然十三中各自含多義不可窮言或可分文以為十二謂束前十三中初兩為一即是十二第一根本覆不覆一罪一得法人重壞治救法第二犯衆多僧殘罪已下多罪一得覆法人長短合行法第三時有比丘犯二僧殘罪已下多罪多得覆法人長短合行法第三時有比丘犯二僧殘罪已下多罪多得覆法人離合共別是非相顯法第四時有比丘犯僧殘僧罪覆藏兩月已下一罪多得覆法人離合共別是非相顯法下八名字如前所論此十二中第一文者略治有覆無覆人餘下十一廣治有覆無覆人故今若欲通科以為十三者或為十二者義亦無嫌任從一法以釋之皆合道理謂令略廣為兩或可為四或分三或十二等今者且從略廣分二以說之第二門者此十文中須為門四分別定其宗意就十文中第一為論簡覆不覆二成不成分別三壞不壞分別四通局分別初門者位可為兩第二第三四第八及九此五段文簡覆不覆治救之方自餘五文第一第五第六直是對病設藥總別治壞法第七專辨如非法第十已知是覆直是長短法此等不論覆成不成義也第二又約成不成說者亦兩第七是非等及前五簡覆不覆令此六文解其治罰成不成法如文可知自餘四文直辨設治之軌文中不舉成不成也第三壞不壞分別四五六七此之四文寄壞論之為攝多法故上三下三俱明不壞第四通局分別第七第九第十此之三文文相雖在七九與十義通餘七以其第七廣辨如非一切如非並攝其中以餘諸文或直設治或雖簡覆局是事非今此如非攝四法現前故知通餘第九廣解覆不覆相即釋一切覆不覆義以餘諸文並皆不出識不識等相別故今此廣彰明通釋餘也第十長短亦是彰前行覆長短以餘諸文但總出法隨覆藏日治不定長短然論治覆莫長短將知此文通了前義以餘七文文局事別各不相須第三隨釋中先解初文即是多罪一得法第一明覆文四如前以短從長次六夜次出罪合行三法此並如文對此須作五門分別第一約種約罪第二約時長短第三覆日等不對等第四等不等覆日各有離合分別第五示秉法之方初門者文中但言衆多殘罪不稱種之同異此十罪者或種一十罪或種二十罪或種三四五六乃至種十十罪等義實不定為對第六異種合行併列十三故說此文以為同種同名共行三法理應非局可隨前事稱之以其文無同種故爾次約罪者十罪為法或二三四五乃至過十等亦並隨事不得執文以限其心也第二門者文中且寄十夜作法以理論之始從一夜二夜乃至一年二年多年等皆同此法及不憶日數或疑或不知數等可通隨憶不憶等三門各有三句一短二長以為分齊須准第十段文治有長短中說第三門文中據覆日不等從長十日治又復先舉短日却舉長日故言或有一夜乃至十夜似如先短後長理而言之覆十夜者最先犯殘覆藏十夜第二九夜乃至第十犯者覆藏一夜此謂先長後短從先長十日治或可日有隔絶如犯一殘一夜覆已發露徑多日已復犯一殘覆二夜已發露徑多日已復犯一覆三夜乃至徑多日已犯一覆十夜此便先短後長從後十日治故祇律參差覆者月一日犯一殘知是罪作覆心徑二日向他說已復犯一乃至十日向他說已復犯一知是罪作覆心至十一日向他說是已十殘如是各一夜參差覆應作十別住等三法亦得作一別住等三法是即先後俱短合為一治明知文言一夜乃至十夜亦得先短後長也事既不定可隨事以說之又可十罪等覆謂犯十殘齊十夜覆亦復共行三法此文中無又復此等不等寄十夜以說出法之辭可隨憶不憶等三門各有三句一短二長以為分齊准第十長短中說第四門此第不第各通離合其不等者此律合治十夜別住便是治短或若積日纍舒離成五十五夜別住治覆遂長故祇律別覆者月一日犯一殘知罪覆心不向人說二日復犯一乃十日復犯一殘知罪覆心不向他說是十罪各別覆取最後罪一夜覆乃至初罪有十夜覆應與作十別住等三法亦得作一別住等三法若言十別住等三法即是一罪一得法纍日長舒以治之若言作一別住等三法者即多罪一得法斯義正當此文也祇律復有別覆月一日犯一殘知是罪覆心不向人說乃至十日犯十殘知是罪覆心不向人說是五十五殘各別覆取最後一夜覆如是乃至初罪十夜覆有五十五夜覆應與五十五別住等三法亦得作一別住等三法也亦是一罪一得法及多罪一得法祇此二文約罪別覆殊以辨說治離合義准此律十罪覆日不等就覆日卷舒以彰離合合故總為十夜一別住等三法或各纍日離故總作五十五夜一別住等三法治之次等覆離合者祇律或罪合非夜合謂犯十殘一切十夜覆僧合與百夜別住比丘言長老我羸病不堪與我略行波利婆沙不僧應語言得然此百夜合作十夜別住或夜合非罪合者犯十殘罪一切十夜覆僧合與十夜別住比丘言長老慚愧欲廣行別住廣語言得即與百夜別住或俱合者犯十十夜合與十夜別住或俱非合者十罪各各十夜別住以斯文證故知覆日等不等並有卷舒長短然此文中且舉不等合為十日一別住等三法治餘略不說行事准祇也第五門者文中出法直言犯衆多殘或一夜乃至十夜若秉法行時咸須具牒種名隨各覆日短長稱之不得專執其文還言衆多及或一夜乃至十夜之言亦有人言一罪一夜覆者第二日已去白者應除初罪三日除二以其行覆竟故也今解不爾以其總牒所乞十罪白故還須具牒白之問所以須立義門以說者顯茲揵度文約辭功理義苞富詮不盡言言不窮旨故今解者凡諸上下咸寄義門以通之述詮相所不盡申文意之屆滯匪唯廓學者之心拂遣封文局伇之見冀令思搆者深達於此方諷習者洞曉於文旨故也次釋第二多罪多得法人於中文二初至與覆藏羯磨已來離合共別當分成就所謂彰是第二汝曹善聽已下根本非覆作法不成舉非顯是前文復二初有三句當此人成但言中有餘不了義說生下三非句次有一句作法成就了教而說不生下非句問所以但四無覆不覆者解言為欲簡是覆者不覆非覆何須相對出覆不覆若爾憶非覆何以對來答乞時憶不憶並覆故來若爾乞時覆不覆示俱或覆何以不來答即是乞不乞故故但四對也初九文五一彰犯二殘罪二二俱覆藏者犯已俱覆三憶一不憶一者臨乞時對衆惶懼故亦可臨乞意謂一罪本來不憶四彼比丘隨所憶已下隨憶乞得覆法五彼比丘行覆藏時已下續憶第二犯佛言隨憶與覆此是不了說生下初句所以然者若言乞覆藏時憶一不憶不即是了教不生下非以其文中不著乞覆藏時直言憶一不憶一後隨憶第二犯佛言聽隨憶第二犯與覆藏由此言濫容有犯竟憶一不憶一亦俱從僧乞故生下非中初句次釋下二句不了濫相離合共別准說可知釋文雜竟且對憶不憶門加以義說可為五門料簡第一定此二僧殘種同異分別第二憶不憶短長分別第三約罪多少分別第四約得法重數離合分別第五對約前罪七時隨憶離合分別初門者文言犯二殘罪竟復不辨種之同異以理言之或一種兩罪或二種兩罪乃至或容對三四多罪等種或同異並隨種名事別而稱不得直言二殘也第二門者文中但言憶一不憶一隨所憶從僧乞行覆藏時隨憶第二犯佛言聽僧隨所憶罪隨覆藏日從僧乞覆藏羯磨都不定二罪成覆時之長短總言隨覆藏日以理而言斯之兩罪或可等覆俱長並短或不等覆前長後短前短後長但隨憶與覆義非一准第三門者文舉二罪為法若其廣說或三四五六乃至多罪謂或憶二三四五不憶一或憶一不憶二三四五等或憶二三四五不憶二三四五等參差交絡相當之類四句並辨得法離合俱應非妨種或同異如前所說此咸不得執文為楷故祇律初約一罪離合共別次約二罪一覆一不覆次約三罪一覆一覆一疑以辨共別等此謂先罪已外或一或二或三故知非必定二也第四門者如憶不憶雖可多罪但兩得覆法以辨離合共別頗從多罪一一隨憶或三四五六等重別別得覆共行三法以不答多亦無妨文中略舉再得為法若論別得覆法合行無問三四五六多等應亦不簡重數多少但須作法序牒周悉各各不同也以其第二續得既不礙前佛言許別得共行非妨明三四重續理復何殊故也第五門文言行覆藏時隨憶第二罪佛言聽隨憶第二罪覆藏日與覆藏即是別得覆藏共行覆藏共得六夜共行六夜出罪文以此為法次應有行覆竟憶亦隨與覆即別是得別行覆藏共得共行六夜行出罪次應六夜中憶六夜且置隨憶與覆便是別得別行覆藏別得六夜共行六夜共行出罪次應六夜竟憶謂別得別行覆別得別行六夜共行出次出罪竟即是別得別行覆藏六夜出罪等文中行覆藏時略舉一偶以爾之故祇律言本罪者覆藏乞別住已語比丘言長老我更有僧殘問言本罪中間罪答本罪復問覆不覆答覆語言長老先別住者已如法行今所論覆者當更乞別住已兩罪合行是名別乞波利婆沙共行婆利婆沙共行摩那埵共行阿得呵那次索別住行半更言本罪作法別共如上次行別住竟亦如是次乞六夜已亦如是次六夜行半中間語言先波利婆沙六夜已如法行今所覆者更乞波利婆沙行竟更乞六夜二罪合行是名別得別行別住別乞六夜共行六夜共行出罪以六夜竟亦如是次行乃至出罪竟復言有犯乃至應語言先波利婆沙六夜出罪已如法行今覆者更別乞別行三法等次乞別住已言有二罪一覆一不覆應語言不覆者停覆者別乞別住等乃至出罪竟次乞別住已言有三罪一覆一不覆一疑應語言不覆者停疑者當決了覆者乞別住合行等乃至出罪竟亦爾此兩位七時共別同前說准約彼文七時憶犯以彰共別離合此律文勢雖可略舉行時理亦無殊莫非咸是多罪多得法離合共別行事須知不得專執也亦可約自律辨如前四時或准祇說七時隨憶一門既爾次二疑不疑識不識准知第四了教之文說一覆一者唯有一人不得更有第二人以言乞覆藏時覆藏一罪說一罪者隨僧乞知明根本二俱覆以無根本乞故不得有根本乞一不乞一以生下之非濫又復以其故心隱犯是故文言慚愧心生上憶等三句心迷謬故不言慚愧五分犯二僧殘同覆一夜向僧說一覆一與別住一夜行別住竟心生悔言我實犯二云何說一白佛言更與一夜別住此即約竟方乞第二犯謂是別乞別行別住下六夜出罪二法應共但文略不說此第四門亦須五門通之准前而說也不勞更列次不成中三句如文憶中文五第一彰犯二罪執相似文迷心乞法第二僧與彼二罪已下僧同謬執故俱與覆第三行覆藏時已下客三藏師因白檢問第四舊比丘言已下答前乞法及與行覆之狀第五彼客比丘言已下判非結犯教僧正軌也初犯二罪俱覆藏者約情說即犯日作隱心徑宿俱無發露法故曰二俱覆藏言憶不憶一者就理說謂即犯日後時一忘不忘故雖同徑宿憶者成覆不憶者非覆故言憶一不憶一問文中但言憶一不憶一所以得知犯竟憶一不憶一答二義故知一以其二俱從僧乞若乞時不憶一如何得言二俱從僧乞二以容呵不憶者不成覆故次彼比丘已下初執相似文迷情乞法問執相云何耶答以上文中佛言聽與彼比丘隨憶第二犯與覆藏羯磨前憶一不憶一後乞得俱與覆藏我今亦是憶一不憶一隨憶第二犯不異何為不得是故二俱從僧乞第二僧同謬見故二俱與覆第三問中有二先問其犯故言此比丘何所犯此問含二謂問犯何罪成覆不成覆次問何故行覆藏者謂問乞與及行此問含三謂言云何乞云何與云何行耶第四答中初至不憶一罪答酬初問二二俱從僧已下答第二問第五判不成中四一判言不成二何以故已下釋其所以謂本不憶故問不憶者可爾一憶者為成以不答二俱不成以文句增減故若爾所以言憶者善答此謂設藥當病名應故善非謂成就故善若此成者如一白處作二白初句應成不名非也故今亦爾三結犯四示僧作法也釋文雖爾須以五門分別一者約種分別二約時長短三約罪多少四約得法重數多小五隨憶七時分別初門者文中聖者假出法言汝曹善聽犯二殘罪不列種之同異以理言之或種一兩罪或兩種二罪可隨種十三稱之並得生非也第二門文中但言憶者與覆藏者善不憶不善不知善者憶時長短然長短之式不過憶不憶等三門如治法長短中說可隨長短與覆者善非覆與覆者不善第三門者文約兩罪對前成中兩罪故今辨非還寄二罪以出非若以理說乃至三四五六等論之亦得辨非如似憶不憶二三四五六七或憶二三四五六七不憶一或憶二三四五六七不憶二三四五六七並亦非法不得執文唯局兩罪或若多罪即言無文者不然第四門文言隨憶不憶二俱從僧乞衆僧二俱與者此約一得法以辨非若乞憶者得法已方憶第二後與法者可不成非法豈獨一時得法佛判言非前後與法即不成非法耶縱二三四五等隨憶隨與覆者皆非此謂反前如中重得者今非中亦爾重以生非也第五門者直約乞時隨憶文中是共得法或乞已別得法者此亦成非法若行時已下六時隨憶續乞續與等者並成非法不得局文唯言乞時隨憶也但第四門中依文共乞共得法者兩俱不成以增減故設成覆者作法不成若或別乞別得法者後不憶者自不成就前憶而別得法者成乃至行時已後隨憶隨得法者自不得成就前所憶者皆成以其憶者得法無增減故次疑不疑識不識准說可知下一罪多得法三非之中憶不憶門義准此說小小同異思而可解不能煩筆也第三一罪多得法中七句分二初對根本成覆徑於兩月以明四句二佛告已下本復一月不覆一月以辨三非前四句中三句成覆有餘濫故生下三非第四成覆了教無濫先對初句處分文相准可知然須五門料簡一約種分別二約時長短分別三憶不憶五有長短四約法重數多少五約前憶罪七時隨憶分別初門者文中直言犯殘略不舉種理而言之種該十三也第二門者文以兩月為法類餘三四五六乃至多月及二年多年及以減等不問多小並同此法五分但約二日論之第三門者如文中說憶與不憶各對一月為法然互短長或憶長不憶短或不憶長憶短等交絡相望不勞一均第四門者文彰一罪再得覆法共行下兩以治情過隨時短長故又無相染妨故以義而言或可三四五六七八憶乃至多隨憶皆同事並非妨以後續得與前續無殊故若三四得法即謂不成第二續得何獨成耶即是一罪多得法離合共別也第五門者文舉行覆藏時廣說乃至七時時中隨憶隨與覆治莫非一罪多得覆法離合共別但前三時隨別與覆行或共別六夜出罪定共乞共與共行等若下四時隨憶覆之一法定是別得別行者若六夜出罪定一切共以前六夜出罪二法竟方憶一月者前亦不成以覆未竟故要須更行六夜出罪故如祇律不同多罪離合共別通於七時也具辨應爾但此文中略舉一隅也疑識等三並約義門准前以說次舉非三句此前不成類而說之又此等三皆須先不憶疑不識一月後憶不疑識一月隨行此不憶等反憶不疑及識一月也言憶一月不憶一月中憶一月與覆藏者善謂藥病相稱故不憶者不善謂無病浪設藥故第四緣差重不重人文三初雙覆雙發露第二隻覆隻發露第三明其二續等初段雙中但有四句前後道分作隱過之心有冒涉之𠎝成覆須治中間還俗無其冒涉覆不成覆故不須治准下隻覆從覆不覆乃至乞不乞各作四句便有二十句初句雖同對下三異得作多句此是覆藏前二十句如是五時各作二十故有百句乃至八種緣差各百合八百問如何初句雖同對下三異答如覆不覆乃至乞不乞此五四句各初句同各下三異謂五個初句前後道分俱同此是頭同謂五個第二前同後異謂五個第三前異後同謂五個第四前後但異異故成多是即成覆一向同非覆一向異所以爾者以憶不憶從覆中來今忘故非覆寧得同發露疑不疑者憶中以辨猶豫不成覆非忘寧得同不憶識不識者不疑中辨不識故不成覆非猶豫何得同於疑乞不乞者就識以明乞是發露無隱過故體是其識寧得同不以識下三異得成二十乃至一百前二十句二罪得下八十句義須三罪下七緣差各百亦爾或若執文局二罪辨義者對於八人各作行前二十句合成一百六十句今以文略故四句也問何以唯言雙等而不言三覆四五覆等答如所責實得非妨乃可罪數雖多約前後道分治法無殊故不論之問所以不約一罪以釋答就二罪者為與覆作根本故五分似就一罪論之第二雙覆之中八種緣差人各為百句第一罷道形差自有五位一覆藏前二行覆時三行覆竟四行六夜時五六夜竟位各二十句故合有百句先就行前後有五對初覆不覆四句如文隨治前後說之但文言先發露後成覆者昔言心念發露後覆成覆者不然理准說或坐上恐成丙衆故開心念若對餘時無心念之處故也今若正解或有對人或對衆二種發露覆還成覆以第五四句乞不乞文中亦言治後不治前故此義決爾不勞致或也次憶不憶門次疑不疑門次識不識門次乞不乞門各有四句總為二十句釋文可知問所以不言覆一不識二三四等或覆二三四等不覆一或覆二三四等不覆二三四五等耶答皆得不妨以其難可約罪多少差互及以俱多苦若對前後道分治法無異故亦不須此等文也又對此文解其五對簡覆方法前義中釋訖或講者對此文解義亦無嫌釋文雖竟須以二門料簡第一初五同異第二解發露覆藏兩對八句憶疑等三但一四句初門者問第五乞覆藏時發露一罪覆藏一罪與初四句發露覆藏有何別相答相有二第一時異初四者本覆今第五四者乞時覆不覆第二法體有異若據五對是覆同邊全不得五分今此五對者乃以非覆異故謂不覆乃至乞等差別者是也中三異相義顯可知然初五須別者初句云發露一者或對一人二人三人僧發露第五乞者謂從僧乞覆藏之法既法體不同明是時異有斯二別得者為兩個四句問若言時異者至下八十中已是行時何須更有乞覆藏時既同是行時並是覆一發一但有十六何故亦亦有二十句耶答此據了罪相望以辨乞不乞不望所行故爾若唯取前乞至行覆中言不須乞更不對新罪說者其義即局攝法不周但寄此五時以彰事別此八百句即八百人別終不得以所乞之罪傍說下時說也又昔解彼發露一者謂隨僧乞覆法覆藏一者謂不隨僧乞罷道後二俱不乞先所乞者後難不乞不成覆過從前乞已來不須計曰治之未乞已前隱覆須治今言隨後治者謂治未乞已前情過行覆在後故下句類爾此解有妨所以爾者如准覆不覆四句初句先發露者隨後覆曰治後今乃治前第二句發露者前後俱不治今亦知前第三句先覆治前先發治後今俱治前第四句一罪治前一罪不治今並治前有斯別狀即此第五四句與前十六治法不等何以文言亦如是故今正解兩種發露對人對衆緣差已後覆還成覆以其文亦如是故但今乞要須但舉乞覆藏時已下等言以成雙覆雙發決定得更加九字若增九字文者即雙覆故既不得加文與前了教雙隻有殊行不行別明前了教本不同此何因謬稱此乞不乞即了教文也第四了教亦既不來憶等之言如徵責此無乞時憶不憶等故知四句并異於此不得妄稱異同浪相比決但知雙行覆者前文中義別有乞一而未行覆一不乞覆約緣差前後論者此文中攝明四五對並是隻覆隻發露也求理行者細檢二文其相自顯若爾言乞一者乞前之覆豈不須治而言不得加九字耶答乞前覆者明并須治乃可作法之時通計乞前覆日長短治之今彰乞後隻覆隻發若即現論乞前覆者便成雙發覆故不須辨是以此文但言乞覆藏時覆一發一者正合道理豈經文錯耶若言了義即此文是須加九字言者反成錯說問餘文並無覆不覆門此獨有者何答此不覆者以緣差後還成覆過故不類餘也自下諸二十句例須以此二門通之上來行前二十句竟次下四時有八十句先以二門料簡第一二罪三罪分別第二定覆發之罪舊新分別初門者上二十句人未被治罪未得法兩罪足今八十句人則被治罪有得法未得法者要須三罪作之者好若兩罪者第二第四句亦好謂且約行覆時二十句中初四句第二第四以辨其妨此是破他昔義故作是言其昔解者如初覆不覆四句若但二罪者二四句好初三句妨妨者初句覆一不覆一後俱覆一罪治前後明非行覆者一罪先發後覆亦非行覆者以行覆者覆不成覆故知一罪已得法行名行發後覆亦非行覆者以行覆者覆不成覆故知一罪已得法行若行覆時覆有二罪覆一發一故合須三若當兩罪明知是妨次第三句妨同此說言二四得者第二句覆一發一罷道後一罪先覆後覆治前後明非行覆者一罪先後俱發露俱發露者先後俱不治此即是所行之罪以無覆義同故即以行者為發露一配前後俱覆一故言兩罪得第四句得同此說也若爾如望覆乞二門容以彼不覆及乞者即是所行之罪如不憶疑不識等皆不成覆豈得義同所行即以此行者替之以者不憶一疑一不識一等故知此義擁而不通是以今解非但初三妨二四亦妨故此八十齊須三罪也非謂以行覆六夜第二第四妨若二行既妨二竟之言對何辨竟故亦是妨此定謬說第二門者問下四時中覆一發一者為舊新答此謂四時中重更犯新為彰此新成覆不成覆須治不須治故爾問此何所疑者以行法中奪三十五事應無冒涉豈可成覆耶答以其一有隱覆情過二來或捨行法非無冒涉理亦合治故須此文治前治後也是故舊人言此覆一發一者是非根本犯亦非本日治直明犯新成覆不成覆須治不須治若壞本法者生下二續作本日治也或不犯新無壞本者生下文中二續行也諸下八十類須以此二門通之此第一緣差竟下七類爾第三以明續故但約四時以辨八人各五義應有六以文本日治含故五中初與第四續行餘三續作謂乘接前日行故名續行更假作法者稱為續作五八四十此等皆謂接前行作雖有緣差不壞前法不須發始為遣此疑須明斯法除本日治壞覆法者須發首行之五分八時一新別住二本別住三新六夜四本六夜五新別住竟六本別住竟七新六夜竟八本六夜竟此約壞法以辨緣四行四竟故八四行是續行四竟是續作八人各爾合六十四第五重犯壞不壞人治救方法者既言壞法還約四時二行兩竟先就行覆時准下治根本不覆中位應三人一知日數覆藏二不知日數覆藏三知日數覆藏此三皆是根本得覆法行文中但言時有行覆藏比丘明知義通三人且對初人行中重犯復有三人一重犯覆藏二人重犯不覆藏三重犯覆不覆對重犯覆藏中位復三人一重犯數知作四番羯磨一新犯與覆藏治二與舊罪本日治如此中律文及以五分新舊決須別與然五分似亦別行如彼文言彼比丘六夜行竟應復更從僧乞本應摩那埵據此律文別與羯磨應得合行祇律無壞法義但乞新罪覆已與本罪合行也三兩罪摩那埵四兩罪出罪此文中略辨竟次重犯不知數覆作四番羯磨次重犯知數不知數覆作四如初故使合有十二番也下異種合行及如非中出法家語新舊罪合作一者以治覆同故亦可異種合行中十三多小並得合治今新舊類同合亦無妨據此律辨似如合離俱得雖有斯義今存前解第二重犯不覆中但作九初重犯知數不覆作三次不知數不覆作三次知數不知數不覆作三第三重犯覆不覆作十二初一知數覆不覆作四次不知數覆不覆作四次知數不知數覆不覆作此四子罪三頭合有三十三對餘兩頭亦各有三十三合成九十九番羯磨若作舊新罪合解者但八十一今存前釋總收始終有二十七人此據行覆中起犯既爾下三時中犯新亦然又復此四時非但位局罪各不通謂出起犯之所如但於行覆重犯二十七人並治舊新各窮出罪不於餘時中重犯或有覆竟中重犯亦不通餘當分治救亦窮出罪餘二時亦然故使當分咸具覆等三法此對一重犯說若各第二重犯即行覆等四位各倍二十七人故下文第二重犯亦如是乃至三四五等可知又復四時二十七人若以得法四頭來乘之即是十六個二十七人若第重犯等類知以說具辨應然但今文中略總舉故直言行覆藏比丘新犯唯有覆藏三人餘皆不說又犯罪不覆藏等文者應是錯來不煩多釋次辨覆藏竟亦如是第二時次行摩那埵比丘下至亦如是第三時次行摩那埵竟下第四時等廣說如前此約時重犯中總計具法多小者且舉一罪一得法三頭若二行中犯二十七人並有九十九番羯磨若二竟中犯並七十二番以少二十七個本日治不壞二竟法故也餘三得法數亦同然第六異種合行中文四初與覆法二與本日治三摩那埵四出罪前三廣列法末一略舉覆中四如前初犯白佛中不覆藏者謂緣著後還成覆故等不等覆者曰長短故一名者同僧殘故多種者謂十三之別自性非自性者謂十性三遮故住別異者謂種類有四氣分不同故言住別異也次本日治中兩番同是本日治故合以為一次六夜次出罪可知但上下諸文一事各各設藥治救即了乃可列法廣略為終不得至此方謬稱言舉第二段病將初十文治之名為藥病相對者義全不然所以爾者如初文中病第二文中藥欲將何用直言互顯者此無義語也對此須為五門分別第一約種第二重壞多少第三約時重壞多少第四約人多少第五示僧作法之軌初門者文中出法併列十三種別合治以此為法欲彰藥妙但能立心厭惡稱教具緣不簡多少總別俱殄譬如霜露見陽即晞故此亦爾以理推之未必要然或五六七八等並悉不妨但隨前事多少稱之問既隨多少所以併舉者答以前諸文或一二多離合共別收法周故須總列以彰攝治盡故第二門者文彰第二重犯壞本日法治者以前文本日未論重壞或若本日治中犯新重壞治救如何佛言聽更與本日治謂此不同學悔壞根本故彼無量與問所以不言第三重壞者答初犯是根本壞前故須明本日治若不言第二重犯者謂更重壞不得更與本日治故言第二重犯若或第三第四等者既聽重治理亦無異故不須更說第三門者文中但約覆中重壞如下三時第二重犯新罪亦得重與本日治不答計理而言二行兩竟隨於四時並有犯之義於四時中儻壞本日重治亦得如上約四時壞中法及緣差中並約四時以彰重犯故知第二重壞亦通四時以明重犯但於二行壞本日治若其二竟唯須新犯一重本日治以無壞於二竟法故文據出法且約覆時壞以說之不得執之局義第四門人多少者略為五重多少第一據出法中言但舉新犯知數覆藏一人為法第二次准如非辨者總舉十三對新犯知數不知數等三各覆不覆等三俱帶三非即是九人第三若以知數等三頭往分此九即應二十七人第四又以得法四頭乘之即成四個二十七人第五以此四傍該約於四時各有重壞即是十六個二十七人此十六個二十七人皆有第二重壞第五門文中總舉異種合行故言等覆不等覆覆藏不覆藏乃至住別異等若行法者並須具顯種名覆等長短短從長等隨僧乞若干日覆法等方得成就反此則不成謂乃至住別異等已上文者行事須除僧與及行白等一准於此第七成覆合治人衆僧設藥如非法所以須此文者前專約罪簡是覆合治無覆非法今此所明雖可是覆設藥若非病亦不遣須辨如非謂約僧界法等說也於中文二初至亦如是舉非合識第二是中有比丘已下顯是勸知就前非中應列本罪三頭但今還寄異種合行為法即合多義為彰攝非盡故今且依文中間重犯三頭一重犯知日數九二不知數九三知日數不知數九初九中復有三頭一知數覆二知日數不覆三知日數覆不覆就覆藏中三句初三法俱非二覆如下二非三覆如六夜如出罪非初言三非者先明覆非文有三番先列根本罪非次彼行覆藏中間重犯已下列一重犯覆本日治次彼比丘行覆時中間第二重犯已下舉第二重犯覆本日治此雖有三合是覆藏非次覆如下二非次覆如六夜如出罪非比說可知問但言非法是何等非耶答不離前文兩個七非故縱有時節長短不稱總是事非故問非中何以無覆非下二亦如等答後非不廢前如後如必無前非以牒前起後故第二三句第三三句亦如是合是初九第二不知數九第三知數不知數九可知若以三頭即二十七句合八十一非第二如中有九初知數次不知數於不知數各三故九知數三者初子犯覆三如次覆不覆三如次覆不覆三如初三如者謂覆及六夜出罪如文中還舉異種合行本覆及二本日合是覆藏如也次兩個三亦爾合為九句若以三頭往說亦有二十七句即二十七如也又若句望句一句反一句以如反非一如反三非即是九句反九句如反二十七非若以三頭說者二十七句反二十七句二十七如反八十一非但今文略也若以得法四頭往乘之即成四個二十七如反四個八十一非文中略爾第八以人治不治法者上來就罪及藥以明應否未對人辨今以二人辨治不治是中四向二人俱覆見異比丘便覆藏者謂見清淨比丘慚者覆此俱成覆然有治不治次下三句對人料簡一人憶而無疑徑夜故是以成覆一人當日即不憶疑雖同無發露以無隱心故不成覆次疑不疑可知次知不知者即是識不識也所以但三者以對二人情有迷了故以餘二對不約心故是以但三第九中以理而言憶疑亦應辨別略對第三知不知說向言不知不成覆者如何不知故解不知不知者猶是迷相之異名是中正簡僧殘有六殘謂餘六故除夷可知兼辨餘五各六六六三十六也前言知故成覆如何是知故次時有犯僧殘下解知而成覆之狀通論故六設藥次第者謂先懺覆吉後為羯磨乃至惡說先悔覆後念除吉第十局簡覆羯磨長短者以隨日故覆本日治亦同覆說文中分二初同名同種罪辨覆長短二彼或憶一罪已下對同名異種罪辨覆長短初同名種文有三句憶中前二以不憶日數故與清淨已來覆是名治長第三數日故治短次二亦爾祇律四句一憶罪不憶夜二憶夜不憶罪三俱憶四俱不憶初句第四治長第二第三治短此律三句者略此中已成覆竟直彰長短故有此三覆乞二門唯簡罪體不得就之以辨長短故闕不論次同名異種亦三類知上來且明治有覆殘廣前略中初四竟自下第二治先無覆殘廣前略中後三是中根本有三人一知數不覆藏二不知數不覆藏三知數不知數不覆藏各作六句初根本中重犯有三一知數覆二不知數覆三知數不知數覆各作二種羯磨初知數覆中分二初至與此比丘摩那埵本日治明新舊摩那埵二行摩那埵本日治已已下俱與出罪初文有二第一至更行摩那埵明根本摩那埵以其即得法日重犯但壞前法未有日可奪故但並牒舊新與摩那埵二若行一夜已下以本摩那埵曾徑宿已有本日治義新犯摩那埵舊罪本日治此文即是新舊不合第二次與出罪合行二法問新罪覆者何不治覆答此言覆者隱不發露以不徑宿故不言治覆若爾何故文言一夜乃至六夜答此言中間謂六日中間起犯故各不徑夜若徑夜者故宜治覆此六夜行中犯新成覆者如隻覆中說第二重犯不知數覆亦行二法第三知數不知數覆亦二如前合是初六第二本犯不知數不覆亦六第三知數不數不覆亦六故並言亦如是若以中間覆不覆亦各三六文略准上覆文應有如非亦略覆藏犍度第十三前既得法若不順行因行不成寧能滅除往業是以次明奪三十五事卑心軟意折伏真高故所以來從後彰名應名摩那埵揵度今就初受稱故曰覆藏五分名別住法十律順行法也於中文三初訖亦如是正明四種人不得更互作法足數第二彼行覆藏者已下覆藏行法進否之式第三佛言聽行摩那埵比丘已下六夜行法初文有二初至出罪有十六句明四種人自過未除不得亦為秉法第二彼行覆藏者已下有十六句四種人不亦足數秉法中分四一自行覆二自行本日治三自行摩那埵四自行出罪各互秉四句故成十六次足數中亦有十六比說可知正以自己有縛兼在行法不能緣生物善解於他縛故制不聽更互足數不得別之別則犯別以斯義故四僧中明不足數以其非是壞根本故彼文不列覆藏行法文三第一至不應爾奪其七五行折伏法第二彼行覆藏者共清淨比丘已下至佛言得受謂恭敬隨順法第三彼行覆藏者不白已下白等八事發露悔法三十五事前已略解第二恭敬中文初制敬上第二彼行覆藏者念言我曹已下開受同類及餘衆等共相致敬執事供給前恭敬給事中文二初恭敬給事已在未行第二衆僧衣物者聽隨次第取五分別住比丘有三最下最大比丘下行與最下臥具最下房舍有三事隨本次謂得施物時自恣時行鉢時十誦若僧差會滿鉢水受雨衣自恣此等並隨上坐次第受應與最下房舍下臥具卑下坐處等發露文三初制白法第二若大衆難集聽白停事法若欲料簡六門分別一定捨緣二捨辭句三捨境多少四停時長短五重捨得否六捨及行處初門者為何等緣得停事耶答此律云若大衆難集若不欲行若行人軟弱多有差愧應白停之十律云行別住人六夜人若有緣不及行佛言應停五分云別住比丘欲遠行白佛佛言應捨竟去見論若行別住人若有人請或與人受戒得停行法復還續行准如是文事亦不定住隨一緣若行事須依此律儻依餘文義亦不爽第二門捨辭句者五分佛言應捨竟去應作如是捨向一如法比丘言大德聽我今捨別住法復更行之如是三說若不捨而去路上見比丘應自說別住若捨別住到餘處應求彼僧更行別住彼僧應聽行若不聽者突吉見論云捨行法者當作如是言我今捨波利婆沙如是三說此律云應至清淨比丘所白言大德上坐我今捨教勑不作若欲作時應至清淨比丘所白言我今隨所教勑當作若欲行事須依自律設用餘文義亦應成也第三門捨境多少者五分云應向一如法比丘所捨行法已然後行故知一人二人三人等亦得不必要須對僧捨之又復見論留一人對捨已入界明一人捨成第四長短者十律憂波問行別住人六夜人若有緣不及行是事應捨聽幾夜佛言應聽二十五應餘文不論設若過減乃至當日捨當日還行等並應不越道理第五門為但得一捨為隨有緣便隨捨耶答文雖不論若隨緣便捨理亦不妨別住等法一切聽續豈況行中數捨數行何容不得如見論云將四人出界外行已捨而入界至明相欲出復與四人出赴彼徑明相已白行已留一人少時復捨已入界如是滿六夜竟得出罪准如此理豈可不是重捨重行第六門捨行處者此處捨還此處行或餘處行或餘處捨餘處行此處行並皆不妨但續計日滿故五分云若捨別住到餘處求彼僧更行別住彼僧應聽行若不聽行者吉羅故知捨已不必要須本處行之第三彼行覆藏者至餘處下明失宿差別文三初至吉羅先明舉過二有八事已下正彰失宿之損三佛聽半月半月下復重舉發露白法凡論行法祇律行別住人得法竟欲於此僧中行者即日應白僧言大德僧聽乃至言我今合行別住法僧憶念持三說白言我隨行七事此人應憶數滿竟應白僧言大德僧聽等乃至我已行十夜別住竟僧憶念持三說六夜亦爾此律直有行時白等無向二法行事須知依彼文者善就八事三門分別一定其治意第二隨事辨釋定其廣略第三對前七五壞不壞殊失不失異言治意六七二事悔法須然餘之六事是發露法故舊人名為白等八事發露悔法悔法不得同宿者遮違治法以違別住名故又制別宿令思愆改過故七言不得無比丘處者遮其專任令行調伏若更無人何所敬給又復對誰行三最下四次第等又與僧殘名乖謂受三品上中下僧等殘房舍臥具名為僧殘若犯此罪須行此殘獨即非殘故是以二事是其悔法言餘六發露者反前覆冒故亦可前六七二反冒餘六反覆第二隨事解者文三謂舉釋結若未白已前無宿可失要須白行行後方有宿可失既是治過不治罪但一白便罷不須日日白不同六夜過犯兩兼須日日白一往餘寺不白謂不白餘寺僧失此一夜不得入數二客比丘來謂來此處若白客時不須更集主人以是發露白故問先此界人或界外客數來往者更不須白不答不須白以彼已知故不同布薩白舊僧者須發露故有緣出界不白者謂不白二界中間道路上僧是以五分於路上見比丘須白故也寺內徐行者不白寺內簡寺外徐行簡疾行者謂徑過此界故病不遣信白十律行別住人布薩時應入僧中三白說罪若病應遣使到僧中白言其別住人病不得來僧當知第八半月時白可知若廣略分別三五二略病略已說路上略去五分不捨行法於路上見比丘廣說別住白衣見言此比丘有何罪而悔過佛言路上不應廣說但言大德我某甲比丘別住法已若干日餘若干日大德憶持也餘四廣白第三對七五料簡者七五中重於此更犯本事若相似全壞本法餘但有罪非正相反不壞本法復不失夜今此八事輕故不壞本法但違懺儀故失宿得罪問若一日併犯八事為併失八夜唯失一夜耶答初違一事即失此一夜後更重犯無夜可失但可得罪雖犯多事不得併奪八夜以其同日故若八日犯八一一失無夜第三六夜法初至如上諸事舉同如前謂前三法及白停事法含在其中二行摩那埵者已下顯異於後過犯兩兼故三應如是白下爾一不同之法此白非八事之限此據本無覆人六夜白辭若行覆竟人六夜白者須牒行覆等白之見論若行六夜寺中多有比丘來去難白者聽晝日捨行法明相未出前應將四比丘出界自行竟若還者應留一比丘明相出捨行法竟共還入寺如是滿六夜竟得出罪尼行半月法要在二部中行之五分具出尼羯磨法遮楗度第十四若內壞慚耻隨僧乞法順行七五悔除愆犯者應於淨法不須遮舉若情無愧者不肯悔過行有違失不應淨法事須遮舉令悔清淨是以須明遮之儀式廣辨遮法如非之相集在一處故曰遮楗度於中文二初至不應爾舉前自恣緣非法舉罪以作遮緣第二佛言聽布薩時已下正制遮法前文有四一以其聖教更相受語便舉無罪佛制求聽二六群使惡求聽制須五德三時六群已下明具五應受四時六群已下聽立要自言二制遮中文二初雖可對衆還舉清淨重非法舉佛制不應第二汝曹已下廣辨遮之如非為使識非令棄曉是遵修故自下文二初至便可隨時正辨遮法如非第二異住處布薩時已下正行遮法前文有三第一至是為十如法辨遮法用如非之相第二若比丘欲舉他內有五法已下辨呵責慰喻是非兩人第三遮說戒比丘至上坐前已下正能秉五法慰喻可責之人佛教檢問求聽之法如非文二初相對合列如非各有十門二何等一非法已下依名次釋釋中九非門若作者謂實犯若不犯若作不作者謂合舉二事破戒破見破威儀各作此三合有九句若無根遮此九即如言十非法者一非夷二不入夷說中三非捨戒四不入捨或四不入捨或說中五隨如法僧要六如法僧要不違逆七不入違逆說中八破戒無見聞等九破見十破威儀以無三根故此之十事以不應遮名十非法如法者一犯夷二入夷說中三捨或四入捨或說中五不隨如法僧要六如法僧呵說七入呵說法中八九十謂破戒破見破威儀等各有三根此等十事體非合遮故言十如如中第五及後三少入說中者略且以十門說之所言入說者謂舉至僧未及處斷八難事起名為入說第八破戒謂犯殘事不同初句第二慰喻呵責七個五德分二初之二五立如非章門釋十如十非初五法具德舉他能生善滅惡成上十如法言五者謂無非具人及衆滿故名時實犯有根名真實欲令此人離罪得善名流布名利益軟言安慰名𣽈軟善心愍彼名慈心第二五何以故下即彰不具德者不能生善滅惡之過釋須具德意成上十非不具五德反前已說可知下五五門釋前如非二門初有三五慰喻呵責先釋非法於中前之二五慰喻所舉初彼餘比丘已下勸除瞋恨對剛強惡人故二若比丘被他不實舉已下勸勿愁憂對善濡人故第二彼不實舉他者已下呵責能舉先彰不具五德以呵二何以故已下釋呵所以第二次下二五呵責讚美釋第一如法初五呵責所舉先呵次如法治二真實舉他者已下讚美能舉以具德故二何以故已下釋讚美意第三文者初緣求聽但求所舉人聽今者通令求僧聽許以拘睒彌中無其善伴僧衆不和故致成乖破為是雖得舉人聽若不得上中下坐聽人及善伴授護恐成破僧故須此求明法周具要依斯理方成舉罪第二正遮文四初至不應此日說戒所遮之事不出罪諍第二佛言聽說戒時遮已下遮法時節第三若遮說或比丘已下治能遮所虗實之義第四爾時異住處已下却遮方法第二文二初辨成不成二若五種說戒已下遮之時節成不成中一就人辨二汝曹善聽已下約犯根有無明成不成先出法有六句一作三不作五作不作此三以無根即不成二作四不作六作不作有根故成第二無根有餘已下有二六句舉七聚事對前法六句解成不成初六對殘下六聚故言有餘一作二不作三作不作此三無根故不成即前法中初三五次一作二不作三作不作有根故成即前法中二四六是故文言無根有餘作不作亦如是文言無餘者或夷罪等是亦為一六辨成不成准前而說故言無根無餘作不作亦如是時節可知第三文二一治能遮人謗罪於中中四一撿三乘淨穢二事之虗實三三根有無四不能答已下治謗罪第二若遮說戒比丘能答已下治所遮實罪第四却遮方法分二一對病不病辨却文亦三句二有異住處已下為鬪諍故減却說戒先減作若二三布薩等若不能已下對事進不可為二却更不得第三恐濫自恣故依此書寫功願於命終時得見彌勒佛無邊功德身正德元辛卯年林鐘仲五日書寫終沙彌照南
