body:
  text: 使尼浣故衣戒第五所以制者上尊使下事煩而數下情敬上裁抑是難多不籌量有容無容總廢業損處不輕喜生染患招及世譏如前無異故所以制問浣染打等所以合制者何答一使尼處同二俱由故衣三容一衣相由致犯垢汗須浣失色即染申舒故打別緣有六一是比丘尼二非親里三是故衣四使浣染打多論若使書印信吉羅祇有四句自與使受等二互二俱浣等並犯此中文無五無緣故下開文若病浣染打若借他衣浣染打不犯除此等緣故六浣染打竟問所以不制使尼勳鉢者解云故衣生患如緣起說又浣染義易尼多間解數故犯制鉢無生患又勳治事難尼多不間希故不制滿足戒本五句一人二非親里尼三所浣故衣四使浣染打五結罪上三別解四五合釋准其八業應有八句初三提合一句次二提一吉作三句應有三句一提二吉為三文略次有一句三吉下二衆者非是弟子使希故輕又非具戒不廢正修多論下二同尼犯提新衣浣希又無染患故亦輕罪從非親里居士乞衣戒第六凡出家人宜應知足今三衣具備長道緣充方廣乞求增貪惱物招致譏過損壞不輕故所以制多論云一令佛法增上故二為止諍訟故三為滅前人不善心故四為令衆生於佛法中生信樂故別緣有六一三衣具足二無因緣三非親里居士四為己乞應量衣五彼與六領受入手犯緣又有二初至脫衣與跋難陀起過二語言已下呵嘖文言辨才智慧善能說法偏解修多羅中布施福德果報之義故言智慧下奪衣中不達毗尼行教重輕故曰廢無所知戒本文三一略制戒本二牒制隨開文二一除親里二除四緣三滿足戒本五句一人二非親里居士三乞衣四除開緣五結犯餘時者已下誦前第四句下解中但解四句略不釋餘緣過知足受衣戒第七所以制不聽過知足取衣者出家之人遇四因緣失奪三衣篤信聞之竭貧以施理應稱施而受彰己內有廉節之心外不惱物今三衣已足過分更受內長貪結外乖施心殊所不應是故聖制別緣有六一比丘失奪三衣二非親里居士三為失故施若不為失隨時受取無罪四知為失故施五過知足取應量衣六領受入手犯問衣有過知足罪何不制過知足取鉢答衣有三領失則多少不定失一受二犯乃至失三受四亦又復人多過受故須聖制鉢唯有一失受一本未有過何須聖制又復鉢無多用過受義希故不制過受文言取與六群等者前戒先自無所違故為他不犯今此施主為失定足而更受轉為餘人亦乖本情為他亦犯問既為餘人有何可捨答此是制緣為他尚過況當自為如論正理要自受方捨戒本六句一犯人二遇四因緣此謂施衣緣三非親里居士施衣人四自恣請下為失故施五是比丘下教知足受六若過下過受結犯六中第二略而不解第一第三文顯衣者已下合解四五若比丘下釋第六句就合解四五二中文二中文二初解衣字第二合釋文四一明應取不應取謂失二不應受三衣都失應知足受第二知足有二種不下足分齊出前應知足受一舉數二列名三解釋在家人知足者隨白衣所與衣受之者謂白衣為失故施本為不足若未足受者謂失三受三隨他白衣無施之心即是知足然此知足順在家人故曰在家人知足也言出家人知足者三衣謂本失三亦是不足今還受三即是知足然此知足順出家之軌故曰三衣也此謂失三受順二知足第三若居士自恣請已下開聽增取以衣細薄為成三衣故亦非過受第四若有餘殘下不為失故施得隨受若比丘下釋第六句過受結犯失一失二乃至失三受四此等並是足而更受違二知足故名過知足受勸讚一居士增衣價戒第八篤信居士樹心捨施價限已定理宜隨施而受不虧道法今反嫌少過分更索長己貪求壞彼信敬是故聖制別緣有六一非親居士虗心辨衣價二情斯限定三知施心有限四嫌少勸增五彼為增價增縷六領受即犯問所以衣有勸增鉢無者何答衣資義寬人喜勸增故須制戒鉢唯一用勸增義希是故不制若爾何以乞鉢同於乞衣答理實鉢無多用然令乞一損惱非輕是故犯捨此中勸增非全得一又無多用故所以爾緣中文二初至何用是為勸增起過二時彼已下呵嘖滿足戒本四句一犯人二施衣限定三是比丘嫌少勸增四若得衣下得而結罪具解此四上二可知求者已下解第三雖無求字有其求義故牒而解之求價者為作絹衣今勸買細犯前直乞要本體上增方落此戒求衣亦爾十誦勸增色亦犯問勸增一綖即即犯何故乞衣得一條方犯答乞本無心及至乞時任彼籌量惱義是微故一條方犯此中施主先有虗心施限已定不荷其恩嫌少更索惱情深一綖即犯勸二居士增價戒第九制意犯緣如前無異唯以二居士合作為別問勸使合作有增不增為犯何戒答雖增者犯不增無犯猶是二人合作故屬此戒問所以無勸三居士者何答勸二容損勸三惱微若爾勸居士棄布造紬豈無損義答此乞衣戒攝今此勸增者要就本體上增方犯戒故所以無過三反六默忩切索衣戒第十然寶壁精華世情所重長貪妨道生患處深非是比丘之所宜畜今施主信心奉施以為衣價懼犯畜寶無宜自受故付俗人令貿淨物尋索忩切情無容豫迭相催伇逼惱前人故作制限三索六默然今過索惱境結罪別緣有五一是五一是施主送寶二為貿衣受用三付彼淨人轉貿衣物四過分齊索五得衣犯提問衣有過索鉢所無答鉢本用食得一便足更無多用何須開聽三索六默即無開索何有過罪若全無鉢多索無罪若先有鉢一索即犯落乞鉢中故無過索問此戒為損寶主為損淨主答由王臣心動致索過分損淨主得罪緣文有二初主罰錢五百過索起過二時長者下呵嘖戒本文二初過索結犯二若不得衣已下明進否前文有六一犯人二若王已下正明施主遣使奉寶為作衣價三是比丘應語已下恐犯畜寶自不敢受四彼使語比丘下明使臣送寶付俗令貿淨五須衣比丘下正開三語六默索衣方法六若不得衣下過索分齊得衣結罪然此六文位束為三一犯人二有四文聖者立法謂送寶不受付淨生已索之法式三得衣結罪第四付淨生文四一問淨生二須衣比丘者報淨人處三送付四返報比丘第五索法見論純語往索齊六不犯過六方犯純默十二未犯十三反犯語默相參九反未犯十反方犯如是類知五語二默七反未犯四默八反未犯三語六默九反未犯二語八默十反未犯一語十默十一未犯全已還從一默至六不同多論也第二不得中文三一躬往遣使到施主所二陳己不惱三還本施主廣中但解得衣於得衣中唯解初二下兩中間二句略而不解憶念者下解第五索法初三語次六默次語默強弱問默然可得幾時祗云如人入庫取物著店上頃又如裹襆物頃不犯中即相布施寶主永捨不懼失故容豫索取不犯過罪何以不犯畜寶寶不現前恆作取淨物意故為波利迦羅故與謂是雜碎等物得失事微縱本主心變索亦不犯雜野蠶綿作臥具戒第十一所以制者良以貴物難得損生招譏長貪妨道過中之甚是以聖制十律以此綿貴爾貴多殺蟲故多論云比丘結戒有四義故一止誹謗故二長信敬故三行道得安樂故四為不害衆生故緣五一是憍奢耶二自乞求三作臥具四為己五作成犯多論憍奢耶者綿名又依祇律中憍奢耶此名繭故律云施憍奢耶湯已熱可著繭即持繭內釜中啾啾作聲但此未必以繭翻憍奢耶但是綿名或可如是又以純黑毛共憍奢更五作經縷或互作衣及緣或純作僧伽梨多羅僧安陀會四五二律名臥具相亦難識戒本三句一人三雜作臥具三結罪多論或以布貯如作稱法或縷織成俱犯捨墮此由害命兼是貴物故須斬壞以息後犯餘不害生並皆全捨但有捨財略無懺罪黑羊毛作臥具戒第十二此毛貴物無宜下用靈損施物作無用之費經營妨道復招譏醜是故須制四緣一純黑羊毛此毛貴好出四大國貴而難得二作臥具三為己四作成多論二法或布貯如法或縷織以成此二俱犯不犯中若割截壞等二句本心為壞重疊故成時未犯若作蓐等已下並非披服之物故開無過白羊毛臥具戒第十三十律此非純白蓋是三毛參作不犯純黑三毛之中增黑毛一兩犯墮貴故增白一兩犯小罪賤故尨增不犯滅一兩犯墮五緣一三毛參作二作臥具三為己四增好毛一兩五作成緣中彰白藉此為緣故又唯此律似應純白犯捨佛教三毛參作犯純白之過四緣成犯一純白毛二作臥具三為己四作成便犯問黑白同犯白制參作黑不制參其義何故答但使參作寶無兩過宜就白制參類如前戒明參不犯問三毛共作何以黑多者答黑毛雖貴出家服同故所以多白俗服長慢招譏是以須少戒本三句一犯人二教比丘三毛作法三若比丘下不參結罪下具解此三鉢羅者此云四兩不犯中參故無過若割截壞者本心割截若壞色者非純白故無意許截詳壞成而未犯若作枕等已下並非披服之物故開無犯減六年作臥具戒第十四先有故臥具未滿六年足得資身長道便罷不捨故者更復造新長貪妨道招世譏過是故聖制六緣成犯一有故臥具減六年二不捨故者三僧聽四更作新者五為己六作成便犯戒本文三一略明戒本二制隨開文五如上第五開作法者問人與臥具互不如法羯磨成不答多論釋准前離衣類亦應成亦可不成如無德教授不成差等問得羯磨竟乃作黑白為犯減六年不答不犯減六以得法故作黑白邊別犯前二如被處分而過量作房別殘罪不壞處分無不處分罪此亦如是戒本文三一犯人二制限六年三若減已下造新結犯下廣釋中但解初三略不辨第二句問臥具制其年限不令使褋不制年限所以不同答臥具為取𬥢氣資身受用若六年已去久故陳朽資身義弱故制以限不須制褋坐具但恐汙僧臥具鄣身受用但使體在不限年數現有坐具貪心更作要制使褋息著好之心故爾不褋尼師壇戒第十五己有故坐具鄣身便罷今嫌故造新虗損信施長貪妨道是以制褋為令息令長道物有受用之益今更造新不以故褋違犯聖教故制提罪別緣有五一有故尼師壇二更作新者三為己四不以故褋五作成便犯問尼師不褋而復過量得一罪二罪答一解二罪捨時先截去量外然後懺悔若爾不褋者褋已懺悔何須入捨答不褋尼師舉體有過今雖更褋猶有本過故須入捨量過者量外有過若截去己量內無過何須入捨又復還主無受用義故要須截若故物作但有過量無不褋之𠎝問何以無過量鉢截去受持同坐具耶答坐具截可如法鉢若截却則不似鉢是以多論鉢無延促衣有截續緣中文二初至壞色不褋起過二諸比丘不呵初文復二初至壞色制以故褋新二六群已下不褋起過前文有三一坐具狼藉無受用過不受請者五緣一為入寂靜故二為諸天說法故三為看病四為結戒五看房舍臥具故二佛見已下起意制褋三食訖已下告衆制褋戒本三句一人三制其褋法三若比丘下褋結罪五分修伽陀一搩手二尺多論應以故敷具周匝修伽陀一搩手壞色故擔羊毛過三由旬戒第十六然出家之躬擔羊毛順路而行跡同凡碎動越威儀招譏損道故制不聽所以復開三由旬者有待之形無以存濟故後開三過擔結罪四緣一貴羊毛二己物三自持四過三由旬戒本三句一人二開三由旬三持過結犯廣解中初句可知次解第二句自持至三三若有人持已下解第三結罪於中五句分三第一有人持者不得助持持犯吉羅以非全自持過三故次二句令餘四衆持過得吉羅次除羊毛下二句賤惡餘物自持過吉略不正解貴價羊毛自持過犯提使尼浣劈羊毛戒第十七制意犯緣同浣故衣但此新故俱犯以損功廢業中制故爾畜寶戒第十八先總料簡後次別解但此寶者八不淨中一不淨數故今總解八不淨義四門分別一列數釋名二聽畜不聽畜三畜之得罪輕重四更互相貿得罪輕重初門者一田宅二種殖根𣖋三貯聚槄粟居鹽求利四奴婢人民五畜養群畜六金銀錢寶七畜𪺏牙金銀剋鏤大牀并綿褥氍八一切銅鐵釜鑊除十六枚器不在此限若畜此八長人貪求汙染梵行故曰不淨此出善生經此律衣雜二處有文而不次比第二門者第一中田及第二根𣖋長貪妨道無開畜義第一中宅舍有聽不聽若廣畜莊宅即不聽許一口小房雖是重物有資道義聖亦聽畜不須說淨第三不淨中祗律作是念恐其時穀貴我今糴穀當依是誦經坐福行道到時穀大貴若食長若與和上阿闍梨若作功德餘者糶得利無罪買藥草亦爾此即不犯畜販不爾不聽若病聽畜盡形壽藥鹽無病不許第四及五若不病一切俱禁若老病開畜六金銀錢寶等不問病不病悉皆不開以利患重故然以資要得說淨付俗人作淨而畜恆作受取淨物之意七八二中不問病不病有開無開如被褥氍數三時五時得淨施畜及十六枚等如是類說第三門六七二種體是貴物長貪處深有淨施法不淨違教過畜犯提自餘不淨體非貴物生患䖍微兼無淨法無應說不說之咎畜之但輕第四門以八不淨貿十種衣捨墮以十種衣貿八不淨中六七二種犯捨餘六不淨但得吉羅若以六七貿八有提有吉或以餘六貿八亦有提吉別解寶戒寶體利重長貪妨道喜生諍競招世譏嫌是故聖制不聽受畜然由資要故開付俗貿淨物受之故多論與比丘結戒者有三益故一為止誹謗二為滅鬪諍故三為成聖種知足行故貯用屬己名之為畜惜所珍玩稱之為寶故曰畜寶戒問寶衣藥三名有畜貿鉢畜無而貿食貿而無畜其義他也答寶物利重藥得久延衣資義寬並違諍法故畜有犯對俗招譏貿亦俱犯故文有貿寶及以波利迦羅以七日易七日等食貯生過故無畜食與俗共易故制貿罪是以文言以時易時等鉢既有畜貿亦應犯文無者略如長鉢中不捨更貿餘鉢既有更貿之言故知貿鉢亦同犯限若明立戒多少者衣寶等別畜緣亦殊始終六畜謂衣有三及鉢藥寶等是然貿唯二貿何者是也如寶是體別自立一畜若貿七衆齊犯不同餘貿故別制一貿謂貿寶是自餘衣等體殊緣異須立五畜同對二俗生譏處等合制一貿謂販賣是別緣有四一是錢寶二知是錢寶三為己四受取便犯初緣寶者謂金銀錢更分為七如文餘是僞寶畜犯小罪錢亦不定祇律上有文像國土所用能生息利長貪處深犯提上有文像國土不用犯小罪上無文像國土所用起毗尼無文不用無罪此律但言上有文像蓋是國所用犯捨餘應不犯十律七寶皆墮銅錢吉羅第四緣受取犯者若作畜寶意多論作五種受俱犯一以手捉取二以從他取三以器從他取四若著是中五答言與是淨人並成受寶也緣文有兩初至肆上起過二諸居士已下三人呵嘖俗呵文三初道俗譏嫌二時王及大臣已下詳評是非舉以啓佛三佛告大臣已下為彰大聖歎而說過於中文三初歎說是二我有如是言已下說為房等聽受寶物餘則不開三大臣當知已下舉其四過彰非釋子呵顯前呵意也說過過文言決定知非沙門釋子者彰過之言以我為師不令捉寶也開受文言我有如是言若為作屋故求材木竹草樹皮得受者此是資要無過故聽受寶不應自為身受者反前是犯故日月四患者一修羅二烟雲三塵四霧沙門四患酒為放逸本淫是生死原金銀生患重邪見壞善根日月有四患故無照用之能沙門有四過故法無光顯之譽今此畜寶四患中一故非釋子戒本三句一人二所捉之寶三自他二業捉而結罪自下辨其捨法大位應四此中但三良以懺罪不合對俗恐濫故略第一捨寶文三此物佛所不聽故曰我所不應二若彼人取已下還法文兩初不解事淨主似寶還者作彼意故受更轉淨施得衣持之二若彼優婆塞已下知法淨主得衣持之三若彼取已不還者下還索進否略無捨罪已如上辨不同五分永棄捨也不言看是吉羅者此結失法之𠎝貿寶戒第十九以其寶物更互相貿為求息利長貪妨道招世譏過故須聖制與下貿同異有八不同一犯境寬狹此七衆犯下唯二俗二所貿物殊此但錢等下有五物三物三約業有異此自他俱犯販唯自犯文言當令淨人貿易四捨財中財境法等別五約除罪中法謂販通六五四等以對三境故又不得別寶唯四法及得別懺六還物不同謂轉不轉及境及境法等異七不還不同八開通有殊寶開福用販開外須此八位三上三犯時次四捨時次一對開有斯別狀離制二貿別緣有五一是寶物二互相貿易三決價四為己五領受戒本三句一人二互相貿易三結犯初句可知種種已下解第二句文二初解種種金銀各三錢唯有一合有七種一一互易為七七句二偏舉錢八種以生利多故非寶之錢亦寶所收若比丘下解第三結罪捨法同前畜寶賣買戒第二十凡出家之人理息緣務靜坐修道何得躬自販博馳騁市肆動越威儀招世譏醜財物既交或容犯重臨危事險行非高節以斯諸過聖制不許多論四義故一為佛法增上故二為止鬪諍故三為成聖種故四為長信敬不誹謗故販賣之人不如屠兒屠兒之心欲令一切不作我獨為之若販賣之人隨居多少意即欲令天下大貴荒餓隔塞如是廣說欺罔聖凡事多過故此販賣等物作塔像不合禮房不得住等有多過故別緣有六一在家二衆外道亦攝二共相貿易三決價四為己五自貿易六領受祇律淨語分別不淨語分別價等互作四句十多二文因時有罪果時無罪等互為四句此律雖作淨語亦犯不得同祇但使賣買賣買各提不同多十緣起文二一至共易之貿易起過二外道得衣已下呵嘖前文復二初生薑貿食謂以盡形壽易時二舍衛已下外資貿易謂以波利迦羅易波利迦羅既以劣易勝或容犯重非此所明亦可倍切以酬價直故不言犯重此或可爾同道無譏故開五衆祇律唯白衣貿犯外道雖邪是出家人故不犯五律唯外道貿犯以邪見不同故白衣犯吉十律七衆盡犯此唯二俗外道俗限故亦是犯實言論直故曰審定等不得共二俗外道等貿故曰不得與餘人貿易既不得貿應令淨人又已知不得自貿亦不得為他比丘故曰不得與餘人貿易應令淨人貿易又出家法體不爽物情有悔須還十律限七日內還戒本三句一人二明賣買三結犯廣解還三初句可知解第二中初總牒門二以時易時下釋云釋中文二初解種種對於五物有五五句可知十律鉢與鉢相似如是衣澡盤扇時藥夜分藥七日終身藥等各自同類是相似若以鉢買衣是不相似乃至終身買鉢是等皆犯販賣准此文時餘雜物等並應波利中收二賣者已下解前賣買先釋其賣文三一總言上下者是賣次增賣次重增賣此二謂是上價後解買中亦應三句一總言價直五錢數數上下者是減買也次與三錢增減買也次與一錢重增減買此三正解下價故曰買亦如是祇律若物直五十而價容索百錢今與五十不名下價解第三犯可知不犯中為外用故開使不犯亦可前是自為此開供養燈明畜長鉢戒第二十一然鉢為應供之器一資身足今過貯畜長妨道招譏醜纍損壞不輕是以聖制然以物變無恆容有失奪身要用事不可廢施時不受後須難得故開十日說淨而畜違返聖教過則結犯五分有比丘得二鉢以佛不聽長故施他已鉢破佛問幾日後破答十日因開十日此律因請遂亦開十故曰畜鉢過十日戒別緣有五一先有受持鉢二更得鉢三如法鉢非法不犯謂具三如一是體如但唯泥鐵二是量如謂三斗已下一斗半已上三是色如見論鉢五熏瓦鉢三熏已上方是色如問白衣犯長白鉢不犯耶答多論云衣染可令如意故亦是犯鉢若燒熏或令壞損難可如意是故不犯問衣若過減皆成受持鉢何不爾要須如量答衣有截續鉢無延促故使過減不成受持四不說淨五過十日犯准下四想等應加一緣無因緣濫一月五月故闕不論若得鉢五日三舉被治設徑多日亦無長罪若解舉後更得五日滿足戒本四句一人二所畜長鉢三開十日畜四違時結犯問衣有迦絺那已出鉢何故無答衣鉢體別益不及鉢故不得言衣已出問衣不益鉢義是可爾何為不受迦絺那鉢答衣有三領為僧伽梨重開受德衣離宿無罪德衣非長兼益長衣鉢唯畜一隨身受用何得受迦絺那鉢既不開受明不益長故所以無問何故不開迦提作鉢月者答鉢未成本未犯長何假一月其鉢若成已開十日淨施與人故不須開廣解四句上二別解第二鉢中文四總舉六鉢謂體處色二大要下辨體唯兩三出量分齊四以具三如制令受持說淨十律受鉢此鉢多羅應量受長用故祇律此鉢多羅應量受用乞食器受持三說若比丘下合解三四兩句論其犯相捨及不犯一同長衣其還鉢法亦須徑宿不爾轉還唯以鉢為異長衣鉢藥等解犯相八門並言非衣非鉢非藥等者謂當體本非故使不犯各下不還中並言作非衣鉢藥等者謂受捨已轉前三體以為非也乞鉢戒第二十二然鉢減五綴不漏堪資身用今乃處處隨非親乞長貪妨道惱亂施主於理不可故須聖禁別緣有六一先有受持鉢二減五綴不漏三更隨非親里居士乞四為己五乞如法鉢六領受犯戒本兩句初明戒本文三一犯人二舊鉢未漏三更求結罪二彼比丘下捨還方軌異餘戒故於中文二初誦捨鉢二展轉已下共為一句總誦還鉢文言此是時者謂是用舊持新時乃至破未持然下還中四段並應此文懺及不還無別相故闕而不論解戒本可知次解捨懺文四一捨鉢二捨已當懺下懺罪三此比丘鉢已下還鉢四僧中下不還結罪先解初捨四法同上初此尼薩者所捨鉢二是中下境三應住下威儀四正捨辭句第二是中已下簡異餘戒言住處者簡三謂非戒場小界及自然非住處故又甄無住處無僧庫故言僧中捨者簡三人已下餘二文可知問所以須住處等者答鉢無多用還惡留好入僧庫故若爾乞得多衣亦惱施主兼損寺舍何不一衣還主餘奪入僧答衣資義寬故並還主鉢無多用得一便足餘無所用故須入僧若爾長鉢亦無多用何以盡得還主答長鉢或己物貿得或施主自送無其損惱雖無多用故悉歸主乞鉢患多一長貪求二惱施主三鉢無多用故但還一此應上戒本誦捨之文第二懺罪如常所辨第三還鉢文四應上展轉取下鉢令持等文一就中有四一貴者奪留宜還下鉢二彼比丘鉢應作白已下猶以為勝轉取下鉢三若持此比丘鉢已下罰令持新用舊下鉢四彼比丘守護此鉢已下恐壞故用新護舊下鉢此之四文並是取下鉢令持初文分兩一處分留還二應作白等羯磨還下前長鉢戒若獨捨者還位有兩有緣轉還無緣徑宿羯磨直還文據後義故但直還也今此乞鉢謂其轉捨或與衣藥等合故使文中即一坐上羯磨直還以餘長等不相礙故或與長鉢一時合捨者設長鉢有緣亦不得帶此乞鉢即坐轉付以要作白轉取下鉢罰令持新用舊下鉢以此義故非轉付能了必須從他長並徑宿還方作白等祇律若大貴者應取十鉢直九鉢直入僧淨厨一鉢直還主若乞得二鉢直者一鉢入僧一鉢還主如是隨得多少限一直還主餘直悉入僧厨二轉取下鉢中初作白次行鉢餘三律中並差行鉢人祇十具五法不受等及應與不應與白二差行鉢人五分是比丘應唱使諸比丘各持鉢出次第問上坐須是鉢不若言須應取上坐鉢看若無鉢太大太小穿缺若喎取不應與若無五事應與乃至新受戒人祇諸比丘鉢盡滿盛水行之此律若行准彼三律計合差人行鉢之法從上向下隨僧量宜或可取新故言取上坐鉢與次坐或即與亦得故言若與彼比丘此鉢又謂不應護次坐已下僧意此是敬讓之辭故曰不應護等又不應以此奪好與惡瞋恨因緣要取下鉢故曰也三罰令持新用舊下鉢者初牒前二下行不定故二羯磨已下罰令持新用舊下鉢昔解名為護鉢白二者非此謂遣持兩鉢白二文言與某甲比丘受持乃至破白如是者非謂加其受法直是罰令受行持此兩鉢故曰受持乃至破者用舊持新時節舊鉢破來雙持兩鉢多論仰令食時常持先受鉢乃乞得二鉢上堂終身如是示多貪之過斷後惡法因緣故爾四護舊下鉢者恐壞故用新故爾不得一手捉兩鉢等者即被罰人餘亦不得祇律和上闍梨以其持洗二鉢方便壞舊方得用新乞縷使非親織戒第二十三然三衣具足且得資身今乃自乞縷綖以憑勢貴強逼織作三衣長貪多欲損惱織師反招譏謗是故聖制別緣有四一自乞縷綖二是非親里俗人織師三恃勢遣織不與價直四成便犯問所以但有俗非親織無使尼織者何答尼不得自織大僧知法使之義希假有但輕是以唯有使俗織罪若爾亦應但有使俗女浣衣答聖教聽尼自浣無罪僧使尼數妨修故重俗非修道之人又復浣染義易更無多損故浣不犯織功費廣為過情深故浣織不同事在於此戒本四句一人二自乞縷綖若居士縷犯後戒故須自乞設不乞自縷應輕三恃勢逼織以理求得無罪與價亦不犯四結罪廣解上二可知織師非親下解第三句多論織師非親有三句此戒正體正損織師犯捨非親乞縷吉織師親非親合有三句織師親里有二句闕第三俱親無罪是以但有八句正損織師犯提兼損縷主得吉欲舉一犯通收重輕故但言犯若比丘下解第四結罪分齊捨懺方軌如文可知勸讚織師增織衣戒二十四篤信居士虗心辦縷為比丘故織作三衣宜應稱施而受彰己內有廉節之心外不惱施主今乃勸讚織師自與價直損他縷主自壞心行彼我無益故所以制別緣有六一居士自心辦縷遣織師織二情期有限三知有限四與價勸織五彼為增縷六領受便犯問此損居士與勸一居士有何等異前對縷主勸增此中屏勸織師增織綖縷問前戒有勸一及二此中何故無勸二織師答前對縷主得有合作是以須制此中若二居士各一織師比丘屏勸二織師合織一衣既非縷主理無合義故無勸二織師若縷主一織師有二勸使好織損縷是一故不別立若縷主二織師一損縷由織師織師是一復不得言勸二織師故不同前若對縷主勸盡屬前戒若也屏勸並此戒收問此與前戒織師何別答明四不同一前損縷主以乞得故此損縷主不損織師二前戒由損織師不與價犯此損縷主與價故犯三前非親犯親則不犯此親犯四前是已縷織成即犯此是他縷領受方犯緣文二初至送與居士婦起過二時居士他處還下呵嘖戒本有三一略二開三滿足戒本四句一犯人二縷主遣織師為織作衣三彼比丘下乃至食直勸讚織師自雇價直四若得下結犯下具解此四先與他衣強奪戒第二十五先與他衣規欲共行彼若不去理應和豫而索本自無過嗔心強奪共相逼惱持非所宜故所以制別緣有五一大比丘甄沙彌不犯問若沙彌言不犯者何故隨順被擯與大僧同犯答衣共行沙彌非類與之義希奪亦不數隨順解義同違僧法損壞無殊為是同犯二先與衣規欲共行三不定與前人決定取十誦有四句一決定與決定取二決定與不定取此二奪重不犯此戒若不定與不定取奪犯小罪不定與決定取奪時喜諍是以犯捨四嗔心強奪五得物屬己不知誦戒等者前二防未起非不知誦戒者不識自行防未起非不知說戒者不解衆法說之儀則次二除已起罪不知布薩者不識自行對首懺悔不知布薩羯磨者不違衆法懺悔之方於斯四法事若面墻故曰癡無所知戒本三句一犯人二先與衣三後嗔心奪而結罪廣解中奪而藏者謂對面現在奪若其未藏事未分判故未成犯藏而方犯下若著樹上等者謂不現前奪離處則犯無人共諍故後藏無罪此非重犯下開中若借他衣乃至失壞文舉來借他衣故奪而無罪奪舉人不犯不同十誦也四羯磨別住等悉犯奪滅擯人小罪問言破戒者與滅擯何別又破威儀下三篇是豈可犯殘之人及犯下三奪之不犯耶今解此三破者是舉家所治非謂此三奪盡不犯謂應與舉滅等開而非犯畜藥過七日戒二十六七門解義第一列數釋名辨體第二手口二受同異之物三作口法藥與餘比丘通不通義四解畜四種藥得罪輕重五解初日藥畜過七日犯染下六日失受不失受六犯捨墮藥更貿餘藥有染不染七服不淨藥得罪多少初門有三一列數釋名二辨藥體三四藥相和從強服義俱有療患之能稱之為藥藥義不同略論有四謂時非時七日盡形等言時藥者昔解事順應法不生罪纍名為時者義通一切但使無罪應法皆時作是釋者四藥皆時並應法故如似時中無過午後有罪即名非時七日過服盡形無病如斯等類名曰非時時通反說故知四藥並有時非時義今解約十二時辨午前名時過則非時如非時戒說問所以午前說時過則非時而言此藥就之以辨者多論四義解時非時又毗羅三昧經世尊為慧法菩薩說食明四種旦天食時午法食時暮畜食時夜鬼食時後之二食多生病疾其出家人應於天食法食之時故曰時食過午已後非上二食之時故曰非時對此時辨藥但有二一者時藥二者非時時藥據體立一下之三藥總是非時今言四者於非時中如非時漿對他時家非時聽服者名曰非時餘之二藥出於時家非時規圓故從受法日限長短故須立二逐此離分得明四藥若明了論藥有五量一時量二依更量三依七日量四依一期量五依大開量此五攝一切物盡也然此四名時與非時相對得名後之兩種約法受稱二辨體者一總約三聚辨體是色法不出塵大八微為體色中三色前二色收四食之中若唯揣食然八微中正取資義藥體但香味觸三是色等則非二就事辨十五種食五蒲闍尼五佉闍尼五奢耶尼此三五藥廢法就體體義還兩前之二五其唯時藥謂豆鼓乳酪等第三一五非時藥體今為四者用法以取義當非時即非時服故文言得甘聽時食如八種漿等非時服蘇油五種脂等是七日藥一切辛鹹等盡形藥體故雖位二而為四藥第三相和者四藥相和從強而服以時終身助成七日如以蘇煮宍此汁作七日藥服或以時七日藥助成終身如蘇乳和亭歷子或以終身七日助成時藥服若勢力等者隨名作定如石蜜丸以名定故作七日藥如五石散作終身藥問果體為時藥汁為非時者亦應飯等是時藥漿是非時藥答果有義汁故作非時藥漿雜時藥故非非時第二門二受同異同異有三一釋二受名二二受差別三料簡寬狹長短等言釋名者謂以衣器等攝領四藥故稱手受口加聖教順法畜服號曰口受二辨差別差別六門一須受意所以手受者多論五義故須受食何以口受為防失受問所以知有口受者十律優波問非時分藥七日終身藥不犯舉宿惡捉得手受不佛言得若不病得服不答不得若病得服不佛言得據斯文驗明知為加法者須淨有病若直手受食者誰問病否又十云除獨住等五人得心念受七日藥等七種心念法餘人不得心念受以斯義故若不須加對人等法何用彼言此之七事得心念不得心念又多論若無淨人求請難得自從人手受從比丘受口已隨著一處七日內自取而食此謂無淨人須多時服者若有淨人隨便手受不是要須口法第二所對境三趣分別手受通三為防盜故如呵梨勒樹神非人邊受身子藕根畜生邊受人境可知如餘律大迦葉受貧女食是天授食佛言成受口受局人又復道俗具非具形報等分別可知第三所受藥藥雖有四四皆手受故不受戒言不受食時藥若藥著口中即餘三藥除水等醎濁二水亦須手受若性醎白不須受也若論口法時藥定無局下三藥時藥無者以其口法為防失受唯聽時服時中是近無失受義過中已去雖任運失復不聽食以斯義故不須口法非時藥者聖聽十二時中服用無罪時中懸遠亦有任運失受之義須作口法如延手受七日盡形明不待言故下三藥咸須口法以防失受故十律優波舉下三藥問成不成又復口法防失受者謂放之在地故爾若雖在非時中但使手執亦不失受如自己藥是但以不可常然須作口法第四能受心業業者手受有十如不受食戒說口受差別對三可知心者有兩初對心尅漫尅漫復二若對境以辨二受尅漫俱成其唯本境不論交對若就藥者口法局尅尅但同藥手通二心尅同口法亦唯同藥漫兼異藥第二錯誤於中復兩若二受之境亦唯當分誤有成義錯則不成第二若就藥者兩受錯誤俱不成受如文欲受油錯受蘇不成受故亦可誤則成受錯不成受所以可知第五受方軌對手口二法廣說可知第六加二受竟觸失不失若淨人觸即便失受如下淨果已不受佛言更受又多論云設口受已淨人若觸更受故知失受問觸既失受何故口法為防失受答口防任運不防遇緣淨人觸者以緣強故口法不防又復若遣口法防遇緣失受者遇緣該四口受之法亦通時藥然時無口法明防任運又有一義遇緣無過口法不防故使論中觸聽更受既隨聽服何須口法以防遇緣任運時過或有其觸宿明須口受豫防任運問六日內觸更受得服者七日過七亦應更受答此難不然六日內觸是我開服之限若無觸緣猶自得服故令雖觸開聽更受過七限滿出開分齊不觸自失義何相並即是六日內者先本宿觸等未成宿觸等緣若過七日先本觸宿等緣故不相類第三料簡二受寬狹長短強弱一辨寬狹有四謂境藥藥防生等是言境者手唯異類異類故寬以其不受惡觸緣通𨷂無同類口局同類同類故狹以秉法故若具受對境辨境寬狹口具二境故所以寬手唯餘衆說之為狹二約藥者有兩第一手口相望手寬口狹以其手本口未有口必手故所以寬手未必口口所以狹又手通淨穢故寬口專淨藥故狹所以爾者口是特開故如本長財捨作三衣若功德衣要不徑捨故此亦爾第二以藥對受具受寬狹時藥一境故唯手受手受故狹下之三藥具受境二受還通兩通兩故寬三防罪寬狹者手防不受義兼惡觸午後即失不防二宿及以非時若望二煮復非對治故唯防兩防兩故狹口通下三對三以說就七罪中謂非時不受兩宿二煮惡觸等若也非時三皆不防以無口法亦聽服故即於六中非時但防不受惡觸二罪謂是任運異於手受手受防其一往不受而捉等此義通下二藥所以無餘四者但至明相故無二宿又是熟藥不防二煮七日防四不受及觸同非時說以徑七日亦防兩宿若以義求非時七日應防內煮但以藥法對盡形問故𨷂而不論不防自煮義同前說盡形具六於此三藥極六下二通說口法防罪為寬四生罪寬狹者口受生寬手受生狹手正生殘義兼任運惡觸口受正生非時與長及無緣服吉故文言非時過非時七日過七日等問明相出後義生七罪何以獨生非時答以不加口法亦有餘罪故雖七罪不說從口法生此亦總說細分別者非時七日生非時長及用吉羅盡形無緣吉口法極三下一故寬手正生一故狹所以口法防寬生狹者以其未加口法之前手受亦成過緣須加口法以防前𠎝故使防多然作口法故有分齊時限今違此准故若親從口法生之即少為是生狹所以生罪不同者手正生殘口生尼薩非時若無二受即無此過是以生罪緣異此等引文可知第二長短對二受互說可知第三強弱者亦望二受互說手有二強一假不假別二根本枝條口有二強一約時長短二防過多少各有兩弱反說可知第三門一釋藥味是通手受亦通以其口法加他通味之藥是以口法亦通故一人受竟與餘人時受法不失前人食無罪故文言第七日藥捨與諸比丘食故知施人不失受法失則不淨何故聽食又餘食法亦通餘人故藥亦爾若爾何故見論施與餘人失受答謂與沙彌俗人故言失受非謂同類此解多妨一與上同生不共犯妨又三義不具得入捨妨又假緣作法若其通者不假病妨又復衣鉢等以稱名作故無不局定今此假病自作何以即通故未必然又解手防盜相一人受竟得通餘人論其口法假病稱名望己有法未與人時於我邊服可容無犯若決心捨彼口受即失手受隨亡不合更食彼此俱不犯長以口法不通畜心別故是以見論口受之藥捨與餘人即失受法不同餘食成殘便罷本不稱名故得通餘如病人殘食豈可有法是以非類若爾何故文言所有至七日藥捨與諸比丘食若失受法如何得食然佛聽食明口法是通答雖可不通捨與僧時亦不失受以其元為捨長作法非永本不捨口法口法期限未滿又復不成遇緣失受是故不失以不失故下五日藥聽使還主至七日藥得與僧食又復受他捨已數數服吉若捨無受何以得食故知不失第四門畜藥輕重者七日藥重餘三但吉所以然者有二義故一七日藥即用資強體現常存有彼相續貯畜心殷垢心厚重二由體現常在畜心殷篤聽說淨以防畜過今不淨施違返聖教故得提罪時藥雖可資強體現交盡無久延畜垢心微薄又心薄故不須說淨今若畜者無應說不說之咎是以但輕非時久貯喜變成酒亦無積續畜心淺薄又不違淨盡形壽藥資身最微心亦不重畜心薄故無違說淨之教故下三藥設畜並吉第五第六對文以解第七門服不淨藥得罪多少七日已且起服之一咽七罪三提四吉謂非時不受殘宿內宿惡觸內煮食捨墮藥等吉各不相假業一緣異故一咽七罪亦有殘而非觸謂遇緣觸失受者是非時藥過服六罪既是熟藥無自煮之𠎝時藥一咽容得七罪若是生物有自煮故盡形壽藥無過盡形壽受法不失若無病緣但得小罪更無餘咎若不作口法者除無非時一罪餘悉同有別解七日藥四門制戒意者凡夫滓穢以四大為軀夏末秋初節氣交𥪰四大轉改諸病則生既有疹惱廢修道業大聖愍念方便開聽畜服諸藥以療病苦趣令安身進修道業因聖開聽廣貯衆藥長貪壞行違教招譏過是不輕故制提罪貯用屬已名之為畜療患稱藥越於期限名過七日故曰畜藥過七日戒別緣有四一是七日藥初門第四門義攝此緣解二加手口二受第二門義此緣中說三不說淨四畜過七日便犯下三門義此緣中收緣文有二初至臰穢正辨畜藥起過二時長者下呵嘖初文復二初至聽時食開畜五藥齊七日服二世尊已下因開起過前文復二初至如法治正明為病比丘開畜服藥二爾時尊已下無病比丘亦聽隨時食藥前文有三初開服五藥二時諸比丘得肥美已下因明殘食之法三舍利弗下聽服五脂前文復兩初對緣開服諸藥二時諸比丘得肥美已下了前時服之言前文復二初明如來詫靜生念二從靜處已下陳己屏念開聽服藥前中文四一念所為人夏末秋初節氣交𥪰四大轉改風患遂增故曰秋月風病動病增食弱致身損瘦故曰枯𤍜等二我今寧可已下念藥功能名體有療患之功故曰當藥復有充軀之用名為當食而無非時之𠎝不招譏醜故曰不令粗現三復作是念下正出所思藥之名體有前功能四聽諸比丘服下結成聽服次陳屏中三初舉前所思念開等事二是故已下正開畜服以病為畜緣故曰病因緣時應服第二了教中文四一謬解聖教病未痊損迷前時者謂是中前故二時世尊下如來撿問三阿難實答四佛告已下了教之說前言時者謂是病時然此非時藥故曰時非時服第二殘食文二初病人殘體是可惡不須殘法恐損信施故開瞻病人食之此謂因上病人美食不能食盡遂即棄之文有四句可知二明非病人餘者須作殘法事有兩一僧食文四二更有已下檀越食指下文說三服五脂人言非七日藥釋疑故來戒本無故豈可佛思藥體緣本之中忘而不說故非七日若爾如實得道戒本無除增上亦應是犯死尸犯者義亦同然如一月德衣戒本中有何以無緣起急施衣緣無二罪戒本有過後無過前廣解具二豈可不犯過前如取過三鉢戒本云不分所以不言出門犯等此戒過犯何以言服並不了義故現言時受如服油等明是七日藥亦可油類緣本之中即油中攝但以對病殊功緣不盡舉時受時煮時漉者謂淨人難得使淨人煮變生作熟從其受取自在淨地中煮以變生故無自煮過以淨地故無內煮𠎝即時中故無任運失受漉取以水渧作淨使汁滓相分得如法服若非時煮漉徑時失受即惡觸生服之得罪故曰如法治若使淨人有容作者不局時非時二無病比丘隨時食藥文言一器行石蜜與諸比丘施彼乞兒欲令象師悲敬二田收反報益故復欲說法度於象師先亦奇變怖之以入道故曰石蜜難消乃至毛竪恐怖故問前令與僧俗各三何故復言不見諸天等消唯除如來答前令平等獲福故須普與今此所留殘石蜜者為怖象師是佛神力非餘能裁故曰諸天世人不能消化唯除如來也此言殘者乃是所行一器之餘故文言象師欲供養比丘人別一器石蜜佛言但一器量與復與送著水中現聲震裂怖以入道故次入村已下釋去疑情戒本五句一犯人二有病者畜藥之緣三殘藥已下所畜藥體四開齊七日五過限結罪問長衣中得有迦絺那衣已出長藥何故無答外內資別體既不同益不及藥是故此無問衣有德衣益於長衣藥中何故無開迦絺那藥益於長藥答衣有離過為僧伽梨重故聽受德衣使無離𠎝兼益長衣藥共宿有罪離則無過須開受迦絺那藥而兼長藥問何故復無迦提月開答衣須營造未成有過故開一月藥營未成本無長過何須一月又復五月一月非是對病開位是定所以須除藥無對病病時不定有病時未至時到復無病豈有定時之開而言已竟已出等問十日衣言畜長衣此藥何故不言畜長藥答二衣非長故須對非長以明於長藥唯開畜更無非長可對何須言畜長又解彼戒畜長此中畜殘殘之與長其義是一趣互舉之問所以定七日者答祇律有六十比丘病有一醫師比丘療治諸病佛不開亭藥疾疾已過而不得力佛問醫師比丘欲得幾時得安隱答藥勢相接七日可知佛言已一日更與六日故知此隨藥勢故七日也多論正從作法兼隨藥勢隨藥勢者如初日是若三二日觸聽更受七日者即是從於作法問戒本應云畜得罪而言過服答為服畜者可有長罪即甄不為服故畜者無其長罪故文言服理實結罪都不約服亦可中是到應道服若過犯也問衣出尺量藥無多少分齊者何答衣是常須用無時節故制量數藥須不定故開時限以憑口法但過有餘誰問多少戒本五句上三別解下兩合釋釋兩句中廣解分齊悉同長衣唯句少為異廣則三十二略則二十二解初句對此解第五門義復為二門一犯長不犯長約此門解二須淨不須淨就第二文釋第一門一日得藥乃至七日得藥至第八日初日藥過染下六日隨藥多少相與俱犯故言盡尼薩耆問下六日藥被染犯時失受以不解有二種今且一釋說淨為防於長但初日藥不說淨犯下之六日亦未說淨同是長位故為初染口受之法為防宿觸不防於長既所防不同日限未滿故初日藥不能染下並令失是以律文至第七藥與諸比丘食若當失受即有宿觸等生何故聽食故知不失若爾餘五日應還主食所以還令塗足然燈答實不失受但徑貯畜有彼情過藥資義狹罰不聽服以息情過非藥不淨不同於衣資身義寬得歸本主還作衣用餘句類知第二淨不淨門已下齊少一句對此即解須淨不須淨淨法失不失義門有四一須淨不須淨者具四義故所以須淨一口法擁已異於時藥二內外兩用簡別非時三有限可過不同盡形四有長可防通簡三藥七日具故須加淨法離著防長第二淨之時節加口法竟即得說淨義亦非妨如第七章門一日不淨下六日並淨不染下六故知須淨不是要滿六日始淨施也若爾淨財加受應不失淨答藥據所防各異謂長及殘解等別故使不失淨財加受所防是同二治不並故失淨法第三門失不失問八日明相出口法失時淨法失不答說淨之藥至第八日受淨二法相與俱失所以爾者說淨假於二受受法既失枝條焉在又說淨法為防於長受法在時有長可防受法即失體自無長焉用淨為如多論說本說淨財為防於長若未作三衣有長可防淨法便在若作三衣衣體無長淨法便失以斯文證故知失淨問未至八日無其長罪若至八日受法失時淨法復失何用說為答若不說淨越第七日至八日時犯長以說淨故越此分齊則無長過故爾第四說淨竟藥得服用不答不得服用問若俱不得何用淨為答若不加淨染下長生故必須淨若爾衣作淨竟應不得用答內外不同故如衣本為著可得言藥加淨法時本意為服以有時過不得服故若有六恐染故淨若但一日防長故淨若故壞者不成七日用故若作非藥者無法外用故文言犯捨墮藥更貿餘藥得罪者謂染有法藥故自於五衆貿得不犯販賣加口法竟染令犯長或於在家二衆犯販賣即不染犯此解第六門義捨懺位同第三還藥文四僧即應等者對捨言還二彼比丘下處分還否文言所有過七日第三種處分並據捨日反望以說三應作白下作法付彼四此比丘取已已下示用法式下五日藥雖得還主以身外用故無有過染故言不犯雨浴衣戒第二十七此兩戒合制依多論亦過前求過前用二俱尼薩耆所以不聽過前求用者然此雨衣資身要用是以開聽時中乞用今時既未至豫乞失用長己貪結違反聖教是以須制過前求犯別緣有五一是雨衣二是過前求三為己四彼與五領受便犯問與乞衣何別答有二不同一衣體有異此是雨衣彼非雨衣二此戒聽時中乞過前即犯彼戒不開時限無過前義過前用戒別緣有四一是己雨衣二非時中得三時前受持四過前用犯問雨衣時前成受者十五日前成結安居答不同雨衣有求時故貯用得前受安居唯一時前不成安居此二戒同是雨衣義容相由生罪是以合制緣起文二初至與令遍開畜雨衣二時六群下過前乞用起有漏過前文有三一正發八願施雨衣緣二佛語毗舍已下讚遂八願聽諸比丘受雨衣施三從毗舍聞下行其八願正施雨衣前文復二初毗舍佉母見諸比丘雨中露身洗浴發八願緣是春分未雨故曰最後雨二食訖已下正發八願許施雨衣於中文五一啓佛乞願二佛答未許三自言清淨四佛遂聽可五毗舍已下正列其八前六內資復雨外資斯之八願發意彌廓情無限局僧田獲福非是別施下為佛讚良由於此第二讚述中文三一至覺意已來正明如來返問願意答已願期益利之相二世尊已下佛讚八願深勝精妙三爾時世尊下告僧令受遂彼八願前文有二初明佛問第二次答答中假設反明問答一問八人所趣向果二問八人至國不三若我聞曾來等者逆明後時以己八行資給僧田心歡喜故得根力覺意我見此利故興斯第二明佛讚述於中二文一述可非靈故言此事如實乃至檀越二為偈讚令心慶悅初一行偈讚八願因深勝義其因既勝感果精妙故次一偈來果殊勝果雖殊絶未必常有故第三偈顯果無窮初行文二上之半偈頌六內資下之半偈頌二外資言歡喜者施前方便乃至施已無悔三時心淨離於慳垢慶己所為故曰歡喜此歎心淨心因雖淨非法之物獲福微鮮故次施飲食者應法之物施僧受用即是財淨若破戒外道福田淺薄殖福非勝故言持戒佛弟子便是境界田淨三事俱勝寧非精妙以衣外資奉獻二衆故曰布施於衆人此財田淨施雖不能究竟斷結而亦暫伏現在貪心故曰降伏等此是心淨次釋第二上半嘆感果精妙下半囑當處所尅於樂因故曰依樂此明因樂言受樂報者謂其延受天中樂果言永得等者遠得無漏道果適神故曰永得等囑當可知次釋第三心樂於福德者舉前因勝顯所得之果有無窮之益謂得勝進無漏以自適神故曰快樂無漏之樂唯證乃知不可世事能況故曰無可喻此頌無漏之果勝進無窮下半世報無窮可知第三告衆聽受可知戒本三句一犯人二求用時節三過前求用違教結罪廣解可知多論雨衣二益若天雨時若天熱時皆得鄣身洗浴閏三月前三月十六日不應求後三月十六日求不知有閏者無罪若閏四月前十六日安居者即日受雨衣用乃至七月十五日百二十日用以夏多雨濕熱故求有所惱故不得含閏前求用無貪惱故聽含閏前用問功德衣得含閏不答德衣利多有長貪過故但五月雨衣利少用開含閏祇中從四月十六日乃至八月半衆中捨言大德僧聽今日衆僧捨雨衣如是三說餘用不犯尼無過前用罪今言吉羅者結多罪少利故輕過前受急施衣過後畜戒二十八此亦二戒共為一戒若過前受過後畜俱犯捨墮同由急施衣生是以須合若非急施安居未竟佛不聽受受得吉羅五分成文佛既制竟後因梨師大臣請僧安居忽命征討捨物施僧如安居法諸比丘等以安居未竟不敢輒受佛為利益施主及閏比丘開時前十日內受不犯吉羅因聖開受故知是急施過前而受違返兩教長貪處深故得捨墮過前受別緣具五一是急施二知是急施三過十日前四無因緣五領受便犯過後畜亦五緣成一是急施二知三十日內受四不作淨五過限緣起文三初至夏衣開受夏衣二時六群下因前開故安居未竟逆受夏衣佛即呵制三爾時世尊已下若是急施聽受無罪既開十日內受應有過十前受呵而制戒文略故無戒本五句一犯人二受衣時限故曰未竟夏三月非急不聽故次第三諸比丘下是急聽受四受衣已已下開時畜無罪五若過下結過後畜提又於前緣起中並無兩罪戒本但有過後畜下廣解及開具有二罪文言十日未竟者謂舉是以明非以十日內受者為是明知十日前受者有犯即非文言乃至衣時應畜者舉後以釋疑但有過後畜即無過前受二事不並故爾下廣解中昔言略不釋第二餘四悉解今辨具釋初五別解中三合釋合釋中三一先解第三急施衣二衣時者下解第四衣時之言三自恣十日在下舉此三句合而廣釋既言自恣十日在豈可不是戒本第二句十日未竟夏三月耶自恣十日在者謂七月六日受者去十六日自恣非時分中慗有十日在下十五日受衣明日自恣者謂去十六日自恣非時分中但有一日故言明日自恣今是初句故言不受德衣一月受德衣五月問泛爾長衣十日不說越十一日明相出便犯此急施衣七月六日受十日無罪入十六日明相應犯何故乃言一月五月應畜不犯答長衣不與時分接者但有前開無其後開是以便犯此急施衣十日受者是其前開入十六日復是後開兩開相接越此分齊是以無罪若爾七月十五日離衣及安居明相未出未成破離入十六日復是合去之限應無破離之罪答夏衣但有後開無其前聽以十五日夜猶須界內守夏護衣故是故不類次第句問一月衣攝十日共為一月德衣攝迦提月以為五月何故此中迦提德衣不攝十日過一月五月竟更增一日者何答一月攝十日者一同非時位二俱唯防長功能處齊以長收短故得相攝德衣攝迦提月者一同時位二俱得五利功能處等亦以長收短故亦相攝今德衣迦提不攝十日者一十日衣是非時分迦提月等是時分但時非時別何容相攝二來十日衣唯一長利迦提等月得於五利功力寬狹故不相攝以不攝故更增一日乃至九日若比丘下解第五結犯雙制二罪若過前受即坐還之若過後畜准十日衣說此急施衣二事不並但還衣言若過前若過後者出法之言無有一衣具斯兩犯也下不犯中初總開二犯二別開兩𠎝先開過前次過後離衣六宿戒二十九此戒同異如前已辨但前戒聚落清夷一宿即犯此蘭若險怖過六夜犯前是常流人有德衣開此是有難又兼勝行不受德衣但有迦提以非作故此亦開限別緣有七一受持三衣二冬分非時故律云夏三月竟迦提月滿三有疑怖處四置衣聚落五不捨會六無因緣七第七日明相出犯緣起文二初至舍內有賊難故開置舍內二六群已下因前起過以其六群一非久住蘭若又無恐怖亦我前教寄衣離宿故文言我聽比丘在蘭若乃至遊行離衣宿既因六群設若蘭若但開六夜過則便犯戒本五句一犯人二明非時分甄去時分不犯三在蘭若已下有疑怖處四在如是處下開置舍內六夜一會五若過下結罪多論有病得僧羯磨亦無過六文略不彰問外難何故定開六夜內病因緣直作羯磨不局日限者何答外難進否不可得知故須定言六內病差否義在易知故以病差為期不須定限若爾七日藥亦應差否易知而定言七答藥之功能七日一變七日內來有療患之功依藥勢力故定七日如祇律說廣解略不釋二句可知蘭若已下解第三舍內已下釋第四祇律送寄可疑家若比丘下釋第五句文五如上見論長在蘭若房舍堅牢不聽寄衣不牢聽寄二者三月在蘭若不牢亦聽寄衣六夜也有若干界故須手捉若但一界石處無犯回僧物戒第三十所以不聽者出家之士理遵少欲知足為懷聞他居士許施僧方便勸化回來入己內長貪結外惱施主又復損僧殊所不應是故聖制別緣有四一是許僧物二作許想三回入己四領受便犯滿足戒本四句一人二知三許僧物四回向已犯下文略不解第二句亦可初三別解二四合釋初句可知僧物已下解第三三句之物回有重輕初物犯捨第二物回之無罪下文未許許想吉故知未許未許想無罪第三物定屬僧物回入犯重此之三物相對故來越次差會定屬之物又復越差事專由己一向計直犯重若比丘下解二四兩句犯文有三初正解回入已提二若物許僧已下四對八句明回不入己所以犯輕一塔僧相對二四方現前三僧尼兩衆四料簡上三同類同類回此與彼故言許異處與異處三境想四句一提三吉據本迷故又此境想唯約初文回僧入己者說也捨懺如常但還物之中四五十三律捨竟自用不須還僧以不定屬僧故祇律五敷具回僧對僧捨入僧已隨僧作何等用多見兩論捨竟還僧不還犯重了論回僧所應得施入己應捨還大衆寶永七寅八月九日照山晃寫
