body:
  text: 受漏心男食戒第八凡結患之重莫過情欲束心謹意猶恐不禁豈況知他有染縱心而受既荷其恩脫有陵逼事成難免損處非輕故須聖制別緣具六一男子二人男子想三染心與衣食四知染心與衣食五自有染心六領受入手犯戒本五句一人二尼有染心三謂前境界染心男子四從彼受下所受食等五結罪辨相具釋若比丘下解第五結罪於中四句初當趣重輕二天子已下異趣三染心女人下形報四境想四句不染汙心者謂俱無染染汙心想者尼謂彼男有染心與橫想故吉下疑亦爾若作偷蘭解時不染汙心謂前境無染尼自有染染汙心想者謂男有染施與衣食心重故蘭下疑亦爾略無人男人男想等比丘吉羅者義能自故得輕罪十律有尼上因是尼故與尼僧作食偏與所愛尼食受者蘭五分有一尼有染著心從一染著心男子受飲食受已生疑我將無犯僧殘即持與餘尼餘尼問此美食何故不敢具以事答餘尼言汝所畏我亦應畏白佛佛言有染心受染心食不食而與他食皆不犯下戒本言自手受染心男子食食僧殘准此文時要食方犯比丘受染心女食不懼陵逼故犯吉羅勸受染心男子衣食戒第九制意有三所以不聽勸者凡聖人制戒有益無損何得輕爾不思勸人為惡令他得罪己自招𠎝人我兼損理所不許二解同犯意正由言中厲他勸彼為惡復即謗佛不懼聖教所為過重故亦犯殘三解雜為二意前身業犯呰業違又前得衣食此全不得又謗不謗殊故為兩戒別緣具五一人男子二染心與衣食三知彼染心與衣食四發言激切強勸合受五言章了了犯殘佛恐難固制而勿受今擊彼言以時但受能那汝何此是勸彼謗聖之辭戒本二句比丘解事勸悕故吉五分勸受語語僧殘十律若俱染勸受殘若尼無染勸受蘭祇律雖可教受染男衣食未犯惡更有善好尼勸諫莫教他受染心男子衣食不受此諫方犯僧殘下有八三諫戒前四同僧得罪處齊直列戒本各違當部下四不同一一別制習近住違諫戒第十四制意有三一解不聽習近意制二人為伴欲使遞加禁勒斷惡脩善今乃私情交密染心共住互相䨱藏心無愧恥內自壞行外累佛法可患之染故制不聽二解諫意倚傍聖教制二人為伴何得大姉諫我使別即是迷於佛教不曉制意須僧說諫開示是非欲使前人解制二之意便脩其善汝今二女返作惡行不應共住令彼改迷捨配就正故爾三解結罪意僧既設諫是非灼然固執己心不肯從勸違法惱僧故結僧殘別緣具六一是染心習近住二尼眾勸使別住三倚傍聖教不肯別住四如法設諫五拒而不從六三羯磨竟戒本五句一諫所為事謂習近住文有五句下文具釋二是比丘尼屏諫方法下三可知辨中略不結教人罪謗僧勸習近住違諫戒第十五制意有四一所以不聽勸人竟凡是非交濫相則難分愚者不究其言謂之為是理相獎導捨惡脩善今反助火益薪更謂彼惡復即謗僧事惱非輕故不聽勸二解諫意勸他別住跡涉愛增故致言謗相濫難分須僧自理諫彼鄣己內無怖瞋令彼體知改迷從正故爾三結罪意有三種過一勸他為惡二非理謗僧三固執違諫總重情深故制同犯四離為二意者前戒諫自習近住此戒諫謗僧勸習近住又諫辭有殊故為二戒別緣具六一前尼習近住二尼僧諫使別住三謗僧勸習近住四尼僧如法設諫五拒而不從六三羯磨竟戒本五句一諫所為事二屏諫文三一諫莫謗僧勸他習近二今正有已下明推過屬彼顯謗勸非若此已下別住有益彰己諫意下三句可知辨相具解瞋心捨三寶違僧三諫戒十六制意有三一凡出家之士正以三寶為心何乃因於小事內懷瞋忿輙欲棄捨真途歸投耶住自墜義深理所不許二諫意但女近見不及遠聞出家名同謂梵行亦齊迷心將趣可愍之甚須僧設諫使耶正理分改惡從善三結罪意僧諫理分耶正兩別仍守耶心堅執不捨故制殘罪別緣具六一因事瞋恨二背此向彼三發言捨三寶四尼僧如法設諫五拒而不從六三羯磨竟發起四諍謗僧違諫戒第十七有三意一四諍之興乖理違和備德斷理諍事消殄女人見不及遠妄別引比類謗僧發起使鬪諍還生過損非輕故制吉羅二解諫意但治罸之時一作罪處所滅一作憶念滅跡涉僧愛似有不平須僧自理諫彼彰己內無愛憎之意三結罪意僧諫理分宜自改自心故違僧命堅執不捨故結僧殘別緣具六一已四諍事二僧如法滅三謗僧發起四尼僧如法設諫五拒諫六三羯磨竟戒本五句一諫所為事四句一人二已諍事三所謗僧四有愛等謗僧之辭二是比丘尼下屏諫文三可知餘三如常辨相具解三十尼薩耆法一百七十八波逸提雖捨不捨異罪性約等故二百八戒合為第三篇先解三十一總解二別釋總解中十門一與單提捨不捨異二犯人多少三自作教人四身口五性遮六重不重七捨懺方法八持犯方軌及二門之意九二部同異十尼下二眾任運有無初門者單提之中且據相顯而言有三十八戒濫故須定內資十一謂僧十三食戒如讚一背別二足非殘不美藥酒虫水於十三中除讚背足美四復加二不同謂背及食䔉故成十一外財二十七同戒有七謂僧十一如脫着真自等四高牀下七此十一中除三過量可角針筒故但有七不同二十謂水扇生聲同牀同被褥作衣過五五日不者大衣著他衣紡績取衣不為受貯跨衣十畜女嚴具持蓋不著祇支及七塗身二十是中三鉢真實淨主牀被他作衣衣過五日此六闕初緣故次十內資戒闕於第二餘闕第三或可闕初推尋可識第二門常住不犯現前僧者唯犯二寶一人盡犯但同生人不共犯九謂於十五之中同戒有六如離衣一月過知足乞鉢七日藥奪衣等是不同有三謂長鉢十六枚病衣此不共犯餘客共犯不共之義可知第三自作教人教人同戒有三謂受寶奪衣乞縷不同有一貿衣還奪合四教犯餘無可知然復位判乞縷一戒事專使人中犯受寶二奪衣事通於二餘二十七悉自作犯捨第四身口者位二謂四互用戒病衣此五身業犯餘通身口於中分三離衣一戒身口作業共身犯第二六過非時攝施此七口止共身犯第三餘十八戒口作業於身犯分三第一乞縷一向假他身業犯第二受寶二奪若語自作是身業若教人自口假他身第三餘十四領受不同戒有三謂五乞重衣輕衣十一同戒此等自口身作業假他身業犯第五門全無重犯如一離一作謂乞縷一違開謂非時攝衣一違要是病衣四个一二奪無重五六過無重過十五領受三異餘同此等無犯也若六門同戒迴僧及四五同此之五戒性惡氣分餘悉遮第七門捨懺方法位亦有四一捨財唯無綿褥其餘四捨約境物處法等四准上可知第二懺罪亦四如上須知財物現不現及懺䨱及著嘿等多少如上第四不還結犯亦如上但第三還中三門一約捨心差別除二寶不對道故餘二十九長等六戒謂長衣一月衣七日藥急施過後畜長鉢十六牧逕宿方還餘二十三等即坐聽付良以長等咸胄相續貯畜方犯若欲捨時要須逕宿事隔表畜心斷故不得即日歸主若當大眾難集遠行緣等聽即日轉付二捨之離合別別捨者還否如上儻或合捨二三四五乃至多等還法如何若欲辨釋先束前六以為四位三長為一長鉢為一長藥為一十六為一若餘二十三共長等或一二三等合捨者有其四戒即坐付主謂離五衣乞鉢病衣亦乞等是餘之十九相從逕宿所以此四即還者以病衣若說淨物作不應入捨者明長不染以各別用故五乞蘇油外內資異故亦即還餘二可知若以二十三長鉢合捨唯留乞鉢若與餘二位合捨二位須留餘二十三並即還主三正辨還法准大僧中說可知第八門持犯僧八戒中除於二六長鉢等三但有五同今加十六枚及以長鉢故過等七戒具兩持犯餘但止持作犯二問之義如上所論第九門同異者十二不同位可分三病衣有無長鉢緣異餘十輕重第十門六過之中除藥但五及四教人合有九戒容任運犯直列戒本後十二戒一一別列五乞蘇油戒第十九凡物要用為貴辨之不易得已還棄更索異物志性無恒長貪惱境招譏不輕故結其罪別緣具六一是非親里居士二為己三曾前索得蘇油四不用還主五更索異物六得物入手犯若乞得蘇無提舍尼罪由食生既不食還主何得有罪過若有病及因緣乞衣藥無直乞過但有五乞之𠎝若有直罪乞時何須結彼五乞之犯戒本三句可知辨相具解互用說戒堂物戒二十自下戒皆是互用總解制意凡篤信捨施情期有定理宜稱施而用事須合當今轉為餘用乖本施心致招譏累又長貪結自壞處深故所以制四緣成犯一施現前僧說戒堂直甄去四方僧堂直迴用犯重不犯此戒若示何故呵言施四方僧者解言下施別房彼亦呵言施四方僧以斯文證故知居士過分呵責非四方僧物二知施說戒堂直除不知不犯三受得屬己四轉異用便犯戒本三句初句可知二施物作堂直三異用結罪施堂直作五衣入捨施作衣迴作堂不須入捨汎舉五義故爾列三僧物是此所迴次食及堂房物亦同此下之三戒悉具四緣唯以事別為異迴現前僧食直用作五衣戒二十一若居士靈心施作食或自乞得食直迴用皆犯五用別房戒二十二互用現前僧堂戒二十三居士好心施作堂直及乞得堂直異用皆犯畜長鉢戒二十四制意同僧別緣具五一先有受持鉢二更得鉢三如鉢四不說淨五過宿明相出犯若解衣與大僧同開十日鉢不同者如前所說戒本三句辨相具釋可知五分聽畜七種麤鉢一盛飲食二盛香三盛藥殘食五除唾六除糞掃七除小便過畜十六枚器二十五凡事用供身得濟便罷今十六枚外過畜盈長長貪妨道增結招譏故所以制四緣成犯一先有十六枚器杖二更得器三不說淨四過宿明相出犯十六枚者二釜二瓶及以四蓋四瓫四拘五分唯聽畜盛蘇油𥦨香藥醬酢各一瓶又聽畜釜鐺杓各一許與他病衣後不與戒二十六有漏之身盈流無恒須衣遮鄣寔為要用先許濟他後違然諾言行乖爽非出家法體又闕彼人鄣身要用事甚相惱故所以制別緣具五一是病衣簡餘物輕二先許他三前人來取四無因緣謂前尼破戒見等舉𢷤及由生二難等不犯五不與便犯非時攝施戒二十七此謂攝安居僧得施物善見要安居竟者得攝此物未竟不得佛既賞前安居人得物界內時中直爾攝取事順應法不生罪過若至非時分直攝違教事不應法故須制犯捨當攝此物時界內盡集無乖別之心故不犯盜五分諸比丘尼非時衣作時衣受法客尼便不能得衣佛即呵責故知非時作法攝衣犯四緣成一犯是安居僧得施物二入非時分三不作非時法分四直爾攝取便犯戒本三句可知不犯中非時受非作時衣時衣受作時衣十律雙結非時衣受非時衣主尼過時衣受作非時衣客尼犯貿衣已後強奪戒二十八凡價限已定事決交判瞋恨強奪不以道理情相惱競非出家之戒故今聖制別緣六一共相貿易二決價三價直相當四瞋心強奪自作教人五無因緣謂先借衣及舉等緣六得物入手戒本三句可知乞重衣戒二十九與前非親理乞衣有何殊狀別制斯戒答有三異一前戒直乞犯自恐請不犯就此自恣請中過分索犯二前戒乞得一條犯此十六條犯已上犯三前戒除親此戒親非親俱犯有斯三異故別緣五居士自恣請二乞重衣三過分索謂過十六條四為己五得物入手犯緣起文二初非親自恣請過分索犯二親里自恣請過分索犯戒本三句一人二明開乞四張疊不犯三過分索犯乞輕衣戒三十制意犯緣悉同前戒唯以輕衣為異輕衣者疎衣也自下一百七十八單波逸提法總為五門一自作教人二性遮三持犯四二部同異五下二眾任運初門自作教人其位有四第一有二戒專是教人業謂教人誦呪術戒第二於僧二十二中除六謂與尼衣動足鍼筒及三過量餘十六中但十一戒自作教人彼我同犯謂教人掘壞等第三同戒有五謂二臥具高羅浴不同有六謂五塗身安居中牽他出房此十一戒自作正犯教人同不同都合三位有二十四戒有教人義第四一百五十四戒自重教輕第二門性遮者合三十六戒性惡氣分謂同戒二十九除呵教授師一不同有七如洗淨等三夏中牽他出房習近居士子違諫罵比丘罵尼眾等是餘皆遮惡第三門持犯位可為三第一有二十三戒具二持犯同戒有九於十三中除教誡尼二足背等四不同十四謂輙有士如坐去一對宿去二對開藍門三對著他衣破癕四對突入僧寺問義五對夜入聚落一三時遊戒有一不攝耳是不同十七其受戒有五謂取衣不與受不與戒又受二歲六法及本法逕宿等違教有五謂不請不聽不恐不依安居不禮等不為他滅淨不結安居被擯不去不以二法攝受不看同活尼病安居竟不去不送婬女五六由旬等作則是持止則成犯第三有一百三十七戒止則成持作便是犯五十九同餘不同戒第四門同異就不同戒中洗淨等三有無與外道食等四犯同緣異餘是尼重僧輕戒重輕雖等罪名有別如剃毛戒此等對文便釋第五門任運有無謂於前二十四教人犯中取十一一向犯者及高羅洛安居中牽他出房合十五戒等此有任運犯義除二呪術屏露二臥具五塗此九即非餘非可知前六十九與大僧同直列戒本餘不同者次第而列食䔉戒第七十出家之士宜斷五辛香潔脩道今貪味食䔉使臰氣外勳招譏損道過是不輕是故聖制三緣成犯一是䔉甄去餘辛所以食䔉重者一有美味尼吉貪食二勳中之極故所以重二無重病因緣三咽以結提五分唯生䔉提別三處毛戒七十一自下四戒皆是長養愛欲方便招世譏過鄣道處深故所以制比丘患微貪故結蘭洗淨過分戒七十二用胡膠作男根七十三共相柏七十四五分若出不淨蘭供大僧水扇戒七十五大僧與尼男女相異供給水扇生染穢跡涉譏醜故制提罪除瞻病僧供給尼希故得小𠎝乞生穀豆戒七十六出家理宜乞食資身無事脩道今乃乞生穀豆事務紛多廢修道業又長貪結惱亂施主是以聖制除親里或從出家人乞或為他乞或不乞自得並無過好生草上大小便七十七一切草木人及非人俱有受用以不淨汙穢招譏處深故制不聽除病無犯不看墻外棄不淨七十八觀者伎樂七十九觀伎蕩逸妨脩道業動越威儀汙辱僧眾四緣一種種戲喚二方便往觀三無諸難緣四見即成犯共男子人屏鄣處立語戒八十男女形別理無參涉共入屏鄣容生染患遠成大惡招譏醜累清白難分如斯流類制意悉同五緣成一人男子義應通道五分入屏處戒入露處戒遣伴耳語戒對比丘立三白衣外道立三都有六戒故知此言人男子者明二道男等亦犯餘屏等戒人男並同此釋二離見聞屏處三無第三四無因緣病及力勢二難等不犯五立語便犯既離見聞又無染心立不語吉羅假犯提若有染心落前八事比丘吉羅者既非處語所以不犯麤語殘而言犯吉前以染心惡語故殘此戒無染好語招譏故告下比丘犯吉類同此釋共男子人屏鄣處戒八十一前戒離見聞復假語犯此䨱鄣屏不假語犯五緣成一人男子二䨱鄣處三無第三人四無病諸難緣五共入便犯文言立住吉者以不行故犯輕若坐犯共坐提遣伴遠去與男子屏處立耳語戒八十二此亦離見聞屏唯以遣伴違去耳語為異五緣成一人男子二離見聞屏三遣伴遠去謂離伴見聞處四無難等緣及伴舉擯等五立耳語便犯入白衣家生坐已不辭主人去八十三出家人者三界之賓不辭主人跡同賊相違於客禮殊所不應又不付囑失彼牀坐損惱主人故五緣成犯一白衣舍二不語主人在好牀座座三不辭主人四無因緣五出門便犯輙坐他牀戒八十四不語主人輙生他牀特乖法戒故所以制五緣犯一是白衣舍二好牀坐三不語主人四無因緣五坐便犯白衣舍輙宿戒八十五不語輙宿跡同賊相致彼言謗莫能自拔故制不聽五緣成一白衣舍二不語主人三敷臥具四無因緣五隨轉側犯共男子共入闇室戒八十六前戒亦是䨱鄣屏有光明故無第三人犯此是闇室生患處重雖可盡日有眾多人猶犯以斯為別四緣犯一人男子二闇室無窓牖光明三無因緣四入即犯不審諦受師語語戒八十七聽若不審必有謬聞之過錯傳之失即是內心麤稟外惱於師珠所不可故四緣犯一師如法教二不審受三說言師教我偷四言章了了瞋心呪咀戒八十八然修道之人宜發善願自度度彼人我兼益今呪墮三惡不生佛法垢鄣尤重深以制三緣一有瞋心二呪咀三言了犯便因諍瞋心推𮌎啼哭戒八十九瞋忿結恨廢脩正業故五緣犯一因諍不善憶持二瞋心三推𮌎啼哭四無因緣五隨推及淚墮犯無衣同牀臥戒九十二人同牀容生染習自壞心行脩道又難故四緣成犯一同牀臥二露身三無因緣除病二難等四隨臥犯同被褥戒九十一制意同前有同牀不共被褥前戒是或同被褥不同牀在地敷上臥者是有斯殊狀故別制此因緣同前戒以被褥為別口業惱他戒九十二故相惱嬈彼我俱損其過深厚故所以制四緣一前知先住後至二作故惱意三在前誦經問義四言辭了了知他先住即便後至知他後至即便前住為惱故口業相惱下不犯中若先住者從後至受經開初句若後至已下開第二同活尼病不看戒九十三病人苦惱若不瞻養容壞善心損害道器又違慈行無愍物心故四緣成犯一是尼同活三無因緣謂自病二難等緣不犯四不看便犯五分是同學恨情重故謂同和上闍梨及常共伴安居中牽他出房戒九十四先聽在房後瞋駈出自客獨宿惱彼還俗故所以制五緣成一是僧房分得屬己二先聽房住三瞋心牽出四無因緣謂破戒舉擯等五出戶犯問大僧輕者比丘前牽得持其故何也若比丘前戒謂春夏僧房俱有受用牽出惱重故犯提罪尼亦同犯此夏分屬己彼無房分惱微故輕與尼不同若爾尼房屬己何故偏重僧有二義房分二無獨可犯惱微故輕尼據彼人無分應輕不那則有獨可犯致惱還俗故得提罪三時無事行戒九十五出家脩道息緣靜慮無事遊行妨脩正業復斷生命違其慈道招譏自損所以聖制昔解破安居行犯提春冬無緣行吉羅今解以緣本廣解三處文驗皆云春夏冬遊行犯提若夏行便犯春冬輕者廣解應言夏行越界犯提然言春夏冬遊行隨越界提故知尼三時無緣行提有春冬小罪者如掘地壞生自作教他俱得提罪唯教人中開知淨語豈可自壞不犯故此亦爾但破安居吉羅行則犯提以其破過義微不癈脩道故犯小罪行中過聞故犯波逸提問尼不結後重所以破中前後並吉解云不結前者猶有後結故輕不結後者更無結法故重若爾破前有後可結應破後安居輕破安居後無後可結亦應犯重解云結有時限故有輕重破無時限乃至七月十六日亦有破義故一品小罪別緣有三一春夏冬遊行二無因緣甄去受日乃春冬有益等緣及二難緣三隨所越界受請安居竟不去戒九十六篤信檀越請僧供養夏限已滿久延不去過受他食長貪惱主敗善增惡故別緣具四一受請安居二夏已滿七月十六日亦可隨前後為准三無因緣謂病二難無伴等四不去便犯謂逕宿明相出文中略無亦可據心若非受請處不犯祇十二律不問請不請處住俱犯提邊界恐怖處遊行戒九十七邊界逈嶮無故遊行容壞命行招譏累故四緣一邊界恐難處二無請難等緣三在中行四越界犯他境內恐怖處遊行戒九十八制意犯緣同上居士子習近住違諫戒九十九不聽習近意一男女形殊理無參涉共相習近客生染漏遠成大損故制不許違結小罪二諫意祗律與白衣及外道并沙彌習近住或竟日或逕須臾犯提而無羯磨諫法此律今以倚傍聖教有淨施主檀越又見俗人善言慰喻堅執謂是不肯別住將墜於惡事是可愍故須設諫開示是非欲令識是遵脩曉惡棄捨三結罪意眾僧設諫是非既分違反聖教不肯順從故制提罪問前與女人習近違陳罪重此何以輕解言前有染情又復心虗故重此無染心謂已為是心實故輕別緣具六一與居士子習近住二尼僧勸別住三倚傍不肯別住四如法設諫五拒諫六三羯磨竟提分文如上比丘知解為之義希故吉觀王宮園林浴池戒一百王宮綺麗精華所縱觀蕩逸廢脩正業又容染著世事自壞心行故所以制四緣一王宮薗林浴池二方便往觀三無因緣四見即犯五分發心及方便吉行步步提下不犯中先開觀王宮初明心宿或因請有難等不犯二若為僧已下開為取書堂模法不犯若至僧伽藍已下開觀薗林等不犯亦二可知泉渠水中露身浴戒一百一漏形須鄣招譏損道故四緣一河渠水二露身洗浴三無因緣謂強力執不犯四澆身遍犯過量洛衣戒一百二制意犯緣同僧唯名浴衣為別又用無限時中縫僧伽梨過五日戒一百三貪受五利久延而俗某急從奢非是翹懃之行又致衣財散失惱損非輕五緣成犯一與他作衣二是時中三縫僧伽梨四無因緣五過五日不成理應明相出時犯文略滿足戒本一人二縫僧伽梨除餘衣三過五日除緣言除求索僧伽梨或作衣人無大衣不成受德衣故無過罪或衣主求未足故亦無過餘可知五結犯過五日不看僧伽梨一百四僧伽梨價重營求叵辨久時不撿事容損壞僧伽梨闕資受用事惱非輕三緣成一大衣除多等輕二舉處不堅牢三過五日不看犯亦應明相出犯文略十律五夜不看五衣提與僧衣作留難戒一百五脩道立行無祈蓋物虔心奉獻讚譽助喜今反慳惜他物令不施衣彼此俱損失利之重是以聖制緣具四一施主施許衣食二知許施衣食三勸不施衣四施主受勸息心便犯輙著他衣戒一百六輙著他衣似同賊相青自難分致招囂坌前人謂失惱主之重聖所弗許故制提罪三緣一是他衣二不問前主三輙著犯文言入村乞食舉著者意不必要入與白衣外道衣一百七白衣外道非真福田躬持衣物授與於彼生人或倒謂外道是勝出家不如損處不輕故所以制四緣犯一非親里白衣外道二是沙門衣三持與彼四前領便犯不開置地者沙門衣體與外道別若置地使人猶招譏損又是別屬理無通用是以不開食無別狀又是味通故所以開僧眾如法分衣遮令不分戒一百八如法分衣理宜詳遵許無乖礙為弟子故遮僧分衣僧貪惱眾非輕故制別緣具五一僧得施物二僧如法分三是時謂比丘尼眾集時四恐弟子不德遮不聽分五不分便犯戒本四句一人二作遮意三僧如法分衣四遮分得罪辨相具解初三別釋二四令解下不犯言或非時者謂比丘尼未集時有沙彌白衣時非一月五月外遮僧出功德衣戒一百九詳心和同出功德衣脩道急務理應欲填為貪五利遮令不出增結惱僧情過深重今聖制四緣成犯一先受德衣二時中如法出三為利故遮四僧不出犯捨衣單白但可三非二似者誤若據五分白二捨者五非無妨文言非時者謂過五月竟故眾僧欲出功德衣遮令不出戒一百一十制意犯緣同上前戒現遮僧不出犯此戒當遮言了了犯者有斯異故別制此戒亦有人言此口業遮故了了犯若是當遮者何有五非前戒身遮謂身在申手水外相故不言了了可如是今且從前說不與他滅諍戒一百十一凡脩德之人有諍須滅使消殄和合眾法成立竟不為滅令諍增長到惱還俗損處非輕故別緣具五一是四諍二前求請滅三有解堪滅四無因緣若前人有舉擯及二難等不犯五不為滅犯戒本三句下解第三有三一他尼諍二己身諍三下二眾比丘吉羅若言不行者不行我言教故與白衣道食戒一百一十二制意犯緣同大僧此是犯同緣異戒唯白衣亦同犯提別故與白衣作使一百一十三出家尊貴為下人筞役令彼輕薄汙辱僧眾妨脩癈業損處尤深故四緣成犯一是白衣二非法作使三非父母及有信憂婆塞病等或強力緣四隨作便犯自紡績戒一百一十四躬自紡績道之大患又招譏累非出家法體故四緣成犯一十種衣縷等二自紡績三無因緣謂自業綖無犯十律若為縫衣繩綖乃至六兩不犯四隨引手犯著俗人衣輙坐臥他牀戒一百一十五在他夫妻常居之處輙爾坐臥容生染情自壞心行譏累不少故四緣成一是白衣舍二是夫妻常居止牀三無因緣除病及二難等故四隨坐臥犯逕宿不辭主人去戒一百一十六前書日不辭此逕宿輙去制意同前四緣犯一語白衣主人在舍內宿二不辭主人三無因緣謂舍崩壞乃至二難等四出門犯自誦呪術戒一百一十七脩道立行要假正法軌生真解今棄捨正典誦世呪術多喜染著妨崇正道三緣成犯一世間呪術二無因緣謂自治病等三言章了了教人誦呪術戒一百一十八若誦法同應合為一今約自他業異又復前自誦中四不犯一冶病二學書三析伏外道四護身教人誦中全是不開故離為二餘自他業趣就一義不須互決度任身婦女戒一百一十九出家僧眾須避嫌涉長他信敬理亦宜然今知任身度令受具後方產乳醜累三寶故別緣具五一是任身二知三為受具足四和上尼五三羯磨竟餘非根本故犯輕𠎝此等三羯磨謂大僧中三羯磨比丘度此女為師犯吉度乳婦女戒一百二十制意犯緣同前唯以乳為異五分白二羯磨差一尼伴母不犯十律掘多尼生男佛言與獨房白二又聽自觸餘尼不得又聽共宿若更有者亦應如是度咸年童女戒一百二十一制意犯緣同大僧中無別唯以童女有二歲學戒為異問女人所以有學戒法丈夫無者何也一義女有懷妊之過故須二歲學戒淨其身器丈夫不爾故所以無十律因和羅尼失夫失財故其胎消瘦受具已歡樂肥故腹遂漸大白佛佛言應與二歲學戒知身有無又一義為彰女人煩或垢重入道則難要知學法進道有由故丈夫因善既勝堪即立行不須加學制緣文三一起過二呵責三告諸比丘下正明受戒法中文三初度沙彌尼法二自今已去下式叉法三彼二歲學戒已下制年滿受具前文中三初至三說明受戒法二次與受戒已下說相護持三是為己下總以結勸就初受中文四義二言文四者初至白如是形同單白第二作如是白已已下制髮與第三若欲出家下法同單白第四作是白已已下受戒與前兩一對為欲形同次兩一對為欲法同是義二也初欲同者同點服改依清淨居士子度人經法先請二師已下剃髮處七釋置壇又置三座擬二師及出家者坐鳴槌集眾著本俗服拜辭父母口中說偈言流轉三界中恩愛不得脫棄恩入無為真實報恩者乃脫俗服著泥洹僧僧祇支未得著袈裟入檀闍梨作形同單白文中分二若欲寺內等者舉其處事制令作白其作法方便如常可知白法如文須白意者如受戒中說闍梨敬禮十方佛復說偈言歸依大世尊能度三有苦亦願諸眾生普入無為樂令復坐已以水灌頂口說讚言善哉大丈夫能了世無常捨俗趣泥洹希有難思議上來第一文竟自下第二剃髮與傍人讚誦出家唄嘆毀形守志節割愛無所親出家弘聖道願度一切人五德超世務是名福田供養獲永安其福第一尊闍梨不得剃盡善見留少許使和上剃表為師義故釋論云和上闍梨如母第三法同白法者因師子故所以須為明此人割愛辭親紹繼釋種內軌內飡故曰法同第四受戒與者初結前生後二當作如是已下次為正受文言與剃髮者謂和上剃少許髮也著袈裟已者見論在和上前右膝著地和上以袈裟授與令頂戴供養受已還與和上如是至三然和上為著不得自著師與著時口誦偈言大哉解脫服無相福田衣披奉如戒行廣度諸天人禮佛三拜行道三匝誦自度偈遇哉值佛者何人誰不喜福願與時會我今獲法利次禮師及大眾訖在下坐受六親慶賀出家離俗摽心方外父母尊卑咸應禮拜敬悅其道意中前剃髮即依僧法受沙彌法還詣和上前互跪開曉心懷并嘆出家功德已教其立心斷惡脩善方為三歸受沙彌戒前三方便後三結竟正發戒品前三中一遍文五一我某甲者稱厈己名二歸仗三寶三我於如來下彰己受出離之戒四和上某甲別顯教授之主五如來已下舉三號人簡異耶師第二說相次應與受戒者謂受隨行非受體於中門一總解釋四門分別一發戒多少二對俗罪名有無三對具戒犯名寬狹四先後次第並可知第二別釋此之十戒於中又兩第一通解第二隨戒別釋就通解中五門一身口分別義可為四婬酒香牀非時食此五局身哥儛一戒具含身口妄語口正身兼盜煞捉寶口兼身正二自作教人哥及身五自重教輕餘之四戒彼我同犯盜煞二戒一向同犯餘二妄寶戒同不同三性遮分別四性餘遮故多論云五戒四是實罪酒一遮罪能起四戒如迦葉佛優婆塞以飲酒故耶婬他妻盜他雜煞他人故又以酒故能犯四逆唯不能破僧故與四性同結四持犯分別捉寶一戒具二持犯餘唯止持亦可捉寶望不得自畜亦唯止持五任運煞盜妄寶此四容是餘非可知隨別解中一一有五一舉時分次彰戒所止謂舉所防與以彰止三結以屬人故曰是沙彌戒四審其能否五顯己堪持高牀就體說大有四金銀象牙琉離約人說大復四佛羅漢辟支佛和上闍梨等牀此八無問大小咸不得坐祇律若使沙彌捉金銀吉若見已捉復使從無罪第三總結舉前十數結法以屬人故曰是為沙彌十戒次舉時分次問審堪否次自言能持第二式叉五句初制令舉學二當作如是下教從僧乞三沙彌尼應往下安置處所謂離聞處四比丘尼眾中下堪能者作法五彼式反下料簡此人不同上下一切應學者異下餘者不同大尼第三制滿受具文戒本三句可知准大僧辨相中具約知疑等四心為十六句者是文略不論比丘度此女故吉不與二歲學戒羯磨一百二十二若不與學戒不識戒相廣興諸過隨緣壞行何成師訓攝受之益違教非輕所以制別緣具六一是十八已上童女二不與學戒羯磨三年滿二十四為受具五和上尼六三羯磨竟彼非十八者謂不滿者須滿者謂不須故言彼非十八遂不與二歲學法不說六法名字戒一百二十三不說六法猶不識相壞行違教如前無別故所以制別緣具七一是十八童女二與學戒羯磨三不說六法四年滿二十五為受具六和上尼七羯磨竟戒本文三約人二不與六法三年滿下結犯廣解上三第一可知二若式反下反解六法三若比丘尼下釋結犯句解第二中此六法者謂前四方便後二根本是所學法前四根本非所學法未滿二年更犯輕者缺其學法更與二歲六外犯者但缺行法不缺學法若滿二年犯者亦疑缺學法更與二歲若爾行䨱藏竟犯應壞法答䨱藏隨日治法非盡形行故使日滿不壞前法論其學法盡形非害二歲故犯即壞所以但言二歲者以逼受具故祇八敬一法第二學人受戒明尼受戒法先作聽及三乞與作白三己應順行十八法一坐處異謂大尼下沙彌尼上二護淨異式叉不淨尼淨尼不淨式叉亦不淨三宿處異大尼與式叉有過三夜學人望沙彌尼亦爾四受食異得與尼授食除火淨五生種取金銀從沙彌尼受食六不得說篇聚等罪名七得說罪種八布薩自恣入僧中白禮足已合掌言阿梨耶僧聽我某甲清淨僧憶持三說而去次九十十一十二謂後四夷罪若犯更從始學第十三於十九殘已下有言犯作吉羅懺十四已下若破五戒應隨犯日數更學如非時食停食食捉錢金銀飲酒著華香等是但四缺學異於此律於此四中前一同此下三不同若衣此文如前說度諸遮童女戒一百二十四僧眾清顯要須勝人宗集光益佛法今此女人諸根不具輙度出家汙辱尼眾醜累不輕故所以制別緣具五一諸根不具二知不具三為受具四和上尼五羯磨竟緣起文三一起過二呵責三告諸比丘下廣明受戒方軌自前受戒未撿遮難因此起過立威儀師教撿遮難法與窮滿故稱竪立受具戒此即教授和上對過故立然有已來之別和上對二以一形故對未起非因不齊愸無人教授瞻病亦對已起教授師一作故但撿已起戒師對法以立釋文有三初至如是持受戒方法二族姓女下略說戒相示以勸持三汝已受具足竟下總結勸持文復兩初至如是持正明尼中本法之軌二時諸比丘尼僧已下詣大僧中受具方法前尼本法中具須九法文中略無請和上尼文應可為九一請和上者和上根本不請無本不成受法復無教授隨緣壞行是故須請餘之二師非是正主故無請法又可和上容有轉易故須請之表以為師二安受戒人下置受人處謂離聞處三是中戒師下正明單白差教授師問戒師不差教授所以獨須差也解言教授師出家問難若僧不差無由輙問故須差往戒師在眾何須差往問戒師單白教授撿問何以無白解言戒師在眾問難有眾可白又不差故所以須白教授屏不對眾又僧差遣亦何須白四彼人當往下奉命撿問問中文兩初問衣鉢外緣二妹聽已下撿其內難文三初教如實答二汝字已下正明撿覈難遮略無十三難理應具問不問不得戒故餘遮不問得而小罪三若言無當復語言下教授示知答僧之軌既撿清淨堪可受具為是第五時教授師問已下教授師單白喚入眾法僧既和已是以第六彼即應語言來已下喚入眾教授師代捉衣鉢教禮僧已至戒師前教授師教令乞戒表己懃懃仰馮清眾求哀乞戒第七戒師應作白下正明戒師對眾撿問不得輙示須白和僧諮眾可否第八眾既嘿可彼當語言下對眾撿審難遮有無亦略無十三難問理應具撿身器既淨堪弘道法第九當作白已下正作本法與本法竟雖未得戒以其曾聞羯磨法故置在大尼下坐得聽後人羯磨不犯遮難以不異本所聞故若至大僧中問羯磨眾法異故不得在下坐聽羯磨應著見處一一喚來為其受戒第二詣僧受中尼應結界以攝尼僧見論比丘界於尼非界於尼界上得結僧界尼界亦不失尼亦爾故須結界於中文四一從僧乞戒還是本教授師其乞戒二戒師應作白和僧文中略無三彼當問下對撿遮難文亦略無問十三難身器既淨宜加具足第四彼戒師當作白下正受戒法上來至此受得戒竟自下第二說其戒相文二初明五篇不可具彰略說相篇八禁止持行相二族姓女下四節儉行作持行相前文有兩初總舉摽宗文四可知二別列八戒一一有五初不得作不淨行舉其止持二若比丘尼下彰作犯之過顯前止意於中文三初若比丘尼者舉能犯人二正明作犯三此非比丘尼已下彰其過損三是中下持定時分四不得作法持不者審其持心五能者下自言堪持下七同然唯與別為異第二知足行中亦二初亦總舉彰益文四可知二依糞掃下別列四法初依文兩初制上品一文五一依糞掃衣舉其所馮依體二得出家等者顯其依益三舉時分四問其持心五領受能持第二若得長利已下開於中下准其力分不須問持下三依同爾與別為異第三總以結勸中初結受緣具足二當善受已下舉益勸持三文第一現付勸持文三一勸使領前止作教法二應勸化下脩福智兩業三於佛法中下行成尅果第二餘所未知者付和上闍梨隨時教授第三令受者前去為防護故戒本可知度小年曾嫁婦女戒一百二十五然十二曾嫁婦女堪能一食忍若持成故佛聽許年不滿者不避嫌涉容壞行故制不聽度別緣具五一年減十二婦女二知年減三為受具足四和上尼五羯磨竟緣起法用與童女一種廣辨之中亦應具約和上四心為十六句文略故無問此減十二人受戒已疑為當開數胎潤不答義同前女故文中略無亦可不開謂十二受者已開八年故度曾嫁百遮婦女戒一百二十六制意具緣如前第四亦應具有四戒且略出初後中二可知亦可前制二十減年不得因開曾嫁十二先遮今得意謂減十二者及雖有遮曾嫁處不異應是開受乘即起過是故須制初後兩戒中間二戒以其作過由能授戒人故不得乘因起過故無此制可得言道是曾嫁故不須二歲學法及與六法名耶故使不類度婬女戒一百二十七然此婬女雖先𠎝違理非正鄣度受具已令人嗤毀醜累三寶故須遠去深藏別緣具五一婬女二知前是三為受具足四和上尼文無和上者略五不深藏或不將遠去不以二法攝受弟子戒一百二十八凡為師訓二法攝受濟給衣食免其形苦又悔以法開其心目立行脩道終成出益今不攝受致令弟子形不免苦心迷於法隨緣壞行何成師訓攝受之道患累之重勿過於斯別緣具五一是清淨尼甄去破戒舉擯等不犯二恒隨和上尼除離去無犯三和上有法及衣食四無因緣或以此故命梵難等不犯五不以二攝犯不二歲隨和上戒一百二十九新受戒人創未閙曉隨師諮稟以成己盖輙離師去不蒙訓㢡抱迷自滯違教𠎝深故別緣具六一和上尼二和上清淨有德堪攝謂有法有衣或有法無此二離者得罪三師不聽四未滿六夏依五分故今言二歲者誤亦可不同五無因緣謂由此住有二難等不犯六離去犯不乞畜眾羯磨度人戒一百三十人不自審須僧籌處輙度違教事或多損輕蔑僧眾故制提罪別緣具四一僧不聽二為受具三和上尼四羯磨竟自下三戒並略不約羯磨竟結和上罪緣起文三一無德度人不教授過二時諸下呵責三告諸比丘已下制畜眾羯磨籌量堪否能長道法羯磨聽度問無德乞者僧羯磨成不解言無德度人別可有罪作法成就若爾無德教授亦應成就解言教師無德全無教援尼義故不成差無德和上令前得戒故所以成未滿十二夏度人戒一百三十一復未滿者愴入佛法未多閑曉師德不成焉能攝訓故制不聽與在於此別緣具四一夏未滿二為受具三作和上四羯磨竟二眾和上夏有多少而受戒男女雖齊二十學無學異故亦不同無德度人戒一百三十二自行不立焉能訓導彼我俱損過鄣尤深故別緣具四一無德二為受具三作和上四羯磨竟此戒即是簡愚取知次前簡小取大不以二與攝受簡懈怠制攝受尼損多故此三俱提僧𠎝微故此三眾自壞惱僧過鄣深重別緣具四一實無德二僧不聽三非理謗僧四言章了了犯所以不課者僧知無德永不共受戒無起惡之理故不勞諫父母夫主不聽輙度人戒一百三十四不聽度人謗僧戒一百三十三既有所屬惱境處深復為牽捉辱累尼眾故別緣具五一有所屬二不屬聽三輙為受具四作和上五羯磨竟度惡行喜瞋者戒一百三十五惡行女人情多放逸度令受具猶存不捨行辱僧眾怠性者自惱惱人無趣道之益故此二戒合制前婬女戒公自為非此中惡行偷身外逸有斯別狀故復制此別緣具五一是賊女喜瞋恚者二知是三為受具四作和上五羯磨竟不與學戒尼受具足戒一百三十六學戒成滿專心渴仰悕欲受具反貪供養不時為受持乖師訓攝受之方又惱前人不得正修自壞損他故須聖制別緣具五一學戒清淨滿二年二僧衣緣具三和上尼四無因緣謂前人破戒舉擯二難等不犯故五不為受犯取他衣不為受具戒一百三十七前制和上復不取衣此制依止師許與他作和上受戒不受得罪又取他衣別緣具五一學戒清淨滿二年二取衣許為和上三僧衣緣備四無因緣五不為受犯五分從白衣婦女欲出家者索衣已不為受犯多度弟子戒一百三十八凡度弟子宜有分限多難教授損壞不輕故制一年限度其一過則犯提別緣具五一曾前度人二未滿十二月三更度人四作和上五三羯磨竟文中亦略不約羯磨結和上罪作本法已逕宿往大僧中受具一百三十九即日往者善心相續發戒則易逕宿已往遮難容生善心喜退與戒留難與惱非輕故所以制別緣具四一曾作本法竟二不即日往三無因緣四不往逕宿犯謂明出文無者略五分明相出和上尼提餘師吉教授日不往聽戒一百四十備德之人慈心教受理須敬法重人躬往聽稟令反慢法輕人不受訓道失於法利自墜義故緣四僧所差二是教授日三無因緣四不往聽不半月請教授戒一百四十一不請教授有三種過一違佛敬教二違自誓受戒之心三慢法輕人失利鄣道四緣成一二部眾滿謂下至五人已上減犯小罪二請教授時謂十四五六日說戒時三無因緣四不差往犯向教授請來受戒要往者何解言教授請別為僧無多勞損又是枝條受戒僧眾為於別人勞動不易又是根本重人故爾若爾半月懺悔亦眾為別人何不就彼而請來耶解言受是根本又即日時短與無譏過故須往彼懺是枝條久逕半月若就僧處招致譏嫌故就尼處通重結結罪界別處行之戒本三句一人二立法三若不者下違教結罪其辨相中此及自恣不釋結罪句但解上二初句可知二世尊已下解第二立法句文二初滿和無病廣教授法二若比丘僧病已下咸別多病問訊法前文分四第一尼眾差往有三一聖可舉制二而彼已下制差之緣三佛言不應一切往已下制其差往差往有二可知第二彼當往大僧中下請教授法有三一制請辭次開囑授法三簡所囑人問請教授師僧囑一人為尼請來下自恣法對眾自陳不須囑耶解言教授為欲取法為僧故須請來自恣請求舉罪請一人來舉者見聞不備故對眾說方見聞具第三彼既已下問取可否尅期往法第四若比丘尼聞已下教授迎逆法第二減別多病法可知比丘應往違期故吉不詣大僧自恣一百四十二亦有三過上二如前三既不自恣人多迷己不自見罪惡業羈鄣慢法輕人過累情深故制提罪四緣成一夏安居竟二兩眾俱滿和無病三無因緣四不差人犯戒本三句一人二立法三違教結犯辨中初句可知二時世尊下解第二初廣自恣法二減別多病法前中文三初差法文三如前戒第二至大僧中下對僧恣法大僧集眾不容乖別初列威儀二正自恣文中五句一舉尼安居竟是自恣時故二舉大僧安居竟所以舉二部僧者尼對二部僧恣故三比丘尼僧下正是縱宣己過請見聞疑四大德已下仰馮清眾垂慈誨示五我若見下識過悔除以成晈潔第三辨尼當部自恣時節若不疲惓同日無妨其自恣法一同比丘中法還須差向往大僧中者方行自恣以或永比丘舉故第二減別多病問訊法以大僧不滿多病者尼須一部自恣不依大僧安居戒一百四十三亦具三過上二如前三既不依知法脫有疑滯無𧫎決定之所抱迷闕失利之重故也三緣成一在無比丘處二作不依意三結安居竟犯突入大僧寺戒一百四十四不自而入跡涉譏醜容生大過喜相觸惱故所以制四緣一有比丘伽藍二不白三無因緣謂禮佛塔等及來受教授若欲問法被請諸難等無犯四入門犯罵比丘戒一百四十五大僧上尊理宜祇奉反以惡言呵罵折辱慢法輕人違反佛教四緣成一大比丘二以惡言罵三在聞內四言辭了了上尊罵下受惱義微故唯犯輕罵尼眾戒百四十六因諍瞋忿罵辱尼眾自懷惱他理所弗可五緣成一是尼眾除別人不犯此戒二因諍瞋忿三惡言毀罵四在聞內五言辭了了尼罵大僧別人犯重喜惱觸故罵大僧眾輕以其眾別無相治罸義希故輕同眾相治為數故重若爾大僧同眾治數應重解言大僧敬眾不數故輕尼是少知罵尼眾數故亦提罪不白眾使男子破癕戒一百四十七男女形殊理無交對輕使治療容生穢染尼背請戒一百四十八尼背請之食合制一戒大僧離制此謂離合不同大僧異多同少同少者咸有病開異多有三一背請有施衣開足食即無二背請無餘法開足食即有三背請要背正請受正請犯非正不犯足食足竟正非正俱犯有斯別狀故分二戒尼同多異少異少者背請有施衣開足食便無據是應離同多有三一並有病緣開二俱無餘法開三俱食正方犯同多故合問所以尼無餘法解言女人不食九日命終耐飢苦故無餘開丈夫不食七日命盡不堪故開餘法戒本三句一人二舉犯緣先受請者背請緣次若足食已犯足緣三後食已下雙結兩罪緣起中背請為緣戒辨相及開並雙論二罪亦可緣中受後節會食謂背請方詣居士家食即是足食不犯中合有五句初三五開無背過二四兩句不犯足食不同五分尼有足食勸足悉有餘法若准彼文兩同故合若作尼無餘法故足食吉羅今此單是背請者理有多妨家慳生嫉妬戒一百四十九師得供養彌應助喜反生妬忌輕心汝師慳惜他物垢鄣尤深故須聖制四緣成一施主好心供養於師二內生嫉妬三發言汝師四言辭了了以香塗身戒一百五十出家脩道觀身不淨特生猒離反以香澤塗摩令身香潔躭着情深意存放逸患累之極勿過於此胡摩澤塗身戒一百五十一自下教人塗身立為五戒一戒落後今次第有四使大尼塗身戒一百五十二使式叉塗身戒一百五十三使沙彌尼塗身戒一百五十四使白衣女塗身戒一百五十五若就教人業同邊應立一戒若比丘尼使女人塗身波逸提或就自作戒中合制直言若比丘尼以香塗若教女人塗者提唯立二戒一香塗身戒二澤塗摩戒並通自作教人類如掘地壞生義亦同足今乃約境立多着貯跨衣戒一百五十六出家威儀應生物善著此醜鄣持乖法式畜著婦女嚴身具戒一百五十七畜俗嚴具多生染習鄣道之深故聖制斷著革屣擎盖一百五十八革屣持盖在道而行長己慠情招譏損道而四緣可知乘乘戒百五十九苦惱前境違於慈道故遺教三昧經騎乘車馬除五百日齊一歲三百六十日除十八萬日齊舍利弗白佛言何故比丘乘騎除五百日齊佛言比丘知禁律諸人見生誹謗令他罪故四緣可知不著僧祇支戒一百六十醜相外鄣故一有祇支二不著三無因緣謂病及二難強力等四入村便犯夜入出白衣家戒百六十一既是夜暮容有損敗致賊偷劫清濁難分要白舍主方無𠎝犯今乃輙入輙出患累之深故所以制此二戒合制入出俱犯緣中彰入而還出戒本制入廣解及開雙明入出入具五緣一夜分二白衣舍三無三寶請喚等緣四不語主人五入內犯問此與非時何別答以從囑來不犯非時若不語主人即犯夜入若不囑來但犯非時語舍主故不犯夜入若囑授來語舍主入俱無二過即是囑授不防夜入故全不同出具五緣一夜分二先在白衣家三無三寶等及難緣四不語主人五出門犯比丘解了多白故輕向暮開僧伽藍門戒百六十二暮輙開門喜增姧盜入出無節深違眾軌別緣五一向暮二藍門已問三不囑授四無因緣謂火賊諸難等不犯故五出門犯日沒開僧伽藍門戒百六十三前戒日未沒故稱向暮此戒沒後故有差別又對與不同具緣同前准日沒為別一不安居戒百六十四夏中遊行不結安居違教妨脩招譏汙辱從四月十六日訖五月十五日來為前五月十六日是後不結前輕有後可結故不結後提更無結日故別緣具三一後安居日二不結三過後安居日度大小便常滿人戒一百六十五帶病度之醜累三寶故五緣成犯一病二知三為受具四和上五羯磨竟自下度人犯緣悉同度二形人戒百六十六形俠兩境鄣不發戒無安置處故制不聽度二道合人戒百六十七度負債病人戒百六十八此二戒合制誦呪為活命戒百六十九前戒為棄捨正典誦世呪術不為活命此戒為活命故異四緣一世俗呪術二誦習為活命故三無因緣四言辭了了以世俗伎術教授白衣戒百七十前戒誦習呪術以此陰陽吉凶教授白衣又前開四種一治病二學言三降伏外道四護身教授白衣全無是開緣中先教不應謂向日月等次又言已下教其所應別緣具三一陰陽吉凶等與二教授白衣三言辭了了戒本三句一人二教授白衣三結犯辨相初句可知伎術者下釋第二文分為四初舉緣中教不應作文故日伎術者如上說二欲若說下列如來塔等不應向之舉是顯非反前第一三又言今日下舉前教授中應作之文四應語言宜入寺下舉是顯非反前所應彼比丘尼下解第三結罪被擯不去戒百七十一既被擯治祇命而出仍故不去違法惱僧餘六羯磨治又就寺折伏不駈離處故無不去之𠎝一被擯治二不下意求解三無因緣如無伴水陸道斷二難等不犯四作意不去輙問大僧義戒百七十二大僧上尊諮問先啟今不請輙問輙慢法輕人遞相窮結令被增惱故一大僧二先不求聽三非常聽向及親友被從此受等四問義除戲㗛等五言辭了了犯不犯中若彼從此受者此尼常從此比丘受法故若二人俱從受法以其同習故若彼問此答者謂同習人彼此問答若共誦者誦一部故此等無輙問罪身業惱他戒百七十三制意犯緣同上口惱唯以身惱為別在僧寺造尼塔戒百七十四三相妨亂廢脩正業令客比丘致敬乖儀故一有比丘伽藍二知有三造尼塔四隨用愽等犯遮之義永故不待竟百歲尼不禮敬戒百七十五一違敬教二違本心三慢法輕故人搖身趍行戒百七十六婦女莊嚴香塗身戒百七十七使外道女塗身戒百七十八八提舍尼法別緣具五一從他乞蘇二為己三無病緣四受得五食咽咽犯下七同爾與別為異戒本四句一人二除病緣三乞蘇食四結犯上四比丘吉下四比丘提丈夫報強受取資身然蘇等資微不數故輕尼多貪味乞之慇懃數故犯提舍下四美食資身力強丈夫喜乞故提乞美食者女人之謱乞希故輕式叉迦羅尼法一同大僧更不重舉其七滅尼得提罪合在百七十八中正宗文二中上來略明止作二持竟
