body:
  text: 藥揵度第七時等四別皆有療患之能咸稱為藥隱別就通故曰藥揵度五分乞食依藥依離二犍度今此合辨文分為二初對上所明制第二世尊在繩床已下次明中下前中文二先明乞食即第二依俱䟦陀羅飯者見論𬖴米飯脩步者謂青豆美吉吉羅者是竹笋子第二波羅捺已下服腐爛藥即第四依就第二開次下中分文為四初至眾僧亦爾辨其四藥第二吐下比丘已下結淨地法置藥之地第三爾時不淨地有樹已下護淨之方第四六群畜升斗已下雜明應否初文復二第一從初至佛言聽已來辨四藥體第二畢陵伽婆得銚已下彰營藥器具藥中文五第一至厨屋總明四藥第二私呵已下訖如法治明三種淨肉聽食第三居士旻茶已下訖隨意索取檀越淨法第四阿牟多羅已下訖如法治廣離明八漿第五世尊至摩羅已下雜明應否初文有六初至為治明故盡形藥法娑梨沙婆者見論言介子陀婆闍那謂是烟藥耆羅闍那赤石也第二爾時舍利弗已下明時藥法於中文三第一作餘食法於中有四一餘藕根二僧食三檀越食四無夷羅母菓第二有癲狂病比丘已下禁斷五不淨肉第三耶輸伽已下搆乳法檀越請法第三秋月風動已下訖佛言聽服已來七日藥法黑石蜜者甘蔗糖竪䩕如石故名石蜜也伽尼此云蜜烏婆陀頗尼謂薄甘蔗糖一脩事者謂三種藥粥也第四時藥已下至作盡形壽藥服四藥相和從強而服即是略辨非時藥法第五比丘患創唾塗已下至角作已來明其雜法五分比丘為虵螫死佛言汝不知八種虵名不慈心向又不說呪為八虵螫八虵者提樓賴吒虵怛車虵伊羅漫虵舍婆子虵阿漫波虵毗樓羅阿叉蛇瞿曇虵難陀虵也呪曰我慈諸龍王天上及世間以我此慈心得滅諸悉毒我以智慧取用心煞此毒味毒無味毒破滅入地去第六世尊患風已下禁二內內煑內宿略辨淨處第四阿牟多羅已下八漿中見論云舍樓伽者是優鉢羅拘物頭華等根舂取汁澄清名舍樓漿婆師者此似菴羅菓一切木果得作非漿第二營藥器具如文可知第二大文結淨地置藥處所者其文分四初至白佛結淨之緣二佛言下對緣辨開三有四種淨地已下明淨種差別四諸比丘念已下釋遣疑情第二對緣開中文二初則總明聽藍內結者指其處所白二羯磨者示以結法第二應如是已下別定上二初應唱房等至經行處曲指規圓以局食別僧故次眾中已下正舉結法對第三文先解其義四門分別第一先定二內處所第二既知二內須結淨法第三結淨既竟護淨方軌第四解結淨地之意防於二內然宿即犯宿者煑不犯內煑初門者昔解大界有宿伽藍中無以界久居生外譏故是以文言不得界內宿界內煑又不聽界內置食送外後開結淨故知界有二內若爾何故上文僧伽藍內結作淨地又言邊房靜室結作淨厨答此謂界上僧伽藍故又釋藍中有宿大界中無以藍有暎鄣故如祇始時院內作食厨䊩汁蕩器惡水流出致外護嫌故知藍中有宿等又此文言藍內結淨地故若爾所以復言不聽界內宿等答此是僧伽藍界也今所立義並非二解以偏執故雙是兩釋以俱有二過故所以爾者界是久居藍有蔽鄣故單界單藍並有二內互有尚爾何況俱者引證可知除自然露地一者僧久居之處無儲聚義二來又無譏醜故無二內言然者簡別於界言露地者異於伽藍問所以自然僧界不集成別所以自然空地無二內耶答二內解義就文居譏過中制故自然中無論其法事不約譏制理須詳導故一切成別也第二門既知二內之所以須結淨往防於中五門分別第一結淨地意等第二解淨種差別第三結之方軌第四舉此四淨對上界藍以辨有無第五辨其寬狹初門所以須辨此淨處者寔由行者報力優劣上根之徒報力資強受持乞食知足修道本不假淨地開於儲畜但次下等輩報力微劣不堪乞食是以隨根開結淨處離於二內資神長道初緣開病一聽已後三品通行此是聖者誘恤從譏故有斯法准其規定局食鄣僧伽以羯磨故名為結既人食有殊無其宿煑食不生罪稱之為淨中二自然體無二內此之四種從處彰名故曰淨地第二門者淨種有四於中須以三門分別第一解淨種差別第二自他周不周第三定處不定處初門者初四二種作法中淨二三兩種自然中淨其自然中第二以他處故淨四句料簡一食已處他即第二處已食他如寄食等是文言作檀越物意受祇律白衣寄等與比丘即名淨作意求者不淨三俱他此三是淨四食處俱已有淨不淨如送食等是第三院相不周無譏過故淨其猶同室宿中室相不成則無宿過此亦如是所以言淨初四作法作法何殊第一宿不宿別處分淨者要未僧宿處分得成宿已不成以其別人口法弱故是以此文作僧伽藍時分處如是言某處為僧作淨地又祇律支尼耶梵志作處請佛僧佛言先令優婆離為僧處分受食厨勿使過初夜若過者即名住處不得作淨其羯磨者隨結皆得第二能結人差別謂道俗不同眾有多少僧別有異廣說可知第三約所秉法謂此二淨結解各依本法謂處分結者處分解羯磨結者羯磨解第二料簡自他周不周者第二淨周而非自第三而非周初一俱是第四不定第三定處不定處者一對人分別如文比丘房等得作淨不等者是二定其局分淨初四作法有此彼之別中二自然處而不定遍皆是淨以其二是他物三無譏嫌故三定其方所如祇律南西二方置僧食厨以對北東為下故佛塔在北東二方以對南西為上故此通四淨也第三對二作法結之方軌三門分別一明結法二辨遙三總別成否初門者有二先解諸部及此律結法同異第二正辨結法言諸部者五分非但直有結淨羯磨又須臾結甄淨地羯磨祇母亦然今約此三文以說先解五分今聽以中房白二羯磨作安食淨處一比丘唱言大德僧聽今以某房作安食淨處若僧時到僧忍白聽如是羯磨准白成又云聽羯磨一房內一房齊屋溜處房一角或半房等作淨地此等謂淨地法又文言有諸比丘欲通結僧坊內作淨地白佛佛言聽應白二羯磨大德僧聽此一住處共住共布薩共得施僧今結作淨地除某處若僧時到僧忍聽白如是羯磨准白可知此應是其甄淨地法又言新作住處應先指某處作淨地便可安淨食置中若未羯磨比丘不得入中至明出此言未羯磨者謂未作共得施等除淨地羯磨非謂未作淨地羯磨若淨結竟亦不得宿何論未也如此解時淨地與除淨羯磨各有壃界類似戒場又即此文復似以羯磨甄處分也第二次辨祇律若欲作新住處者營事比丘應繩量度作分齊爾許作僧淨屋爾許作僧淨住處應作如是說爾許作僧淨屋受若不受者至初夜過即名不淨准此文說爾許作僧淨屋即是安食處爾許作僧淨住處者即是甄淨法便是處分亦有相除若不須除所以文言作僧淨住處也此謂淨住處者若不相除雖處分淨屋但過初夜即名不淨故知羯磨處分並有相甄次第三母論言差人先結不淨地次結眾僧房舍次結大界次結界也當問何處作僧厨僧所可處結作淨厨次結布薩處次結不失衣界如此六種若欲解先解不失衣界乃至後解不淨地又客比丘來舊比丘應語此是不淨地乃至不失衣等准此文說第四既結淨厨第一復云結不淨地者此應同五分共得施等除淨地羯磨結此以為安僧之處故言結不淨地若爾何故母論卷二言比丘食在界內無淨厨不得食若眾僧初立寺齊集先羯磨作法厨處後羯磨僧坊處若忘不羯磨淨厨處者後若憶還解大界後解小界羯磨厨處結界法先結小界後結大界既言解界已先結淨處方結界何以前言結界已第四結淨答此言忘不羯磨結淨厨處者應言忘不羯磨除淨厨處此少除字義是應然如五分除某處也謂是除淨地法以有此法宿無宿過故名淨處復以安僧處故名為不淨淨不淨名所望別故但是一法謂是除淨地羯磨本非安食淨地如此解時除淨地法在結界前結結淨厨結界後結以六重中乃至第三結界後故亦順四分不得界內宿煑也聽結淨地四分法中但結淨厨無甄淨法不須准餘三文若爾得免宿煑過不答言雖同僧界以有淨厨攝食以鄣僧故亦無宿煑第二結法者若據此律無甄淨故隨結多少及先後俱得如餘三文須作甄淨者若處分淨初作住處僧未逕宿先作除淨後方結淨厨後更不得隨時數結其羯磨淨者後或更結應先解除淨隨所作淨更結除淨然後結淨厨准於母論似當如是問先除一處今後除者先已僧宿如何得成答以前時除有法處宿猶得更立淨厨不同本來未有除淨也處分及結法如文可知第二遙不遙者但得遙結表人食有別故不同衣界制令同處故在內結故結文言結某處作淨地第三多少總別者脫多淨地得合秉一法結多淨不答一一而結以其各處別故不同懺罪罪業雖多對一行者故總牒而悔及持欲使命故隨能多少義不類此第四門者問界藍二所俱有二內今以淨防為通以不令解若是淨單藍唯有第三不周故淨其第二他物不似藍上故淨初四作法故淨明知不是由藍故有故局第三若當單界唯有第四此謂全無院相尚有宿過豈有不周淨也初二不假界成故使單界專有第四若通辨者或界有藍相者具三除第三所以如前辨若藍無界者有三除第四謂初二淨地通兩處故也第五門者先對餘部祇有處分十律但第二故彼因利昌作供非時雲起阿難白佛佛開房內結淨外道謗言禿居士亦有庫厨與俗無別佛即令僧坊外作食烟起多人索食使僧食少白佛佛言從今不聽作淨地羯磨作者吉羅又瓶沙王死佛言世王代處不名內宿故知但有第二五分初與第四分明似有第二他淨如於織師屋聽置食豈非他淨如是通論有三淨也此律四淨所以須有結法淨者識知來世篤信難得形命須存資身長道故宜結之第二當就四淨以辨寬狹初四局限有彼此之別故狹中二自然無分限成但不得惡觸自煑遍無二內明知是寬問依界結淨不可界故狹者依界以結攝衣亦應不可僧界答衣界攝衣屬人開急就緩與大界相順是以相可文稱同一住處故淨地攝食鄣僧界但攝僧理則相違為斯大小是以文中不稱同一住處故即是以食望僧是攝是鄣以僧望食非攝非障又祇優婆問淨地得一䨱別隔不佛言得如是通隔別䨱通䨱通隔別䨱別隔等佛皆言得或一邊二邊三邊一切盡得五分一房半房齊衣溜處佛言得明知不可大界故所以狹此言狹者事有簡異食與人別終不得淨地中逕於明相有人別祇律子注亦得住言此謂得淨地宿者大成迷亂不達道理彼文意言亦得住者謂未處分前不得先住若處分爾許住僧淨屋爾許作僧淨住處竟時於淨地外僧淨住處中得住故言亦得住非謂淨地中住下之二門隨文以說次文釋第三淨地亦如是者謂舉墻塹同前院相不周故也第四除疑並對羯磨淨說除去比丘者非謂去人方聽作淨此是對前領解除比丘我以知竟更問餘人房得不故耳不知何處是淨佛言解已得不更結等者謂羯磨法解已更結隨結盡得故文中治故伽藍佛言得不論遠近若也處分即有時節如祇聚落停癈二年得處分限內不得五分十二年空聽比丘隨意受作淨屋未滿不得應羯磨結第三護淨方法文六第一至佛言淨護內宿有無第二六群比丘不淨菓已下五生種制令作淨第三時諸比丘自種菜已下至餘不犯惡觸有無第四時諸比丘作是念已下至洗手受食明內宿內煑第五波羅奈已下至如法治舉其八事儉開豐禁第六食厨壞已下至亦如是明無內宿科文既爾先解其義既結淨竟轉易不淨等物言說如常五分無人行食聽比丘行有諸木器食犯膩不淨以瓦石楷不應爾應以佛灰洗祇律不受食戒中若銅器者當淨洗用若是木器膩入當棄若膩不入得削用於中解義三門分別一列罪釋名二辨體相三明通塞初門者若據淨地但防二內為彰淨不淨處得造多過又以罪名位等故且舉四一內宿二內煑三惡觸四自煑比丘與食同處逕夜名曰內宿故伽論言不結淨地食在界內宿名內宿也在藍及界內煑食名為內煑若如伽論界內不結淨熟食名曰內熟出家人等不合勞作自為故觸觸不聽食此謂由觸得惡故曰惡觸又即不受而捉稱為惡觸所謂具戒躬自變生名為自煑祇律病無淨人淨人煑聽自煑令淨人知著米著已比丘不復得燃火淨人煑沸已淨人欲去得受已自煑熟慎勿令不受物落中如是肉令臉菜令萎若乞食冷得自煖無罪第二辨體者不辨煑觸宿等身作業體及以食體以其假論定得身業及食體者於護戒無用故今直約人處四藥生熟等彰成過緣分齊之狀故言辨體內宿體者長足有宿類觸故爾若護宿過如菓菜五穀等須知合結不結時節可知餘生熟食具等俱有宿過除長未足運運變改者如此類等無宿過也內煑者無問生熟長足未足但在伽藍大界無淨處煑悉成內煑故文言重煑粥不聽界內煑依祇律淨菓四句一菓在不淨成不得食二淨者在不淨成淨得食二俱不不淨不得食四俱淨淨得食是中初三兩句是內煑故次惡觸者義可為二一者定體二料簡成不成體者位二不受而捉及以失受若細分別有三謂不受但一失受有二手口不同口受時中失手局非時分故有此二次料簡成否者義為二門第一對不受而捉辨其成否一惡心觸二持戒悞觸三懈怠觸前二非觸第三是觸是以十律有二種不壞淨一無著人破戒人促二持戒人悞捉俱淨應食非前二人即是第三是觸此律准文義亦應爾惡人雖觸為遮惱亂善比丘故望他非觸故文言觸者是不淨不觸者淨好人悞觸無情過故是以下文忘不受食便持後憶佛言若見淨人應置地更受第三成觸者以非惡心不同初人復非謹護有其情過又異第二故成觸緣因作四句分別一惡而非觸謂故觸望他不成者是二觸而非惡謂持戒悞觸又如淨人強多著食懸置等類三俱是謂惡心自望及懈怠者是四俱非情淨食是第二對上二解染不染義即是對事分別謂二具戒濕膩物等不得入淨厨處用與淨物交涉廣說可知又對戶鈎鏁器非器等廣說如常次自煑如自作教他但具戒人煑變生作熟咸成自煑第三通塞通塞有四謂藥時人處等第一藥者有二一對四藥以辨唯時藥始終具有四過以資用中強一切常須故餘三但令為病受者隨三分齊俱無四過故文言七日過七日非時過非時方犯限內無𠎝故也第二生熟分別自煑局生生相生生熟生俱成自煑餘三通熟所以爾者變生作熟紛殺妨脩故使局生犯於自煑人食須分別界非煑食之所是以內宿煑不簡生熟俱犯宿煑計觸造作應同自煑但聖不開觸故亦通兩以其生熟咸須受故是中內煑義通一切其宿觸二不通生長未足自煑一罪局生生盡不通於熟第三時分別者若望食而生過通時非時俱成四罪今據成過緣時其義即異位可為三第一二煑說通以其但非淨處身業自為即便成彼兩種過緣不別時非時也第二宿局時中以明相約故第三觸義不定若不受捉觸類同二煑通時非時若任運手口口同於宿唯在時中成手局非時故且總判宿觸塞也多論直爾宿捉即犯吉羅未待服犯第三人分別人謂具不具也宿自局具具中說通故殘宿戒明相出時一切釋子悉不清淨他比丘煑亦成自煑但是同類並不合煑望應煑之人齊是自煑故爾觸內通兩內煑約處誰簡人之具否觸義不定不受捉觸局具非小相染解者義通大小故總判之言解內是通第四處分別者於中有二一淨不淨相望復分為二第一真以兩處相對二內局不淨以非宿煑處故解自通淨不淨造作中生故爾第二以人對藥就處以論若人藥俱不淨具成四過若人藥俱在二作淨中有三無內煑言有內宿可為四句一俱在不淨二俱在淨三人在淨藥在不淨此三成宿四藥在淨人在不淨此淨所以第三亦成宿者以淨不淨俱界淨地不攝入食在不淨不為淨攝故亦成宿若辨淨地有宿無內煑至文中釋第二却就四淨以辨若論自義通四淨皆成二過以造作中生故不為淨防若言二內四淨俱無以其無防二內所以名淨說之為塞然宿不定可知也此三門義講者隨文一一罪中各以三門分別亦得無妨次釋文內宿有無文有三對初三更互相蔭次二更互相墮次二更互相入言相蔭者從根以判言相隨者長未足菓在不淨地運運變改故無內宿得入淨厨祇有比丘不淨地使人知菜竟問佛得入淨厨不佛言若未逕初夜得入淨厨故知未足非宿問若生足犯宿者何故文言不淨地樹菓墮淨地佛言無人解自墮者淨答此人常不作與熟菓同宿取食之意以無情過故使自墮者淨以其義同從他新得故不犯內若作意欲食同宿熟菓雖自墮鳥解非淨不應食故文言若不作意欲墮而風雨吹打鳥解墮者淨次句從根判淨生熟俱淨此二句佛俱言淨若反前說俱成不淨言相入者各隨根處是淨不淨初句據熟故是不淨次句熟生故是淨若反前說前生後熟前淨後不淨此即二句各含淨不淨義文中且舉一邊第二淨五生種淨法二五如文淨菓四句如上說五分若食菓應作沙門五種淨謂火刀鳥淨傷淨未成種若食根五種淨剝淨截淨破淨洗淨火淨若食莖三淨刀火洗等又應總淨但淨一即得第三惡觸有無於中文八一有二文變故無解二小沙彌已下三句扶佐淨人意故無解五分無淨人聽御飲食船十律亦爾傾倒得佐正第三蘇油瓶已下雖有所解為護僧故五分應用新物䨱令手近第四六群敢不淨已下遇緣非解水洗連根菜淨已水洗意謂水滅火淨佛言不失故云此洗即是淨第五先有嫌已下兩句故而非解解者是不淨五分一婆羅門以僧不淨米一把投車中白佛佛言若可別除去若不可別趣去一把又水漂鹿麞等死肉無淨人比丘自入水取白佛佛言至岸令淨人截去比丘手捉處得食無犯第六淨人強多已下為受而捉食難得故所以非解第七時諸居士已下他物非解五分一婆羅門持寄比丘比丘持着非淨地經宿明日來取分與比丘比丘以己著不淨地不敢受食佛言本是白衣聽受食無犯第八病比丘須粥已下受故非解第四文重煑粥不得界內煑聽自煑煑生犯自煑就故不犯既聽自煑應在淨地中煑問結淨本防二內所以入宿即犯宿煑便不犯釋有多種今一解言淨人難信若不開者檢守無以濟命是以開看不犯內煑應避明相慢故犯宿又釋煑隨處故所以不犯宿本隨人不問淨地但人食同處即名共宿是以文言共食宿故煑本隨處不問比丘有無但不淨處即是其煑淨處非煑此謂不淨處無比丘宿過也問所以宿偏隨人成宿緣者何解言比丘難信恐有譏嫌不對造作無證明故所以成宿煑隨處故對有營作有證離譏所以淨地煑及看煑不成煑緣即解第四門義次錯受油等三句者不成受故所以有解次忘不受食無觸情過故此之二句重料簡解第五八事事八種五謂二內自煑不受四餘食法義兼惡觸等是名則有二其唯提吉所以開者二內對外外為持去失食自煑不受四種餘法並是對他損食故爾所以不開殘宿者內宿先淨直宿故開殘先不淨食咽咽犯故使不開酒亦非法故亦不開又可八事對外失食故開殘本對不殘不殘者是清淨食清淨食名者不是恐他持去云何須棄淨噉殘故非開限既聽自煑明有壞生恐濫外壞所以不說但為內食煑並自煑中攝第六彰無內宿文有四句一木柱交入佛言非內五分淨地取立不淨地起屋佛言不淨不淨地取立淨地起屋謂為不淨佛言淨第二次有夜移食等三句無心非宿墮淨不淨間者似有甄淨地法三次有嫌兩句移食解淨遮惡護善故第四客從外來行求出界亦非情過俱開成淨故言欲遠行亦如是第四雜辨應否可知五分告諸比丘雖是我所制而於餘方不以為清淨者比丘不應用雖非我所制而於餘方必應行者皆不得不行迦絺那衣犍度第八迦絺那衣者西音此名賞善罸惡衣賞謂前安居人得五利為賞罸謂後安居人不獲五利稱罸又名堅實衣多有施衣簡牢勝者稱成此衣故曰堅實衣亦名功德衣若受此衣能生五利功德從功能彰名故名功德衣廣明受捨之方稱為揵度就中文三第一至得作五事為五利故受衣之緣第二從僧應如是已下至應如法受受衣方軌第三彼六群已下捨之儀式緣文復三初至疲極僧伽梨重辨其受緣文二第一拘薩羅國比丘二寒雪國比丘第二時世尊已下明安居竟四事應作為明受衣同是夏後乘列餘三第三有五事已下彰此衣功能必獲五利第二四事中初一通十四十五十六三日俱得餘之三事局十六日第三文二初為五故受次受功德衣已已下受已得作五事第二受衣文二先明衣財體色第二若住處已下正受衣法前文故二初衣體如非二六群已下衣色如非衣體文三第一至受衣竟衣財體如第二云何不成受已下至不成受衣財體不如故不成受第三云何已下舉前體如應法合受欲解初文先釋其義五門料簡一時分別二處分別三人分別四衣分別五法分別時者有兩一受衣時二得利時初時者此律專局十六以十五日勞未滿故是以言安居竟應受若十七日者無五月故是以下文聽冬四月滿應捨設若向後取日足滿五月者侵他春分日故其伽見二論後安居人不得受衣故知受時亦同此律若餘三律並通一月受衣一月捨衣故十律若月一日得衣即日受若二日若三日乃至八月十五日得亦如是五分受衣有三十日捨衣亦三十日若七月十六日受至十一月十五日捨若十七日乃至八月十五日受至十一月十六日捨乃至十二月十四日捨若後安居八月十六日受至十二月十五日捨第二得利時若依四分伽見二論位定五月然得利時隨八捨長短不定如餘三律位定四月以前後人俱聽受衣故得利之時亦隨捨長短第二處者唯在作法是大非小又局此界若異界人不得此處受衣也見論餘僧得成足數不得受利第三人分別有三一受衣人二持衣人三僧別人受衣人者第一五眾分別上二非下三非具足脩道人勞不重故又無僧伽梨可為故見論四比丘一沙彌安居欲竟為沙彌受戒得足成五人受功德衣新受戒人亦成受衣一比丘四沙彌如是明知沙彌無受衣法第二上二具中安不安不安不得受以非安居竟故見論後安居破安尚不成受故第三安居中前後第四前中破不成第五成中有僧伽梨衣又在界內在僧前者方成受衣人十律行別住人不得受不論餘羯磨人又頗有僧受衣僧中不得者不佛言有謂餘處安居者是二持衣人者亦取同處安居如法少遊行人十律具五德謂不愛等知受不受者差持衣此雖無文義亦應然第三僧別者是僧非別四人僧攝然須五人見論問幾人得受衣下至五人前安居人得受故其決妨義等如四僧中說祇律若大眾一萬二萬和合難者眾多人亦得別受功德衣一切如大眾但稱眾多為異若一人得獨受第四衣分別者有五一求法得分別如文第二上下分別謂三衣非餘祇支等文言十隔故十律若異於比丘等五眾衣不名受又言不割截僧伽梨下二衣等亦不成受反此成受伽論減量衣不成受德衣第三多少分極至三衣見論若人持三衣來與僧持作德衣作是言若持德衣者三衣悉屬隨施主語悉與持衣人餘僧不得若多有人送衣應受一衣餘應分若與衣壞者衣壞者多與夏大者第四成之已未分別未成須作此律但言羯磨差人作無差羯磨文五分即出白二差一二三乃至眾多祇亦白二拜一二三人能斷理者作十律真言終四比丘能作者令起浣染割判安𥾠等六心無差法也第五如非分別一體如可知二作如如文舒張等六第三量如第四色如第五法分別如文次隨文解初文有三一總舉應法聽受故曰僧應如是受功德衣如是之法在下二若得新衣已下別彰如法之狀三僧已受已下總以結成第二文列七事一辨衣財斷理二不以耶命等顯求如法三不逕宿時稱教故四不捨墮衣體清淨五即日來應法已下明時中所造衣相六應自浣已下六事作衣方法七辨僧前成受初文有四謂初得故故曰若得新衣新含有二謂長利糞掃故次列二衣三若新若故者於前三種各有新故四為離着好示納褋之方第二謂離五耶求衣故言不以邪命謂非夏着重裘等故言不以相得謂不擊動人求故曰不激發得不逕宿者領衣時非十五日受也無過清淨可知以特開故即日來應法四周已下辨衣相作時故曰即日來等餘可知第三總結竟者謂斷理如法竟也餘二可知色如者謂袈裟色正受衣文四一得功德衣已請佛持方故文言不知云何舉以啟尊二佛言已下正示受法第三優婆離已下問去疑滯第四對衣成否料簡第二受中文四初明白僧知受不受第二如是白已下差守衣人不簡德者以不別有損故依十律簡德第三大德僧聽已下為重此依羯磨付彼於此住處持者為彰此人不得衣利故第四彼比丘已下正明受問曰自恣所以先差次白此受衣中先白次差者何答自恣制作先差後白受衣是開不受無過不知受否故須先白後差正受法中文三初持衣人以衣橫置兩臂上隨諸比丘言得相了三說受法二彼諸比丘已下僧眾領受為彰持衣合法故曰已善受也功德名稱屬我者謂五利功德既無過咎美響外彰故曰名稱令我獲此故曰稱我三答言爾者謂持衣人發言許順其不受利者嘿然如是乃至下坐優婆以見受衣九句當者未來次句今是現在已是過去三陳此句豈非九也三世各三故問何世受功德衣佛答可知第四料簡已未如文略無羯磨差辭第三捨衣文二初至突吉羅捨衣之緣二有八因緣已下廣辨捨法緣文有二初至五月制限五月二彼六群已下滿不出制單白捨此二各三一謂不捨白佛二佛言已下判言不應三白今已下立制第二三中第三立制復三初時滿制出第二應如是出已下制其出法第三若不出已下結罪第二法中文二初僧集等作法方便人言有六一眾集如應來來等二和合嘿然說有五法應和合者是三簡眾故未受戒者出四不來者說欲五問六答上來分六此義不爾謂言和合即是僧集無別和合之體如五法應和合者一若如法應和合謂法事稱理故名如法口勸助成故曰和合二嘿然任之者謂己心同現相表和三與欲者形雖不往遙表情和故四從可信人聞者上來三種心達是非所以成和今雖不曉以從可信人聞事如稱愜理須和合故亦起集五先在眾中嘿然而坐者前所明四集眾時和今此第五先在眾中嘿忍所作然此五中第三情和餘四身心俱和亦可初四二法即是應來者第二第五此之兩嘿便成應呵者不呵第三一法謂與欲者應與欲此五成故所以名如細觀此五已豈離僧集別有斯五妄引正文用證邪義者盖穿鑿之說今解方便但四法第一僧集和合和合故名為僧集但成一義如上文言欲壞和合僧者和合者一羯磨僧者若四若五謂以和合成僧用故無別無兩法何因此文獨為二法耶第二簡示以人有非類故第三與欲前僧集中非不攝欲然有說欲事故於二集之外須言不來者說欲也亦可僧集謂是初三今此與欲唯心集四問答令和知以其共成知眾所作故類餘作法咸須此四也第二正作白捨五分白二法捨第二廣明捨中文二初至子注亦如是中間要心依眾和合捨第二有二種捨已下究竟出宿捨此二文中位有三捨前八分二上六要心捨次二作法捨下二但一謂持衣人出界宿是以共出者同前義總但三捨若離而別說即十又隨事乃多初門有二初至八事根本八捨第二復有六種已下錯互上八有一百一十八句前文有四一悉舉八數二衣竟不竟已下次列八名三若比丘已下牒名解釋四是為已下結八中前六論云要心失下二眾法和合捨德衣開法受時至難失時便易第一句要心去捨或受時要心或可當出界時要心但使決意去時即失德衣是名去捨二竟失者本無去捨心故出界不捨謂無下二衣求得衣財本要心作衣竟捨後作衣遂本要心是名竟捨三不竟失者亦無去要故出界不捨謂此人留下三衣財置界內出界時要心若言我息心不作衣亦不還衣所者謂不來至留衣界內衣雖不竟我捨功德衣後時出界亦不作衣亦不還衣所無有此要故不竟亦捨四失者受時要心本為作衣故受若失二衣失無所為我即捨衣本無去竟要故去及衣竟不捨有失要故今失遂本故曰失捨五望斷捨亦無去要受時要心若至望處不得衣若更有望續我不捨衣前家斷後無望續我當捨衣後生望處更無後家望續遂本要心故曰望斷捨六聞捨者本無去竟要故故去竟不捨但無受衣已要心出界外若我聞僧捨時我亦捨衣後聞僧捨遂本要心故曰聞捨此聞通虗實問若聞僧捨名聞要者僧若捨竟何待要心又若不作要聞應不失今解聞者謂聞僧中別人不受衣利故名聞僧出衣言出者捨失之別名上來六事若無心要有六不失第七受已出界僧和合捨彼在界外寘然失衣若不知捨受利無罪第八受已出界作衣竟不竟本無要心故去竟不竟不捨還在界內共僧和合捨故名共出第二文五初有二六第二有三个十五句第三有兩个十二句第四有三个九句第五二五句先解初文就未得衣作二六句初六句除上失衣及望斷二句本無二要心故是以不捨事須除却餘六同上釋前四要心捨次二依眾失問既未得衣何有竟捨解言受衣時未得財下二衣故言未得後得作衣故有竟捨第二六句除去及望斷二句不失餘六如上義准若以竟不竟聞配於望斷二二除却復有三六合五六句餘二非要闕而不論既望斷五六將去作頭有於四六但得以竟不竟失聞配去二二除之以成四六若以望斷配去則不異前故也次竟有三六不竟二六次聞配失故一六合成十五个六謂九十句也次問對得衣及得衣未得衣二門亦應明此六捨以不答義似不通謂言已得衣中舉望斷一對可有五六若以去作頭但可成四五以其已言得衣何有望斷便是除三故也餘竟不竟等及得未得門亦爾義中權故不須更對二門辨也故使文中但約未得略明二六若言三三除之四四除之並亦無妨准說可知未得衣有十五句次已得衣有十五句次已得未得衣謂受時得少許未得者謂受時餘所未得故亦十五句上八事中第七唯有界外失不得有界內句以其若來界內共僧出即是第八不共僧出別眾不成故無界內失句餘之七種界外六要心界內六要心界內共出謂本不出界故若出界外還共僧出是界外來共出句即是十四界外唯一但十五也初十二句一家起望作三四句初四句得所望衣次中四句至望處不得衣乃得非所望衣末四句者同是望處得一不得一故曰得所望衣不得所望衣各有竟不竟失望斷故有十二此四之中餘三得衣故於望斷據不得得不得合故有此四問所以無餘者去聞界外共出同不對衣故所以無次十二句同前但對多家起望為異次三九者初得衣九未得衣九次得衣未得九初九者界內聞道路聞至彼聞各三如文故九此言聞眾僧捨衣者謂僧中別人不受衣利故言聞眾僧豈有聞僧欲捨方始作衣有三要心耶故言聞者謂聞僧中別人不受衣利也所以但三者以對作衣衣上有竟不竟失三故其本欲出界作衣故無去失不欲求衣無望斷聞是位又衣上無聞餘二非要可知故唯三三句餘二類爾次二五句者初五至餘方以在餘方要心故無去捨本不求衣無望斷在餘方起要故非共出故但有五次五以樂靜為異准此有界外者十二中亦應有但彼專約求衣故無自下第二有八揵度明其眾法拘睒彌揵度第九五分拘瞻呵人四法合羯磨法若就斷理德行應名護法揵度若據所斷理事應是鬪諍揵度今就鬪諍起處立目故曰拘睒彌廣集護法德行故稱揵度分文有三初至隔一人坐正明鬪諍所斷理事第二世尊往被舉比丘已下至和合布薩佛自斷理諧合彼此滅諍方軌第三佛告優婆離已下法用既興付屬弟子現放成規傳通末代初文所以舉此諍者一義欲彰護法德行故須先出所護之事二來緣中比丘雖好心善念以無善伴反成破壞因以廣明護法德行斷理進否故所以爾文中分三初至別部羯磨先彰鬪諍之過第二時舉罪比丘已下舉前諍事具以啟佛第三佛言已下如來呵勸示其過相前文分三初至不成對犯治舉即是僧與作不同住二彼即往已下外求伴黨即是自作不同住三彼被舉隨舉已下能所乖分鬪諍之損第一文四句一比丘犯戒犯戒者科舉一事論之盡得見論寄一律師法師法師入廁不去洗水律師言汝犯吉羅遂舉治以起諍兆今者且約不剃髮不揃抓故言犯戒二是中已下至非是不犯詳評是犯三彼即和合舉罪者謂以不見舉治四犯罪比丘言已下道僧無過治人不肯伏罪即下五德中鬪無利益故爾此諍犯不犯事一見異是言諍攝反論羯磨成以不成言事作以佛判諍現前毗尼驗之故知言諍中收第三佛呵勸中文四第一至同住處如來呵勸第二彼被舉已下鬪諍增熾第三時眾多比丘已下至云何重以白佛第四佛言已下教安置處所初文有三第一至亦成就不犯通舉呵勸立兩章門第二何以故已下雙釋前二言兩章門者第一佛言此癡人破僧者通呵能所一謂所舉不見犯比丘求伴別部故言破僧二謂能舉見犯比丘無伴助舉致成乖別故言破僧此是呵章二門第若彼如我所說已下通勸能所和合成就文言若彼如我所說等者是所舉不見犯比丘佛語被舉比丘汝須外求善伴順從無違第二汝若如我所說等者是能舉見犯比丘佛語能舉比丘僧先行治罸者還為解舉若能如是彼此和合羯磨說戒俱時成就故佛勸言彼汝若我所說並是成就不犯汝等應爾此是勸章門何以故下釋前二門第一何以故者何以我向呵汝破僧義故有二不同住釋初能所破僧義故文中有五一舉二數二何等者假以微向三彼比丘已下列二不同住四云何已下解釋二門各三可知前是所舉後是能舉五是為以已下結第二何以故者何以我向勸汝能所成就義故有二同住釋後能所成就義故文中有四謂少假微微言餘比前說五分若僧已破於界內別作羯磨如法如律者亦名羯磨成就恐不類此文豈可如來破後勸諸比丘大好成就義故第二鬪諍更增者五分高聲罵詈吉羅更相行擊蘭遮三二文可知第二如來滅諍中文二初至盡偈佛勸能所諧和彼此趣滅方便道二爾時世尊已下嘿償捨去正明滅諍前文中二初明屏勸能所二尊夜過已下集其二人面勸能所前文先勸不見犯被舉比丘二時世尊已下次勸見犯能舉比丘初文有五一至外道勸犯罪者見罪懺悔若言不見彼眾僧等咸是三藏國之所重實是可懼於中文二初令見罪求悔二何以故下釋勸所以二彼犯罪比丘已下勸彼思念僧有威勢乃必以三舉治我三若彼比丘已下至迎逆觀既作舉治復奪三十五事四若彼比丘已下別異住既不同事必生鬪諍令僧別異五若比丘重此破僧事已下汝宜息諍詳崇無二次勸能舉亦五可知對二人勸中文二初長行勸次以偈勸長行文三謂三勸三拒初勸廣文謂引俗重事尚有捨而和合況汝默服反計輕微次汝等出家為道已下結勸應捨偈中分二初十二偈示其是非曉喻息諍通勸能所第二處處已下四偈半論教能舉比丘諧和進否去住之儀前文復二初有六偈舉事勸和二次六偈舉損益之理勸以歸和初六初一者偈彰其諍過必成破僧二次一偈誦前長生王事次有四偈正彰損益勸修忍行奄鬪諍之塵穢響外充故曰眾惡聲流布忍辱上行名尊上法於斯勝法無心欣習故曰不求因於小忿遂致破僧故曰乃至亦不以餘事謂不由大重事也第三文汝曹等者彰不忍過更增不斷次種種偈者彰忍能除怨次以怨偈者忍行多益次亦不偈者益及自他掩鬬諍六塵第二六偈三對初有二偈舉善惡二理曉喻以勸第二二偈行有違失勸次有二偈服為道標愚智二人有稱不稱先解初二先非後是凶惡不忍正招生死危朽之法名曰無堅反謂勝健故言說堅牢忍辱柔和體是勝行名曰堅窂反謂劣故言說不堅心迷非之是理不稱聖教故曰墮耶憶念中此舉令棄次偈如是知非如見故曰乃至知不堅等稱法而談故曰入於正念中次二初偈行有違失識非須棄上半喻說下半法合鬪諍比丘秉三毒在壞能破三善故曰猶如人執箭放從身口恣意忿競義同執緩意欲害彼垢從心出反自纏縛受多苦楚義同自傷手沙門合上猶如人不善良合上箭執緩增益於地獄合上自傷手次偈行無違失舉是勸修汝等比丘恒起三善之心能破三毒故曰若能善執箭內善調伏懃修三善義同執急善因既成反資身受樂故曰不傷手沙門合上若能善自良合上箭執急便得生善道合上不傷手此舉是勸修次二初偈舉服尊而德卑宜自愧耻德不稱服服是忍鎧故出家行道無欲之人而行瞋恚甚不可也譬如清令雲中霹𮦷起火非所應也是故須棄次偈若行忍嘿伏於怨諍德服相稱顯益令修第二勸能舉中初二偈半教眾主比丘於己無損住有損應去二次兩偈若得善伴眾可斷理應住無伴不可斷理應去初偈雖無善伴然於己無損理宜謹意勿與同見次偈半既無良伴於己復損事必難處宜捨去如山頂野象即上能舉不得善伴汝可捨去莫與之諍二次二者初偈得伴眾可斷理宜應處眾故曰如偈說次無良伴眾難綱維反生誹謗宜速捨去故曰乃至無事如野象言教比丘作下嘿擯捨去之由兆也第二滅諍文二初至遂無有利養嘿擯捨去第二作如是念伏罪解舉正是滅諍前文中二先佛嘿一捨因茲即作斷利養方便二拘睒彌已下諸人嘿擯鬪諍比丘伏罪方便也正滅中文四初至具白世尊被舉比丘恩𠎝伏罪第二世尊告比丘已下以其歸伏佛為刊定第三若彼比丘順從已下以其伏罪教僧解舉第四佛言聽作白羯磨下乖替既久制非時和合此等四文反前緣說可知前文分三初至舍衛國由前斷利請佛謂滅第二舍利弗已下請佛瞻待惡比丘之法第三爾時被舉比丘道路已下自驗己非展轉告知請求啟佛第二請中四眾文四比丘請有四一知是法非法二請安處所三請與利養四請坐起第二尼請一請知法非法二請教授五分從如法比丘求五事半月教授依安居請自恣受大戒行半月法三四俗眾於中文各二知法非法二明利物非時和合文三初作白和合二憂婆白佛已下問其前後三佛言自今已去已下或可布薩白及布薩此之二法科行事第三付屬中文三初至五種犯罪人教護法人所斷理事有治不治二長老憂婆已下請斷理人具幾德行佛言五德方堪匡眾第三憂婆已下更復重請五德已知未審有何勝美佛為具答持戒淨等前文有三第一舉數二徵數三列五人五中分二初之三人雖有實罪或眾不和或僧數不滿若行治法令僧鬪諍反成破僧不名護法但可慇喻語言汝若見罪應當懺悔不須斷理即成護法之德此第一人正當緣起是不合治治成破僧欲令識知因列餘四初一是對別人罪謂提罪已下二是殘罪故僧中悔三是乞鉢故於此僧中悔後之二人眾和數滿要須治罸方成護法若置而不治非迬眾之德初一惡馬治者以其此人作過無慚輕僧解拒理在難容眾並見聞犯非虗謬不待自言即行治法文中有三謂法喻合不應求聽等者屏處作過若為舉來必須求聽假得自言方行治罸此既對眾公作非虗義同自言及求聽故曰不應求聽如是此即是聽次三舉者屏為實犯為他所舉迷情謬執故須舉治又惡馬者事罪俱不引故次三舉治者引事不引罪故第二護法德中文五一優婆離問二佛言已下總以酬答三何等五者假以徵舉四欲作事已下別列五法優婆離已下結成斷理優婆離以見所斷理事即有合否未審能斷理成就幾法堪行迬救故須設問第二佛答五法者得第四別列一實不實實謂犯不實者清淨無過不應作者謂不須治第二比丘已下事雖是實明有利無利利者謂因此舉改惡從善不利者謂前人拒違不懺反生情忿三若知此事利益已下明時非時時謂僧數滿無沙彌俗人時事順應法故言時非時者謂眾咸有沙彌等事不應法故四若知事時作已下明僧和破五若比丘作事已下良伴有無無不應作此即對前緣起中事治罸鬪德但有實犯無下四法致僧令破故第三文中先問下答問中上半偈領佛上言嘆說利益下半偈問也佛為僧說所斷理事能迬眾德進否之語故曰為僧說是語此領前說益潤無窮可永為心軌故曰義利決定故又問此人更須者何勝美之相能持上法處眾斷理秉法窂固難可阻伏故言云何得知勝比丘得堅持第二答中文二初至若海眾不駈明持律功德善達持犯堪作斷理光道益時第二如是人應勸已下備德之人詳心推舉處眾斷理前有十偈善持律藏第二五言偈已下深識持犯初之一偈戒品堅窂次怨家一偈善勝諸怨三有二偈決斷無畏四次二偈善能開解五次四偈善持毗尼令正法久住此五之中初一自行次三迬眾益物末一自行眾法二行善成秉法被時常為網統次釋文善修對治離上二扁不善業思故曰第一等持下三篇威儀無有違失故曰自端身等持破相違義同怨家內心清淨獨絕於彼無能見過呵所不應故言不能如法呵彼能結得是者謂持律人越踰彼故結得離彼反呵之語故曰也次二斷決無畏者既無瑕舋處斷理情無怯憚初偈牒人立二門彼住如是等者牒持律人得無畏說者無畏門無疑難者決斷門次偈上句釋無畏次句解決斷次二善能開解者初偈速捷之智故曰九十答等次偈非但速答亦能廣解故曰應答諸問心無異第五初偈離慢凡入眾中須自卑下故言恭敬恭敬者身口敬相言長老已下舉所敬境母論無夏至九夏是下坐十夏至十九是中坐二十至四十九夏是上坐五十夏已下至是耆年長老次一偈半知善所斷理事能說因本者謂識四諍根原故善分別者後解藥病相對殄滅之軌故次下二句對起諍人以法決了解踰於彼故曰乃至不能得其勝等次下三句德堪眾主言初句調伏者解能伏物故次句師教不虧者言必施用堪為訓導不為緣故次莊嚴等者宰任玄強悅可眾心故次達持犯若犯如是事謂善識二種犯相不犯者謂專精不犯得罪除者謂能悔人此垢牒前犯二牒前不犯句善識持犯了了分明故曰俱知次下三句亦是所斷事知垢句者謂前三人直言應悔故次句下二人作二治罰出眾故故曰眾所遺次句是舉次反顯其非第二如是人已下勸僧許舉於中初五句勸當處眾應如是知次能作不自高已下三句彰能離慢次下二句結成護法瞻波揵度第十既有護人必須所秉是故須明就法應言羯磨揵度今就說處以標其目故曰瞻波就中文二初盡呵責已來非法舉非以彰過緣第二告諸比丘已下廣明羯磨如非之相過緣文二初至施行非法治舉情疑成否疑念在心理須諮決是故第二爾時奪比丘持衣已下舉以啟佛發覺呵責前文復三初止不供養第二從客比丘已下至舉此比丘者無事被治第三彼比丘作是念已下情疑成否白佛文二第一進詣佛所啟請上三佛決是非第二時彼客比丘已下對問自言正辨呵責第一請中文五至住一面已來進詣致䖍第二世尊慇勞客比丘已下至道路不疲慇問安不第三汝比丘從何所來已下乃至施行問其來方即陳上三請決成否第四佛告比丘已下至不成就佛判是非第五汝比丘可還去已下佛與為伴前揵度中對諍執情是故不得即定是非要待伏罪首𠎝方為刊正今此文中據本無諍佛即判定主是客非佛與之為伴第二客比丘文五一明禮覲二問案否三問言汝從何所來已下問其來方四問言彼頗有已下因取自言五爾時已下正明呵責就第二廣明如非相中者昔來科釋文分為兩初則略明人法是非第二四滿數已下廣辨人法是非就廣明中復分為二謂四僧已前廣上人是非第二六羣作非法非毗尼已下廣前法是非也如此科釋者良謂不然以四僧以前重秉疊法者即是法非何以判言廣人是非七非之中及下諸文亦有和別第八第九乃至解不解駈不駈中咸有人是非寧得專說為法是非耶故今解者隨文義別且從一相科約以為十一段文此十一文者或可當分自有略廣本非初略後廣所辨如非更含多種如非不得專云人是非法是非將欲釋文先小第四辨定非之體狀初門者此中隨文有其十一第一對緣舉其四非以為相个二法結應不應對白等三法以辨如非第二四滿數已下就滿呵應不應約對白等三法以辨如非第三時六群一人舉一人已下就體未成僧或所為是僧亦不應相秉治約對白等三法單辨其非第四時六群重作羯磨已下寄治人罪諍不得重秉增加疊法約白等三法單辨其非第五爾時佛告比丘四種僧已下用僧分齊對白等三法以辨如非第六爾時六群作非法非毗尼已下就事法與人呵不止等約對白二白四以辨如非第七優婆問下寄問疑滯傍秉餘法藥不當病約對白等三法以辨如非第八異住處眾僧已下我曹解作及對眾秉法臨事難成約對白等三法單辨其非第九有住處眾僧已下寄眾共諍非約對白等三法為彰是非微細識否如非第十優婆已下問答疑滯約人法解不解以辨如非第十一憂波問已下對約對人法駈不駈以辨如非第二門者前科文名字即是當分之中所明宗意辨不異前然此十一文中除第三第四第八已餘之八段具如非謂初文中先列四非束為二非不應作二如應作第二文中滿數即如不足者非不應呵者呵不成非應呵者呵成不止非自外六文如非相顯可隨義說之凡舉非者識非須離明如法者解如遵行故此八文並列如非相對而辨以斯義故第三第四第八此三段中單出非法一邊略不舉如者理少不足也亦須准餘八文雙彰非如者是謂第三中如者即僧治一二三應秉故如第四中如者不重故如第八文中不作問者非法稱法故如也是即十一文中各具如非便成二十二个法相對辨之為以略故但有十九法也今據宗科文非如相對故唯十一段也是十一中第七第十第十一此三寄優婆問答以顯非如第九眾共諍非七見不同佛自刊正二是法語五非法語為彰七見識否如非餘之七文咸因比丘對事興非致令大聖廣定如非佛之在世猶尚如然者斯亦遠表季運眾軌或落非法之由兆也第三門如非多少者上下撿勘有十四種非也謂第二滿呵文中有其二非一不滿數非二不滿數非人呵不止非第三體未成僧或所為是僧不得亦秉治非第四重秉壘法非第五非法非毗尼等七非即是十一第十一傍秉餘法藥不當非第十三約對人法解不解非第十四約對人法駈不駈非也問七非之中已有呵不止非何故初滿呵中復明呵不止非也答七中呵不止者謂善比丘等六番前二十八人即此第二文中第四俱句是个此第二文中第二句乃是不滿數人成呵不止非不同於彼故別為第二非也問下四僧中亦有不足人等所以此中復有不滿數非答下四僧中止取少滅不足設明二十三人者此中攝也今此滿呵文中專約二十八人體不足者為此文中不言少一人故不足也以滿對呵應不應義說故明亦異於下文也問來六文所列七種非非法非毗尼等七非中無故知七非且從起說收非不盡具論上下十四種非今此十四然亦義中不盡若以四法現前驗之此十四中但有僧人法三種現前全無界現前處如非故謂隔河道遠相接錯涉戒場上說恣分衣或結界不成落餘非等是若以此一加文中十四便成十五謂第十五結界不成錯涉差互非細論如非不越斯也此謂收問十一段中七段之文以成十四種非及加處之如非故有十五也以其第五段文直明用僧分齊若也初文第八第九文意雖殊論其非如體不異七遂不更別說為如非也如問所論十五非各異不同即此揵度收羅非如作法方軌略亦周具秉眾法者豈不須知上代已來但說七非不曾細尋此理者斯亦失矣然此十五應說一切諸法科落一非即所非限所收秉法行事甚成難稱一切諸法可准而知之又此五十種非更作一法數之亦好是中兩个七非第一七者一非法非毗尼二非法別三非法和四法別眾五似法別眾六似法和合眾七呵不止也第二七者一不滿數非二不滿數人呵不止非三體未成僧亦秉治非四不得重秉增加疊法非五傍秉餘法藥不當病非六約對人法解不解非七約對人法駈不駈非也更加結界不成錯涉差互非便成十五非如也第四定非體者第一七非如下七非中辨餘之八種不滿數人呵不止非者雖能呵人具不具別如論非類同前七中說也二者不滿數非有二十八人尼雖具戒形報異類身口業殊故不滿數比丘對尼反說亦爾式叉等三身口之業鬪不具足故十三難者即十三難體是滅應滅以身口作止惡業為體三舉者耶見人身口業是神足等五身之業色為狀也所為人者即所為人身口二業現前是所斟量故不得滿數不滿數人呵不止非雖能呵人具不具別非體同七非說也體未成僧非者即三人等已下身口業也增加疊法藥不當病此之二非口業聲性名句味為體解不解駈不駈總以論者用口業聲性名句味作止業為體謂應解不解應駈不駈是口止業不應解便解不應駈便駈是口作業也結界不成錯涉差互非者以錯涉相接故或落餘非故故不成結即無作法限約分齊假有作法限約復差互可應故非自下隨文昔來解釋從四滿數已下至四僧已來之四段次第生起相因而興或可如是今之解者具從十一段文釋之先解初文有三第一舉數故言告諸比丘四種羯磨第二次列四名於此四中初一法非下三人法相參言非法別者人法俱非次非法和者法非人如次法別眾者法如人非也上來四句合有七个法也第三定是非應不應者合上五非為人法二非故言是中二羯磨言非法者收上三句中三个非法言別眾者舉上二四句中兩个別眾故言此二不應作言法羯磨者舉第四中法言和合者舉第三中和故言此二應作也中辨人法二非收非義不盡其事非者正當緣起此全不明故知略也亦可初非直言非法者亦含事非但是總略也釋文雖爾須以五門分別第一先定非如之體二約對白等三法辨相通塞第三對僧分別第四約處分別第五對事分別初門者所列四非是其非體第一非法或容更總餘非故直言非法羯磨下之三非人法互非者以人秉法故使互有如非亦落非限故斯四者明知是其非體相對而明都有七个法也下束其七中三个法非兩个人非名為二非一个法如一个人如名為兩如者但是結示上四有應作不應作此便不是非如體也所以然者如文中言是中二羯磨不應作非法羯磨別眾羯磨豈可非法離人之所秉若和人所秉即當第三非法和若別人所秉便是第二非法別寧容直言非法羯磨不應作等者別成二非之體為斯昔來說具非多少皆云略二增四等言者不然以無二非別相故爾二非既爾兩如應作者義比亦然但是合成如法也第二對白等三法辨者此之四非貫通一切白等三法謂百一或一百四十五法咸悉具有也言白中四者文句增減即是初非一白處作二白別眾而秉即第二非一白處作二白人和秉故即第三非如白法別眾秉故是第四非也白二白四四非者增減及事非第一非也為此作白為彼事羯磨名非法別眾秉故第二非也非法同前人和秉故第三非也如法作白作羯磨名之為法別眾秉故第四非也對白等三法四非相別其理既然一切諸法准而說之第三約僧辨者四僧所秉雖有寬狹白等三法咸有四非明此四僧亦通有四非也第四處者謂自然作法及大小等於此位二事四辨隨事十一諸界等秉法處中咸悉得有四非之義即是遍在諸處也以其所秉之法通一切白等故使四非亦貫說諸處乃可以法對處自有通局如論四非貫通諸處第五事者一為情道如憶念不癡罪處所受戒七羯磨等二為非情如結諸界結淨地等三情非情合謂處分離衣六年等斯之所為對事舉非並得成此四非義也第二段文有三第一舉數言四滿數者非四皆滿從初受名故曰四滿數也第二次列四名第三牒名解釋四羯磨人情過輕微治法亦輕故得滿數以行法在己入不呵限文但列三無遮不至者略而不舉也欲受戒人以未有戒故不得滿數根本事重是以聽呵俱不得中二十八人廣說可知俱得之中有六一善比丘反上二十二人同一界住反上二人同一住謂舒手內反別住同一界反戒場次有三人直相當反六乃至語傍人反上所為人若不自呵或語傍人此亦成呵亦既成呵明知非是所為之人故五分云若同界比丘呵乃至使比坐聞是為成呵准此文時雖不對秉法人語直共比坐評論成否亦成呵限也文雖如是須以六門分別第一滿呵相對分別第二就人多少盡否分別第三對白等三法寬狹通塞分別第四對僧分別第五就處分別第六對事分別初門者滿數故如應呵故有呵不止非不滿數非者然不應呵呵不成呵非此謂一往滿不滿相對如斯若約此中四句者初與第四此之兩句並是滿數有應呵不應呵二三兩句俱不滿數有應呵不應呵又以呵應不應對滿不滿者謂應呵有不滿及滿即二四兩句是不應呵有滿不滿者初三兩句是若欲辨此四句非有無多少者第四句唯有呵不止非第三句單有不滿數非第二句中欲受戒人故有不滿數非佛聽呵故有呵不止非第一句滿故無不滿非不應呵故亦無呵不止非也問此言呵應不應者是何等呵耶答汎論呵者含有二義一謂情乖故呵呵成別眾二情同故呵呵成呵不止今此呵者但據情同呵不止非以說之所以知者如第二句不滿得呵者得成其呵不止非豈有別眾義耶故知餘句並約呵不止說也亦可雙望二呵辨應不應初句者被治人故不成呵不止得滿數故呵成別眾是則應呵文對初義故言不應呵第二句不滿數故呵不成別事重聽呵呵成呵不止第三俱句不成二呵不滿數故呵不成別不合呵故不成呵不止第四俱句並成二呵是滿數人呵即成別清淨無過呵成不止第二約人多少者第三句不滿數不得呵者二十八人此據體不足數及治重者說之故爾若以義求謂更須取呵責等四別住等四并罪處所合有九人以其並奪三十五事故配二十八人都有三十七人還對作此九事之時即成三十七人不得滿數復不得呵故覆藏犍度云別住等四不得五足數也明呵責等五人類亦數然除斯九事已外諸事但有二十八人不滿不得呵今但據餘事不望此九故言二十八以彼九人非體不足故爾第四句對番二十八故言若善比丘等六反即是滿而合呵若對反三十七人者應加第七謂非被治等九人即反三十七人也初句應有九人文但列三少遮不至及別住等四罪處所等六人者略也第二句但有欲受戒者一人最是狹少以義而言理通男女二報也第三約法辨者第三句通白等三位一百四十五法並是不滿數不得呵然三十七人俱句者唯對呵責等九个白四若取二十八人俱句除前九已即是通餘一切白等三法也第四俱句者若以七反前七人者唯九个白四若以六句反前二十八人即是通餘一切白等三法第一句除九个白四說餘白等三法第二句者專局受戒法中戒師之白及白四法通男女不行餘法也第四約僧分別者第一句通五十兩僧四人僧中除八个白四及二十人僧已餘四人僧中理亦通有第二句者十人僧全五人僧中少分餘二僧無第三句但據文中二十八人不滿不得呵者即通四僧若也立義須加九人為三十七人俱句者唯二十人僧及四人僧中八个白四不聖餘法五十兩僧之中全不說有又若對除此之九事局據二十八人俱句者得通五十兩僧及四人僧內除八个白四已得在其餘法中第四俱句者若也依文以六反前二十八人俱句者通五十兩僧及四人僧內除八个白四已得在其餘法中第四俱句者若也依文以反前二十八人俱句者於四僧若加義被治等九人以七反前三十七人俱句者唯在二十人僧及四人僧中八个白四不忓餘法五十兩僧全不得有若也對除此之九事局據二十八人俱句得通五十兩僧四人僧中除八个白四已得在其餘法中第五約處局作法說於大小不在自然中以其不對結界事故餘之三句處說自然等一十一界為其得對結界事故第六約事者亦通一切准說可知第三體未成僧不得互秉治中文四一六群起非二比丘啟佛三佛言已下道不得作四若一人一已下佛判不成也造過之中十三句非謂一二三人中各有四句僧中但一故爾餘之文二亦俱十三除第二啟佛之中略也須以二門分別一者約人二者對法言對人者以體未成僧若據第十三句雖體是僧若所為是僧並名人非謂一二三不得始舉四境及僧舉僧等故十三句也略不辨如謂得治舉一二三等是也文寄違情治法若也准說一切順情及為眾秉作等如處分離衣六年杖囊結諸界等一二三人等悉不合秉也餘之三僧應不攝在僧分齊中論之也言約法者文寄治人似專白四准其道理餘三僧所秉亦通一切白等三法若此體未成僧一二三人等秉如斯法並悉成非故爾五人等三僧所秉應否亦在分齊中辨也其處通局及所為事等可准而知之不更煩篌下皆類然第四重秉疊法非中文三初明造過次舉白佛次判不得略無第四判其不成也造非中謂七羯磨別住等四七毗尼等合有十八謂約治人治罪彌諍等法論之且舉應與呵責乃作十八重法也一義釋時根本呵責法者得成以藥病相當故就上重作擯等十七者並皆不成以其藥病不相當故乃至如單覆地亦各十八合三百二十四番重秉疊法於中十八者成餘三百六咸不成就也又復更解根本十八並亦不成以其本作呵責治之何因呵責法上增加疊法重秉十七豈可不是呵責治上乘增所作故並非法若此成者如一白處作二白亦應成就然初白稱法不合重故判以為非故此亦爾呵責既爾餘法亦然理通一切不唯十八也二門分別一先約法第二對僧言約法者文寄十八法辨之計其道理亦通白等三法謂一百四十五中除三僧所秉自恣等十三个法餘一百三十二法科將一法作頭重秉餘法乘加疊法並是增非即是菩薩其根本合成一百三十二个重非餘一百三十一法亦各具此爾許重非便成一百三十二个一百三十二非五人僧等三僧各於當分所秉以重非准說可知言對僧者此之四僧皆有重義但是壘法咸悉不成且四人僧中所秉多重非亦多五人等三所秉事狹重非遂少可准而說之亦可既云重秉之非但是重有何寬狹四僧齊一百四十五个一百四十五非也第五用僧分齊其文有四一舉四數二列四名三是中已下用僧分齊四若應四人已下足數不足數四種僧義四門分別第一列數解釋第二立四所以第三解除妨難第四人法相對初門有三第一總明釋名辨體二須四五等所以三用僧分齊論僧差別略列四種四人五人十二十等所言僧者西國云僧伽此云和合眾但以眾名正悉於僧和是眾家義用故總言和合眾和合有二種一者理和非此所明二是事和僧事和有二種謂羯磨說戒與此和法相應同崇莫二目之為僧故曰四種僧次辨體者若依薩婆多宗即以四比丘五陰為體若成實論者合用異本謂四人和聚有其假用然用無別體還以實法五陰為假用之體若出和合體者俱舍論問僧和合有何性答不隱沒無記行陰攝僧破亦爾第二門須四人等所以者要四人已上作法方成有陰罪滅諍始名為僧且如說戒一人秉說一人上座一人唱白三人秉眾下至一人聽戒四人和合始可名僧若三人已下即𨷂此義亦可法爾須四故心論云四人名僧非三人是故須四言五人僧者義通受隨隨謂自恣舉罪治罸若但四人不成差治故要五人方成僧用若爾受日處分離衣六年等亦須五人應五人收答受日為別不得五皆受日故所以非若爾功德衣為眾應是五人僧耶答有得利不得利故亦非類今自恣者一則為僧異受日等二五皆自恣不同德衣故是五人僧問為差治故須五者正差正治是五以不答差治四人僧問何時五人僧用耶答正自恣是所以爾者本為舉罪若但四人不成差不成治舉義則𨷂故始終須五方成恣舉正取白竟受自恣時是五人用以其但明三非及遮時以說故知專取自恣時為五人僧用也邊地受戒五人者謂以中邊折半如受日三等羯磨對事為三之類故爾十人僧者凡夫因善微淺要假十眾善心慇篤方發戒品稱彼情樂故制十人問邊地出罪在十人攝不解云不開所以爾者欲明大聖見俗網羈纏生善極難邊僧悕甚若不開五人永絕出路開成得益論懺不開者佛法難逢秉心宜固反以無慚違禁興犯若開十人懺者增長諸惡故是以文中不言十人僧者在中國除出罪二十人僧者為比丘以守悉不窂中間虧缺為障處深垢纏彌厚可悔中重救拔事難自非強緣無以除彌稱彼事故制二十人也第三門對文說之第二門僧四位二前兩法爾後二遂情法爾二者四為成說防未起之非五為成恣除已起之罪遂情為十二十者言十人僧為欲生善二十人僧無求滅惡位事通論離不成四僧又約受隨分別五十人對受立二邊中別故四人二十隨中立兩已未不同故但四僧以一切法無過受隨攝法斯盡故約受隨立四僧也問懺重偷蘭境須八人所以不立八人僧耶答言須八人乃餘部所論今此律所明大眾者若四若過故知若懺偷蘭之境四人僧攝又此文中四人僧者但除餘三不甄悔蘭五人除二故知更無八人僧也又五分言無量比丘僧者彼直列名更無別用此雖不辨義亦同有是以下文況復過二十者即是無量之一義也第三門所以四僧減則不成過則成就羯磨教法過成減不成答僧和詳集許無乖別若定制數必有乖別是以過成不詳辨事是以不成法則不爾無乖別之過故使過減俱不成就又羯磨教法要稱聖教佛說楷准若過則增益凡語若減缺於聖說故無過減然制僧數定豈非聖教但今集者不是聖教過則彌善與法非類若依祇律應二十眾作羯磨十眾作不成乃至應五人作四人不成應作白二羯磨白一不成乃至應單白而作求聽羯磨不成若應作求聽作白成就乃至應作白一乃作白三成就應四眾羯磨若五眾作乃至應十而二十眾作成就是名羯磨法是即人法一類也第四門所以能秉有四所秉唯三者解言非是一僧不得秉其三法四僧通用三法但以受隨情法故立四僧法中立三旨就所作事有上中下三品異故對斯三義立三羯磨戒自恣僧所常行情和則易單白量可即能辨事故立單白羯磨如受曰離衣杖囊處分事非常行情和次難一白表宣一羯磨量其可否方得辨事故須白二羯磨如受懺治人等事當上品情和最難白非一白牒事表宣三羯磨量其可否何能辨事故須白四若爾憶念等三亦者為三品俱同白四者何答以細分有九故於上品中復分三品俱白四也次釋文是中已下彰用僧分齊於中須以兩門分別第一約人第二約人復三一對比丘第二對尼第三二眾對否初門對比丘者位三謂一眾多僧有四別眾多一人局在四五所以爾者十人二十人者必專僧秉無下二用以為別人遂情故爾四人五人此之二僧以通常行制令作故法即有三謂心念三語羯磨對此三法人有三用四有兩眾多五有三眾多一人隨前二也於中位二第一望三位各局者於中自三第一自有局一人如懺吉羅者是一人法也第二局對眾多人如受衣鉢藥淨施懺三四篇等是若此律大眾悔蘭三階中亦有三人也除安居此等法爾須一人二人第三事專局僧如結諸界處分離衣六年癡狂七羯磨罪處所等第二用通三位謂僧眾多一人如說戒自恣二種分衣及以捨墮有人對多無便對少而對一人捨者謂以僧眾多一人為懺罪境不同說恣等四中一人者須秉心念法也若論別眾對餘得否亦可知又復對法各作不作亦可知雖可四五所為通別今局明僧僧位已上是僧秉法眾多已下𨷂而不論問如說恣等通僧眾多一人所為事同有何異相專此明僧眾多一人簡而不攝答異相眾故爾一秉人多少二法不同三處有通局四欲無欲異五別眾多少謂或三二一為斯異故且局諸僧問四人唯四為過得耶餘三亦爾答對此四僧少非僧用故文言四人少一人者非法多則成就故文言況復過二十問相狀如何答如雖五人十人二十百千人等但除四事減四人僧攝文言一切應作除於二事但為恣並五人收餘二可知此據約事取人以明分齊問何以不言二十除說恣等答在上通下得為多用下辨上故有相望說除四人用寬餘次第漸狹第二對尼通塞唯比丘說第三二眾對否以彰分齊受等三法得為尼作故教授自恣各行僧法片有交涉餘法皆無准此行法二部四僧俱有交涉用之分齊十律佛言受戒等三比丘得與尼作餘不得作不禮不共語不供養尼為僧作第二就法辨分齊者前言對說立四乃至二十對出罪等為四但說戒乃至二十唯得出罪為此四僧並得通秉三法答此通秉一切如四人尚秉何況餘三此總相說其別相者唯四人僧所秉說三體成僧故如說等單白差人等白二呵責等白四以其所秉不過有二謂說戒及羯磨故爾如上立四且對一法非謂四人不秉三也問若通秉三者何以除恣受等者答此謂除事不是除法此謂約事除一單白及三白四等餘皆秉之故言一切羯磨應作五人就通亦秉三法約事辨用唯有一白白四是五人除二白四若有秉者而四人中收十人唯一白四等除一單白一四白四若有秉三法者亦並四人中攝二十人者但秉出罪除五人十人所秉設作諸法餘皆四收四人用寬體成僧故餘三便狹以就僧位中約事須立故爾文如義說者應四人羯磨已下明不足數義謂四人少一人非法毗尼故文言少一人不得作法便以餘二十三人為第四人作是不足不足者尼是異眾故下三眾等及十三難非具戒故舉擯等五不清淨故所為人者是所斟量故不足若以足數反前應有其兩一善比丘反二十二乃至語謗人反所為人此文略而不反亦可但簡不足故爾其不足中十三難者本受不得故滅應滅者今犯重故問前四滿數中二十八人今此所以無餘五者答此取在坐不足者說別住等五來即數故所以不說若爾身若在坐即成呵滿何故彼有答欲明遙呵不成呵故若爾為顯不成遙足解言此舉四種僧等故對少一人中攝上不舉四僧等對何辨少所以爾者此處專解不足數義何故不足少故不足何處去少謂別住神足故少但言少一隱餘名字故唯列二十三人前文通解呵滿若言少人者對滿可爾呵義不順正是少人豈可由少呵不成呵如四人三人二人亦有應呵別故故彼不得舉少一人攝別住等以無可攝故廣列二十八也四人僧中廣解不足餘三類爾故言五十人二十人僧亦如是第六就事法與人呵不止等以辨如非者於中文四一六群造非二舉以啟尊三佛判不應四云何已下舉章廣釋非如之相將欲解文先料簡義七非五門分別第一舉所依三法生非多少第二列數釋名辨其體相第三名體有無第四總別第五攝非盡否若講文者第二第三對此文解第一下兩義須懸說先解初門謂此七法總而言之不離三法故爾言三法者如白羯磨白二白四此三須意可知次釋具非昔來釋云單白一法略二增三次四廣五白二白四略二增四次五廣七也如上解初文中說其二非者無別二非別體即四非者是既有此理故今不應更言略為二非之言但可言道略三次四廣五若白二白四略四次五廣至七非也亦可白二白四始從一非終盡其七問言略三等者且約文說並引文可知今所論七謂從白二白四兩法中來也若欲略辨同異者問三非中非法別等三與七中非法別等三有何異耶答白中非法如為說戒乃作自恣之白餘二比說可知亦可一白處作二白名為非法餘二此說亦爾七中非法別者為此事作白為彼羯磨餘二比說可知問白二白四中略四初非與七初中非並言非法此有何異答四初非法不攝下三白此事等又可不攝下三一白處作兩白餘之非等容可初非中收七初便狹以其離出下餘六非故使七初狹於四初也自餘非等互相比挍可類而說之若舉白等三法約十五非說者如論單白四十三法中二眾戒師一个單白始生一非極至一十三非以無二似非故餘四十白始起一非終具十二又除下滿數人呵不止非故爾若白二白四一百二法中除二眾受具白四本法白四此三白四始從一非終具十五餘之九十九法但可乃至一十四非又除不滿數人呵不止非故爾若三法生非多少極至如是不得直約一个七非說者餘爾許非欲置何處秉法行事可審思之第二門三第一舉列七非之名非出妄情事乃眾多或從起說或可約略且辨七非謂非法非毗尼羯磨乃至第七呵不止羯磨羯磨通名謂是辦事其別名者作無軌則名為非法不能滅惡生善是非毗尼故言非法非毗尼羯磨此實不能辨事所以言羯磨以其非法非毗尼作他辨事故言辨事餘皆類然第二辨體有兩一就事法與人相對辨體二約業性辦體言就事等者其唯人法與事呵不止等以成七非位以為三初一法事辨非次五人法相參辨非未一不止以辨非第二人法五中非似二別人法俱非非似二和法非人如法別眾一法如人非問若以義求法位有五謂非法非毗尼一非法二似法三法四呵不止五以此五法對人和別應各為兩便可為十所以但七耶解言法和是如故所以無言呵者不呵是非因呵以生非既不是非何須對呵以分和別又所呵通如非即呵前六若對和別與前異攝非不周故直言不止初非一法且對法事故但七非第二就業性者不離身口二業及以事處為體然言非法局身口二業二業之體若如受隨二種戒體作無作唯局善色聲以說今此七非亦以方便身口色聲為體而可義通三性及非色非心名句味等是也以皆得成非法故爾如非法別眾別眾者不善色聲非法和者是善色聲然以非法及似法故名非法即此非法似法或亦是其善色聲而成非故餘非亦爾縱善心作法但不應法並落非限故此非體義通善惡等性也第三辨相對文解第四總別者若就體以望各不相攝咸是其別非三總故以義而論初非或容是總以下六非並是不能滅惡生善故第五盡否者且從起說攝非不盡所以知者凡法皆具四法現前謂僧法處事並有如非也一僧如非謂和別等言僧非者一體非謂二十三人等二體如別故非三體如和合非謂僧治僧等僧如反上說一者體如謂善比丘等二體如和故如三應秉故如謂僧秉治等二法如非者有四一增減差互故非謂不如白法作白等及七十八非等二倒作故非如二似等三重秉重作如壘法治人四施不相當知三百六等第三處如非者謂隔駛流等二界錯涉相接戒場在界外故結法不成及以秉法對處差互如戒場說恣分衣處分等此謂處非也如反非說可知第四事如非者言事非者如初緣治人無事或無病衣輕差人闕德覆鉢學家難遮受等如是一切也事如反上可知以斯四義觀驗七非明知不盡且從起說也又可更說如上所辨推文及義理合有彼十五非如今但論七明從起說文亦不論單白中非不盡之事斯亦何疑次下釋文即為七段先解初非於中復兩初至非毗尼羯磨舉非令棄二云何已下明是勸修此二並三各舉釋結就前釋中復二初至不應爾法體以明非二是中已下二十一句無事治人以明非法前非中有二第一就白二辨非次約白四所以不明單白非者一以白中無七非故二以白非說恣法中已明竟故就白二有兩初有十九句先白後羯磨純白無羯磨作四句次有十五句初一百有三謂羯磨僧若一白一羯磨如故不來次二白下有十二句兩俱增合十九句竟次有十九句先羯磨後白為異即是初四句純羯磨無白次有十五句初三句羯磨一而白增一羯磨一白落在似法故此不明次十二句兩俱增次有一句就增減以明非都合三十九句下白四亦三十九類而可知第二無事治人有三七句初七句者語實無罪浪答他不見等尋聲行罸三單三雙一合故成七非第二七句亦實無犯答言見等為異第三七句實有罪答言見等無耶見過治則非法三舉既非類餘羯磨無病皆非略而不說第二如法中初就法體明如白二白四各有一句反前兩个三十九次就事辨有過合治次以明如法但有七句各反三非謂有罪等番前二不見等番後兩即反二十一非問所以如少非多乃至呵責等七法中如非各有九个三耶一釋趣以一義故爾可為三位第一或非多如少如此中約事及人滅中所明等是謂據教體中或法體增減如此文中白二白四非等或隨位增減如人揵度中非如等或互列增減如自言非如等以其體無二故如便一准非出妄情故非或眾多也第二或如多非少謂嘿然等約心以辨不隨境故第三或如非等者謂就作法儀式互相反對故齊九三也又解不爾此作法如非九个三者上言如非等者今釋亦如是非多如少也若以如隨非句別相反以二十七對二十七若尋究竟推審以體及體七如反九非以其餘非並九中差別故若就成法以如反非一如反九非亦是一如反二十七非所以爾者如以具緣一揆故總收七體以成一如缺一即非隨彼九體一一缺故便成九非若據隨用差互乃至得成二十七非豈可不是如少非多第二非法別者文中先解別眾以其集眾在前故昔解但有二別一應來不來二應與欲不與欲三應呵者呵呵前二別故今釋亦是別眾依十律句三別一和第一別者所須比丘不和合一處二可與欲者不與欲三現前比丘遮成遮是名別眾第二句𨷂初一句是名別眾第三句云所須比丘和合一處二可與欲者與欲三現前比丘遮成遮是名別眾第四並𨷂上三是名和合又復五分云何謂別眾羯磨應來不來應囑授不囑授羯磨時呵人不同而強作羯磨是名別眾羯磨准此二文明知第三應呵是別也若爾與第七何異答全大不同此情乖故呵呵成別眾下情同故呵呵成呵不止也應與欲者如何名應所謂網欲人如處同事如體如緣合持人如等是也應呵者謂體如處同故此三別中第一別眾局申手外和通內外以後來人告淨成和故第二應與欲者別之與和並申手外為其在內即是初人成和中收故第三一種成別成和俱申手內問若使前二要申手外是別眾者所以不定遠近但言不來不與欲耶答以有成和義故不得定言餘四非法准說可知第七文四一舉章假問二或有已下列成不成章門三解不成兩門之別於中先解不成有舉辨結解成章門亦舉辨結即依此文要是如人呵非及如成呵不止故文中言二十八不成呵即知非法人等縱或是呵本不就之以明非以其無不合呵何須約之以定呵非是以列七非名中直言呵不止也又上止呵滿文中第三句二十八不得呵故知即同此也唯除第二不滿人得呵者此一不滿人呵呵成呵不止明餘非法人本不合呵何勞就之以辨非也或有就之說非者不然也四是謂已下結成章門對此須解名體有無者此呵不止有名有體謂前六非未呵是前呵不止收如似非法別非法和用人和別以分二非等類而可知及六非外呵而不止故知第七具有名體不同昔解有名無體也第七藥不當病中初憂波問藥不當病三百六非二佛語已下對辨其如為十八也前明非中有十八頭先以呵責作頭兩个十七先舉作不相當佛言不如法次不應與作呵責已下又有十七佛判不應餘之十七同爾故曰展轉乃至草覆也次辨如中唯一十八二門分別一者約法二者就僧言約法者文中且對十八法論之各有十七个非藥不相當即是十八个十七非也以義推之餘亦如然謂對一百四十五法各互為頭頭別具有一百四十四个藥不當病遂成一百四十五个法成有一百四十四个不當病非文且略舉三百六个非也若對非辨如者文中對前略辨即言十八个如若反後說者謂是一个一百四十五種如法也言對僧者此之一百四十五法總而論之是四僧所秉然四人僧中所為事多傍非亦多五人等三所為事少傍非亦少義准可知第八臨事難成中二門分別一者約法二者對僧言約法者昔來所說還寄十八法論之先對呵責作互非請佛佛判不成故言諸如是不如法不成就下十七頭類亦同爾故曰如是一切亦不成就其中現前自言草覆三各三非餘之十五各具五非故合八十四非也或可約七非說者十五个七非即成一百五餘自言等三各五通收十八法有一百二十非也若更廣辨者法有一百四十五法非有一十五非若白二白四等一百二法中除受戒三个白四具十五非餘九十九法各但十四非即是一千四百三十一非若四十三單白者除二部戒師三單白各有十三非除二似故餘四十一个白各但十二非也又無不滿數人呵不止非故遂成五百一十九非并前總有一千九百五十非若臨事難成多落爾許非也對僧說者亦是四人僧所為事多臨事難成落非亦多餘三僧等所為事少其非亦少第九段文諍非之中為比丘作非法別眾羯磨七人共諍佛言非法別眾者是法語也如五分說應言二人如法語謂非法別眾及言不成者是餘五非法語此亦應然乃至已下類諍餘四非一人是法語故曰乃至法相似和合是法語於中二門分別一約法二對僧言約法者除二部受戒三法具十五非起十七種諍餘九十九法白二白四咸有十四非義科舉一法作頭寄諍一非謂非法別眾一个非法即與一十六種諍論謂彼各執十四種非及言成不成者是佛若刊正判言是中二人如法語謂道非法別及言不成者是餘之十四種說並非法語一非即爾諍餘十三義亦同爾一法既爾餘九十八法等類亦如是單白之中無二似故除二部戒師三白有十三非起十五種諍餘之白等又無不滿數人呵不止非故但十二唯與十四種諍比說可知廣說應然今文中略也言對僧者亦是四人僧中所為事多諍非亦多餘之三僧所為事少諍非亦少也第十疑解不解中三門分別一約人二約法三對四僧言約人者唯十三種人永擯無解解不成解即是解而成非餘假為人解即成解不是永故若不為解是不解非也是故文言或成不成云何不成佛言十三種人不成解除十三人已餘人成解也以義而言諸順情乞領為人作等亦不須解解即非也問十三人者何等是也言僧尼四重八重下眾滅擯是也問若上二眾離四八為十二下眾四重何不加上為十六人耶若更隨事十三難等何但十三人也今解言十三人者謂十三人者謂十三難人以問所立十三者並邊罪攝故若爾十三難中並可盡羯磨擯耶而言羯磨已不成解答如文外道故煞文等並言應滅擯故也餘悉成解言約法者昔解無心乞領並是須解有心乞領便不須解今解此二各解不解有心領中二同行鉢受懺僧懺發露離衣六年處分差人受日四月還衣罸令用舊持新杖囊解七羯磨學悔等並不須除受戒一法恐犯戒故所以聽捨捨功德衣寬賖故解也無心乞領中不問僧別亦解不解如擯治者永棄無解闡陀兩白雖名治罸立制預防亦不須解詣諫戒等諫勸非治故使此等並不須解自餘須解謂解界等十一眾須改作故有解法約人十三謂七法治人罪處所癡狂覆鉢學家不禮捨教授此俱解所以爾者一並無心乞領不同離衣等二俱無曰限失法分齊後異受日三交相治罸除疑立制不同差人闍陀二白二同四月及詩諫等四為欲治取又殊永擯學悔等故使此等並須解法此須等總有二十六法如受戒須捨捨功德衣一个單白謂解諸界及人等十六个日白二七羯磨罪處所等八个白四此等諸法聖制須解自餘一切白等三法並不須解今文中直言十三種人擯棄白四是不須解餘者成解如斯說者是總言耳第三對僧者上來所列理合須解及不須解等并四人僧所為之事除受戒一法也若餘三僧為眾遂情咸在不須解中第十一段文駈不駈中亦以三門一約人二約法三約僧言約人者局十三人是其駈限不駈即非餘不合駈駈即非故使文言或成駈或不成駈若為十三種人作羯磨已駈出成駈除十三人已為餘人作羯磨後解羯磨得解若駈出不成駈出言對法者唯一个滅擯白四是永駈之法自餘一百四十四法本非駈法也言對僧者秉法四人僧家所為之事非餘三僧自餘法等義通四僧如用僧分齊中棄亦可此白四亦通四僧所秉亦如分齊說也謂五人等秉此駈者四人僧攝故
