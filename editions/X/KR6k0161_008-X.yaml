body:
  text: 沙門法礪撰述三十尼薩耆法三十九十雖復文別先後捨不捨異罪性均等三悔處齊故百二十戒合作第三篇所以先明三十後說九十者良以三十於此財物取濟失方廣生罪累若欲洗心懺悔要須對僧捨彼財物相續貪心心事既捨罪方除滅作法是難欲使僧尼先識於難次及於易故列在初九十事中雖有因財生罪皆不須捨但斷相續犯心即得懺悔作法是易故須後說尼薩耆者西音此方名捨捨有三種一捨財物二捨相續貪心心事俱捨便能除罪故次第三捨罪波逸提者此方名墮故曰三十捨墮就三十中第一須總解二隨文別釋總中十門一對下九十捨不捨異二解三十中一人盡犯同活及僧犯之多少三自作教人同不同義四身口分別五性遮不同六重犯不重犯七捨懺方法八持犯方軌及解二問清淨之意九二部同異十下眾任運有犯不犯初門者凡三十入捨咸具三義一是屬己財物二財體現在生罪受用有過三捨己歸主受用無𠎝是以入捨須意可知下九十中二十五戒亦因財事不入捨者三義中闕不得入捨位可有三一由食生罪有十四戒除取過三鉢餘十三戒謂讚一展別足勸非殘受美藥須虫水等未食無罪可捨食方生罪復無可捨闕第二義故但九十收第二位食中過三外財淨施此二闕於初義如取過三鉢雖取過有罪然是他食食味復通是以佛制分而共食即非己物故不入捨若爾三十之中生薑貿食亦是味通何以入捨答自己生薑貿得此食體是非法無同味義即是屬己為斯入捨問若取過三鉢不入捨者乞得多鉢何以入捨答食味是通佛制同食義無別屬故不入捨鉢本別屬即是推己義具故捨真實施衣雖輙取有罪不失淨法猶屬施主即非己物故亦不捨此三十中二離浣故過前用雨衣是別受持衣明非淨財長衣等五由不淨故犯明亦己物五敷擔擗及以乞縷未成之時不應尺量不合淨施若成應量即犯復不得淨奪衣一我已受持衣或可淨財捨時失淨故亦入捨自餘領受等戒明非淨施俱不屬施主故並入捨問施衣輙取不失淨者離衣宿犯受法應在答受許不離離即違要故失而得罪淨專離著作淨之時不道須問方取取雖有罪淨法不失亦可淨法離著無為受用今還受用輙雖有罪淨法不失可得言道本受持衣無為離宿故非類也第三位自餘十戒闕第三義又可脫脚看䨱無其捨法白色三衣捨已猶白不得著用能勝染壞故亦不捨若爾白毛臥具何以入捨答白毛制作不制受用捨已得用義具故捨高牀下七捨已受用還有罪累闕第三義如牀等須截牙角打破貯牀梚却故亦不捨問鍼筒打破不入捨者綿褥斬壞何用入捨答即以斬為捨若爾即用打破為捨答綿褥斬已聽許塗壁等用故得入捨所破鍼筒損功甚大若壞已聽用貪心叵息不得受用故不入捨下作如意等者謂無非鍼筒者得第二門一人遍犯四方僧物令是不犯此二可知但同活人及現前僧下文二且言有三人犯尼薩耆謂眾僧多人一人不定頭數事亦難知今以義推同活人者縱四人已上並是同活人攝現前僧者四人已去汎失受畜未分等物須定此二色若同活人不共犯九戒餘者共犯謂二離衣宿一月衣六年不褋二鉢七日藥雨浴衣等如二離衣是別受持物無共受義何有我離令彼得罪鉢無共用多論二人共乞一鉢吉羅故無共餘者可解二十一戒共犯中亦容不共犯者如有長衣同生俱現而不淨施咸有情過是即共犯若有遠行令在家者說淨而在家者不作淨法行無情過是以不犯今就共邊故言同犯如浣故衣若同生人共有一領長衣未說淨十日內曾逕身著共使尼浣二人共犯多論若二人共一衣乃至多人共衣使浣等吉羅若同活人在道行遇賊打剝失奪三衣居士為失故施而過知足取受者自犯在家同生不失不受豈可同犯今言同犯者同失同受俱有情過故爾如此說時更有六戒亦不同犯謂浣故衣過知足綿褥黑白二臥具奪衣兼前九戒合十五戒並不共犯餘十五共犯若現前僧但犯二寶如結集說㥧增三文餘無僧犯問共畜尺六多人共犯何以一人作淨盡不犯長答以屬他故若爾一人懺竟餘人罪滅答據淨屬他故一人淨竟通益餘人悔除業累各自有罪故一人懺竟餘不即滅若爾受衣五利餘亦得利答長一向共故有兼益德衣五利利有共別故使一受不得兼餘第三門若論自作唯犯二十七謂除二浣乞縷乞縷但吉二浣無犯以佛不制故今言一人盡犯三十戒者通自作使人故爾若汎教人不為己者盡不犯提教人為惡但犯吉羅以其利損不專己故若為己作者十一戒犯謂二浣乞縷一向教人中犯以假使尼及非親織故五敷二寶奪衣為己犯故自餘非不為己事未必稱唯可犯吉羅此義亦難如教人迴僧販賣亦應遂情何不同犯且依前說第四門身口分別此三十中擔用二局身餘通身口於中義三一有五戒口家止業共身犯謂五長是二有兩戒身口止作業共身犯謂二離衣宿是三餘二十三口家作業共身犯位復為三二浣乞縷自口假他身五敷二寶奪衣等八自作身若也教人自口假他身餘十二領受自身口假他身第五門性遮者迴僧物性惡氣分餘悉是遮第六門重犯不重犯者有四戒重犯謂擔用二浣此物現在容可更作故得重犯如使尼二浣染等雨衣數用擔毛數過以其失不異前浣衣擗毛等浣上犯染打染打亦爾故律文使浣染打三尼薩耆此是異類重比如擔毛過過重犯更非別毛故知浣浣或復染染及打打等同類亦重自餘諸戒咸不得重謂一奪二離五過六作十四領受等是一奪文中現前不現故有二句理實無重二離者初離失受後離無受法可失五過者限內應法聖聽說淨越限有過更不合淨故六作者一作已竟無重作故十四者謂取尼衣乞衣過知足一居士二居士王臣二寶販賣乞鉢勸織過前求雨衣過前受急施迴僧等是初受屬己更無第二領受故此等諸戒並不重犯所以須知重不重者為識業累多少第七門捨懺方軌二門解釋一當宗以辨二諸部同異當宗中四門分別謂財罪還衣不還結罪此等須四引文可知一就捨財復四一所對境境中位兩一對不對分別綿褥獨捨餘咸有對對中道俗俗中唯二寶道專餘戒道中通局局僧乞鉢餘通僧別又寶等三聽別眾捨不對道故餘悉盡集如文可知二所捨財先簡是非謂衣鉢藥寶尼加十六收此等入捨捨有二別謂全壞不同綿褥壞捨餘皆全捨三捨財處界通二位自然作法但乞鉢一局唯作法餘則通兩二就作法中大小分別乞鉢准大界餘通大小三住處非住處鉢唯住處勝鉢奪留入僧庫故餘通一切四捨財法者要有其二謂羯磨語法羯磨一法捨財中無以別人行施不由眾和故爾若論語法唯除綿褥以不對人故無其語法餘悉通有有中俗道僧別辨異可知因此須知具法多少或四法如對僧等三人或三法如對二俗無威儀故或可無法謂是綿褥位為此三也第二捨罪亦四第一捨罪境若言捨財有對不對俗道眾別論其捨罪一切對道以秉法故道中僧別乞鉢害僧寶等三戒專唯對別餘二十八事亦說三境此據假不假說若正望除罪其唯別人別眾義者謂寶等三得別眾故二所懺罪須知財事現即是有捨無捨義不現雖無無不可捨然若業累定是須除要必具牒根本及著用等八有無多少先後等一一須知此義下當辨三捨罪處寶等三戒不簡二界大小等別餘二十九中若僧秉法鉢唯在大餘通二作二十八中下之二境同前寶等又與捨財之處差五亦得謂此處捨財餘處懺罪亦應無失上來所辨位約為三也第一鉢大界第二除寶等三餘二十八對僧捨邊專在二作第三寶等三戒及二十八對三人已下處通一切四捨罪法法有其二謂羯磨語法語法即通以並對比丘懺故不同捨財中法若論羯磨除寶等三餘二十九若對僧邊具有二法謂有受懺白故二十八戒對三人下及寶等三亦但語法問所以捨罪還衣有羯磨法捨財中無下自當辨因明具法多少對僧法六三人下五一人有四四者除乞鉢一餘通一切言五者除寶等三及乞鉢餘二十八戒等是六法者二十九對僧者是然若約戒橫分別者位亦為三寶等三唯四法乞鉢一戒專唯六法餘通六五四也第三還財差別三門分別一約捨心差別二捨之離合三正辨還法初門者謂約捨心差別除寶等三不對道故餘二十九中長等五戒謂長衣一月衣長鉢七日藥急施過後𨒬宿方還二十四等即坐聽還良以長等皆由𨒬曰相續儲畜長貪之過若欲捨財斷彼相續非法畜心所捨長等不得即日歸主容得小罪故要𨒬宿若當有緣聽即轉付故多論六句第一衣已捨罪已悔畜心未斷若即日更受衣於前衣邊染更犯捨第二句衣已捨罪已悔求衣心不斷乃至一月若所得衣及得意外衣皆染犯捨此得罪由非法畜心不斷故下曰心斷故不犯捨墮第三句衣已捨罪已悔畜心斷即日得衣不犯第四句衣已捨罪已悔畜心斷後日更求得衣亦不犯捨以中間非法畜心斷故無罪第五句地了時捨衣罪已悔畜心斷向暮更求得衣小罪第六句衣已捨罪未悔畜心斷使多日得衣小罪自餘戒等非曰相續中犯故即坐還主第二門者別捨可知儻或合捨一二三等還法如何若欲辨釋先束前五以為三位三長為一長鉢為一七日藥一以此三分用為能染除寶等三若二十四等共長衣戒一二三合捨者有其五戒即坐歸主謂二離二毛乞鉢二離受持二毛不應尺量鉢衣性別益不相及過不相損故即坐還雨衣過前受者可爾若過前用是受持衣或與長衣合捨亦即還以不染故即六戒也餘諸戒等若捨即還容為長染相從逕宿次一長鉢與餘共捨唯留乞鉢次長藥共餘捨者餘並即還內外資別故上來所辨據其重犯而說謂販賣等體有長過故須經宿若作不重犯釋者如販賣等體不如法未合淨施豈有長𠎝若與長等合捨者亦須經宿以販賣衣等雖先無長若捨即還者便是清淨之財或恐長衣即日畜心不斷未經事隔容染前所捨故亦相從經宿還主或還已亦染而今行事多用此義以其財物不可全別故又人自作不重犯釋者唯五逕宿任情所安又昔解言除中間五日藥即坐還主以不作藥服故此應不爾謂是下五日藥非是中間又亦逕宿若即還者初日與守園人七日入僧五復即日何故乃言五長逕宿但是四長故知此非第三門者有四一能還之境除綿褥一自餘諸戒還通道俗及以僧別一准於捨似不得差互別人中捨亦容差失僧還不別別人等還別眾亦得問所以捨不聽別還開別眾者答詳悉滅罪故不聽別眾還財行施故容別眾若爾僧還亦是行施答秉不秉異故爾二所還之財綿褥不對不論還事餘諸戒中二寶鉢藥不復舊用餘同本捨然此三十位約為四二寶轉體而盡還藥不轉還不盡鉢體或轉不轉還法不盡餘不轉而盡還三還財處義准捨財通於二處鉢准作法餘財通兩作法大小乞鉢准大餘通大小除寶等三餘戒僧還要須秉法必也假界界通二作三人已下不害彼此四還財法二十八戒三人已下亦無還法二十九戒若對僧者有還財日二然鉢不同如文可知但捨有離合若合捨者還法或二一若各各捨唯一白二第四門不還罪者除綿褥一餘皆有還還中俗道眾別有異二俗不還如文追索不欲虗損信施故爾餘若不還且結失法究竟損滅盜門所收次辨同異者十律畜貿二寶及販賣得寶少者永棄捨若多者捨與同意淨人淨生當受若無同意淨人者捨與僧作四方臥具自餘綿褥七日藥等悉對比丘僧捨已還主乞鉢一戒是入僧還主祇律有五種捨一捨入無盡物中謂二寶若無盡中得生息利者得作僧房用謂五敷具及迴僧物入僧已隨僧折伏寶主貪心故二對僧捨僧用謂五敷具及迴僧物入僧已隨僧作何等用其中黑毛憍奢耶臥具此二僧不得著用僧得作地敷及作嚮簾帳幕等減六年不褋此二僧不得作地敷僧得著用但不得儭身黑白毛臥具中十種羊毛謂相續羊對羊不具色羊山羊此四雖雜以好多故捨入僧如純黑戒說遊行羊𦏌羊等羊鳴羊多耳羊木蓮羊此六雖雜以不好故捨入僧僧得著用如不褋戒說餘三捨同此五分亦五一入僧眾永棄捨謂二寶捨與僧僧差人永棄若僧不棄者令淨人為僧貿衣食用唯寶比丘不得食恐遂本心故二永捨入僧謂五敷具因捨永入常住僧作敷具唯本主不得用坐臥三入僧俗捨唯七日藥捨入僧與白衣沙彌若用燃燈塗足唯捨藥比丘不得用一切比丘不得噉餘二捨同明了論中復有不同不煩具錄且知如是行事懺洗一依當部第八門有八戒具二持犯自餘諸戒唯止持作犯言八者謂五過二離減六年等其五過戒若不說淨即是止犯而言過限名曰作犯體一名別一向不畜是止持說淨屬他是作持名各別亦可作淨故作持以作淨故雖畜過限而不犯長反劫作犯豈非止持亦是體一名別二離衣減六年三若解二犯體一名別若論二持亦含兩義並如五過說故此八戒具二持犯畜寶一戒以不得自畜故闕而不論三十九十雖同一篇三十有財可捨不得別眾下九十不制捨財得別眾悔故分二問旨在於此若爾前篇諫不諫別亦應再問一解此別眾不別眾故為二問前諫不諫唯不聽別故一問也又可前生罪緣別罪唯一種故不別問今捨罪緣殊故須二問第九門二部同異有十八戒二人同犯不煩解釋十二戒異一有九戒輕重不同謂取浣二毛五敷具等僧提尼吉前之四戒僧作數故重尼為希故輕下五比丘多利喜作故提尼是少利為希故輕二有兩戒僧有尼無雨浴衣者僧有限用定分齊喜過求用又聽蘭若恐成失奪因開六夜故有過六尼是浴衣聖開常用何有過前人輕劣弱不行蘭若亦無過六三有一戒犯同緣異謂長鉢是僧尼俱提名為犯同僧開十日尼無開限名為緣異所以爾者一尼是少利既得一鉢宜即受持及以說淨何須開十布施人項二既是伴即作淨法何須開日覓人作法大僧多利開於十日欲使壽量布施人項二復不制有伴喜獨脩道故開十日覓人說是以不同若爾尼有二義不開十日者尼畜長衣亦有二義何故同開十日答鉢是一用理無多畜未成無過若成鉢制犯聖制有伴得即說淨故不開十比丘無伴故開十日論其長衣資用處寬未成已來亦有長過料理籫縫不可即成以斯義故同開十日問即說淨竟然始作衣義亦無妨何以要須同開十日答初緣開時對不說淨尼故開十日得待成須一開已後益通餘品故齊十日又更一義尼多共活長衣同生不得說淨以共用故為須覓人齊開十日鉢雖同生亦得說淨即是有伴故唯當曰以無共受用故第十門沙彌時起心方便進具已後不須緣助任運得犯一十四戒五過除藥此之四戒日任運數滿十日犯餘五敷受寶奪衣二浣乞縷此十但使事成三性之中皆犯此十餘無任運此三十戒戒別一文隨而解釋理亦周具又可科分義亦無妨前二十九別人財犯下一僧物生過前文復二前二十八常流人犯下一勝行人違前文且八初十衣財有犯二野蠶下七坐具臥具等差而生過三畜寶等三貯規畜利同侶成𠎝四有二鉢器具不稱五乞縷等二營造過分六奪衣一戒與受差信七畜藥一戒療病失方八過前二戒受用違時以成妨道初十分二初有三戒畜用時過違開致犯次有七戒營求越理長惡招譏前三戒中初三兩戒畜乖開法物體有殊故分二戒離衣一戒受用資身違制開之道後七之中分三取衣浣衣二戒取受營理同道招譏過受一戒有而更受越二知足餘之四戒求煩惱境先解長衣一制開意者良由行者根不同報有強弱資須不等致大聖開遮始終將補有四種之差各有資身長道之益若報力資強堪耐寒苦制畜三衣稱彼根性憑之長道能會於聖故律云來世善男子畜此三衣不得過第二人者報力次劣若制同上士唯著三衣力分未堪非是此長道之緣是以如來方便聽畜助身百一記識受持不須說淨此多論說第三人者報力次劣百一物外復聽隨施而受說淨畜之欲便彼獲施福此資道緣故所以爾第四人者報力最雖開輕資猶闕修道要假重物方能濟身進業有益聖復開畜諸重物謂被褥杖枕等次明制者一因聖開聽廣畜盈長貪於俗利則壞道利功德之財二又失俗人信敬之心無猒貯聚與俗不別三又違如來四依之教即非節儉知足之行故使不加淨法制與捨墮此謂制下二人二釋名等貯用屬己名畜張分之餘稱長越於期限故曰過十日能所通舉故曰畜長衣過十日戒言離合者十日一月急施過後畜等俱是長衣何以不合答十日一月一財體不同二時有長短故所以離急施衣者兩戒合制假就過後要非時時接與此不類故亦離明問長衣所以初者人之喜為故在初明非謂有染如是一切豈可染故在初如販賣財等不合說淨長何故染又復下文尼薩耆衣不應淨施及作三衣故知不染若爾何故文言尼薩耆衣不捨更貿餘衣一尼薩耆答此言染者謂五眾邊貿或復遣人下二眾邊貿衣不犯販賣者染問若不聽說淨說淨不成妨難之所何成處分答妨難二處無其捨法復有不處分罪可防是以得成此販賣衣有捨法可捨何以不捨已說淨本自無𠎝今故違不捨為是不成又體不淨無長可防如是解時長衣得作三衣有長可防故販賣不得以無長可防故三解具緣通三如上別緣有六一己長衣甄去三衣以其三衣三世諸佛應於之服體無長過故爾三衣若受明不犯長設若不受多論亦無長過無離宿罪故多論云有因緣得一端疊指作三衣即不犯長若爾何故一月衣若不割截籫縫過畜犯長答一月衣戒先有故壞任受持衣是以要須作衣相已方得免長不爾即犯多論捐疊作衣雖未割截不犯長者謂先無三衣故爾是故第一須明長衣雖是己衣若忘此財亦復無罪是故第二知屬己物物雖屬己不應尺量畜過無犯是故第三應量之財財雖應量說淨無罪故須第四不說淨若有一月及起四想被舉難因緣亦是不犯故須第五無因緣多云初日得衣即被三擯未解擯來乃至命盡不犯此戒雖無因緣畜未過限亦不得罪故須第六十一日明相出犯若竪義者自下諸義並須攝在具緣中解見論西音云阿留那此名明相多論云日照樹身東方色黑照葉明青照空則白三色並是明家之相白色為正四闕緣比說若自捨即是闕緣方便若故壞及衣不應量是境差若有因緣受奇遠行是緣差忽爾說淨是善心息或有想疑謂非己物等故或有境強如被逼說淨等是文無者略緣起之中三時衣者以其隨時厚薄不同二比丘見下呵嘖戒本文三一對緣略制二即往已下陳疑啟佛三佛問已下問以還期四阿難已下開以時限五世尊已下讚歎少欲依開十日見論此是遮戒故依還期開聽十日若言一月佛亦開之多論不爾佛知法相不緩不急不增不損正開十日籌量施項縫治說淨三滿足戒本三門分別一定戒本二開緣有無三餘利同異言定戒本者五句一犯人二衣已竟等正明開時已謝謂出犯時三畜長衣者所畜財體等正明開時體四聖開十日五若過已下違教結犯第二衣已竟者見論一解三衣具足竟以未足不犯故又云謂迦提月作三衣月竟外方犯故迦絺那衣已出者出者捨也捨方犯故又此衣已竟等謂除不犯時節時節有四謂十日一月五月等前二非時開後雨時分利非時一月別生戒本以財體別故餘三非時時合在此戒急施衣通遮非時時利亦別立戒一衣體別又與過受合制一故二定緣有無直就此戒十日有緣可爾迦絺那與長等五戒何者為先若迦絺前開便不得言為長等五開受迦絺若長等先制後開迦絺所以無緣即言迦絺已出等答長等先制絺後開故下律言為長等故開受迦絺此戒文無者略五分比丘畜衣過一宿犯尼薩又因那律衣壞僧分物與之使一日作成何那律言我不敢取恐一日不成犯尼薩耆又諸比丘安居訖十六日便進詣佛所道逢泥水三衣麤重甚大疲極并以那律事白佛佛言開受迦絺不犯五事如律說第二戒本若比丘捨迦絺那衣已長衣過一宿犯又因阿難得二張劫貝為與身子聖開十日故第三戒本云若比丘三衣竟捨迦絺那衣已長衣乃至十日若過犯尼薩耆迦提月者共五月前後亦說不定可知三對餘戒餘利同異者問一月五月所以此開得通三戒者答洗浣衣服開無長𠎝故開初三為欲經營僧伽梨重復聽離宿故使一月遍開三戒五月者以功德衣守人不離益我無𠎝故第二戒有又以德衣體無長過潤蔭餘長復通初三問自餘諸戒所以不論者答此之二戒皆是屬己之財令無長離之𠎝又無施主可總開成有益自餘戒等開則於己無益又總施主開則有損闕而不論問此三時利戒本中除下背別等三亦同時利戒本不除迦絺那已出耶人解多種今釋下三已有故彼戒本云除餘時者餘時作衣施衣時問既同一開所以語異答此三專得時衣利故先除不犯時以取犯時下三非是專得時衣利故先出其犯下除不犯為對餘時假衣食故亦可背別等三亦定得時利為與汎爾施衣合明對解義便故使語異問急施衣亦得非時時利何以不言衣已竟衣已出等答彼戒亦是文中有故彼文言乃至衣時應畜問所以不言同者答彼是時衣為急故開時前非時十日與時相接言十日未竟乃至時畜若言衣已竟衣已出者便非急施自下廣解五句初句可知二衣已竟已下解第二句衣已竟者見云三衣具足竟以其未具足無長罪故又言謂迦提月作三衣日竟未竟不犯故迦絺已出者准下德衣八捨長短並是己出出者捨也祇中即出十捨法衣者已下解第三於中文二一辨十體解上衣義二量分齊釋成其長絕衣者憍奢耶作劫唄衣者以華作欽婆羅者毛作歷者紵麻作懺摩者野麻作麻者麻作扇那者白羊毛作翅夷羅者鳥毛作鳩夷羅者絳色羊毛懺羅鉢尼者瓦色羊毛次解長義三門分別一定量分齊二應量犯未犯三亦應結未結初門諸文不同十律不辨尺量祇長二肘廣一肘五分佛言三衣應受持儭身雨衣被衣覆創衣蚊蟵敷經行處衣障壁虱衣單敷衣坐具護䏶衣護衣護頭衣拭體巾拭手巾針綖囊革屣囊濂水囊如是諸衣若似衣皆應受持鍼三綖一皆須說淨不作淨吉三肘五肘長三衣不淨犯提見論長二搩手廣一搩手不淨過十日犯提故律本說我聽諸比丘長佛八指廣四指此是最下衣此律尺六八寸十律七種衣不須作淨得畜三衣雨衣覆創衣坐具及餘如法所用衣又受助身衣者佛言是某助身衣受用當於五眾邊受第二門問為始應量不淨即犯為待過邪答應即須淨不淨即犯故下文言長衣者八指四指若爾房應即犯不須待過答與房非類上已釋竟若爾但使說淨對作法故應即須法若不作法即犯者處分解義六搩四搩不處分犯答衣舉作法量房舉未作法量故爾所以不同者衣從內開向外開即防此過量故出作法房亦從內開向外開不即防過量若出犯位濫防過量俱此舉未須處分分齊反顯須法第三門問量立應減須作淨不答未須作淨若爾房五過減何以處分答房妨難故須處分其猶過量恐惱施主衣五無過故要應量犯又問過減坐具等所以亦犯答彼等並為長貪無用故問若減不須淨亦不犯者何以二毛轉作淨施答彼說應量亦是非法何須致妨若比丘一日得衣已下合解四五二句文二初廣解犯尼薩耆二此應捨已下捨懺方法前文復二初畜長過染以明犯二若捨墮衣下染用以明犯初文八章門如從得不得終盡忘不忘計理應有奪衣㵱衣及四想等文無者略且依文說初得不得有十个十日即是十章門得衣有多少差互日數共相間錯有四十六句第一門十日都得衣至十日一切犯初日衣體過故犯下九日衣為初日衣染相與犯長故云盡尼薩耆見論隨財段數多少一一得罪第二門初十日中九日得衣一日不得作九句若作初句一日得衣二日不得三日乃至十日得此第一句如是轉降者降空日向下得日轉使向上九番轉降即成九句第三門八日得作八句如是七日得六日得五日得四日得三日得二日得乃至一日得作一句等以第十門一日得對第二門九日得即作一十九三二門為二十八四二門為三十七五二門為四十中間五日得通初十日得一句為六即為四十六句餘文易知唯第九門二日得八日不得但應兩句又有注文轉降等者有人存其到句合為七十四者此是文誤不煩更多所以知非以其注中頭尾不似到故第二大門淨不淨但有九門四十五句闕無初門十日得衣並不淨與前同故下六同然所以爾者以初對初所犯是同故使有無不同齊少此一以九對九為其有無不同及法法差別即是不犯不同故下九俱有淨施之下對文說若遣與人替前淨施不得故此單舉一邊亦應言不遣與人下皆類爾故壞者全不應量故若作非衣者謂作三寶等用忘去者忘此財體意謂實無雖逕多日無彼畜心是故不犯若後憶時即得說淨次染用犯者文言不捨更貿餘衣後得衣犯捨墮者此謂使人貿得戒自五眾邊貿不犯販賣此是淨財理合說淨由前畜心相續不斷故染使犯長故曰一尼薩耆非謂染販賣財也言吉羅者謂用不淨財故著不淨財隨著多少一一結罪脫則無罪第二捨懺方法文四一捨財法二彼捨衣下捨罪法三若眾僧多已下還財法四是比丘下不還結罪所以爾者本為因財生罪若欲洗心先捨過財過財已捨罪方除滅故次懺罪財物已捨事便應法罪復悔除堪消利養為資道緣故須還物聖教已頌理宜從慎若當不還結受物者罪此之四文貫通諸戒講及竪義並用此法行事之大軌也懺境雖三且約說於此四中初四二六三四各一始終通收具十二法捨財四者一此捨墮衣應捨財集制捨二與僧等下所對境集三捨與僧時下捨之威儀四當作是語下正捨辭句捨罪六者一文言彼捨衣竟當懺下義合有六一乞懺悔此文略無准自言毗尼故知須乞二請懺主三受懺者作白和僧四正捨罪五當語彼人言下呵嘖治之六答言爾者領受立要還衣不還二各一者對文可知此等十二須具意者言次說之凡欲捨時先須知己財事現不現覆及著用嘿妄等或一或二乃至十罪先懺𠎝然次捨財以輕重之罪既不合總懺故致階降其位有四一先懺著用嘿妄下覆隨覆四吉二次懺着嘿二吉三次懺提罪下覆隨覆二吉此之三位懺並嘖心第四次方懺提不同祇律又凡欲懺者無問重輕依明了論提舍那者此云發露先須了別罪因緣起體相過失等已於可親信人邊如理求受對治護等要作如是立心後方懺悔如捨墮別抄所說今解捨財文言此捨墮衣者財集應捨所以制捨者為以財能資道濟要中強故聖慈聽受欲使彼獲施福此供受用畜若無法於道成患為斯方便制作淨法今以無慚輕蔑聖教畜不應儀反招罪累若不制捨畜心難遣罪無滅義是故須捨除八不淨及負債未入手自餘等物及寄他等悉盡集已方可得捨若不集者捨已歸主還成相染又但制加淨法而不淨者皆入此捨又如十六枚等販賣五種並入捨類前言除八不淨此總言之問捨財謂集謂集捨已方見餘物者為得成不答所捨之物已說淨竟方見遺物前捨已成後見遺物續應捨之若物在僧成如前說續捨所忘若捨已未淨後見遺物即成相染前後俱捨問捨財謂無得成捨者有比丘無想法亦應成答物非情故不能礙捨又說淨竟是故得成人俱有情彼容礙此是故不類二言與僧等者須有所對為受施之人受捨不易故言與僧事非常行教法恐急故開二三乃至一人不得別眾者財物利重人之喜為須僧盡集眾覩詳悉欲使犯者對眾慇愧內心慚耻息過於後非重之謂也若不謙卑業難排抑故須威儀但使對僧不簡長雖者修五法若對別人事分大小小具四法闕無禮足對眾捨物理合宣情若不自陳何成捨物故須辭句文言爾所長衣者若憶知數稱數作法若不憶故應言眾多餘皆類然如悔殘中說可知見論若一二三眾多乃至還道眾多若或差互容可不成律但一說理亦應得次下懺罪財物雖捨正𠎝未殄但以惡業雖謝感果必然內自思量表求除滅若不仰憑清眾彼容不愍故須乞懺乞懺之文人須一一牒事周足准而可知此文中略但除𠎝藉境覩而生愧若無所對情不愍重僧眾雖多漫無所局宜應別請一人緣生己善故請懺主主要清淨若自有縛能解他縛終無是處文言不得向有犯者解罪犯者不得受他解罪五分除不同犯又為病人同犯不得悔遂便命終佛開同得雖可別請事既逕眾無宜輙受是以要須作自和僧白文進否牒乞以成隨有稱之問受他捨財不曾作法受人懺罪作白者何答捨財現事非排往業又作法非永總對非別故不須白懺除往業永非作法又對別人故宜須白因緣既備理宜滅罪故須正懺懺之辞句如下文說不煩懸解雖對陳說過若不設治容可慚愧不慇故須立治是次文言嘖汝心謂彼自嘖前𠎝斷後相續又准了論語言汝見知罪不者見謂見罪因緣起體相等知謂知罪有五種過失等既有治於前若不領納事乖懺儀故須自言立要故云答言爾具前十法即悔犯清淨自益兼物須崇道道籍資成詑緣以立若不愍接闕脩出離故次還衣還衣之法先列其緣畜心若斷逕宿已羯磨還之若大眾難集或比丘遠行即日羯磨付親友逕宿還之即得受還財文中但是即坐轉付若即坐二還但七中一法若逕宿直還自具七法問捨財不須作法還作法何答捨是別人行施出在彼心非和能決何須作法今者僧眾還彼理無自專若不作法事難濟彼故爾問所以捨罪還衣二法不同者答受懺白者非正滅罪更加餘緣故單白得還衣僧眾作法即成故要白二十二聖教令還違故結犯今結不應若究竟壞損多論計直此謂對僧捨懺故十二法若三二人其唯十一謂無乞故一人但十若以此義通三十說者位別五階除褥二寶餘二十九對僧十二法二十八等眾多人十一法一人並十法二寶具九謂有捨財三還不還各一懺罪中四略而不出離野唯六謂有捨財二懺罪四亦略上下收攝不過此五此約具法多少以辦別相若據物類捨還不同位約亦為五別雜野一戒壞捨而無還二寶對俗全捨轉體而盡還乞鉢一戒入僧還主捨七日藥入僧入俗還主捨餘二十七唯還主捨次不還中若作淨施等此應是受物人不還等類而人言此謂物主淨施受用等罪此不應爾若是本主受用罪者綿縟不可受用彼不判犯良以彼不對境即闕此文故知此等並是受者故取尼衣已下次第五戒並言若不還轉作淨施若遣與人等不犯中十日內者番前過限亦可此舉不犯主謂十日有下諸緣可得不犯若十日外已是犯竟何有緣開淨施遣與人反上中二門略不舉餘六若失想等此物實在得財五日橫起四想雖逕多日更得五日不犯奪衣等四謂實奪失燒㵱以對下三故言取着對初奪故若他與著他與作被他與中差別受付命過下緣差等故所以不犯離衣宿戒第二所以不聽離衣宿者言三衣者乃是三世諸佛應法之服資身長道最為要用理宜隨身如鳥二翼許無蹔離今置衣在此身居異處寒暑卒起急須難得又闕守護容成失奪廢資身用事總不輕是故聖制二釋名者人衣異處名離逕夜曰宿久則事慢促則致惱限期一日過則便犯故曰離衣宿戒問下離衣六夜同是離衣何故不合答多義故離一人有勝行常流二處不同此戒衣人互在十一界犯下戒人要簡若衣必聚落三開緣異此戒以病差為限下是外難定開六夜三次具緣別緣有六一是三衣二加受持法三人衣異界四不捨會五無因緣六明相出此六須意可知解初緣四門一列數釋名二制三之意第三衣體財等如不如義四得罪輕重名者謂僧伽梨等所以作此三名差別者多論欲現未曾有法九十六種無此三名異外道故此方無正翻名僧伽利者義名重衣重數多故或雜碎衣條數多故或從用故名入王官聚落衣多羅僧者中價衣從用入眾等衣安陀會者下着衣從用名院內道行衣第二門智論問曰何故但有三衣答佛聖弟子住於中道不着二邊不同外道露形無耻復異白衣貪過貯積處中之宜故畜三衣多論五意一一衣不能除寒三衣能鄣寒故二一衣不能除慚愧三衣能除慚愧故三一衣不中入聚落制畜三衣始從道行乃至得入聚落四一衣不能生善心三衣能生前人歡喜之心故五一衣威儀不清淨三衣能令威儀清淨故尼制五衣者若畜一衣威儀不清淨為令威儀清淨餘如前說第三門四一體如二作如三量如四色如要四如法方可成受有離宿過故所以爾言體如者於中自有四重料簡一者唯十種衣方成衣體故離衣宿戒云衣者有十種如上謂非外道皮衣乃至馬毛人髮等故衣法云若畜草衣樹皮衣樹葉衣外道衣珠瓔珞衣馬毛橫牛尾人髮欽婆羅等此並外道法若畜如法治人髮偷蘭遮五分云樹皮衣外道儀式蘭祇云䍧羊欽婆羅馬毛革衣樹皮衣韋皮衣佛言如是等不得著故此等類明非衣體也二者雖十種衣要必直文如紬絹絕布乃至氈等得作三衣也即非羅綾綿綺一切有文之類故此律云不得着繡手衣佛言外道法又云不得畜錦衣應染作袈裟色畜五分著斑綖劫貝白衣法吉羅斑綖織衣吉羅見論云作袈裟不得繡作文章不得著斑綖織衣准如此等文並不成衣體也三雖是直文必須密緻謂非細薄生踈故祇律云非生疎等故維如此義但是輕薄絹紗孝布等類亦不成衣體四假雖摩斑要須清淨謂非犯捨故衣法云尼薩耆財不捨而不應作三衣即販賣迴僧取尼衣讚嘆等是若如此類有過之物亦不成衣體也第二作如有四一截不截者下衣俱成上二割截若言褋葉三衣俱得故下文舒張伽梨在地安褋欲使表裏相着外有葉現佛言聽五分哥休比丘得一衣少不足割截衣佛言上二割截成漫作下衣十云比丘貧衣少不得割截衣衣上安褋若五若七若九若十一若十三若過若能得應割截作三衣二橫竪多少此律云不知當幾條佛言應五不應六乃至應十九不應二十若過是亦應畜准如此文似更得多而不論橫葉祇律云五條一長一短七至十三二長一短十五等三三長一短多論云下大衣二長一短中大衣三長一短上大衣四長一短若此三位各或增減得成受持着行來去吉羅祇云比丘橫葉相當佛言不應爾又對頭縫衣佛言不應應作葉極狹如麥極廣如四指五分哥休得衣財少不知云何佛言聽三長一短若不足二長一短若不足聽一長一短若不足聽褋作葉又不得綖葉着衣准此似有四長一短等三重數多少此文新衣一重安陀多二重僧伽若是故衣下二二重伽梨四重若糞掃衣隨意多少多論伽梨極上三重一重新二重故若純新衣伽梨二重作尼師檀亦如是作下二衣但得一重若故極多四重伽利二重下二衣四重尼師檀四絳㓨方法四周安緣褋角鳥足縫等反鈎却㓨不得直縫祇律一月衣戒却㓨緣細等又迦葉作衣世尊自手捉阿難為截有比丘簪縫有為㓨短有為㓨長有安細褋等又衣宣脫聽作馬齒縫上下破聽作緣又如威儀經要褋角成又與尼作衣戒文言下至舒張角頭褋故知須褋第三量如者此文受小小衣便當三衣佛言聽長四肘廣二肘作安多三肘五肘作二衣祇三衣極足如法正是三肘五肘多論正衣量三肘五肘是若極長六肘廣三肘半若極下長四肘廣二肘半若過若減成受持以可延促故不同於鉢過減不成以無截續故第四色如者謂青黑木蘭第四得罪重輕者問三衣六物同是資身所以離三衣失而犯提離餘衣等輕答三衣正制受通三品今差離者違制罪重而失受法餘衣物等開於中下為資道不足今若離者對開有違唯得吉羅而不失受以上品人無餘衣可離故若爾鉢亦正制離何以輕不失受法答衣資用寬許無慚離故違得提失受持法鉢但一月月復時限有須故輕而不失解第二緣受衣方法有四一須受意者以其着不應法即有無衣之咎故要須受問曰不受衣罪輕離衣便罪重者亦可破夏罪重不安居罪輕答安居有時限受衣無分齊故使不安罪重不受但吉破夏不廢脩道故破夏輕離則闕資守護故使罪重二受之法式此律有受捨之言略無受捨辭句祇有總別二受總受言大德一心念我某甲僧伽梨等是我三衣數盡壽不離宿受持三說別受可知五分受衣文此僧伽梨若干條受三說下二亦爾十律受日我某甲此衣僧伽梨若干條受割截若不割截是衣持三說下二亦爾尼受餘二衣者十律曰此衣覆肩衣受長四肘廣二肘半是覆肩衣持三說此厥修羅衣受長四肘廣二肘半是厥修羅衣持三說五分三衣應謹護如身薄皮護鉢如眼應如衣鉢法持用不得以裏諸物母論曰鉢敬之如目護僧伽利如自護其皮不得敷坐不得儭身着十律不得着僧伽梨輦石草泥等不得脚躡不得敷坐不得坐上不得臥上不得儭身着應如着大衣法餘二衣亦爾三破與失受不失見論曰上二衣廣邊八指內穿長邊一搩手內穿不失受餘外穿失受安陀會廣邊四指長邊一搩手內穿不失餘處穿如小指甲失受過十日犯捨若一橫縷不斷未失多論三衣破不問孔之大小但使緣不斷絕仍成受持失色不失受復更上色亦不失受此律一月衣戒即同多論第四若更補染須受以不答增色增縷不須更受祇云補須却㓨十多亦爾若淨財補者㓨成衣體淨法即失非淨㓨者成衣類前更不犯長若但直縫並不衣先淨不失其未淨者過十日犯十律補須却㓨若直縫者衣主命過擿此衣入僧餘衣與者病人下四緣至文解闕緣比說緣文有二一離衣起過二受付囑下發覺呵嘖戒本文三一略明戒本二舉制隨開文五一身病衣重所請之事須遊行者多論四義一有緣眾生應受化故二宜於遊行令病損故三求行道所宜故四未降者降已降者令發悟故二自思念言下念開通之方三即語下仗託陳疑四時諸比丘下為申請決五世尊下開不失法法中三門分別第一解作法成否若衣人互不如法為成以不一解要須衣重人病方成餘三句互有俱無並法不成不稱法故又多論假使衣人互不如法前人妄語罪作法得成以羯磨防離衣宿不防病等故第二約時長短五分前安居人九月後安居人八月所以非夏分者以夏分中別有受日分齊故十律亦乃至九月多論九月祇十兩文乞羯磨離衣宿各限一月然祗夏分得乞法多論一羯磨得九月此律無住依一律三留衣多少有三不同此律留僧伽梨若依祗五分但留多羅僧餘二不許故五分留優多羅僧不得羯磨留伽梨安多有賊難處三衣中割截衣最勝者聽隨所留也十多二文三衣之中俱有離義故十律云如僧伽梨次二衣重亦爾多論云如僧伽梨餘二衣亦爾又正離一衣不得離二衣文言結不失衣法者謂得此法賞受不失而無離罪故曰不失衣法三滿足戒本此前長衣亦須三門一定戒本二定緣有無三餘戒餘利同異比說可知下一月戒本初亦爾言定戒本有六句一若比丘者人分齊二衣已竟等犯時分齊三三衣中者所離衣分齊四離一一下人衣互在分齊五除下開法分齊祇律除僧羯磨有兩一乞一月法二結衣界不犯故並言除此律通說亦除二法六尼薩下結犯分齊第二句衣已竟等者除不犯時節時節汎五謂一夜六夜一月五月九日此五重中六夜離明除之四重合開此戒但一夜者唯制非開一月等三事通開制廣中具解但前三第五略而別釋不失者已下合解四六於中文二初明離宿成犯二此捨墮衣已下捨懺方法前文復二初就十界離而成犯二不失衣者下明蘭若處離而犯義前文有五第一至倉有若干界例十界名二伽藍者已下解十界體相三僧伽藍已下十界彼此不相収攝四僧伽藍界已下十界勢分五伽僧藍界已下正明離宿結罪欲解此界兩門分別一汎列諸界定別所釋二正辨界相言汎明者謂衣食僧等三界之別有待之形假資方立衣是要用無時不須但受畜有法須明衣界攝衣屬人令無離𠎝衣既覆形內資須濟服用無法反招過咎故結淨地攝食別人使無二內衣得覆身食復死軀次宜正脩正脩之來無過眾行故結僧界攝人同法僧食二界宗此不明下犍度廣辨今以衣界或假僧界而成又相開洗故總對說第二正解界相於中有三一解僧界二釋衣界三兩界同異僧界三門一辨自然自然有三謂聚落可分不可分及蘭若等二解作法謂大小八界等三挍量同異同異具五一作法不作法不作法二多少不同作法隨事故多自然唯為結界事少應一但空聚差殊故有三別三寬狹同異謂自然界昔寬今狹本該一化故所以寬以集難故開境而結若仍依舊集恐不成結故作空聚分齊是以今狹作法對本開結故狹然望今集互有寬狹四者強弱若望初集亦無強弱對今集者自然即弱弱故僧法事等並狹及無欲法以其自然唯為結界不得作餘故爾作法集者得作餘事下至解界然僧法事寬該通欲等故所以強五勢分有無自然或無無則是開有謂是制作法僧界開令結豈得更寬第二衣界三門分別一解自然二解作法三挍驗同異自然中二門一列數解釋彼此差分各有壃場故稱為界界別不同位且為四一就事相辨界如藍等十界二尺量為界如依此律蘭若八樹中間五分面去身七尺三空有分齊空界者十云若衣在地比丘在空或衣在空比丘在地過明相犯以空是有界外故四道行界十多二文與和上闍梨擔衣道行若在前或後四十九尋多論亦可縱廣內不犯外即犯祇師與諸伴共行論義而去弟子持衣後來不及師師至日沒時畏離宿故出道外待弟子弟子持衣直過不見師至曉相待若是師待處離道二十五肘內與衣合者不犯外者犯弟子持衣在前行相待問答亦如上五分道行同異者同界者面去身七弓異界七弓之外明了論比丘路四十九弓所度處露地直身申腎斜衣各捉一角若相及許不離衣也空有道行此律無文第二強弱十界是強蘭若是弱十中藍村二界強自餘八弱若在前二中無別有八故藍村兩界村強藍弱或可等力以各對人辨故不相収攝第二門者作法唯一以憑僧界不同自然隨事故多釋此作法兩門分別一須結不須結二須除不須除初門者二界相望有三謂藍相狹僧界寬者此一須結為可僧界使無破離之𠎝故爾若藍望僧界或等及寬此二衣界即不須結以其若結反成礙非謂衣界一切須結而對斯兩忽有結者不慎開意容得小罪第二門者問作羯磨法為有村故須言除村為當無村亦言除村多論答羯磨法爾若有若無一切須除以其村無衣界外方有界今者為結除村村外方衣界故是以一切咸須除村村外既一切須除然村或有或無若准十誦羯磨文中結不失衣界除村村外界取空地及住處故白如是者欲消此文應言若現無村結是現結除是懸除取是現取謂是現結懸除現取也若即有村村亦現結除是現除取是懸取謂是現結現除懸取村去得置衣村在非無界此二言除者直是置衣得不得故言除村若依此律但言除村村外本無取空等之言與彼似別今若准說若即無村義令同十言結不失衣者結是現結除是懸除雖無取空之言理亦現取或現有村即不同彼所言結者非是現結謂除外方是衣界即非現結除是現除亦不懸取此即村在若去並無衣界非但有礙亦是無界問除以除皆不得置衣何故結文要須言除答為遣疑故由人礙謂集僧時可界內村中比丘須集既馮僧界亦謂衣界裏村同一衣界即便置衣因形露故多論具五義佛即制除又可本未結衣界可使藍外之村非衣界攝今衣界中村應得置衣送取起過因制言除又可異餘八界故結法須道除村問僧衣二結所以有除不除答俱禁緩從急有除不除衣以別為過故須除村別而就急僧以同界不集為𠎝故不除村同而就急又可僧界開重不開所以不除衣界亦是開不重開是故須除依明了論通含自然作法等故彼偈言善解三衣六憐愍釋曰律中說佛許六種不離三衣利益一僧和合同許羯磨所作有二種一得加絺那衣僧和合所作二為行路人及病人僧和合所作二依地所作如布薩相應學處中說三不離所作如於皮闍延多樓及剡浮樹等所謂帝釋樓高二千由旬樹高一百由旬約此以明失不失義四垣墻所作謂藍界是五約露地所作如比丘行路四十九弓度處相對露地直身中臂斜衣各捉一角若相及許離衣六住處時節所作於安居學處中廣說應知復次小便等所逼事中由他加行難所作是名三衣六憐愍六中分三初一約法次四就分齊四中第一作法攝衣界餘三自然一樓樹界二藍界三道行界末一住處時節謂在空處聽六夜是今准彼說此律具五憐愍隨配應知闕無道行互有寬狹第三自然作法同異一作法不作法二多少不同自然多作法少三寬狹有殊作法寬故四者強弱強弱互以除村故作法即弱収餘八故便即是強五勢分有無者自然本故開有勢分作法更開開不重開所以便無又作法假僧界相從無勢分自然不假界故不同也又不故也第三衣僧同異三門分別一寬狹多少二可不可三勢分有無第一多少等者僧衣對辨約為三位一以二自然五句不同二以衣自然對僧作法有五差別三二作法有三不同三位通收有十三種異初五異者第一僧寬衣狹具約二蘭若是謂拘盧舍八樹中間但蘭若有六一盜戒二攝僧三攝衣四六夜五安坐六頭陀今約第二第三以辨僧衣二界第二衣寬僧狹如藍相寬集僧八樹等是第三僧衣俱等如藍勢分與八樹齊第四僧一衣多如八樹內有眾多家第五衣界一僧界多如大伽藍故衣一有眾多七十三步半集僧故多第二位五者一僧寬衣狹如界寬藍小等二衣寬僧狹藍大界小等三俱等如可藍勢分結大界是四僧二衣一有戒場故五僧一衣多無戒場故僧一藍有若干故衣多第三位三者一僧界寬衣界狹除村村外故二僧界二衣界一有戒場故僧界二結衣時無村故衣界一三俱等謂無戒場無村故三僧寬衣狹有村故除村有無故有人作十六句者非不煩廣破第二可不可者為釋前門寬狹多少二種自然有四義故不得相可一自然攝衣是根本故宜就急制以寬為緩以狹為急自然攝僧亦是作法根本復須急制以近為緩以遠為急各就急制緩急飜到故不相可二不相假故三定不定異衣就所依大小不定僧界是定故不相可四勢分有無二種作法者具四義故為是相可一作法衣界為樂靜人開急就緩可大界上結二要假大界結方成就三二俱是定四並無勢分故得相可第三勢分有無二作相對並無勢分兩種自然衣有僧無所以然者咸是開急就緩故所以爾衣以遠為緩故有勢分僧以近為緩故無勢分若僧從衣有反成難護衣順僧無衣成大急故使此二有無理別又准十誦五分聚落亦有勢分若爾所以有則僧寬衣便狹者答僧本急今急有即須寬衣本急今急有而便狹問等是衣界作法無勢分者何答開不重開故次釋其文就十界中初文中藍裏一界若干界者若其衣身同在一藍是名一界身衣別藍故名若干界又藍相周遍房勢分相及是名一界或若大無㰚鄣彼此房別各有勢分身衣互在逕宿失故曰若干又雖藍相周迊若無俗來但出家人者遍藍無別是名一界若有男女來入藍住即村界起身衣互在逕宿失衣便成若干故多論云王來入界內住近王左右大小行來之處盡非衣界也又五分云一界者而於中得自在往反故爾若干界者於中不得自在往返故也樹有一界者身衣同在一樹之下是名一界身衣別樹名若干界或若更無俗界女來同在樹下是名一界若有俗男女來是名若干界也如場乃至倉等七界比樹而說之次解村界文言村有一界者謂如張家請我供養即是情無阻礙遍於一家皆不失衣是名一界或若更有王家來住彼此礙別名若干界故祇云若一家中作兄分齊弟分齊若情㝵不許互相來去者身衣互在名干界若兄弟情通任師住止隨意往來者身衣互在兄弟分齊即不失衣是名一界故今亦爾遍於一家情無隔礙者並名一界也此解不然所以爾者祇取情礙故如向辨若據此律就其染㝵譏過即不同彼故下文言脫衣形露佛言除村村外界今准此理縱令一家情甚相通如似自己緣眷衣在母女姉妹之所寒暑率起夜或須衣送取之間恐相觸如斯事㝵心即致隔若有如此阻難者表不與衣合即成若干况餘疎人男女等類名為家界此即轉成隔㝵豈得遍家名為一界也故今更解村有一界者比丘住處分齊中間是名一界比丘住處分齊外者隨房多少是若干界也問所以不同藍中一界者謂無俗來遍其藍內名一界也答藍是比丘住處故若無俗得名一界家非我處故不同藍遍此一家名為一界要必比丘住處分齊內者方名一界住處勢分外者即若干界也第二界之體相一一如文三釋界義謂此藍非彼藍等計有句廣辨三十餘句類知若不明如此文者人情意謂此藍置衣餘藍中宿應當不犯以同是藍故雖可藍名是同彼此處異故須此文餘亦同爾四勢分如文言中人者非強非劣故擲者非太近故第五結犯亦作百句文有二十但對初十中文五一身衣互在二明相已下教不犯法三若不已下不行會捨四明相出已下離三衣提五離餘衣吉於第二不犯法中開之次第應言手捉次至石處次應捨衣文中說次故先明捨衣言手捉者以有若干界故要須手捉方得不犯至石處者謂是一界入勢無犯此通諸界皆同此釋捨衣者會而不逮即須捨衣寧可無衣得吉不犯提罪以輕奪重故祇云此僧伽梨是我三衣數先受持今捨捨下二亦爾尼捨下四衣亦爾五分捨文此僧伽梨若干條受今捨三說下二同此次樹十句餘皆略無又此二十中准前第三此藍非彼藍時應言乃在餘藍宿文中略無故一門但九也蘭若文五一明界體八樹間者七七四十九弓弓長四肘七尺二寸計間有七弓即是五十尺四寸合三百五十二尺八寸總有五十八步半一尺八寸并石及處是其界體不同祇律五肘弓故僧界七十三步半二人衣互在三不行捨會手捉石處亦同前釋次結重提次得輕吉捨懺如上不犯中別開五重一作羯磨摩賞度不失故不犯二會故不犯三捨故不犯四四想等失受故不犯五若水諸難故不失而不犯文言明未通下四開並須明相未出之前有此四故方可不犯水陸諸難不失受者心知衣在恒但領受之意為是不失如似受欲難緣出界不失欲法此亦同彼二通開可知一月衣戒第三制意者衣為資身隨時受用雖先有衣故爛弊壞但任受持不堪著用今得少財為作三衣以換故者而少不足為待滿故聖開一月過畜長貪違教妨道故以制隨三衣不任擬須換若衣財不同各得一月若衣同者即須併作一衣如不爾者隨過限即犯是以文言若同衣足應割截不者過犯不問有望無望斷以不斷但同衣足犯不足隨開不同餘律別緣有六一若是新衣現堪受用餘財不開故衣方開故第一緣故壞三衣衣雖故壞得財若足亦更不開故第二緣得少財不足若不擬作三衣但犯初戒不開一月明須第三為作三衣以𨲙故者四不說淨作三衣五無因緣六過限便犯緣起文二初至遊行起有漏過二時受寄已下發覺呵嘖前文復兩初開至衣足二時六群下因開起過彼有糞掃衣者無主物餘種衣者檀越施衣不足者謂是等衣中有未得足言取中者取向二中糞掃衣料理點淨為防吉罪持此等衣寄親友已逕久起過起過者不足可爾而有同衣足者何不作衣可得文言佛開滿足乘更久延耶遂興戒本極開一月若隨足者隨過結犯戒本六句一犯人二除開緣出犯長時節三若比丘下所得衣𨲙四受已疾疾下足則不開五若不足者已下如其不足開齊一月六若過已下隨違結犯別解上三文顯易知若十日中同衣足者已下合釋下三就一月中位分為三初十日以同常流令未犯次十日已後若不作衣至三十日已來有犯云何犯不犯也過三十日去一向定犯犯不犯中分二初至二十九日亦如是正明足則不開不足便開二同衣不足三十日已下無問足以不足限滿不開就初第十日中分二初至波逸提來足則不開釋四六二句於中文兩初明教作五法以免長罪即解第四句二若不截割下違而制犯即解第六句第二若同衣不足至十一日者釋第五句不足蹔開問若三衣俱故而並不足各開一月若大衣足犯染下二衣以不答下二衣財若無長本得開一月今為他染相與同犯問三衣體自無長何以得犯答以有故衣猶是三外要成衣相始得不犯不同令無是故文言隨衣多少尼薩耆若染餘財能染不共犯所染同活容犯次十一對十二作法同前自下諸句開犯位同故言乃至二十九日亦如是若同衣不足三十日若足下一向定犯若同衣謂十種衣中當分自同者各異不同亦可同衣謂三衣財不同衣謂餘長財此等限滿一向不開不犯別開中文兩第一舉戒本第四句足則不開并廣中二十个足成衣以為二十个不足蹔開以明不犯第二若截想已下舉戒本四六兩句及廣解中從十日同衣足已下二十个足則不開等者雖不成衣若有四想及奪衣等四并受寄命終等九个諸緣各過二十个分齊以開不犯取尼衣戒第四所以制者有三種過一者凡為下敬上仰奉情慇所有財物思欲捨施許無遺怯大僧非親多不籌量得便受之令他財物竭盡致貧遺之惱二男女形別理無參涉財物既交思情偏親因交致染容壞梵行臨危事嶮可懼之甚三跡涉世譏致招誹謗清白難分莫能自拔以斯諸過是故聖制別緣有五一是比丘尼除下二眾依祇下二眾衣不犯故今亦應同多論下二與尼同犯二非親里甄去親理不犯三是應量五衣多論衣者是應量衣除不應量衣鍵鎡等吉羅四靈心送與謂乞得貿易不犯多論多比丘取一尼衣多人犯一比丘多尼邊取一衣計尼犯五領受屬已犯問所以制取尼衣不制取鉢答尼衣有五喜相施與致受義數故須聖制鉢唯有一尼捨義希受亦不數設令受者但得小罪祇律有文取尼鉢不犯多論取鉢亦犯捨墮緣文有二初至取尼衣著之起過二後於異時下呵嘖前文復二一明犯緣文二初舉住處及能與衣人出家得道二時有眾多尼空處已下辨其犯緣犯緣中文三一因送食是其遠緣二時有比丘著弊故已下能取衣者謂犯人二蓮華見已已下是其近緣第二即脫已下正犯呵言汝不應如是者佛制畜五衣本為資身今以施人即得無衣之罪破戒行檀事不應法故曰不應言餘衣聽隨意與人者謂五衣外得施三眾不得與僧施受俱犯又解若與者謂五衣外長財得與比丘若僧得尼施時應撿問前人知彼五衣不具則不得受五衣具者得受無罪十律若先請若別房中住故與若為說法故與不犯五分中若無心求自布施知彼有長乃取不犯滿足戒本五句一犯人二非親里尼三取衣四除貿易多論若聽貿易離彼馳求得安樂故又離苦惱故五結犯辨相具解上五二親里者父母七世骨血之親了論解四親應取一父父親二父母親三母父親四母母親此四親尼取之非犯餘文解親皆准於此問尼取僧衣但得吉罪者何答大僧上尊與尼義希尼受不譏過中制生患義深故得提罪作此釋者二與解義譏無譏別論其二取希數不同故使大僧取數與譏俱提其比丘尼希而無譏取與並吉寶永七年寅夷則晦日大藏重修比丘照山晃寫於天安律寺方丈俗五十五
