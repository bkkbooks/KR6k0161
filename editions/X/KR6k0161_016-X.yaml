body:
  text: 沙門法勵撰述安居犍度第三善事故言聽也第二白所依人已下已列安居法對前總文先解義門第一約時第二約處第三就人第四對法先時分別於中復四一結夏非春冬第二夏分四月結三非四第三夏分有閏數第四結時不同初門者問若尼無益行三時俱提比丘並吉有利益事開行無犯所以唯結其夏不結春冬者何答夏中遊散壞行義多招譏惱重所以結夏春冬行者壞行義少譏惱復微故不結春冬是以文言聽諸比丘三月夏安居即是夏中有法住去時為益有法去餘時無益無法住有益無法去次第二門問夏分四月但結其三非盡結第四月耶答有二義開不逮之流若無緣者結前或有緣者結後若盡結四月唯四月十六日者成夏十七日後不成安居無四月教法太急事難常行開其一月籌量進否三十日結夏故律言舍利弗目連十七日到佛言聽後安居二為賞勞若定結四月者有待之形無以存濟是以但結其三開後分一月迦提五利故律文若前安居住前三月不受迦絺那衣一月第三有閏數不數解言脩道慕急多日為善不聽數閏足滿三月多論云若閏四月前四月十六日安居至七月十五日於其中間百二十日亦得爾所日畜兩衣兩衣開畜聽含閏者安居脩道故宜多日若爾既不聽數閏便非安居中日閏中出界得無破夏不解言本結要期許不出界今未滿出者即非相續界內離要期處故所以破問如含閏受日亦得四十五日六十日在界外不解言安居局處脩道慕多故使攝閏受日出界有緣故開非正脩道故但一月十五日也又復安居約三時辨故使含閏受日數日隨日不定故但稱法問夏攝潤者五事賞勞亦得兩月六日利不今且一釋此五利寬奢俱不攝閏數滿一月五月便捨不同安居正是脩故既知含閏閏五月六月百二十日住閏四月者結位有三百則增減前四月百二十日後四月隨多少五月定九十日是中或有安居隔一月去時降一日謂一人前四月三十日結一人五月一日結若論去日前人七月盡後人八月一日若閏中三十日結並與五月一日同但可結日有前却去日同是八月一日若對閏七月結位有三五月一日已前十六人結但九十日二日已後十四人結百二十日住是中或有安居降一日去時隔一月乃至安居隔十四日已後十四人結百二十日住是中或有安居降一日去時隔乃一月至安居隔十四日去時隔一月等可知伽論安居有閏聽數日滿便去今不同彼第四結時不同為以夏四結三故使結時有二三之別若前後分別十六日是前十七日即後文證可知若三種分別如增三說有三安居謂前中後前者十六日若十七日已後是中五月十六日一日名後此分相說若通辨結時者若當無閏一月中結若閏四月六十日結其餘合同閏前無閏一月結也所以爾許時中咸得結者以三十日六十日並是結時分故不同祇律四月十六日五月十六日此之二日成結前後故彼文行未至住處路側即依樹車等安居至明相出趣所住處致後安居日應三說安居安日不受一越毗尼又不結後二越毗尼破亦不得衣利又見論五月十六日為前安居六月十六日後安居為以王者改法故爾問此文何故一月六十日皆言得成結者以其三月悉足故下文言後安居者住後三月隨前安居自恣不得數歲住侍日滿第二約處分別者一釋依房藍等安居故文言依某聚落某藍房等又解依界所以知依界為護夏分齊者下文言一脚入界受日出界外又背請成不成中界外界內布薩又移夏言此彼界僧破等又十律有比丘以牀置四界內往反不礙後時不知何處取衣佛言四處各取一分又云眾多僧房共結一界得安居應住何僧房答隨意住祇律因身子為饒益親里故往那羅聚落安居後不欲離世尊因以白佛佛言從今聽王舍竹園精舍那羅聚落共作一布薩界令身子安樂住白二法結又身子那羅聚落安居日日往竹薗不堪持衣又有比丘祗桓精舍安居食後欲詣開眼坐禪或於彼宿佛言從今祇桓精舍乃至婆羅門林精舍悉同作不失衣界竹園那羅聚落同結不失衣界亦爾令身子及諸比丘得安樂住白二羯磨結准斯等文明知依界以為護夏限分齊雖復名牒某甲藍等不即局此謂舉住處以取某界然界有二謂自然作法兩處俱成問自然安居得結界不答不得結文言安居竟應結界故若爾先在自然攝衣界裏忽爾結衣界亦應失衣答不類以本受衣不假自然衣界故今雖結不失受法安居之法原來局界入界成安居故結即破問作法處安居得解界不答不得解解即破故文言安居竟應解界故若爾解不失衣界即應失衣解言安居假界成今若解者失所依故解而即破受衣不假界解不失受又以局處故入界園等成安居但解即破受衣不局界故故使入界不成受衣縱解衣界不失受法第三人分別者何等人安居謂五眾故十律優婆問何等人安居佛言比丘乃至沙彌尼故此律尼三時遊行不安居戒制五眾罪以其出家位同咸廢脩道招譏義等故問俱等安居具戒有數歲下三不爾者何答以有師徒位別依止分齊教戒尼等下三無此故不數歲故房舍中下三眾等以生年為次第又問具戒數年不同俗年者何答功德法故取終不據始故文言聽隨前安居人一時自恣不得數歲第四法分別者汎論其義略為四門第一列數辨釋第二教行分別第三約就前後第四與處相應文近分別此四門中初門約文說凡安居法或二或三或四亦可四者為七言二者謂前後安居四月十六日前十七日後故文言安居有二種有前安居有後安居此對賞罸謂前安居人得五事名賞後不得稱罸若就結罪輕重五月十五日已上是前十六一日是後前吉後提今此前後者專約賞罸以定前後也言三者謂前中後如增三說此等通約三十六十以定前後者方盡其理四月十六日前十七日已去是中五月十六日後六十日同爾或四者即此文是分文為四初對手安居二諸比丘住處無所依人已下心念安居三爾時諸比丘住處已下忘成安居四時諸比丘往安居處入界已下四句總名及界安居對手中兩一前二後言白所依人者謂所對作法人是故下文言無所依人聽心念安居五分具列威儀偏袒等此中文略作法文五一言對前人故言長老等二自斥己名三明所依處故言依某甲聚落等隨事以稱不勞並牒如下依山窟空樹斫杖人等類可知四正明要期作法而結前者為簡於後三月者甄第四月夏者除春冬安居正出要期離遊行之損五房舍已下斷理資緣令四方僧有受用之益立要慰懃故如是至三除藍內安居已外聚落山窟處等皆不須第五斷理句五分受安居者答言我知十律上座對下座三說竟下座言莫放逸上座言受持下座作法亦爾後三月亦爾又須依持律夏是正脩依第五持律餘三時者依於上四僧尼同爾後三月亦如是者謂十七日已去作法同前唯稱後三月為異第二心念者以無所對故與心念之名准如說恣及分衣等要須口言口言之法律無正文准對手說上五句中除初句即是但下四句中或白衣等處又除斷理句也問心念成安居受日亦應爾十律問得心念受七日不佛言不得除五人得謂坐禪人阿蘭若獨住人遠行人長病人飢餓時親里邊行人等如布薩自恣受衣受七日七日藥與一請及淨施衣此等七事心念得成此律文於上七中但有說恣餘五無者謂須牒事籌量故無心念受日安居局處不牒事量宜故有心念心念捨請無其實益展轉須對真實付彼受衣藥等受無時限得待對人故此諸事並無心念安居有限恐越時𬿈故開心念次第三忘成安居先在此界得客作法而忘結者此不說忘成今言成者謂從外來要期求處無人可白而忘不心念但令與處相應佛亦開成是以文言為安故來便成如說欲法忘說亦成若忘不成罪者如忘不成覆及無長罪似有忘成但後隨憶要須作法不得即當發露說淨故不類此如鉢衣藥受日等尚不開心念何處責有忘成故不同安居若爾如發露法既有心念應有忘成答安居局處與作法同忘不發露猶是覆藏故無忘成也餘心念說恣等並以不局處故又時已過雖不更作法不無有罪分衣義通局法為正故無忘成心念懺吉既無時限業累須排亦忘不成也五分十五日為安居受房舍敷臥具雖不發心口言結之亦得名安居次第四反界成安居者凡言入界謂作法僧界入園是自然僧界此約位辨二界也雙脚界入兩一脚入園故文列四者即事別為四今且從雙隻兩位對疑以開成先舉雙入二句解者前忘成等入界經久事是寬容但忘不心念以先有求安居心故開成安居今我入界園等心實不忘直以時促未得作法為成以不佛以時中短促不同前二又復不忘異於第三汝既本有起此要期心故入界園等及處相應亦成安居次舉隻入解者雙入成安居者義如前判未詳我今始一脚入未全相應頗亦成不佛以轉成忩迫遂本要心赴此亦成如上所論四句悉成故使文中並言為安居故來便成安居問雙入成安居俱出是破此義可爾既一脚入成一脚出界是破以不解言為益利故一入開成一出非破若爾如入淨地亦應一出勉宿一入是觸以不答觸唯雙入方犯出但一出勉宿亦為益故成易破難又如受捨亦益行者受難捨易上來總相辨法或二或三四但二三者是位謂約時分位有二三別也言其四者是安居法約前二三時位中開制不同故有此四位便隔礙橫局法者竪通二三斯亦位言有不通義可以思知自下三門懸說次教行分別者先就教辨三藏之中毗尼教攝教通制聽聽而非制文言聽安居制故若對過分別離作過故即名為制今安居法對除心𠎝何容非制但據位判煞等有罪者制今安居本無罪者聽聽中開制前二是制順教作法故後兩開成並以時短故爾若正非正分別一制三開若作法不作法辨異者前兩作法也一二行分別者謂是隨行之中其唯專精專精有二此是作持持說身口前二通兩後二局身身口二業具作無作論其體狀如戒體中說餘說恣等准同此解故彼不更辨三前後分別然以義求四中初二通於二三三十日六十日並用斯法後二局初後不通二十八五十八以是開法恐失前安居慮不及後故所以開若至十七日明不及前猶有餘日不懼失後其間容豫是故要須用前二法既有位法橫竪須辨開合或四或八謂對前後故或十謂對三安居以辨前四通局故若離及界為四即是七種或七或十四十六等亦約三安居故四與處相應久近者前二作法義通舊新行住二人時中寬緩並用前二後之二開謂局從外來行沒此界不獲作法者開故言為安居故來便成若先在此界假有要心局此即非為安居故來前二中收故無此開也第二次分房法文三初至上座付與已來分房舍法第二爾時舍利弗目連已下至為未來故受時前後安居法受房舍人第三露處已下明安居所依處隨宜進否前文分三初至然後方受舉分房緣文言安居竟此謂結竟二從今已去下差分房人三差分房舍人竟已下處分之軌對差人之初義分別者一約分時祇律十二十三日分若處近十四十五日分五分佛言應於春末布薩日分房舍臥具於夏初一日結安居又云聽春末日夏初日分臥具第二就處一是差人處謂大界非餘處二所分處謂都集溫室等處不應分第三人分別一所差人須具五德二所為人除惡人沙彌等房舍法中安隔著小沙彌不能護故不與房受戒法中能護者與祇律亦言不得與沙彌房第四約法分別白二差之其處分之式如文僧處無偏雖言共用不應法者不合令住故言惡比丘來不應與言定臥具者施心局定此住處故言不定臥具者施心總與情無局礙此彼之異故言不定第二前後安居文七一者開後二列兩安居三自恣前後四數歲不數歲五應遣不應遣六對物進否後安未滿聽受夏衣義同急施故七臥具取否第三隨所宜處文二初明隨處二牧牛人已下隨人隨人有五可知此等並謂原作逕夏住心有緣故移聽隨彼去然依人等當所依之處依二界護夏若本不定心許隨移動決無此理十律船上安居者不得隨水上下不得繫在柱橛等若汎石不移者得第三有緣出界法文四初至盡同上受日出法第二拘睒彌已下至此事應去命梵二難聽移夏法第三爾時住處見有比丘欲破僧已下眾有留難為和故去移夏彼成第四爾時有比丘受七日法已下界外緣盡不破安居前文復二初受七日法第二爾時檀越請已下羯磨受日法對羯磨受文解義五門第一解受之方軌第二釋緣如不如等第三受有餘日得互用不第四重受以不第五夏末日少受之方法初門有四一時分別謂夏非餘二雖復夏分結及開成者須受為明有法住有法去故又假如緣若不成及無緣者非也此是須受之時若作法時限諸部差別七日一法應通諸部羯磨受法五分所明一同此律十五月餘二少別祇有事訖十律三十九夜所以三十九夜不增減者以有利事聽半夏去故二處分別者二界可知於作法中應非戒場及餘小界等以非安居處故故十律問何處受七日佛言界內受蓋應是本安居處故三人分別者一能受人二具非下三雖可脩道義通不數歲故不論受日去亦須白若分相解者七日通尼義在不或尼羯磨受如尼律說受七日法去亦有立義准比丘羯磨義容可爾但祇律言尼無求聽羯磨受日出界准此似無行事緣急任依一文二所對境義非下三然十律言何處受七日佛言界內從誰文受佛言五眾受此文或可通說五眾所對故爾僧尼之中通於僧別四人僧攝又能受局此界僧眾通餘界不同處分義局當界僧也第四法分別七日文無准羯磨說羯磨法者對文以辨第二門者三門分別一緣如不如要如法緣無犯戒事等事雖眾多要論為五一三寶境界緣波斯匿王供佛及僧等為受日者佛僧二寶緣伽論或為偷婆或和上闍梨病或為法如是等緣聽受七日出界二道俗病患緣三出家五眾生善滅惡緣四俗人生福緣五為求衣鉢乃至藥草緣廣說是非可知五眾受戒等是生善緣懺悔等名滅惡緣俗人生福者大臣父母等不問有信無信皆得受日去以大臣能有損益故父母恩重故其餘俗人有信方往不同前二誦六十種經如梵動經者如祇律若於二部木叉及脩妬路若未學欲學忘教我受學誦義聽去七夜此等法緣若比丘自身病重不堪受日復須為病去者聽直去不須受日如病人不得隨衣食藥及看病人等說此或可爾要須實然又為衣鉢藥草等緣必須或為失奪等事更無可榮或現無衣鉢交全廢闕者得若少可方便並不合為受受定破夏五分云若有請若無請須出界外一切皆聽七日法佛言從今若為佛法僧事若私事於七日外無更聽白二受十五若一月第二辨離合者事別定成或多如緣並牒合受得如法成其猶悔殘等類得牒眾多一切治覆不同為人對難方聽故不得多如三舉名同又非僧位故有合義第三受日懸不懸若望用日義得懸受如三品受法受已各未即用亦得不妨不同七日藥以作法日為定即有過生故不從服日為准若某前緣要須現起若未有緣不成受日如年未滿受不發戒瞻波浪治無三舉病而輙治舉無覆客呵等又復假實事虗陳餘事等並不成受若爾無村衣界何以言除答為彰衣界不攝於村謂是除村及村外界法故言除也第三門有二初互不互二事訖來不來初門者如為佛受日有殘夜在為法僧等用一向不得以法僧上先無受緣故若爾何故十律有殘夜在應白已餘用答謂同一事有殘夜在白已得用非謂餘事若總有緣受者得法僧等用以並有法故十律憂婆問尼病僧應與作憶念不癡遣使請比丘應去不佛言應去中道聞是尼命終反戒入外道若八難起應去不佛言不應去本請憶念死不應去故無互用第二事訖來不來若受日出界事訖須還不還有罪未即破安居以有法故如與欲事訖不來之類要即須作來之方便或有諸難不來無過第四門重不重於中二門一重不重二先後次第初門者安居立行專脩道業何得重受以十律聽受一七夜不得受二七夜故知無重又文言先受七日去若七日盡應受三十九夜去若三十九夜盡應破安居去准此文意故知不重若得重受受日去是何因答言破安居去若更引文多緣事別立有重受者不然之義隨時以破不煩廣說羯磨受法如母論說十五一月既有長短得三品具受不名為重但當品不重二先後次第者人言要先七日次十五次一月等如此次第若已受十五日不得更受七日以長攝短故如功德衣五月即攝迦提又一月衣開收於十日等今解不爾如功德衣就時定故又俱五利一月衣者取衣為准俱開一長更無緣故是以此二即為定開以長收短今此受日約緣事緣即長短先後不定寧得定令先短後長今解受日三品遂緣長短前後所須若有長緣先羯磨受或先短緣先受七日三品隨事各先各後若爾何故文言過七日法答此謂前事不及七日還者事過故過又復羯磨法過故過非謂已受用七日竟名過七日也何以不言過十五日一解此二法對七並具二過故若十五一月相望但有事過故不言過十五日也亦可相望長短言過十五日法義亦無妨且並舉此二對七以說故爾第五門夏末日少縱無三品日在但有三品之緣並加三品受法以法爾故如七日盡形但須共宿者並加二法何必要須七日盡形服者方成二法亦同爾若爾何故十律七日在受七日去六五四三二一亦如是答此言夏未極七下一俱受七日故云亦如是若言受六日乃至一日者長短既殊何成亦如是故知不爾次釋文十律五種人得心念受七日謂蘭若獨住坐禪遠行病人飢餓時親理行人此律無文若蹔出界不破安居不勞受日不及即日還者聽受若路近須宿亦聽受日羯磨受日諸律皆無乞辭人者有多釋不煩廣破今解直依大律文誦不得依羯磨本作定謂不成故瞻波言白二羯磨如白作白如羯磨作羯磨如法如毗尼問如處分離衣六年杖絡囊等受戒懺悔並皆須乞此何獨無答上所列者竝是自為假僧量宜故咸須乞論某受日事非專己三寶事緣差我出界假有別緣緣不在我設少為己相從無乞又復諸律盡無乞文更無可准直依文作得失非我問若牒乞而作恐成增減故無乞者杖囊文前亦無乞辭何以加乞答杖囊羯磨中先含乞辭故加乞無僧今受日中先不含乞乞則成增故不同彼第二有難移夏無法直去以命梵二難無定期限故聽移夏初五句淨行難於中前四約婬第五就盜次有鬼神同比丘已下六句命難第三為和僧故亦無期限佛聽直去文有八句前四句明此界僧由我故破為和故去以見聞位別各有僧尼故合四句此四移夏彼成故次四句者為和他故去以其聞異界僧欲破已破各對僧尼合成四句前二聞異界僧尼欲破後二聞異界僧尼已破此後四句若中前了中後須來若暮訖且還若停不還逕宿破夏以其本處無非有難為是不同前四移夏彼成故祇律若二難并和僧前四句者從初去日即須懃懃覓安身處若懃懃覔住處未得已還隨所逕宿處不破安居以非心慢故若反前說安居即破若得住處夏法彼成不得輙出界外逕宿破夏去後雖可本處難盡亦不得直來設來必須受日母論同此移夏彼成五分有因緣聽破安居無罪見論若安居中有因緣移去無罪不成安居第四文二但舉作法出界法盡以明開成文中略無不成反說可知又復對後諸難儻無法出界亦合料簡成否文略可知第四大文背成不成於中文二初明背犯二爾時有比丘受他前安居請已下舉前移夏彰背而無罪前文有三初背前起過二時王聞已已下三人呵責三告諸比丘已下對緣立制背成不成夏破不破於中文二初對跋難陀不得前歲違要得罪故文言告諸比丘乃至違本要得罪第二若比丘已下廣明立法辨背非背於中文二初對前安二後安居亦如是者約後辨法前之有二初之六句至界外布薩已去次有五句界內布薩已去界外中前四句成背是破下二非背不破破中初句不至請處次三至請所欲解此文先知一義言界外布薩者謂四月十五日未至請處彰背不背故言界外布薩言界內布薩者謂四月十五日已至請處彰背非背故言界內布薩先解初句問此句未至請處何以文言破前安居一釋受請成安居故故言破前若爾上列法中何故不出受請成安居故知不爾又解背此就彼即日後家結而不成故說破前自言以受衣為妨又以背請受食為妨等可知若爾下二成安居但望前家所以不成獨望後家以說又後五月十日已前背者義客可爾十六日背逕宿方成結者無後可結對何以辨不成故知不爾今解非受請成安居非不得結即是並非二解今言破者謂望前家請處應成不成名破故言破前安居違本要得罪非謂彼結不成次下三句至而破者悉是結竟此三背前去者破有二種雖有心背若未逕宿者未是過限故未說破以違要未成故要逕宿事隔方破前安居若此三人背前至後請處但作法結即破前安居如受持衣受後捨前故今此三句並言破前安居者即通收二義或結即破或經宿破也今文直欲彰背前之過故不須列其後成次五六二句反前兩義故所以成次界內五句三破二成准說可知後安居亦如是者約界內外亦有十一成否如前故言亦如是問背前及後如文可爾中安居二十八人五十八人豈無背不背義耶解言並有背不背義同如文所說但舉前後未知中間其相云何答文言後安居亦如是中攝義盡故如約布薩辨者謂四月十五日未至請處十六日彰背不背名界外有六言界內者謂十五日已至請處布薩十六日辨背不背有五後安居亦爾若中間二十八日等如受十七日請者皆約安居前一日未至即是十六日未至請處當他界外布薩辨背不背有六十六日已至請處當他界內布薩有五次第相望展轉同爾乃至五月十五日未至請處十六日背名界外有六十五日已至請處名界內布薩也通論即有三十六个十一人辨背不背文對前安居廣彰十一十七已去亦各十一解背不背以望前安居總是其後今此律文合而略捐故曰後安居亦如是第二非背文可知自恣揵度第四所以須者九旬脩道精練身心人多迷己不自見過理宜仰憑清眾垂慈誨示成晈潔之美故次明之是中廣明六種自恣非一集在一處故稱揵度就中文二初至不應與他惡而去正明非法舉罪自恣之緣第二自今已去乃至其未廣彰自恣如非等法初文有二第一至為苦已來正明六群受行瘂法第二作如是制安居自恣竟已下因問自言佛即呵制於中文三一自恣竟已禮覲世尊文言自恣竟者當時未有自恣之事直是逕他自恣竟時故經家以後名前引證可知第二世尊慰勞已下因問而自言第三佛告諸比丘癡人已下正明呵制唐行啞法不能生善滅惡故實是苦耶制禁勒反增嫌嫉故實為患次立二喻不相往復故曰如怨假不瞋怒無言自雪故如白羊何以故者何以如彼怨家白羊義故謂不受行如來正教展轉覺悟乃受啞法而有苦患故故言何以故同於外道等者合前怨家白羊若受啞法吉羅十律犯蘭五分亦吉第三時六群已下因佛制故非法舉罪文四一非法舉佛制求聽所以須求者若得聽者必有滅惡生善無諍訟故二時六群已下使惡求聽佛制五德三彼六群已下為彰求聽之人應受不受四從他求聽已去已下制立言要也人言從他求聽已去者謂犯罪比丘從清淨故求舉己罪所以不屏處自懺而求舉者何為除大眾三根見聞之咎故爾次解第二大文有九初至隨身所安明自恣方法第二爾時異住處已下至不得受第二人欲心念自恣已來廣明自恣法體是非之相第三爾時眾僧集已下至知識亦如是與欲自恣法第四眾僧自恣聞有賊來已下至此事去廣略自恣法第五爾時異住處犯僧殘已下至不應以前求聽舉他罪正明遮自恣法第六爾時自恣日下客舊雜住應不應義第七爾時六群已下制叛自恣法第八爾時六群比丘尼已下眾別形殊制簡餘眾法第九彼自恣竟說戒坐久已下為彰自恣說戒無並法此九文中有三自恣一時二增上自恣三減却自恣然增上減却寄在遮法中辨故也以其恐反生諍故無非時自恣不同說戒時及非時在說戒中明減却一種落下遮法謂說戒中具三種說也先解初段文四一制自恣時不須求聽自恣是聽故二諸比丘已下差人之緣三聽差授自恣人已下簡德差人四諸比丘在坐上已下自恣方法初文聽安居竟自恣者如增一阿含七月十五日佛告阿難集僧今是受歲之日阿難叉手說偈淨眼無與等無事而不練知慧無染著何等名受歲佛以偈答受歲三業淨身口意所作兩兩比丘對自陳所作短還自稱名字今日眾受歲我亦淨意受唯願原其過阿難復問過去恒沙佛辟支及聲聞盡是諸佛法獨是釋迦文佛答三偈恒沙過去佛弟子清淨心皆是諸佛法非今釋迦文辟支無此法無歲無弟子獨逝無等侶不與他說法當來佛世尊恒沙不可計彼亦受此歲如今瞿曇法阿難集僧說二偈已世尊坐於草坐告諸比丘汝等盡當坐於草坐勅諸比丘我今欲受歲我無過咎於眾人乎又不犯身口意如來說此語已比丘不對是時三告如上說身子即便讚佛度未度者等有何過咎嘆佛已身子復如佛自說上語佛讚身子身子白佛是五百比丘盡當受歲今言安居竟聽自恣者當彼受歲之事五分日日自恣佛言應夏三月最後一日自恣若夏初恣者逆相舉發妨脩正業夏未告離不制同修理宜請悔除鄣道之業故也母論六事益佛教自恣一展轉相諫二各各相憶念三互相教授四彼我相恭敬五語皆相隨六有依非無依第三簡德差人差之多少此文不論餘之三律並二人已上故祇應拜五法者作自恣人若一若二不得過多多中離合既不對難一一差之祇出法言某甲某甲比丘五分差自恣人若二若多出法亦言大德僧此某甲某甲比丘能為僧作自恣人十誦亦言某甲某甲比丘第四自恣於中文三初有三句自恣前後第二竊語已下生之上事於中分二初有四句是立制緣即制徐了三說二反抄衣已下彰某坐上威儀不如即制威儀三說恣法自恣文有五句一大德者言對五德不向大小咸稱大德此是褒讚之辭二舉十方同遵故言眾僧今日自恣三仰則成規依於僧法故言我某甲比丘亦自恣四縱宣己過請求舉罪願垂誨示故曰若見聞疑等既嘆彼求大德長老並稱無妨五彰見過悔除令行晈潔故曰我者見罪等表己懃懃如是至第三未下一句對病料簡五分好泥塗地布草於上自恣第二文九初制白集眾第二六群已下自恣是非一造三非次白佛次佛判不應次四四種已下佛舉如非為令行如捨非故第三自恣前後祇律人前安亦隨前也第四時諸比丘十四日已下辨自恣時初則約日二次定時第五六群別房已下制集自恣第六諸比丘復不知何處已下者出自恣處所第七眾多比丘非時已下對難聽結小界自恣小界之義已如前釋第八自恣日異住處已下自恣法體第九若有五人已下對三位以辨如非第八正辨自恣法體四門分別一約時者謂安居竟非餘時可知位復有三一時自恣二增上三減却時中復有十四十五十六後安居者隨日若前後雜者隨上座上座亦不定隨舊人舊人復不定隨多以三義故並前自恣祇一人前者亦隨前又約日時者可知見論尼十四日僧十五日與律不同第二處者四人已下通於二界五人已上某唯作法又通小界而非戒場又說自界他界客來應不故所以知第三人者非下三眾雖安居義通以非具脩故具中通三謂一人眾多僧僧是五人攝又所差人德具不具差之多少離合如上辨增減却此二自恣多約僧說第四法者位分眾別法有二謂白及白此謂前三自恣若下三略但兩白也文中但舉改眾一白隨文釋分文為三先僧自恣法如常所辨二三語三心念向如對僧自恣言我若見罪當如法懺悔而對人心念皆言自恣清淨者何也解言僧自恣中舉治義具故云懺悔對人恣中舉雖義具論治不足為異前故但言清淨謂舉夷殘及大眾小眾蘭現無治義故若望輕蘭提等亦應言悔濫對僧故但言清淨心念恣中既無舉又治罪不備故言清淨謂唯得治心念之罪可呵已去即無治義故也如別行羯磨對人心念並無清淨之言理甚不足違律文故若行事時須依大本第九如非若五人一人受欲自恣者論云此非法別眾四人不得受第五人欲更互自恣是法別眾下三亦是法別眾第三與欲自恣法於中文三初與自恣法𨲙說戒中清淨故欲法如前此不更舉二爾時有比丘受囑已下牒制明開三受一人已下廣明應不比前說戒中與欲闕少可知分文解義一同與欲然不成持自恣人中但有二十五略無神足離見聞至僧如是事起者前言舉者為先德三舉治人今言如是事起者謂先有三舉之病未得行罸因僧集次尋為如治故言如是事起欲雖未說以在此人心中故復令舉法得成欲雖到僧處同然以此人得舉法故無有傳信之義故使自恣不成更須取自恣前雖未說以此人未得法故無失自恣分齊故不類此又前說戒者被清淨人非行治法故無如是事起若或有者釋同於此第三廣明應否中文五可知但第五料簡成不文有六句三對初不坐次不說各為自他故有六句第四略自恣法文二初舉八難餘緣為略之緣第二諸比丘作是念已下對緣彰其廣略之法文有七句初一廣自恣難由遠故次五略恣難由遠故次五略恣難漸逼促故未句難至全不得恣直爾散去就五略中前二略恣還對五德不改眾儀不須作自但任五德再一作法此與說戒法同後之三略差人須改眾法如百人作五十對若不作白眾則不委故須上坐或秉法人作白令知又應先作和眾白訖方作改眾三略之白此與說戒一向全異第五遮法問說戒遮說戒分二揵度此自恣遮自恣所以合辨解言說戒防未起非遮說戒除已起罪已未不同故分為二又說戒防未起非故無其求聽遮說戒除已起罪故有其求聽兩異故分今自恣遮自恣同除已起又復遮法當求聽時遮成遮餘時不成約此同相故合而說於中文四初至小停明所遮之事二六群已下至再一亦如是遮之時節成不義三遮自恣人身業不清淨已下至然後自恣治能遮所遮靈實之義四病比丘已下却遮方法初文分二一為罪故遮治罪己自恣淺罪雖治客有餘犯故文言與覆己自恣二異住處已下為諍故遮於中復二初犯波逸提提舍尼者對某輕諍治已自恣謂約讚食指授食以興諍故二對重諍謂約盜四方現前可分物起諍未可即殄故小停自恣第二時節文二先約人及根遮成不成二未說三語已下正辨時節前中一對人辨成不成二若遮無根已下對根明成不成此二文者以不清淨人及犯有根應遮故說時下正自恣時者應舉之處故名時也約人如文就約根中文有六句初三五不成遮以無根故二四六成遮以有根故初句不作故不成但不作有兩一不作有餘者謂殘等二不作無餘者謂夷等即是初三五第二句但言作作有某兩一作有餘謂殘等二作無餘謂夷等即是二四六也時節中再一亦如是者下三無舉故言再一亦如是第三治能所中文二初至然後自恣治能遮人謗罪二遮自恣人有知已下治所遮實罪前文有四初至便應自恣撿能遮人三業淨穢二自恣人三業清淨已下撿所遮事靈實三復應更問已下撿三根有無四不能答已下正治謗罪問所治者為是五德為餘僧耶答此多是餘僧告五德見聞以不實故治若所差已簡德竟何因於此方撿淨穢耶又若專五德者何以病遮無病等豈可差病五德然雖餘人要語五德令舉故下文五德語言待差各如法說前所遮事中先知即治今治所舉謂新舉得罪第四却中分四初為病故却文五三句第二爾時有異住處已下增上自恣以貪脩道此彼相得故以夏分為限故但一月第三爾時有異住處已下咸却自恣以避破僧惡比丘故知有早脫或減或却亦以夏分之未是自恣時故唯二却若更第三却者入冬分故說戒對此故亦二却若或三者恐濫自恣故五分大德僧聽今共布薩說戒後四月黑十五日當自恣白如是客問何故爾舊比丘言本不共安居不應問我若客復住作第二白問答如上若不往應如法和合又前所遮事謂於此界先起之諍故唯有却文言小停此對當來餘界之諍故有前却第四爾時自恣不識罪不不聽以前要而舉他罪文互三句第六客舊第七第八此三段文與說戒無殊故不煩釋第九如文皮革犍度第五然自恣已訖將行化物皮革履屣是道行要用故次明之外膚為皮筫𩊕為革是鞹之異名熟用稱韋此中廣明皮革等事應不應義故名皮革揵度於中文六第一從初至得畜錐初緣開著革屣第二大迦旃延已下正開邊地畜皮臥具重革屣因明四事第三得皮補革屣已下雜明應不應第四六群著欽婆羅跂已下制不聽畜跂第五六群著革屣共佛經行已下相恭敬法第六六群著革屣入聚落已下離明應不初文有三初明守籠出家成道第三守籠那得阿羅漢已下至禮已而去自記得道但說其義不云已得第三從去未久已下聖所讚述開著革屣前文復三初至不復為道猒世出家不得方二時佛知其心念已下為說琴喻教等諸根稱法而脩第三爾時守籠已下聞佛略教脩行獲證初文有四初至不飲酒值佛得道二爾時長者會中已下至出家受大戒重法心成猒世出家三父母兩城已下以食奉僧自行知足第四往溫泉水已下脩不得方心則掉動賢愚經以過去世脫一欽婆羅衣與辟支佛拭足以是福報常豪貴家生足下生毛狀如空有色五分文與立字名為手樓那以有二十億錢故時人號為二十億亦是過去毗婆尸佛時會六萬八千羅漢於家供養人各一坐種種飲食已與劫具二張革屣一量是以九十一劫足下生毛不曾躡地其身柔濡不堪騎乘祇律二十億足下生毛金色四寸過去毗婆尸佛時以白疊敷地供養八十千眾便致九十一劫足下生毛十律生時耳上各有一金環平直純金一億號為億耳沙門先有二十億金故言二十億文言應等諸根者前以偏苦其身故致掉動聖勸身心等筞謂心思諦理故曰等於諸根自記得道中文二初至亦如是正明自記得道二說是語已已下正明偈誦初文復三初樂六處之果二頗有不依於信已下出六處之因第三彼盡欲無欲已下牒前二解脫資成六妙行就六處果文三謂舉辨結隨事彰六語體唯四謂二解脫及兩涅槃慧性清靈能除迷遣彰不為或名為出離聖情所欣稱之為樂故曰樂於出離此是慧解脫定心理靜絕去紛動名為寂靜亦為物欣名之為樂此明定解脫總二皆是有為解脫三煩惱盡處寂伯無為即二四六三句名為有餘涅槃其因既無苦果亦喪所言樂盡受陰者無餘涅槃斯二不為三相所還是無為果次辨三因者謂信持戒斷利養信為行本是故先明依信起行次持淨戒戒之大妨無過利養須斷利養文中皆言不作是意者以己所解自答前言除疑倒故次明妙行文三謂法喻合法中眼根廣文餘根類知就眼中初至心解脫有漏舉俱解脫人於中初至無癡謂三煩惱無故是慧解脫如是比丘下是心解脫舉斯二解脫以為能資二眼見多色者根塵相對三慧解脫已下釋不染義於中分三初至俱不染汙由有心慧二解脫故眼識之後流至行心不起煩惱正是妙行故曰不染汙二識不與色雜轉釋不染若識取色相次第緣生三受可稱為雜今雖見色不取色相而生三受故曰識不與色雜三住第四禪轉釋不雜所以為彰此人得第四禪絕諸受故所不雜眼色既爾耳聲等亦然故曰亦如是次喻亦三初至不漏喻二解脫二東方已下喻第二根塵相對三此山不移已下喻第三不染具二解脫彼此相資平等無二故曰一段等言疾風雨者猶若色塵得二解脫煩惑則盡前塵所不能傾故曰不移等東方風雨來既不壞餘三方風亦不能壞故曰亦如是略無餘根之喻亦可南西北方者即喻餘塵合中三句初至盡於有漏合初喻眼見多色合上東方疾風等慧解脫已下合上此山不動等耳鼻舌等合上亦如是第二偈中文三初一偈半誦六處果少有半偈誦前三因言當知不起者謂信持戒斷利養等行成對治不信破戒貪利養等三垢不起以不起故便尅解脫故言從是解脫次下三偈誦六妙行初一偈誦二解脫上半心解脫下半慧解脫以見脩俱盡果成無著故曰已得無觀更無有作半偈誦喻次半偈誦前法及合中根所對塵次半誦前二解脫俱不染汙乃至不與色雜次半誦法合二中住第四禪也五象王者見論一文象領六母象名為象王守籠那自言我家有五象王尚捨出家豈貪一重革履而獨著也佛因開比丘十六句義謂四諦各有四行苦四者謂苦無常空無我集四者因集有緣滅四者謂滅上妙離道四者道如迹乘此律億耳三年五分六年祇逕七年母論十二年五事如文第三雜法迦那富羅者見論漫根革屣鹿角者剋作鹿角形也阿羅梨者以鳥毛安革屣邊富那䟦陀羅以成綿及諸物合皮縫作使中央起真逝梨者謂編作之編邊者以孔尾編邊也並見論翻五闍梨如文祇律新革屣佛言令淨人知著五六步若得即著吉羅五分令著七步十律得厚重革屣不應壞作一重即令主著行二三步如是得畜多論令白衣著五六七步即是淨五分聽著富羅𩍓深至踝上應開前衣揵度第六於中大文分之為二第一至塔衣為上品人畜糞掃衣第二菴婆羅女已下為中下故開受施衣初文有二第一初緣五比丘請佛持何等衣答言十種衣作袈裟色持第二塚間衣已下明糞掃衣謂是世人所棄義同糞掃故曰也亦可從取處作名故爾論言體是賤物離自貪著故二不為王賊所侵故常資道緣故制畜著也五分塚間得衣即以塚間為界雖得入手但未出界即共後來者文故彼文有比丘得塚間衣後來者索分佛言應共分分已各還垂欲出界復有比丘來索分佛言應分出界已不應與此律糞掃衣無主屬先取者第二大段受施衣中大文有三第一從初至禮佛已下去耆婆奉佛衣已因請開聽比丘受施第二世尊以此因緣已下佛許開受第三爾時瓶沙王已下訖此揵度廣明順教施受前文又三第一初至隨意著正明耆婆治術得衣奉佛致請文中兼言重掃衣者為隨三品通行故第二爾時世尊嘿可已下受衣許請第三耆婆童子已下蒙佛遂可致敬而還前文之中博學醫道六種治病為彰第五得貴價衣第六治佛信敬淳崇奉衣致請故有斯文大文第二告眾開受中遂前請故言亦兩兼但糞掃衣知足行勝利他義微若論施衣利兼自他是故世尊須並讚歎第三大文分之為六第一從初至愛護臥具非時施法第二爾時有比丘異住處安居已下至不應得分時施之法第三諸比丘大得可分衣物破為二部已下至應與分耶正二部分攝方法亦名料簡前兩分受同異第四爾時有居士已下總明攝施不過八種第五冬月已下如法受用淨施之軌第六爾時有比丘遣衣借他已下取受成否初文有二第一至一切外道服不應作正明非時現前法二爾時現前僧已下次明非時僧得法施就現前復三初明受施聽分第二世尊出王舍城已下至蚊厨聽畜正制使如法受用資益比丘福利施主第三世尊在䟦耆國菩提王子已下聖制不聽非法畜用比丘招𠎝施無福善故初文聽分者名現前施以人受為定恐好惡不均故擲籌分第二如法用中文三初至釣紉依方作法第二王舍城比丘多持衣已下至更作餘衣制衣頭數第三波羅捺有檀越送食已下制衣重數初文有三一明作衣法二爾時六群反攝涅槃僧已下帶衣之法三舍利弗已下制鈎紉法作衣文五初教現放世因作衣法式問阿難等羯磨受戒豈可未有三衣乃言教放世事作衣者何答已前之衣聖變成放習恐難今放世因為示易成故二爾時阿難已下奉旨教作三爾時世尊南方已下佛嘆阿難舉過未同今令僧尊重故四力截已下割截之意示以法則五諸比丘不知當於幾條已下條數之軌三衣義者前已解說次二文易知第二頭數文二初制頭數二爾時異住處四方僧得貴價僧伽梨已下雜明應不前文有三初見多持衣過念許制限第二婆闍國遊毗舍離已下受菴羅園制衣處所第三世尊在靜處思惟已下正制數限第二處中明離車等來禮覲者為明賓耆羊㝹偈誦佛德離車歡喜與五百領衣彼得衣已奉佛為受彰得衣故來偈讚文三初至香潔一偈半以佛出世施主獲利美響外影第二今勸已下一行半嘆佛相好光曜絕倫以薄皮子等現受天報而於佛邊猶如聚墨顯佛無比故須讚嘆於中文三初今觀一句法說二如日已下三句喻說三如是已下二句合第三一偈歎佛智德窮圓文三初一句法說次一句喻次二句舉智用以合前嘆外相福德次顯內有智慧具二莊嚴是故無比第三正制文三初訖靜生念第二夜過已下陳已屏念告眾令知三自念已去已下正禁限數前念之中有二初至不得畜自憶昔時念制兩意二時世尊初夜已下准已禦塞許制比丘第二雜明應不初之一句不得用故貿而用之蒭摩下八句畜應不應前三聽畜第三重數文兩初辨重數五分衣壞聽補以復綖却㓨亦得直縫第二善現下三句畜應否應第三得非法用中文三初菩提王子已下至覆上衣不得下用二裹頭已下有其十事白衣法故不同俗用三假作編髮已下有其十事外道法故不同用外自下第二僧得施法文四初至現前僧應分一部攝法第二有二部僧多得可分衣物已下至應取二部攝法第三爾時佛不受請已下至如法治者病比丘賞勞之法第四病比丘身患瘡已下雜辨應否就前一部攝法中文二初檀越物以辨僧得二舍衛國多知識比丘已下亡比丘物義同僧得初檀越物文三第一至應與分初緣數人墮籌分法二比丘分衣時客比丘來已下羯磨三語等法三爾時有比丘已下正明分受成不成前文復三第一受施聽分二復不知云何已下如來教以墮籌分法三時分物時有客比丘來已下應與不應與文有八句既言客來應與故知僧物也欲解此文先須釋義汎明攝物竪義分別大位三門第一定時非時第二舉時非時各有現前僧得第三分攝方軌初時者時有二義一佛以比丘受功德衣五月不受一月開諸比丘得五利時但是得五利時不必於此時中受者即名時施以受施義通故二以安居勞說之為時如施主請比丘夏中供養即以此安居勞為時如毗蘭若請者是故言為時若為此時施復在一月五月時中者是名時施以此二事元為安居故開若反上說不為夏勞者並名非時施故下文為施塔乃至為云人會者佛言不應留過夏安居此是非時衣現前僧分故知不為夏勞名為非時施也第二門者時與非時各有二種言時施二者一時現前謂本為夏安居故而數人分者是如毗蘭若以三衣奉佛比丘僧人與兩端疊為夏安居故明知為夏隨人施者是時現前二僧得者施主本意但安居等心奉獻而不局彼此僧通一化名時僧得如下律文來分夏衣便去後分夏衣不取去者分佛言成分應相待亦囑授後人受夏衣分等三句者是言非時二者一謂非時現前施心限局人物有定隨人而取者是如上律文受施初緣現前僧太得可分衣物佛言聽分應數人多少若十乃至百人為百分若有好惡相參乃至墮籌分二是非時僧得施者謂其施主運心彌廓時通十二月人及一化奉施者是即此律言有住處現前僧大得可分衣物比丘分衣時客來數數分衣疲極佛言應差一人令分白二羯磨此等位二事四理通一部二部下當說第三門分攝方軌者此四法中非時僧得須作法分以不定故加法以定之言不定者一時不定除時施二處不定異界得施三人不定蘭二現前四法不定異同羯磨施為斯不定故作法以定餘二現前是人定故若時僧得以時勞定故並數人分亦有人釋時僧得者以施心通普故亦須法定故下文言有一比丘安居大得夏安居衣物佛言彼比丘應心念口言受既有心念明若有人對首羯磨故亦須法問若言須作法分者所以得囑授取耶頗有要須作法而不及法得囑取者用此法何為故定不爾心雖普及施主得僧因之福為止貪故不聽異處受衣以佛定判局處取故不假作法但須消去一比丘心念受衣文者非心念法謂與念屬己可知然解此四或一部攝四者隨其二眾各有此四即如上辨或二部攝物四者若二現前並數人分二種僧得分為二分非時僧得義如向辨時僧得者義或不爾若欲細解此四施分攝即為四種三門三門者一一部分法二二部分法三耶正得否其四種者一時現前二非時現前三時僧得四非時得先解二現前此兩種三門或一部或二部並數人分若耶正分別謂請耶正二部對面行施應問施主隨所說受若言不知或言俱與並數人分次第三時僧得三門者第一一部攝法如文三句初句未分夏衣比丘去後分不取去者佛言成分應囑授取囑授取故明不作法次句漫囑次句授囑人忘咸判成分既聽囑取明知餘界人假及分者不得其分以聖定判局此界故然有人消此言不聽異界取者謂時現前若時僧得界外來人及法亦得作此釋者不然若不聽取是時現前者屬人既定是人皆知何須佛判故知不爾第二二部攝法分二第一准此律說義言分為二分故以名二部僧施故亦可以無作法可得言道二眾不合共作法故須分二分計亦數人以取此處安居聖判定故第二二部互攝如五分說非安居時施比丘僧無比丘比丘尼應分非安居時施比丘尼僧無比丘尼比丘僧應分又云安居時得施皆亦如是互屬定訖當部數人分之第三耶正下文六句初三對僧以辨謂得夏衣已破破已得物或得已破破已得此三並數人分以無作法但是約時局處受人為定故爾次下三句約別人說對物已得未得從正趣耶並與去人分故皆以約時局處受人為定故此據正眾領物以義推准更應三句耶眾領物背耶歸正彼應與去者分復應更六各望正耶互不與來者分此等並略第四非時僧得者義分兩位第一檀越施物以明僧得第二亡比丘物義同僧得故此二門中先解施物三門者第一一部者有其四種一常住二界得三同羯磨四僧得此但僧施前三處法局定隨入三種唯僧得一種須以法定法位有三謂心念對首羯磨竪義者事須廣辨今此寄文中說二二部者亦有四種一常住二界得三同羯磨四僧得第一常住屬處定故隨二部僧分為二分第四僧得須法以其二部不共作法亦分二分中二謂界得同羯磨以處法定故數人分亦可名二部故並分二分義亦不妨今且局辨僧得有二第一本意對面施二部文有七句其中五句分為二分四七二句互無一眾攝以其二眾俱不盡集不得計現人分復無共作法義故分二分各當部加法攝之如前一部法第二互入二部攝五分非安居時施比丘無比丘比丘尼應分非安居時施比丘尼僧無比丘尼比丘僧應分此文雖無義亦應爾上來所判五入既定各及法者得第三耶正差互者如文六句初二對僧亦是約物得未得異故分得三別已破者應分二分破已得物須向施主第三一句得已破破已得同上二句初句分為二分者既僧物耶正俱有其分不局現在寧得計現人分之正耶四方俱不盡集須加法以定正耶復無共作法義故為二分彼此各自作法分之下二句比說可知次有三句僧先已破約物故三此等別人從正趣耶俱不為去人分以其已分二分一屬耶到耶部中彼有分故此不須與分計理復應有三從耶歸正應與來人分文無者略此之六句謂是正眾領物若耶眾領物正耶相望反說六句初有三句如向初三說次有三句如後三說第二云人衣物義同非時僧得總為二門料簡第一依此律解第二通收餘部不同補此遺𨷂第一門者依此律處分義階有五一負債攝法二被舉攝法三耶正攝法四二部攝法五和合一部死所以須迴此義門先後者以其一部攝中義廣多故對文解釋義便故第一對負債者依十誦出息物等死者有七句佛判或隨入界書處僧或入保處或入捉質物處得等者廣如彼說以理推究或不同彼若白衣家出息物在彼人邊未得者容准十律或依義等債之若物在僧住處比丘亡後並應隨物處所在僧得恐不得依界等互攝此初在容將此僧物以屬於彼既不依其此彼俱僧故寧十律若處分者須為兩門第一先明他負亡人債之法式故文誰負汝若佛法別人負病者物俱應債取以其此物合入僧故若輕重相當各隨所入互得輕重並隨其本若常住重負即入常住輕須債取入現前僧現前僧若負重輕咸須債取以其重入常住輕須加法故爾第二次明償債之法文言汝負誰謂若病人負三寶別人重輕物者隨有輕重各相當還若無相當互還無妨計其大理有債先還益王者故還已有餘方如常法是以下文若有長衣應長償若無應賣三衣償有餘與瞻病人十律有比丘屬塔物自貸私用四方僧物自貸私用佛言財物還計直輸塔及四方僧餘殘現前僧應分又有比丘賖沽酒未償便死酒主從諸比丘債諸比丘言此比丘在時何以不債酒主言不償者出汝惡名聲佛言是比丘有衣鉢物應用償若主無物應取僧物償何以故出汝諸比丘惡名聲故然不別常住現前之異計理應以現前者勝第二被舉者下文佛言隨所共同羯磨舉僧應與一釋謂同被舉治人所以爾者治舉已後財法不同何因死後輙容攝物故如法僧不合得取若爾一人被舉死當入誰又解入賞勞僧亦名功能僧以如法僧治罸功故但令當時預舉羯磨即有物分故言隨所共同羯磨舉僧應與祇律被舉比丘死即以死衣物置床上曳出棄野田中若放牛羊人持此物與僧者即作彼檀越物故受之第三耶正明如文二句背正向耶物入耶部原其本心耶正路乖為是衣鉢隨意所往處得亦應二句從耶歸正物入正部文無者略又直據隨身如前所判已外之物或可不定又十律云受法中被殯往不受法眾中求懺悔清淨我當作不受法若未除罪而死衣鉢還入受法眾若除罪已死衣鉢入不受法眾若不受法眾比丘被殯往受法眾中求懺悔等反說可知殯謂舉也又受法比丘於不受法眾中死其衣鉢物喚受法比丘還若彼不來取者即不受法眾中作四方僧臥具若不受法比丘於受法比丘中死反說可知此律及十律前一所明者謂對耶正互背互背互歸說第三一文者據耶正互在死既判定耶正耶正當部還如恒法也第四二部攝法下文拘薩羅國無住處村到已命過白佛佛言彼處若有信樂優婆塞若守園人彼應賞錄若出家五眾前來者得以物在俗處恐用而獲罪故入五眾先來者得無問重輕悉入先來但輕不待法即入其人重者非屬人物故隨先來者處分還入常住以其先時依二部僧得施物故身亡已後還入二部若無先來送與近處二眾唯取近處不簡僧尼若道路死獨住死私㽵死類如前判若物互在僧尼二處即同此故十律互寄死者有住處一比丘死是比丘衣鉢物寄尼精舍佛言若比丘死時寄比丘尼衣物現前比丘僧應分又一住處比丘尼死是比丘尼衣鉢物寄比丘精舍佛言若比丘尼死所寄比丘衣物現前比丘尼僧應分以其二眾並知法故不同俗處是以還依死處是同類分之又以死處有比丘故復異於獨住死者互寄既爾互債應同第五一部者於中位二謂具非具別沙彌死者此律無文祇入和上五十律同比丘法故五分沙彌命過若生時已與人應與之若不已與人者現前僧應分十律憍薩羅沙彌死所著內外衣白二與者病人輕物僧應分重物不應分唯此三眾類皆同然行事之時住依一部具中淨不淨不淨有三犯重死一於中有三第一若未殯多論云同常判第二已作法殯入親近白衣三學沙彌十律入死時現前僧第二呵責等四罪處所等別住之類並同清淨死判第三被舉已如前說次辨清淨死者四門分別一辨同生共治成不成義二解囑授成不成三定物輕重四看病賞勞攝方軌竪義者此中懸解講隨文釋第二通收餘部不同補此遺𨷂者此律分攝亡人衣物差別有五第一負債死第二被舉死第三耶正二部死第四僧尼二部死第五一部眾和合死餘部不同略論有四加前合九五分有一若水所漂死其衣鉢物挂著界內樹枝諸比丘見入界內謂應屬僧佛言聽行糞掃衣取十律有二一學沙彌死入當死處現前僧分二二部互寄死各還僧尼當部餘三律中沙彌命過皆有處分如上已說此四不同他律所辨四分無故准用無妨自律有五部辨九異從亡人物義同非時施者已來講時並隨文中解下次釋文第三分衣時客來已下八句明應與不應與前四句應與以未分竟故後四句不應與攝物已定故初四句中二三兩句形前對後故分二名也若二人已上墮籌分故言擲籌竟來界內但一比丘領物知復共誰墮籌分之謂攝物屬己故作歡喜受分之名非謂初緣心念受也以攝物定故客來不應與又前二可爾第三有餘分竟不為者若無餘可分如上二竟若有餘竟者不與不竟者合與即無前二次句亦爾又但是僧得物下至使人亦得分故於此四中一一不竟即前四中收今且出竟故言不與第二制以法定於中文三初制分法略舉眾法白二第二次有二句婆輸伽衣等佛聽畜著略出所分物體三有異住處已下正依法分於中文三初對僧羯磨分次三語分次心念受就僧法中應須具有兩白二法一差分衣人法故文言應差一人令分又如房舍法中舉差分粥人等中分衣分雨浴衣具五法生天如前躬如差沓婆分臥具等何獨分衣不曾差人故定須差十律分衣人五德知衣財色價頭數與未與者白二差復有五法謂不受等是今此文無白二差者略行事必須第二付衣白二即前文中列者是故文言僧今與某甲比丘彼當與僧故問所以須付別人者還通四方故須付別人所以還與僧者若不與僧不得分故昔解直以此法即成分法故羯磨中直陳此白二者不然以少差人白二故既付衣已隨彼處分即是分之方軌無別秉法然文言持衣與一比丘令白二羯磨分者謂舉前應差一人令分白二羯磨之言如前付分直爾處分非謂此人更作分法也若五人已上具此二法或但四人不得差付以所差所付人不滿數故僧應直作羯磨攝局應言大德僧聽此住處現前僧大德可分衣物現前僧應分若僧時到僧忍聽今現前僧分白如是羯磨准白辭說所以知者母論說四人相應法者五人共住一人終亡四人作羯磨分者是名四人相應法不言轉施一人又言五人相應法者五人羯磨分亡人物四人羯磨施一人一人還施眾然後共分是名五人相應法至此始言轉施明知四人但得直分此僧得物既因法定須以四句料簡一及施及法二及施不及法三及法不及施四俱不及四中初三得分若全及差分二法故宜名及設但及分不及差者義亦及法亦可要是具及兩法二四兩句不得分以不下及法故也沙彌使人雖不共作法但令作法時在界內者即當及法之限若舉現前對顯僧得亦為四句一及施及分二及施不及分三及分不及施四俱不及四中前二得分以及施為定故下二不得不及施故次對手三語法應言長老憶念此住處若衣若非衣現前僧應分此處無僧此是我等分三說或有人引餘律此物屬我及長老受用亦不異前此文既不言各各三語受故但一人作法時言此是我等分者是共分不勞互作不同說恐各表行淨故次一人心念應言此住處若衣若非衣現前僧應分此處無僧此是我分三說或若僧得施物少者五分有住處僧分衣客比丘來比丘得分少不欲分白佛佛言乃至得一腰繩宜應分若少不足應白二與一無衣比丘大德僧聽此僧得衣若非衣今併與某甲比丘白如是羯磨准白成問此律心念可有幾種謂二種分衣說恐悔吉發露安居等七所以可知第三成不成有十二句初六對羯磨成否下六對三語心念成否亦可前六約羯磨對手分成不成次六約心念成不成以三人二人亦有分故於二六中各前三不成下三成又於四个三中各前二犯第三不犯第二亡人物義同非時僧得其文有二初至一切屬僧佛判屬僧第二諸比丘已下料簡輕重前文略引十三一僧伽藍二屬僧伽藍園田菓樹三別房四屬別房物五銅瓶瓫斧鑿燃臺六諸重物七大小褥枕八伊利延陀氍氀等九守伽藍人十車轝十一澡瀊錫杖扇十二䥫木陶作皮竹等作器剃刀等十三衣鉢針筒等言多知識者䟦難陀無知識者陳如比丘祇律文陳如比丘祗律文陳如比丘入涅槃持衣鉢詣王平價價直五錢斷言還歸比丘佛言應屬僧故曰多知識無知識一切屬僧此言屬僧為對佛法及餘俗故所以爾者以出家人同遵出離身行所為莫不皆是僧法所攝本依僧得故使終後還應入僧施佛法比丘無分為斯亡後不入佛法王臣親屬並是道俗不同得物不同彼故不合入彼廣如十律第二料簡重輕者亡人衣物一部攝法須為四門一定同主是非二囑授成否三定輕重四賞勞分法第二第四二門義至下文釋今解初門同生等者若師元意終弟子衣食已與竟者得餘未與者師亡後屬僧實非同生假冐稱同計直犯罪或師本情財物共有若死還俗及以別活計人等分一分屬僧乃至別活若不依此契者計直犯罪今設言同活物已分竟餘屬亡人次解重輕有二第一義門分別第二依文料簡先義門者位且為三一佛制畜物如六物之類二不聽畜物如田宅園林奴婢六畜等三聽畜諸物如長衣資物等三物中第一入輕資道要故次物入重以妨道故即為輕重二門第三物中復為三別一性輕重二事輕重三從用輕重言性輕者謂十種衣布絹細綿綖縷等是以所成衣輕能成絲纏亦入輕限言性重者一切寶物石木田宅瓫瓶釜鑊奴婢畜生車轝五行乃至一切妨道物等是入重言事輕者如一切道身衣物衫裙氈坐具等是此應入輕言事重者如大氈褥大小帳步彰枕扇被等是此應入重言從用輕者盛鉢函三衣箱及受用針剃刀等是此應入輕言從用重者如戶簾屋帳床帷轝案几車前後𢃍㡘軒幕等是此應入重今以性事從用三輕攝入初物總收入以輕以性事從用三重合入第二物總束入重聽畜門中尼十六枚入重如助身衣等入輕餘准前說可知次依文料簡者於前十三中初六合以為三九與十合以為一餘五還五總作九門判之第二門屬別房物者謂房中校具遮壁㡘鄣等若以絹布為己造房房主死者未變入輕已變成重入重以皆屬比丘故以死時重輕為斷不同捨物為父母師僧塟埋等用以別屬故又捨入佛法類亦如是今言不應分者同前校具重物故第三門瓫瓶不同十誦以量數為限今此無問大小牙角器等十律半斗已上重已下輕此雖無文有皆入重種種物中几案藥草石等染汁染具之類並不應分伽論四方僧共染第八門伊梨陀傳言步鄣耄羅者小帳耄耄羅者大帳氍數容堪被著者聽分被氈類然若應量及減入輕若過量入重漫單亦爾不同五分旃判入重被判可分若毛過三指雜色分明者入重如繡手衣錦衣不應畜故五分若錦若綺若毛𣯟若䨱創衣是不可分物屬僧第九門奴婢藍民入重所有私物入彼私用死人親屬若無親屬僧用無咎十二䥫作器等謂以䥫竹皮等作器者入重亦可造䥫作之器如鉗錘鞴囊等入重餘皆類知剃刀是應法要用從用為輕其𣙥石等並隨剃刀刀子箭刀十律聽分五分截甲刀戶鈎針是可分物此既無文入重無妨香鑪十律聽分今此所論亦不定入僧應與能供養者所有帒屬並隨香鑪其經書章疏隨能受持者與不得定判其藏道遺函篋札帙中幞亦隨經疏經架從經義亦無損十三衣者一切非是比丘所著之服咸皆入重謂同白衣外道等服若鉢鍵𨩲錠匙箸等盡應聽分下文聽分俱夜羅器者是五分銅多羅盛眼藥物可分若過量白鉢入重若爾過量白色衣亦應入重解言鉢性重用輕今既過量白色不任受用即非是鉢故須入重衣體性輕故還入輕餘或無文任准他律問漉水囊云何答理定入輕祇律名隨物十律賞看病人五分是可分物現前應分祇律聽分革履故知靴履𩋧等並亦聽分不得定其多少次二部攝法其文有三初至送與近處伽藍二部僧得法第二世尊舍衛國告三月靜坐已下聽與尼非衣二部現前攝法顯前僧得第三諸比丘念行波利婆沙已下料簡前二僧得現前初文復二以前一部分攝二物今二部中亦位有二初檀越物對前初文次拘薩羅已下亡比丘物對前第二文初文七句如上義中說次文亦如上義門中辨既言近處不簡僧尼尼死無伴亦然可知若比丘寄物尼寺十律應送與亡者本寺若不知處送與隨近大僧不得入尼寺及以私處用尼寄比丘亦爾不同聚落恐白衣損用僧物故互眾互得若比丘私㽵上死有沙彌淨人守護此物近處僧不得以有守護故入亡者本寺此母論說若無本寺復無守護入近處大僧尼死亦爾第二現前中文三初佛告靜三月比丘立制二和先已下至問訊世尊識佛意故禮覲讚可三爾時諸比丘聞已下至未為欲行同捨衣行施得與尼衣即是二部現前施故不得與白衣是中亦施佛及塔偏對僧言之第三料簡文中分二初至借衣對於七眾與應不應第二舍利弗下明取他物應不應義別住人等與清淨同七羯磨人應置地與以不自與免隨舉故白衣有功計直酬勞聽與此等料簡現前施言和合沙彌等與分等者人齊一還次與半者比丘得全沙彌得全中一半言三分與一者比丘得三沙彌得三中之一此對僧得雖順施主之心既是僧得物人別具不具異若不和者階降多少不同現前隨施主心隨人定與故不論差降僧伽藍民雖可非僧於僧有勞故亦須與道俗差故復異沙彌故四分與一或都不與不應分次父母恩重聽與次舍衛國已下聽借俗人衣對向現前不得與白衣之言第二舍利弗已下上來正辨與他儀式因辨取他物進否親友者得非者不合親友意取波利迦羅者謂取雜碎衣者小親友也若取大價或瞋小小衣不恡非至親友故不應取若正須此波利迦羅亦不應取濫非親友故言若不足亦不應取第三賞勞法中文三初至易看如來愍物制看病法第二爾時比丘拘薩羅已下至供養我順教瞻病聖所如讚三彼持六比丘衣鉢已下賞勞攝法前文復二初至捨去佛自瞻病為立法故祗律院已說法得道喚比房比丘令看病人更化作一病沙彌汝當通看此即福罸汝十律此病人即得羅漢五分病比丘佛為說法得法眼淨如法句經佛為報前世五行罸恩故須著病人第二爾時世尊已下制看病法更瞻視文三初制看病第二聽彼比丘和上已下辨瞻病人七眾之著第三病人者有五事已下舉難看之病彰其德成第二看中文三初舉聖教二彼即便已下順教瞻病三爾時持亡者衣鉢已下舉以白佛佛即讚可是為供養我者順教看病是行供養故又悲心看病與敬心等故使前言若欲供養我者當供養病人次第三僧行攝法文四初訖應取病人衣物賞勞分法二若病人臨終已下囑授成不成三爾時舍衛負債已下負債償債法四聽瞻病人問已下制問委旨前文分二初彼持亡比丘衣已下至僧應分總言僧攝二爾時世尊告已下教僧攝法文三初訖子住賞勞分法二爾時舍衛國有多三衣已下對物料簡三時有比丘小小已下對德應否就前文復三第一至如是與佛聽賞勞第二時瞻病人已下至第三說教瞻病人對僧總捨捨訖始可定其同生次定囑授次定輕重次至賞分竪義總說第三僧中差已已下教僧攝法先明賞勞次子注文者正僧攝法處分此物須為五門一須賞意二所賞人三物分別四德分別五賞分之法初門先解須賞者祇律看病恨我不避寒暑求藥除穢其實如是誰應得衣物而言眾僧得耶佛言應與三衣鉢及所受殘藥十律衣鉢僧分竟僧問誰看病看病者言我僧言擔是屍去此人言我非旃陀羅非白癩病者衣鉢物僧分屍令我擔此人活時恭敬愛念我我已報竟是死人誰欲得者任意擔去比丘白佛佛言應先與六物餘物僧應分重不應分第二門瞻病通於七眾若比丘死二眾得若尼死三眾得以餘道俗及二眾互各勞不滿故故五分看病人多不知幾人應得衣佛言若比丘命過應與二人衣比丘沙彌雖父母兄弟亦不應與若尼命過應與三人衣尼式叉沙彌尼以義而論餘三眾死准前而說有比丘分看病物與沙彌三分之一此比丘謂准應分物故佛言應等分與十律沙彌看病應等大僧與次二門義對文中說第五門法者復為四門一分衣時謂非屍前十律憍薩羅國在死屍前分衣鉢死比丘起言諸大德莫分我衣鉢白佛佛言莫即於屍前分若已去若僧在異處應分祇律比丘無常不應即閉其戶共行依止持或可信者付戶釣不可信者持與知事已供養舍利料理竟然出衣物作羯磨已應量影容來應知在羯磨前後或值死不值羯磨等四句是中值羯磨或俱值應得餘二不得以斯文故要殯舍利已方作法分攝二分攝物處是大界非戒場故祇律六比丘衣物戒場上作羯磨犯越毗尼十律若持僧得物出界犯吉應與異比丘共分五分一住處僧得可分衣物一比丘持至戒場上獨取受持佛言不應犯吉現前僧應分乃可通於自然以對人多少故三約人多少謂僧眾多人一人僧有二別謂五人四人異也第四約人用法不同若五人已上具用三法謂賞勞白二差分衣人白二付衣攝物白二文但有兩其四人者直行一法具如僧得中說三人已下對手心念可知又若四人已下隨作三法竟然以衣賞次釋文者第一賞勞白二所牒衣鉢此出法語隨有稱之非恒具牒所以作法賞者勞有滿物有好惡既是僧物理無專轉故以僧法付之第三次義加差人第三次付攝法如文可知第二文對物者於中五門第一定物十律應與六物謂衣即三鉢坐具漉水帒也准此六者但言衣鉢坐具針筒盛衣𮖺器若離三衣盛衣𮖺器隨衣鉢故此等是六尼准此說五衣八物若合三衣盛衣𮖺器為一亦得是六此僧尼俱六者好祇律與衣鉢所受殘藥五分賞看病人三衣鉢第二有無分別隨有賞之無不可賞第三有中現不現現者須賞或若餘處即屬彼僧多論二者三衣先寄餘寺命過亦得索取賞瞻病人餘處僧不得護看病及德不具不應取隨物在處僧應分第四現中持不持持者與之五不知持不持量看病三品第三德者五德一知可食不可食可食能與二不惡賤病人大小便咀唾三有慈愍心不為衣食四能經理湯藥若差命終五若為病人說法令病者歡喜己身善法增長具此應取衣物反此不應取祇律看病人若蹔作若僧差若耶命悕聖作若樂福德作此四人不得看病者物要是慈愍病者得與賞勞物若為病人求藥若為塔事僧事蹔去應與十律實為病人故出應與若為餘事不應與五分諸看病人或為病人或為稱行去後病人命終餘人得其衣鉢佛言不應趣與一人應與究竟看病者上言具五法者是第二囑授文者三門分別第一囑授差別一人物俱不現二人現三物現此三不可交付故准囑知若境物俱現即有二別其如衣鉢布絹等堪即移轉者授而不須囑或奴婢車轝田宅六畜之類一以不可移轉故又無改變故授而須囑即是亦囑亦授若以第二直授不囑驗知餘兩並悉成就第二善不善分別囑授有善不善若比丘自知生來貯積臨終慚愧破慳種子故囑財物隨生福之所囑授是善恐己此物死後僧德即隨親近決心囑與是名不善不囑授有善不善所有資生佛有成判入僧受用益利無邊我今自理心行念三寶功德來生善處是名不囑授善若從來貯積未曾興福臨終病苦有心減惙然前念欲捨後心追恡恐己還活無物資身如是相續慳心捨命是名不囑非善第三成不成分別凡淪囑授正是捨財相應善心無貪善根以之為體要須決意定無變悔斯皆成就祇律若決意囑言我若死若活其必與如是決意者應與如言以爾許物或造經像榮齊福可速經始令我及見然財物未變或未成訖此皆成囑授若言此等諸物我死已後造作經像齊福與人等此人終後追取屬僧故下文言病人臨終時作如是語我此物與佛與法與僧若與塔與人我終後與若不死還我佛言不應如是與應現前僧分十律若病人語看病者言汝能好看受念我若我命終所有衣物盡當與汝佛言無有如是死當與法若比丘終後現前僧應分五分有諸比丘未命過處分衣物言我死後以此衣物施某甲以此衣物作如是如是用以是白佛佛言犯吉羅與不成與用不成用又復假就決定囑者祇律初囑未與者病人語比丘言看我當與長者衣鉢無常後集眾欲分衣物看病人言是人存時言與我衣鉢白佛佛言不應與次句與如未說淨還置病人邊亦不應與次句與已即淨佛言應與五分若生時已與人而未將去者僧應白二與之此律不論無問將不將及淨不淨若成一向與不同祇律但成直付又異五分若解重囑等成否者祇律若囑與眾多人最後人得若授與眾多人在前者得計理而論並最後者得以皆違潔屬病人故既言死後與者不成明作塜墓棺槨及衣衾等咸悉不得除師徒等貿而䨱之者得目連問經和僧得用僧祇支䨱屍五分比丘命過露其身突吉羅應以衣䨱然不知用何衣䨱之次下三文一受不好三衣二送衣餘處此二惡心囑授不成之氣分也次多三衣者重料簡所賞物故第三有負債比丘已下明負者擯債廣如義辨第四聽瞻病人已下制問委旨文二初有五句制問之方二若不已下違如結犯第四雜明應不雖無宗序且分八文初至如法治明助身䨱創衣第二六群作悵已下至聽畜餘助身衣物如不如義第三時比丘不持三衣已下至五細衣聽作制量及受著用餘衣等反著僧伽梨者五分未入村已出村為護衣故聽反著衣雨時不聽到著衣無雨隨意到著聽兩頭安銅釰五分在路行不少攝衣曳地佛言聽作囊盛極長使前至齊後至要第四時諸比丘犯捨已下至僧祇支聽作畜用如否文言犯捨墮衣謂販賣乞得迴僧等體既有過制不聽淨施著用作三衣等得罪不敢以捨墮衣與人作被者謂犯長衣與人作被即是斷績貪心不犯小罪若三衣失奪取著即無長過亦無小罪貿易為利是以不聽亦可前不聽著用是未捨衣後聽著用是已捨衣也又言波利迦羅不現前不犯者同五事之疑餘文可知第五異住處已下界得施物分之無法故遣人未應與文第六轉易臥具已下愛護臥具第七有住處現前僧大得可分已下結庫藏賞物着守物人及所斷理事第八時比丘著僧䨱身衣已下護僧䨱身衣第二時施攝法文五義四言文五者初至應與食有兩句明客此對夏衣食分攝得否以是異處聽取夏衣謂食亦爾佛言隨施應食此時僧得物故言取半若現前者隨施主心俱取無過第二時世尊毗蘭若已下至如法治開受夏衣即是時現前於中文四謂開過呵制此文開受夏衣應最在明第三爾時有比丘未分夏衣已下至隨施食明舊比丘攝夏安居衣食成否衣中三句初未分夏衣去後成分者謂時僧得施物施主聽分四方安居皆有其分為止界外多貪過故聽明得物界內安居人得直爾而攝不須作法以佛定判異處安居不得受分故然此比丘去後界內盡集彼不在界是以成分然此處安居理合應攝故言亦應待還亦得囑取次句漫囑次句受囑者忘並判成分若未攝身死不合分與作亡人物入僧以未定屬又復文無判與故也此同祇律無常者不得安居初釋之若准五分應取一分作亡人物攝若現前利物要索分與之或若身亡亦應計人分一分入僧以定屬故也上來以見留衣不與去人佛判成故謂留食亦得佛言不應留難應隨施食第四舍利弗已下二文舉非時僧得不得時利反上待還囑取言也第五爾時一比丘已下明一比丘攝安居衣此僧得物非是心念法受直是興念攝物屬己本意施多以無僧故我今得已故云心念言此是我物也為對界外不合受分故言若受若不受不應得分必無作法若法作者如前待囑既不及法何以得分若得囑取用法何為更作多解直是刀刀也言義應為四者謂合初三客主相對攝夏安居衣食之法第三正耶攝法亦是料簡前兩施法文十六句可分為四初六對前非時僧得正耶攝法次有三句對上亡人正耶差別二部攝法次有一句請正耶二部就家攝施次有六句對時僧得此初及後兩个六句送物至僧施二部法言初六者若是一和僧得已如前辨或若正耶僧得如何分攝如文六句是前三對僧次約三別次三句者一和合及清淨等死已如前明邪正被舉死頗得同前亡人衣物以不答曰不同如文說三句者是此據一往判屬正耶二部其當部分攝一同恒法還亦如前次就家行施法則如何次正耶夏衣意亦可曉此等具解並如義說講者對此論之第四八種施法三門解義第一攝施盡不盡第二列名解義第三施八位二初門者此之八種攝施不盡若就捨財相應心是無貪善根性體唯是一隨施具彰事乃眾多唯明外財不論內施施境唯僧不通佛法且隨一方化宜以境分心略標八種割已惠化名之為施故言八施次第二門一者比丘僧含有四種一時現前二非時現前三時僧得罪時僧得分攝如上沙彌攝在其中二比丘尼僧亦含四種及收下二眾三二部僧亦含四種後二僧得分為二分前二數人義收下三四四方僧謂常住四方含有二義一部常住二部常住若二部常住若二部常住應分為二分五界內僧見論界有十五一戒場施局施戒場僧得餘界不得二同布薩界施戒場不得不失衣界得三施不失界大界僧得除一聚落內僧不得餘者可知或一部界得及二部界得六與羯磨僧要預羯磨者得餘人不得亦有一部二部七稱名字提名別施八與一人落手付與一人第三施八位二前六是僧施有是僧用有非僧用後二別施是別人用前六中第四一施是僧施是僧用施主有二種福一得施僧功德二得通三世僧受用無作反種餘五僧施而非僧用以有屬己私受用故得福處狹第五淨法如上輙著戒說第六受取成不成文二初對比丘次對白衣前有二十四句初十二句借人衣初六成取不成取初三句不成取以作所借衣人親友意故下三成取以作能借衣人親友意故次六句上三不成受所與人雖命過彼非衣主故下三即成受能借命過是主故後十二遣衣乞人成不成初六前三不成取次三成取次六句前三不成受下三成受二對居士者比丘雖無受衣之心以隨施主捨心決定故佛聽受用
