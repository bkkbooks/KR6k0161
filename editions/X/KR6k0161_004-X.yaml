body:
  text: 沙門法礪撰述自下正宗所以得興者良由僧尼不勝名利廣生有漏壞其略教是以如來隨其缺犯制廣補之便犯相分班輕重位別教禁群機有當時之益原意在此故號正宗正宗之旨不出身口止善受之與持犯相輕重但人多釋不可具錄亦有說言制在一代人時處事前後不同一戒一經合有六百餘段次第解釋非無此義今以宗求且分為二初二部戒本五篇罪辜欲使僧尼善修對治離過行或止持行相第二犍度已下身口進止修成眾別作持行相先止後作義次第故亦可前略明二持後廣辨二持且從初說問上戒宗中其唯受隨何故判文專約止作二持似當局辨隨義答若望受隨行之次第實受法非隨今據能康人說故使受法是作持收初文復二一大僧止持二尼眾止持就此先須二門分明一僧尼離合二僧尼先後先辨離合問大僧與尼出家位同齊悕出離俱是具戒篇目無殊別立五篇者何答凡戒以防非為能在數出於所防非過無以取別然過興在人患生不等故二眾五篇多少差別輕重不同有無互缺犯同緣異以斯別狀不得合制第二次第者問大僧戒相所以先明答為表丈夫護持建立功強於彼兼是師從兩異又出家先後故所以爾就比丘中復分為二初明五篇防未起之罪二七毗尼下除殄罪諍滅已起之業已未雙亡方或皎潔又可前明止持次辨作持今解七滅之中以義推尋亦防未非以其應與現前不與有罪寧得判為殄已起行殄已起者乃是所為又向釋者謂以七滅中若也滅諍一有惡蘭二有懈怠吉故言殄已起行今推此義乃有多妨一二罪合妨二蘭有三處之妨三蘭有立教住處之妨四不攝百一蘭妨五與尼律有唯吉之妨為此今解應與現前不與現前等唯犯吉罪若作應與不與唯吉羅者即是第五篇中少分豈得總束學已上為一分第五少分七滅為一大僧戒本分二以判宗文既有此妨比丘戒本且從八段文說若總此八即為五犯謂二提合眾學七滅合不定未定故但為五即解此五須為二門第一總解第二別釋就總辨中四門解釋一五篇二七聚三方便四持犯此四位言五唯究竟以其根本究竟業道是以初明雖知究竟前後眷屬相亦須識故辨七聚義令輕重五七之果或本由因但造緣差互不可盡暢思業故次第三解三方便既識過相階差理須護持故次持犯若解五篇四門解釋一位立五篇并解名義二釋名得名三立五所以四明次第初門義者既毗尼以止善為宗故用能治戒行以為所明若位立五者此律名為五犯聚依祇五篇科以一名說之大僧四戒尼八戒以為初篇僧十三戒尼十七戒為第二篇僧三十九十一百二十戒尼三十尼薩耆及一百七十八單提合二百八戒為第三篇僧四戒尼八戒為第四篇僧百眾學及以七滅為第五篇尼百眾學為第五篇所言篇者人釋輕重相形是故名篇如常所破今言篇者流類均等相似義者說有五階故曰五篇各具三齊一是名齊二體齊三究竟齊如初篇四戒俱名波羅夷輕重義等復都是暢思有此相似錄為初篇餘非類者理不得同如是展轉乃至第五類亦同爾故名為篇篇之名者出在僧祇此律名為五種違禁起非故名為犯亦名五犯聚以其此犯各含多犯故名犯聚又須禁防亦名五種制十云五品了論五部部者黨類之別名如夷罪十六部殘五十二部提三百六十部提舍十二部非四部所攝所餘諸罪共學對及婆藪斗律所說罪一切獨柯多攝此等犯及犯聚篇品部名其類義等趣以一名說之但祇律疏行此土在四分之前故使說者引祇篇名以解此義義亦不爽如斯解時犯及篇品貫通於五五之別名謂夷等是問戒行為宗何故乃言波羅夷耶答行通於五不能自分舉彼所防以別能治故名夷等是即舉所防名能治行以所詮名能詮教故此中亦名夷等篇犯品部第二得名得名還五夷當體得名祇云極惡三義故惡一者退沒謂退失道果二不共住非二僧攝故三謂墮落入惡趣故即此極惡名當罪人故名當體僧殘者境體受名犯此罪已垢纏行者非全淨用故名為殘有殘之罪假僧除滅故曰僧殘謂從體及懺境作名亦可殘者境義作名又見云僧是懺境婆是初謂與覆藏尸沙是殘謂末後出罪此全從懺境墮者牽人墜義罪有此能謂從功能作名提舍者對治立目文言我今向大德悔過亦可責過受稱文言我犯可呵法若言吉羅從具義作名故見云吉羅名為惡作若言式叉勸學作名謂應當學故上來所明但出罪之得名若戒行得名第五是吉羅者五篇戒行得名唯一成就所防若言式叉得名有兩上四同前所防名第五勸學若能詮教得名唯一謂盡從所詮也又復先來以無餘反夷有餘是殘者此等且以後言不可即為翻名如戒儀以為二者豈可戒反夷殘威儀之名翻於提等故知不爾第三立五之意或言藥有五故立為五篇義或可爾亦可唯俗制道如五刑罪等或可如來隨根之教略標此五第四次第先就所防罪解推尋本制之興隨犯而禁輕重事亂無定先後今明次第何所依准蓋是大聖欲令斯法備傳遐代故今憂波離曲宣方軌亦以重輕次比於後故憂波離佛涅槃後一依聖教集佛所制正死之罪宜加先勒故辨在初餘次輕者依其階位乃至第五類以可知所以然者欲使僧尼觀過興厭先識麤𠎝後知微過善修對治除障道之業資發出離有剋道之蓋如說戒三五十五豈非是佛金口故知次第若據能防行次第者初篇能治是行根本是故先明所以得知若初篇行壞下四枝條焉能得生故須初篇行立便能發生眾行之本故知初行本勝先明根本行立若不修眾法行者眾法不成綱網不立何能康法迬眾之益次明第二篇眾法綱網行眾法雖或若不修身口進止威儀綱網難立次明第三身口威儀威儀既爾若不離譏過行亦難就次第四篇遠離譏過雖離譏過若不敬順三寶除𠎝𣧩諍反成滯礙縛在三有焉能出離次第五篇敬順三寶威儀淳熟𣧩除過諍趣道之行此據根本所以初勝若據難離名勝第五最勝乃至初劣第二七聚五門分別一位置七聚釋聚名義二置七之意三辨得名四偷蘭先後五入篇不入篇一位立七聚者四夷八夷為第一聚十三十七為第二聚一切偷蘭第三百二十二百八第四四八第五惡作第六惡說第七此之位七諸律及論並同所言聚者眾罪非一聚在一處名之為聚若爾蘭無別文何以言聚答聚在大教之中或可集在一名之下若舉一名往命無蘭不盡故亦名聚依了論七聚者一謂四夷二十三殘三偷蘭遮那一切二聚不具分所生四謂尼薩耆波逸羅尼柯五九十波逸羅尼柯六謂四波胒提舍尼七謂非六聚所攝罪及六聚不具分所生及學對如是一切入過毗尼聚此七聚次第但第三偷蘭一切二聚不具分所生者謂是初二聚近方便故波逸羅尼柯中捨不捨異分為兩聚第七聚云非所攝等者謂唯取根本罪為前六聚前二聚近方便為第三聚初二聚前方便及後四聚近遠方便悉入第七聚收知此差殊還就律釋第二立七意者謂就所防罪性言之體唯不善何以故不就體立一名不善聚答若約三聚總明業相亦得名為一不善聚然制戒本心為欲廣彰罪殊分重輕位別若就體置一輕重通含何由可識以斯義故不得立一若就具往分不過身口身犯惡作口犯惡說應立二聚所以不者此體含輕重相亦難分故不立二是以逐義離廣立於五聚五所不攝還復二位以五配二故有七聚罪相差分麤以可識問據聖本制隨犯即禁分何為而言逐義離廣豈可先有一法分為五也故知不爾答逐義離廣者以身口所造有五義邊即置前五不同向五輕微相者當位立二即成七聚何必要須先有今分方明離廣又復就戒以立篇聚離分之義於理無爽第三得名得名有六初聚當體殘謂境義蘭者見云偷蘭名大遮名障道罪是大障道是所障謂是功能所障作名提及可呵如五篇說六七二聚既名惡作惡說謂並具義作名所言惡作等者作惡故惡由作得惡俱名惡作說惡故惡由說得惡並名惡說上來所辨但是罪之得名若行就所防教從所詮名並一第四偷蘭先後問蘭之一罪或在第三或在第五其義者何答戒與威儀以分七聚偷蘭第三以蘭過遮故能治之行在戒門所攝若以均雜往分須在第五所以爾者體含方便究竟之異雜門所收過復遮重是故須在均下雜上位當第五又更一解作因故三為果故五為辨成他他成故爾第五入不入義二門分別一舉七聚對五犯明入不入第二約戒本十修多羅辨入不入解初門者七聚罪中位以為三上之四聚即為四犯偷蘭一聚一向不入六七二聚有入不入所以偷蘭唯七聚中不入五犯其義復何答曰凡入五犯皆具三義一名均二體均三究竟均夷等四聚並具此義故即為四就蘭中但有名均謂是蘭聚闕餘二均以通因果含重輕故不入五中何者是也然謂蘭聚是其名均若據因果即二謂方便究竟如破僧助伴皮鉢露形肉血等是究竟蘭夷論名獨頭偷蘭初二犯下諸重輕蘭並名方便亦名不成之罪夷名濁重此非究竟均若於前二位名含重輕即以為四一不可懺蘭如二逆是二大眾蘭三小眾蘭四對手蘭言不可懺蘭者文言如提婆達比應滅擯故又母云四事不可治中有於二逆故不可懺若爾何故見云一罪不可悔又十誦問誰破僧謂九清淨人得何罪十伽答云偷蘭遮云何除佛言如偷蘭遮悔耶答今解斯義不同見十如律中二逆名輕故謗得蘭又云如偷蘭遮悔故知彼律以理從教以無夷名故爾此律難謗與夷罪齊以逆與夷俱合擯治故知懺門亦是從理不隨教也故有第一不可懺蘭第二大眾第三小眾蘭者十伽二文中云佛言四蘭謂夷邊重蘭界內一切僧中懺輕者出界四人中懺殘邊重蘭同夷生輕殘邊輕蘭一人中懺多論夷邊重蘭大眾中謝輕蘭出界四人悔悔法如上若依四分四人已上是大眾如不曰大眾者四人若過以此證明知二三人名小眾若言大眾除者如下對眾自言毗尼懺法者是言小眾懺者如下自言毗尼對二三人懺者是第四對手者自言中一人中懺者是如不可懺等既有四階非是體均若爾吉羅亦四如下眾滅擯或破僧近遠二因當須大眾小眾懺者及有責心亦是不均所以吉羅有入五犯者何答本制五犯對大比丘何處有滅擯吉羅大眾小眾復是方便除斯已外究竟吉者得入五中若爾偷蘭亦爾取究竟者以之為篇答吉羅之中但使究竟悉具三均蘭除方便就究竟之中猶含重輕是故不類也但突吉羅中有入不入故聚寬篇狹入含身口故篇寬聚狹第二戒本十文入不入者初明戒序三門分別一定罪重輕入不入二辨罪多少三解生犯之緣問有通局總別先定重輕者問序有何罪而重輕答謂汎論者對廣說戒默妄吉羅告淨提罪十五種說戒義亦同爾若三人下唯提無吉以除自言清淨故一人心念雖口言清淨𨷂於所對故但犯吉今言序中謂實有犯三問而不發露得默妄吉羅次言入不入者則人行法且置不論直就僧中提罪入篇默妄不入以是方便故爾所以知是方便者雖隱不說而言未彰口故是方便方便故不得入篇若爾下大妄語身現相等前人雖解亦言未彰口何以得犯究竟重罪然彼成重此亦同爾答大妄語中雖未彰口表相義具前人覩相謂聖無濫故得犯重此默妄語身相不動又在眾中濫於清淨即合問者不徧於我生清淨之解故但方便問若爾如先作默意後問還默遂本期心應是究竟答雖作默心容有發言是方便若爾本作觸心容有趣重之義觸應方便答但作取適之心故觸究竟若後作重時乃別更生心若爾雖作默意不欲發言假後言誑即是別起應非方便答自有造重不假於觸故觸究竟無有妄語不假虗心故使默妄但是方便方便故不得入篇又以列在小妄語文下方便不成位中故爾序默既爾下八同然而今解者但對序定下之八句其理同故不繁更說唯約夷等辨入不入二次明多少可為四門一就境辨問如犯一罪逕三問時為從僧眾人別結罪為總從三問邪答默本誑問隨問得罪不隨人別結以其問便有默不問無默故爾默吉既然告淨之提亦不隨人別得罪二約罪說問如序中總問有犯者發露若犯十罪默然誑僧為從問得罪為從所默而得多罪答但約問結默不從於罪以其默妄僧問便有不問即無問緣既一何得多默不同覆藏覆罪生罪故隨䨱多罪又默妄誑問生罪非誑罪生罪是故約問䨱本䨱罪不䨱明相故隨䨱多罪告淨之提亦從語結不從其罪第三約問者問既一問三唱為總結一默為結三默答雖逕三唱默但一罪以共成一法故如一切三乞成一法故若爾如日二羯磨皆有違心捨者三蘭何得不隨一一唱問皆有誑心而生三默耶答諫法即有重果可使因中輕重階降而得三罪今此問者直問眾淨穢既無更作第四問而得重果何須隨唱階降多犯邪第四約發露䨱罪以辨多多昔解六罪三處犯默謂婬觸二麤屏露二坐等序及正篇二不定中此三處犯以各舉此等問故除偷蘭遮餘皆二處犯序及正篇偷蘭中唯七滅一蘭序及七滅中二處默妄也餘一切蘭但序中一處犯如向言六罪三處犯默者此義不爾但二處犯以二不定中未有實犯何犯默故彼不定中問者謂須問言於屏露二處四威儀中無應須撿校事不非謂已有夷等定事可問而生此默如是解時其位有兩除蘭一處餘減二處七滅唯吉無蘭已如前破應與現前當與現前即是式叉之義第五篇攝故如尼律比丘吉羅但以自行眾法別故須為兩問如五分眾學為七問也若爾與七種十五種說戒妨答亦不妨以言眾學僧常聞故即攝七滅為是不得作八說六說合成十八一切諸罪除蘭已外餘皆二處犯默若欲發露但一即得若爾序默可犯下八應不犯答默本對問故約總別二問還二犯默若爾發露防默對總別二問還二發露答發露眾已知故一處即足若爾眾已虗解何以二處犯答發露得聞戒又更無誑心故不對問皆須發露如似無罪得聞戒雖逕問緣而不得罪無誑心今發露者義同於彼故一處得又人言發露已尋生隱心隨逕問處更須發露如人法中先發露後覆等既言誑問生默問既有二寧不二犯此戒不爾與人法非類還同初解不須重發露又問言是中者何等中答序謂是諸戒中若餘八問是夷等罪中二不定是屏露二處四威儀中無應須撿不餘准可知若據有犯不合聞戒與他同說或可別結不應之罪第三辨其九問通局總別者序問通七聚以文有犯不得聞戒然今序言有犯發露無犯默然何所不該故知是局次其唯問立教等中問聚不盡故爾又初問是總以不列名總問故下八是別以舉罪名及所撿校事而問一一諸問各不相通謂問夷時都不問殘殘等類然故知初總下別又復序問為憶識不疑下八別問為疑不憶不識此據位言若以義求初問不通疑等以疑無默故下之八問通憶識不疑等故言諸罪之中除蘭一聚餘並二處犯默又序問通總故問即問下以將欲說審眾淨穢故須逆問下之八問並是問前一一列相後方問眾謂向問夷中清淨以不上來戒序入不入竟二不定中未定得罪故不入篇非是闕均七毗尼者吉中少分第五篇攝偈是略教故亦不入自餘皆入第三方便重輕等罪皆有三種方便中遠者有果而不成進趣者以因成果闕緣者無果而可成言遠者如自覆藏罪是非不藉此覆藏生於後犯名曰方便終不攬此以於成彼故名為遠論其正體其唯究竟教人蘭吉類亦同爾廣論五犯悉可為遠如自稱得聖遠資犯盜初五殘不淨行緣提中故取衣同行宿坐資犯初戒下二准說可知舉此五犯與夷為緣餘類相望容有由藉如斯等類名遠方便二進趣方便者心悕前事身口運動造境求成故名進趣心該剋漫業通自他對等但有斯求咸成進趣於中二門分別一定有無二成不成言有無者一解言無以文言不成者蘭不言未成蘭故假使步步增其不善而無步步蘭吉之名又如向佛步步有順理之福今假作過有步步違理亦無蘭吉又復白二羯磨捨者三蘭者此第三息處亦無三罪第二解亦有亦無如違諫等有法隔絕不待心息故言三蘭如殺盜等本無法隔故惡心息得罪即無進趣今解定有文言捨者三蘭故若唯心息結者違初結蘭不至二三若至二三言三蘭者故有進趣是則前二進趣中結第三蘭緣中有若望闕果三皆闕緣其猶去住二人若人去時名為去人若礙而中住即名住人正是去者作此住人豈可住時方便住人去時即非去人但是一人而去住即二故知步步皆有蘭吉又復何但因有進趣即第三羯磨竟得殘之時調達破僧心猶未息拒諫不從然約事成而結殘罪故知因中隨所起業皆有方便不要心息又多論盜戒云欲取五錢發足步步輕蘭乃至三錢輕蘭四錢重蘭得五夷又明了論云夷有十六罪三種方便心不息有又八事成重隨前七事一一事一一得蘭豈可心息以期等義知有進趣次解成不成位言七聚上之四聚不得自成亦不成他蘭等下三作因成他若望自成蘭吉二罪有同不同謂以因蘭以成果蘭非極不罪故蘭用吉成此是不同若因因相望蘭吉即是初二以蘭成提提舍尼以吉成吉還吉成極下罪故第三蘭緣方便五門分別第一列數釋名次第辨相第二對不對剋漫等分別第三對緣辨闕不同第四約戒辨方便多少雜明同異第五略分部別先解初門自為四門分別第一列七名七名者一境強二緣差三境差四想差五疑心六漫詠七善心息此等是七方便第二定其廢立昔解第六漫詠方便如人漫心殺三趣造火坑於一切人邊得方便蘭餘趣吉羅若眾生墮中死者得究竟罪廢其殺具望餘不死者始是漫詠𨷂緣方便若好心壞煞具善心息枚如上所立此義不然若據得方便寬多可使由漫若成𨷂者本不由漫若入而不死境強中收若不墮中及煞具壞緣差中攝有心癈煞具即善心息既由強等方成𨷂緣即強等收何有漫體如三羯磨豈隨事百一之外別有三用故此亦爾假無餘緣但漫心進趣今辨𨷂緣故無別漫既癈該更加一種謂𨷂緣方便是此對通別二緣𨷂通緣中大比丘及第三無重病壞心緣等合為此一謂造境未果或四捨等生癈狂病等皆𨷂通中大比丘等緣故如十律云比丘煞心打人是人未死頃比丘若狂若返戒得蘭此狂及返戒總𨷂通緣又如五分比丘自煞偷蘭又多云二人相判一時死無犯戒罪以受戒時畢一形故故知有𨷂緣方便第三釋名言𨷂緣方便者作過緣缺心境互差或擁思不暢或身逕病捨雖違聖教名種未窮如斯等例字曰𨷂緣𨷂緣不同有其七種等一𨷂緣二境強三緣差四境差五想心六疑心七善心息等是名為𨷂緣也第四次第辨相一𨷂緣者𨷂緣之義如向所論者是若也通論無非𨷂緣唯取𨷂通緣者從初受名名為𨷂緣二境強如欲煞人前境入甚深禪定或反害我以彼緣強差此進趣擁思不或故曰境強如出佛身血及為害兄弟打舍利弗等是三緣差方便欲害前人更有異人突伏恐事發覺或有餘緣來差此心不遂煞事者是通辨緣差具七方便今取別相故此獨名緣差四境差方便如非人人想非人疑等是解此境差可為三門一定境差多少二本期之境方便三定異境有無初門定多少者煞含四境一人境二非人境三畜生四非情杌木此之四境俱有差義旨未解言人趣境差有五句異境上生罪二句究竟重罪非方便攝餘三方便在此中收本境五句並在第四境差攝言五句者一欲煞張王人來替處不強而煞二異境強不可煞三異境疑強四異境疑不強而煞非畜各五木有三除二強故合成十八境差也問如人境差五句中何故但有第三疑善心息不言異境來替處異境張想善心息答若言善心息同第七故若爾異境第二強同七中境強解言強據前境境有本異故境強不同七中本境強論其善心息望我自己心息境雖本異以非境故若言張想善心息者心唯在張即同第七故所以無此解不然如強中對異境事成得究竟強故事不成望異結方便我今對異境若也心不息事成得究竟故今善心息望異豈無罪若望異境強方便得與七中別五中有二強異境善心息望異亦方便不同於第七何為不立不疑善心息對疑為二善心息耶又更依理問五中上二單闕境即是非人人想下三雙闕二即是非人疑何以非人疑離為三方便得有善心息單闕唯分二不得有善心息兩俱闕境何因二三不同邪此難難解不免須立不疑善心息心息既爾餘亦類然應成多句謂以闕緣境強緣差心息各對不疑疑說即成其八斷命不疑疑復有二即五對十句二趣各爾杌應有八謂除二強四境通論總成三十八此三十八皆能差張故曰境差定義既竟次解相別先辨人中五對十句上五者一異境不強而煞二異境闕緣三異境強四異境緣差五異境善心息此非人人想離為五下五者六異境疑善心息七異境疑緣差八異境疑強九異境疑闕緣十異境疑不強而煞此非人疑離為五故成此十異境初十非此方便攝中八方便收本境十句並境差攝第一句欲煞張王來替處緣於王人恒作張想煞王命斷得夷由異境差故煞張心息故曰境差方便問但作張心無害王意何以得重答張王非煞緣人是煞緣當煞王時雖無王心而作人想緣具故夷問殺王得夷為以張方便成為別者方便邪解有二種一解以取張方便成類盜說者不然又解人趣雖同者有別故寧得擥彼成此兩境既別起心亦異故知害王別有方便謂與王境交對已來雖無王心而作人想往煞王命斷時尚得損王究竟重夷豈况王命未斷寧不別有方便以成重罪不類於盜同是一主故用過五方便成五重罪若別主同煞自餘九句類說可知次非人境五對十句數法同上但單闕上五非人境上一向無罪以無心當非人故不同張王人趣是同故下文言男想煞女佛言夷雙闕下五非人境有罪以疑故本境十句還在第四第三畜生十句一同非人第四杌木八句異境無罪非生數故本境方便亦第四收第二定本境方便者此本境上三十八蘭志第四中攝即境想四五二句是第三定異境有無輕重第一犯不分別二十有罪二趣上五杭境中八是說無罪以其二趣無心杌非煞境不同人中雖張王別莫不是人故前五有犯第二犯中究竟方便分別人趣初十此是究竟中八餘十並是方便者三方便中重輕分別人趣八重謂是蘭故餘十是輕謂吉羅故二趣第十此二吉重餘八則輕所以可知問二趣第十吉羅者何以文言非人疑蘭答此望本期之境故蘭即上本境三十八等是此謂疑從二境結罪第四方便相攝人中初十此二非方便收餘之十八以位言之闕緣境強緣差心息位各有四四四十六四方便攝二趣兩疑疑心以收問三趣第十俱疑乃有究竟方便邪答人中望本期故說以為疑煞緣具故是以得夷餘二望本期猶豫故說疑即以闕心故但得是方便是故人言自有疑不或疑即人中第十是第五想差方便者一切轉想者是第六疑心方便起心煞人而生疑心為人為非人而人雖死緣於兩境疑心煞者從二境結罪第七善心息可知第二對不對等分別六門解釋第一望境對不對第二尅漫第三錯誤第四作事不作事第五心息心不息第六並不並此謂諸門未分別此七方便初門者若身對前境諸自作業儻遇緣不成具七方便即前七是若設火坑倚撥身不對境及諸教人不現前等但五方便謂無想疑想疑二者緣此謂彼既不對境何有想疑邪若教人現前者同自作說第二剋漫者於向對不對門若通二心謂兩剋七五不同二漫齊四以無境差想疑故爾然若委細分別略為二門一剋漫相對二就辨漫言相對者若也專剋剋便七五謂意在張境如其大漫二漫俱四謂情無所局是故漫四所以無餘三者以望本期隨境非境及境優劣害心寬該情無主當說之為漫以元心漫故假使臨事互緣彼此莫不隨境有犯非犯等於心所緣雖想雖疑而是進趣非闕緣收故無餘三不對及教無親緣境可得言道緣彼謂此緣此謂彼故兩漫並無餘三剋對張境多少既爾餘咸類然若也廣說則有無量二就剋辨漫者剋之與漫俱七並五但有寬狹然位有兩一者且就一趣以辨謂自造緣本意在人而望餘趣有境差想疑所以并七然於人趣不擇張王情該彼此故還是漫漫即剋故漫亦有七謂剋簡餘趣漫通人境故爾雖可剋漫名殊具七義等但對境差狹於前剋除當趣故想疑即同人趣既爾餘境亦然此應廣說乃至三趣各作本期之并是剋漫俱七不對及教剋漫俱五唯前以說亦應廣論三趣各爾第二情非情辨亦二俱七義如前說想疑等三次復是狹除於犯境以對犯境各究竟故不對及教剋漫並王境差一狹亦同向說第三錯誤分別此等七種皆據未成事罪中間以說縱也對境無心成事是錯無罪況辨方便而得有錯故七方便並不得論錯若論其誤於此七中就體而論境差想疑此三莫不心想迷謬並說為誤境差一種緣彼謂此誤想疑等二緣此謂彼誤餘非可知若有無分別誤中唯約境差通說得有其五即上境差五對十句者是局唯異境問所以誤中無境差想差二者境差位故不得說有論其想差同趣上五闕境故自是迷想心斷命落究竟餘四斷不斷雖是方便復在張等收以不由想故所以無想差異境上五無心害餘趣莫問斷不斷重輕不說犯亦不得說想差故無此二假就五中同趣但四以除疑故上來體是及有無者此等皆謂自身造境邊說若不對及教假有境差以不親緣境故不得說體是及有無所以可知即此二無局在本境餘五有故便是義通本異即是舉七方便約本異兩境通局分別又復當趣單雙二闕俱辨有無餘趣唯就雙闕中辨第四作事不作事者七中位二闕緣想疑此三事成以其闕緣少通緣想疑闕別二故不廢事成望得罪時未必待事成餘四望本境一向事不成而說方便若論得罪境差對異境餘三待不成不對中五一成四不成准前說第五心息不息七中位四想疑二種二心俱息闕緣一種人想煞心二俱不息而得方便強等餘三止煞心人想而不息境差一種若四境各下半疑是雙闕故即是張心人心有息義而見王及非畜等即得張方便四境各上半同是單闕境故並二心俱不息同趣上五見王即方便故說心不息餘境各上半以餘境無罪不分方便故或待事成及強等方心住亦可類如同趣對異即方便不待心息也第六並不並有三第一對闕通緣別緣明並不並若有闕緣即非比丘判無餘六若有餘六便是比丘謂對前事心境等說不闕於通明闕緣二直就本境七種方便各各不並容於二心有餘強等三就於境差約心以辨並不並於中有二一專就異境謂若人趣異境想疑二心各四方便謂此二心與餘四一一有並然是餘四攝而此單雙二闕自不得並若也餘趣疑心有五如上十句中下五者是便成疑心與四一一並第二若通本異說舉境差望二心與八或五一一有並此八五二中自不得並亦可通對異境有無重輕說者此境差與三十八一一並三十八自不並第三對闕緣以辨且對煞戒闕緣闕通緣謂闕初三境差闕於境想疑闕第二二趣兩疑是雙闕餘三闕第五問二疑何別而闕不同答人疑向外緣對本故心差心差闕第二二趣兩疑向內緣對異故雙闕即境想四五二句者緣彼謂此二三兩句緣此謂彼故闕不同問以七闕通別然通一別二闕而不盡而隨戒釋具闕中通別盡闕者何答通中第二是聖制後不論闕闕別不盡者別中闕重罪縱使無罪亦名闕緣故得遍闕此七所明結方便𠎝若闕心及方便方便不起則全無方便罪故但闕三此謂方便闕緣亦一亦異第四約戒通塞者此可位二境差想疑等三婬酒無想疑但具於五受戒無疑疑得究竟故謂心不犯者是其迷想故轉想容犯如斯解時或可具六亦可無境差也餘心境制應具此三餘四方便似通一切隨而准說若以對不剋漫等四約或辨者或具不具如煞盜可知妄語設方便者作盡置地者是初戒則無又如違煞漏失等並無不現設方便者餘可比知問境想方便同異如何答互有寬狹境想具因果故寬方便但因故狹除婬酒已餘戒下四因中境想則狹但三方便故此對本境故爾若本異合說寬狹則同如境想四五句當趣境差四方便趣境差五方便猶有想疑即是具七如前有無中說者是故無寬狹又問文言不成者蘭與七同不答彼名狹體寬含七種故寬狹一等亦可不成者望事不成非望罪者但攝不作事境差等四七則是寬不成文狹第五略分部別祇律性惡但五方便謂從境制闕無想疑文言黃門想疑摩觸女人亦殘故遮應具七如生非生想疑等吉故知也若依五分不問遮性一切俱六謂無疑故以疑是兩緣恒有緣本心故便從境制其正罪是以文言是女疑殘蟲水疑生草木等疑非時疑年未滿疑皆得提罪故想究徹故不問性遮心境相應犯不相應輕或蘭吉故人非人想煞蘭女男想黃門想觸蘭第四持犯即是隨戒法門但今對文說五門分別第一釋持犯之名第二解體狀成就通塞寬狹第三明漸頓第四明先後次第第五增微優劣初門有二一釋名二得名言釋名隨戒雖眾不出持犯廣釋其相如開宗說問所以須明者凡明隨義順受故隨若也無隨便成羸過根本前明枝條後說謂對法對事故故爾問隨有持犯所以並二種答凡夫久在生死漂溺四流於涅槃道不剋會者良以二犯順情恣盈身口二持稱理不慕崇習故爾言二犯者即向廣造諸惡作而成犯名為作犯於善不條止而有違名曰止犯對此二過故立兩持若不作斷一切惡意離苦不究竟為欲離苦究竟收須明止持以發作犯若復不興修一切善心得樂不滿足為欲得樂滿足收須辨作持以蠲止過故俱二種此等對文說可知問持隨可爾犯何以隨答謂取能悔以為隨戒但持有兩一根本持謂專精二持是二犯已能悔第二白法隨謂二犯是如地持說可知問受有能所緣體別解隨有持犯何以合說答受中能所雖可相藉緣體既殊非正翻對故須別明今此持犯義相反對合明義便第二言得名者若言二持謂就數功能得名言二犯者數過受稱亦可從用若取能悔成隨解義二持兩犯俱是義用望體不壞故用俱順要期故義以名專精不犯犯已能悔故爾第二門四一體狀二成就三通塞四寬狹言體狀者二持之體如戒釋二犯之中簡誤取故以其非犯便不須悔然就故中是佛所制謂佛不制不應制中若輕心作者無無作業若盛潔重心者隨中有作無作又此作無作通二持說者若色等三聚心論俱色成論作色無作非色非心又心論色通報方便作是方便無作非方便方便作色通三性二持是善非餘二二犯是不善非餘兩若取或隨義者四法俱善二種無作亦同此判然昔解者總就三業約相以說謂讀誦等業名為作持及行檀等事以辨持犯體者皆汎爾通說如常所辨若約制教辨身口二持犯者離殺婬觸等是身止持如應來者來收攝臥具然燈火具舍羅不安坐受食及受食等類是身作持離口四過如妄罵等可是口作犯者咸悉止收是口止持如受持衣鉢處分說淨離衣六年杖囊二年六法作知淨語傷地壞生二入聚洛及順教修習等是口作持身口合者准說可知身口兩犯反前而說上來所辨亦望二犯得有止作語成持者舉斯兩犯皆是作持意成身口故不須別說意有持犯如下六犯所起中由身心及當審觀其意汝以何心等皆是助成身口論之然獨意無持犯故文但意不犯及六犯中由身口不思等是故成論十不善業道品問一切業意業大所以毗尼不結罪者得罪福異結戒法異故爾昔來所解唯寬狹門雙對進趣及制教以說餘門皆約汎爾進趣而辨今下並就兩教說之第二成就若依心論別解脫戒初念作戒現在成第二念過去成若無作戒初念現在成第二念二世成以色礙故無未來成此應望受以說若隨准說作與無作俱應二世成以隨中作並應通長短故若依德宗約四心三性以辨成就止持有二一無惡汙以解止持行前三心得有持義以行前三心擬本所受無惡來汙豈非是持善無記性俱有持義不善性中通中通持別犯問行前三心既是無記何以成業答行前三心中有本受體光慇無違說以為持非修行持問行前三心是何識三心答望體不壞三識三心一切得成若對修行以明止持作持行心成就前三則無善性便有惡無記無二犯解義行心成就前三亦無不善性有餘二性無此就一心若先後心及以教人餘二性中得有作犯無其止犯亦可俱有問此言行心成者是何行心答非五識行心以其一向不能起業要五意識行心方能起業故論云要以意識能成然亦不定或五意識或第六意識成者也問所以止持前三得有止犯則無答先有受體以此三心擬本所受無惡來違說之為持止犯不先屬己不得以行前三心擬本所受之惡無善來防說為止犯故行心不在前三問本意離惡修善以本離惡故今不作惡說以為持原欲修善今不作善豈不違本要期止應是犯答不作意止故所以非犯若爾不作意持故應非止持然說止持何以非犯答今不作善違本非持不作心止故非犯止持中亦不作意故非修行持是止故非犯若作此釋俱順要期受體不壞於前三心止作並持非唯止持若望俱不作意並不說持既不違修善要期如何得類止持欲使行前三心同有止犯又復前言不善性中通持別犯者別犯是作意犯通持猶是說受不壞為持非作意持上來舉二持對二犯說故言二犯是不善行心中成若悔以成隨持之與犯咸善行心中成第三通塞謂舉止持得有餘三說之為通無則稱塞餘三互對通塞同爾解此通塞可為四門一一心門二一心望兩境門三自業相成門四教人門欲辨斯之四門並約兩教以說第一一心門四行俱塞謂以持望犯善惡相違持犯當分各有止作故使四行並不得通如人起心離煞盜等可得更緣修善等三以心不並慮故所以塞止持既爾餘三亦然既知俱塞次約教辨若進修三學辨者作持止犯等既相反對故亦俱塞若對制教五篇中四行塞者就單持犯說如不煞盜即無作義如攝耳聽二歲六法不請不聽教授不安不禮等畜眾攝受便無止義二犯反持比說可知故約一心四並不通第二一心望兩境先約進趣辨者二時相通兩犯亦爾問止持中有作持不作持有止持不答若望修行以解二持止中有作作中有止如為止煞盜修慈悲少欲名之為作望不起煞等即是其止故得止中有作作持中亦有止義如坐禪聽誦先止懈怠之過方得修善豈非作中有止若止作止二持如何取別解言止中有作舉作成止作中有止舉止成作舉宗往攝止作仍別又問既言一心寧得止中有作作中有止答言一心者剋取成止成作邊故塞若望二境門者取對治為言止中有作者作是對治離止是果行離作中有止者止是對治離作是果行離第二若對制教一業望兩境門二持自相通二犯亦俱爾言二持通者謂一切雙持者是即約處分說淨等法言犯通者望不處分所以稱止身業造房即是其作此則體一而名是別豈非止中有作作中有止言兩通者持本反犯類亦同爾如處分法稱之為作以加此法雖可作房而無作犯反却作犯可非止持類亦體一而名是別不同舊釋唯言名體各別故是以二持自通二犯亦爾第三自業相成門昔解二止有二作二作無二止以作有先不成後成止無斯義故所以爾今釋並通如止持中有餘三行者如前心殺等未成後成却入止心前殺方成即是作犯與止心俱或復塔寺受用橋船等事即是作持或如畜長衣鉢及離衣等亦可要期不學是止犯容有此三與止心俱豈非餘三通於止持止持既爾餘三通有義亦如前但知止持餘三者要期斷惡處中無作與餘心俱者是第二若准制教說者人言二持有二犯二犯無兩持兩持是塞二犯說通通者如殺燒理等是作犯通如畜長衣鉢離衣等名止犯通以此二事各通餘三心所以可知亦可四行俱通餘三犯如前說二持通者如德衣月五利無罪而於兩犯心中得有作止二離衣九月及杖囊等豈非並通第四教人門者昔解二止有二作二作無二止以教人止即我作故故不得有止問教人止者為言即結為止竟方結答義待他止若爾故知從他止說止止即通餘又復前人止者望境說止而是其作故名吉羅既有惡作何為教人不得止通如此解時四行俱通以其止等四行雖別俱有作無作故爾制教亦然上來四門並舉持犯相望故有通塞若取成隨義邊義具通塞謂專精二行如前所辨能悔兩行當篇即通以其兩犯總成持故異篇說塞藥不同故若以能悔成作持行今正舉此作持對止等三行教人辨者此作持中通有餘三第四寬狹者先解二持於中復二一就進趣以辨止狹作寬以其止持離過為宗局在戒學故所以狹言作持者修通定慧訖之為寬若就五篇對事以辨止寬作狹問所以五篇名為對事者答直止法不說為犯要假作房畜長離衣等事故制教辨者稱為對事不同進趣止法即犯又制教中亦通進趣以其非宗故從對事以說言止寬作狹者止持通五以之為寬作局下四故所以狹又就有作中於第二篇專在二房餘十一止又可止通十三作局初房少分有主房全餘篇類然但除不攝耳戒尼中畜眾攝受教授等十八專作不通止持已外俱通故知止寬若尼作持雖可通初篇中二篇及第四復無亦狹可知亦可通於第二如度賊解舉是作持故而亦是狹以其不通餘十五故餘篇類然次解二犯對事辨者作寬止狹作該於五止局下四又第二篇作篇十三止局初房少分謂除過量第二房全餘者類爾准攝耳等十八反前以說作寬止狹可以類知若也尼之止犯雖可通初第二復無等就有中而狹可知亦可通於第二而亦是狹又第四無故若就進趣明二犯者昔解止犯境寬體狹准犯第五不通上四亦是真狹作犯境體俱寬罪該五聚且據一相理而言之反前止犯應言境狹體寬謂唯戒學故今更釋論其作犯境體俱狹而犯名寬以境唯戒學而罪該五聚故止犯解義境體俱寬而犯名狹以境通定慧而名局第五此等釋義所以可知上來所辨四行寬狹若據成隨寬狹者專精二持與受體等故所以寬悔犯之中兩教之止一切成隨制教中作有不成隨如初篇無悔狹於二持此對僧說以犯望持止寬作狹對尼說者止作二犯望於二持作通於五止除第四謂若成隨殘下止作一切成隨初篇止作俱不成隨故使作並狹於持不同比丘止寬作狹第三漸頓者二作解義唯漸非頓論其二止通含漸頓作持漸者隨事別修次第漸成以一行之中不得備修諸行縱有頓心事要漸成故言非頓作犯亦爾悉亦漸成故多論云一眾生上三緣故殺一瞋故殺二癡故殺三貪故殺對斯三惡本本受戒時一眾生上得三不殺戒今若瞋心殺一人者三不殺戒中單犯其一不犯餘兩自餘一切眾生上三不殺戒咸悉不犯以此義推但可一時頓得諸戒不可盡犯明知是漸言二止通頓漸者若無惡汙以解止持但使不作諸惡端拱而住二百五十一切清淨善無記性並有頓別犯通持若對事行成以彰止持亦唯是漸如為止殺業對境修慈更無有心並修餘戒對治之行故亦漸成次解止犯中自為四門第一定止犯名第二定其漸頓第三結罪分齊第四可懺不可懺此之四門並對兩教以說一言定止犯名者一先解進趣其名有二一者不學止犯故受戒中汝可學問又下文遣誦戒羯磨各言不誦因制五夏誦戒羯磨若不如法治二者無知止犯故下文言先誦今者悉忘制言如法治又言不一心兩耳聽法以無知故問本受之時令其學問不學是止受言得果今既未得何不是犯答學據自分故說止犯得果力分未堪類似無知故不名止犯又問二止吉羅此方惡作既言言止犯而名惡作答若當無心不得稱犯但使起心不學不了是則名作望境說止又且無知不問心之善惡但緣不了即結無知即是前不學故於今善心緣不了邊亦結吉羅如斯解時結止犯罪有其二重不學即不學緣而不了復結無知其猶默妄覆藏等類問應約身口以結犯何以言不了心邊以結吉羅答約心不了以約身口止犯此是結罪分齊故爾如似默妄問邊以結犯二者制教言止犯者謂止法作事或對事止法等名為止犯通望僧尼止該五聚第二漸頓二者先解進趣不學止犯義含漸頓無知止犯唯漸非頓謂本受戒時要期立意一切善修還得爾所戒善以防不學今若息心總止不學違本要期寧不隨境頓犯一切不學之罪言漸犯者起心偏學望不學者犯豈非是漸故使不學義含漸頓無知漸者要是對境緣別不了方結無知然一心中不可備緣咸使不了今隨不了以結無知明知漸犯第二制教漸頓者若論起心唯漸非頓如欲造房不得作心畜長離衣等若約事成有並不並義含漸頓第三分齊分齊有二一先進趣進趣復兩一約教位以辨若論其學通於始終故但不學皆得不學如其知者據終非始故五歲已去方結無知是其知位失依止故得作作正行故五歲已前未結無知反說可知二就愚智實行以辨不學一罪愚智並有以皆須學故無知止犯智慧人等應知不知即結無知愚癡比丘盡形依止假緣不了無無知罪此謂學而未知若全不學而知者計其道理亦無知第二制教分齊者約於前事分齊可知第四可懺不可懺者昔解不學可懺以斷相續義無知不可懺者雖作心欲知緣境不了無斷續義故不可懺若後緣了即是解或相除復不須懺此決不爾若解或相除不須懺者以解反或理雖可爾不了心邊已起惡作可不須懺故知不故然今更解無知止犯亦有斷續故得懺悔所以爾者若本不學而復不了事仍相續今趣心學雖緣不了不結無知以未知故假望不了不了縱猶相續但聖不結犯犯不相續故言斷續制教中止有懺不懺可知上來所明漸頓義者此亦就於二犯止作得論漸頓若取成隨當篇之中不簡止作頓成隨義如懺殘中一名多種等類進趣成隨亦同制教當篇中說第四次第何以持先犯後以本受時創入情殷專精在先反參事慢故悔犯在後如說相中一切不得犯婬盜等先明其持若作者等次明其犯問所以持中先止後作犯內先作後止答修行之來若不離過無由作善是故先止離過為宗次明於作修善為義故百論云戒相立行相作先止後作義次第故亦可止持自行理須先明作持外化故次後說戒本文前犍度次後故所以知二犯之中先作後止者一望二持相翻對故二亦可作犯過麤理宜先禁正犯過後應次後說欲使僧尼麤細俱離剋成道益故先作犯後列止犯對文說者類前持解上來但辨持犯止作先後若取成持義者此之止作竟無先後第五持有增微犯有優劣自為二門第一望義宗以辨第二隨文教相約事及罪增微優劣先解初門於中復二一二持增微二二犯優劣言二持者第一約位明第二難易以辨言約位者但持戒之善方便習成始微終著位別階降難以言盡要分有四一是威儀戒二護根戒三定共戒四道共戒初一外凡假名僧戒次二內凡和合僧戒後一聖人真實僧戒據斯行位增微不等標之於僧三品殊別若薩婆多禪戒者要根本四禪戒言無漏戒謂前二果依未來禪作無漏觀此約所依地定共是勝又可以人凡聖謂對五受以說或可就大小即是具不具別又就具位中有賊分齊持戒如貪名利故經云四種不剋十利等是二罪分齊持如目連問經犯夷罪者九百二十一億六十千歲墮泥犁等等信佛語持三福分齊如戒本首末欲得生天上若生人中者名譽及利養死得生天上等四道分齊如戒本云戒淨有智慧便得第一道第二難易相形辨若輕重相對止離重過故所以增作離細罪故所以微若難易分別止防麤過易成故微作離細罪難成故增又對一事辨止持中有增微如本專精晈然無缺又如怨逼能禁自心不受樂等如此止持豈非上品或雖不作懼惡名故事不獲已內無清淨對治護意及病壞心等為聖所開此雖是持說為不如以之為微餘戒類爾咸有上下作持階降准而可知驗如此理持乃千差第二二犯優劣者一約人凡聖如聖人犯輕凡人則重如三果人遇緣起煩惱薄故以之為輕無學聖人無有故犯但有誤犯是以律云凡夫及三果有故犯義無著人者有無記犯凡人犯重以具煩惱有起破戒惡故第二約就戒相增數以辨作止相對作則過麤止便罪細二止咸然而於止中自有麤細若通舉作止對篇聚說各義兼麤細其犯雖眾准教上下始從二門終盡於八言二門者一故誤分別誤全非犯所以不論言非故者不作故違聖教意非謂不高下著衣等犯而是輕以文云以不故作故直犯吉羅無非威儀若故作以復犯非威儀二就故中遮性兩業三遮性中成不成別故文言成者夷不成者蘭四通收遮性為五篇七聚於此篇聚教性分別言教者篇二聚三教相為重篇三聚四位約為輕或威儀故言性分別者母云四不可治說之為重通於上下餘則為輕或餘無餘分別或懺不懺分別其中有二謂各通教性也又如增二二十一等三門者如偈四事不可治等又具云五罪可懺悔第六須羯磨一罪不可悔又了論偈云解小非小隨小戒等是四門者如偈死屍等四喻遮法中四四犯畏及四妄語盜戒境想等又母云以性遮業望報四句一犯重報輕謂媒等數故二犯輕報重謂打佛等希故此三結戒法異輕制重名重制輕名得罪福異因果相當三俱重如觸謗等是四俱輕如下篇等是此下二句結戒法不異得罪法五門者謂五篇及境想五句等是六門者如佛為目連說犯罪輕謂合六七為眾學戒同四天王日月五百歲乃至夷罪同第六天壽十六千歲等墮泥梨等七門謂七聚是八門者善生且對殺人境雖是重心濃淡故優劣有八約為四階初三時俱重作二句謂方便重根本重成已重重謂殺心尤害故第二階二重一輕作三句謂一前二重成已輕次方便輕下二重次根本輕餘二重第三階二輕一重作三句一根本重餘二輕二方便重餘二輕三成已重餘二輕第四三時俱輕輕謂心不殷篤此之八句據律往望舉境約心違教處齊故八階重罪若牽來報即有八品之別若以有心無心亦可為八且約四夷以說初三時俱有心謂方便根本成已四事並犯重等二以二時有心一時無心作三句初前二有心成以已無心亦四俱重次根本無心餘二有心初戒重餘三蘭次方便無心餘二有心四俱犯重第三一時有心作三句第一句初戒重餘三輕第二句四俱犯重第三句初犯重餘三輕第四三時無心俱不犯此謂准小妄語中說可知第二約事及罪以明增微優劣者二門分別一總對教事以辨第二約事及罪不學無知定持犯品別言總對者教相雖眾其唯制聽言制教者要作不作作則仰順無𠎝又有作而成罪者如斯等例故曰制教言聽教者若作不作咸悉無過聖俱順可故曰聽教故地持云有罪者制無罪者聽若指此律文者如受說安恣七羯磨罪處所受持衣鉢及學所學等要也須作如婬盜觸等必不須作此等並制教攝斯謂一切單持犯者是其如結淨處分德衣諸長是其聽門一切雙持犯者是亦有通制聽者如離衣宿是所以女須此兩教者若唯制無聽則次下絕分進道無由故須聽教或但聽無制闕於自䇿於道成餘故復須制今此二門為該三品隨根有益所以故爾此攝一切制聽教門便是大聖開遮之恒範也即攝一切故須約此以辨持犯但止持作犯專對兩教中可學不可學事然制教少分謂除可學也不望於法法止則犯法作則持故今止持作犯堂容對法若作持止犯局對兩教中可學法然制教少分不望於事以事作則犯故亦有作法作事義然宗明作法上止持亦有望法義以止事為宗故問所以止持等不通法者答法唯進修方知故非止門所辦事俱離過故該兩教中事問所以作持止犯不通不可學答法及可學並是進修之境故使者作即是持止則是犯不可學事非進修之法簡而不論言止持約兩教者一局取不可學如人非人想等是上制教中要不作者是二聽門謂唯可學即上聽中若作不作謂房衣尺量等於此二事但使不作悉名止持作犯對治違於兩教作事名犯反前說可知作持對兩教者謂制中可學事如受說安恣受衣鉢等聽中處分結淨德衣諸長離衣等於此二門但使順教作法作事皆名作持若言止犯反說可知是則兩教各通二持及以兩犯制則局單聽雙持犯第二定品別者三門分別第一序昔義第二廣辨其非第三顯是立義一辨昔義者二持作犯此三各九止犯八句亦不對學不學分然對初篇說作犯一九約二篇作持一九止持止犯寄九十初明作此三九一八如常所辨復有說者約可學事不可學事就此總明今約此廣說足顯前義止持作犯對可學不可學事故各有持起即是四箇九句作持止犯唯是可學故作持有九止犯或為八也言止持無輕重約事故可為二九先約可學事為九者上品一句中下各四上品一者謂識此識犯是中品四者謂以二識作頭初有二句事上識罪上疑不識次有二句罪上識事疑不識下品四者多用二不識作頭初有二句事止不識罪上疑不識次有二句事上疑罪上疑不識上品事罪俱識無不學罪次品四不學下品八不學若對無知罪下次兩品各增倍說問既有二十四吉羅止犯云何名持答俱不作根本故是止持約止犯有無多少故有三位九品次對不可學止持九者但緣事有三心謂識疑不識緣罪亦爾故今以緣事三心各歷罪上三心即以為九數之可知此三三中各下二句有不學無知二罪合十二罪心緣雖爾但望不犯根本名為止持次明作犯先對可學九者如初九說次對不可學九者如後九說但以犯根本罪故名為作犯雖得根本罪猶於可學處若疑不識皆結其罪如上唯除不可學事雖疑不識一向不犯可知次辨仰持九者若從對法對事應為二九但明差別階降不異故合為一九此對可學以辨如上上持對可學明九即是唯此中順聖教作前事為異次論止犯或九或八言九者對可學事上品四句多用二不識作頭有四僧殘十六箇吉羅可知中品四句多用二識作頭有四僧殘八箇吉羅可知下品一句謂識事識犯而不乞處分作房者是可知此以多罪是上品故言八者對教行不學明止犯如次前九句除下品前八句是廣說可知此等說者須作五箇九句一位或九或八通有六九一八第二辨非者問對可學法作犯九者與下止犯九句如何取別然下止犯者謂不得處分名為止犯身業作房即是作犯體一名別本無二罪何得止犯九外別立作犯一九豈非虗有相對之名而無實體階降又若不如是者前明可學作犯就何事以辨亦應不出雙犯既言雙犯而分兩九故知不爾又言可學事明作犯者謂取過量境想便是單作犯故爾若作此解縱單作犯階品次第不異殺戒境想上三何須可學別為一九耶問對可學法說止持九者與作持九句何別謂作處分名為作持即帶止持此不相離何得則為二九若就名體各別止持者義容可爾然亦不得即攝同體止持以彼不離作持故亦既不攝明在雙持中辨所以但言作持為九止持之名沒而不彰又云若從對法對事應為二九但明階降不異合為一九者明知以作法故雖作前事而無作犯豈非止持既有止持即是雙持何以但言作持九耶若言反過量境想是單止持故約可學明止持九者此義不然論其階品還同殺等反作犯以明止持即彼中攝有何異相更須別為一九也問對事番行止犯據何為九上品四殘次品四殘下品一殘耶又且不可學作犯准境想上三三三合九以為階次者計此止犯是不處分止犯僧殘將知亦依二房境想上三以為階級若准房者義乖文次復似不然所以知者如境想上三一不處分不處分想謂是識事二不處分疑謂是疑事三不處分處分想是不識事階次如是向所立九上品四句似收次下以疑不識故次品四句似總含三以識事疑不識故下品一句反當初句以識事故何因三品如是翻到一不可也又准文驗九者上品應是四闌次品二殘二闌下品一殘文既僧殘偷闌何以向九九皆犯殘此二不可也縱九並殘似當初句分為此九若如是者對何辨識疑不識等以其疑等應是闌故何以並殘此三不可又言准唯識事以為九者作犯准文九准識事然彼通三此亦應爾此四不可若無文孤起義成虗搆若依境想又乖文旨進退窮審似當穿鑿又問作持上品為一次下各四准何文說豈可不言反止犯故須用無罪罪少以為上次此亦不爾所論止犯既乖文次將知作持漫相反對以為上下作持既非可學止持本不合別有已如前破假入雙持中明理同此壞第三顯正義者持犯階降可為五九或成六九若以犯持對事分別作犯止持對可學不可學事止犯作持唯約可學第一先舉作犯止持對於二事作則成犯止則成持故今還須約此二事合辨作犯止持以其同是隻犯單持故爾問何者是也答如殺戒境想及大妄語摩觸二麤語媒等境想此是不可學事前房過量境想是可學事也先明作犯謂於前可學不可學等諸戒之中各取境想上三並歷緣罪三心合成一九止持反作犯還對二事合為一九次明止犯作持對可學者然有其三一就聽教兩犯二持如處分說淨離衣六年等是二約制教隻犯單持如二歲六法受持衣鉢等三就進趣修習如學所學習戒誦羯磨等此三位中義束為兩前二合明以其同有根本犯故又復齊是止犯作持為宗是以此兩合明品數言兩犯雙持者以義而論應分四九良以二犯名雖有別體是故合為一九持亦同爾故使犯持各為一九或可別體止持謂上法止事者是容可更為一九第三進趣修習止犯作持總為一九是故得有五九或復六九也又言九者且依上三亦可以理言之准境想五句即為十二十五言十二者謂以第四非人人想應言一異境本境想識罪二異境本境想疑罪三異境本境想不識罪言十五者謂舉非人疑歷罪上三心者是數之可知定數既爾次隨分別初先對作犯止持須約二事言作犯者約殺等及過量境想上三緣事之心文言人人想過量過量想等者謂是識事二人疑過量疑者是其疑事三人非人想過量不過量想是不識事緣罪之心亦有其三一是識罪故人法中言殘作殘意覆者是二疑罪謂疑為餘六不須治覆者是三不識罪如似犯殘謂為餘六等是以事三心各歷緣罪三心即成九句先以罪三對識事為三一識事識罪二識事疑罪三識事不識罪次疑事為三次不識事為三准數可知此識事三句心境相對得究竟重判為上品次二品緣事並是方便故判次下據轉想故若根本不識便無下品作犯問次下俱闌如何階降答以緣人之心有長短故得有輕重此三三句中若不可學事各下二句句別有不學無知二罪合十二吉羅若對可學緣事疑不識等兩箇三句更加十二吉羅又事上三識識則罪重以不聽識事了心作事故罪上三識識便無罪非不學等所以無罪事上三疑三不識謂是方便以其識時有重果可趣故罪上三疑三不識是究竟以其識時無果故若可學事三疑三不識十二愚癡亦同究竟次解止持九句者如犯中九說並以不犯根本故名為止持隨其重輕皆句別相及緣罪有犯同前以說合十二吉羅以罪是可學故緣事之心雖疑不識以事是不可學故聖不制罪若過量事疑不識者亦同犯吉次就聽制兩教二犯兩持及單犯隻持合為二九者先解止犯即以房戒境想上三不處分不處分想等緣事之心各歷罪三以為九句數法如前皆不得處分而作前事隨緣事三心上品三殘次下各有三蘭名異體一止作二犯合成九箇根本之罪於事罪二心各疑不識並結止犯故須倍加前二合有二十四箇止犯吉羅謂上品緣罪四吉羅次下二品緣事罪上各十吉羅次解二持謂取境想所不出處分處分想不犯者以之為持如下衣法分受成不成中具有六句十誦境想多有第六不犯一句今此境想直階其犯遂闕此文據理合有故以此句即是其持又反犯即持明是處分處分想故二房下文不犯者僧處分作還以心緣事罪三三合九作法如向二犯中說但以得法作事是其二持故闕無根本之罪合為一九不學中犯同二十四又緣事等心謂對作法儀軌文等辨不同犯中緣事三心對成不成說遂合根本犯有差降也別體止持亦九如前但止法止事為異問不可學止持准犯相翻所以作持對於止犯不望於犯句句相翻乃取處分處分想一句離分為九以翻止犯邪答前明止持但不作根本即是其持故准翻犯重輕以為上下若以作持反止犯須以作法成持為是要舉處分處分想以之為九方除止犯若直依前者如言識法識事識犯等為是其止為是其作故不類前又復識疑不識對犯上辨異亦不類前已如上說次進修以辨犯持犯有其八謂同舊說反下品作持以為上品止犯初有兩句事上不識罪上疑不識次有二句事上疑罪上疑不識次品有四初二句者事上識罪上疑不識次二句者罪上識事上疑不識上品四中十六吉羅次品八罪此等無別根本須用罪之多少以為上次此義應爾又此愚癡總收前五九中前二不可學事上緣罪心及可學事并後三事罪心以為此八思而可知次明作持准有其一謂識法識事識犯反前不學犯等問前二持反犯九九相對何以進趣以一反八答前之二犯根本差降故須當品相對今此止犯一品吉羅識事作持反無不盡故一反八如下文中多以一如反多非等此亦如是問所以持犯各有止作相對而論並皆先犯後持者何答如論持行不能自別要舉所防以分能治如下文中但明犯法謂諸境想人作人想不處分不處分想等階犯重輕識犯相已息過不為或准教奉修方可成持持之體相隱在犯文之下即是舉其犯法生不犯行故今解者還准聖教先約犯說階降之九反犯成持故各犯後以明持九總解已竟次隨八文一一別釋先解初篇第一總辨二依文說總解十門分別一業不孤起要由惑發惑雖無量不出三毒故以初四配於三毒成犯之相發雖由惑暢必在具具而論之所謂身口是以第二解身口成犯身口之業不過自作教人故次第三自作教人業不自成要由詑境是以第四犯境寬狹犯境雖眾莫過自他為是第五境有自他境緣雖具無心不成心有剋漫所期不同對境差舛犯不犯異故次第六辨其剋漫不同雖心有所標剋漫之舛及至造趣境有差互心有謬妄有犯不犯故次第七錯誤同異八下眾任運九立意次第十對治犯言起由三毒者不淨行戒唯以己為患故以三起貪成盜故二戒患通損益故以三事起還以三事成妄語一戒亦以利己為患與諸不同貪癡起成婬三事起者善生云若自樂行非梵行是名從貪若婬怨家眷屬名從瞋於所生母行非梵行名從癡而境悅暢思故並貪心成盜三事起成者貪心起成可知善生曰盜怨及燒埋等瞋起瞋成若盜下姓是名從癡又祇摩摩帝互用佛僧等物亦癡起成殺三起成說可知妄語規利瞋非順情故無瞋心發思成業若小妄語理即通三故論家汎說妄語通含輕重三起三成二身口者位三婬戒身犯非口事決形交非身不辦故爾盜殺二戒身業正成以盜舉離處殺斷相續故身業犯自作遣使彼此俱辦故口有犯如呪物過開教人盜殺等是妄語口業正犯顯己得聖悕招名利非言不宣故口正犯然作書現相亦在犯限故身亦有成此據成論身口互造又依多論此四位二前三身犯第四唯口三身犯中婬戒身犯非口可知盜殺二戒身業定犯口有造義如教人呪物等亦成二罪然是身業以教人言了未犯要藉他身故心論自在者口語仙人意所嫌謂是口意業自性者不然業性異故事不究竟故妄語口業自稱己聖非言不宣故爾然身有互造如作書現相等但屬口犯故心論云口業或身動或默然如布薩事若言身意業性者不然業性異故三自作教人位三婬戒自重教輕教人為非樂在前人適非我已故能教之人不重出家之人正應勸人修善反更助惡故能教蘭盜殺二戒患通損益自作教人損境無殊暢思亦齊故自作教人彼我俱犯妄語自作正犯教人同不同若遣人稱己得聖名利擁已與自作無殊故得同犯所教人犯輕若直教人自稱招利擁彼於我無潤故但犯蘭此局初篇說若因此汎論自重教輕初戒是自輕教重尼教僧漏失是自他俱重盜殺損境及一切同犯者是自他俱輕足勸足是若犯不犯說亦為四句可知若約能所以說作兩箇四句亦可知問自他能所此義何異答自他者不論所教七眾之業但取能教之業對自作辨若言能所以能教業與所教五眾有罪者對說挍量四犯境寬狹位二婬戒該三趣境是故名寬餘三局在人境故狹良以婬欲之性順情內逸垢心厚重不擇境之美惡誰問人畜但使正道暢思無殊故三趣犯以道相制故又復不就損境而制何容計境優劣階差以其死屍犯者有何可損下之三戒事發於外損在前境趣別報殊增微優劣暢思階降故人犯夷餘趣則輕言盜重者良以人趣善因報勝戀護情強心慇惱重故盜犯夷非畜報卑不知守戀心微惱淺故犯蘭吉問地居諸天報勝於人所以盜天但得蘭罪答天雖報勝趣別路遙文義稀又復於物戀著情微損惱不重又復天物人應無用以斯諸義故所以輕故十云盜三天下重北方人物不犯重以彼國人於物無我所心故人異此故制犯夷罪殺戒人重餘輕者人是道器今若殺者損害道器故所以重餘趣報卑形非道器損害輕微故得輕罪天雖報勝以無木叉即非道器又殺義稀故亦蘭罪問趣別義稀殺天輕者何以共天女行非與人趣俱重答天趣雖別愛染無殊不簡境之美惡容有下就為之義數踰於盜殺故與同妄語人重餘趣輕者凡論妄語虗稱己德顯名招利欺罔同類義數稱心非天異類容不稱心為亦義稀故但輕罪又復道之修成正在人趣若說實語容有階漸剋成己用今被誑或敗亂其意失利處深故成夷罪非畜實語微益而已今雖欺罔損而非重故但蘭吉天雖報勝而非道器報德他心復兼異趣稀而無信故亦輕罪問天得他心誑無信義得罪輕者佛得何等答誑佛夷罪若爾天亦應重答天無信義異趣義稀故得輕罪佛雖無信同趣義數當時聞知故得夷重不同殺佛以命未斷故又釋佛無信義誑但得輕若爾佛無怖義理應犯輕何以怖佛同得提罪答佛無怖義輕同於誑但藉怖佛為制戒之緣又可怖佛同凡齊結提罪所以然者為佛經時反生瞋即成事惱乘惱怖數故得提罪誑怖名利容預心起又誑佛義稀故得輕罪問佛若無悕悕亦提者聖僧不可破破亦成逆答聖不可破故破凡使不得聖以得逆罪佛雖無悕當時聞知故亦同提若爾聖尼境不可壞壞應非難答境雖不壞陵慢業成汙辱不淺論其破僧謂取歸從聖無歸從故不相類問盜誑畜生並得吉罪所以故殺畜便有蘭提答上二多智財與命等畜生少知戀報情重故得蘭提保財意輕故盜誑但吉准此義時人境四事罪階俱夷非天四事即有夷蘭畜生階四謂夷蘭提吉第五自他位二不淨行戒自他境犯如弱脊等是下之三戒要在他境盜以損主所故以重自盜無別可損故聖不制問何以盜得己衣蘭答他衣己衣共在一處意取他衣錯得己衣望他衣上境差得䦨闌由己衣作境差而得故言己衣闌而己衣無罪以自施自慳等妨可知殺他犯戒故成犯境自殺無戒故非犯境誑欲規利何須自誑第六剋漫分別若望初戒剋漫俱犯下之三戒如其大漫隨三趣境重輕結犯若也專剋此之三戒各稱境犯夷或若境差三戒境差闌若論異境者其同趣為異境誤犯錯不犯非畜為異境單闕並無犯雙闕但犯輕若非情無主物為異境單雙俱不犯一境既爾廣說則無量若其就剋辨漫謂意在人趣不簡張王者是若望同趣剋漫俱犯夷若非畜為異境上本單闕境剋漫俱無犯下半雙闕故剋漫並犯輕若非情無主物為異境剋漫俱無犯一趣既爾餘非畜亦然第七錯誤凡言錯誤皆是舛謬不當之謂若逐事曲尋相在難分若隨名剋定位容有別錯就境差誤據心謬凡現緣二境相別歷然及至造趣事成有舛二境交涉名之為借若緣此謂彼心想謬妄稱之為誤錯誤既分須配四戒位分為四第一以二對婬戒錯誤俱犯良以患起內情但得正道暢適不殊不隨餘想是故誤犯文言道疑道非道想亦夷又不簡三趣縱有交涉但當正道錯亦成重第二以誤對三戒三戒俱重以其誤無兩並不得云無心故誤俱犯文言男想盜殺誑女佛言夷故第三以錯對三戒三戒俱不犯以望餘境本無心故如墮胎類故所以知第四以錯誤對妄語所稱法錯誤俱不犯如欲稱聖而錯言凡錯稱非境如增上慢人迷凡謂聖誤心非巧故並不犯第八下眾任運如沙彌時教人殺盜及稱己聖教已受具所教之人遂本言教獲財斷命欺前令解能教沙彌三性之中任運犯三波羅夷罪若語自作不善性有善無記無前後自業亦通三性若受戒未竟所教事成即是邊罪不發戒品若受欲竟所教事成罪戒俱得以其善因圓滿惡業成就故是以十律云未受具時取未受具人離處吉次句未受具人取受時離處吉次句受具人離處夷受具時作方便取有二句一言一夷受具已盜一夷受具人取非具人離處闌以此文故知有任運婬無可知第九立意次第問戒相雖眾所以制四者何答為斷三毒故阿難語孔對言世尊為欲調伏貪欲瞋癡令盡故為諸比丘說增戒學等所以爾者凡聖制之興為防患本患本雖眾無過三毒如人欲止長江先塞泉源此亦如是貪心起於前兩謂殊內外故爾瞋癡發於後二瞋境雖二得罪不等誑要有心故各立一以斯義故但制四戒問戒能防非不斷性結何以而言對之制戒答據理對治戒能防非定除細亂慧斷結或但慧不孤興必也因定定生有本功由淨戒此推功歸本故言制戒為斷三毒尼後四戒深防故制即前四枝條不勞別對乃至下篇用於此釋言次第者憙為易犯建在初明故祇初戒五年冬分第五半月十二日即是十月二十七日制餘三六年並是冬分盜第二半月十日謂九月十日殺第三半月九日謂九月二十四日妄語第四半月十三日謂十月十三日以此文驗足彰次第又是障道次第不同五十二戒可知第十持犯對治比丘四戒止持作犯言對治者有兩一總對治謂五支根本業清淨等是支者條也支者因義又可別義於中前四是行後一是願行中初三就所除辨行初二是業次一煩惱第四念者能治辨行謂念修持戒功德及三寶功德以正念故無惡覺觀無惡覺觀故不造二業二別對治謂離染清淨對初少欲之行對盜慈悲之行治殺實語之行除妄等是
