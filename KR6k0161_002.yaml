body:
  text: 沙門法礪撰凡欲開發經題須為三要言三要者第一舉宗攝教第二知教指歸第三正釋律初題目言舉宗攝教者聖教雖衆略要三種所言三者第一修多羅藏第二毗尼藏第三阿毗曇藏言修多羅藏者所謂經言毗尼者謂諸戒律言阿毗曇者即是諸論今茲律典三藏中乃是第二毗尼藏攝第二辨教宗者此律所明義通論兼詮定慧故下文言云何增戒學所謂學增心學增慧學是名增戒學良以止作俱戒故以宗求其唯戒學分別戒學兩番料簡第一受戒法門第二隨戒行相言受戒者創發要期斷惡修善建志成就納法在心目之為受言隨戒者受興於前持心後起義順受體說之為隨就受隨二門各開為兩謂受門二者為彰戒法有為不能孤起藉因託緣然後方發故明能發之緣既有其緣必所得故次第二所發戒體言受緣者實以位陛聖凡報殊男女託緣不同案此律辨五種受戒一曰善來二稱上法三名三歸四曰八敬五者羯磨斯之五名備如常釋第二言受體者據要而論不出二種一者作戒二無作戒言作戒者方便身口造趣營為稱之為作二無作者一發續現四心三性始末恆有不藉緣辨號曰無作斯之二種懸防同稱為戒若也作戒以色為體言無作者非心第二次辨隨戒二門者第一專精不犯第二犯已能悔言專精者上行之流一往順教惡離善行稱曰專精但持有二種一明止持二明作持言止持者念智捨等護防身口不造諸惡稱之為止止而無違順受光潔故曰止持言作持者奉順聖教作法作事對事作法稱之為作作而順受故號作持第二犯能悔者不謹之人放縱身口違禁興過不修善行汙本所受名之為犯慚愧追謝還令復本亦名為持雖非一往善成然亦毀而還復第二白法故名犯已能悔持然犯有二一者作犯現違聖教廣造諸過稱為作犯二者止犯不依教奉修止而有違故名止犯對斯二犯悔而還復並稱為持上來已辨教之宗旨其唯受隨第三釋經初題言四分律藏者是其總名初分已下別已標舉就總名中四分者為異於餘部異部餘故乃是佛涅槃後五部一部之別名言律藏者為簡於餘藏簡餘藏故便是毗尼之都號然大聖如來從波羅奈終訖泥洹隨根制戒輕重差殊緩急有異佛涅槃後優波離等撰佛遺言載傳竹帛次第任持乃至毱多一百餘年並以秉宗無二所化衆生不相是非但為一部大毗尼藏備傳於世然優波毱多有五弟子各執一見以為揩准至傳聖教不能均融齊一於是離分遂為五典各自相傳並流季世究其宗旨無非佛說如破金杖為金用總別之教咸可受持本一今別義興於此據斯以論明四分名者於五部內一部之別名若就能秉應言曇無德律此名法護今約所誦彰名故言四分大僧戒本以為初分尼律已下第二分安居已下第三分房舍已下第四分言律者行用差分略論四種一能外防身口稱之為戒內善調伏名之為律據果知因字曰波羅提木叉此言解脫故遺教經戒是正順解脫之本業結無處逍然無為目曰毗尼此方稱滅但行不自宣藉教以顯斯之律典備有四名不可並班且標其律一部之教蘊積衆旨故稱為藏此釋總名言初分等者四章建首號之為初共成一部所以稱分卷舒之義是故名卷衆軸之始故曰第一解前三門中第二宗歸昔解開宗五門分別今以漸頓乃隨中別義故不別立義門且就前四束為受隨方可就總開別故今解者戒宗有二一曰受戒二曰隨戒故地持云一者受戒二者隨戒此二當知攝受無量淨戒但受謂要期創發納法在心隨據持心次起義順於初又受以創發故對法要期以成隨次起故對緣防護以立故曰受隨二門若無其受則行無所起以有受故衆行得生若無隨行便有戒羸等失以有隨故令受光潔是故須此受隨二法若釋受隨可為二門第一約詮二就行辨言約詮者受戒法聚尼聚少法旨歸彰受二部戒本及餘揵度意辨其隨言就行者兩門料簡第一總解緣體第二別解緣體言總解者若受隨相對始從歸禮訖至在前而去是其受門終盡一形所有二持是其隨門若據辨體第三羯磨一剎那前判之為受在前而去已故竟於一形局以屬隨說相等事義通受隨然就受中作及無作是其受體餘僧界等是其緣也初五受說可以准知次論其隨隨位有兩一是專精二犯已能悔專精復二義分衆別言衆法者所謂護體是其因緣衆法僧界等能生作行是增上緣若就別行亦以護體為因緣餘三藏教法善知識等所對違順是其增上緣也所成二持作無作正是隨體第二若據犯已能悔亦有衆別能生作行謂永斷相續還受持清淨對治護者是其因緣僧別懺境及衆法等是增上緣還成二戒是隨戒體第二別釋先解受門有二第一受緣第二受體言受緣者八門解義第一釋名通局同異第二受緣總別第三能秉教人師徒位別第四教所備者聖凡不等第五藉緣多少第六辨此諸緣發戒時節第七受捨漸頓第八校量勝劣八中初門曲復分四第一列數釋名第二得名第三通局第四諸部同異初門復三一者先定受緣廢立第二緣義既定次釋其名三受緣開合言廢立者先列五名方定廢立謂善來上法三歸八敬羯磨等是立義有三謂或四五六一人立義但有四受無其上法所以然者一以義求謂從他得故心論云別解脫調伏當知從他教若上法者云何而言從他教得二以文證以無上法人無上法教以斯二義故但四受若爾何故成阿羅漢即名受具足答此謂補替減年之處羯磨開緣本非上法故律云年不滿者受已生疑聽數胎閏若修道成羅漢即名受具故知開緣如似曾嫁志性成立開合受戒論義沙彌敕聽亦爾據斯推驗故但四受若爾十誦沓婆十六成羅漢何不開受而要年滿答此就開緣彼據常行故不相類其猶胎閏豈容逆數又如數夏之類又問若十律常行要年滿者曾嫁十二論義沙彌亦應待滿何以聽受答女以仗人違志故與共者同故可亦爾胎閏就年數以開無別受緣今此曾嫁乃別立一受故使不義論類釋妨准此可知問若羅漢是開緣非上法者所以減年戒未開通文無答胎閏等三滿則成開減則制戒若以羅漢法開無有不滿闕於戒本故不列來若爾羅漢亦有得不得開文應有答此不定有有即定滿胎等定有而不定滿是故不類胎等俱列然若有者理是其滿故並開得戒又問若羯磨開者何故母經是名第一不名羯磨答此謂羯磨開緣不名如法羯磨故言不名羯磨問羅漢滿故開文無者如增上慢癡誑等開何以文有答又解或可略無又復引證沓婆羯磨邪輸善來又經多說羅漢沙彌及採華等明無上法又問若得四果不得戒者五分法身不具邪答以無漏戒為戒身故具有五分法身第二解者立有上法故母經云比丘與尼各有五受謂建立善根上受具足故彼文言有沙彌受戒後生疑佛開胎閏十四日並言不滿佛言得羅漢不答得佛言是建立善根上受具足多論自誓中唯迦葉自誓即上法一人也又此律文若修道成羅漢即名出家受具足以如此等文明有上法若爾五分邪輸重命善來十誦沓婆更加羯磨其義何也一解五分俗人道成羅漢亦得具戒有二義故須唱善來一為除俗相二釋疑入來衆善來言下更不發戒十誦沓婆義亦應同問所以知須除疑者母經說六群比丘存靜房中評論迦葉一不如憍陳如善來受戒又復不如毗舍離跋耆子三歸受戒又復不如婆盧波斯那羯磨受戒云何而與諸比丘等布薩羯磨迦葉答言我在多子塔邊世尊與我建立善根上受具足為如此義知有釋疑除相故爾既先得戒明有上法作此解者非無有妨如駝驃子十六成道豈可四年不犯群品又復諸經羅漢沙彌如付法藏毱多為二虎呪沙彌八歲成羅漢採瞻蔔華又育王經雞頭末寺羅漢沙彌降伏外道又賢愚經專頭沙彌本作餓狗身子與食出家成道為報師恩不受具足准如斯義似不得戒故今更釋四分摩夷先有方便發戒心盡智現前即發具足五分十誦先無方便受戒之心但得其果而不得戒須加羯磨命唱善來及羅漢沙彌等文並是無心求戒故爾是故上法三緣中要假內生善心據如是義不如妨四分自有上法故成五受也又可部別所以得知若也人別可使為妨然此律陳如得初果已命唱善來十誦之中見諦得戒又此邪輸善來度已後獲第四及至五分中俗人成羅漢方命善來此等人一二律既殊何者定是以斯推之故知宗別未勞在妨四分所明意在存五戒或言六者取下八比丘中自稱比丘自誓受戒不然之義至文釋也第二釋名言善來者此人宿植妙因道根深厚聞佛說法契證初果深厭生死悕求出家佛言善來比丘即發戒品故曰善來亦可此等諸人深厭生死悕求出家佛命善來即發具足故曰善來言上法者性空之理超出相有物莫能加故稱上法無欲迦葉修道進得或盡解滿會增上法而發具戒故曰上法亦可盡無生智超出學表會而得戒故曰上法故母經中建立善根上受具足言三歸者此等諸人未感如來玄悟見者但託小聖諸羅漢等以為良緣亦深厭三有悕求出家母云諸羅漢等教令剃髮染衣表憑仗三寶歸依心成即發具足故曰三歸或曰三語言八敬者佛抑女人不聽在道波闍聞之特生厭離遂自剃髮倚立祇洹阿難見已為其三請如來遙宣敬法阿難傳授愛道愛道聞之遵斯八法作奉行之意即發具足故曰八敬此八敬名出在僧祇五分名八不可越法誦具二文稱為八重母名師法了論說瞿婁達磨瞿婁曰尊達磨是法謂八尊法此律所明八不可過法今言八敬者且依他律言羯磨者斯等人輩要假強緣映彼弱因方能發戒緣彼僧衆羯磨言下而發戒品隱其能秉就所秉彰名故曰羯磨受戒第三受緣開合者就羯磨受中隨事別彰或開為四比丘與尼衆各為兩受比丘二者一謂十衆然以中國僧徒繁多求之易得要假十僧內生善心即發具戒故曰十衆受戒二謂五衆邊地僧少求之難得致使億耳受戒三年始獲如來曲開五人聽受故曰五衆受戒十律問曰頗邊地有十人但取五人成受以不答得名受具僧得可呵罪伽論亦爾准此似是約處定開故爾計理亦合更問白木調內假儻僧少不開成受約處定制故然文無者略尼衆二受者一者二十衆受具為彰女人或重垢深善心難生要假僧尼二十清衆方發具足故曰二十衆受戒二者遣信受具此女人之中面貌殊常若出塔寺詣僧受具恐要人陵逼壞其梵行聖開尼中作本法竟差一比丘往大僧中代彼乞戒大僧作法加被一如常則使騰僧命詣寺傳授於使言下即發具足故曰遣信對此釋名因辨遣使得戒時節問遣信受者何時得戒答使報方得故下文言已與汝受戒竟又准媒業使報結罪故爾又若不待報得戒得罪者使義不具若爾何故教人殺盜事成得罪答受及媒業須知年夏和合二處故報方成不同盜殺若爾戒非羯磨緣生既假緣生何容使報方始得戒故有異釋三羯磨竟即發戒品不待使報如教殺等事成得罪若爾何不類媒耶答如媒報所媒受戒殺盜等乃報能教何得以所類能如此解時無問媒殺俱不報能能即得罪故知受門義亦同彼非謂報竟方始得戒雖有此釋義未為盡以此律文不了說故如餘三律並應似是使言下得故五分中遣使受戒淫女半迦尸尼欲往蘭若住處受具賊欲逆路伺取彼女聞不敢去佛聽遙為受具尼衆中作本法竟置受戒人著一處將十尼僧往蘭若處禮僧足已尼羯磨師為從僧乞乃至白四已和上闍梨將十尼僧還至本處呼受戒人令禮僧足在羯磨師前互恐合掌羯磨師為說僧所作白四令聽已然故如上具說二八兩四謂八墮法四喻法八不可越四依乃至餘所未知者和上當為汝說祇十大同不繁並録准如是文明因使得此律文略直言汝已受具足竟應具六法一差使乃伴二使尼為乞三戒師作白四對衆撿問然文不具者略五正與羯磨六使還報知問隨中諸業乃有遣使指印相盡何為受門無盡等三耶答受有作法故三不成隨無別法四種皆得故異緣無作唯隨非受又可受隨難易不同問受隨遣使似如義等何因受中對難方開隨中諸業無問難之有無遣使俱成答受據根本總發假緣有難始開隨中善惡就事別起易故恆得問受捨相對得使捨不答若難易相望理亦應得今取面化故無使捨又復捨戒不假餘緣故無違使問即此等人可得開聽遣使懺不答已起之惡難除未生之善易就故不相類所以知者十人二十足為良驗又可受本不得清僧就己故開使受懺容得請故不開使懺上來所辨羯磨離四問僧邊開五尼無邊十邪答文對僧開所以尼無若爾百一羯磨亦有不對尼起尼亦應無然亦二衆俱秉邊尼十衆理亦同開又二十衆者即以僧十故言尼有二十衆受戒今亦以大僧邊五故尼有邊十故今立義邊尼十衆得受問十二得戒何以不明雖有多釋義未為可以其文無定數故爾若取下文理亦應有便成女婦二受之別即是羯磨離六合則唯五開便有十今廢別就通且從五釋又伽論十受之中亦云二部僧及有十人五衆遣信等故知離成有四并餘二受故使離六然此六受莫不五人十人二僧攝也第二得名得名有四善來體境善謂行者求戒之心來是聖教故或可讚歎受名有心受戒佛言善來故爾上法從境羅漢所緣之理名為法與上法相應得果得戒故名從境又可當體受名建立善根上受具足故謂盡無生智歸敬二受約數就心羯磨從教亦可功能謂名辦事故第三通局通局有四一者約時謂佛現在未來二時時必假處謂三天下處三處中有人謂報殊男女四人有位別其唯凡聖應作如此料簡但今解者凡聖位別第四門辨時處二法第八門明今且就人對報以辨通局若依多論對七受以說此約五受但知七中有見諦無上法律有上法無見諦然唯多論局多通少羯磨一通餘四是局局四之中八敬專尼餘三比丘若依此律母經等說通多局少謂來上羯磨此三說通歸敬二局故八比丘尼中有善來破結使羯磨等故問多論三局僧中何故善來不度女人者答為止誹謗故若佛自度女人外道當言瞿曇本在王宮之中今雖出家還度女人以自娛樂為息此謗故若爾何故此律母等善來度女答此謂宮外女人若爾宮外女人應無譏染譏染義齊何以經論有度不度故今更解不是專為止謗但今解多論局者偏就愛道等為言今此律等通者對餘女說所以爾者女性多慢又是姨母並是宮內須以敬法往要即為受法既八敬得戒何用善來多論據如此義故說不通又此律母經五百釋女咸八敬受十誦五分敬局愛道亦同此局餘非尊重又復宮外譏慢義微敬為隨行餘受度之如四分母經明了賢愚摩登耆等對餘女人故言善來通被女是故有人舉此五受受隨分別義正當此問所以得知此經等通者答此律八尼母論五受並有善來賢愚經叔𨤲尼者此云自淨生便白㲲褁身故言白淨善來受戒明了論中尼有三受謂善來羯磨八尊法受五百摩登耆女亦並善來據斯等文故判為通多論自誓唯大迦葉即是上法為局一多少為言又可遠表女人依仗大僧故無上法母經據理故通尼衆所以爾者一以女人有得果之義又准下文但言修道成羅漢不別男女其猶胎閏不分兩報二衆通被故此亦爾又八尼中有破結使尼故知上法通於二衆歸敬二局諸文大同問所以女人無三歸受答以不及故略有二義一准時以驗佛成道八年之後已止三歸興羯磨受至十四年女人方始有心出家明知不及三歸之教故多論說十四年前八敬度女十四年後羯磨度之二以能清人證五百結集毗尼序中十力迦葉為阿難和上明知阿難羯磨受戒女人出家阿難啓請將知所為女衆不及三歸故無此受問曰不及三歸者可爾若及三歸頗亦度否答及亦不度為以八敬往要故爾所以知者當時有善來不以秉度故知假及三歸明亦不度羯磨亦爾所以爾者一為敬要二須和上今且舉彼不及以彰不度上來所辨對具戒說若五十八等三歸恆通女衆次解八敬局尼者以僧無敬尼得戒義故若爾何故不敬僧以受者答女性多慢情奢於道三請方許須以敬要丈夫不爾故闕斯受計理推核三歸八敬始終俱局善來上法初局以通故使兩論解義不定若以此二羯磨亦然對須以敬要等義亦應同善來始局終通以愛道等專八敬故如斯釋者便五俱局若爾所以多論判羯磨通答以對餘二受善來唯佛秉故上法執人局法故一向判局今羯磨者仗大僧故不同善來非執人局法復異上法故且一相四局一通理非全通上來所辨約五受通局若就十受多論俱局離羯磨故是則二衆數齊有五若此律母等善來上法此二說通自餘八局局中三僧五專尼衆今且隱別就通故言五受通局第四諸部同異同異為兩一就諸律二約諸論律為其三先對十誦受數為十故彼文言佛在王舍竹園中告諸比丘十種受具足自然見諦自誓論義邊五受重法遣信善來三歸羯磨等是昔解此十種中六同四分不須別論為四不同事須廣彰此義為餘前言六同但同四受謂除上法又善來是同而有初果不須善來謂見諦是八敬能秉全同此律餘二則異謂所秉法八數雖齊彼無罵謗離第六為二謂半月半月求說三藏人令成八也所被行者亦狹於此故十云憂波問波闍受八重法即是出家戒成比丘尼餘尼云何佛言應現前白四向判六同此位言耳就四不同中二門分別一列數釋名二得名隱顯言列數者謂自誓見諦論義等是第一釋自然中四句分別第一釋名性空之理不為因造稱為自然故伽論云非佛聲聞緣覺人天所造故曰自然如來辟支不假師咨修道進德惑盡解滿會自然理而發具足故曰自然第二舉四分以難十誦問所以佛作自然之名四分等中弟子得戒名上法邪答一義釋時為分師徒故爾又復更釋佛具二義一因中不假師託教二會自然理故稱自然弟子得戒因中假師託教不具二義故名上法是故多論辨佛辟支佛得戒與見諦得戒有同有異一俱是具戒二同障身口七支三同無漏心中得是名為同而佛辟支是無師得見諦受者是從佛得又此二戒大盡智現前得見諦得戒道未知智生得又二戒無學人得見諦是學人得今以上法准於見諦亦是假師不假師別故異自然以此異故分二受之名問佛與辟支不假他身教斯義可爾豈可不假自身口教耶答多論言假自身口教得佛在樹下結跏趺坐即身教成就口自唱言我要不解此坐而得漏盡即口教成就為得漏盡戒亦俱得問佛得戒者得何等戒答謂漏無漏二種戒又多論問木叉戒是無漏戒禪戒不答非無漏等戒一木叉佛在世有不在世無禪無漏若佛在不在為二木叉從教禪無漏戒不從教三從他不從他四木叉通三性餘二無漏心禪心為餘心中無木叉人中為餘二人天俱為木叉欲界中有餘二通二界色界無色界成就無漏戒木叉佛弟子為禪戒外道亦為第三舉五分以問四分問四分摩夷道成羅漢上法得戒何故五分邪輸俗人得成羅漢更命善來答解義為二一釋俗人得羅漢亦是得戒為除俗相釋疑入衆須命善來又解四分摩夷先為方便祈戒之心上法得戒五分所明先無方便納戒之意但得無漏故不得戒以不得故理須更受以其戒是從緣得故廣如廢立說問得第四果得具戒者下三如何答二律不同若如十誦證下三果亦得戒品如見諦是問證下果時為一切得邪答得下果時為得不得以下三果煩惑未盡聖解未滿為心方得無心不得若第四果雖惑盡解滿亦非一切得戒如沓婆等是也若依四分下三不得若第四果為心方得無不心得第四舉涅槃以問五分問俗人修道成阿羅漢者何故涅槃亦令在家人得三道果出家人方得四果答憂婆塞為二種一者在家謂受五戒聞佛說法得下二果不證三四二者出家謂受八戒自妻邪行二俱捨離聞佛說法得證三四經言不得三四者謂對在家律言得三四者對出家者說經律互彰理實無妨尋此解義不釋前妨如涅槃言令在家人得三道果出家人得四道果何得判言經中不得三四者是其在家若在家者以五戒人不斷自妻豈得三果既言得三道果明亦出家如頻婆娑羅自然增進成阿那含等尋此義時經之與律並就出家以說問若俱就出家者亦得第四何以言三答五分據理故得第四經就道俗多少為論故言得三道果非謂不得第四果耳如斯釋時方無違失言自誓受戒者謂無欲迦葉立誓要期多論云佛為我師我是弟子修伽陀是我師我是弟子因斯立誓即便修漏盡智現前獲得戒品從遠緣彰名故稱自誓受戒而自誓言下實未得戒但此受戒始終三名性少煩惱故稱無欲迦葉者姓字畢波羅延從初立名名為教授故善見論云佛告迦葉汝當發慚愧心徹於骨髓應如是學故名教授得佛教授已立誓要期就中受稱故云自誓故遂修應證第四果發於具足就故為名故云上法若作此釋乃是十律七同四分言見諦得戒者聞佛說法得無漏解明智現前即發具足故曰見諦受戒言論義者謂須陀邪沙彌年始七歲共佛對談稱可聖心因而勑聽羯磨受戒此從此立目論義得戒論義之相如增一阿含廣說謂問色等就中受稱或云勑聽究理而言名為羯磨故多論所辨舉一羯磨攝十誦中三論義一受即羯磨以收即名羯磨若從餘部文為多名伽云問答見論答問雜心十受稱為問興此等名殊與論義一也第二得名隱顯者自然從境立目自誓要期得名見諦體境亦可境智論義遠因作名隱者為三謂十二曾嫁十衆二十衆並攝在羯磨中不別彰名顯亦為三以從勝義故所以耳如論義一受智踰二十五人遣信二衆開緣為此殊別故離三受其十二曾嫁劣於論義十衆二十僧尼遺行故此等三合而不離為斯合離故但十受第二僧祇成道五年比丘清淨自是已故漸漸為非隨事制立說木叉法四種受具足法一自覺具足者世尊菩提樹下最後心廓然大悟自覺妙證善受具足第二善來佛自覺已在王舍竹園告諸比丘如來處處度人汝等亦效如來廣行度人諸比丘等亦善來度人彼律所明二人共庚四分餘部善來局佛彼比丘雖秉善來不能如法為世所譏身子默念舉以請佛俱名善來為如不如云何令比丘善受具足皆悉如法廣列佛與比丘善來度者皆名受具足即制十衆彼律羯磨本替善來第三十衆受具足然復彼律十一衆受故彼文言和上十人內不名受具所以可知此律但言十人故通取和上是以不同第四五衆受具與此大同八敬一受懸指線經然彼文中愛道言佛為尼制法我等得廣聞不佛即具說八數一禮拜二學人受戒三不得罵說比丘罪四不得先受衣食等若受越五毗尼懺六請教授七八同此准斯亦為八敬但上列數四種受具為此且言祇律四受第三次辨五分為五受具一自然受戒唯佛世尊故五分云剃髮已作是念我今已為出家自然具足若對祇律因果不同可知二者善來能秉同此所被即異彼通凡故三者三歸此律度俗似為二三歸法如論具戒專三歸受五分為一二三別故彼律言一歸比丘二歸比丘三歸比丘第四八不可越法若論八法與此無差所被寬狹彼局愛道此兼五百故下文言我為汝制八不可過法若能行者即是受戒又愛道言若世尊說八不可過我及五百當共頂受又下釋疑佛言愛道及舍夷諸尼亦得戒此亦宗殊故爾五者羯磨大位法同曲細為異謂彼尼受為十一衆以其八敬專度波闍故須大僧十人愛道為和上度餘釋女三人一度不得過僧尼二衆雖不相足通相而論故言十一衆受若據此律敬通五百故即二十衆受以斯推之尼三品受五分四語善見八語如餘三律遣信十二語此既人一而受差殊義在難知但應宗別也第二諸論同異第一母論二衆各總即為十比丘五者善來建立善根上受具足勑聽三語羯磨尼五受者善來建立善根上受具足師法遣使羯磨此之十受義攝唯七謂來上羯磨通二衆故餘四便局三歸勑聽唯在比丘師法遣信事專尼衆三歸師法如通局中辨餘二須解勑聽為男報者所謂丈夫智慧增強對談稱愜故為勑聽女人暗訥何為問答稱可聖心二來沙彌丈夫與佛形同進止俱遊得為論義勑聽受戒女人形礙不得俱遊隨便問答為斯二義闕無此受遣信唯女者計其二衆犯行難齊並為惡緣理應通為但沙彌受戒當衆進求不遠遊詣何勞遣使尼經二衆進造僧徒路為難緣故開使受第二伽論十受一無師謂如來二見諦謂五人三問答謂須陀夷四三歸五自誓謂迦葉及三說六五衆七十衆八八重謂波闍等九遣信謂法與十者二部僧謂尼常行十中分二初一是師餘九弟子弟子報別復分為兩前六唯僧後三尼衆若舉此十對四分辨異者初三及第五此四為異餘六義同然此六度但同歸敬羯磨細論同異可知比丘未制白四三語三歸善受具足若制已不得具足善來者若前若後善得具足戒觀此文時十中無善來者略尼三種受中八敬遣信已後二部現前白四受得戒以八敬遣信不得戒若對十誦此十但同十誦九受以離羯磨為十二十無善來故所以同九第三善見八受一善來二三歸三教授四答問謂須波迦佛聽受具足五受重法六遣使亦可義言十二語受七八語八白羯磨於此八中前四第八五局比丘五六與七此三尼衆舉此八受與四分辨異除其答問自餘七受同四分五受比說可知此即彼論明受寬多第四多論七受謂見諦善來三語三歸自誓八法白四然此七中羯磨通被一切自餘皆局善來三歸三語局時自誓見諦八敬局人此即離合十誦十受以為七受所謂見諦攝自然羯磨攝三謂論義五人遣信餘三還三謂善來自誓八法依本立一及以三歸故六上來攝十律十受為六於三歸中離出三語故言七受七受之中一通六局局五比丘一比丘尼不同四分及夷論等已如前釋又對四分此論明受寬多以攝十中十受為七故爾第五明了論說三乘人得戒合有九種圓德言圓德者四萬二千功德無不具滿稱曰圓德故彼偈說於七依他得圓德擇二圓德了別相聲聞人為七圓德比丘為四謂善來三歸略羯磨廣羯磨等是彼疏解云略羯磨者佛初緣時聞白已得戒故曰略羯磨受尼為其三一善來二遣使者謂瞿婁達磨此言八尊法三廣羯磨上七聲聞得戒第八獨覺為量功德至得九佛無量功德至得辨其同異義亦所知第六心論云律毗婆沙十種得戒一自起謂佛初出家時捨寶衣貨鹿皮衣自發正願得戒二超升離生謂五比丘即是見諦三善來謂邪舍等四受師謂迦葉初出家時受佛為師五問樂六受重法七遣信八律師五人九十衆十三歸三說此之十種即同十誦然束斯十總為三受一若法如來五人受師此三不從他受餘七從他中分二二若衆攝四十衆邊五遣信問樂等三若人攝三謂善來三歸受重等故廣論為十要攝唯三此辨異可知問此見諦得戒與無漏戒為何差別答見諦得戒通三性心盡於一形無漏戒理觀心為餘心即無無漏戒徑生不失得果捨因中戒為此別也第二總別如昔所論善來羯磨說之為總餘三是別者今解善來亦非是總以呵欲等非受名故即不成別別義不成總亦不立故知非總不同論義為多受名然人唯一故得說為從遠緣彰名又若善來總者應開合中分十二受既不開十二明知非總即四受為別羯磨一總以從緣彰名或四或六而羯磨繞收故說為總問羯磨是總十五等別若離成別受即羯磨名者舉七毗尼七種非法總別為妨等釋不類之義可知問羯磨受戒既為四緣何故獨彰羯磨餘不彰名者何一釋云從餘緣彰名乃為多種今且隱別就通以彰羯磨何足為妨又作所以解者何以獨彰羯磨解為二義一定不定異二總別為殊定不定者餘三緣不定如僧數滿足則為五十等別如界內不別衆中亦為不定現別三舉得戒受戒然體是比丘遠為別義故知不定身無遮障復亦不定仍為十二七歲斯乃遮位開合得戒此三增減故言不定語其羯磨要文句圓滿說無增減方得成就故說為定定故標名言總別者如僧數滿但為十人五衆非二十八等即名數滿不假結界成就住處盡集身器清淨秉法圓具方名僧數滿以不攝餘三故知是別餘二類然若論羯磨要具此四方成辦事假餘故總總故得名具問兩義故標羯磨第三秉人多論判言見諦自得餘六從他彼對七受釋故今類彼論以判此五遠而言之盡從佛受以佛出世為是法故若以義推上法得戒名為自受餘之四種是從他得云何上法名為自受論云以根本而言由佛說法得證無漏發於具戒名從佛受以義而推自以盡智明照現前而得具戒又名自得不從他受故心論云若法者佛五比丘受師等若爾何故心論別解脫調伏當知從他教答此據遠因而說即同多論遠釋故爾此據具戒若五戒八戒不言自得以志力弱故就從他四中善來八敬是佛所秉名從佛受三歸羯磨弟子所秉是從弟子言教下得問善來受戒唯佛得秉非弟子者何答佛以二義善來度人一塵習雙亡威德力大能令衆生轉緣入道如僧祇說乃至如五歲知法比丘等二善識根性應機授藥故十誦云諸佛法王自在義故一唱善來無為學地而命終者諸弟子等闕此二義一威德刀劣故爾如祇比丘亦秉善來不能如法又付法藏經阿難尊者亦善來度人但不比佛第二不善識根性如涅槃云舍利弗金師之子教不淨觀等以如斯義弟子不秉問如來何故遙宣八敬而度女人不對化者為二義一愛道等緣在兩人方始發戒二遠表尼衆依丈夫僧衆咨稟法訓具斯二義阿難傳授闕無親化問既為傳授應名遣使受戒答八敬一受彰名不同亦可名為遣使受戒故明了論尼三受中遣使受者謂八尊法受以此文證故知俱得但經論互明又解不爾但女人出家大聖抑止阿難為請因宣敬法還授波闍寧容得為對面親度非謂緣在二人不對面度若爾此受誰秉答為表來世弟子所秉所以知者以義而推當時發戒乃在阿難言下故弟子秉如似羯磨言從佛出弟子所秉故此亦爾多論言見諦善來自誓三是佛秉餘四弟子秉餘之二受弟子秉者如來所以不秉三歸等者三歸等人機根微劣緣不在佛如文可知若語羯磨多論十義故佛不秉一為平等故與此作師不與彼為師違平等化故二止鬪諍故為為親疏便生鬪諍三為止外道誹謗四為成三歸若秉羯磨即墮僧數闕無佛歸五為成四不壞信六為成六念七以七事瞻養弟子諸佛法王不為衆生所須故八不滅前人功德如一整富羅等九不苦惱衆生不問遐邇咸就佛故十為通末代若秉羯磨如來涅槃誰復秉之若言八敬是阿難秉者上來三受弟子所秉若以聖凡對能秉分別唯羯磨通局可知第四所被分別若此律辨善來受戒局在聖位故下文言見法得果證已初果已去得無漏真解猒世出家至順之極方應善來發具足戒內凡已還於心所間非至極之極故闕不度又善來言下正發具足不證四果若五分僧祇與此有異五分善來通度凡聖謂須提那善來受戒而犯初禁故知通凡若依祇律善來言下果戒俱得故與賊期行戒中五百群賊王欲刑之化王令放說法得道方命善來善來言下如五歲舊比丘皆成羅漢故不同此亦可彼律出家經之言此等人善來言下得戒得果者蓋始時得戒終時得果非謂言時得阿羅漢此是總言若作是釋亦但得戒上法受者要第四果以其或盡解滿故爾三歸八敬一義判釋內凡已上是以多論此二受法不羸不捨故知內凡已去又以義推三歸受戒似通外凡以羯磨無興為起過人此乃三歸所度即言羯磨始興為凡故為義通八敬一受若依十誦五分多論等專度波闍即是初果此律通度五百波闍初果亦同此律如下文言我出世故令摩訶波闍歸依三寶乃至知苦盡道七生人天便盡苦際故知聖位不知五百位在何許亦可既同一席准同波闍義亦無妨羯磨一受始興為一凡興已後三人通被如涅槃經淨梵志得初果已羯磨為受此律蓮華色尼亦同此例第五藉緣多少善來受戒具四緣得一證初果文言見法得法已二內為出家善心文言欲於如來法中出家修梵行三假對佛形文云前白佛言四假佛教謂聖命善來上法受戒具三緣發一假佛教授如見論說二為祈戒心是以餘文羅漢沙彌無出家意故但得其果明須為心三得無漏空解謂盡智現前即得具戒三語受戒亦具三緣一假弟子形對諸羅漢二假弟子教謂口授三歸言詞無缺三歸依心成領前歸仗故能得戒八敬受戒若佛秉傳授須具四緣一假佛八敬之教二假弟子形三假弟子教謂口宣八敬四奉行之意故愛道自陳我等頂受若據弟子秉者具於四緣一假佛聽許二假弟子形三須為言教謂宣陳八敬四遵受之意羯磨受戒昔來所辨具於四緣如律所說者妙八比丘中解羯磨比丘若受大戒者僧數滿足緣白四羯磨如法成就者教法成就依得處所者結界成就界內不別衆緣住比丘法中者年歲滿足身無遮難緣若具此四是大比丘得成戒本犯戒之人四中若闕非大比丘非其所戒故須此四方成比丘即是滅諍五法現前中除其滅諍別所為者具四現前謂一能秉僧二所秉法三秉法處得界現前四所為事謂人現前是今此受戒得別所為故具此四得能發戒既具緣發戒是若比丘義若成所戒便由具緣故取此文解具緣義不乖道理此律成文不順道理不然之義至下當釋又破此四訖引祇六緣者然祇文解者亦是釋八比丘文何意棄此解比丘義復引彼說又復抄引母論五緣一和上如法二闍梨如法三七僧清淨四羯磨稱文五界內和合不別衆此之五緣令不周悉彼雖為五舉四緣往收但三緣攝上三是第一緣次一教法緣次一不別衆緣何須背斯正義所不了說又更有人立五緣得戒言雖略亦不離此四對辨是非寄在禾莖粟柄更不別理是非既顯還歸初解四緣者是問善來等受以心為緣羯磨一受何故不爾答羯磨非不為心以假外緣作法從強以辨故沒因名又可羯磨四心俱得恐濫不辨心緣又准心論前四以心為緣羯磨一受雖文不列要亦須心故下文言眠醉狂等不得戒故問既言受緣謂四緣中是何緣答謂從二緣生以為祈戒心四大造及四相故即是因緣餘僧界等是增上緣非二緣者以非心法故及二因所生謂所作共有第二念無作應加自分令三因生第六得戒時節三門料簡一得戒時節二辨重與不重三解此受緣作法差殊第一先明時節善來受者唱善來竟即發具足故下文言乃至得盡苦原上法受戒盡智現前時得以小乘分齊羅漢梵行已立自然戒淨故更不從他受戒問此上法得者得作無作不答以非作法但得無作問既非作戒何因能發無作戒者答以非營為故無其作以道力故得無作戒次辨三歸自為四門一明時節二緣境寬狹三檢難以不四辨五八二戒分不分第一言時節者問同用三歸何故乃為五八十具戒等多少耶又引母解更為所加謂說相是以相多少故得戒差別或五八十具等若爾為說相竟方得戒邪答為二解一釋說相竟方發故下尼律度沙彌尼與三歸竟始云次與汝受戒故謂相竟得若爾何故母論前三歸依發戒方便故三結竟正發於戒又心論言三羯磨竟作及無作根本業道故知不是說相竟發若待說相方得戒者如受具中未為謂相之前何時中得故知此釋定不合理是故今解三歸結竟即發五戒故多論言欲受五戒先三歸三歸竟爾時已得五戒師所以說五戒名者欲使前人識五戒名字故其猶白四竟已為說持等為知故說五戒既爾八戒十戒義亦同然故多論若受八戒十戒如五戒說若爾何故下文次與汝受戒答謂領隨行故言受戒非是受體體已得竟若爾何故前言更為所加為五八十具戒等答此謂心期以說持多少故令受者期五期十等隨心所期三歸雖同而戒多少如上所說三歸處齊故言為同而詞句各別別別持可知及心期不等以斯義故何妨多少第二緣境寬狹言五戒者心論云於一切衆生一切衆生一切時戒不斷或十二種或二十一種故知五戒亦須普緣故多論云於衆生上可殺不可殺乃至妄語下至阿鼻上至非想及三千界乃至如來為命之類得前四戒以初受時一切不殺等無為齊限故於衆生無不得戒各得十二戒故於非衆生得不飲酒戒以八戒十戒衆生非衆生得戒類爾故知八戒十戒並是緣寬謂生非生數二時差別十戒出家故時長期盡一戒八戒接俗教所以局日夜故心論云具足一日夜離嚴威儀又一一戒末結沙彌罪故須普緣乃可為滿不滿具不具異若爾何故但列十戒答以非具位且就力分故唯說十復以惡非義通故戒戒結罪不得以但說十即不令分學其猶大僧豈可盡說五篇又如式叉但六法仍一切應學故此亦爾位雖未滿然咸分學故普緣也又復此十即為具戒體故第三撿難以不者問五十等戒為遮難發不答不得戒若爾何不撿問答其義有二若望障不障但重難等悉礙諸戒所以爾者良以戒是勝法非淨等對五十具等義並同爾如逆人等受五八十等咸應不發故母云若破五中重戒受八十具戒並皆不得餘戒持望類亦如是故知難等俱障諸戒第二若望撿不撿義即不等然就五十與具並無難等具戒制撿不同不得故須撿問五與十聖不制問不撿得戒故不問難其猶和上通具不具為請不請又如妨難大小二房咸不聽作等就無妨六搩手外要制處分小容身屋直爾聽造說淨財量類亦如是故不問難問五十可爾三歸受具何為不問者未為緣起無故不問羯磨初緣南未須問明知三障亦無撿問第四分受不受分就中為二一就戒數二就其時言就數者若十戒具戒悉須具受方發律儀諸論同爾八戒五戒二論為異多論所明具受方得若爾何故經言一分二分乃至滿足優婆塞答此撿持為多少故云一分二分等非謂受中一分等若依成論如八戒齊受二三等皆得戒故故彼論問八戒齊為具受得分受得答隨力能力能持五戒亦爾論問曰為人言五戒具受則得律儀是事云何答隨受多少皆得律儀但取要為五第二就時者多論時定八局日夜五十具等定盡形受若依成實論五戒十戒具戒盡形同爾八戒隨時長短故文隨受一月二月等又問准十誦律問五人受中如億耳所見曰亦為分受晝戒不受夜戒受夜戒不受晝戒等八敬受戒說第八訖時得戒品羯磨一受羯磨竟發諸論大同然以義說得位為三一得四語時得如沙彌受及五分初緣諸釋女或八語得如尼遣行或十二語如尼遣信舉斯三位莫不皆以羯磨竟得問羯磨竟時得戒者為善心得為餘心無心等亦得耶答依多論一切盡得問云何善心發善心得邪論云先以善心禮僧合掌白四羯磨起諸論教業相續善心戒善成就是名善心發善心得又言不善心得者亦先善心禮僧等乃至羯磨未竟忽起瞋等諸心以藉前方便善心善教因緣力故發生無作任運而起與不善心俱是名善心發不善心得非不善心能發此戒問不善心得戒者如殺盜未成善心息時應結究竟答受戒作故善雖為惡心違善心外緣猶善作故藉前得戒殺盜作故惡善心息時身則成止更無外緣惡作相助故非究竟言無記心得戒亦先以善心乃至羯磨未竟之間忽爾睡眠亦得戒品是名無記心得云何無心者如那含沙彌羯磨未竟忽入滅定亦藉方便善心教力故發得戒與滅定俱是名善心發無心中得問無心定何用此戒一解為要期出故又以戒是功德法故相資故爾問餘三心中何以但得無作不得作邪答多論無作望要期故得從前發作取當色為體以從心故不說為作體又若德宗無作非色心故得藉前方便說為無作若言作戒以色為體色唯無記身動口業損益者是作色以其當時心既非善遂無損益之作故無其作戒上來所釋依多故爾若取此宗唯善心發善心得不須致難故下文言瞋恚人受眠醉狂等不名受具足又依餘三律遣信受戒十二語故亦具作無作戒第二重不重善來等五受具戒十戒各自當分並不重受咸以自分辨戒盡形故爾是以多論木叉之戒無其重得譬如富貴家子不須重著瓔珞若爾如二年學戒若缺戒已何以得重答言二歲學者是學法盡形非謂別更辨戒體盡形是故不類問若五戒當分不得重者何故四分未利私呵第二第三受五戒邪答此人得法歡喜善心增著故重歸依據實而論更不發戒又更解時凡受戒者乃是身口業善何因初受即是善業第二更受不成善業既亦善業故律云二三重發無妨若爾出家等戒亦應重也答此乃化宜接俗理隨時心故容重受餘出家位定理不合重亦可宗別故使四分得重受若以具等三位次第相望以十加五以多攝少捨俗趣道以具加十滿攝不滿趣滿足故並以前二是俗及未滿故次第增受問三位互增受者如殺戒等為重發不一解依多亦不重發謂五外方十十外方具如遣所辨又依心論一切因一切支謂三品心得三種戒即似重發殺盜等戒以其三時並身口善業故爾又俱舍亦爾若成論約位相望盡應重發如一日之中受七善律儀隨得道處無作更生本受不失勝者受名以斯義故豈非重發第三作法差別四門分別一起之次第二說結多少三對乞和上教授受名為無四說相為無第一言次第者若具戒五受以彰次第善來最初以陳如為首故三語第二以百一十弟子遊方度人中道失信遂聽三語羯磨第三以息三語興羯磨故上法第四如下文言年不滿受受已生疑開以胎等年猶不足此沙彌修道成羅漢即名出家受具足故知第四八敬最後以多論云八年已後羯磨興世十四年後方八敬度女故知最後亦可上法非作法故不須論其次第餘四如前若以羯磨對十戒五戒彰先後者五戒先制次興羯磨十戒最後以十戒文中已稱和上某甲故爾為羯磨初始制和上故第二說結多少除其上法餘四受中善來八敬一遍即得三歸三說羯磨白四何故如是釋言善來緣強八敬情重故一遍得三歸心慢故須三說羯磨一受秉通凡聖故須白四又復前二不結三歸羯磨此二須結仍一三不同者解言前二結緣強心重亦不須結勸餘二遍多故亦須結三歸相別又人別秉故加三結羯磨一法又是衆秉故但一結上來所辨或可如此既為四別寧容一准若以一法而類餘者如三歸俱說羯磨亦爾然此不類何須致妨但作法不同故為此別第三乞等為無差別者羯磨對衆所以須先容不和可不許受故類餘一切對衆者咸須乞法唯除受日自餘受法既非對衆故闕無乞羯磨受中制持攝受須立和上餘無可知遮難緣興方為教授撿問行者故下文自今已去與汝竪立受具足戒餘受亦爾又羯磨受中言與汝受具足戒三歸但云出家者此互彰名故結受言汝始發心出家明知是一善來八敬雖無受具等名義亦合為如善來中我欲修梵行等即出家等名八敬前後若能行者即是受戒文雖少殊其義不別第四說相為無善來等法初受之時並未即說持唯羯磨一種因犯已後方制別持若五戒十戒受則說相不同受具以五戒者對俗化宜復無制罪名故不待犯言十戒者是制羯磨說持已後方為故即說持問何以五戒持一往即制出家諸戒要待犯者解云五戒接俗無制罪名種故得即制比丘廣教制罪名種故要待犯請雖假請但興廣教又須第二犯廣方為說持雖初犯略未為犯廣不制說相如文可知第七受捨漸頓先明受漸頓如昔所判羯磨一受亦漸亦頓餘之四受頓而非漸如何羯磨漸頓先受五戒次受十戒後受具戒是名為漸若不受五十直受具戒得三種戒說之為頓問若一時受得三種者何須漸受答染習佛法必須次第先受五戒如是次第得佛法味好樂堅固難可退散不失次第不破威儀如遊大海漸漸深入一時受者既失次第又破威儀又復衆生得道時異故須次第須受是以多論云七種受中唯白四次第三時得戒餘六種受但一時得無三時次第今准此律其義稍異若辨得不得五種受戒俱為頓漸若論犯不羯磨制漸頓犯漸不犯故下文不與沙彌戒佛言得戒衆僧為罪餘四不制故頓漸俱得先解五通漸頓善來漸者如那羅陀上法漸者下文沙彌開胎閏等不滿成羅漢得戒者是三歸無文義亦無妨如耶輸伽文已為五戒故知三歸漸亦無妨八敬漸者如文波闍受三自歸後敬而得戒以斯文證故知五受俱漸皆頓若存此釋與前立義正持翻對問一時頓受得三戒者其無作體為一為三答但發具戒一無作體更無餘二無作之體若爾便是一戒如何言三答比丘受得防殺無作與沙彌俗人同戒者其實體一是以多論立義據其體通望三人始終位別言得三戒理實無三問所以得知但一無三答即此論文解次第受中俗人下品心受得下品五戒次中品心受沙彌戒前五戒仍本下品五戒外發方為中品上心受具本前二品仍猶下中五十外發始為上品據斯以驗次第漸受三時心別同戒先作尚不發三豈況一時受者而得為三故知漸制望位別作三非體為三亦可心論云一切因一切支得三戒者三時漸受受既時別重發無作為三體故若論頓受受既一時方可名為望位為三非體為三次解捨之漸頓五問料簡一泛列捨法第二就捨以明漸頓三約受以明漸頓四舉受辨捨多少五出所捨法體第一列捨者且依雜心論四捨謂若捨及命終斷善二形生等作法捨者違本要期故命終捨者所依不住故斷善根者失本所依故二形生者依止別異故犯重等捨論主不存又復涅槃比丘犯重不能更生善牙種子如斷多羅不解我意說言失戒又為純陀說四種比丘乃至第四汙道比丘犯重者是汙道比丘聞我此說不解我意說言不失准斯義故不可定說且依心論四種捨法此應廣解四捨義偏解作法二門分別一列捨法十九定其欣猒我捨佛等十一猒上捨次八受居家法等欣下捨第二收捨盡不盡對心論以挍寬狹第二就捨辨漸頓者為二第一定頓漸二對作法辨漸頓之方第一言漸頓者作法捨含兩餘三頓失作法十九沙彌優婆此二是漸餘等說頓第二言捨方法者問受既得三種戒捨時云何答義含漸頓若也要心三戒俱捨則頓失三是名頓捨若言我作沙彌但捨具戒言作優婆塞者又捨十戒又言我作三歸人方捨五戒名為漸捨問受之與捨俱頓並漸或以漸受頓捨此三可爾若本頓受但得具戒一無作體云何漸捨若得漸捨便成三體如何言一答比丘一時受防殺無作通沙彌俗人共為防非是故捨時要心捨具不捨十戒若與沙彌戒同隨心則在故律文言我作沙彌以十對五義亦同爾故文我作優婆塞是以論說據體通三人為共同義故望位說三非體為三如此釋時頓受漸捨義亦無妨故多云譬如樹葉夏青秋黃冬時則白豈體為殊隨時異故樹葉色異而始終一葉戒亦如是當是一戒隨位異故若爾便不捨具答此亦望位名捨而實不捨具受亦如是漸受漸捨義亦同前若准心論一切因一切支言發戒者漸受漸捨各別捨體不同前釋若頓受漸捨亦同前解以三體別故第三就受漸頓若據昔解四受受捨俱頓羯磨受捨並含漸頓若如後釋論其四受受通漸頓捨唯局頓無作法捨故羯磨一受受制局漸捨兼頓第四以受對捨具捨多少二門分別一對受辨二約位聖凡第一對受者四受為命終以形俱故無三可知如多論說無四災患故羯磨具四然於作法具含二義餘三局頓言約位者念處已前具足四捨四現忍去是色界法無二根故然暖頂之中無二形一忍心二除二形斷善根世第一法及見諦不捨初果已去得戒不壞唯雖為命終若依多論四現忍去亦唯命終第五出所捨體問凡言捨戒為捨已生戒善為因義邊為捨無作戒體答已生戒善為因感果必然不捨且捨無作戒體本受要期一形無作任運相續今心猒捨使無作戒不相續起名為捨戒以理而言一者戒法二者戒業若論捨戒捨法不捨業為因義成故若語得果捨業不失法果興因謝故問不捨已生善者懺悔解義不應除彼已起之惡答善順理生惡違理起順理力強已生不捨違理力劣故可悔除又解懺本別興對治抑伏惡業故使殄捨者直是厭退絶彼相續不欲別為對治故言不捨若依心論初念作戒現在成第二念過去成初念無作現在成第二念二世成此無捨緣故為得得若遇捨緣非但失體亦無得得雖可無得亦不失因義第八優劣如多論說若就灾患為無四受是勝羯磨為劣若取任持佛法利益寬長羯磨一勝餘四受劣言四勝一劣者羯磨受者內實凡夫福德淺薄感得此戒多諸灾患容為厭上厭下奉持心劣令戒為羸餘四受法內凡已去理解心中受得斯戒持心堅固肥而不羸二者羯磨凡夫容為不樂道法捨本所受餘四受法樂道情殷理無退捨三者羯磨容為轉為二形餘四受法復無比變四者羯磨受人或起邪見斷捨善根餘四理解不斷善根羯磨一受或為上四故稱為劣餘四受法無前過非是以名勝此對為凡若為聖人受亦是其勝言一勝四劣者羯磨一受乃具六義一是時長謂通現未二處遍三方除單越三報兼男女四位該凡聖五所被無數六多坐作法以斯論義佛法始終以白四羯磨為宗本能繼續三寶作無邊利益為任持之功莫大羯磨故說為餘四受中善來一受終盡雙林自外三受中間即止又局閻浮不該餘二凡聖位差報局男女對前六義互各闕少紹繼功微故稱四劣此發戒緣竟
