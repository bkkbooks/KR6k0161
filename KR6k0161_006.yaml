body:
  text: 次釋殺戒四門分別一廣就三趣以彰煞義二人趣之中明煞父母逆背恩養義三煞羅漢逆四出佛身血逆此二損害福田先解初門廣明人趣自有其四一制戒意人趣報勝善因所招形心俱是受道之器但出家之人應懷四等今反瞋忿斷懷陰境違慈惱他損害道器過中之甚為斯聖禁二釋名者五陰實法中假立衆生名斷於五陰名為煞生此是所防戒是能治謂能所通舉名煞生戒此從境用作名也若依多論辨五陰中但煞色陰以色是等受刀杖故若就通相以色壞故四陰命根亦壞如破瓶失乳謂此別有非色心命根連持色心今壞五陰命根同壞二就色中但煞未來以過去已滅不得煞現在一念不住不可煞以現在受刀杖使未來不續三就現在未來中但煞無記無記受刀杖故善惡是方便不礙刀杖四就無記中但煞報色不害餘三如破瓶失乳通煞四種五就報色但煞觸塵不煞餘八通相辨煞亦煞諸根三塵六就觸中唯斷頭腰二處觸者即死頭是多入聚處腰是出入息住處故壞餘處觸不必定死通論並煞諸觸若依成論一念實法中無煞生必以斷相續假故乃名為煞故論云五陰相續中有衆生名壞此相續故名煞生謂業煩惱為命根色心為命體相續是命義今斷相續故名煞生三具緣通緣如上別緣有五一者是人簡餘趣輕故二是人想想疑輕故三者煞心以其無心全無犯故四起方便以無方便境不可壞故雖方便加害若命未斷所頑未畢思心不暢亦不成重故須第五斷命四闕緣義若闕初緣三句蘭罪一非人人想二畜生人想三杌作人想初緣闕竟還立若闕第二人想容有六蘭迷法想闕當法想轉想三句文雖是一義含三句一人非人想煞若根本迷人作非人想煞人無罪非人有吉今律文結蘭者據本作人想往煞已得偷蘭臨至人所轉作非人想煞若結後心應得吉羅隱其後心之罪結其前心故得偷蘭問若後心無蘭者何故律文人非人想蘭答轉想當非人時實無偷蘭由想當非人故令前心偷蘭不得攬因成果舉由轉想結前心蘭故言人非人想蘭如三諫捨者三蘭豈可捨善心有蘭由其捨故前心偷蘭住在因位舉後捨心結前心之蘭故言捨者偷蘭此亦如是二人作畜生想三人作杌想問人非人想結前心蘭者向闕境緣非人人想亦應舉後結前心古人解云為成人家方便故闕心結前闕境結後以文俱偷蘭故作此解時非人人想有前心吉此定不爾今釋非人人想亦結前心所以爾者若本煞非人後心當人可言為成人方便結後心蘭非人前吉隱而不説今文所辨本意煞人非人境差若人想煞心恆在本境只以非人境差闕前煞人之業更不成重即是煞人方便前生非人之境後起猶是舉其後境結前心方便比於轉想本迷兩殊俱結前心如本煞張後對異境張人方便前已得竟即此又是非人境上迷非轉想本無吉羅即異趣上五是此結死爾一切類然次疑心闕決正心義亦含三謂對人境向餘三疑是次雙闕兩緣義亦含三一非人𨲙人處復生疑為人為非人二畜生疑三杌木疑問境心已闕何故復須雙闕二緣答雖可同闕境心異故須來問異相云何答異境上生疑不同闕初緣疑當於異境別前闕第二有斯別相故須更闕問義雖小可異莫不闕二何須重闕解言若不出者人情意謂疑對本境不成人方便疑當異境不成人方便故須雙問此得何罪答非人疑蘭若爾對本境疑結前心蘭雙闕對異疑亦應結前心吉解言此之二疑並結未疑前蘭疑緣異吉非宗故不論如上説問想疑二心疑心辨雙想不爾者解言想一向故不成雙如人非人想不闕境非人人想不闕心故何得成雙疑心緣兩境對非人故即闕境猶預故便闕心故得辨雙闕又此雙闕雙在闕心中辨若單雙俱闕境一六想疑並闕心一六此亦無妨諸戒類爾又此言闕境等各六者亦可單雙二闕廣各十九如境差説餘戒亦然此等二闕下不後論闕三全無罪容得提吉闕四無罪闕五輕重二蘭此等通別具七方便人趣死爾餘二類然輕重為別次煞父母然人非化生業寄胎報託父母之遺軀以成己體兼復鞠育其恩深重理應敬養報恩殖福今反內懷瞋忿興加逆害違恩背養為至情深故制夷逆煞義如前説問煞父母為知得逆不知得逆答本漫心無簡若對父母雖可知稱本所期煞亦逆罪故見曰實是父作非父想煞不得出家若本剋心不欲煞父作賊想而煞父境雖壞恆作異想不知是父但得夷罪不犯逆故伽曰父非父想煞得出家不犯逆故須知方成逆問若父出家成羅漢煞父羅漢為得一逆二逆耶經論不同十緣憂波問煞父羅漢得幾罪佛答得夷并二逆又涅槃經一者煞父王二煞須陀洹罪兼二重又雜寶藏憂婆羡王出家立子為王後成羅漢子王欲煞父父比丘言汝得二罪以等文斷父命時即損恩養亦損福田二境死別心緣兩害故得兩逆一夷夷對人境制故文人人想以其緣異心緣兩害故得二逆又可一逆雖可二緣莫不同一行者既無二命何得二罪但可業恩是重無別二逆問若父出家竟轉根為尼若煞此尼得煞父逆不答伽曰若煞女非母非羅漢而得逆罪謂父變作女人者是以斯文證故知逆罪所以爾者根雖有異人者不殊若煞此尼有背恩義故問若打此尼得父罪答但得打尼之罪若爾煞此尼時不得煞父之逆解打本就位結罪不望違恩打時是女故結打尼之罪煞就違恩此父者損壞故得逆罪如似一父若當打時道俗位別況轉為女故知就位得打尼之罪問父母變作畜生煞得何罪答但得煞畜提罪若爾伽煞女人不應得煞父之逆解父實變者已命終竟此謂剎那中陰即受畜報故得提罪轉扝為女猶是人報明有違恩是以非類若父報得通慚變非畜作父想煞者亦得逆罪以父境死故若不知無罪若煞畜生父母但亦犯提以勞不滿故又報劣故故十曰頗有煞父母諸比丘與受戒是人得受戒耶答經謂煞畜生父母是亦具五緣一父母二父母想三煞心四方便五斷命若闕初緣四蘭謂餘人非畜杭以𨲙父處作父想煞闕第二緣易想四句謂父作餘人想父死犯夷無逆作餘三境想得蘭疑亦四句若向餘人疑得夷無逆向餘三疑得蘭雙闕罪若闕煞心或有吉闕第四無罪闕第五或輕重蘭次煞羅漢制戒意阿羅漢者修道進德惑盡解滿弟子之中究竟福田理應敬養獲反報之福方乃瞋忿興加逆害損喪聖軀失利滋甚為過尤深故制逆罪降斯已還非其究竟真淨福田乃可業思是重不與逆名辟支佛得夷無逆故地藏經煞辟支得根本不犯逆問為知得逆不知得耶答本漫心一切皆害縱令不知亦逆故見論若比丘教比丘煞比丘教時未得道臨煞時此人得羅漢教者犯夷逆若先剋心不欲害聖知方成逆不知非逆故見論畜生想煞羅漢不犯逆若言具闕一同父母次出佛身血佛是究竟滿足功德福田四等開化利益無崖理應敬養殖無盡之福今反瞋忿興加逆害侵出身血損法身之器過中最甚故制逆罪若本漫心不問知與不知但使出血亦得逆罪若本期心不欲害佛知方成逆若餘人想無其逆罪若爾不知是佛供養何以佛邊得福答價人漫心一切福境皆供養意雖對於佛作樹神想由心無簡於佛得福若剋期局佛邊無福亦可此律樹神告知何以無福具緣亦五一是佛二佛想三煞心四方便五出血若闕境雙闕各四蘭無逆若也想疑亦同八蘭或闕煞心得逆提罪闕四無罪闕五輕蘭無逆以其本心斷佛命意是故皆蘭若以父闕境及雙闕對佛辨者佛或闕二謂理教俱闕望本期説故或單闕理望亦可壞故不闕教名以本蘭今蘭故父等唯一理教俱闕不得單闕一也以可斷故想疑二中對佛想疑不簡趣之同異亦或二或一如上辨以不可斷故若其父等同趣想疑唯一闕理不闕教以本夷今夷故異趣想疑方是闕以可斷故闕第三緣彼若出家父教名嫁三人謂並堤罪佛與羅漢別有違逆若在家父教名全異皆無違理第五緣若望本心佛上俱闕若望不可斷單唯闕理父等一向俱闕就煞戒中科文亦同然制緣起中分二初明其犯二諸居士下嘖前文有二初其衣鉢與汝犯緣二則受下正明相煞前文分二初如來住處二無數方便下人緣合辨以相讚者則是犯人故爾緣中文二初説不淨觀依教習成二諸比丘婆求河邊已下舉處取人猒報求煞為彰習成起過前文有四一依病設藥嘆教行俱妙勸令修行二諸比丘念已下默念大聖為己故説三諸比丘下慎教剋獲四便求刀下方求捨命先解初文五停心中多貪欲故不淨對治但貪有五一財貪少欲來治二色貪説不淨行三淫貪捨無量治四名貪示衆生空五法貪法空對治色貪故説色不淨謂是無貪善根性貪對治故於中有三言説不淨者彰過歎不淨行者嘆其能治嘆思惟者勸勉能行如智論説五種不淨一生處謂識種子八月九月常在生熟二藏屎尿之中偈言是身為臰穢不從究開生亦不出薝蔔又不出寶山二種子不淨謂業因緣風吹識種子住在赤白精中託攬為身偈言是身種不淨非餘妙寶物不由白淨生但從穢道出三自性不淨謂以三十六物䨱以薄皮大小不淨充兩其中偈言地水火風賀能變除不淨傾海洗此身不能令香潔四自相不淨九孔常流眼出眵淚耳出結聹鼻中涕流口出唌唾大小便道流出屎尿偈曰種種不淨物充滿於中身常流出不止如漏囊盛物五究竟不淨投火為灰或為糞土偈曰審諦觀此身終必歸死處難御無反䨱背恩如小兒二諸比丘念已下默念大聖為己故説三諸比丘下慎教剋獲於中有三謂法喻合法中三一諸比丘能習觀人二即以無數者方便習觀三從定覺已觀成猒報喻合二文並三可知四便求已下方求捨命第二舉處取人何以獨言婆求河邊者為過非一切故婆求河邊於中文四初舉前四中第二次以無數下舉前第三求刀已下舉前第四次物力伽下能行煞者言姓者非出家人前習觀者故五分中彌鄰栴陀羅十云庶杖梵志祇庶杖外道見庶杖沙門作沙門形相故正行煞中文四一受雇行煞二於彼江下內心追變以其江水能蕩衆穢故就而洗刀三時有一天魔已下恐其不為勸讚所作欲令信故水上而立四時難提下受魔嘆可廣行煞戮觀行未成名未離欲等不淨觀成故曰愛盡者身毛不竪等曰煞一二三等廣行煞事謂為度人呵文兩一俗人呵二爾時毗舍離下佛呵闕無比丘呵者習觀行成方能猒報或前謂是為此無呵就佛呵中文三一發覺所由文三初有緣集衆祇十並言衆欲布草則知是小因緣此律既無布女之言謂不為説法集者為小因緣二爾時世尊下因前致問三阿難已下舉事以答第二唯願下請更改觀更説法中文兩一説法方便第二爾時世尊已下更為説法方便文二初阿難請二佛告下集僧前請文中使永無疑或者佛説不淨為除貪患貪患若盡遂不起業集因既懲來苦不續言祈如此本不欲令彼猒其現報但觀成謬報交求害己然餘比丘謂佛言如是故稱疑或請更説法令然解聖心故曰永無正説法文四一為説法二彼作是念下默念許修三時諸比丘下依教習成四從阿那覺已下觀成獲果次第反對前煞緣中四句之文然説數息本為得果明説不淨亦是不欲則猒現報改説言爾初説法中文二初出所説法然有法喻合法中四句一阿那波那舉其定然此名出入息觀以慧數為然今言波那念者從律作名此數息有六謂一數二隨三止四觀五還六淨等二寂然快樂嘆定凝攝三諸不善法謂覺觀不善是其所治四則能下彰能治之功喻中天者喻初定然二無復者喻前寂然三又如大雨能止喻第四功能四猛風喻第三所治合文可知二爾時世尊下正説數息觀法對治思覺衆生下之三文次第可知第三以此因緣下佛集僧以呵改觀除疑時遙事隔故更須集衆呵前不應戒本六句一人二故自手自煞業三人命者所害境四持刀下教煞業文二初舉教煞於中持刀與人者安煞具煞嘆譽死口讚煞勸死下是勸煞二作如是心下總以結前三句五結罪六治擯六中下二略而不釋釋中初三略而別解二四兩句合而廣辨人者一念識支託父母胎人報之始名初識垂終一運是後識中間連持是命壞此一報名煞祇云人者有命人報所攝五分若人若似人似人者入胎四十九日過是已後盡名為人自下合解二四文二初解犯相二若作如是比下輕重相前文初列兩門雜自業為四教業十五合十九門準釋文中應有二十彼有遣使書故第二名舉兩釋若剋害張受教煞張三性之中俱犯重罪受教然王使者犯重能教無咎但得張邊境差蘭罪若剋教煞生立則莫煞受教者立時乃煞能亦無罪於立人邊無煞心故得坐人邊方便若漫心同犯重使者本未犯重中間但輕一非能教二非所教業約不作故展轉使者一切得重並是能教所教業成故餘可類知二輕重又三一人報二天子下果報三境想境想之中四門分別第一解須境想意二泛明境界三辨有無四定其多少然犯不孤起必也託境關心以成其業境有優劣是非心有濃淡謬誤或心境相應犯齊一品而業有輕重或心不當境人非人想疑等或境不稱心非人人想疑等或境犯心不犯有主無主想等心犯境不犯無主有主想等有斯差除明須境想定其業位犯等四句識想故爾第二泛明境界位階且五一內報二外事三法四時五罪言內報分別謂人天非畜若四境齊犯謂如初戒或各升降如盜煞等又就人中道俗俗者如販賣及食家有寶等道者如謗䨱説打搏疑藏等通道俗者其如二宿淫觸二粗等然於道中內外外局衣食內如毀兩又內中小大大如謗奪小謂減年又具中形報隨慎之提局是比丘同路乘船作尼讚食事專尼衆如謗䨱説義該兩衆餘通可知又形報中色心分別如淫唯色死尸犯故文言道道想此通四趣漏失同然境仍是寬自有約心為境如觀許等想染心衣食第二外事者如振地草木不受殘宿勸酒足等亦可長衣鉢類通內外者盜奪蟲水等第三法者有四一自所稱法如媒鹿語二妄毀呰第二他所作法處分諸謀三治法謂隨舉等四法相道理謂十八法第四時者如日暮非時及殘宿等第五罪者䨱説之類第三有無有者僧五犯中合二十六戒中有謂初四二六三十有一九十十五對有三十五如二房含七盜鹿媒壞生等各有二重故爾尼之五犯若論同戒於僧二十六戒中除却十戒謂淫觸二房兩粗讚食日暮兩足等已除十六戒同謂三夷媒回僧説粗捉壞非殘不酒二蟲䨱粗發諍等略出戒本豈非通有二不同如摩觸五句染心四句合十八戒對便二十一也次言無者通對前五一內報無者或是理無如漏失戒觸緣斯犯何須境想以階犯位或可略無以道想若疑但得蘭罪故條部云若非道想不疑殘故知是略二定略無如謗奪兩舌毀呰嫌罵局此境犯今無者略二事外略無者如屏露露敷露燃藏衣鉢等三法中理無者以無所對法故如煞盜等言略無者如大小妄及謀隨舉等如祗二隨咸有境想故爾媒等反此故有法想時者如洗浴二入聚落今應是略罪略無此如尼䨱戒餘盡理無不對罪故第四多小境想之文或四或五者但由第三人非人想此一不定故或四五所以爾者昔解若重輕相對定有第三故則成五如淫戒轉想及本迷並得夷蘭若煞妄摩觸及二粗等轉想蘭吉本迷亦吉故須第三以成五階若犯不犯二境相對處分盜等盜戒則四處分具五五謂轉想有前心蘭故四約本迷二境全無罪故故犯不犯或四或五問重輕相對定有第三成五句者何以䨱説第三落在開通以彼二戒粗非粗想故為如此妨故今更解重輕之中位有其三若轉想定五迷或四五云何或四五若想對二趣犯境起迷猶吉罪故為斯具五想對無情一切無犯是以但四如似䨱説類前亦爾若對下三輕重應五然落開通此是全謂非罪而䨱説者無犯故然是以本以迷或四五若準此義犯不犯位又有其三如上重輕應本定五進就不犯故即成或四五者今犯不犯如盜戒中本是或四五今退就犯中對非畜二物作想轉迷俱五亦成三位此則二對理齊文中綺説謂煞等就重輕盜約犯不犯故有多少又復此謂犯中有輕重如前所論若處分掘地非時勸之犯中無量輕但有或四五餘準可知也又後上來如此釋者可此等通本異二境故言定五及或四五若據本境四即齊四謂本迷故五則俱五謂轉想故但文在説用斯犯等隨據境想可以準知次釋文如常此五則為五階又可一具四闕相對為四初句境心俱重次二境重心輕次一境輕心重次一俱輕又可下四束三人非人想疑心差境方便次一境差心方便次一心境俱差方便妄稱得過人法戒第四一總解妄語二別解大妄總有五門一定能妄語人二凡夫妄語有五階差三境心虗實四結罪分齊五自言有無先解初門所言聖人修道進德契證真實斷除虗謬巧偽斯盡出觀陳説言則稱實何有妄語若也大聖則寂常用理所不論然聲聞聖人亦有定前理觀方便心中聞象王入池水聲向諸比丘説比丘言何有入空兩定聞象王入水聲目連虗稱同上人法佛言有是定不清淨目連不犯此謂理解方便想心實語亦無妄過以凡人無彼人二種實語故發言成妄凡夫亦有事中實語如身證苦樂但依實説亦成實語然非理解未能斷彼虗誰之心違想背心還成妄語亦有緣事想心若祥想心若祥想説亦無妄過然非理解方便之想不能斷妄違想而説則成妄語故此妄語但是凡夫又問前之三戒不定犯人者何答前之三戒是凡不疑故不須定此所稱法乃舉聖法以成其犯是故須定凡而非聖又目連語濫故須簡定第二門四門分別第一列數釋名得文以定依下增四但四妄語闕無蘭妄若取誑非人變畜及餘闕緣等並是不具分蘭足別成五若十律明了具明五妄故十曰不具足夷殘是蘭妄語既準文有五言五妄者一夷妄語二殘妄語三蘭四提五吉妄語此言夷等妄語者謂舉所得之罪以標妄言非謂舉夷等五以誰前境第二約所稱法聖凡分別位約為三夷一妄語以出世間法誑他得罪然此凡夫於出世法未實交語假偷在己誑或人境以謀名利損重過深故得夷罪第二殘提二罪同以世間法欺誑遙人實無三根橫搆虗狀以其重事誑僧見犯欲令儐罰惱他一生過中不輕故得僧殘或以殘謗治損輕微或違見聞背想而説此等結提第三蘭吉二妄所稱之法通世出世謂大妄下蘭即舉聖法二傍下蘭便稱凡法此中畜吉便舉聖法餘吉是凡故爾第三約所誑境三趣寬狹位二謂夷殘提三同誑人境所稱事殊故三階降蘭吉二妄通誑三趣以其所稱及境別故第四約事細分攝盡不盡問若如向説妄便多種何以唯五答以名類往收妄無不盡如言蘭如妄收一切蘭吉亦同爾故唯五妄第三虗實者位亦為三夷妄一種心境俱虗殘提兩妄不問境之虗實唯所心虗蘭吉二妄義同上二先解夷妄須俱虗者若是境實除斷巧為則無心虗若境虗心實增上慢人聖開不犯若心境俱實不犯此戒如實得道者是故知要須心境俱虗方犯此戒言境虗者實不得聖心虗者知不得聖問望何以説虗實者謂舉境心不稱口説以為二虗也殘提二妄境唯是事通於內外非是聖法無問境之虗實但使心虗皆成妄語作四句者沓婆俱虗彼人不清淨者境實心虗此二是犯有於不妄心不得出者是境虗心實見根等三境心俱實便是舉罪此二不犯此對四句故前二犯下兩不犯殘提義同就上二句犯中離為六心對小妄同異者小妄初三五俱虛二四六境實心虛謗中六心減是境心俱到境上雖有犯不犯事望我無三根並是境虛知無三根復是心虗故使不同小妄語蘭吉二妄法通凡聖故若聖法誑邊同夷俱虛若稱凡法同於殘提其唯心虛第四結罪分齊妄語本為誑人生信所以但使知解即得罪不待信方結罪其義何也答信相難知又結罪分齊口業聞知信在前境非口業所為何得待信如六疑怖兩舌毀呰皆不待乖分惱怖故此亦爾不煩致難第五自言有無理而言之通有自言如自言毗尼又一切戒皆問自言所以此戒偏有自言解有多説今一義解具二義者須有自言一罪重壞衆須衆治故如僧尼二䨱不同者是二虛實難知以內證法故若不自言事亦難知具斯兩義故有自言自言衆委治罰義易下謗亦爾自有難知非壞衆如小妄是自有壞衆非難知餘夷殘是非難知非懷衆餘提等是唯此及謗具足此二故有自言也又一釋自言有二一因問自言諸夷有今此戒中有不因問而自言犯以緣有故牒為戒本如增上慢大妄即有實得道問此彼遂文無除夢亦爾不同可爾所以復言若問者相對故舉然此等自言令不欲明自言衆知治罰故來此文有者以後翻前望首其罪謗中自言雪沓婆清淨尼䨱藏中作發覺因有斯義殊故須自言第二別解大妄制戒無漏真道聖所證法非是凡夫障穢之所然契以未得故胃假虛談自言己證或亂群心欺誑於世悕招名利以自擁己嘖法𠕀時中之重故須聖禁二釋名者言不稱實所以言妄妄説聖德事超凡境故曰過人法此是所防戒是能治之行能所通舉故曰妄説得通人法戒問何以不言通天法者多論言佛在人中結戒人有木叉人多入道多修善法勝於天故但使勝人己過於天又言但勝人得重罪天故無所論第三具三如上別緣有八一境界是人二人相三境虗四知境虗五説過人法六自言己得七言辭辨了八前人知解或有更加誑他心者義或可爾前八亦足四闕緣義者若闕初緣容有三蘭或言六蘭亦可單雙二闕各十九蘭闕第二六蘭疑相各三故闕三境虗作境實或有提吉或全無犯闕四增上慢人今是無犯闕五作非通人法容無罪容得偷蘭闕六作不自言己證或無犯或得蘭罪闕七輕蘭闕八重蘭是中具七方便就前戒緣起中文二初明起過二諸餘比丘六呵責前文復二初至不以飲食為苦犯方便緣二爾時婆求已下如念妄語前文復三初如來住處二時世下分散從衆妄語遠緣文三一時世聲貴者分衆之緣二時世尊下告衆隨緣文言同和上者蓋應結集之家反名前事捨和上等義亦同爾三時諸比丘下如教分散三時有衆多已下默念計挍妄語近緣文中二初設計方便二尋即念言下正明設計第二正妄語文四一彰己自得二粗顯他得三則狡名利四受利資身色力充悅第二呵中文二初至或無實來發覺所由二告諸比丘下正彰呵責前文中二初實語禮覲以顯發覺文三可知二妄語比丘以彰發覺文四初安居已禮覲世尊下有三文各一問答然第四文者因言捨問正彰得實通有所歸二正呵中文二初以實況虗呵説實遮輕聖情猶禁斷豈況虗談性重而向人説於二以輕況一舉數二列兩名並是虗情竊利減稱為賊損有重輕義分小大內實破戒無惡不造為謀名利自稱淨行是第一賊若以生法二空已去實未交證假誑求利是第二賊三次校量是中是前二中為口腹故大於初賊故名最上四何以故者釋何以初小後大故此以出世間法假偷誑人盜受飲食通實深重聖結夷罪故大於前賊説戒文二初一戒本三一略明戒本二蕂前隨開文一舉昔虗今實生疑之境無漏聖法出過相有名為增上然此比丘未得謂得名之為慢十律云此人久在山林不見妙色暫伏煩惱自謂永斷故生此慢後近城傍見淨妙色貪染還生知己是凡即便修道成阿羅漢二彼作是念下覩境生生者佛説告罪鄣礙聖道我亦修行得道準我境虗違於聖教似應是犯若當犯者不應得道今既得道復似不犯於此犯不犯中情疑未決故曰云何三伏除疑若制我是犯草心儐罰若言不犯依衆淨心進否聽教故曰乃至奉行四正為咨決五讚嘆開通唯其境虗應在犯以謂己得心實無巧開其無犯第三滿足戒本文七一人二境虗三自稱言下自稱得聖自稱言者總稱聖法二我已入聖下別舉言入聖者謂得生空知勝法者得法空我知是下得初果已去四自言彼於異時非妄語時望首前罪故五除開緣六七可知問所以實得道不言除增上慢者無別緣起故四五七等三句文略不釋釋初可知不知不見者此解第二句境虗自稱已下解第三句初釋總句二自言念在身等解下別句前文復二初解自稱言文云有信者謂稱得理解之信有戒者謂定道無作非謂五篇不犯若言持戒頭陀等多云犯蘭聞謂聞慧智慧者思修二慧辨才位放説法第二人法者下解上人法先解人法謂陰入界次上人法者總舉聖法故曰諸法無漏等法然是離相名為出要第二離明聖法初列十四章門念在身身念處正憶念餘三念處自言持戒八正中正語等是有欲者四如言足自言不放者不放逸數精進者正勤乃至十四初門有三初句從身念觀發得生空解有念者謂身念處觀能令人出離者謂發生空之解超度生死故言出離心鑒於法得理治心名曰洽習轉增近理心冥於法故曰親附此法第二修習已下謂發法空務進所修理解轉增悟達法空踰勝於前故曰修習增廣觀用從心故曰如調伏乘第三守設已下謂發無相真解録解在心名曰守設照理分明字曰觀察心冥無明解融莫二故曰善得平等正觀無漏真解現前堅固不退故曰已得決定見或永移故曰無後艱難縱任之地故曰自在餘皆類然據此消文且依一相相傳而釋究尋道理位應局定若諸門通然此亦難用今取分義如身念處有其出離乃至而得自在之能或諸位中與念處相應故故言乃至自在橫剋當位則不如是諸門類然自言得定有覺有觀三昧初禪無覺有觀中間禪無覺無觀二禪已去言空三昧者謂苦下與空無我二行相應定數若滅下四行相應定是無相三昧苦下二行集道各四此十行相應定是無願三昧自言正受者八中前二想正受者一切有心定對除色中亂故無想者謂二無心定對除心亂次四正受是八背捨背捨者謂一內有色相外觀色二內無色相外觀色三淨背捨四空處五識處六不用處七非想處八滅盡定前三背貪次四背捨下地謂空處背第四禪識處背空乃至非想背不用處第八背一切心心數法故名背捨亦名為八解脫今四中隨法者是第八滅定謂隨滅二十一心數法還得二十一非色非心法以補心處故曰隨法正受二心想者謂四空定即四五六七四背捨也三除色者前二背者謂以不淨觀除色貪故四不除色者謂第三淨背捨次一除入正受者謂八除入除猶捨入者解則分前三背捨以為此八初二各二謂內有色相外觀色若多若少次內無色相外觀色若多若少第三為四謂青黃赤白亦名八勝處八制入次一切入正受者是十一切入則以第三背捨為四勝處及觀色本四大故八并空處識處故十十一枝道者人言依成論十一定具一清淨持戒二得善知識三守護根門四飲食知量五初夜後夜損於睡眠六具足善覺七具行者分八具善信解九具解脫處十無載十一不著若依舍利弗阿毗曇解十一枝道云何一支道身念處是名一枝道云何二枝道定慧是云何三枝道有覺有觀定無覺無觀定空無相無觀等是云何四枝道四念處四正勤四神足四禪四無量四無色定四向道四修道四斷等是云何五枝道五根五力五解脫入五出界五觀定五生解脫法等是云何六枝道六念六向六出界六明分法六悅因法六無喜正覺等是云何七枝道七相七定因緣法等是云何八枝道八聖道八解脫八勝入等是云何九枝道九滅九次第定九相等是云何十枝道十相十直法等是直者正見正覺正語正業正命正進正念正定正解脫正知也十一枝道者十一解脫入是名十一枝道修者修五分法身謂戒定慧解脫解脫知見次重輕如是虗而不實下解戒本第六句犯相輕重於中文四一本境人報有二自作遣使以辨此二之中各有書等四法亦可五法結罪初舉口説餘四合結二靜處下對本境有無以明稱此據暗處語故第二我對異報自他各四如上又可或五可知第三若人實得道下望所稱説虗實類非類以辨輕重第四合對二境在緣彼此但列境想略無法想開文夢中説者則是除夢中業戒等多有此疑第二篇僧殘九門分別一起由三毒二配於身口三自作教人四解遮性五初犯種類六持犯方軌七二部同異八違制不同九下衆任運言起由三毒者初有七戒因三事起貪染心成次有二戒瞋心起成次有二戒因三事起癡慢心成次有二戒瞋癡起成二次身口者位以為四初二局身次二粗語二謗四謀等八口為正犯身有助成次二房戒身為正犯口是助業次媒嫁一戒身口正犯三自作教人者位分為三一有五戒自作成重教人同不同謂二粗語媒嫁二房自作定殘教人或同不同若教人作五於己有潤故同犯殘若泛教人於己無潤但可犯蘭二次有二戒自作教人一向同犯謂二謗戒自作教人為己不為己惱壞處齊暢思不殊故彼我同犯三有六戒自作犯殘教人但輕謂漏失摩觸自作犯殘人教偷蘭以無潤己故下謀戒自違謀亦得輕罪若僧未諫教言莫捨但得吉羅以無僧命衆法可違過輕微故若僧諫時教言莫捨則結蘭罪以違僧命情過重故周教人漏失若作教者得蘭不作教者吉羅何故此中前人用我言教違諫未成已得蘭者何答彼受教人但有自壞損他無僧命衆法可違過義是少故事成蘭不成但吉此中教人違諫一有自懷二復損他三有僧命衆法可總通義是多故不待事成教則結蘭問若調達違白未竟教言莫捨亦得蘭不答亦偷蘭若爾所教之人違白未竟得吉羅何以能教已得蘭罪重於所教其義何也解言調達正是所諫法可違結罪分齊違白竟時果既偷蘭故違白未竟但犯小罪又復更有僧殘重果可趣故中間犯輕能教之人非諫之所為無諫法可違結罪分齊又復更無重果趣故隨教語語則結偷蘭如似違諫有僧契結罪亦前却若違屏諫事成結罪若違僧諫得殘提時不待事成故今能教亦就衆別以明前却如觸等二要待事成教人違諫教則偷蘭問教他謗等我亦犯殘則教他懺我罪應滅答緣具不具故四性遮者媒及二房是其遮惡餘之十戒然是不善故是性惡第五種類者見論分為四位初有五戒咸是愛染初戒舉分淫之種類二房兩戒是盜種類二汙家惡行是煞種類四餘之戒等妄語種類六持犯是中二房具二持犯然前房半非除通量故自餘十一止持作犯亦可止作犯通十三戒作持止犯前房少分第二房令品別階降已如上辨七二部同異者媒嫁二謗四違諫等此七同犯而四諫得罪雖齊對境翻到謂各違當衆諫故媒謗三戒境罪俱等自餘六戒僧尼不同漏失僧重尼提多云女人煩惱深重難拘難制若與前重罪惱衆生又女人要在私屏多緣多力苦乃盈流故輕男子不爾隨事能出故重又可染患內外不同故有輕重比丘摩觸力能自固以限分前但得僧殘尼則煩惱厚重既受摩觸恐成陵逼深防中前故結夷罪有四不同故罪階降一死活二大小三染心有無四身分輕重尼懼陵逼故須活及大等僧據染患不簡死及大小等二粗惡語僧重尼輕以希數故又尼有趣重方便故得蘭罪僧無八事相資故得僧殘二房戒者大僧犯殘尼作犯蘭若就過量大僧得獨行宿善獨造房故制僧殘尼須伴護若共造房自無過量義故律言多人住屋不犯見曰二人造房不犯設令獨造希蘭罪若爾覆屋過三何故同犯答此據尺量分齊故二人不犯下至三節宜辨摧𢗞招譏不簡小大故同僧提問尼就有伴假獨義希則得蘭者尼是有伴假獨義希屏露二坐不應同犯答此就損業損微則輕又設獨造希而不數故得輕罪坐等就深至雖希數齊招譏至僧尼同犯若論不處分者尼無蘭若前居聚落僧儻無房故宜須造設不處分情過輕微但結蘭罪比丘丈夫得在蘭若樹下露坐安身進業今在聚落營搆私房故須重遮微其後犯八違前不同者前之九戒違佛制得罪後四諫戒違僧制招𠎝此僧前者則是佛前但僧若不秉則無違諫之殘殘由違僧故此四戒違僧前犯九任運有無七戒容有任運二粗兩房二謗媒嫁得有遣人為己作義所教事成三性之中犯七僧殘餘無教人故無任運就十三中初之九戒若持護衆行法違則壞衆行法後之四戒若奉順僧命息過不為顯衆法成就有被時之益名護衆教法違則壞衆教法前中復三初五內染以明壞衆行法次二兩房事和以明壞衆行法次二兩謗情和以明壞衆行法前五得三初一壞衆壞行法不壞於時次三壞衆壞行壞行壞時次一壞行義微壞衆壞時故漏失戒第一佛前不聽者多曰為正法久住故又欲止誹謗故又欲生天龍善神信敬心故又復欲是惡法正是生死之原愛道之本理應禁斷令梵行清淨故次釋名方便動轉標心究竟名之為故然分盈流名漏失故曰也通緣有三如上別緣昔解三緣一作究竟二方便動轉三失則犯今釋五緣一有境界六種非道謂須除道以道非道想闕此境緣則得夷故二六種等非道非道想以非道道想犯偷蘭故是以條部若非道想不疑僧殘三作究竟心四動轉五失則犯闕初緣得重不得此殘闕二兩蘭謂非道道想非道疑闕三四無犯闕五或重輕蘭緣起文二初犯於中文二初犯緣二隨念下正明其犯緣文三如常第二諸根悅豫下呵呵文中二先比丘呵四一諸根者發覺所由二諸親友下問答自言有二問答三汝所為下呵於中文三一釋非安樂妄計為過謂所為不善於理實違故曰甚苦當咸色報名為非因反謂安耶二此正法已下舉清淨願所作不應三汝云何下舉所作集因以結呵四舉以白佛二明佛呵第一先問自言二世尊下呵有三初行有違失呵二汝今已舉清淨法呵三汝今已下虗損信施呵戒本文三一略二開開中文五一夢中作事二覩事生疑三則具向已下仗託除疑四為申疑五集僧下説至開通若取作事應同犯據本無心故除夢中三滿足戒本四句一人二犯三開四結罪下略不解開緣句初句可知挊者已下合解二四兩句於中文二初犯相二若比丘方便下重輕相前文分六初列精色有七且對人囑當下又一人有七防巧可知祇等亦同可知二有一已下辨情期所為有十一事三若憶念下舉上所為錯互前七五十句先一句漫次對七色各為七句但對青中一句剋心相應化下六不想應犯次黃亦同餘五各爾故曰亦如是合成五十第四欲為樂故下承上五十配十一事作五百五十第五若於內色下出其境界先列六名二次第解內色者謂衆生身分心心法領納苦樂故名受色外色謂非衆生色以無心心法領納名不受色情非情合名受不受色色次有其三故六也第六若於內色下舉第四第五以防巧心先對內色作五百五十然內色中初舉第三第四錯互五十文但八句餘四十二略次若為樂故下舉第四第五為樂等五百五十作十一今八餘十一人四十二略無內色既爾餘五類然則成三千三百句二輕重中一自作二教人三文可知摩觸戒第二所以前者多論六義一出家人飄然無所依止令結此戒與之作伴有依怙故二止鬪諍競根本故三息嫌疑不但直捉而已謂作大惡故四為斷大惡故四為斷大惡之原禁微防著故五為護正念若捉女人失正念故六為增上佛法故比丘出家迹陀塵染標心界外為世揩軌若捉女人喪人宗敬心故釋名身相捫摸為摩二境交對曰觸故曰摩觸戒通緣如上別緣有道俗親疏廣説可知二人女想三染心四身相觸五受樂便犯闕初緣有十一蘭人境差中有三句初句欲捉人女前境變為人男得前心蘭或人男來𨲙處作人女想亦蘭第二或變為二刑或二刑𨲙處三或變作男黃門或黃門𨲙處非畜各四類前可解故合十一闕第二緣有三十三蘭亦可單雙合為闕境各有十一闕境二十二心亦二十二若準知方便説十一各上半五十五蘭各下半五十五蘭想疑各十一合二十二蘭闕第三緣無罪闕第四二俱有衣五十四吉闕出互有無九十偷蘭闕第五緣蘭此戒上下具七方便問曰何以觸鄰重境得究竟殘不名偷蘭若爾盜四錢亦鄰重境得方便蘭不得究竟答盜五假四成為是少一則方便增一得究竟行不淨行不假摩觸故下文言我今不觸彼身可得無犯佛言夷伽論亦爾內外境別起心亦異故究竟殘又盜相假故如再盜不滿相續成重可得覽二摩觸成一夷是故不類犯緣文四一如來住處二明其犯人三門佛前戒舉其前前四便手執下更設方便下二戒同次犯可知樂者已下呵責俗女呵中文二初舉折厭二人為能呵者二語諸比丘下厭人呵辭文二一彰所作非法呵謂所作違理故曰不善不合出離真軌故稱非法非比丘所作故曰非宜祈善得惡不合來儀故曰不得時第二我常謂已下顯己呵言有法喻合法中文二我常謂者彰己求善之心二今更已下不愜來情正是呵言喻中本謂者喻初句今更者喻第二句我謂出家有三善水滅三毒火今乃三毒之火乃從三善水生可怪之甚殊非所望故曰也今迦留下合合中先合下句則出前火夫主已下舉俗況道反合初句下僧佛二呵如常戒本五句一人二內有染心三境界四身相觸下正彰摩業五若觸一一下結犯廣辨中女人者如上淫戒説為欲通收覺與不覺等故不以有智未命終釋女宜言如上身者以下廣解戒本第四句九種摩業先解身業身者從髮至足見云若髮狐髮狐相觸蘭以無覺故摩業之中初舉前業下一一解釋若女女想已下解第五文中二初至突吉羅戒犯相若比丘下輕重相前文有三初明二俱無衣情濃僧殘二女作女想下在則情談得蘭三女作女想下二俱有衣情最輕微犯於吉羅俱無衣中文二初心境相應犯二是女疑者心不當境輕準此應有轉想今無者略前中九業就初捉中準下吉六句三四交洛五六雙顯初句受樂二不受樂既五六雙明此二豈可彳得是雙故知初二立位以不過樂不樂次二交二雙則成六句今解此中女觸比丘第一立位直言受樂次句是雙動身受樂應有交句謂不動身受樂則三若往觸女亦三俱設亦三故九若睡死少分但有往觸復九二九十八此是殘位不須不受樂蘭捉業既然下八亦爾則一百六十二殘心不相應疑想等一百六十二蘭今文所明但有女來餘並略無等就女來闕無交句故但有二二九十八女疑不相應門十八蘭罪次在有衣心境相應中三門分別一定多少有無第二釋文第三問答料簡初門者就捉一業比丘觸女六二立位句兩交二雙女來但設復各有六則十八睡死少分又有三六三十六捉業既爾餘八亦然合三百二十四若是女疑吉羅具論應爾今直就活女但有互中各二立位四各二交四則八闕於二雙四俱設中略無立位雙頭四但有二交故但十句對於九業九十句蘭餘皆略無心不相應疑等吉次釋文者身往觸女衣一受樂二不受樂此二立位句次女衣觸身二立位句五六二交還觸女七八二交衣觸比丘九十二交俱設方便捉業既爾乃至九同故曰亦如是三料簡者問無衣中受樂殘不受蘭何以此中樂不樂俱蘭答殘名是均故致階降蘭含輕重故俱得蘭問不樂應吉所以亦蘭答此互有衣位但使方便往觸必作受觸言者觸境皆蘭不問樂不樂以遂前心故使文中咸結蘭罪人名本作重言此三位俱蘭今直作觸心有殘蘭吉三也如媒三位亦分方便究竟之別故此亦爾問下文女人捉足禮足禮覺樂不動身犯吉此中第八句女來觸比丘受樂不動身而得偷蘭者何答此有前方便心修可當時不樂故亦結蘭彼雖覺乘樂以無前方便可稱故唯得吉俱有衣中一一如蘭中説可知輕重文五一對上當趣辨祇一時觸多女一殘一一觸多殘比丘知法多詐捉女共卜臥竟夜不動者一殘二異趣輕重問前篇同犯此階降者答良以患興於內觸境斯犯正道暢思耽著情深不蘭彼此摩觸非無內染情悅在境境殊人畜形別男女情則濃淡故有階降三男子下形報以辨四女人捉足下境心有無五境相五句粗語戒第三自下二戒前言同前凡淫欲之事皆極鄙穢故名粗惡今説其狀表彰在口故曰粗惡語通緣如上別緣有七一人女二人女想三有染心四粗惡語五粗惡語想六言語了了七前女知解闕緣準前説此中但明比丘染心向女粗語若前女人向比丘粗語若染心俱領亦應犯殘類同前觸文略不辨五分具有此彼互向粗語同犯戒本五句一人二內有染心三人女出境界四對説粗惡語五隨已下結犯前二可知女人如上緣中共粗語者是四粗惡者已下解第四文三一總解粗惡語二列八門三一一別釋第二門教化求者五云又從是願與我從事一切天神證知我心除二道已外説餘處支節及得表粗惡之言故曰若復非餘語如消蘇等類五若與女人已下解第五句結罪輕重文四一本境約業業中初説重境二除二道已下所稱輕境二天子已下通就異趣同趣形報以辨三法想犯不犯本迷為四四境想輕重為五嘆身索供養戒第四言多巧為美己之善招誘其情説淫欲事用以自適故名嘆身索供養戒別緣有七一人女二人女想三染心四嘆身説粗惡語五粗惡語想六言辭了了七前女知解此戒闕緣準觸説戒本五句一犯人二染心三境界人女四自歎下索供養有兩一自歎身有五句二可持已下索供養言自歎五句者一自歎身二修梵行三持戒四精進五修善法五僧殘已下結犯前三可知第四句中二初先釋自歎五句為四一釋歎身有兩一色身豐美二歎種姓二解梵行以精進解梵行故曰勤修離穢濁三解持戒犯戒方便之心名不缺治根本犯戒之罪名不穿離後眷屬曰不染汙一戒具三諸戒同爾四釋善法謂十二頭陀及諸善業等二作如是已下解索供養是第一之義若在女人前已下解第五結罪句輕重文三一對上業辨二異趣形趣三境相五句媒嫁戒第五婚之禮和合生死正違出離出家所為特乖法戒又紛務妨修相招譏醜不免世呵是以聖前為彼男女法返計謀以成謀以成婚禮曰媒嫁戒別緣有六一人男女簡非畜而於人中貴賤親疏並是犯伽論云指腹媒嫁犯蘭二人男女相三為媒嫁事四媒嫁相五顯事了了六受彼語等還報闕緣比説初至居士與作婚明犯二時諸男女意下呵呵具三人佛呵文兩一行違失呵二無數方便下舉略教呵戒本五句一犯人二往來者可得和合是三彼此謂所媒境界四正作媒嫁事五僧伽下結罪媒業文二初明業二成婦等是所傳之言乃至須申者謂暫時交會亦得僧殘二十念為一瞬傾二十瞬傾為一彈指傾二十彈指為一羅預為一須臾日極長時十八須臾夜十二須臾夜極長十八晝十二須臾或等或差可知五分乃至一交會下具解五上三別解二母護男下合釋四五二句上二可知解第三句男女互為彼此先解女有四一謂舉數二列名三解釋四總結男亦類爾合解文二初成犯相二若言嫁與他下輕重相前文有三初使義具三犯殘二從自受結法彼不報下具二闕一犯蘭三受語不往彼下具一闕二吉羅前文復二初先解第四句中下句所傳男女之言故文言母護男女遣比丘為使語彼言汝與我作婦一私通二須臾三一念傾四謂今媒者成前四事也二若比丘下釋第四句上句持男言等舉上所成正辨媒業文二初或一或二相參作六十四句次以三法相參作四十八句初文分四謂語書指印現相各作十六句初語十六者單語四句次以書配語作四句次指印配語作四句次現相配語作四句餘二各爾如是廣説五分受男語吉語彼父母不許還報蘭許還報殘不同此解但具三時殘次三法相參中亦四謂語書指印現相各作十二先語十二者語書指印一四廣文次語書現相一四次語相印現相一四此之二四略亦則止次書指印現相但父一四下之二四及餘二類悉略不辨略不辨前合一百一十二句對母設男女既爾乃至邊方亦爾各以一男始終互對女種女其文甚多蘭吉二位各三可知此三蘭吉於前一百一十二句各帶斯闕乃至廣句亦爾輕重文四一人趣文三一有無雖可有病猶有合義故殘二所媒重境就業以辨謂約語書等一反一殘者就業不約境説三言除二道下所媒輕境二異趣形報三法相五句此犯不犯約轉相故四境相五句略無人男人男相五僧不處分過量造房戒第六開前言有四一解制言然上行之報報力資強堪耐總緣不廢正修是以大聖制衣冢間樹下省緣修道不畜房舍二開言者而中下之輩資報力劣不堪寒苦制同上士交妨正修乃是彼人壞道之緣故隨分量開畜小房石室兩房言在斯趣三解又復制言所以開房而不聽過量不處分妨難者何然出家之人理無帶著隨緣栖洦安身行道若有信施隨時而受從有經搆容身長道今乃廣作營豫妨修長己貪結壞知足行又處處乞求惱亂施主不生敬信壞滅正法故制過量又專住自由不蒙指示容鄣礙僧事多惱亂故是以不聽妨處僧不處分又傷害物命違其慈道義自損復不聽有難四結罪言聖教況須理應煩奉故違法造今情過不輕是故結與殘吉四罪問四依中不行四前聖未前犯於開中有違則前與罪而重輕不同答四前上品若不能行則當開寧容有犯論其四開乃隨力分理合應行今者故違明皆有犯但屬是疏緣又兼多過故得殘罪餘三衣食藥等資身要急事不可闕又情至亦少故並得提次釋名專住自由不蒙指示名僧不處分大依稱為至量故曰也次辨離合先解離言問二今何以離者一主無主異二制量不制量三作處分法牒事相違故為二戒次辨合言就前今中二戒合者何答生罪緣同謂過量不處分並由一房而生故須合前如急施衣雨衣四獨二浣異語嫌罵等類次定初二者有人解前房過量初後房不處分初而前房中得有不處分者是第二以不處分名種不別故今解不爾處分名雖是同若用房分法並有最初前房無主不處分初後房有主不處分初其猶二不定所撿之罪並舉殘提對於二處屏露別故各有最初犯戒之言故知二房亦有最初不處分更爾妨難隨房類亦同然通緣如上別緣六一無主二為己三自乞求四過量不處分五過量不處分想六房成便犯若闕初緣犯後戒或三或二或一罪若作如法房令可無罪若闕第二為他作非房或二蘭二吉或三二一或可無罪若闕第三不自乞求則無過量容有餘三乃至無罪若闕第四作不過量處分則令無罪容得四蘭謂實不過量作過量想偷蘭疑亦偷蘭實處分作不處分想蘭疑亦偷蘭上四一於竟還立若闕第五亦得四蘭實過量作不過量想蘭疑亦偷蘭不處分處分想蘭疑亦偷蘭又此二準上所説者若闕第四但得二蘭若闕第五應有六蘭今且從舊説藏闕第六緣末後二團埿未竟已還盡結偷蘭一團埿在重蘭初至自斫樹正明起過廣大造房惱亂二趣二時彼樹神下呵呵中文二初明發覺發覺文二初樹神白佛此比丘雖犯𢗞鬼神村提吉但威儀違失是故佛言乃至不打持戒比丘亦可最初以下㥩生因此前故亦可言對樹神勸忍之辭二迦葉白佛所以不呵聖開造房承教起非故不得呵又可善識人心造房者多呵而無益將護故爾又為嫌責白已則去第二世尊以此已下呵初問自言二世尊以此下正呵文三一執其作事持勢乞求呵佛自開聽比丘作房而不以房故廣令乞求然此比丘言佛聽我作房與我竹草等來是名非法乞求二告諸比丘下舉事以況呵文三上二可知第三爾時世尊下毀讚以明呵為而乞故曰非時強求要得故稱不濡五耶四耶是故不正為衣食乞名曰知時須言信彼故曰柔濡乞食充驅是正乞求戒本三句一犯人二自求已下正教比丘房量大小指授方軌三若比丘下若違教作者結犯僧殘第二立法文七一自乞求有惱施主得過量罪若其自物則無過量二作屋除作餘總無過量不處分五分房者於中可得行立坐臥行四威儀三無主者以其有主無過量四自為己飄為他作於己無潤不犯殘罪五辨房之尺量佛𢷡手者諸文不定一𢷡手祇云二尺四寸五分二尺且依五分長十二𢷡手者謂二丈四尺廣七𢷡手者一丈四尺此據屋內祇亦云縱廣量屋內六當將已下教房主比丘乞處分方法問作大小房須乞處分見論云房六𢷡手廣四𢷡手作如是房不須處分律亦成文小客身屋不犯非謂開無過重後房本無過量何以開中除小客身若生四𢷡手六𢷡手已上無問過量咸須處分七彼比丘下教僧處分第三結罪中舉四種罪以結犯且結二殘故言僧伽婆尸沙於二殘中且釋過量應為三門一應量犯未犯二互過結未結三俱互罪多少初門者問二丈四尺為應則犯為為待過耶答過方犯故此文言若過量作者殘若爾長中八指四指不應則犯答房是過中制衣是滿中制以過中制故房舉未犯作衣滿中制故須出犯位所以然者長衣內開外亦開作法外開位故須舉犯以開不犯此出外開極小量房內開外不開無有作法外開者故舉未犯位則是內開極大量問房何不作法得過量耶答開過無益總長貪衣雖貯畜然先屬己無總故開二門者問為俱過結犯為互過亦犯答見云長中咸廣中過犯殘戒長過廣咸亦犯互過尚犯何況俱過又如下文坐具浴衣等亦同互犯今以長中過如咸對廣中過始咸三三三合九謂長中過中過如減一三餘二各爾是中五句有罪一俱四互四句無罪第三門者互過始終有其二罪若也俱過二罪以不答互據二房俱兩果亦語故先後二房各結一罪俱過房一後一業所作故但一罪若爾不淨食等咽業一故亦應一罪答不同結罪差殊可為四句第一或業一緣業或多或一第二或緣一異或多或一第三緣業俱同或多或一第四緣業俱異或多或一若互過房者緣一果異從業二罪不淨食等業一緣業從緣多罪今俱過房緣業俱同中前故但一罪比丘義解第一句次解第二七句中上五可知難處已下解第六乞之方法於中欲知無妨無難故先反解出妨難二處然謂虎狼師子及不通草車回轉是妨難然無上諸事是無妨難更處無妨等料理後竟須乞指不見論云其處猶如鼓面是故從彼比丘下乞處分法欲解此義略為二門一須知處分分齊如上辨二正明乞法先修威儀脫草屣等罪無禮足後房則有表己勤勤是故三説對此須知不乞如下辨爾時衆僧下解第七句教僧處分於中文二從初至如是持明教作法二彼作房下教其作事分齊此謂作持作法作事故爾前文有三一稱量作房人二若彼處下稱量事謂拾妨難事三應如是與下稱量羯磨於前人中此比丘為可信不立二至門初若可信者釋可信門二若不可信下釋不字次事中四句前三不應第四應與次作法中文二先差秉法人初言若上坐等約位定人五分則通謂在上無人名為上坐夷論則居作四位不差耆羊力不堪故亦非下坐以早約故如説戒中云上坐應作故是以但言若上坐若次坐言若誦律等者對法簡人第二正辨作法對此料簡應作二門一泛爾分別二正指處分初泛明者位為六門一能秉法人人位有三謂一衆多僧若隨事用分便有八一人但一衆多或二三四就僧中四別故隨用八第二所秉法法位亦三心念三語及以羯磨歷別則五謂羯磨離三故若隨事辨心念有七謂説恣二種分衣安居悔吉發露等類是三語可知羯磨彳多如七非義辨第三秉法處處中位二自然作法若以類分事便有四謂自然分空聚作法離大小若隨用開細分則九或上言九者如自然及大小此三各三故或十一者大小二界各四故爾但知自然中集專為結界作法中集下為解界及餘一切第四所為事事便有三一情如受戒受日憶念不疑呵覆等二非情如結諸界中二界相接隔駛流道遠等三二事合如離衣六年等類此之三種稱教者如違教則非尋事可知上來四者各有軀狀則四法現前及受戒者四緣是第五以人秉法就處分別還解上四為識前四用有通塞故爾若以人對法人三法三可知若以人法對處通塞分別一與衆多處通二四隨事十一但通其八不在三小局就結言故所以爾若僧秉三法對自然作法二者白二通而局可知餘唯作法以結界根本得自然中作如受戒根本同法非難等次作法中大小分別日等三法望大小二界俱有局通所以可知且如白二還衣離衣六年杖囊則通二界受日處分結淨攝衣罰令用舊持新白二癡狂學家四月覆鉢不禮分衣八德等居處除疑如癡狂等為衆立前前所常行故居大界餘二準知第六作法具緣以其對事根樤衆別極多具七次六下五故爾言七者一須假界界位有二等如上第二能秉人則上八等是然有如非如義有三一是然如謂非二十三等二集故如謂一身心俱集應來者來及不可者是二唯心集與欲者是作法依界手三然如和合如謂僧治一二三等反前則非準説可知第三蘭衆人有類非類法有分非分故除受戒王賊天龍尼衆等第四與欲欲義如下辨第五因起有無無者一切差人等有中且位為六一作舉憶念謂違而行罰等二者須乞情如法別所為故雖衣六年受戒畜衆覆藏等解七羯磨解癡狂憶念不癡等三者為衆前所常行謂竪標唱相説恣分衣癡狂等四者交治道俗及勸惡從善如互治覆鉢諸諫所為事等五前防僧別如學家異語等六始信婦投白僧試驗如形法二同四月等此之六義各不相假又復斷等互在衆集前後尋之可知第六問答令知若一坐多法須通問答隨問答作儻別問答一一更須別問答作故下文言出功德衣名有簡別故方便緣具故須第七正辨作法對事辨七有具不具位約為三謂七六五七者如一切治人處分離衣僧常行等言六者一切差人之類無因起故言五者如結界等無界欲此第六門亦無殊然還開上四對事增減有七六五如一假界則上處門以次集僧簡衆與欲此三合成能秉謂是上人次因起問答則是上事正作法者則第二法第二正辨處分四門一辨作法二對僧別二處三有妨等成不成四辨相應初門人唯四人僧非餘可知不同祇律路遠兩等羯磨差一二三人往彼作故又非客等此律不同法局白二非餘祇口法處分彼言一切都無誦羯磨者一比丘直言僧今與某甲比丘指授無難妨處三説亦未處在大界可知事應二合故文言可信不稱量人有妨等不應者稱量事緣具有七第二對衆別地者本制處分為檢妨難縱非僧他義容妨礙故但造房咸須處分如後戒文何處有好他堪起房舍則伐大樹亦制處分五分四衢道中多人聚戲處淫女市處等是難處又後戒亦云求作屋地見神樹處好則便代之故但造房並須處分三處分成不成問現有妨難作處分法得成以不答準祇律有四不成一越年二異界三妨難四界內作房者多然此律得成若爾文言不應處分何以處而言得成答處分本防不處分僧殘不正防妨難死所防不同雖有妨難從僧乞處分者免彼不乞專住之過故得成就是故下文不過量僧處分得妨難二告此文良證言不應者得小罪故問處分不防妨難者淨施應不防長答防長若處分應防妨難等答非類如處分竟時妨等猶起故知現有而得成就但為捨故須作此法違而得殘淨本懸防長過若説淨竟時必無長過故今現有不得成淨又彳以正防故無淨長生亦應無處分時妨等決起故知不並若爾煮宿等藥口法亦成答處分法者作處分竟不能礙彼令難等不生故現有成若論七日藥口迎手受能令七日內宿觸不生故現有宿觸不成口法又彳口防宿觸則便有宿觸時正從不作法生故不成就房中既有處分得難等生則是妨等不由不處分起故現有成就第四處分法與何相應此處分法與人處相應謂此人此處得作房故餘人餘處則不得作不同作不同大界為衆局與處相應多論云若餘人就此房上作重屋房主聽作則得無不處分罪以就私房上作非地故次就文釋初白次作羯磨凡言白者事有繁重則四若無因起但三今以乞為因起故曰中四句一告衆敕二牒因起三作法時至勸衆詳忍四舉其所作結成白辭羯磨文三一告衆敕聽二正辨事辨事中兩初舉聖所作言僧可否二僧今已下決判是非是則應默非便説衆罪和默是以第三僧已忍下結成受持二明作事五分發心至粗埿告細蘭成殘此文最後埿治訖者是問何以尼於僧寺造塔轉轉得罪作衣亦爾答房中自分故待作成塔據異類參涉又可比丘致敬失儀作衣容可生染招譏此二專制故隨作提不同此房如法則聽非法方制故須待成又可結法不同故爾自下第二解戒本結罪文二初幾犯相二若比丘下輕重相就前文中位有五人三一二殘作頭難妨俱互作第一三句二不處分殘第二三句次過量一殘等三三人無僧殘宜二吉羅俱互作第四三人無吉羅直二僧殘俱互作第五三據理如此有經文同但今殘中唯有過量一殘略無無餘二故十三句廣説可知問不處分及妨咸是總僧何以殘吉答法總故殘事總故吉又可妨者直是事中想總不處分殘者以妨等有礙故前作法今有妨過又不作法違二教故殘問過量及難俱是長貪所以重輕答過據總他難是自總故有殘吉亦可希數次輕重相於中文五一自作二使他作三為他作四房主巧師彼此立違五境於第四房主巧師中四句偏對過量初句現前拼地應量作者過作者犯房主得殘巧師蘭罪為欲一言總結二人故直言犯次句亦爾教人案繩墨作作者過作者犯如上三不報四不問此二句者亦通結兩人亦可四句者初自作二教人三不報四不同欲一言聰攝成不成罪故但言作者犯此之一釋不如前解第四境相中四重一初約處分成不成想疑以明法相正是對事止階汲五重依此文是則帶作犯然一名別故二約房尺量法大小不決想疑以明法於下二境想此四各五並犯不犯相對轉想故爾有主不處分造房戒第七以有主故不辨尺量與前有異餘咸大同別緣六一有主二為己作三長六𢷡手四𢷡手已上房四不處分五不處分想六房朱戒本亦三廣解亦三比前可知唯少過量為異無根謗戒第八然出家同住理應和容造相將設許不相總觸今乃懷瞋橫搆重事注人自壞心行增長生死以滅正法又後塵坌良善甄在衆外總他一生廢修正等欺門事深故須聖前故多論云為設自行正法久住故為止謗毀令梵行者安樂修道不廢正業故二釋名辨離合得罪多少內無三實稱曰無根重事加注名之為謗故曰無根謗戒問二俱是謗分二戒何答若據無根處齊橫加不別理亦合制但者前是無根次是假根是故須離若一向無根或見言聞疑等並是無根前戒中收若異事上見假言見此聞疑亦然此是假根在後戒攝次解合言問三根謗人各別得罪何以合一答若望得罪不必相假亦應立三但無根處齊得罪義等又後容有共證一犯是以合制罪多少者問謗他犯重實無三根誑僧有三僧虗解邊犯妄語提不答見云無別提罪以謗一向假虗成故若為我為欲損主假煞畜生不應損主重罪害命得提答謗定假虗無有是謗不虗解者是以一罪盜則不定自有損主不假煞畜盜絹布是自有損主須煞畜者非一向相假損主害命二境既別故得二罪若爾謗相假故一罪者七日藥但使是長其必非時亦應二罪解言此非譬所以爾者長未必非時非時不必是長如淨施者是但可無長不可無他非時可為四句一是長非非時如下六染犯是二是非時不是長淨施者是三俱是四俱非有此差殊故別得罪妄中一是妄非謗二俱是三俱非但有此二無有是謗非妄相假故一罪又得罪不同長七滿則犯非時七滿但罪緣假食方犯不似謗妄同在一時故但一罪次解具緣別緣有八一大僧尼二僧尼想三內瞋心四無根五重事加誈六下至對一比丘七言辭了了前人知解初緣大僧尼者甄下三衆一謗總義微不廢正修故二以下衆罪名輕故能謗之人豈容得重如似打奪大僧便重下衆則輕此亦同爾若爾隨順解義何以隨順下衆同比丘提解言同違僧命衆法處齊故俱提罪若爾尼與大僧五相隨順亦是同違衆法何以僧隨順尼吉尼順僧夷答雖同衆法尼傎敬教隨順義數故得夷罪僧無倚傍隨順尼希希故吉羅若爾僧倚舉尼謗尼殘罪尼無舉僧謗僧應輕何以在謗俱結殘罪以此類彼隨順同重一解謗就所謗罪名輕重在謗俱殘下衆吉羅隨順約傍希數中前故有階降故伽十二文云頗有是波羅夷則此事突吉羅不答有謂尼隨順不見擯比丘夷比丘隨順吉亦可違二重教故夷違一重故吉防不同此故有輕重但大比丘不問淨穢皆成謗罪律自顯班以其衆法但見聞中淨得作法事今違其見淨橫説見犯自懷總他不問淨穢俱成謗罪如戒本言淨廣中不淨故爾若爾淨不淨尼境俱生難答此律下文與著袈裟者行淫又言犯比丘尼者無所長益亦但具境俱成難過若爾數是解義不淨亦是數答足數就然謗據廢修是故不同若爾犯罪之人亦成懺境答此律不求如文至清淨所故五分下至不同犯亦成懺境若爾足食主人對成除法答懺開不同犯足無開業足又餘食然防西未犯足如淨施防長口防宿觸等類故不相並二具戒人想境雖通兩想唯局淨以不淨心對於二境或可成舉或不成謗故無不淨想第三瞋心如文可知問翻舉并謗所以彼具五德此但瞋心解言緣中具反第三瞋心則二謂粗損咸文言欲壞彼清淨行者是損減之言第四無三根則彼虗妄第五重事加言要説初篇則是粗礦第七言了非是應法對衆語時則彼非時但名增減據理具有問所以舉但其五此則八緣者彼以諸聖所舉所舉通輕重五德無量輕是以唯一品今翻舉辨謗所謗之罪通上下能謗結犯犯亦除降為結僧殘故須八緣第四第五對文説第六下至對一人謂準祇説對面罵謗五分若面謗解者殘今約義求要應對僧以求治罰是以文言則往僧中如上所説餘二易知次解緣義若闕初緣以餘五衆一於境雙闕則有十蘭一於第二疑想各五闕瞋心全無謗罪若有三根但非法舉若輕事加他或有提吉闕餘緣等輕蘭重蘭前戒緣中文二初至如上説重事加注第二時尊者已下發覺呵責前文復二初至便可作之謗方便緣第二時慈地尼下正明其謗前文有三初明如來栖託處所二尊者已下請營僧事為謗遠緣三時有慈地下因得弊房惡食共妹立計為謗近緣就第二請營僧中文四至飯食求請營僧事第二從世尊告下遂其請心差遣經營第三時尊者下既受差已料理僧事第四時世尊下稱愜聖心佛所喜美初文分二第一託靜生念思欲營僧於中文二初謂沓婆思彼欣厭欲求捨會二復作念下窂固之法非行不辦用彼營僧以為妙因五十並十四出家十六成羅漢見云摩羅者王名此是王子字沓婆第二從晡時起下舉二屏言請營僧事問沓婆既是阿羅漢而云此身不窂固請營僧者何答沓婆自知有餘身智然是生滅非窂固法未若營僧使多人修道福利反資窂固之法剋之不難見此益故請營僧事亦可供養佛僧大菩薩尚行聲聞營僧理何可怪見多並言報昔願故請營僧事與五分亦言報昔願者稍異可知須差遣者為應四方法故還以僧法差遣白二如文次第三料理文二初營舊比丘二羅閲已下料理客僧初中總舉所料理人及資緣為使同行相得人資緣備具於中先行同人次唄匿下明業同人行同者謂十二頭陀見云四方料揀料揀煩惱離諸滯著數雖十二位分為二謂隨坐一是人最勝於餘所行咸能同彼故稱隨坐餘十一人是其偏能未必通行於十一中復分為二常坐一人約行以辨對三威儀常坐是難立一頭陀餘十就緣緣雖不同且要為三謂者食處衣中立二頭陀謂納者三衣食中立四謂乞食一揣一坐不作餘食法處中立四蘭若冢間攝下露坐等所以須者食等者資道之緣濟身最要故先須衣若於此衣求用失方廣生罪纍鄣礙出道則非頭陀故教比丘於衣外資受用得方趣得資身長道使罷方成頭陀知足之行故今立二言納衣者對著檀趣施衣等言三衣者對畜長等雖得衣物以鄣形醜若無食以充軀內有飢虗等總行亦難未故須就食以明節量趣充飢長道以未頭陀言乞食者對食二種食人謂檀趣僧食食有多過故一揣食者對多食人一坐食者對二食人不作餘法者對作餘法人衣既覆形食充軀修道緣備必宜正修修行之未要託靜處憒兩既無心亦寂靜方朱頭陀故次明處蘭若塜間對聚落居人攝下露坐對受房舍但此衣等當分非無升降對餘所簡通為頭陀緣行並論有斯十二欲使同行相錯離於彼我共相敦崇進勵有方故曰共同等若與四依辨寬狹者四依名略而然寬以明其藥又該三品此中名寬而然略此少藥故又專上行若據緣行分別此寬彼狹以彼無常坐故
