body:
  text: 沙門法礪撰述尼楗度第十七次四楗度衆行之餘收上示盡者與大僧同已如上辨不同之法更須別件是故次明若就法為名應言受戒法今隱法從人故言尼楗度於中分二第一至受二根者戒明受戒法第二諸比丘尼聚在一處已下尼之雜行受文分二初至即是受戒正明啓請受戒方便二何等八已下正明受戒前文分二初至繞已而去自請不許二爾時釋翅瘦已下阿難為請前文分三先頭面致請二佛言且止已下抑而弗許三爾時摩訶已下不蒙允許致敬而退次阿難請中文二初訖為往佛所求請請之端序於中文二初明愛道涕泣流淚阿難請由二爾時阿難已下許欲為請第二正為祈請於中分三初至則令佛不久舉事直請聖彰女人有過抑而不許二阿難白佛言訖入正道亦如是舉思養請佛言報竟三阿難白佛言已下舉因齊果等請就第一請中分三先明直請二佛告阿難已下抑止不聽三何以故已下釋不許意有其兩喻前喻為彰女人自行不立故言女多其家衰微後喻顯能壞他不輕故如霜雹次舉思請先請次答答有四種一因我故知有三寶二因我故於三寶生信三因我故得受三歸五戒四因我故所以得道此非世間思養衣食能報彰己報竟次因齊果等請中先請次佛言已下如來許可以其功齊證等理在難違義無不許故也第二正受文二初至繞已而去以敬度女二時有餘女人已下羯磨受戒八敬文四初至如上說正是受戒於中有二先明如來說八敬及喻以付阿難二爾時阿難已下傳授愛道八敬之義前已解竟二摩訶言已下歡憘頂受說喻自慶不同五十唯愛道一人得戒祇律愛道五百並羯磨受三時阿難已下傳授使了還來啓佛四佛告已下彰度女之損五分愛道復白阿難願更為我入白世尊云我今已頂受八法於八法中欲乞一願願聽比丘尼隨大小禮比丘如何百歲尼禮新受戒比丘阿難復為白佛佛告阿難若我聽尼隨大小禮比丘者無有是處女人五礙不得作天帝釋魔王梵天王轉輪聖王三界法王若不聽女人出家佛之正法住世千年今聽出家減五百歲若女人不於我法中出家受具戒者我涅槃後諸憂婆塞當持四供隨比丘後愍我故受若出門見當牽臂言大德於我有恩乞暫過坐使我獲安若道路相逢解髮比丘足布令蹈上今聽出家此事殆盡阿難悲恨我先不聞不知若我先知豈當三請佛告阿難勿復啼哭魔蔽汝心是故爾也母論迦葉因請度女人罰摘阿難十事一女人不出家者檀越器盛食路側胡跪授與沙門二以衣臥具求沙門受用三儻應乘車馬以五體投地求沙門蹈上四常於路中以髮布地求沙門蹈上五敬心請至家供養六脫衣布地令沙門坐七脫體上衣拂比丘足上塵八常舒髮拂比丘足九沙門威德外道不能正觀十不度女人正法千年今減五百年羯磨受戒二文初餘女受法二舍夷拘梨已下顏貌端正開遣信受前文復二初明受戒前文復二初明受戒二拂去疑事初文有三第一至不應犯度沙彌尼法第二聽童女十八已下至除為比丘尼過食受二歲六法第三應求和上已下進以道法受具足戒於中有三第一至如是持正辨受體二善女人諦聽已下為說於戒行相第三汝已受戒竟已下結勸受持初文復二初明尼中作其本法二詣大僧正明受法於本法中亦有九文第一先請和上二次安離聞處中及前二歲並牒二女謂十八十二此謂出法家語故下問遮難中父母夫主聽汝不者對前二女若行事時應局隨所問不得一切總問從度沙彌尼至此受具委細法式如尼律中釋若至此中具解理亦無嫌佛為除疑愛道及舍夷諸尼亦得戒故通五百也遣信文三初遣信受二世尊有如是教已下料簡進否初文有三第一至白佛舉事啓尊二佛言已下為避難故開為遣使三聽一已下正為遣使本法中事如恆既異故不煩舉直明詣大僧中法事應有七一量前淨穢二衆中應差下白二差使口為差體三受使比丘尼下為彼三乞四應戒師作白文略不辨五對衆檢校文中但問字及和上尼學戒等餘亦皆略六正為受戒文但白四說相下事皆略不明七彼使已下直報令知不同三律計准餘律要須具說大僧羯磨方發得戒次辨雜行等法蘭若住處聽與白衣貿聚落住處者為僧故聽若房舍中不聽賣買等者非為僧故尼以不禮羯磨治比丘者不違八敬以佛聽故若過不豫尼者義則不合文言打罵及詭語此詭者違也謂違理惡語十律尼得與比丘作四羯磨不禮拜不共語不供養不問訊比丘得與尼作三羯磨受戒半月出罪也或尼有過為捨教授羯磨者謂不教授故不待更作羯磨捨之今解不爾又言應與作捨教授羯磨既稱應作明須白二立制治尼若言不須更作直捨而不教授名捨者衆犯可爾或治一二三人豈可餘尼全不聽教授豈因一二三等造過乘治他衆耶故應作法治之若沙彌沙彌尼等互過惱亂二衆者直治不改者尊亦與二師互治如上十律尼不得罵謗比丘及出比丘罪得語言莫近惡知識惡伴類等又言有比丘比丘尼二人共戲笑言語惱亂諸比丘佛言僧與是二人作惱亂僧不清淨白二羯磨與作羯磨已是比丘有所噉食如偷盜若是二人向僧懺悔乞解者從僧三乞僧與白四解捨不清淨羯磨所噉食莫如偷盜五分尼從受經經中有粗惡語聽書授若不知書聽隔鄣授若無鄣聽相背授不應共比丘布薩應半月請一比丘令從乞教戒人諸比丘不肯為乞佛言聽尼為作供養鉢囊腰帶香油前後食或未布薩為白或已布薩乃白佛言不應爾應於唱說不來諸比丘欲清淨時從起立僧前立白言大德僧聽其精舍和合比丘尼僧頂禮和合比丘僧足乞教戒人若僧已差教戒人上坐應答從某甲比丘受若無所差人有能說者應答往某甲邊受若復無者應答言此無教戒人又無能說法者汝等莫放逸明日尼問可否還以此言答之又尼聚落無比丘阿蘭若處有比丘比丘尼或道遠諸難不造或彼比丘不為和合遂不得請自恣者佛言聽練若比丘為比丘尼來聚落中和合自恣後比丘尼請自恣也又受戒中為尼說八相竟總說四喻次說八不可越法次說四依法尼廁極深捲手一肘小作口尼沽酒偷蘭遮尼出息蘭押油賣蘭尼不唱隨意食食者口口犯提法楗度第十八然威儀軌則行之正要能內攝心行外生物善因之為法此中廣明七種行法非一集在一處故稱法楗度通相而言無非是法所以此得法名餘不稱法者解言為彰法相差別故餘楗度隱其通名隨事立稱此中隱別就通故名為法就中文七初至如法治正明客比丘法所以先明者然出家之士是三界之賓宜間容禮稱法而行使內心清淨外長信敬行之要勝故須先明第二自今已去為舊比丘已下教舊比丘瞻客之方第三佛在王舍城已下正明大小便利儀式祇廁不得在東方北方應作而孔三孔廣一舒手長一肘半第四爾時佛在舍衛已下亦諸比丘乞食之軌第五佛在王舍城已下蘭若之法第六佛在王舍城已下受請行來進止威儀食上軌則此律應唱等得然後食祇律上坐不得隨食應待遍唱等得已食五十伽論並言行食已高聲唱僧跋十律又言待得遍聞等共聲乃食第七佛在王舍城已下染衣等法自下第四分房舍楗度第十九前明威儀法式造趣之行行不自成假資以立資道要用勿過房舍故次辨之於中文二初至畜枕已來為上行人說樹下露坐等法稱彼性根馮而修道生聖之緣名為聖之緣名為聖種第二爾時世尊在王舍城已下為次下人開畜房舍陰覆所居即四依中若得長利小房石室得受等第二段中文分為六第一至隨意正明開受長利房舍之法第二爾時世尊在王舍城已下之相珍敬推年長宿應受上好房舍臥具等人第三時有居士已下至聽畜來雜明房等諸法第四羅睺羅已下前施是施後施非法第五佛在迦尸已下四方僧物不應分等第六佛在舍衛已下賞營事者房分之法初文分四初訖禮佛而去瓶沙王竹園施佛及四方僧二時諸比丘清且已下訖作種種房佛言聽作正明檀趣作別房施諸比丘三時諸比丘欲作房已下至聽與水器共安一處廣時因房所須諸事四爾時世尊在王舍城舍衛須達長者已下給孤獨食為佛營構精舍第二文受長者房施以偈勸喻初一偈半房之功能弊潔總緣二持戒已下一行顯房所資行者成三學行三有半偈聖所嘉讚校量彰勝五分諸白衣以田宅店肆布施比丘不受譏呵言此諸比丘不堪受供養佛言聽僧受使淨人知第三文房中安隔著小沙彌佛言聽以斯文故似如同宿多房一戶無犯彼共女人上船疑佛言除直度若坐立若臥准此文說上同船戒似當尼女合制第四文所以布施之福不向佛聽法一步之福十六不及一者何答布施之業是福分善詣佛聽法開曉心壞令生第一解斷除生死是道分之善理不相並故言十六不及一分發心將聽猶生此福何況聞而信解如說修行對須達長者偈分三初有二句修道證滅故得安眠次有四句斷集除苦故得安眠三有二句結成安眠以此義故我則異於是第二互相珍敬文四初至白佛舉過緣啓佛二爾時世尊以此因緣已下審比丘意解三佛告比丘已下訖可得流布舉下況上似如況呵四自今已下辨應彰不應彰文二先舉其緣二汝等已下明應禮不禮於中先明不應禮有四白衣女人道俗位別故二後受戒者大小異故三犯邊罪等淨穢殊故四一切非法語耶正不同故次何等已下次明應禮文有五頭少沙彌尼禮人塔各六故十二種應禮次小沙彌尼次少式叉應禮有八謂人塔各四次小比丘尼作頭應禮有六謂人塔各三故少比丘應禮有四人塔各二故次亦應有五大者各作頭辨應禮皆除當作小故所禮境狹文略不辨如大比丘應禮人塔有二謂佛及佛塔乃至大沙彌尼應禮有十謂人塔各五除當類故餘可准此知第三雜明房事文三初羯磨檀越房與比丘斷理二比丘作房訖一切所須之具明為房所須一切法事三爾時世尊從毗舍離已下明給孤長者以園施佛及僧并伽藍中諸所須資具五分不應溫室講堂中剃髮除老病聽溫室中剃髮第四前施是施中初至若身汙舉緣二世尊以此因緣已下正辨前施是施言非法施者然舊信居士割捨房舍施僧受用要須三業清淨如法受畜若三業不淨見有可呵轉施於後不名非法若不見可呵轉施於後即是非法是以佛不定判要遣羅侯間前施主不見羅侯三業可呵佛方始判名為非法是中先立非如二章門二云何已下先釋非法文三謂舉釋結釋中有五章門一一人二衆多人三僧四己所同部立異部此五若依文一門下各作四句合二十句若以義求一門之下各五句合二十五句始施一人後施一人乃至第五亦爾但文略無次釋如法施受住門如文亦三釋中五句可知第五四方僧物不應分等者於中三初至具白世尊舉過白佛二世尊以此已下總言僧物廣制不應三何等四已下舉上四分料簡不應第二又四初總舉四方僧物不應為四種事謂不應分不應自入不應置不應賣以向但言不應作四種事為是誰耶故次第二非僧乃至一人此三種人皆不應作四又未知成否故次第三此三種人若各作此分自入等皆不成此謂不成分買等故言不應以不成故次第四者結罪謂是惡心礙僧受故犯偷蘭通結三人此但暫分故求則得重若爾分暫爾賣買豈暫亦言得簡答此等謂是惡比丘輩假作四法礙客受用故此賣豈並亦非永定成重也第三料簡中別舉四分各對前四文以料簡不成而結犯可知十律畏客比丘來以僧房臥具園林華分作四分羯磨與四比丘乃至與一人佛言不成分不成與突吉羅第六文二初至佛言聽移正彰營事人有勞須賞二有五法已下約德以辨應否若無營構之功又無德行可嘉不合賞勞有比丘僧地中造私房護不與僧應索取地應語言還僧地更無有理以僧地入己准此於僧地中私種所得是非可知祇比丘僧地中作草屋時上坐來次第付房此比丘不與諸比丘白佛言吉羅若不爾者應持草木業更餘處去又營事人甚苦先作求聽次白三與之得五年住自所作房復應次第得僧房若上坐來次得者與羯磨得者不應與若遠行俱付僧若還當取足前日滿五分經營主言我斷理反不得住佛言應量功多少極多聽至十二年隨意樂住白二與之十律若治壞房舍者六年住若作新房舍十二歲母伽二論俱十二年住後隨僧處分伽乞物不作房蘭從僧乞已不作蘭成他房自住蘭若作未成自煞若自言我沙彌黃門二根廣說如捨戒蘭就德中二初至亦如是應差不應差文列分粥一小食二法闍尼三差請會四敷臥具五分俗衣六分七可取八可與九差比丘使十差沙彌使十一既言分衣具五法應差明須差法也十律分衣人具五德知衣財一色二價三頭數四與未與五者白二差復有五法謂不愛等乃至知已分未分又祇林中無比丘知時限唱時打楗推掃地灑塗治講堂食處既人次第相續敷牀榆無人教淨果菜無人者苦酒中蟲飲食時無人行水衆散亂時無人彈指白佛佛言具五法不愛等應立維那白二差之隨有大德高明比丘不應作使第二有五法分粥入地獄已下約德有無以彰損益釋前須差具德人故雜揵度第二十資道之緣乃有無量不可別彰統名為雜故曰雜法就中文二第一至藏舉已來正明雜法應畜用不應畜用第二爾時佛在拘時睒彌已下正明大小持戒行法於前文中雜無宗緒具約為二初至應以腰帶繫龍牙材上宗明鉢法兼明餘物第二世尊王舍城菴羅薗已下雜明諸事前中文四初至聽洗已用食辨其鉢法五比丘問佛聽持迦羅鉢者黑色鉢舍羅鉢者赤色鉢第二時諸比丘髮長已下至彼著指印不應爾雜明資具言長一違應剪者非謂齊一麥得留此聽長一麥一剪故如髮長極至兩指一剃時至兩月第三爾時世尊王舍城外道六師已下還明鉢法於中文二初訖作眼藥已來為賓頭盧現神通力取木鉢故如來制犯不得輒現也木鉢非法外道儀式現通取者無益故制十律佛呵嘖已語言盡形擯汝不應住閻浮提乃往西瞿耶尼又作佛事因即制戒不畜八種鉢金銀琉璃摩尼銅白臘木石鉢畜者吉羅五分木鉢畜偷蘭遮餘同十律第二時諸外道聞已下田制賓頭盧故外道請捔神力正明如來廣示神變化度之事以有益故及前立制於中文四初至轉增一倍明說外道執制具念請佛捔試二時王舍城其地廣博已下訖從坐起去正明外道檀越調伏受記三爾時諸外道已下訖從一日至十五日遍六大城度集外道王及廣衆所度之境四爾時世尊東面者已下廣現化度正反前制第四日據佛水一把棄之前地即成大池其水清冷無諸塵穢飲之無患者謂現八功德水言八者謂輕冷𣽈美清淨不臰飲之無患飲已調適八中前六是其水體以不過四塵故謂初三觸塵美者是味清淨是色不臰謂香七八二德水功能文中但四請一冷二無塵穢三無患者四門餘四也第十一日神足教化十二日心念說法是應念等十三日教授說法一切熾燃等即是三輪第四世尊王舍城瓶沙王聽比丘入宮已下還辨鉢如非尼揵始𦿔惡罵梨奢被石打煞佛言有五法攝言得自申理不被若責一善說二法說三愛言四實言五利益言說偈有五初一偈總誦五法次下四行釋上總門初行釋善言次行釋憂言次行釋實言次半說言次半利益言第二自下雜明應不不應無漉水囊行半由旬若無以僧伽冠角漉水應如句形若三角若作客墎若作漉瓶若患細蟲應安沙囊中彼以雜蟲水棄陸地佛言聽還著水中祇燃不得九十燃持入當唱言諸大德燈欲入唱已燃唱已入滅燈亦如是若滅者不得口吹當以手扇衣扇其佛前燈者如目連五百問中說五分不聽以佛語作外書語犯蘭十律作盡聲誦經犯吉羅母論比丘白佛比丘種種姓種種國土出家用不正音壞佛經義願佛聽我用闡提之論正佛經義佛言我法中不貴浮華之言語雖朴質不失其義令人受解為要十律六群貸白衣債時要索倍者突吉羅若生物令投最若自投竄吉羅尼僧不聽債僧房若尼債私房舍吉羅尼自作酒吉羅供養舍利目連塔食不知誰應食佛言比丘若沙彌若優婆塞若經營者應食次佛塔食佛言塔作者應食覆鉢治白衣文四初如上說已受教行謗二時沓婆已下如來呵責第三佛告諸比丘已下作法治俗於中有二初明作法治罰有三稱量一有五法者稱量白衣次有十法已下稱量犯事第三如是作已下稱量羯磨第二差使告知第四彼即言大得阿難如是便為煞我已下隨順為解十律治時覆鉢白二解時名乞仰鉢白四羯磨伽論覆仰俱單白法母論白四祇律法豫優婆塞以解法故數共比丘論義得勝輕笑諸比丘佛言與作覆鉢白四羯磨佛遣問一比丘鹽義不解輕笑此是羅漢更問一比丘甚解名義而是凡夫佛言是故不解義者不得輕笑法豫懺悔佛言與白四羯磨解杖囊羯磨三律並有乞訶所詞所以須此默然者凡論衆法任持之本僧法既行和合為先若僧作非或如僧非等理宜呵詰但能呵者亦須進否若言不鑒物或無善伴雖見其非義應寢默是以文言舍利見衆僧非法羯磨無同意者欲默然任之佛言聽何以故恐僧別異故又有應呵以言鑒物又有善伴理必須呵故下文言阿泥樓䭾弟子衆中斷事捨不教呵佛言阿泥樓馱何能教呵豈非汝等舍利弗目連事耶今此三五前十默然次五和合所以然者心見是非寢不彰口故曰默然境心相稱可之崇忍故稱和合母論諸比丘集作法事不如法衆中有見衆僧作法不成此人若有二三伴可得諫之若獨不須諫何以故大衆力大或能擯出於法無益自得苦惱以是義默次隨文釋者若默非默別前十默然下五和合若如非簡異初五非法下二五如法此明非法就心以辨不約於境所以知者以其初五作法成就中三非法境有是非而名為五非故知就心也初句見他如法宜默情和而心不同自己得罪名為非法次句是他非法有同意伴宜呵改非默任為非第三句偷蘭小罪不合羯磨懺除默任不呵故說為非第四句人不盡集隱默不呵故非第五句說戒自恣戒場不集獨知不告成而說非次五境有是非而心如故初句客有善伴但言不鑒物呵成乖破為和故默是以心如次句言堪鑒物但無良伴呵亦無益故亦聽默下三准說如故可知次五和合初句如法應和合者法事稱理故曰如法口勸助成故曰和合二默然住之者謂己心同現相表和三與欲者形雖不往遙表請和故四若從可信人聞者上來三種心達是非所以成和合此第四心雖不曉以從可信人聞事如稱愜理須和合故亦趣集第五先無在衆中默然而坐者前所明四集衆時和合此第五先在衆默忍僧所作故爾然此五中第三情和餘四身心俱和亦可初曰即是應來者來二五兩默便成應呵不呵第三應與欲者與欲此五成故所以名如第二五者心和故如前境有成不成檢此和合正是僧集更無別狀不得妄引正文以證耶義增三中三種默然一如而默然二不知而默然三癡而默然對此寬狹者此之三十五並三中初攝故知彼寬此狹廣說可知自下第二人解不同又說上來僧尼二部戒本明止持行受戒已下至此明作持行止作行成必咸其果是以自下明大小二果謂尅三明五種勝法等今解不然此中不欲明果報為宗以文不言果報揵度正明大小持戒為旨是以文中為諸比丘說大小持戒楗度故爾上二部戒本舉十利果報勸修止持此中雖明其果亦舉以勸修作持戒也分文有二初至諸比丘白佛已來先明不受八不淨財展轉白佛彰少欲行成持戒緣起第二佛爾時以此因緣已下因前乘說大小持戒行法緣中文五初失王位因緣就中有二第一至沙門語虗王受比丘迎逆失位之因第二便與諸婇女已下至往前取象失位之緣第二時守象人已下失王位已至拘睒彌難中析願第三即至夫人已下申者願情籌量許請第四時優陀王已下正明請而許受然不受八物第五還至寺內已下舉以啓佛第二文二初先制名為大小持戒二如來出世已下正明大小行法言制名者受無優劣持有增微說為大小也亦可位別聖凡具不具異故言大小若就相無相分相心持戒解未圓滿行未究竟清淨名之為小無相已去得真空無漏理解資成戒品窂固名之為大若就內外二凡外凡未有理解資成行體未固稱之為小內凡已去片有理解資成戒品次勝名之為大若約人辨具不具別沙彌愴入佛法受體未圓行未滿足者名小比丘受體既圓持行亦滿故稱為大故曰大小持戒揵度自下廣辨於中文三初至行大曠野正明大小持戒法行尸羅既淨集生三昧是以第二自見未斷已下正明修禪第三彼得定意已下正明定有作用三明五通前文復二初至妨道法來先明凡夫小持戒法第二彼於此事中已下聖人大持戒法前文又二初至諸不善事沙彌小持戒法第二行則知時已下明大比丘大持戒法沙彌中三初訖開現淨行先明教主德備十號三輪生信之境二若居士居士子聞已下訖入非家道明得信之士念欲出家三彼於異時已下如前所念行出家之事第二念中其文有四第一先舉人生信敬因而起念二我令在居家已下念彼所厭三我今寧可已下顯念所欣四以信已下總結前三若居士居士子等者謂泛舉能信之人欲明此等諸人聞佛說法崇心欽重渴法情愍故曰彼聞正法而生信樂體佛說意深知在家迫迮猶如窂獄出家寬廓事等虗空故曰以信樂心而作是念念雖如是次彰其事故我今在家等者謂前所猒又言我今寧可已下等者出前所欣下結中以信結前初句捨家結前猒文入非家結前欣文次行出家事中文二初至入非家道與出家人同除捨錺好形同出家二與諸比丘同戒已下法同出家就前文中謂非生念時故故曰彼於異時其文分三初至皆亦捨離舉念中第二所猒以捨捨有二種一捨珍賂無常散境三毒因之以生擔纍行人理宜輕棄二眷屬已下捨其眷屬非良伴故羈繫行者故須捨割第二剃除已下舉念中第三所欣謂剃鬚毀其形好應法眼故以彰形同如文第三捨家已下結結中三句言捨家結前行猒言入非家道結前行故欣言與出家同已下總結上兩自下法同略不顯受法直列隨行其文有二初列十戒明不得作謂止持之行第二不取妻妾已下遠離嫌不聽畜貯諸物十中前種姓惡後六遮𠎝初戒文中一往舉制故曰不煞生此不煞者要離煞因故曰放捨刀杖謂離受畜田又起對治離故曰常有慈心等言慈念者嗔善根言暫愧者無瞋相應數故由此不煞故曰不煞生略無果行離盜中初不與不取等果行離其心清淨已下對治離淫中捨淫不淨行果行離修梵行已下對治離此二三對治皆是無貪第四戒中有四謂具離口四過故來必具有七支之戒今文列者為成離妄語是以人解此等十戒已下通具非具說故口中具四或可如此今且存初解成離妄語故但無七支餘文可知大比丘持戒者若事順應法不生罪纍名之為時故曰行則知時若事不應法多生𠎝各者故曰非時不行衣之與食是資道之緣儉則形苦豐則長貪理宜節量趣得資身充軀長道故曰量腹而食度身而衣資道要故外內須充許無暫離稱曰隨身若有貯積則妨修替業言如餘沙門者謂外道沙門雖飽食終日無所用心廣費信施竟何所補為彰比丘有法自居心悕出離若有為作如前便成無異於彼故下十七事者廣彰過緣以明離行次釋第二大持戒法告為七文者非今分為五尋文可悉言文五者初訖善學止息守攝根門行第二彼有如是聖戒已下訖亦復如是內資知足行第三比丘有如是聖戒已下訖念除諸蓋精進覺悟行第四比丘有如是聖戒已下訖常爾一心修由念止觀行第五比丘有如是聖戒已下斷除五蓋行所以知為五文者咸以牒前起後故如文可知又此五行當分成就漸次未窮故下文自見未斷諸蓋令心染汙慧力不明又前斷蓋示斷方法自見已下正明斷蓋得禪又可斷故次下得禪初文分三初總舉宗彰心之所欣二眼雖視色已下對根別釋三於如是已下總結對根善學成就止觀而行初文四句彼於此事中者謂能守攝根門人於根塵事中二修集聖戒者明心欣習謂於根塵事中方便守護不合有染故稱修集三彰心離染達空無性不取前相故曰內無所著四行成資適故曰安樂第二別對六根先約眼說於中分四初眼對於色故曰眼雖視色釋前初句此事中二而不取相已下釋前第三內無所著謂念捨智等禁守根門雖緣塵境不別違順境之義惡故稱而不取相不為彼染故名不為眼色所染究竟對治不為緣壞故曰堅固而住第三無所貪欲已下明行成資益此第四安樂句於順緣不生樂愛故無貪欲於違境不生苦受故曰而無憂患煩惱既無業身不生故曰不漏等第四竪持戒品已下正指護眼行體釋前第二修集聖戒對下五根文列四句釋上不異類前略舉故曰耳鼻等亦如是總結對根中分文有三謂法喻合法中四句第一於如是六觸入中舉根塵相對內外二法通名為入然內六根心心法等託根而生名入處亦觸入處外六塵者心心法等雖緣塵而起不託彼塵故外入處非觸入處今據總故言六觸入舉此六根識緣於六塵名之為中第二句正明假名行者謂是初文中彼也能秉六根之識不起染業名為善學第三護持調伏正明所學止行外防身口七支曰護既離七非順本所受名持復離意地三不善根名曰調伏雖復離惡若不修善無以趣道是第四正明止息修禪習慧第一明其觀行次解喻文有四初至象馬車與上六觸入根塵相對喻二善調御者與上善學作喻三左執控與上護持調伏止行為喻四右持鞕與上止息觀行為喻次釋文平地交道喻於六塵不取四為喻世間交道象馬所遊之處喻於六塵是六根識所遊之處如似交道假名行者秉於六根識等六塵境界中行義同駕象馬車假名行人能調根識象馬如似御者念捨智等控制六根不起諸惡離馳騁餘道破輪析軸修禪慧等觀行資止能有所成如右持鞕至所趣指下合中初至亦復如是總以合前二次第別合言於六觸入中合前初句三個善學合前第二善調御者護持調伏合上第三左執控也合得止息合第四右持鞕也第二行門先牒前行成故曰彼有如是乃至諸根二食知止足已下正彰行體於中分二初法說次喻說法說中二初舉其行體謂知足行故曰食知止足二亦不已下彰受資人食時觀行方軌於中文二初至淨行教欲食興觀第二故苦消滅下釋立觀三中下之二門就明觀中凡行者欲受食先起三種觀門第一應離觀者於中一離貪味二離令身充壯三離貢高憍慢謂意直身力強悅陵蔑他人故凡欲食時先須離如是意故曰應離觀二正事觀者思己所以須食食者為除飢渴趣得充軀僧離太少太多以降飢渴故不少趣得充身故不多第三正事功德觀者思己食食一為令身久住以揣食身無食支持散壞故二以身存故得修清淨梵行此是受資之益次持此法科釋下文文中還三第一亦不貪味至憍慢來是初應離觀門第二取自支身令無苦患謂離多少苦患即第二觀門第三明修淨行者即第三觀門觀法如上說次故苦已下第二總攝上受資等意舍利弗阿毗曇云何斷故受不生新受若人飢渴能生身心苦受是名故受若食過度即生身心苦受是名新受若知足而食得免舊飢名斷故受無過分苦名不生新受今此文言故苦消滅者是斷故受新苦不生謂不生新受既不多少故言無有增減言有力者謂以自支身故言無事者謂無增減多少苦事故言令身安樂者謂身不壞散得修清淨梵行故第三喻中分二先與第二觀門得自支身合無苦患作喻二與第三觀門得修淨行作喻但順此二門即總釋初門彰有所離初文中先喻四句一男子女人喻僧尼行者二喻飢渴故名身患瘡三以食資養故喻以藥之塗四除飢渴故喻瘡差次法合可知第二喻文先喻四句一喻僧尼受資行人故曰譬如有人二喻內資之食故曰膏油三喻報身故說為車四喻為求大果積行方臻故稱為財物故從凡入聖故言欲令轉載有所至到法合可知第三行門先牒前二行如文二初夜已下彰第三行體初舉四時分齊以明䇿進略無晝日中二時二若於晝日已下次第牒其四時以釋精進文相可知第四行門先牒舉前三如文所列次常爾一心已下正彰第四行體於中先開二門一明動靜常攝故曰一心門二修四念處觀與法無差故稱心無錯亂門二云何已下牒門解釋先解第二四念處門謂身受心法此是四念處觀觀五陰故觀身不淨觀受是苦觀心無常觀法無我遣四到故慧為正體從境受名故有此四又言念者從伴念數受稱故曰四念處身念廣文言內身者自身也自觀此身三十六物九孔常流甚可厭患淨相不可得故舉身念處自非精進善修對治無由能成故曰精進不懈正觀既成離於淨倒故曰念無錯亂貪欲對治故偏彰名調伏慳貪世間憂惱若觀己身不淨或著他身又須俱觀內外皆令不淨觀行方成觀身既有內外等別餘三類然故曰亦如是二却釋初門常示一心於中文三先法次譬如已下喻說次比丘亦復如是已下合喻第五行門先牒舉前四如文二樂在已下彰第五行體於中文二初至水堓間先出修道處所二彼乞食還已下託處斷蓋其文復二初至繫念在前斷蓋方便二斷除已下正彰斷蓋文有其三初法次喻後合法中五蓋者謂貪蓋一瞋二睡眠三掉悔四疑五一先辨離合貪瞋疑三是使性故獨為蓋餘二是纏輕微故二二合亦以對治同故次辨體性合用三十煩惱以蓋體謂總有七煩惱貪嗔睡眠掉此五通五種謂見諦修道即成二十五疑唯見諦故四悔局修道故一此之四一復是其五以五并前豈非三十次辨所蓋此五覆彰故名為蓋謂三行貪瞋鄣戒掉悔障定睡眠鄣慧疑一通蓋三學行次釋其文對色貪故修不淨觀對財貪故修少欲知足行此行既成不為貪蓋所縛故曰斷除慳貪能治之行不與所治同體故曰不與俱慈悲觀成斷除嗔恚等餘次可知次喻亦五初喻貪蓋假名行者為貪心䇿伇不得自在義同於奴貪能驅馳行人有自在之義如似大葉厭貪修道斷蓋斯盡不為貪心䇿義同與姓對治之行由厭貪而生如以大家與姓安隱脫奴彼作是念者出觀之心塵已得度不復從彼貪欲第二喻瞋瞋心劫人善財如以債主又如有人喻假名行者厭嗔修道義同舉他財物精進道故曰而行治生善根增長故曰能得息利無得道正除瞋蓋不復劫人善財故曰還本既畢解脫道纍外而起故曰復有餘在假名行者以法自娛故曰足以養活妻子下出觀自慶其文可知第三喻者定除掉悔故曰從病得差定味資神內心怡悅如似食飲消汜心悅形暉故曰身有色力第四喻者眠蓋所纏如窂獄慧解一興斷睡蓋斯盡故曰從獄得出第五喻疑假名行者修三學行善財以自資養義同多持財寶生死無岸稱為曠野慧解一興斷疑蓋斯蓋故曰不遭賊劫第二修禪初文三一除鄣得禪有三謂法喻合第二此是最初已下約數次以結第三何以故已下釋得所由餘三應三應亦名爾但二三兩文少釋得所由又第四禪中二喻二合二別也第三五種勝法及以三明五勝法者身通分三第一從實報四大色身化作化身四大以定心清淨見能所四大各異次辨化色無化心次廣明身通輕舉自在次天耳次他心此五文中初勝法有三一牒前定心依定得法文三謂法喻合喻中有三鞘篋廉喻實報身刀蛇及衣喻於化身第二是名已下約數次以結第三何以故釋得所由次無化心文三如前化色無別心依於實報色心以定心見彼化身四大殊依於實報心誕了了分明此心在此身依身此者謂在依於實報故繫此身者謂化身四大繫心誕次下三勝法文亦應三略無第三釋得所由第三勝法喻有四重同喻自在次辨三明文三如五勝法五百結集法毗尼自下第三流通分所以知者如來出世隨根施化利潤塵沙今感盡應遷將歸泥越委囑迦葉憂婆阿難欲使採佛成言載傳竹帛利益末代元付之意為其流通故所以知於中文二初五百七百後代結集以明流通條部已下佛現在時付囑流通所以後代之事反在前明佛現在事回於後說耶蓋是集法者意情見不同如五分說此五百者律未而明為表末代方有此故十請名之為序為表由結集故三分之文於茲流演有發起義故稱之為序本此律置在正宗之下佛流通上為表結法上收正宗下攝流通義勢之便故在此說前中先明五百次辨七百此二何殊略有六異一者意別五百為止謗等七百為檀行滅淨二所集之法寬狹五百通集三藏七百局集毗尼三時節有異五百佛去世後當年結集論其七百佛去世後一百年後為跋闍子彌諍方興四處所復殊五百在王舍城迦蘭陀竹薗賓鉢羅窟其七百者在毗舍五集人不同數有多少五百者大迦葉憂婆阿難等七百一劫去離波等六重不重異五百重集故前後合有一千人七百無重也先解五百結集法毗尼者能集人數集佛所結載之竹帛故稱結集理行二教俱是行之軌則滅惡之能是故總稱名法毗尼所以須此結集者略有五義一順舍利弗請故二不違佛酬請故三順佛付囑意故四為止謗故是以下文句令外道以致餘言沙門釋子法律若烟五為遮惡比丘以成善故如文為跋難故可知文中分二初至不燒自然正明俗人殯葬闍維崇修福業是結集緣起第二時大迦葉已下恐法隱沒結集法藏修行智業次釋初文諸善比丘聞佛涅槃傷失法益咨參靡所念法情殷不覺自投於地惡比丘輩聞佛涅槃轉生歡喜慶己得脫無人遮制彼佛在時制御我等是應爾謂止持戒當修是不應謂止犯戒應棄是應作謂作持戒當修是不應作謂作犯戒莫犯也今既去世任我所作何斯快哉起下結集之緣迦葉至世尊舍利所棺槨自開現足者如付法藏云迦葉說四偈超哉三界乘永渡生死海寂然無相願微妙難思議佛日甚明淨能除癡暗冥積劫修苦行誓渡諸苦人云何於今日棄捨本慈悲全身處金棺寂然安不動唯願天人尊顯現金色身普令一切衆興起無量願迦葉請已方現雙足者為今五百比丘覩變致敬以得道故又今依足跡尋求故也女人汙足者為表滅法之相也佛事已訖迦葉又說三偈如來足踝滿千輻相輪現指纖長柔軟合網縵成就大悲濟衆生斷世衆疑結是故於今日頂禮最勝足我證四真諦說佛功德聚已讚嘆供養宜還𣫍足入說如是已然始闍維十律舉佛舍利入拘尸城新論義堂上諸八國王集兵圍繞奪取舍利姓烟婆羅門語諸王言如來大悲何有戰鬪諍佛舍利因分八分與八國王即為八塔盛舍利金瓶九為瓶塔闍維之炭十為炭塔第二文三第一至令在數中恐法將滅蘭集智慧結集人數第二諸比丘皆作是念已下料理房舍資道之緣第三時大迦葉已下正明結集第三文中跋闍子比丘說偈生阿難厭離心上三句示所應求有三初句所託靜緣次句示所求滅果次依禪獲道第四一句譏其所作次因生厭離頭未至枕證第四果復說一偈上半自言證果非難為給侍佛故寄居覺地下半絶離生死得安隱眠第三結集文三第一至白如是單白和僧第二時阿難已下刊定是非滅諍除罪第三時大迦葉已下正明結集五分大迦葉為第六上坐第二文二初滅諍諍者謂諍雜碎戒然諸比丘言各不定迦葉秉宗之人將欲結集恐廢大事理須刊正故曰自今已後共立如是制限佛所制者集佛所不制者不集如眼輒入見佛波逸提者是問何等是雜碎戒耶答大迦葉猶作如前立制不曾刊正今所請立恐不當理第二次除罪者母論若外道聞諸比丘捨雜碎戒便謂已制微細戒相與俱捨謗言如來弟子悉捨微細戒但學四重猶如火烟忽生已滅何名沙門以是義故尊者迦葉罰阿難七突吉羅為顯不捨微細息謗故爾問五篇之內不具此七何名已制答篇自雖無事己有故又問迦葉立制佛所不制共不應制今者七罪豈非擅行耶答一以事先有故不名擅制又可二大士共為影響為示不捨離碎而不集在篇限故不乖前制大德迦葉總據教相威儀違失結過遣懺阿難實自不犯以得果故為是常就內心自省無過信於迦葉教相有違尋即悔過為顯不捨雜碎故爾七事如文祇先結集次罰七越毗尼並是憂婆離罰一請佛度女人二不請佛住世三腳躅佛僧伽梨四佛索水不與五不請微細戒六以陰藏示比丘尼七諸力士母啼哭淚墮佛足不遮爾時阿難不受二罪一請度女人三世諸佛皆有四衆故二不請佛住世者我是學人為魔所蔽故是中五罪長老如法作五分先集三藏竟次迦葉罰阿難六吉一不問小小戒二腳指押佛僧伽梨三請度女人四不請佛住世佛索水不與六女人先禮佛舍利恐其日暮不得入城故十律六吉一不請微細戒二不請佛住世三足躡佛足衣以大風卒起更無人是故躡四佛索水不與五請度女人言三世諸佛皆有四衆何獨今無六以陰藏相示女人令女人厭女身後得男子故大智論迦葉言汝更有六罪一請佛度女人滅正法五百年二佛索水不與三不請佛住世令法滅度四足躡佛僧伽梨阿難言爾時大風吹來墮我腳所非不恭敬法故五佛陰藏示女人而不遮者欲令女恥女人形修佛相故而總言汝自六吉罪今當懺悔且就四律若據四分七罪之中五罪貫通四部謂除侍者一罪不同三律三律無故女人汙足不同十五二律五分於五同罪上加一聽女人先禮舍利十亦五同第六加一以陰藏示女人祇則六同唯無侍者加一以佛陰藏示比丘尼故成五七同異如是正結集中文二初大迦葉五百人先對憂婆離集毗尼藏次對阿難集餘二藏十律集一法竟迦葉次第問五百比丘言爾答言爾文言如初分說等者非謂佛現在等時有是分名可指蓋應律主譯律之家不能繁文略指之毗尼有五一比丘律二比丘尼律三一切揵度四條部五毗尼僧一故曰都曰都為毗尼藏修多羅藏五者謂四阿含并雜藏合為修多羅藏阿毗曇有五一有難二無難三繫四相應五作處合為五是阿毗曇藏第二更為富羅那等五百人重集前後千人七百結集於中文三第一至分之正明㕹闍耶說十事言是清淨第二時有耶舍伽那子下為欲刊正是非久招治罰廣生諍訟第三伽那子作是念已下簡集智慧詳定是非斷滅諍事刊定律教正是結集使正法久住第二被治中初作遮不至治差八德送懺謝白衣因令彼信謂引受寶戒緣佛說四過四喻等若持金銀決定知非沙門法耶我作是說聽為行第草木故求乞金銀終不應自受取金銀此是為餘衆事營福得求故言我作是說等五分我雖常說須車求車須人求人隨所須物皆聽求之而終不得受畜金銀珠寶下有五偈誦前過喻等於中分三初兩行三句誦沙門四過於中分二初兩行誦前沙門作前二過二次三句誦耶命一過第二次有三句如是已下誦前日月為四事所曀喻第三一行半舉前法中鄣過於中分三初三句具癡貪所造上四業次有一句非但造業亦不能進道末下二句𠎝招來報次復重被不見舉治斷諍文二初至不得和合佛法事重廣集智人刊定是非使耶法不行正法興顯就此門方解十非三門分別一定十非倚傍之相制成非故此之十非皆倚傍聖教說相似文句言佛聽可故一言二指抄食者謂己是其少欲非是一揣食等四種多食言不犯之足以其文無制二指故也制言亦犯所以爾者凡食制後坐若欲更食開餘食法即是餘法本為對治再食之貪今既再食不加餘法明是犯限誰問多少是以文言足食已捨威儀不作餘食法提故言乃至不作餘食法以是故制二村間者本制僧食及以聚落須作餘法村間非是得食之處文中不對村間合制我今村間食者應不犯足制言亦犯以是後坐亦開餘法餘法對治再食之貪但是再食誰問村之內外是以文言足食已捨威儀不作餘食法咽咽犯提故曰乃至以是故制三寺內者以見僧破已後耶正既分各作法成類如滅言諍中驅出三人不足斷淨人數應同破僧現簡數外別此三人應不犯別故言寺內答不同正耶今此犯別所以爾者以闕德故不在斷諍人數是比丘故別之犯別前滅諍中略故不言取欲今此七百文言應羯磨差二三比丘取諸比丘欲又以說欲文中不除被簡人故又言六群別房說戒佛言不應應和合一處說戒故曰乃至如布薩中制四後聽可者執前與欲後作羯磨得成我今先作羯磨後與欲者為表於和先後何殊明知亦成故曰後聽可制言前和合後作法義順無疑前作後和者以作法時情隔是故不成是以文言寂靜衆僧有事異比丘白佛病比丘不來佛言應與欲以彼先與欲故故曰如布薩中制五常法者如儉開八事此非常開計以為恆故曰常法制言非恆應觀修多羅檢校法律知應不應是以文言佛告阿難我以穀貴時慈愍諸比丘故聽內宿等八事今故食耶答言故食佛言不應食若食如法治此義如藥法中制六得和者以見蘇油得食不犯足謂其酪者是蘇蘇種類和蘇而食應不犯足亦可見罽尼和成石蜜體壞不犯謂酪和蘇亦應不犯足答言如不作餘食法中制此既指彼文將知法闍尼等須作餘法中油蘇等與時食雜故即是此和也七共宿鹽得食者以見盡故形壽藥於鹽不犯宿觸故制不得者如文時六群以共宿鹽合食食佛言不應共宿塔食合食故曰如藥揵度中制又復文中唯開盡形壽藥故五分云鹽薑合共宿八飲闍羅酒者五分謂之未熱酒也今言得飲者以見木汁元無不醞釀又時未變漿故聽飲即說元醞時久變成等者還是木汁不異何不得飲故曰得飲闍樓酒制言不得飲若漿所攝聖者聽飲食若也元醞或得變成是酒所攝聖不聽飲是以上文八中前四假無似酒之狀並不聽飲故曰乃至如婆伽制如雜揵度得奄婆羅果漿佛言聽飲若未成酒聽非時飲成酒不應飲若飲如法治十律貧住處淨我等住處貧作酒飲九得畜不截坐具者准益縷之相不截不犯過量坐具不截而畜亦應無罪若准不褋亦得起非制言不得畜要須截令應量是以文中量者長佛二搩手廣一搩手半更增廣長各半搩手以佛言制量故故曰乃至六群比丘制十得畜金銀執受寶已捨而付俗俗還付我聽為彼故掌我令雖受一法即作彼人物意受明知不犯制言若寶在彼邊可容不犯一往即作彼人物意受者寶在我邊與跋難自受置肆上何殊故曰也第二須知攝諍謂二指等八諍犯不犯寺內後聽可二諍成不成並是事同見異故又下滅中簡集智人五法現前滅故知並是言諍所攝假許被治羯磨者言諍中事作也第三定其名種是中事十種七犯名有二謂唯逸提吉羅言種七者初二及第六和此三是足食種三四兩事別衆種福是內宿過量坐具飲酒受寶常法一事若言常法執俗時所作者驅教是非不驗得吉還是種七故今解常法謂令開八事種自四謂不受惡觸自內二煮合前便有十也第二正滅中分三初訖諸上坐皆集明作自簡人取欲第二時一切去上坐至令衆人皆知明在那梨林中屏處斷理滅之方法第三彼諸長老皆往已下對大衆及諍比丘前五法現前滅欲令大衆咸知其非辨非從是故五分離波多問一切去上坐言鹽薑合共宿淨答不淨問何處制答王舍城因練若比丘制問犯何等答犯宿食提又問兩指抄食食淨答不淨乃至犯不作餘食法提後坐食淨越聚落食淨亦如是又蘇油蜜石蜜和酪淨不答不淨問云何答非時飲之答不淨乃至犯何事犯非時食提又問餘闍樓羅酒淨不上坐問云何答言釀酒未熟者答不淨乃至犯飲酒提又問作坐具隨大小淨不答不淨乃至言犯提又問習先所習淨不上坐問言云何答習白衣時所作上坐言或有可習或不可習又問求聽淨不上坐云何答別作羯磨然後來求餘人聽答不淨乃至言犯何隨羯磨事又問受金銀及錢淨不答乃至犯尼薩耆謂下十非籌問竟共還都集後於大衆中更一一如上問答下一籌已作是離波多唱言我等已論毗尼竟若佛所不制不應妄制若已制不得違爾時衆中一切去上坐百三十臘離波多第二百二十臘三浮陀第三百一十臘合有七百祇律單汙一非謂布薩時教化金銀寶物受已各分耶舍共之起諍得舉羯磨已求衆多聖德集結毗尼藏已驗已驗無斯理方制受金銀為非條部已下明佛現在時流通於中分二初條部者正明憂婆是傳持之主咨問犯等決疑却滯第二增一已下就數限約迭相屬著以明流通言條部者條牒上部所有疑事一一咨決使識相傳持故曰條部問諸經之中皆問名已然後流通此律所以不問名者何答修多羅化相之教明理淺深得名不同乃有無量故須問名定其宗方此律行教局毗尼藏更無諸名之濫故不須問於中廣問初四戒第二篇中但問其六自餘悉略不淨行戒有烏鵄揄完女人索而不還不犯者主作捨心成屬飛禽復無盜人物心是以不犯不同鼠盜胡桃主既不知無捨心故後作人桃想取是以犯重又解他脅子獨子等皆無盜損之意唯有慈愍之心故亦不犯後有心故是以後犯盜戒第二若作女想取男物等犯者此於男女上心差恆有盜人物心不差故所以犯此女作彼女想等此亦緣女名想差人心不差故佛言遮者偷蘭遮謂善心息偷蘭雖此不直五以本損處滿五故成重夷至此直五者亦以本損減五故蘭至此分之人不滿五通作一分者以教他葉中滿五故又但損主滿五故不須約人得滿不滿如燒埋等但成損五故盜輕重者義如上釋欲盜他衣錯得己衣蘭者謂是境差蘭也己衣全無罪以非生罪境無別損故并得己衣蘭者謂欲取他二衣但得一衣犯重并錯得己衣由己衣故不得他衣亦是境差蘭也再盜不滿五者以前後合制犯重謂是一主又又心續不斷故合成重如其異主或可心斷但犯輕蘭以二業各不滿五故時有比丘犯盜取物而奪彼盜者物疑佛言波羅夷執此文四分制義一入賊手並不得奪賊此義料簡如前盜戒中說盜心倒易他外分籌佛言舉籌下三句須定便波羅夷如分物共他記數物先我邊若盜取訖數籌欺他取物故夷非謂墮籌分物舉分物舉則未犯也又言倒易者若受犯物移已得入未得數若付他物移未得入已得數坎次盜他分物籌者如記數多取令使少者是轉側他籌者即上二事未離故蘭守視及則與比食得受者自盜屬己便是己物是故比丘取之無犯但莫教他無根取他食疑佛言夷者師不遣取故曰無根檀越邊作盜心故犯重亦可師不遣取故曰無根檀越施與師竟於師處心取以犯重無根取他食得提者他不遣取是曰無根所稱人邊作親友意故不犯重誑檀越取妄語故提以慈心憐愍小兒意無盜損之心是故不犯凡人或難高勝比丘者為彰無盜損意故五分阿難徑六年不共布薩祇律七年妄語戒第四時有檀越比丘語言常為汝說法者阿羅漢已下有二十句並結蘭偷前之十句稱阿羅漢後之十句稱佛弟子𥹢聞為異前十句中初四句比丘語檀越言為汝說法是羅漢次數至汝家次數坐汝坐次數受汝食不了了故得偷蘭次有六句檀越語比丘是羅漢者脫衣著衣坐起上下等比丘即現相不語疑偷蘭次後十句顏亦如前此二十中各前四句闕了了知解二緣比丘疑犯不犯佛言偷蘭各下六句現相不語前人生疑未知比丘為我故現相為當不爾同闕二緣亦得偷蘭無皮宍骨血是女不産者謂是化人第二篇漏失若乳間腋下乃至若持口中如是一切若道想若疑偷蘭若非道想不疑僧殘驗斯文說亦須境想以階輕重此中四句如上粗語說者第一句不能一切供養不了了蘭第二句女人知意云一切能供養僧殘第三句汝一切能供養唯此不能供養女人不解故蘭第四句女人解意答言此亦能供養僧殘毗尼增一言毗尼者謂舉一部之都名欲該收大教約數法連持使法相無遺以彰付屬以一為本一上加一故云增一如是乃至二十二然文中越十四十五十六十八十九二十二等七門不能煩多故所以略謂以一接一切一法二接一切二法三法已下乃至二十二類亦同然有人亦有科文生起者此是數法與一法門相當者集在一處豈有次第故知此難今就大文約增數制為十五段先就增一中分文解釋於中文二第一初至給孤獨薗正明其序第二世尊告諸比丘已下指出所聞耶正之法汝等應信捨惡行善此即是所信如是之法前中文二初如是我聞證信別序第二一時已下發起通序所以如是名別一時下通以其如是唯望弟子稱說但是證信經後事故一時已下經前事故若望當時即有發起之義今傳法者引來復成證信義有兩兼故名通序先解如是等言五門分別第一有之所由第二須有之意第三置之廣略第四置之處所第五正釋文一有所由者何緣得有此言大智論云佛是一切智人自然而出不隨他語不從他聞而說法何故言如是我聞答曰是阿難等諸大弟子輩說何緣說者以佛教故佛何由教阿難請故復何緣請由阿泥樓馱教故彼何緣教由見阿難心憂惱故阿難比丘何故憂惱由見如來般涅槃故佛將涅槃在雙樹間北首而臥是時阿難親屬恩愛未除心沒憂海不能自勝阿泥樓馱遂開覺阿難汝是守佛法藏人不應如凡夫人自沒憂海一切有為法是無常相汝莫愁憂又佛互付汝法汝今愁悶失所受事汝當問佛涅槃後事我曹云何行道誰當作師惡口車匿云何共住佛經初首作何等語如是未來世事應問於佛聞斯語已悶心小醒得念道力助於佛末後牀邊以事問佛佛言我過去後自依止法謂四念處莫依止餘從今已去解脫戒經即是汝大師車匿比丘如梵檀治若心𣽈善復應為說法即可得道我三僧祇劫所集法藏是法門初云如是我聞故今相傳將宣佛經同有如是我聞二須有意者佛本何緣教置此言為生物信如是等言云何生信阿難等自己信順佛語道佛語是佛語是故令他衆生同己生信我聞之言云生信阿難等自是不足之人若言此生是己所說人多不信由言此法從佛聞故人皆同信生信如是信有何義而為生信信者乃是入佛法初門接法上首凡入佛法要先起信故經論中說為信手如人有手至寶聚所隨意採取若當無手空無所獲如是入佛法者有信心手隨意採取道法之寶若當無信空無所得故為生信此謂信正恐是傳者之言故今置如是等言為此人說若也信耶不信正者以如是言勸信不足要須廣現神通為說因果道理方可生信三廣略者問一切經首有一如是以證一部以人時處事但是一故或一部中置多如是如人時處事各各異故如阿含經等今此律禁婉於一代復人處事別所以不說隨戒立多如是但有一者何一義解言凡言如是證信為趣若多如是者謂表方不等故但立一若以人時處事別故立多者即有前濫故又可依如大毗尼藏及以別傳皆戒戒有如是之證但恐文煩後代略去第四問所以至此方言如是言者答以增一初攝法斯盡勸信義具文則省要大化得通如是故略問所以得在增一攝義方具者答增一中云見衆過失者總收一部乃至二十戒行所防違相斯盡以一義故者亦總舉一部制戒之意元為十益功德亦同以此一言該收一部但增一是佛所說即信一部文省勸要是以在此置之次釋語辭憂婆離云佛語為如是指出所聞之法說當宗方無顛倒過曰如如說者是故曰如是此約法釋若就傳持解者憂婆離所傳不異佛說曰如如說者是故曰如是此如是之教親餐聖說故曰我聞問佛法中一切法空無有吾我云何而言我聞耶答佛弟子輩深知無我隨俗法說我非實也如以金錢貿易餘物人無咄𢗞法應爾故我亦如是於無我法中而說於我所言聞者從緣和合故聞謂耳根清淨等聞而言我聞者由假名行者康耳根等能聞故云我聞自下通序有三一時二化主三處所言一時者之爾時之別反指往昔說聞之時故曰爾時次佛者化主能說法者亦是能付法人佛義如前說次列處所故曰舍衛乃至獨園准下文中為諸比丘說耶正法亦有從衆略而不集自下正出所聞法體於中文二初先勑聽審思聽若不審心有謬聞之失錯傳之過是以將說故先約勑端意專心聽法故曰諦聽言善思者勑其意地以其學而不思則同知為使思量簡擇故也言念之者勸慍古知新令玩習在心使不忘失如說修行故第二比丘已下正辨耶之法分文有三第一至受持正明耶正之法欲使識耶合棄曉是使修故第二告諸比丘已下明佛說法元為十益汝等但能背耶修正必獲十利持者之益若不能背耶修正唐損道法不如捨戒還家以禮自處是以第三告諸比丘已下捨戒之相初文分二第一至受持總說耶正勸修勸捨第二佛言若比丘已下離明法毗尼等非之相就總明法毗尼中文有其四第一至以滅正法倒說者非彰過勸捨第二若比丘隨順已下至正法久住順說者是令法興顯舉是合欣第三是故已下舉益勸修第四佛說如是已下聞法欣慶頂載奉行先釋初文四句一舉耶說主謂若比丘二明說耶乖正故曰說相似文句謂言同意異等如調達五法人法中容可憶不憶等如二三衆多和上七非羯磨七百中十事之類等是三彰邪法礙正故曰遮法毗尼法毗尼者義有多種所謂修多羅理教為法行善為毗尼二就行善中自行有軌名法衆法滅惡稱為毗尼三就衆中法所秉羯磨不為除罪滅諍判以為法能除罪滅諍者字曰毗尼今且寄第二對論之調達五非耶法興顯令四依正法隱曀不行名為遮法七非羯磨不能滅惡生善執以為是令法和合不行名遮毗尼四此比丘已下彰耶說之損損中有二一者損人謂耶說人搆己耶心外化群品故曰令多人不得利益人我俱壞迷墜生死故曰作諸苦業二障滅法謂耶法曀真隱沒不行故曰以滅正法二順說者是亦有四句如上謂說四依為是五耶為非稱法如談無顛倒過故曰隨順文句以順說四依故曰同一和合不乖衆行法相故曰不違法毗尼第四彰正說者益益有二種一者益人以己所得益潤群品故曰利益多人同登出離故曰不作苦業二能顯正法使正教被時光顯於世千載不墜稱為久住是故已下結勸是其上來耶說者有損順說者有益故汝等冥各稱法如非勿令增減舉益勸修就第二離明耶正中有三第一至受持離明法非法耶正第二佛告已下離明毗尼非毗尼如非第三佛告已下離明制非制於此三中各四如前類而說之不煩更辨就第二大段中文二第一先舉制戒之意一一舉未即是十個一第二爾時佛告已下將斯制意約戒別以辨次將其父出家僧尼起業自纏流轉生死故稱過去上違略作罪者是自類制戒之意故曰以一義故制戒戒者如下所辨即是上文然後為諸比丘結戒欲令斷彼有漏法故次約戒曆明事實無量如一部重輕衆行之法咸招十利今且略舉事未必盡謂呵責羯磨已下至出罪有三十雜明衆行二次四波羅夷已下即是大僧戒本并前合彰二百八十戒舉前十利一一各有十個一法然呵責一法廣說其相故曰乃至受持第二乃至已下並是略舉亦上如己言撿挍法律所制者謂聞他說己尋撿三藏教法驗其是非故也言制梵罰者謂梵檀治人默擯也言制戒者謂一卷戒制說戒者謂是衆法說之識則布薩者謂二三人說也制布薩羯磨者謂僧說戒也自恣亦爾制白白羯磨者謂單白法也所以重言白白者為簡白而非羯磨今此單白即表宣邊稱之為白能有成辦之功復名羯磨故曰白白羯磨也次辨捨戒有十九個一法也亦可十九事中各有十個一法謂由教比丘捨戒之方得使去來有益亦招十利故文無者略增一之中大文有九第一至受持耶正之解第二佛告比丘破戒墮二道已下耶正果報第三告諸比丘有二種謗如來已下明謗非謗第四有二衆已下是非二衆第五有二法疾滅正法已下明正法住滅第六比丘有二法舉已下明上來耶解之人作法舉治第七有二法增長有漏已下辨有增不增第八有二語已下捨戒之相第九如來出世見衆已下正明制戒持戒等益初文有六第一至得作羯磨總明邪正之境即是二處第二復有二事已下離明邪正之境謂是二事第三佛告比丘有二見已下正明倒說上二以成其邪起於罪諍第四有二毗尼已下滅上罪諍對治之藥第五告諸比丘有二種人已下雜煩惱人彼此想惱第六有學比丘已下正明三學進修之方先釋初文犯有衆多以輕重往攝無不統故舉一輕二重謂夷罪為重殘等為輕或究竟是重方便為輕或約性遮若順說此二名為正見倒說斯兩即成其邪以其緣生邪正之解故說為境也下言二處者謂指此文舉其輕重為彰屏露二處其輕重不出屏露屏多生重露多生輕但舉二處之是重輕故爾亦可指此輕重二法生輕重二行之所故曰二處也輕而有餘者謂自行中非一生永彰故其中有二一得善果有餘二離惡果有餘由非彰故復應衆法故言輕者得作羯磨相對應言復有二事一重而無餘二重者不得作羯磨但文略次二事中夷二事相對有六句殘有五句次下各漸少一汁有二十一對二也既多少不約何故言亦如是者解言非謂數齊蓋是二二相對不殊故言亦如是次二見者到說上二以成耶見見心乖理障道之重故言有二見不應行也可為三分初約十八法以起見釋不異上舊法非舊法者猶是常行非常行也次酒見非酒已下十七對以起二見八漿停留徑久飲則醉人名酒未變是非酒今說已變為非酒說初未變以為酒故曰酒見非非見酒漿未變時非時受用得飲說為非飲已變故不得非得受用是非飲說為得飲食者飯等五正佉闍尼等是非正之說可知聖教開聽雖作無罪故名為時如功德衣儉開八事等是聖教不聽作則有罪名非時如過五月及豐時等是即說可知衣藥等物應法受畜不生罪過名之為淨見作非淨畜不應法理是不淨見以為淨亡人物重輕之說故難見非難者八難事起能損身害命於道有礙名之為難無因緣故名為非難有說可知破見不破者謂不見罪人不破見破者謂不識罪人種見非種五生種等有說故已解義見未解等者此明前人實未解義而言以解前人未解言已解竟親非親者七世是親理今說七世為非親非七世以為親也世間五欲能羈纏行人永淪生死實是可怖反生欣樂不以為怖故怖見不怖精進修道有出世之益名不可怖反生畏忘故言不怖見怖八正是道五邪非道互說可知行不行亦對道非道互說道慧性情升有資成之益名為出離煩惱沈弱是非出離亦互說之難彰處深實是可棄遮容得戒實不可棄互說可知次約斷常以辨見世間光者是離陰計我陰我存是名常見也即陰計我陰滅我云故曰世間無有是斷見此據現在世見世界有際是斷見無際是常見此二據未來是身是命名斷見身異命異名光見此二是斷常之本有如來滅度是斷見無如來滅度是常見此就過去為言有無如來滅度者斷常今計粗我自滅細我常存非有無如來滅度是其空見次二毗尼者犯諍等毗尼就所滅以標其因故曰犯毗尼諍毗尼下之三對約就煩惱人毗尼等類說可知次雜煩惱人有十二對觸緣易忿名曰喜瞋含毒畜怒執根在心因曰懷怨有斯二法自壞惱他人我俱損故曰住不安樂所為卒暴名為急性執見自固名曰難捨吝護財法名之為慳見他得利心生熱惱曰嫉耻彼內德勝己曰妬意在害彼而口悅物情名為欺詐心存名利而身相附人名諍曲情慠陵物名為自高數起鉾楯稱為喜淨染著色身營以華彩名為好飾縱誕六情馳蕩諸緣故云放逸於等計增名慢於勝境上起陵越之心曰增上慢多欲無厭曰貪匿怨而發其人名恚過分讚己稱曰自舉譏他過短名曰毀他謗無三寶四諦故言邪見斷常差中稱曰邊見雖聞教戒妄相解捍故曰難教聞誨不行稱為不受訓道次辨三學初明戒學二法利益次明修定二法後明慧學二法戒學有三第一至善能除犯正彰二法利益之相第二如是已下舉益勸修第三佛說已下頂戴受持有學比丘者三果已還乃至凡夫未至無學者未得第四果故但能修習二法令戒品清淨發生三昧尅理觀在心故云未得令得謂得生空解也悟達法空理解轉深故曰未入令入心冥無相乃至具二解脫故曰未證令證此先彰二法之遠益何等二法者出二法體言善犯者善識犯相輕重分明方能弃非從是如人識怨不為怨害此明有解解而不行無以尅益故次明行善行除犯者是行也一防未起之非二除已起惡業離此二過令戒清淨故曰善能除犯次下結益等可知如釋定學善人定者從粗至細善出定者從細至粗亦如是者謂善修斯二亦護三益文不異前故曰亦如是以慧學一法苦集二諦體是滓穢障道根本名為可厭處觀過興厭故曰生厭已厭修道解興惑喪故曰正念斷偈中前偈誦前可厭處生厭彰人是聖下偈誦上能會聖故尅滅道二諦顯法是聖法假名行者伯有智慧名曰明者在厭處者謂在過地之時覺過情背故曰能生厭離心覺已須斷能無集因名無畏苦果不續名不恐怖既無苦集明是聖人故曰能斷者得聖次一行偈上半修道下半證滅第二大文果報於中文四一總舉善惡因果二有二法已下法明善果得不得三縛不縛已下明因果成不成四二種清淨已下偏舉如人得脫初文有三一時破二果二以持破對屏露彰其二果三邪正二果第二文言佛聖弟子者現得聖法謂戒法是修行聖法故法在己故位尊人天而煩或未盡遇緣起業犯不能見見不懺洗由斯羈繫故不得脫及前以說即便得脫各二法如文第三文言縛不縛者因纍成故名為被縛若除因纍便不被縛三文同前故言縛亦如是第四文偏舉清淨二法者謂舉前脫不縛一邊以彰清淨略不舉不脫被縛一邊以解二種不淨也
