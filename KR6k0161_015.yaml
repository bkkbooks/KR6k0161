body:
  text: 第二正明失依止者文二從初至具白世尊舉緣第二世尊告言已下正辨失分齊五歲智慧者謂始入五夏須從十歲依止若愚癡無智者盡形壽依止文中增數有其八五若專定不同有九或八一上文得擯二死三去四休道五師呵責六入戒傷七五歲已上八見本和上九還在和上目下住今此八五別相但八謂加前得擯故九也言八者初五中四除第四以不與依止同第一故次五有二謂死五歲第三五中有一第八五中一中間四个五全同無異也九中上四師徒二人有則俱失下五唯約弟子五師呵責者謂五種非僧呵責也六入戒場失既是別行法處年小無知容為他所悞入時即失不待逕宿不同界外非別行法處故若爾蹔出至他大界亦是別行法處何以不言入他界失一釋義同戒場故不別論亦可他大界者亦是僧常住處壞義是希故使不失其猶或場須喚豈可他大界內制言須喚故知不類七五歲已上者自有知故不假訓導是以言失問何故文言五歲比丘應求十歲智慧比丘為依止答此言須依止者謂始入五夏非謂五滿不失若不言此謂入五夏即免依止故此據有智者若愚癡人盡形壽依止見本和上失者本補和上空處既見根本無空可補故所以失和上目下住者先捨畜眾見而不失今還攝受目下住失亦可見本和上師行還也目下住者弟子從他界還初興蹔意後至師所乘作永心故目下住失十律今飢世當死餓何用依止佛言若不得日日見和上若不爾聽五日五日不得見者聽至布薩時來布薩時來不得見者乃至二由旬半乃至自恣時來見和上自下第二明二師之德是非相對各有八五初十唯聖下之三十聖凡通有窮其實體但三十九以第六少一故自下第三教所被人於中文二初至價直總明遮難第二黑闇何側已下離明遮難亦可前文略明遮難黑闇已下廣辨難遮以周盡故於前文中有十七事第一第七是難餘通名遮先解第一破內外道難於中文四一明布薩出家已後作破內之業舉以白佛第二佛言已下教僧度法試驗方軌第三時布薩已下重來白佛第四佛言已下彰難業成就初文復四一論義心伏四辨之體其唯智慧於世諦諸法善達無礙名為法辨深契第一義諦實相之義名為義辨或善知世諦名為義辨達第一義諦是為法辨既識二諦必須稱機授與深達根藥而無滯礙名了了辨亦名應辨亦名樂說辨善於方音言說流澤無所滯礙名為辭辨具斯四辨外難不通無此道理故言無有是處五分舍利弗共外道論義始於一日至於六日論說餘事皆使結舌不語至第七日舍利弗說言世間諸欲本皆從思想生住世間欲本而有染著心外道難曰欲若思想生而有染著者比丘惡覺觀便已失梵行舍利反對曰欲非思想生從對而起者汝師見眾色云何不受樂布薩不解捨耶出家此言迫難者理逼切故第二時彼即生念已下因信出家第三後於異時已下作破內業第四時諸比丘下舉已啟尊第二因明試驗方法於中文四一制白二試驗二先與沙彌或欲使憑有所寄故恐退反成難故不與具戒第三正行四月試之欲彰外道執耶來久其信未著若即受具必不能深契玄宗為審其信故須調試此云乞四月共住為在界內故餘之三律母伽二論咸言別住故祇五二律乞別住與別住十律乞波利婆沙與波利婆沙謂應不得與此丘同居處故爾母論外道應與四月別住伽論言云何別住若外道欲出家受具者應四月在和上所住第四驗知心喜方進受具若全得道不待四月滿即為受具不同此者要四月相望三四二文可知第二度奴祇律奴有五種買得抄得家生斯三此處不聽餘處亦不聽他與自來此二餘處便聽三度賊四度負債五減年六五病七邊罪文四初犯夷不覆二與學或三奪三十五四除疑進否八父母不聽九制形同二白十度減十二者因開度堪駈烏者五分駈烏沙彌八歲祇老極七十小至七歲若過減此不得與出家七歲至十三是駈烏沙彌十四至十九是應法沙彌二十至七十是名字沙彌伽論七歲也第十一不聽畜二沙彌後開度二第十二受已生疑聽數胎等以彰得戒若得羅漢名受具者謂上法受次結小界受戒不言數人但道眾僧集故不知界之大小理亦難知次無和上或二三多等不成故五分比丘以一人為和上二三四五乃至十人為和上佛言一人為和上不應二人乃至十人見論無和上不得與受具若與受具僧犯吉罪是人得戒十多亦爾多論羯磨受具和上不現前以僧數不滿故不得戒若滿亦得此律不爾次說四依前後四度官人五分王立制若復度者當折和上肋骨截闍梨舌餘僧生革沙鞭八下駈出國祇折和上三肋戒師挽舌出十眾各八下鞭斷事官作是治罸將見頻婆王王言誰是王答言王是王王言放去恣聽出家不白王而輙治罪奪官及財言官人者有名無祿有名有祿此國餘國皆不聽度餘二者此國不聽餘國聽度次借三衣受戒義容得戒以弟子知不應借不知不得戒作得戒心是得戒准如和上前三句者是五分應同弟子衣鉢具未若言已具應問自有從他借若言從人借應語可令主捨之者第二離明遮難文二初至滅擯局明其難第二爾時將欲受戒者不自稱字已下離明諸遮非人一難落在下遮中十三難義五門料簡第一釋名辨難義等第二諍名癈立第三收難盡不盡第四與三鄣相收義第五得戒難生戒失不失初門有五一釋名解難義二辨難相三彰難體四解得名五釋通塞然戒法清虗出道良梯法既精妙致受之不易論其受也非身淨不尅是以身為受道之器心為得法之主身心圓淨得戒亡言若內壞遮難身器不淨雖備眾緣徒勞無益一生絕分彰不發戒名之為難一方化宜標十三始從邊罪終至二根是其名也言邊罪者曾受得戒理應進奉但捉心不固毀犯四禁為業既重理在分外故曰邊罪絕分鄣戒稱之為難故曰邊罪難二淨具之境生善福田理宜虔敬於中殖福今反汙辱毀其梵行慢業成就為鄣處深雖受無益名之為難難由壞尼而生故曰犯比丘尼難三沙彌俗人身非所應法既非分形假威儀詐為具戒盜竊法財稱之為賊業重鄣戒故曰賊心難四先是外道心信佛法捨耶從正出家受具雖居法式其信未著復捨真途還受耶法下至拔一髮是名破內外道難簡餘外道歸正非難故言汝非破內之外道以不五黃門者雖稟人類形絕道器性多煩惱現不階聖以此垢心厚重雖受不得故言黃門難六七二難者人非化生業寄胎報依父母之遺軀以為己體其恩深厚理應敬奉方復違恩背養興加逆害為業既重設受不得故言煞父母難八煞羅漢者此人雖復現報未移其功彌進果超三有為世良田理宜敬奉諮承殖福而壞瞋喪聖軀失利滋甚業重鄣戒故言煞羅漢難九然眾和法同入道之方今以耶法改真分眾異軌令正教隱暉耶法興世應悟乖宗失其理解為業甚重鄣不發戒故言破和合僧難十然如來大師內壞四等導化群品使淪溺之徒馮之出世此恩慈極理宜導奉而違恩逆害出血便犯此業尤深鄣不得戒故曰惡心出佛身血難十一十二非人畜生報處卑微形心俱非受道之器身嬰報鄣永不得戒故曰為難十三二形者凡為道器要是男女相別今既形狹而境惱亂二眾先受得戒轉為二形猶尚滅擯況始發心寧能得戒故稱為難問此十三並是受戒為難瞻波所以第三獨名賊心受戒難答此實不望今受作難名受戒難故不須為並蓋謂無是賊心詐為受戒此詐受者與今為難故獨標之餘非此類故問何以出血獨言惡心者答為簡好心不犯故爾但是邊等誰問心之善惡故無所簡第二辨相者此有邊名其相不顯十律名先犯戒人犯戒人者多母二論犯通五八皆名先犯故多論云破五戒不得受後三戒破八立爾母論若憂婆塞戒毀一又若八戒毀一如此等人後若出家亦不得戒及作和上餘汙尼等十二亦爾准此極急今解取出家十戒已去犯者成難以名邊罪故謂對內辨邊以五八戒無非內故言犯尼難者局取具境見論壞尼淨行永擯不得出家下二眾不鄣此律且言犯比丘尼五分有破尼梵行佛言婬比丘尼滅擯又是婬非觸等十律若一人八事汙尼尼得名汙是人非汙得受戒祇律要取淨尼今此律唯具同於祇律見論淨穢俱成異於祇見以下文中但言與著袈裟者行婬不論淨行故也賊心對文釋黃門有五五皆成難五分不應度黃門先問言汝是丈夫不准此黃門謂不能行丈夫事自然性多煩惱也唯生身父母是難非養等如十律說言破僧者謂是法輪主而非伴主又十二句中謂六墮者是餘相可知問所以邊合逆離者答邊從逆離濫俗有邊故若逆從邊濫俗有破故不一類又問逆即分五難黃門立一者何答逆謂五逆約境界事別故黃門不對境等故合為一第三難體者位可為三第一若三聚分別總用三聚法為體位約為二黃門非畜二形總三聚為體餘九唯色第二若隨別出體非畜報鄣形非道器心不受道故總以報色心命根四相等為體餘二亦爾以就偏強說故黃門唯貪使為難主若據形殘謂身根少分不具遂使貪增上也二形身根增乘即非道器自餘九難者身口分別破僧口業壞尼破內此兩局身餘通身口身口之中具作無作若定無作體多論俱色但是不善色聲其無作者法入中攝成論作者是色無作非色非心既言色業為體故比丘四逆但以逆為難體非夷及蘭以俗人作此亦難攝故如其破僧容可逆蘭通為難障以俗無破僧難故第三若隨法門辨者此之十三還用邊等十三事為體第四得名者直辨難總名義用受稱以此十三等事並能留難戒義故爾其邊罪等十三得名者若據前二出體並從別義作名別義不同有五第一邊罪一從義作名以犯此罪理在分外義故第二犯尼等七謂犯尼破內五逆並境用作名謂犯破煞等即是用名尼父母等是其境故第三賊心一難遠因受稱第四非人一無他得名第五黃門等三報事立因若依第三出體此十三事並當體受名第五辨通塞通塞有三第一形報分別第二就處分別第二約時分別第一就形法分別有兩第一三趣分別第二人中七眾分別言三趣者非畜各一人有十一此彼通收故十三也以人造業故有九業餘趣無造此等九業闕而不論又人受道故非道器者說之為鄣得具有黃門二形其非人畜生既無受道之理自體是鄣縱有此二然不由此二能障於戒故不說難猶如七日藥雖有多罪從口法生者但生二過以餘不由口法生故二約七眾說者僧但十一除二謂已分三趣故尼又除破故唯有十下三各九二俗唯八此並總相說若橫剋起者比丘就事但十謂除賊心故名正有六謂除犯尼三煞以其此四落邊罪中攝故尼事唯九賊心同前又除破僧名五可知式叉等三事九謂有賊心除二破故名五可知在家二俗事名俱八除邊二破以無總邊故事名並八出血黃門二形此三說通七眾餘八義局位攝為五邊罪通上五不及一俗賊心下五不通上兩破內上二不括下五犯尼等四二局俗不在上五破僧局唯大僧不通六眾此等通局多少約名說也既定得難約報通塞何處得有故須第二次就處辨除北方無無得戒義故亦不須辨鄣戒之難餘三方中南𨷂其有餘二天下但有十一除出血破僧故時中有故次第三約時假就南閻若佛現在具十三難佛涅槃後亦唯十一除二如前此上通塞雖可就報約處及時增減對體有無故爾以其問難之時雖可通塞有無問無不問有故聖教一制對報男女餘方未來等並問十三也第二諍名者昔來立義問所以初難獨受邊名餘之十二受戒不得亦在分外何不名邊人作具義以釋者此難解俱非不煩廣列今解難者乃是鄣戒通名邊罪犯尼等便是召難之別號何因將他別名之邊亦令貫通十二與難相類一切諸法皆有別名通名且如陰入界六波羅蜜等通名波羅蜜該於其六可得亦遣檀那通於下五此亦如是故知不爾所以初難獨名邊者如初一難乃十三中別事假先受戒毀犯重禁理在分外是故名邊此望前說邊此邊罪人後來鄣戒稱之為難難便望後何容准他望後之難該通十三即令望前人邊亦通十三也如犯尼難俗人時作本不由犯佛戒故說障豈可得名邊也乃至非畜二形等不對犯戒是故但言非畜二形等難若令盡名邊者舉下十二反難可知故此諍名本無可諍第三門此十三難收鄣戒難盡是中解難要取有心出家隨僧乞戒作法加被而不得戒者是此中難攝然餘八難中唯非人畜生中少分如龍王等在此十三中收餘六即非所以然者謂地獄長壽天世智辨聰北單佛前佛後諸根不具等皆無求乞作法之義故非此攝被擯沙彌多論伽論出家受具竟與解擯故亦非難故此十三攝義周盡問何以無煞辟支佛難者答煞辟支不在五逆中故如十輪經煞辟支佛犯根本非逆故第四門黃門一難愛欲滋多以其擁思煩惱障攝非畜二形三是報鄣收餘九業障並礙戒故若望鄣聞思脩邊唯五逆是餘非障也若辨寬狹此十三中業寬報次煩惱最狹若汎論寬狹報鄣說於五道說寬煩惱次狹業障最狹第五門若永變作非人畜生或為二形此三失戒破內外道以耶見故理是失戒若受戒已作五黃門亦不失戒唯可有擯不擯異也自餘諸事受已生者減不失戒問所以十三俱障失唯四失答此謂不得一切相反所以然者如二形生失可得即遣一形生得戒餘類可知次釋文但言曾有白衣與著袈裟者共行婬似不簡淨穢不同祇律也賊住文三第一舉緣啟佛總判滅擯第二是中賊心入道者已下列二重四輕以為章門第三是中已下斷簡輕重先解四輕却釋二重此之六句昔言但以法從人秉故人有一二三四及羯磨等六句明賊階降以眾法如五錢別法似方便故偷別法不成賊住此上四句至一二三四處非不秉法佛判非賊故伽論逕二三布薩者不得受具逕一布薩若不逕者得又祇彌盜聽聽明覺初中後者不得受若初中後互不記者得受故知眾法方成賊住今釋不爾下眾非應法既非分如對手說恣等豈可下眾是其應秉耶又五六二句至一比丘所二比丘所三比丘所眾僧所至四境所共羯磨等佛判滅擯以得法故即具二偷前四佛判成受具者以是全不得法但偷形故是以上四並言不共羯磨等又若昔解初句不共羯磨者謂不共下三非不共一人作法即言亦是得法者如往一人二人處偷對手法可不成賊至三人四人處並即四人已上應偷眾法何以聽受故知文言不共作法者謂不共所至處人也又前三句對後以明不共第四至眾僧所對何以名不共故知並不得法明盜別法咸成賊住又五六二中但盜對手已去不得判言偷心念法以往一比丘處通己即二豈得共秉心念法耶見論三偷如常辨此律五種並應滅擯姤黃門者因他以發他息還停故曰始言半月者謂有時節故增五云五種黃門不應與受戒故皆不合也祇六黃門一生二梌破三截却四因他五姤六半月前三不得出家後三若未出家不應若已出家聽十律五種不能男一生二揵三半月四精五病前四不得出家第五聽出家五分直言黃門不辨少多進否見論龍王五相不離本形一與同類行婬時若與人行婬變為人二受生三脫骨四睡眠五死時今律但彰二也五分因度龍故從今授戒不相識者應七日試者也如調達比者謂餘六墮中一一破僧主見論二形有三一能自受胎能令他受胎二能自受胎不能令他受胎三不能自受胎能令他受胎俱是難攝意辨二形因彰轉根六門分別第一能防生不生第二已起之罪滅不滅第三同罪順行法重須作不第四違情治法解作以不第五衣藥淨法等失不失義第六受戒結界成與不成眾生殖業不定故有轉變此義可爾所以比丘即得成尼尼變即成比丘者一解僧尼有無不同戒若當轉根為女比丘本受得防輙教授等戒即減洗淨過分等戒始生所以然者以本要期有惡當斷為因轉根為緣具故是以戒生尼變亦然問若不同戒生即是不受而得又有漸受之過又轉根之業非發戒緣又可五受之外更有轉根受以斯理驗明知不生又若不同戒失者一非捨時捨是即律儀便有增減二有漸捨之過二來轉根非捨緣四若捨戒者應有五捨然若不爾故知不失今釋能防受體不生不滅雖僧尼互變不得以本惡境無故即使能防隨捨之又不可以所防惡起故還使能防隨生所以爾者以本要期一運有惡當斷致能防無作還總發得雖可過境興廢能防恒不隨緣生滅既酬本要期總斷惡意即發得與尼不同無作戒善是以大僧變根即得是尼能防受體更無生滅其猶器仗但可有用無用不可即無器仗故此亦如惡律儀要心煞羊上至非想下至地獄一切眾生邊皆悉發得惡律儀無作容有作羊理故今善律儀類亦同爾以業不定容有轉變有洗淨過分可犯之義是以尼不同戒並是總得亦不生不滅問若得尼不同戒者何不名尼答雖可戒體無殊隨形有異現是男報故未得名尼若約教辨戒者緣犯俱同或復緣異但令犯同如盜煞等此教仍行又如長鉢離衣過量浴衣亦爾自有犯同而事中相反者如諸諫戒三宿兩舌嫌罵打搏牽駈俗女露屏等亦是同行教亦不癈或所禁事同輕重差別者如漏失摩觸索美七滅等類此諸教中有癈有興有無不同一向全癈僧變既爾尼變亦然第二門但使同犯已作雖可變根轉而不滅以所防境在猶有續作義故若犯同緣異輕重有無等已犯者滅以其所防惡境既無相續義斷故一向滅以具三義故也一業轉報異不同休道以彼自心背道故二不相續為簡同罪不滅三僧尼雖可報異皆是具足脩道人異於命終命終亦無相續所以不滅故須言道器也故十律言頗有比丘犯四種罪不悔不發露不犯耶佛言有謂轉根者是頗有比丘尼犯五種罪不悔不發露不犯耶佛言有謂轉根者是又言頗有非比丘犯而比丘得脫頗有比丘犯罪而非比丘得脫耶佛言有謂轉根者是又五分言比丘根滅為女佛言即以此受戒即以此請師即以此年歲法往尼住處依尼法住若犯共尼戒於尼中悔先犯不共戒不復悔尼變根亦爾第三門同罪治法順行法不同者謂約懺殘等說但不同犯無問行法足以不足滿與不滿如其互變皆清淨人故不須互有續作由根本罪已滅故是以多論行六夜未竟變行波利婆沙未竟變並清淨住尼變亦如是若同犯者多論云若比丘犯僧殘乃至十年䨱藏後變為尼一種十五日除罪若行六夜未竟變為尼者更與半月法行六夜竟變即出罪次辨尼變為比丘先未曾得法變與六夜治若得半月法行未過六夜變者更與六夜若過六日竟變者理亦不須更與六夜即與出罪此據無䨱者說尼先有䨱應與䨱治故多論若比丘尼犯僧殘一念不䨱藏乃至發露行十五日法中一日二日變為比丘但作六夜法治若先犯罪有䨱藏日即變為比丘隨本䨱日行波利婆沙善見尼雖先䨱變為比丘亦不行䨱以冐涉義不具故第四門謂約七羯磨治若於不同罪有七情過僧尼五變未治不須治若已治不問不調不勞更作法雖調伏竟亦不須解以根本事不同於後不續起故若以義說遮不至一罪事雖滅猶須愧謝白衣非直爾得了故治法不謝謂仍須解或於同犯有七過者未治須治已被治者變為尼後於尼眾中順行若調伏者尼眾為解尼變亦爾第五門見論比丘變為尼三衣及藥失受法說淨亦失以比丘受衣有過六夜罪尼無此義不同故失比丘受藥法與尼不通是亦失淨法對人說異故失淨法又釋此並不失所以爾者如先安居亦是對人說異何以乃言依本年歲往尼眾中尼變亦爾如先受戒不坐不滅僧即尼成尼成比丘何以衣等獨言失法以其轉根非離宿失衣緣故亦非失淨緣故變後之藥亦應不成遇緣作此釋時法先成者互變不失若作未成變者容可不成若對事勢分欲成變者亦應成就謂同受戒結界成就不成就說而見論遣令更受持說淨法者似對作法未成變者以論此或可爾第六門如十律比丘與沙彌受戒僧忽變為尼去竟勢分遠此不得戒尼無有與男子受戒義故又法亦不滿若臨竟變為尼者沙彌得比丘戒次弟子變如比丘為他受戒此沙彌變為女不得戒以少本法故又法不滿若臨竟變者得尼戒若十比丘與本法尼受戒師徒互變類前可知又若十尼與式叉作本法若論師變成不成同上弟子變者一向不成以丈夫身全不假本法故是以十律憂婆問沙彌受戒羯磨受戒竭磨時男根變成女為名比丘名為尼也佛答是比丘式叉受具羯磨時女變成男曲睞眼一臂偏長一臂偏短左手作啞聾盲𤴲痟病癲狂極老無威儀極醜毀辱眾僧者如是比丘不應度若已度得名受具足戒如上說此律如文可知阿脩羅子等是非難第六有三互在空者或容見聞但以空有異界故第七有三互不見故容可得聞第八有三互離見聞故第九有三之在界外故第十不受沙彌戒法得戒有罪謂失入法次第故在空已下四不得戒有罪前或不定亦可截手等中有得不得第十不受沙彌者一向得戒餘悉不得祇和上說羯磨受具人說羯磨尼說羯磨不名受具自下第四受戒方軌文二初受戒方法第二眾中被舉已下拂去疑情前文有三一至如是持正受戒法第二比丘受戒已眾僧捨去已下說持戒相第三汝已受具竟已下結勸受持受中文二初世尊有如是教已下先制問十三難第二爾時立欲受戒者已下正明受戒亦有九法如尼律中說亦少請和上文行事須請第八戒師問難初須知二事一檢行者淨穢資緣次教行者緣境立心故多論凡欲受戒先與說法引導開解令於一切眾生上起慈心既得增上心便得增上戒故次正行法白羯磨牒前方便収成此法推尋可知受既事重要須稱教師及眾僧善識如非專心惻聽不爾得罪十律分亡比丘物有一沙彌受戒眾中有六群六群言新受戒人不應與大比丘分應與沙彌分師言何以爾彼言受戒羯磨不滿故師疑問佛佛言應問在羯磨眾中比丘滿不滿比丘言我雖在眾中不憶不知佛言從今聽羯磨時當一心聽莫餘思莫餘覺當專心當懃當敬重當思惟心心等同憶念應如是聽羯磨羯磨者應分別言是第一第二第三若不分別說突吉羅祇戒師不四問四越毗尼眾僧不四答四越毗尼說止持相二說相緣起舉過白佛第二世尊言已下制說四相初總次別別中各五第二作犯文三謂法喻合此三各三可知餘文同前第二拂疑文二初至不名受具足拂去弟子上疑第二阿難已下釋和上疑事前問弟子中文二初諸比丘問二身子問被舉比丘者以見難提犯重滅擯休道還來是邊罪難不得戒今被舉比丘當時亦不足數謂休道還來亦是障戒難攝疑不敢度白佛佛言難提犯重壞根本故是邊障戒破舉人者對僧治重故不足數然非違教重事故不同邊聽度無過若言不見罪即是遮攝勿得度之為折伏惡人故雖逕還俗舉法不謝罪是障道為遮惡人要逕緣斷故亦不滅不同夏非治罸又非障道之業是故戒失夏亦隨亡文言共住止不犯者已逕解故不犯隨舉若爾前與受戒未逕解舉何不犯隨解言本是大比丘被舉今非比丘故得與受戒共語不犯若爾何以受戒已猶得問言汝能懺不解言前人有折伏之意僧遣懺悔不同彼見更何有過解已懺悔此文良證亦可不爾如增三中先懺悔後解義俱無妨五分不獨問被舉文言復有諸犯麁罪別住比丘猒別住便捨戒罷道又行摩那埵本日治阿浮呵那被呵責羯磨軀出依止舉罪羯磨下意羯磨如是諸比丘皆猒罷道復次出家受具白佛佛言應先問汝能還行先事能隨順僧求僧除滅先事不若言不能不應與出家受具若能應與出家受具受具足已若先別住便別住乃至下意羯磨還與作下意羯磨次拂制前年歲不滿疑次拂制前三結受戒疑次拂制前不問十三難疑此三舍利弗問次阿難問和上疑事以見身子舉十三難問弟子得不得即問和上舉體是十三為得戒不答弟子正得戒人要須清淨有不得戒若無問便得戒不問不得戒和上是辨戒緣故未制已前眾僧共作無犯問既言制者是何等制一解未制五篇如須提那犯不淨行或作五逆等此是一一難事未有廣教可違體是清淨若作和上一向得戒是名制前自制後者謂制廣教後共十三難和上受戒故眾僧有罪此義稍難以其若已制初篇名者制前羯磨受法全無是事以八年興故何須反問五年時事又可一釋制者謂料簡弟子十三難制故從是制後與十三難和上受戒眾僧有罪但言有罪是以生下弟子疑心不知為得戒有罪為不得戒有罪故須四句料簡言不持戒和上者謂邊罪等人前三得戒要置十人之外第四句不得戒所以開和上以是根本恐留難故是以佛開餘師非根本故不聽開說戒犍度第二既受得戒理須護持持由識相故次明之辨宣五篇罪相輕重彰於時聽稱為說戒廣明十五種說戒非一集在一處故曰揵度就中文二初至全心不散正明脩道行淨之人教所被者行既清淨堪聞淨法是以第二世尊在閑靜處已下說戒方軌初文有四一至遠已而去正明王請集會因緣第二爾時世尊已下告令集會是行財施第三長者白言已下比丘法施第四夜集欲禪已下自行脩禪就初文中五一王覩前事二即便已下設問傍臣三答言已下敬以實答四時瓶沙王已下頭面致請五時世尊嘿然已下許而請退第二文二初至如是世尊佛聽集會比丘奉教第二時諸比丘已下正明集會第三中七一對請生疑佛開為說二既聽已下問其所說佛為示知三時諸比丘欲分別說義已下有五句正辨說法是非之儀四時二人共同聲已下讚說之聲於中文四一制不聽同聲合唄伽論半呾吉羅五分佛聽讚歎三寶便合聲佛言應請一人作第二說法之聲第三去世尊不遠已下勸同上行處中之說第四諸比丘若過差已下顯其制意第五不知何日已下彰說時節第六若說法人多已下辨能說人第七坐卑已下說法之坐除疑通犯五分比丘以華散高座佛言不應爾復有白衣為供養法故華散高座比丘不聽便悉言不堪受供養白佛佛言白衣散隨意脩禪如文第二說戒法中文分有三第一至衣架來教諸比丘說之由序法用軌則第二爾時諸比丘聞佛聽詣羅閱城已下至不得受欲結大小界說戒處所第三說戒日閇戶而眠已下訖盡於末說戒法體如非等法初文有二第一至則安樂為制說戒由序第二時比丘欲歌詠聲已下說戒儀則前由序文第一至波羅提木叉戒悲心靜念為結說戒方法第二從靜處出已下陳己屏念告眾令知第三以是故已下正明如其所念為諸比丘結說由序就初門中三第一先辨念所說法故曰乃至木叉問所以結戒要待重請方制說戒法不請自制答一來結戒為有犯人若無舉過輙以已知而制戒者非大人法故二又為別人故論其說戒被行淨人故不待重請又復為眾敬法重僧故念為眾結第二中有信心已下念所為人言中有者謂前大眾集會中故第三我今寧可已下念說方法第二告眾令知還舉屏三以申念意第三文二初至安樂列八章門說由序第二波羅提者已下釋前八句前文八者第一集僧第二作如是說已下所說法體第三汝等已下勑聽第四若自知有犯已下省己之違悔以清淨第五不犯者已下省己無違宜嘿表淨令眾詳知第六若有他問已下勸如實答有犯發露答自知無犯應嘿然答是名如是答若審知己犯不發露答者必有大損是以第七如是比丘在於眾中已下正明嘿表己淨嘿妄有鄣道之失若如實答必有大益為是第八若彼比丘已下發露悔過實答之益釋八門中初二不次先釋第二以是所說宗故宜標在初嘆有功益勸欣習故於中文四一轉名顯義二嘆木叉能生善滅惡有大功益三我今當說已下正為比丘結說方軌四是故已下結說有益波羅木叉者此稱處處解脫而言戒者戒非解脫能剋解脫之果就因彰果故名戒為解脫是以經言戒是正順解脫之本故名波羅提木叉理不自彰寄㝵宣時聽故能詮之教半月說者即名木叉故曰我今欲說波羅提木叉戒嘆中初別滅惡以此戒法任持行者離七支惡名為自攝順本所受目之為持對相彰戒總稱威儀此行由法而成是行之所依名為住處故經曰戒為第一安隱功德住處次明生善論其戒體集生萬行喻若於根故經曰若無淨戒諸善功德皆不得生戒嚴法身故稱面首集眾善法釋上根義三昧成就出所集法體亦可集眾善法謂成慧行三昧成就謂諸定行尸羅淨故能生定慧是以經言依因此戒得生諸禪定及滅苦智慧上來並就行歎教行詮此行教有多益第三結說方軌我今當說當結者此二通括下三以其下三是所說所結故云何說結當為比丘敷陳此軌故言當說又此所說之軌是佛局定故曰當結次辨所說所結三法言當發起者謂八句序分與下正說興致之由名為發起演布開現者謂從四棄終盡七滅顯宣五篇罪相輕重披陳分昞故曰演布開現反復分別者謂從我已說戒序等已下還重牒上宗結勸修學故曰反復分別亦可當篇之中一一有三初言諸大德是四棄法等總舉說處序下別說是當發起二正說四戒顯在群心名演布開現三言諸大德已下牒結違順是反復分別餘亦類然四是故已下結說有益共集一處者却時初句下當廣釋諦聽者解第三門端意釋上善心念之言專心聽法者解前諦聽恐有謬聞之過錯傳之失故須諦聽有犯者已下釋第四句者己之違無犯者已下解第五句省己之順不犯者專精若犯已懺悔第二白法若有他問者已下釋第六句勸如實答故妄語已下解第七句不如實答有障道之損既尸羅不淨不能集生三昧發智斷惑終獲道益故稱障道法此就遠說障也懺悔則安樂已下解前第八實答之益以能見過懺除尸羅清淨發生定慧終獲聖果以自適神故曰懺悔則安樂此懺悔業有中之行即未斷或交證聖果亦約遠資彰其功益第二說儀則中文有其六第一說戒之聲五分作歌詠聲說戒佛言應直說之第二日日已下辨其說時於中文三一約日二約月三就時第三六群別房已下制集一處於中文二先明六群心同形別第二迦賓㝹者形心俱別五分劫賓那也不應秉神足往者是弟子為敬法重僧故如來是師僧是弟子故神足往亦可若聽神足往者濫無神足恐不肯起聽說戒故第四比丘在仙人住處已下結說戒處所恐疲眾故結定其處此非結界第五時上座先至說戒處已下斷理布薩前後所須於中文二初明下坐作非上座二六群白衣言語問訊作羯磨已下是上座應作非下坐言語問訊等者總舉諸事上坐所作也五分因䟦難陀為上坐唱言今僧十五日布薩說不來諸比丘說欲及清淨僧今何所作為諸比丘欲作何事諸比丘答言某甲比丘應與作呵責等七法某甲應與別住摩那埵本日治阿浮那呵䟦難陀言我不如知羯磨諸比丘問若不知羯磨何故問僧及諸比丘作何事以此白佛佛言上坐應說戒持律應羯磨又布薩日䟦難陀為上座眾僧請說戒答曰忘比丘言若忘何以坐上坐處白佛佛言應上坐說戒不者吉羅又不知齊幾為上坐白佛佛言若上無人皆名上座第六白衣問有幾人已下行舍羅緣起第二結界文二初至如是持自然界裏集難損業大聖知時開境局結界作法緣起第二佛言已下正明結界於中文三初至如是持結大小界法攝人以同法第二猒離比丘已下至橋梁已來結不失衣界攝衣以屬人第三爾時有二住處已下開結大小界法初文復二初至如是持正明結大界法界寬廣盡集又難脫有受懺恐勞僧眾是以第二時諸比丘有須四人眾已下開結戒場第三時比丘意欲廣作界者已下明解界法釋結界義四門分別第一開制結意釋名辨體第二集僧遠近不得與欲第三結之方法第四彰法有無初門自三一解開制結界意羯磨說戒任持正要匡救綱統法無過此宜應同遵理無乖隔但以自然盡集致眾勞疲妨脩廢業特是可愍大聖知時聽局境結界當處同法為斯益故是以須開一開已後須秉眾法非界不成復須制結先開後制事在於此二次釋名者作法限約為此斯同曰之為結彼此分隔各有差分名之為界故曰結界明了論西音名為四摩室此方翻名稱為別住彼疏釋言此云布薩界或稱戒壇者非正翻名謂此住處與餘住處各不相通於此作法不須取餘處欲故曰別住別住不同有十七種謂長圓別住四角別住水波別住乃至十七癡狂別住等言水波者界相如水波形故三次辨體者不過有兩一名大界二名小戒場問所以小界獨得場名者解言大界處所寬遠又是僧住處本非專為滅惡生善故從大受稱不與場名結戒場意本為別人生善滅惡有簡穢取精如似世場就喻彰名若爾餘二小界亦是生善滅惡何以不名為場解言竪標結者久固作法之處可與場名餘二無標非是永久作法之所且從數人坐處滿以受其目寬遠名大界大界體有幾如文有四一別說戒別利養或名人法二同界二同說戒同利養或名合二法食同三同說戒別利養亦言合二唯法同四別說戒同利養亦名合二單食同此等義後當說大界寬遠寬遠齊幾許五分若結界隨遠近比丘後結十二由旬說戒時往四五日行或遭眾難佛言如上結等不成犯吉羅今聽極遠三由旬祇見二文並亦三由旬十律說戒結界極寬十拘盧舍此律義准計應百里故下律言二住處相去遠結同一說戒者佛言諸比丘十五日說戒十四日先往十四日說戒十三日先往既逕宿方達故知百里許也局狹名小界小界體有幾大位有三一標相戒場二數人三坐處滿或可如受戒結小界合有四別小界處局狹局狹齊幾許者見論戒塲極小容二十一人亦不得大廣還成妨故餘二分齊隨說可知受戒中結小界者但言眾集結小界竟不知界相小大故亦難用是非如常辨第二門已去竪義懸說講約文解文分為二初至不聽受欲結之由序即解第二門義二是中舊住已下正明結法即解三四二門就初中先解義次釋文解義有二先集僧遠近第二不聽受欲初門遠近者亦可為自然界大小也集依自然自然有幾位可為三一聚落界二蘭若界三水處界第一聚落者十律憂波問若比丘聚落中初造僧坊未結界爾時界應幾許佛言隨聚落聚落界分齊是僧坊界祇憂婆問城邑聚落相難分遠近無僧結界成就耶佛言七弓種一菴婆羅樹八樹中間雖可異界僧遙相見得成法事合有四十九弓弓長九尺四百四十一尺成七十三步半四面各爾此二分齊十律據可分別說祇就不可分別而論蘭若界者十律比丘無聚落空處初作僧坊未結界爾時應幾許佛言方拘盧舍是中不得別若別得罪五分練若比丘不知己界齊幾佛言自然界去身面二拘盧舍伽論練若面應一拘盧舍為界但拘盧舍大小不定祇律二千弓弓長九尺合三千步十律五百弓弓長四肘計六百步雜寶藏經拘盧舍者此言五里見論蘭若界者極小方圓七槃陀羅一槃陀羅二十八肘若不同意者七个二十八肘外得作法事計有一百九十六肘肘各一尺八寸合有三百五十二尺八寸總成五十八步半一尺八寸此與四分衣蘭若同水處者五分告諸比丘一切江一切湖池一切海皆不得結作界若水中行以眾中有力人水灑所及處為自然界見論亦不爾得結界水中自然界者若擲砂已外有比丘不妨若欲集僧各依前分齊此謂標狹界寬或標寬界狹亦依界集以標未是界故第二門者所以結界獨不聽與欲餘法聽欲者何解有三義故一結界羯磨是眾同之本理宜急制不聽與欲自餘羯磨是眾同之末故開與欲二未有界故自然中作法弱故不攝欲餘羯磨𠗦界而作強故攝欲三為令識界分齊不㝵僧事又無破之難餘法反此故聽有欲祇律自恣無欲恐避舉罪故次釋文中言打揵槌者如威儀經說此云打磬法則可知五分應打皷打揵槌若吹螺不知誰打佛言應使沙彌守園人打若無沙彌比丘亦得打彼便多打佛言應打三通集僧遠近不聽受故欲如上說第二從是中舊住已下結法文四言文四者一差唱相人第二若東方已下辨唱相第三眾中應差堪能已下差秉法人第四大德僧聽已下正明結法文雖有四其義具七謂初文義四下三各一故爾將欲解文先加三義一者先知安戒塲處論其戒場為以界內眾大難集開結此界唯得在大界內竪三重標相已結終不得界外作若結容使不成故文言有四比丘眾等事起大眾疲極開結戒塲即是結而後開又下二界互相見聞疑佛制須喚豈可制喚界外又復結文言此住處比丘唱小界相若界外者何有住處又復戒塲無不為住今言住處者良以在住處規圓內故又五分若先結大界者捨已結戒塲竟後更結大界應一比丘唱四方相又唱除內地更一比丘白大德僧聽等又母論云外更不結大界直結小界亦不得受具以斯文義明在界內置之第二標相法式此律十八十二如文可知見論界相有八一山相大如須彌小如象二石相大如牛小者三十秤除漫石不得須別安石作界相三林相大林乃至百由旬小下至四樹相接除草林竹林以體靈不實故四樹相除枯樹大如閻浮樹小高八寸形如針大五路相除乃至向河水路窮路等謂是大路或車步路乃至逕三四村六蟻封相大如山小高八寸七江相若四月不雨常流不斷水深二尺者得成相八池水界相若自然池水得成相若通水入田若成水悉不得作相十律八相謂垣林樹山石道河池似同見論五分以眾生及烟火作相或並界或相入皆不成結犯吉羅既知其相科依一文三重如常可知見論界形有五謂方圓皷形半月三角等明子論水波別住等義言自然界相應是圓取七十三步等餘自然相同爾第三辨結先後五分母論皆先結戒塲竟却結大界此無正文然應先大後小以是大界內安場故第四差唱相人依文謂舊住人為取季練界相分齊故儻非先住人但知界相理亦應成次若東方已下正明唱相文中第二即義第五若無戒場直唱大界外相從東南角起文言東方有山稱山等故若有戒場者先唱大界外相次唱內相訖次總結言此是大界內外相一周如是至三五分不唱四方相結界佛言不成結得吉羅次眾中應差者正差秉法人文中第三即義第六唱相者不合秉法秉法人不得唱相故各別差次當作如是自已下正辨結法文中第四即義第七白中四句第二牒因起若十五二律牒唱相人名為欲舉人牒取所唱界相五分如某甲比丘所唱故此律及祇皆不稱名恐濫為別故任依一文義應不好言同一住處者是處所同對二住處本別今同者彼不得言同一住處此是本同今同故言一住處言同一說戒者謂是法同問所以不言同羯磨者答說戒具二同故謂同界異界制同故也羯磨但有同界同不制異界喚故為是非類所以可知若爾自恣亦具二界同所以不言同一自恣耶答一以希故又濫常須恣故又問稱事與欲餘事不成今此言說戒類似稱事應專得說戒答此先後不同故使有成不成次羯磨如常即解第三門義竟乘釋第四門彰法有無者昔依見論似有法起如水蕩成坑有水流知其處所竪住為閣於上作法事得成故知有法等今解不爾如行者造業發生無作於行者心邊有得得故可言有無作法此結界法不屬別人界處無情此無作法蹔在何許故知但是唱制處所如滅諍中界現前者在內羯磨作制限者是謂作法結不同自然故也如衣藥鉢處分離衣等但是曾逕作法說為無罪非有法起類皆如是見論山上結界水蕩成坑窟樹等咸謂作法標內高下淺深並同一界故若論失不失者論文不定文殊問經下至一五戒優婆塞宿是名不失界似如此無人即失十律憍薩羅行有空精舍欲說戒不知何者是內界是外界佛言棄捨精舍空是名一切界外是中隨意說戒又智論亦云一宿無僧是名棄捨僧伽藍上來諸文並似失法若准見論即似不失又此下文治故伽藍疑有淨佛言解已更結淨既不失界類應然次戒場文兩初開結之緣對緣開結二當作如是結已下正辨結法於中義門有二一解須結之意即上緣是汎舉四僧事緣故二知處所前已解竟若論結法文應還四一差唱相人文中略無二稱四方相已下唱相之軌三眾中已下差作法人四正法作法如文可知問何以不言同一住處者答戒塲元興不為無住處故結是以不言同一住處又問所以不言同一說戒者答以其元不為說說是制作大界僧須何恐勞疲往戒場說但大界僧不要假羯磨別結戒場擬受懺等本為羯磨若爾何以不言同一羯磨釋同大界次辨解界准文言此解戒場今釋解大非解戒場以其結解文不類故結戒場時不言同住處等何以今解時牒同住處等故知不爾准此一結對之辨解牒餘三及戒場文並略無悉是反結辨解解戒場時應言大德僧聽此住處比丘解戒塲若僧時到僧忍聽解戒場白如是如解大界牒若僧時到下文解之此亦如是羯磨准白成須解下瞻波中說文二先明解緣次辨解法不失衣界文初至如是持開結之緣第二時諸比丘脫衣已下正辨滿足結法第三二界相接已下料簡通塞亦有人釋初無村結法次除村結三料簡今存初釋講者對此方解作法攝衣界三門分別第一釋名言不失衣界者以結界人無離衣之罪故曰也或言攝衣界者加法結後去之雖遠衣猶屬人故曰攝衣二須結不須結三須除不須除並如離衣宿戒說多論五義須除一聚落散亂不定衣界是定二為止誹謗故三為除鬪諍故四為護梵行故五為除嫌疑故此鬪解文兩一卷羯磨有者反結辨解五分具有結解兩白二法第三料簡中四句初三通對僧界不隔駛流者專約攝衣亦可衣馮僧故此四並通料簡僧衣兩界次第三開結大小界者於中文四第一開結大界第二二住處相去遠已下對食料簡第三布薩日已下結解小界第四天暴雨已下對法料簡初文有四一結法食二同界須結意等廣說可知文亦有四第一舉前昔為二別第二諸比丘已下顯欲今同第三佛言已下解前昔別第四應盡集已下開結今同結法應四略無差唱相人類前可知第二同法別食界同前以說第三別法同食界上文三以無須解昔別界故第四時二住處已下舉初二同解為二別次下二結類亦應爾文略不舉文亦有四第二料簡食者對前同利養界道遠時過恐乖本結口唱白知少食隨食除斯逼促咸須通食也三結小界者問數人坐處滿二種小界如何集僧一解若欲集僧依自然界又解脫為留難不可和同故從數人坐處滿即結此界不得更依自然界集以若依界不可結成故此或可爾若作此釋者前明集僧分齊大小遠近應位分二謂有難無難別也二辨標相有無永久作法須識界相故須竪標及唱相等既數人及處滿明無標相所以爾者以蹔作法更無第二作法故若有相者惡比丘不可避故恐彼得知界相外內類如惡心觸不成髑等三辨解結同異此為現在蹔時作法遮避惡人故使結時與人處相應還即此人解無餘人解解法相類如文可知不同竪標相等為久作法非專此人故使解時直牒前界相解之及餘人多少與結不類位雖如是若即解者義亦不妨結解之文可知四對法料簡一約河水二就道遠第三說戒法中大判文二第一從初訖餘者聽在前說戒正明一和恒式時說戒法第二爾時拘睒彌已下破僧諍久廢替法事非時和合說戒法計理應有為諍減却說戒法以其說戒大位有三故爾但減却一法寄下遮中明之是故此文但有二說也時說文七第一從初至道我所教法無緣盡集說戒如非法第二說戒日病比丘不來已下訖亦如是有病等緣開欲清淨圍遶出界法第三說戒日聞有賊來已下八難餘緣廣略說戒法第四那那由已下說必被淨治人滅罪應淨說戒法第五客比丘十四日已下訖亦如是客舊雜住恐替法事廣辨客舊應否法第六群比丘從有比丘住處已下簡餘羯磨制叛說戒法第七六群比丘尼已下為明眾別形殊不聽對說制簡餘眾法先解初文有三第一制作單白攝眾成說第二有一比丘已下正辨說戒法體第三若三人不得受第四人欲已下是非之相解說戒第三第一時說戒第二減却第三非時先辨時說戒於中四門分別一約時者如一年中二十三說大小分別可知第二約月謂黑白月也所以月盡者喻聞戒相為表惡法消除止持行成復言月半者為彰功德漸增作持行滿故如文復作二數法故第三約日謂十四十五十六日隨其住處自為恒式第四就時謂晝夜等時此律多就夜說以寂靜故又以赴說者集故如文燃燈火等故知夜集既無定制早亦無傷十律云中前中後若晝若夜說戒俱得祇律有比丘晨起布薩客來答言我已布薩竟白佛佛言從今不得早作布薩布薩日應掃塔及僧坊內若有香汁灑地散華燃燈待客來作布薩若無者心念口言布薩若晨朝布薩者越毗尼又以道嶮亦聽晝日作第二就處分別者義通二界作法自然作法大小小界者謂局數人界也第三就人者除下三眾非所秉故具戒位三三皆應作僧中四別四人僧攝尼亦同然第四約法分別者先辨時說戒法於中具三謂心念三羯磨羯磨之中以制常行故唯單白又僧法中義分廣略具十五種三人已下體是略法故更不辨略也自恣亦爾若第二減却第三非時多據僧秉此二不依前准次釋文五分比丘先說戒後作諸羯磨六群說戒竟便去不與僧和合作諸羯磨白佛佛言應先作諸羯磨然後說戒以是攝僧令不得去准此義時未作說戒白前作諸羯磨也作白如文五分大德僧聽今十五日布薩說戒僧一心作布薩說戒若僧時到僧忍聽白如是第二說戒法體說戒位三謂僧羯磨說對手心念對僧說戒略辨斷理前事先辦淨水香汁燃燈舍羅五分籌極短應齊並五指極長捲手一肘麤不過小指細不減𣚰應打揵槌眾集祇律若欲說戒應先淨水洗手已捉籌作香汁浴籌餘人捉籌者亦如是復以香汁灑地五分應使下坐一人行籌別使一人收籌行籌者初唱白法及行收法一一如常可知祇先行具足人籌然後行沙彌籌已應白云爾許具足人爾許彌合有爾許人五分收已應數數已應唱白比丘若干沙彌若干出家和合若干其中法式廢立可知三人已下對手說戒不廣彰戒相不得互問清淨但自言清淨表應他說故一人心念口言清淨義同對首祇律行住等威儀皆得布薩行布薩者若比丘行時至布薩日有恐怖難不得住作布薩者先應籌量齊幾許誦戒竟若山若石若標識申手相及羯磨作布薩然後作布薩比丘水邊布薩水漲齊口極苦乃竟不知得立布薩不佛言得生布薩者多牀一切申手相及作臥布薩者老病不能久生牀角相接臥作布薩十律頗有比丘界內四處一時說戒不得罪耶佛言展轉與欲者是是非相中文二對前三位略辨其非初句對前僧說見論三人非僧不成與欲即是別眾白說戒者是四人行法今三人秉故是名非法謂是非法別眾次下二句是法別眾第二六群已下廣重料簡一六群造非次白佛次佛判不得次廣說如非有四初舉四數次別三非一如前三舉非欲使識非次一彰如為令解如言三非者母論一白處作二白非法毗尼說恐不成故即是四人已上不盡集作二白或三人受第四人欲白說戒此二是名非法別眾若四人已上盡集併作二白或四人作三語說戒是名非法和合或四人已上不盡集如白法作或三人已下受欲作對首是名法別眾言一如者若四人已上盡集白說戒或三人不受欲各各三語或一人心念等是名法和合次若彼比丘已下彰三非不成顯一如是法次下文言應如是說戒者勸捨非行如是我所教法者雙結如非第三與欲清淨法於中文四初明與欲表和應羯磨故第二爾時說戒日已下與清淨表己皎潔為成說戒故第三爾時六群與欲已下總欲清淨為令法事無稽礙故第四時諸比丘受一人欲已下廣明應否初文有四一至如是者善病輕與欲法第二不能如是者已下不堪與欲收將赴集法第三若慮此病比丘已下以病次重僧眾圍遶法第四若病者多已下病多出界法四中初一是欲法下三教成無別法下清淨法亦爾就解初文有三第一至今僧有事彰有事須集第二有異比丘已下舉緣啟佛第三佛言自今已下開其欲法先解義門還以為三一所應之法即是初文所言欲者怖須之名故伽論云欲者所作事樂隨喜然所應法其唯百一以下二位無欲法故百四十四位三通皆有欲除結界白二然復為三如說戒一法說及羯磨如自恣一法恣及羯磨餘一切法專秉羯磨磨通三故欲亦說彼此而淨恣二局所以可知對應與中自有此彼俱須斯法謂前二僧所秉常行制叛罪故亦有僧須已不須者如十人二十人受懺等治人違順等法不制叛故雖可望已須不須別應集義齊儻有緣事開單心集亦得同法隨其前事要有所須為令彼此俱濟故使有緣皆聽與欲若對所應有制非制以望欲法若須不須並是義兼開制第二定所為緣即釋第二文初緣為病或為瞻病三寶等於戒無違應開與欲如不與欲戒若為僧事塔事瞻病事及後悔戒說緣同前可知若為破戒等事咸悉不成如受日受戒受藥等類非法不成等三開欲法即釋第三文解義五門一約時二就處三約人四對法五廣辨應否一時者謂作羯磨等時此謂約法以辨時時義不定故下文言作羯磨時應與欲而不與欲乃可所應有恒無恒又常行中如增減說恣及非時等進退不定但是秉法若有緣礙無不須欲第二處者專在作法故結界中不得受欲於作法中應通戒場以其局狹故亦無欲餘之小界明無欲法下之三門對文中解文有其三第一至更與欲與成不成第二若受欲比丘已下至亦如是持成不成第三若受欲人睡已下說成不成對與欲中即解第四門法文中有三初佛言至應如是與欲開與欲法第二若言已下列其五種四略一廣略者唯開重病若輕病堪言悉不得用但廣說者通病不病五中四口一身第三若不已下辨反上不成若不現身相反上第四若不口說反餘四種此等不成應更與欲欲法既爾下清淨法表己無累應說戒與自恣法縱宣己過應僧舉罪成不成義各對互說可知次持欲中對此即解第三門義人人位有三第一能與欲人要是上二非下三眾亦非二十三人僧尼互說足不足故但二十三除別住等五體應足故於中差別者神足戒場以異界故非體不應餘二乃可不得逢足遙成與欲別住不定若申手外者亦成與欲若言界外者亦同神足等第二納欲人唯僧非下二位故文言一二三人不得受欲四僧階差相望有攝不攝可知第三持欲人文三初對病人所失次中道失次至僧中失初病人所失一往列二十七人不成持欲下自恣二十五闕無神足離見聞二者略也二十七中位約為三明相出一以人望時而說失餘處行人外道入別部戒場神足離見聞等六以人望處說失餘專約人餘處行者謂出界外如自恣中云若出界十三難擯舉等若不自言不欲失若爾不自言十三難亦應足數解言與欲直通使命故不自言得表情和故成與欲足數約體雖不自言亦不足數也離見聞者如道遠結大界但言不得宿受欲故知離見聞者非謂離與欲人見聞亦有人言若作送欲之意雖離見聞處亦不失今言失者謂受欲已作不送欲意而以離見聞為失欲分齊若爾神足在空亦應同彼有心送欲在空不失無心方失若但在空即失不問心者彼亦如是故今正解離見聞者謂離常所行道見聞處行即無事緣入餘房及逕過諸處等是問出界失竟何須復有戒場失解云前言餘處行是出界失今言戒場失者實是出界以其戒場是大界規圓內復是作法之處人情或謂不失故復須言入戒場失問癡狂等三人成持欲不答此等三人無受欲不成以不自憶識是比丘故若受已病生然有三種一成二不成為以有成濫故不論問下足數中二十八人與此二十七同異如何解言有二十一人此彼俱同此六彼無彼七此無此無者謂尼等四別住隱沒所為人等但式叉等二無受欲義不成故無所為人者成持欲故無此三理無別住等二定是略無尼及沙彌若無持義即是所以故無持已捨變或可是略以不定故而此不彰也言此六者謂餘處行人但可失欲不可即令體非比丘命終者此取往來容受已失彼取身來在坐死無集義故鬪不論罷道可知入外道別部等二往來故有彼不據來往故無明相出者失欲分齊彼取在坐豈可逕夜便不足數故所以無第三若至僧中云何得有離見聞失一解此謂䨱鄣處作法離僧見聞失亦可還持欲出眾離僧見聞故失五分病人不能與欲白佛佛言應舉眾到病人所使說戒比丘於中失說令病比丘向說戒人復有病人不能向說戒人背而坐臥白佛佛言應出界外布薩不得界內作別眾布薩第二清淨一准前說第三總文中三一總與欲清淨為離稽礙僧事故欲與清淨合欲與自恣合不同祇律時集得兩與非時集但得與羯磨欲二不得稱事與欲者亦恐勞眾為治惡比丘故若爾何故與欲自恣解言不聽稱事者謂羯磨所為前事自恣者說己心行恣僧舉罪本非稱事若論說戒即是僧家所作故但言如法僧事與欲清淨三受欲清淨命終已下牒制明開略舉前六為開難事聽界外來非餘處行失第四廣明應否文六一廣受欲法多少盡得十律亦爾祇律極至三人不得取舉眾欲又集者少說欲人多吉羅五分今聽比丘持欲來祗律又病人言風動與清淨欲比丘不受即往上坐前胡跪等作是言我某甲比丘清淨僧憶持三說心疑成不白佛佛言善已如法作竟但不受欲吉羅第二說戒聲小已下更明說戒之軌聽立說戒等說戒座高下表無別過第三轉與欲清淨法前對病人強弱與有五差及此轉辭受此等欲一切廣而直說戒祇云轉與失故第四料簡說欲一切法事得稱和上名字第五事訖須還以先情和到僧不犯別眾但本為事緣訖應聽往若不往者慢法故如法治類如受日事訖未來不即破夏第六明若僧說戒必須往赴坐聽兩對四句如文第三略說戒法文三先辨略緣人難者如住處有眾多白衣礙說戒故病難者說戒師病故現礙說戒此之八種親礙說故稱為八難若說戒坐上有此天雨等事說為餘緣餘緣中文二初列七个餘緣若多病者餘僧等病第二自今已去已下偏解下四成略說緣義第二彼比丘作是念已下量難遠近作根本七略初句難猶未至可廣說戒者此是說盡提舍尼謂略中之廣非全說五以其次句說至九十事故知初句略中之廣所以無廣說眾學七滅已下僧常聞耶答戒有五篇若說眾學即是已說第五篇中百戒但有七滅少分在不得名略故爾上來七略未一直去尼無不定但有六略一直去句第三有五種已下錯互上七以為三五前七根本從緣向急今之三五從急向緩初五單序作頭為一五以為難故不得廣說所說不殊前聞故曰僧常聞廣說第五者廣說三十事竟已下僧常聞還是略中之廣故增五云有五種持律誦戒序四事十三事二不定廣誦三十事是初持律次誦戒序乃至廣說九十事第二次廣誦戒略尼第三持律不同五分五種說戒一說序二序及四墮法三至二不定乃至第五廣說戒明了論有五布薩一誦波羅提木叉序二誦至四波羅夷三誦至十三四誦至二不定五廣誦乃至戒盡此等二文即以廣略俱明也次二五可知謂言略者略去廣文略取名數如總稱言四事十三事等是尼本六略但有二五也若賊來而不聽比丘說戒中休者當誦餘經故祇律說戒時賊入即應更誦餘經若偈若句若賊知比丘法作是言沙門我已知但說先所誦者爾時比丘應急誦使章句不辨令不知初中後若更誦本語越毗尼王來亦然五分同爾上來廣略被行淨人專精不犯自下第四為犯已能悔人廣辨治人滅罪應淨說戒於中文二初至如法治治人之法第二爾時有住處犯罪已下懺悔罪法前文有五第一與癡狂比丘作法除疑為成就說戒第二世尊在瞻波已下制自言治法表眾清淨第三爾時說戒日已下制諸比丘依能誦戒人安居誦戒明利成說戒法第四難陀已下禁制弟子法第五住處有眾多癡比丘已下制令瞻奉德人祇仰三藏癡狂文四第一作法者為淨眾故第二有三種已下料簡須否初人須作羯磨以或人故次二不須以無惑濫故計理痛惱心亂願狂各三料簡文無者略第三狂止為解前僧作法立制除疑故不須乞後狂止為己求解僧制須從僧乞類餘一切有心乞領者不解無心者解祇律作自三若病差得本心即名捨不須羯磨解第四釋疑重問所以問者類前難提故疑佛言不同隨病更作第二自言文五一阿難請說佛止不說第二目連輙擯第三佛語目連已下制取自言第四自今已去下止而不說付弟子說第五佛告已下舉八奇特為彰不宿死屍顯不說之意第二文犯戒不淨者四重俱是祇律此比丘布薩堂種種嚴餝作金蓮花鍱比丘悉入欲作布薩有金鍱墮地此惡比丘盜心取俠腋下故曰駈擯第四是名如來最後說戒最後伽論說略教十二年前未有最初犯廣故佛自說今既犯廣故止不說付諸弟子說於廣教問弟子亦不得為有犯者說所以付弟子者答比丘取見聞中淨有得說義故付弟子第五文兩一列海八喻二如是目連已下各各舉喻以法對帖第三文二初制五歲誦戒羯磨使利第二自今已去已下因制須依能誦戒人安居第四文三謂過呵制制中文二初告諸比丘詣何處制師問三句第二若所營事非已下教師斟量弟子之法應有八句三非作一句第二第三第五二非一如第四第六二如一非略少一句處非餘二如第七三如句也前六須遮後一聽往第五文者如十律若客比丘知布薩羯磨說木叉來者應為種種供給供養何以故以無佛時以是補佛處故又云大德高明比丘不應使作知僧房事應供給衣食不令有乏食及房舍自恣與好者五分持律來不迎逆乃至前食怛鉢那次後食等者突吉羅治罪有二第一至得聞戒別人犯罪悔滅方法第二爾時一切僧盡犯下僧犯除罪法前文復二初至得聞戒說戒前犯二罪一識一疑懺悔發露法第二說戒時已下說時犯二罪心念發露法釋初句識己有罪不得聞戒教悔清淨得聽無過故解其義四門分別第一解懺悔對治滅惡方法第二解懺悔與解或對治同異之相第三解大小乘懺悔具緣多少第四解大乘滅重小乘不滅初門者凡罪業之生皆託因從緣而有所作事業雖謝在於往為因成就必招苦報故從緣生理從緣滅是以於惡生猒特加慇愧立對治道洗心懺悔用此精誠感於樂報使惡業芸苦果不就還令戒淨如本所受即是興善代惡稱之為懺追變往𠎝名為悔故言懺悔雖有懺義所造惡業要須現生後三報業中時定感報不定遇緣可轉者爾乃相除如造重惡定在生報中受但是可轉今懺悔上善之業必感善報亦在生時但善業強故奪惡不受以時定故同是一時故得相排以報不定一差永差終不受中下相遣義亦如是望報而言名為報除語現懺善心能滅惡因名為行除問所造惡業謝在於往既是無法何所懺也答若薩婆多三世有所作惡業雖在於往性有成就是故得懺若曇無德宗惡業雖往不無曾有作業之時為因成就故今懺本曾有為因之義第二門懺是有中之業遞相仰伏要須敵對相當方能除遣若上品惡業下品善心懺非敵對強者先牽故不得滅要還上善仰伏惡因不招來報中對中下對下亦然解則不爾下解斷上或上解斷下或為其麤惑鄣理淺還以鑒淺理之知能遣故下解除上或微或曀理深自非勝智無以排斷故上解斷下或言懺悔者事中相違要須敵對相當是故不類若就防未起之非類斷結道如初犯業麤離之則易微下善心能防不起如是乃至第五過相輕微專加護持方能離過故知是勝第三門若大乘懺者要須深信大乘實相真旨妙用虗通染淨無二但知妄想是垢無妄想是淨又罪性不在內外中間得如是解罪垢消除或能決心發露永斷相續碎身不犯如是心心相次念念相續無量罪垢從緣消殄是以論云此一念善若有形色者三千大千十方世界所不容受以非形色故所能容受如十住論五門善根得生淨國謂禮拜懺悔勸請隨喜迴向等是即今六時禮懺即是除罪之方也要具四緣一請佛菩薩為證二誦佛菩薩法藥如十方無量佛所知無不盡等或三十五二十五佛懺等是三說罪名種即懺文中有之四立誓永斷乃至菩提也小乘懺法要請大比丘為證對大具五對小闕無禮足此直約威儀中說亦不盡理計有四法下當具說第四門大乘滅重者一理深藥妙二對治行勝三果勝故多身脩道非一形交證緣於勝果發心處妙故所以滅小乘理淺行劣又一形交證果非是妙是以但滅輕業次釋文二初舉緣啟佛第二佛言已下教其誨方計義有四一請懺主故文言當詣清淨比丘二正懺悔文二初先辨威儀二大德已下正懺辭句所悔之罪三篇已下及以蘭等咸同此法文中八句一言對前境故曰大德聽二我某甲已下斥己名字三犯某甲罪說罪名種四今向已下顯己無隱過之瑕五懺悔則安樂彰其損益明己棄損就益六憶念已下除不憶者憶皆發露七願長老已下請證八戒身已下還淨如本應有於淨法第三呵責治第四自言領受第二疑罪者疑有二義一疑犯不犯或疑重輕名種故發露心淨次二說戒時者既臨逼說戒不容懺悔恐妨亂故雖識罪分明但須心念發露以表心淨疑亦同爾第二僧犯中文三先說戒日識疑懺悔發露法差人往餘處懺者五分白二差次第二說戒時作白懺悔發露第三說戒日一切僧犯不識名相問懺方法所以但有說戒日無說戒時者答前於罪有疑定知己等有罪故須白發露今者不識名種事等無罪以同心淨故不須作白故所以無又解若說戒時有者亦應作白發露文中略無也不識名相者如露地燃火生種而不知何罪或有壞地等故云不識名又不識罪體多少差殊故言不識相此對執情恐致忿諍故曰不得強逼令懺悔彼據無諍自心故曰強與波利婆沙又可隨䨱日治不順情故故言強與不類此也第五文中有四初至偷蘭遮說日同不同來有少等多應不應三十六句第二說戒日已下僧伽藍裏互見聞疑有四十句第三有異住處已下大界戒場互見聞疑有二十四句第四有異住處已下界裏藍外互見聞疑有二十四句初文有二初至亦如是二十六句辨應不應第二或言已下應從不從惡心秉法違教結犯初中有三个十二初說日不同來有少等多有十二第二從時說戒日已下說戒日同五不相知來有少等多作十二第三有十二正以知來為異先解初文十四十五作一六初三客十四舊十五客來少等多若舊十四客十五客來少等多復作三次十五十六作一六但有下三客十六主十五略無前三客十五舊十六也問所以舊說客來等制客從舊此中客說與舊等不制舊客解言舊強客弱故使舊說制客從舊客說不制舊從客也若爾下日同客來與舊等何以更為客說答彼以即坐無多勞動故客舊等日不同者多勞煩故問曰不同中所以無客客相望舊舊相望等也答為辨強弱客舊客舊相望無強弱故無此文也亦可五分有文此略次十二初三舊望客次客望舊次舊舊相望次客客相望次十二初三客望舊次舊望客次客客次舊舊問所以比丘外來得告清淨不犯別眾者答直來向僧無心乖背故祇不聽住處一日再說戒亦不得頻日說戒要待隔日方聽說戒結罪中蘭吉總結上三但初四个三中具有蘭吉謂應出或雖不應出以少等不從不集秉法惡心故偷蘭懈怠故吉羅第三以知故有蘭吉第二十二不知來故但懈怠吉羅亦可三位之中齊有蘭吉第二文四一有十句客見舊相作法成不成二有住處已下十句舊見客第三說戒日已下句客聞舊聲第四有住處已下十句舊聞客聲第一故有二五句初見不疑有五前四不成第五句成前四復二初三不成有罪第四不成無罪不集故不成謂無故非過所以不犯前三復二初二句不成犯輕以懈怠心故第三不成偷蘭以惡心故次見疑五者見已生疑為大比丘為沙彌五句同前故曰亦如是餘悉同此第三有四位如前判唯以句少為別初客見舊在戒場上有六見不疑三前二成而罪有界別故成應喚不喚故犯第三喚集成而無罪以是露現故無第三喚不得呪咀句第四謂無句不疑亦三此初六竟已下三六可知第四文亦可知第六制判說戒法文二初明六群自審多過恐僧治罸迯叛說戒日為一九下次為他一九第七制蘭餘眾法以治罸時餘眾影助故制不聽餘眾前說十律比丘在尼前說比丘戒不聽尼說若比丘立聽尼口授尼說尼戒反上可知第二大段非時和合言非時者謂非十四十五十六日故先單白和尚僧以鬪諍滅已為解舉已故須非時作法表和故作白羯磨及說戒或被舉人別久不同僧法既解舉已欲得同法直為作白及說戒和故爾但此意辨非時說戒但是非時和故並舉二白也若作此白非時說戒即𨲙時說常行之白若類前說七文之中應除客舊一文餘皆具有但今文中唯出說戒法中攝眾之白為𨲙常白故所以爾餘法並同不勞更舉
