body:
  text: 受戒揵度第一自下第二廣明二持有二十揵度先總料簡第二次第別釋總料簡中三門分別一解先後二釋名得名三解結集次第之相言先後者上來二部戒本但説隨相不明其受顯理未周名之為略揵度已下受隨雙明攝二持義盡稱之為廣前略後廣義次第故爾亦可前明止持今辨作持先止後作義次第故問行法次第先受後隨所以今者先隨後受答若據行法次第實也先受後隨今就化宜先舉隨行後彰受法以其隨相廣彰損益能令行者欣厭易成入道最要故先明隨受是根本顯損益義微而欲識相護持欣厭不要故回之後説第二釋名者西音揵度此方稱聚諸法之中當分統論故稱為聚而存本音總名犍度諸法是何謂受説安恣等舉受説安恣等以標其聚乃至於雜故曰受戒揵度等所言得名者通論盡從別義作名別義不同略有其十受戒一法從受法作名第二説安恣法此四約隨法受稱第三皮迦雜三從所開事立目第四衣藥房三從知足行緣以得其名謂四依是第五拘瞻此二約處第六呵責一法治過立字第七人尼二法就人以標第八覆破此兩從過第九遮之一法舉罪受名第十滅諍一法功能作名此等推尋所以可知第三門者據本制之興事亂無準今辨結集次此之意揵度二十位以為三初八揵度謂受説安恣皮衣藥迦等明別行法以此等八資成別人行故第二拘睒彌已下次八犍度彰其衆軌謂皆秉法成衆綱網治過除罪殄諍故爾若無自行誰秉衆軌故須先明別人行法別行既成綱網事建故次舉法此二之中前有衆法為成自行後有別法為成衆軌舉宗往攝衆別恆殊尼下四法二行之餘以前未盡故須更辨有自行邊前八所收有衆法義後八中攝就前八中分二初四揵度受隨行法二皮衣下四彰行資緣受是根本衆行所依建首初明既有受體理須護持治要由識相故次説戒識戒相已須如説行理宜息緣故次第三辨安居法雖可九旬精練身心人多迷己不自見過未若僧衆傍矚者明理須仰憑清衆縱宣己罪見過悔除方成晈潔故次第四自恣方法行方雖明藉緣以立故次下四修道資緣自恣既竟遊行化物皮革履屣道行之具資身最要故次皮革衣須蔽形又是受畜時節故次第六辨衣揵度應不應義外資已具無食充軀廢修道業故次明藥或於衣食取濟乖方廣生罪過咎纍其己故次第八功德衣法開上衣食資道兩緣別行已竟次辨衆法衆法分三初一先辨能斷理人第二瞻波辨所秉法第三呵責已下正明所斷理事以行僧法所以須如此者拘睒一法能秉人德行上來別行既成豈可獨善必須斷理僧徒秉法匡化人無具德不能護法存道故次拘睒護法德行既有能秉必須所行之法法之要者其唯羯磨是以次辨瞻波揵度羯磨如非人法既興若不施行則虗設無補故下六法正行僧事若衆中有七種惡人剛強難伏若不斷理何成匡護是以次明呵責揵度折伏情過形心雖調有罪須悔故次人法懺除業纍人既得法事須順行是故次明行覆白法以彰發露若行覆依教是遣往𠎝若仍覆不懺事彰人知理合遮舉教令悔除然發舉不易宜審進否是以須辨遮之儀式或無具德舉不知時乖競相朋事成破僧是故次明破僧揵度僧衆不和彼此乖礙若不除殄衆法不成是以次明滅諍方軌此明衆法竟上二不盡故次明餘事僧尼同行已如前説尼等異法事須別顯是以次明尼揵度法二部正法已具顯宣然客舊進止行來食請威儀要法事須備彰為是次明法揵度上來法式既周資道緣中房舍最要是以須明房舍揵度但此房舍資緣強勝事最粗著故獨標名餘資非一不可別件是故統收以之為雜為斯未下次明雜法自下別釋言受戒者愴發要期建志成就納法在心稱之為受受者懸防目之為戒集多受法録在一處故曰受戒揵度就此揵度分文有二第一從初至解脫故已來為彰受戒度人佛在方有是以先明菩薩厭世出家修行成佛既成道已化物為心顯示群品同結己益是以第二爾時世尊已下正明大聖度人受戒初段文中復分為二第一從初至衆相具足現託王宮內報殊勝第二從適生已已下正明菩薩相之所表相之所為前文復二初明菩薩胄族高遠謂是種族深厚相第二衆相具足一句內報殊勝謂是色身豐美相託斯兩相義有二表故前文有四初至真暗次第有三十三粟散諸王第二從伽䨲支已下列十輪王此非次第通前合數四十三王第三伽䨲支次第五王已下正明斷簡前十輪王隔幾粟散輪王出世第四北方國界已下舉前根胄結成深厚相於第三文中就前九輪王中間總數粟散諸王有八萬四千一百九王亦有經文十王者第十輪王有百粟散菩薩羅云不紹王位是以但百以此配前八萬四千二百九王復以此配前四十三王合八萬四千二百五十二帝懿師摩後為取菩薩舉百中最後七王也言菩薩者此方名為道心衆生依本名説故曰菩薩此悅頭檀王所生第四北方國界已下舉前根胄結成深厚相如文可知第二衆相具足者色身具足相好昞著即下相師所列相好者是上來現託二相竟自下第二相所表所為中其文復二初寄相師口嘆相有所表第二瓶沙王備慮已下相之所為前文復二初至終無差錯相師總歎相有二表第二若不出家已下隨別以嘆文言適生已者如因果經説菩薩四月八日右脅而生相師共占阿私陀仙相而記言此兒有三十二大人之相所以但三十二者對治衆生止此即足譬如富貴家子雖復財寶無量不得重著珠璣故爾文言必趣二道者一謂輪王道二謂佛道相有二表定故無錯就隨別嘆中先表輪王道即世間極果第二若當出家已下次表佛道出世間果就前輪王道中勝報有三第一位極輪王正護殊勝第二七寶已下依報具足第三王有千子已下眷屬無缺威伏遐被第二言七寶者輪名勝自在蓋輪寶往處莫不臣伏為王所重故稱輪寶象名青山精馬名疾風珠名光藏雲玉女寶名淨妙德主藏臣寶名大財典兵寶名離垢眼並為王所重齊稱曰寶於中位二情非情分輪珠非情餘五情道情道中位三象馬是畜藏臣如智論是夜叉者謂非人也女及典兵此二人類如薩遮尼乾經輪王復有七種軟寶謂衣等可知第二明佛道中謂十號響班少如來一號次三輪化益向來所辨寄相師口嘆菩薩相有其二表自下第二彰相之所為即是相之功用於中文二初明菩薩在家時事聞名息慢第二菩薩漸漸長大已下捨榮出家對面息慢偏行佛道然此二文我當為臣及為弟子兩處息慢者即是二道之用並應相師總別口嘆二表之言也初在家事中文三一邊境備慮第二邏人白王於中文二初王邏人聞上二表之事言中是到故言王聞邏人也二時邏人已下請王除去恐後侵吞故言六國失土將由此起第三時王已下聞名高伏不從勸意初一往拒諸請次若彼已下申己拒意我當為臣應上輪王當為弟子應前佛道第二出家中文三第一正明不𮨇尊榮捨而出家第二時有人名呵藍已下同於耶修化以道法反耶入正若就自行名修世間善法第三自念父王田上已下捨耶修正或盡解滿道成號佛前文復三初明菩薩深觀八苦棄榮出家第二爾時菩薩已下既出家已修知足行第三在高樓上已下正明瓶沙覩相生善嘆驗真虗對面息慢初文復三初明菩薩作非常之觀厭於世間念同沙門悕求出世第二時菩薩年少已下父王念戀恐捨俗榮第三時菩薩強違已下頓絶羇籠捨榮出家漸漸長大者五分年十四興起行經十九出家故言長大五分因果經現厭有三彰欣唯一五分東門見老問御者曰此為何人御者曰年者根熟形變色衰坐起苦極餘命無幾故謂之老南門見病人御者曰四大增損飲食不能氣息羸微命在漏刻西門見死御者答曰氣絶魂逝無所復知棄之空野長離親戚上來三門咸問御者吾免之乎答曰回車不樂北門見沙門問曰此為何人衣服異世御者曰善自調伏具諸威儀常行忍辱憐愍衆生故謂出家菩薩聞已三稱善哉唯是為快有一女人見菩薩便生欲愛心即説偈言母有此子樂其父亦甚歡女人有此聟樂過於泥洹菩薩聞説泥洹聲歡喜踊躍言何當得此無上泥洹又大集經所以現老者為壞貪愛壽命故所以現病者為壞貪愛色身好所以現死者為壞於身貪愛欲故所以現沙門者為壞貪天王梵王人王身故對前四相欣厭心成自忖恃己身未免老病所侵故曰作是念乃至死此生彼也輪回生死猶若琁環故曰如此身故不盡苦除菩薩思念我今當設何方得使生死因亡苦果隨喪故曰如此苦身何可得盡今此律文略不現相直略舉欣厭之念故曰作是念今觀世間乃至何可得盡第二父王愛戀中年壯盛時心不樂欲者不戀世報輪王勝位故言心不樂父王貪國重位心悕嗣紹故言愁憂不欲令學道第三正捨榮祿者頓絶愛網捨而出家如出曜經四天王勑四神捧馬足若因果經二月八所諸天捧馬足門自然開從城北門出於是出家又五分亦言城門自開既出門已向阿䨲耶林此律不蒙聽許故曰強違恐損他故須自剃髮五分至須摩那樹下求除髮人剃髮也著袈裟者五分見一獵師著袈裟衣以所著衣價直百千貿而著之智論云以己大價衣貿粗布僧伽梨故曰著袈裟在家迫迮猶如窂獄即前處俗老病輪王等報羈纍行人名之為家於此猒背所以稱捨故曰捨家也出家寬廓事等虗空即北門所見沙門者是不能淪陷行人名曰非家發心趣求故曰為人也五分剃髮已作是念我今已為出家自然具戒祇律佛在菩提樹下最後心廓然大悟自覺妙證善受具足十誦但言自然得戒但知文別得戒時節事在難曉第二知足中行乃無量且修知足於中文二初彰菩薩棄國捐王遠之羅閲第二明日清旦已下匪直徒然修知足行威儀庠序不為𮨇字攝諸根與王作生信之由所以須乞食者且論四意一三世諸佛法爾乞食二為充軀資身長道自行益故三福利施主反報益故四為聲聞弟子放佛成規故其文不列得鉢之所第三對面息慢中其文有三初盡一偈半正明瓶沙覩相生信讚嘆菩薩第二王即遣使問已下有五偈半王命使者尋知處所第三聞彼使言已下親往覲謁對面息慢前文復二初至𮨇經家牒王所見第二見已即白已下王正讚美初一句勸勝相下有四句發言讚嘆王勸群臣同瞻異國之賓故曰汝等觀彼客四句嘆中初句嘆內有勝德次嘆外有勝相次嘆根曾深遠次有兩句嘆威儀折旋庠序可軌此之四嘆並舉前所見為彰內懷聖德人尊道高超出世表故言聖行為最勝相謂三十二相好謂八十種好相好昞著儼儀殊特故曰甚嚴好即上顏貌端正事也內外相備明非庶品故曰非是下賤人也君子儼然故曰乃至而直進第二知處所中文三初有半偈王令使者尋知栖託二次三偈使奉王命尋知處所未下二偈既知處已還而啓王第二文三初偈奉命追問第二次一偈見菩薩所作初句平等行施等益無私故曰遍乞善攝諸根對塵無染故曰寂然定福人感利故曰速滿違順增減不關其慮以道資心故曰常悅三次一偈知處如文第三文二初偈白王之法次偈啓報王知第三親往覲謁中文三初一偈半禮謁問訊謂須暄涼起居輕利等第二共相問訊已下問答捨位驗真虛第三爾時王即起已下來意既周致敬辭退第四二文一盡偈末先相問答申前遙嘆心疑第二時王語太子已下捨位讓彼驗知虗實第三時王前白已下驗己知真懸請於當第四正明菩薩許之於後此之四文正顯二道之用前請為臣應前輪王次求先度應於佛道初文有二初王致問次有國已下菩薩偈答就前問中先結前生後非但身禮又陳問答故名為復亦可王前遙相讚美今重舉勝相生疑致問故曰復作如是説問中有二初偈問出家意次偈問本生處所問出家意者謂舉讚中初二汝等聖行句我今觀汝壯年豐親內德晈潔宜應匡國理民乘於大乘群臣侍從是仁者相之所應何故剃髮出家乞食竟有何意此問出家意非是捨位及以象乘次問本處者謂舉讚中三四句等以問汝今顏貌端正將非下賤必是剎利勝族苗裔我今與汝共相對問願説本生居何國邑姓諱何等次三偈答文不次比初一偈先答第二問示已取居氏族名諱次有二偈却答初問我觀世間王位等樂傾俄爾增長五欲甚可患猒未若出家標心至寂是故須捨出家修道答意既爾次釋其文答第二中上半答處初句總處次別指方所下半答所生也三父母名四姓亦可俱姓是我生處故答初問中初偈正明菩薩不𮨇財位如視草土猒捨出家是故乃至不樂處五欲次句顯己欣猒之懷觀欲者是集諦多衆惱者是苦諦深觀在家唯增苦集示其所猒下有三句顯滅道清虗安隱快樂示其所欣道性清升不為業結所羈故稱出離亦無苦果逼惱故曰永安此明道諦涅槃無為專心標詣故曰要求等此滅道二諦是我元求故曰心所樂第二驗真虗中文二先捨半不受次捨全不受不受中法喻合三第三請當許後可知第三頂敬還退五分王欲試菩薩語言比丘族姓尊貴世為王胄聖德自然應居四海四海顒顒莫不爾仰若能降志且當稱蕃北面相事菩薩答曰世間貴位莫尊轉輪王吾已棄之況四海乎所以出家求道欲度一切生死大苦何不請我道成先度及反區區以此相要王言善哉斯語甚快道成之日願先度我及此國人菩薩許之歡喜辭退第二同耶修中其文有二初法同外道第二摩竭已下行同外道法同有二初學不用二頭已下同習非想如因果經具習諸定今但舉二者此二空定微細沉隱喜墮耶倒藍等謬執謂是涅槃解脫之果故須同其所習為彰法非直道人非至聖果非究竟以道化彼反耶入正故就不用處中文三初至令其得證至耶師所咨訪學方答其所學之宗第二菩薩已下次同耶修情疑相得正明同事之益第三時菩薩復作是念已下非集而去修中文六第一校量有無二我今已下修令得證三時菩薩得證已下更訪學方四報言已下答以無餘五菩薩報言已下略以非之六瞿曇如我所知已下推之為返情疑敬奉初句有無者據理藍無信等五根尚證此法況我具足寧不得證既從習定不得苟云無念定二根謂藍謬計涅槃無心趣求即無精進明無信慧等根第三非奪去中有三初有四句法非真道以耶法成人人亦非正次有二句人非至聖人法既非不能除結剋彼滅果果非究竟此不用處定順於三有生死之法不能發彼假名空解息滅之處故曰非息滅非去欲者非法空解非滅盡者非無相真解非休息者非無學果智此四法非言非成等正覺人非種智非沙門非四聖果息惡之人此二人非非得涅槃非是有餘也非永寂之處非無餘也此二果非既人法等非何得謬計法真人聖果為究竟第二同習非想定中類前可知但少非成等正覺言更求勝法者謂執自餓是道故以見事中儉節將為畢竟離欲故曰無上休息法也次苦行同中詣大將村與比丘六年苦行苦行成道同於此處如餘經説王勑五大臣子令使侍衛太子故有五人五分佛成道已念言誰應先聞謂父王昔遣五人隨侍勞苦此功應報也此律不辨文言四女隨逐者彰菩薩無染行成亦可當時有斯事故乘即列之雖可苦行未尅究竟故曰雖爾猶不得等也此律同苦行者為欲化耶歸正故爾依興起行經佛昔罵迦葉佛作禿頭人雖即悔過今受六年苦行若依六度集云佛昔為國王令其太子禁一促飲水人王事猥多忘之六日憶而流淚是以成佛六年受苦羅云忘道令餓六日在胎六年瞿夷笑之六年懷任準如此説本非同耶此善權方便未可一準次第三捨耶成佛中文三初明菩薩意地默念校量得失既達是非理宜簡偽從直是以第二爾時菩薩已下食食修禪但定心澄靜有所尅獲是以第三時菩薩得此定意已下發智斷或道成號佛挍量門中言欲不善法非是二定謂是五欲等意捨自餓及欲修禪故須思籌其二空定前已棄捨故此不論合有九句就中分三初有四句對正思量第二欲不善法已下三句舉禪所離欲惡不善反䨱斟量知其得失第三然我不由已下二句正明應當捨偽行真初中四句一舉前父王田上所得初禪之智第二時菩薩已下審察此道盡苦原否二一復作是念已下知有堪能四時菩薩已下欲依修習第二三句中初有二句舉禪所除障一思欲惡不善能得樂不次句知其無力第三一句䨱思欲惡依既無力我今捨欲惡不善能得樂法不耶計理應言捨而即得也文言習無欲者除五欲捨不善法者除五蓋也第三二句捨偽行真者如上所思既除彰修正方盡苦原明我不應習此自餓應當食食修禪去來是故文言然我不由此自苦身乃至得充氣力也但須此九不勞廣為十六即初四修正次三除彰方盡苦原故知不須習此自餓次下二句食食修正去來第二行真修正中文三初食食行真文三一食食反前自餓文言異時謂非思量之時食少飯因果等經謂食牧牛乳糜第二時菩薩已下正彰五人不辨偽真同情捨去三時菩薩氣力已充者受資之益第二復詣已下次明修禪先明方便有四一洗除疾垢見云入水洗時凡夫時鉢捨置水中在龍王宮之所供養次詣道樹次為草敷表己少欲為諸弟子放以成規餘經或見天衣或金剛坐等又此不同實行成道大寶蓮華王坐等次直身正意者正明修行攝心繫念身端故直也表心無耶故曰正意也住一緣中故稱繫念在前第二菩薩除欲惡已不正辨修禪不同大乘實行三僧祇劫依八定等今依小乘分齊成佛四階前已明訖今此是三四二階謂最後身修禪慧二波羅蜜是第三階次後三明作佛謂第四階依禪發智斷非想地見修煩惱三十四心以成正覺本音單那此名思惟修亦名功德聚林若依數次地別謂初禪二禪三禪四禪體有其九隨事十一枝有十八言體九者謂通大地四念定慧受是也善大地三信猗捨等是大地外二謂覺等二故體有九隨事十一者覺觀喜樂一心內淨捨念慧樂不苦不樂等是此謂以地別受故爾者謂前九遂成十八於九法中覺觀信慧四法不分各當分為一餘五離分以成十四定受各四謂四禪一心即是定數初二禪喜三禪樂四禪不苦不樂合是受數故定受為八餘三各二即六謂猗通前二禪樂是猗樂故捨念通三四以六配八故有十四餘四不分初三等五二上齊四故十八枝也若依實論初二禪樂是受樂其義則別謂覺觀在初禪內淨唯第二安慧局第三不苦不樂唯第四喜枝初二捨念通三四樂枝遍前三心等諸地今且依心論如前説初禪文三一除彰得禪二遊戲已下成就自在約數次以結三何以故已下釋得所由除去欲愛者五欲色聲香味觸惡不善者五蓋貪瞋睡眠掉悔疑也此之欲蓋是初禪障故須遠離次下得禪覺觀者是修行對治喜樂是修行利益一心者彼二依止三昧謂對治利益皆依一心故爾五枝者粗心名為覺細心為觀謂攝心在境創察於法名覺重審此法名觀內悅稱喜猗息名樂凝然不易故曰一心以有覺觀故無內淨有喜故無捨念慧及不苦不樂下二文可知二禪三者一除障得禪除障者謂除覺觀二得內淨已下得禪內淨者是對治喜樂者是利益一心者彼二依止三昧覺觀善心而嬈亂二禪譬如淨水波動則無所見有內淨故治去覺觀餘如前説下二文可知三禪三者一除鄣得禪菩薩除喜者離鄣觀喜多過如貧人得實故喜一旦失之其憂劇深是故除喜二身受已下彰五支體身受快樂先明利益次聖智是慧護者是捨及念此等三是對治念者追知喜過慧分別喜捨者棄喜故中平略無一心亦可樂是一心下二文可知四禪三者一除鄣得禪菩薩已捨樂即四禪離三禪樂故苦對二禪二禪滅苦根先已除憂喜者謂初三初禪滅憂根三禪滅喜根并初禪説故言先已除以第四禪絶四受故二次得禪無苦無樂謂利益護念謂捨念是對治清淨者是一心餘二文可知初三各五以對二亂始故二四各四以對二亂終故自下第三斷或成佛佛坐道場諸功德門圓明洞朗且辨三明先宿命次天眼次漏盡照於過去名宿命照未來善惡名天眼照現在事名漏盡事謝於往名過背今稱去曾徑日宿過去色心俱知命為報主是故但云過去宿命智從境得名事在於當以之為未必趣於現目之為來照未來善惡苦樂猶如天眼約喻作名亦可約報就根作名故曰天眼相彰於今以之為現住於現相稱之為在五住煩惱默汙淨心名漏漏亡之處稱盡故名漏盡論其明體其唯智性三世境界無所不照為明故曰三明初明文三第一牒前生後第二證宿命智已下舉境彰智第三何以故已下釋得所由菩薩得此定意者謂四禪諸結除盡者離過行成隨心無得故曰柔濡住堅固處者免三災絶四受故以第四禪者如來多住故二舉境以彰智體第三時菩薩已下得之時節結成智明第二中五一總就生數彰智第二劫成已下約時彰智第三我曾生已下就別報以顯謂知八種事六種同行地持説八事者如是名如是生如是種姓如是食如是苦樂如是長壽如是久住如是壽限六種同行者俗姓名字剎利等色父母飲食善惡壽命此應合八中壽等二故六八種六種者他及自身作如是説此是我名我為剎利等是我父母我食如是食我作如是善惡若少年中年長年如是六同宿命智知今此文中但舉八事我曾生某處一向總舉生處次字某已下列其八事略無六種同行第四彼終已下約處以説第五如是相貌已下總結智境第三得之時節無明盡明生無礙道暗盡光生者解脫道亦可無明盡等除擁鄣暗盡等除性鄣所謂者已下結名也第三何以故以下釋所由可知次天眼文三如上牒前如文第二知衆生等者舉境彰知亦三第一能照之智第二觀見生老死者已下舉境彰智亦三先總舉因果第二即自已下別舉其境第三如是已下總結上二初中善色謂福人中陰細軟清淨如明月光故曰善色薄福中陰身竪忽靳猶如縷褐名不善色善趣是樂果惡趣是不善果所造業行謂善惡兩因俱能達故曰悉知次即自察知已下別照中先知其因却知其果異於前總先果後因先列不善因果即是廣上死惡色惡趣賤次復觀衆生已下知善因果即是廣上生善色善趣貴等如是已下結前總別第三時節結名如文第三釋得可知次漏盡亦三第二中三初能照之智二次舉境以彰於中文四第一緣四諦初一往緣諦二以得已下重而審察亦可前後諦斷非想見或次重審察斷非想修或第二如實知漏已下見諦故斷漏第三彼如是知已下斷漏故得脫彼作如是知牒前緣諦如是觀舉向斷漏於欲漏等者欲界煩惱除無明名欲漏上二界煩惱除無明名有漏三界無明無明漏不為三漏所漏故名解脫此總説故言於三漏得脫據理而言菩薩至此三十四心中於見諦四比忍比智及非想修道十八心唯斷非想一地見修有漏無明漏餘八地見修三漏前已斷故第四已解脫故四智究竟依涅槃説永斷三世生因緣故是故唱言我生已盡此明因亡亦復不受五陰身故是故自説我生已盡此明果喪此是苦盡智應言不受五陰身故而言永斷三世生因緣者謂舉因亡以顯果盡所修梵行畢竟故故言梵行已立此明因圓又捨學道亦名已立此彰果滿梵名涅槃此是證滅智何以須言所修梵行已畢竟者此舉因圓以顯果滿如本所求今日已得故曰所作已辦此明果滿修道得果亦名已辦此明因圓謂修道智何以須言如本所求今日已得者此舉果滿以顯因圓獲得盡智無生智故故説不受後有此斷集智但應言道獲得盡智而言無生智者謂舉果盡以顯因亡餘二文可知上來至此化主成道自下第二外化度人就中文二初至龍王為首六七日中遊諸法門受解脫樂二歸依法度外眷屬第二爾時世尊文鄰水已下度人受具謂內眷屬五分八七一摩修羅山神奉呵梨勒二賈人三文鱗龍四斯那婆羅門女須門女須闍陀五斯那婆羅門六斯那婦七斯那姊妹八攢酪女人今此六七日故即為六文一賈人二樹神三婆羅門四婆羅門男女六文鱗龍王於此文中五門分別一諸經時節不同因果法華並言三七日此律薩婆多六七日興起行經出曜經七七日智論佛成道五十七日寂然五分八七日為對見聞故有斯別第二所遊法門分別多論云第一七日入喜法門以自誤樂第二七日入樂法門第三七日入解脫法門第四七日入大捨法門第五七日入逆順觀十二因緣法門第六七日重復遊塵前諸法門以自誤樂此律真言受解脫樂不分喜捨等別道理但應佛所證法無出鄣離相故言解脫第三處會分別處則有三謂初三七日菩提樹下次二七日離波多樹次一七日文鱗龍王會便有六始從賈人終盡文鱗以其處本約事事三還三會斷所化故隨境有六第四所度境界趣分有四初會天人第二非人次三偏局度人第六是畜此即人天龍鬼四輩檀越第五未説法意多論問曰佛本為化衆生何故遊諸法門不説法度人耶答有多義一既成道已宜先安身然後度人是故遊諸法門以自娛樂令身心調適後度衆生又為憍陳如等根未熟故又為佛法尊重詳而後説令衆渴仰生愛敬心故又為滿梵王本願故願佛成道時要先請佛轉於法輪待彼梵王請而後説故次隨釋文第一七日文二初受解脫樂第二爾時世尊過七日已下以二歸度人文五初樹神篤信勸興供養於中文三一者經家列未佛食二賈人賫糧於佛邊而過三勸捨塗糧作見聞之緣第二爾時兄弟已下受勸獻奉第三世尊復作是念已下正明如來悲心納受第四受彼蜜已下呪願説法二歸化度第五爾時賈人已下禮獻事畢敬而請退第三受施中未成道鉢捨置水中今無器受食故言何器受食即知三世諸佛法畜石鉢不以手受食四王知意各奉石鉢佛受天鉢食人中食表為人天受道緣故作良厚福田所以合為一者若止受一不可餘天之意為彰等益無稱又復鉢無多用故合為一五分悉受四鉢壘左手中右手按之合成一鉢普曜經四天王於波頗那山上得四石鉢欲於中食時有天子名曰照明語四天王曰今有佛名釋迦文應用此鉢非人之器今當受食可往奉之故請賈人以施蜜當得作佛號曰蜜成第四法施中文五一呪願受施如因果經呪願文不同此又復五分先受二歸後方呪願兩偈二足汝安隱四足亦安隱去亦得安隱還亦得安隱如耕田有望下種亦有望汝今入海望獲果亦如彼今先呪願第二汝等已下勸受二歸未有僧故第三時賈人已下請祈福之方與髮抓敬養第四時賈人雖得已下輕心慢棄如來勸受得大功德不可勝算第五賈人白佛已下信心未決請乞證驗如來廣彰福利不虗我在因中為摩納時蒙定先佛受記喜踴虗空髮猶委地無量衆生散華供養我凡夫時髮我於爾時因中之髮煩或未盡果未究竟時人供養故若以道眼觀之悉入涅槃況於今日煩惱已盡萬德圓備功德勳修所有髮抓若能供養我之舍利寧無福報既得證驗敬心殷篤又賈人當知已下結會古今益信敬故第五文可知下之五會文二如前一受解脫樂二過七日已下二歸度之自下第二度人受戒其文有三初至龍王為首善來度人第二我已脫一切已下三歸受法第三羅閲城已下羯磨受法所以此三次第如是有二義故一以能秉人為次第故上來世尊自行成道既成道已宜須化度是以第一先明善來善來受者成證無著亦須化益故次三歸上二受法自行既立須行衆軌攝利度人故次羯磨法此約能秉以彰次第次第二所化境界以彰次第善來所被利根淳熟機感緣強理宜先度三歸稍劣羯磨最軟故次第三譬如日出光照高山次及平地後及幽谷次第之儀彼亦如是善來文二初至響徹梵天説法他世出家緣起雖可言對陳如然此請説一代之首故成緣起第二既聞法生厭希求出離是以時陳如已下善來度受前文有五初至不説法來正明如來思已藥妙衆生患重説增迷倒息化之意令衆渴仰故第二時梵天已下愍世故請受而許説第三我今先當與誰已下隨遂有緣起機説法第四爾時世尊已下承機有人受道獲益第五地神已下歡喜唱告響徹請主初文有三第一至疲苦正明如來思惟不説慮之於心第二爾時世尊説此二偈已下顯己不説之意陳彰在口第三爾時世尊已下結成不説前思惟中文四一思己藥妙二衆生異見已下衆生患重三衆生以是樂於樔窟已下以患重故説增迷倒四我今欲説法已下結成唐勞虗化無益前文復二初先就體辨甚深藥妙二智者已下對人以辨甚深藥妙欲明一乘之理體唯自古豈有得捨染淨之殊寄相而論非不生死盡在於此涅槃顯在於彼坐於道場解滿或盡故曰我今已獲此法所證之理乃是生死之本際窮原之真旨故曰甚深理絶名相非尋教量境界之所能曉故曰難解體非分別離心所緣故曰難知自體無相生死紛蕩所不能染故曰永寂體證圓學至果無為故曰休息窮原之旨精勝獨絶物莫能加故曰微妙最上此釋甚深次就人辨理雖甚深非一切不會有大乘器者必能契證故曰智者能知非是二乘種姓境界故曰非愚者所習此明理深藥妙竟第二彰患重初因患重次果患重然此衆生暗或羈纏迷於真旨情隨忘想取相明白即如藍等情取不用自餓等名為異見於此思惟安心忍可謂情安不用等名為異忍悕願不用等稱為異欲以斯煩惱發起成業耶命自資故曰異命次果患重依因報果謂三界果報言依於異見者迷著前因願求生死永滯二有故曰樂於樔窟人天似樔三塗如窟謂異見等繫在三有果報故第二中文二初至難解舉前患重迷一乘因第二復有甚深已下舉前患重迷一乘果衆生以是樂於樔窟者略舉果患法性真旨起染淨之本故曰緣起法然此衆生執自餓等繫在三有於此諸緣實性不能曉察謂不能成淨分勳習故曰甚深難解前明因深今就體顯更明果深故曰復有甚深難解處離四住煩惱故曰滅諸欲無明永喪故名愛盡畢竟寂滅稱為涅槃於此果處亦不能曉以執二空即為涅槃故曰是處亦難見故次第四結成虗化我今欲説者謂説大乘因果二法二乘近行聞則迷悶故曰餘人不知對彼大根指小根為餘既不能解虗化無補故曰唐勞疲苦自下陳之在口言二偈者謂下二偈非先所聞者大莊嚴論拂去疑情謂非昔在藍等邊聞故也亦未曾説者從證來未説今始欲説故曰亦未曾説次明偈誦初偈誦已出世之本意欲以因乘攝化衆生惑重無益次偈為説果乘亦不能悟默然息他過在衆生咎非我已顯成如來無吝法之過此是祇夜經我成道極難誦前我今已獲此法乃至休息為在樔窟説誦前我今欲説法貪欲愚癡者誦前衆生異見等因果患重不能入此法誦前非愚者所習於緣起法難解及餘人不知也逆流二句誦前後有甚深乃至涅槃次二句誦是處亦難見故第三結文者但此衆生過無大根現患復重聞説迷倒不如默然息其他道故曰作是思惟已默然而不説法也第二請文有三初明梵王愍世故請第二爾時世尊受梵天請已下觀根受請許欲為説第三爾時梵天已下遂請還宮前文分二初請之端序第二白佛言已下正請序中文三初遙知佛念以佛入世俗心故梵王得知次念世間已下傷失法益以有漸成之義故曰乃至不聞耶次明我念躬往致敬就正請文三初舉根請二爾時梵天復白已下催請第三説是語已下説難請亦名譏請初請文二第一直請第二爾時世尊已下如來述拒白佛請中唯願等者略舉二號直請次世間已下舉彼衆生有三乘根器滅惡生善有可化之義故願説法結使輕微故曰垢薄於理不愚名為智慧事中捷疾故曰聰明聞則能解稱為易度能滅不善法謂斷功德成就善法智具足有可化義云何不説耶次佛述拒中第一述可請辭故曰乃至如汝所言等若請有理所以不説者我別有意是以第二從初向者已下申己不説之意如文乃至而不説法耶如來答意然我靜念正欲以彼一大乘法化諸衆生不欲以小乘濟度但彼衆生惑重迷倒是故默然汝今云何請我説小理無此事次催請中復舉生有滅惡生善云何不説令世間不聞言大敗壞者此等衆生曾得一乘想解久徑生死變成小惑名小敗壞今應聞小能滅惡生善若佛不為説復失小感永淪生死不聞正法是大敗壞唯願世尊時演正法使始時解小終入於大勿使敗壞亦可請辭勤勤佛若不説大有所失故言大敗壞如世人言大是異事等三譏請上半立難以反要下半皈宗而順請若摩竭衆生無可化義佛不應隨願在此成道既在中生明此衆生有可化之理若可化者願開甘露門為衆生説法請意如是次釋其文摩竭衆生淨穢俱有故曰離垢穢而佛從中生者謂佛隨念功德修行成道法身生處也願披演正法使理顯灼然名聞得理資心和神適志義同甘露理通神解説之為門故曰願開等五分白佛唯願世尊哀愍衆生時為説法自有衆生能受佛教若不聞者便當退落如是三反復以此義説偈請佛先此摩竭界常説雜穢法願開甘露門為演純淨義自我在天宮恆見古佛説唯願今普眼亦煞法堂教衆生沒憂惱不離生老死然多樂善者願説戰勝法世尊默然受第二觀根受請中文二初至成就善法先默念受請觀彼根器第二爾時世尊已下言彰於口許欲為説前文有三謂法喻合文言受梵天請已者謂默念忍可遂觀衆生誰有根器應可受化多論云譬如大龍從大海出欲布密雲注於大雨先觀何國應可雨者然後降雨佛亦如是從四無量海出布悲雲欲雨法雨故先觀根器誰堪受化然後説法觀彼衆生有三乘根器謂菩薩緣覺聲聞各有上中下故合為九如世間生鈍根畏後世罪聲聞上中下少垢多垢難度緣覺上中下長利根易度菩薩上中下又可聲聞緣覺雖有利鈍同受小法合以為生菩薩大士説以為長斯二觀人有其大小所以有大小者良由垢有厚薄根有利鈍受道有難易故爾少垢利根易度此三是大乘根器多垢鈍根難度此三謂小乘根畏後世罪已下雖可利鈍難易莫不皆悉畏惡就善故曰乃至善法自下喻説不取四作喻直取池華水為喻池喻感機華喻解心水喻於教若以四諦教水注彼聲聞感機池中生聲聞解心之華聲聞根軟假教始緣故曰初出地未出水此喻上生鈍根畏後世罪三若以因緣教水注彼中示感機池中生緣覺解心之華終時稱教生解故云與水齊此喻上少垢多垢難度三若以六度教水注彼大乘感機池中能生菩薩解心之華菩薩大士得旨捨詮不為教相所局故曰已出水塵水不著此喻上長利根易度三若如後釋初出池華與水齊華同喻上生多垢鈍根難度等四聲聞緣覺根也已出水塵水不著華喻上長少垢利根易度四大乘根也自下合喻如來亦復如是者如來觀彼三乘根器了了分明如似世間有目男子觀池華三別故言亦復如是喻中少有目男子合中有故合文二説準法可知二次發言受請言對請主故曰梵天我告汝今敷演三乘教門故曰今開甘露門所觀根器三乘非一曰諸咸有稟承足之益決然秉納故曰聞者信受次下三句釋説小之意若我説小即便正在於小不令得大究竟永安者有吝法之過義同嬈惱我今説者始時解小終獲於大同我所得微妙之法故曰不為嬈故説乃至牟尼所得法亦可下二句釋疑佛前思惟藥妙患重默不説法今者請方許説或可不是佛所得法故須釋言梵天我所得中方便説三故曰梵天微妙法即是牟尼所得法五分云恐徒疲勞不説甚深義甘露今當開一切皆應聞第三辭退還宮第三既受請已赴根説法文二第一從初至涅槃行來為彰五人執耶既久現無受道之器是以先須勸捨二邊令立根器既有信器堪受法藥是以第二四聖諦已下正明説法沒彼信器前文復二初念二耶師不聞勝法拂衆情疑第二時世尊復作是念已下勸五比丘令生信器先解前文多論問曰若彼諸人必應入道不應命終而得聞法若不應入道佛何以故念欲度之答有二義故一佛欲令衆生不忘恩德此先小恩佛憶欲度脫恐大恩不報二此異道諸師時人宗仰咸謂得道佛念欲度為滅一切耶憶想故依十住毗婆娑釋疑故來彼論問曰汝云佛是一切智人佛念迦蘭時已先命終徑於七日佛竟不知迦蘭已死云何得名一切智也論釋我世尊本出家時曾從迦蘭宿止同習不用處定諸天人民儻有疑心謂佛從彼受法餘處成道今若説者猶是藍邊所學得法何處更有勝法佛知迦蘭命終七日為斷彼疑故作是説迦蘭利根我先為説即自念知終已七日何其苦哉如此妙法如何不聞爾時人天疑心即盡知佛更有勝法非蘭邊得者是故世尊是一切智利根知佛非蘭邊得法鈍根之徒復謂如來頭邊法今若説者多是非想何處別有勝法為斷此疑復念藍子亦知藍子昨日命終故作是説先與説法即自念言何其苦哉不聞妙法是故世尊是一切智準此義五比丘事亦復可知並拂疑故就立根器中文三從初至説法耶念五比丘有機感故第二世尊復作是念已下觀五比丘知其處所第三見已已下隨逐有緣勸捨二邊令生信解於中文二第一從初至更不受有執昔疑今立志拒勸如來引證就果以勸第二比丘出家者已下勸捨二邊令立根器就因以勸若釋須就因果勸意可知謂對破所執果因故爾前文復二初至迷荒失志立志拒勸二佛告五人已下舉昔言無二彰今是實以己四智勸令修學前文之中四對八句第一往而立制第二時世尊漸漸已下到以破制第三我今寧可已下坐已汝佛第四時佛告五比丘已下勸勿汝佛立志拒勸初對往中欲往波羅奈道逢憂陀耶者顯其法輪被於有緣不度無緣前二耶師一向無緣憂陀耶者有見佛緣無得道之器下五人者全是緣感憂陀梵志其性儒雅既見如來諸根寂定顏色怡悅必有好師勝法致問有三第一問出家師誰二問受學師誰三問為學何法五分見世尊姿容挺特諸根寂圓光一尋猶若金山即便問言本事何師行何道法以致斯尊佛説偈以答依阿含似為四問謂加向何處今且依此文但為三問佛答之中有其四偈前之三偈答上三問第四一偈拂疑故説初偈答第二問次偈答初問第三偈還答第三問先解初偈答第二問意汝上問我為從誰學者然我惑盡解滿衆德普備有何缺少而從師學此答無受學師意智之所照空有萬境非一故曰一切鑒達斯了名之為智智照窮圓更無加過目之為上解興惑喪萬纍斯損故言一切欲憂解此明惑盡第三句不藉師咨豁然獨達故言自然得解悟此明既智滿惑盡解滿不假師訓故曰云何從人學次解第二偈答初問意汝上問我汝出家師是誰者若我智德不圓煩惑未盡可假師僧咨稟法訓然我自德圓滿不假師誨何用師為此答無出家師意次釋文非但無學師亦無出家師故言我亦無有師亦復無等侶者此以無等侶釋上無師義等侶尚無何況有師世間唯一佛釋無等義一世界中一佛出世更無第二佛出現於世是故無等故言世間唯一佛衆惑斯盡證法清涼無承之惱故曰冷而常安隱次釋第三答意汝上問我為學何法者然我智體圓滿衆惑斯盡空有兩泯更無法可學故言我是世無著乃至無與等將解無著先解有著凡夫無智在生死而染名為著有二乘無大悲故於空取證名為著無如來自言有智故緣有而不染不同凡夫著有有大悲故於空不取證不同二乘著無有無兩泯故曰無所著既內無所著道邁人天獨尊第一故言我為世間最亦可我是世無著喪生死因我為世間最離生死果既無生死因果人天莫過故言諸天及世人無有與我等顯己德滿無法可學第四偈釋疑者梵志聞佛自言德行滿足即生疑念若是德滿應為人師為他所皈何故今日順路而行似有不足馳求之意佛知彼心為拂此疑故言欲於波羅奈轉無上法輪以為人師不自求法初句謂隨逐有緣施化處所傳授己證稱之為轉甚深莫過故言無上法摧輾結惑目之為輪世間衆生為無明厚曀暗於所緣故曰皆盲冥將欲為彼盲冥衆生顯宣真法稱之為當教陳理旨名之為擊理顯沾神使生死永隔慧命長存喻若甘露理彰於外有有緣斯聞義同於鼓故曰當擊甘露鼓梵志復舉第三答重咨其義佛答云我勝一切結者勝者止也因患斯盡得盡於諸漏者苦無不亡因果殄滅故曰我勝諸惡法亦可勝者過也謂出過諸惡故曰勝惡法人天莫過故曰我最勝答意契宗領玄言外五分梵志不受拍䏶而去彼梵志宿世善神即於空中為説偈言佛始出世間天上天下尊如何汝過之而返棄捨去梵志雖聞此偈猶去不𮨇第四對勸勿汝佛立志拒勸者執昔疑今謂言如來捨於自餓知足真道行食食耶路無真實之道故言汝本所造乃至況今迷荒失第二舉昔無二彰今實中有三初以昔類今彰佛無二言第二佛言汝等來已下我本無二言今已證獲四智究竟明實非虗汝等若能稟承者不久同得也三所以族姓子已下正引己昔求今獲四智明汝稟行必同所得果不虗剋由因而獲是以自下就因以勸於中文二初勸捨二邊第二比丘已下令立中道前中四句一舉二邊之數二樂習已下列二邊名昔解云樂習愛欲者即不用非想謂是法邊或自苦行謂苦行邊此或不爾五人不學不用等法何勞勸捨故今正解但衆生斷見者習樂常見者苦行今言樂習愛欲者舉前斷見太樂邊或自苦行者舉常見人太苦邊此二乖中故稱為邊五分亦爾一者貪著愛欲説欲無過二者耶見苦形無有道迹故知愛欲非不用等又復攝論解毗那耶中為對治受用二邊故立毗那耶由佛遮有罪過受立毗那耶對治樂行邊由佛隨喜無罪過受用立毗那耶對治苦行邊離樂離苦意修中道問若對五人但須離苦何以遣樂者答獨言離苦恐成著樂故並勸捨第三非賢聖已下彰二邊過樂故奢誕非賢聖法苦行疲勤徒勞無益故曰勞疲等第四不能有所辨者結前二過中道文四一簡非顯是彰中道體文言除此已乃至涅槃行行是中道因體第二云何已下至涅槃行假問微其中道第三此賢聖八正道已下正出中道第四是謂已下乃至涅槃行結其中道先解初文除此已者簡非謂除樂苦二邊故也文言更有中道等者謂涅槃等寂行行是中道眼明者謂天眼明智明者宿命明永寂者謂漏盡明成神通者謂五通得等覺者智具足成沙門斷具足涅槃者謂二涅槃上來舉果以取其因言行者是其中道第三出中道者文二初則總舉此賢聖八正道次正見已下別列其八八中定體謂語業命三是其色法餘五心法正見是慧正行謂正思惟是其覺數正方便謂正精進念是念數定謂定數此辨體竟次釋其相言正見者謂空觀智慧心也正業等三者如智論云以無漏慧所起身業是正業起口是正語離五耶命等是正命如明了論身業有四種一離煞生二離偷盜三離耶淫四離非攝口業有四種一離妄語二離破語三離惡語四離不應語若身四種耶業若由無瞋無癡善根所離成八説名正業口四耶業若由無瞋無癡所離成八説名正語身口八耶業若由無貪善根所離身口成八説名正命也正行者謂正思惟今緣境曰行行非耶心故稱正也學心不墮故曰方便方便非耶正也念定可知第四結文可知自下正明三轉法輪投彼信器就中文二初一一別轉勸令修習第二若我不修已下正明總舉三轉十二行勸令修學別轉文四第一舉數二何謂已下假微列名三何等為苦聖諦已下正是説相四是謂已下結論諦雖四位分為二苦集二諦世間因果滅道二諦出世因果苦集滓穢廣彰過緣欲使生厭是故前明滅道清升欲使生欣故宜後辨厭欣在懷必有所尅故爾又苦集無始有之是故先明滅道二諦會聖方有故次後説問所以先苦次集者因果次第必須先集後苦今據觀行次第先粗後細故苦先集後出世因果亦果先者因果次第先道後滅亦就觀行為次第先標滅果令物生欣故所以爾次釋名者苦以逼迫為義集謂聚積滅謂寂泊通物為道名字既爾體狀須陳苦諦體者謂五受陰色非惱性判為苦具心是慮知正為苦體體具通論以為苦諦其集諦體者謂業以煩惱業為正種煩惱緣助緣正雖殊能搆當果目之為集滅諦體者滅無異狀對事論三謂滅假實空心一聞思二慧滅假名心𤏙等修慧滅實法心三滅定暫滅泥洹永移遣相空心三心雖殊論滅一揆故以三心盡處為滅諦正體言道諦體者謂戒定慧慧為道體我定道具具及真道皆能通人尅滅俱稱道諦此之四種並審爾不謬咸稱為諦是故經言苦不可令樂乃至滅苦之道實是真道更無餘道不同凡夫苦妄計樂故微塵世性自在天等以之為因二空為滅烏雞等戒計之為道此即非諦次釋其文何謂為聖諦已下假徵列名謂苦聖諦等厭苦修道會諦生解名聖故名苦聖諦諦義不異前釋苦由因得所謂集諦除集生解稱聖復是招苦之集故云苦集聖諦會滅生解曰聖此實三諦無處從初作名故名苦滅聖諦滅不自有尅必由因其因是何所謂道諦八正真直道及道具並能除擁通物出離中勝故曰苦出要聖諦第三辨相其文有二初明三轉十二法輪第二此苦聖諦本未聞法已下舉上下二轉一一轉能尅六種功德勸彼修學未實得益四諦各三合十二轉言三者一示相轉二勸修轉三引證轉苦諦三者初引八苦以示前人名示相第二復次已下勸知第三我已知已下引己證知就前示相其文有三謂舉釋結餘三諦示相亦爾今解苦諦所謂八苦兩門分別一辨相得名二三八相攝八苦位三生老病死等四苦就時彰名愛別離苦等三苦因緣受稱五盛陰苦就數彰過受名生時有苦故曰生苦言老苦者髮白面皺形衰改變稱老老時有苦故曰老苦風大互增一大不調百一病生病時有苦故曰病苦言死苦者死者盡也死時有苦故曰死苦次三因緣受名因是內心謂愛增求等緣是境界所謂違順順境有二若已受順緣分離生苦愛別離苦攝若未受順緣求而不得求不得收違境亦二若未受惡法緣交事會怨憎會苦若已受惡法不能離者求不得收次釋名者已受順緣凡情樂著稱愛本合今分故曰別離總由愛別離生故曰愛別離苦違緣損己稱怨有心同惡名增緣交事合稱會總由怨增會生故曰怨增會苦情希順緣稱求差本所求名為不得苦苦由不得而生此即善法未得苦情厭惡法心悕捨離亦名為求求不免離稱為不得苦由是生此是惡法未離苦也此之五陰七苦並集衆苦熾盛名五盛陰苦次相攝者生老病死怨增會此等苦苦攝愛別離者壞苦收論云愛別離時所有苦生謂妻子等是名壞苦愛求不得苦有二惡法未離者苦苦攝善法未得壞苦收五盛陰苦總收三苦説八苦相令知生厭名示相轉餘二可知既知苦可厭要修八正方能傾苦䨱集故諸諦下咸須勸修中道返前二邊故八正之義前已釋竟次集諦三者初列業煩惱明集名示相轉十使煩惱能助業牽生非是正種説之為緣略舉一貪染著前境能發業思目之為愛身口業思牽生正種故曰本所生業與臨終妄愛相應能潤業招生故曰與欲相應於未來受生之處作華池等解妄納為適故曰受樂此是潤業煩惱第二復次已下勸滅第三我已滅已下引滅次滅諦三者初至苦盡聖諦正滅三諦無處寂泊無為是滅諦體舉彼滅狀示彼生欣名示相轉二復次已下勸證轉三我已作證已下引證轉先解初轉彼愛永盡煩惱無處無欲滅業無處此集諦無處捨出要解脫空心無處永盡已下苦諦無處舉此滅收示彼生欣名示相轉下二轉如文可知次道諦三者初至是謂苦出要聖諦舉八正體示彼令修名示相轉第二復次當修已下勸修轉第三我已修已下引修勸修轉示相即道更無別修道第二舉轉益中一一轉下各彰六種功德勸令修學苦諦初轉六者若能厭苦修道必獲六益如何不修耶言智生者謂宿命眼生者謂天眼言明生者謂漏盡覺生者是他心言通生者謂身通言慧生者天耳通此還是上中道因家之果餘類亦爾但此文中苦集俱結滅道闕無結文四是謂四聖諦説已總結上來四文別轉已竟第二總轉文四初至而無疑滯引己證故成無上道汝何不修同我所證第二如來已下舉彼衆中有應教之機勸以修學第三沙門已下正彰世人所不能轉唯佛能轉顯法深勝勸彼修學第四是故已下正明舉前三益勸修四諦是故者牒上三句結成勸學第一是故者是我於三轉十二法輪如實而知成無上道故第二是故者是佛法輪本不虗轉轉必應機故第三是故者是法輪世人所不能轉唯佛能轉深勝輪故汝等何不對上三義勤修習故第四獲利悟道以其佛轉法輪五比丘中陳如先悟故佛讚曰無如憍陳如阿之言無若猶如也五中獨拔故曰無憍陳如也第五展轉唱告響徹請王故曰乃至梵天上來緣起竟自下第二善來度人大文有六第一度五比丘第二波羅奈已下度耶輸伽第三波羅奈已下度耶輸伽同友四人第四波羅奈已下度耶輸伽同友五十人第五波羅奈已下長者第六波羅奈已下因龍王故度那羅陀初文有三初明五人受戒第二世尊與三人説法已下正明如來説法教化增其行解第三世尊説此法時已下解滿惑盡道成無著前文復三初度陳如次阿濕卑摩訶男次婆提婆敷陳如文三第一請祈出家第二佛言已下正為受戒乃至盡苦原者戒之功力結名最初第三時尊者已下修知是行及前自餓餘人亦三類而可知然為餘人轉名而説言布施者舉善令修是作持言持戒者惡法能離是止持既修善離惡必能近剋勝報故曰生天之法呵欲不淨者謂集諦有漏繫縛謂苦諦讚歎出離為樂謂滅道二諦也次第二説法文中初食前説法為三人説法二人乞食等各異等侶去住不同者多論一解三人是佛父親而愛多二人是佛母親而見多是故三二去住不同又解欲説彰法不空乞食得辦故使三二去住不等次食後説破其我執於中文四第一破其執我第二云何已下審比丘所解第三是故諸比丘已下廣類以破第四比丘賢聖弟子已下修無我觀先解初文此等五人俱證初果須陀洹人實無身見可破今言破者若見心説我理無此執猶有慢心我故所以言破文中先對色陰於中有三初比丘色無我舉宗立無我第二立二章門釋前無我一受苦苦故無我故文言若色是我者色應不增益而我不受苦而增益受苦故知無我二若色是我者已下不自在故無我凡言我者樂及自在可得是我而今觀色不得自在明知無我第三以色無我故下釋前二門初至受苦釋初苦門亦不得隨意已下釋第二不自在門欲得便得者謂少年盛壯之色不用便不得者謂老年衰變之色既不隨情欲明知無我觀餘四陰無我義同作文破執不異於前故曰亦如是次審比丘中色陰廣辨一問常無常二問苦樂三問我執既知無常苦變易法問言為是我不者自是己定性我不是彼不者是他人定性我不是我所不者是餘四陰若色是我受是僮僕等三合十二句即此中是我所是彼所謂我所見也五比丘並以己之解心對佛故曰非約餘四陰審解義同故曰受想等亦如是第三廣類破中對色以辨廣舉諸色類皆無我故言是故一切色等若內者己身之色若外者他身之色若粗四大色五根色若細謂無色界色及四塵色好者淨妙色醜者鄙惡色若遠謂鄣外色若近謂鄣內色非我者如汝所解實非定性我非彼者非他人定性我非彼所者非他餘四陰我所見非我所者非我餘四陰我所見也此四句前二非我非彼者破即陰是我非彼所非我所者破離陰是我見故亦可前二非我見後兩非所見也應作如是實正觀智慧者謂修無我正觀對餘陰同爾故曰亦如是第四正修無我觀先對色辨中見執色之過故曰厭患色陰捨執故不著不為我見羈繫故稱得脫四智究竟得解脫智餘四同爾故曰亦如是五比丘一切有漏心解脫者心解脫謂得滅定故得無礙解脫智者慧解脫謂是俱解脫人自下四文可知第六因龍王曾於佛邊聽得此偈重法募解梵志聞不能知咨謗於佛方解偈斯來為龍王重更敷釋尋詣佛所聞法得益善來受戒故明斯偈先列經本二偈佛有三偈釋初一偈半次第解六句次有一偈解第七句末下兩句釋第八句六識開導皆以為王第六最強能生善惡之本名之為上故曰第六王為上此答初句染者與染等即案文解業與煩惱體是垢法名之為染以染成者故曰染者者不異染故曰與染等此答第二句行心無貪等煩惱故曰不染既無煩惱業結不起故曰無垢故言不染則無垢此答第三句起業煩惱垢纏行者名為染者為煩惱迷醉暗於所緣謂之為愚故曰染者謂之愚此答第四句凡夫無慧為四流所漂故言愚者流所漂此答第五句解興惑喪故曰能滅者為智此答第六句四流非一故言一切漂溺故流智解一興四流斯喪故曰能捨此明因流盡人天報亡故言天及於世間此明果流喪不與流相應舉前因流盡處不為死所惑舉前果流盡處因果既無彰斷具足此答第七句云何流不流也慧由定發故曰能以念為主三昧澄靜能發如實觀智智起惑亡不為四流所羈故曰而名為解脫此半偈答第八句龍王往前輕心壞葉長壽龍中非耶見耶見者即墮地獄傳言此名樹葉龍王頭上生一樹甚大苦惱失彼二邊者前佛時起過後佛滅後脫此身徑於二佛虗無所益故曰自下第二三皈度人文三初三歸受戒法第二爾時世尊已下還明善來從初作名故曰三歸受法亦可從此已後三歸法起與善來並故第三爾時世尊已下拂去譏嫌前文有四一佛歎弟子堪為師導第二佛告諸比丘已下告令遊化第三時諸比丘已下以失信意三歸之緣第四佛言已下正辨三歸受法上半偈嘆己德備下半嘆弟子德同己所證我已脫一切因患盡天及於世間果患亡下半同上唯嘆弟子為別魔來難者耶人壞嫉難佛及弟子福田不具焉能外化上半難佛福田不具下半難弟子不備汝為諸縛縛因患未盡天及於世間果患不亡一切衆縛縛弟子因果二患未盡沙門不得脫總結二人俱不免過我脫於諸縛緣不能羈因患盡天及於世間果患亡一切縛得脫彰弟子因果俱亡我今已勝汝總以結勝魔王不分復更致難外人情計謂五塵性是能縛內有五識復是性縛汝若不緣則已緣則被羈汝內有結縛謂五識心性是縛體五識之心緣於五塵故曰心在於中行緣則被羈為惡業追繫故言以是隨逐汝此難因患未亡既有集因必招來苦纏縛沙門故言不得脫此難果患未喪如來答意外人情計但知有五識不見第六意識是以如來言凡夫第六意識尚不為五塵所染況我斷欲斯盡內心清淨雖緣五塵何得有染故言世間有五欲乃至我於中無欲二患斯盡超汝境界故言我今得勝汝辭辨難當耶徒高伏心懷不樂隱形如去耶難既遣舉宗重告餘三如文多論牛呞比丘兄弟將七萬人詣比丘比丘盡與三語受具次還明善來文三先度同友五十人次度羅一千人次度舍利弗等二百五十人就度迦葉文三初至受具足戒善來與千人受戒第二時佛度千梵志已下詣象頭山三事教化第三爾時千比丘受此三事已下如説修行道成無著廣現神變教化迦葉令故耶從正不如我等得阿羅漢者謬執自謂得聖果勝心欲調伏放果執因謂己事大是趣泥洹正路故云不如我道真佛知將伏即併非二計非阿羅漢者非是聖果也非向阿羅漢道事大非是趣聖之因既聞因果俱非便捨事大具出家受戒次度二弟次往象頭山三事教化者彰此等比丘假時處及伴而得漏盡故一神足教化者謂身通令廣生信二憶念教化者謂以他心通知衆生心欲應機授藥三説法教化者謂以漏盡通正教起行斷漏先對眼根廣明於中初總舉熾然故言一切熾燃何等已下別列熾燃於中文二第一明因熾燃復云何已下明果熾燃因中有四一先舉熾燃緣有三眼熾燃者謂增上緣以生熾燃色熾燃者謂緣緣中以生熾燃眼識熾燃者次第緣中以生熾燃第二眼觸熾燃者一釋謂和合以生熾燃其唯觸數又依實論想是對假之初名之為觸因於三想遠生三毒故曰眼觸熾燃第三若復已下三受報法體是無記非不因此三受生三煩惱故曰亦名為熾燃四何等已下三煩惱火謂行心中起三種煩惱燒人善根是熾燃火體次果熾燃正明八苦焚燒樂受故曰果熾燃我説此苦所生處者前因熾燃是八苦本生之處為令斷因以其因亡果自喪故故言我説此苦所生處若對餘五不異眼根相對以明因果熾燃故曰乃至意亦如是第三文可知次度舍利弗等文二初受竹園度之處所緣中王本請佛若成道已先受我請所以淹文不赴王請度千人已方念受請也答有二義故一衆生機根未熟故二徒衆未成故今赴請者一王舍城人道根熟故二度千人已徒衆既成顯佛德尊高故佛與迦葉師徒相隨大衆雲集各懷疑念不知誰是師首既有此疑師徒未分難以訓導故偈問答示有尊卑汝見事大有何變怪不祥之相而便棄之故汝等見何變乃至捨大具次以偈對佛依此事火不能發智斷彼資道緣中貪味之過故言飲食諸美味亦復不能斷彼色貪故曰愛欲女及祀我見如是垢者謂業煩惱垢故捨事火具也顯己是弟子彰佛是師佛復問汝既見非捨而不樂汝心志求竟樂何處故言飲食諸美味乃至樂何處迦葉即答情樂之所業與煩惱能牽生死三有輪轉名之為迹善修八正能除集因令苦不續稱為休息故曰我見迹休息此集諦無處是滅諦體集因既亡不為三界生死果縛故言三界無所礙此是苦諦盡處是滅諦體滅理一揆更無殊狀故云不異證與理冥更無能所故言不可異亦可滅理無為異緣不能差脫故曰不可異如此滅理是我情欣故不樂事火祀上品疑除下品之流猶疑未盡故須就事以拂疑情疑心既除説法獲利受請入城爾時天主化作一異婆羅門引道讚嘆以顯佛德初一偈國人致問上三句問能敬者誰末下一句問所敬者第二釋提桓因答五偈五偈之中各上三句先答問中第四句所敬境界謂是如來各下第四句却答前問中上三出能敬者就各上三嘆所敬德初一上三勇猛等者顯佛精進智德無貪善根次上三世無與等者彰佛真勝超倫次一上三滅欲等者煩毒既除斷德窮圓次一上三猶如度溺者化生之能濟及自他次一上三已度四流際者授生以法次時世尊已下度舍利弗等如普曜經身子問阿濕卑言汝師是誰即答謂説吾師天中天一偈又問有何道法即説第二偈化訓去五陰等又請説法阿濕卑言我今年幼稚學日又淺近能宣正真如來廣大義身子言不問廣略即説偈言一切諸法本因緣空無主息心達本原故號曰沙門身子得道此律三問答亦合三正説法中如來説因緣生法苦諦亦説因緣滅法滅諦若法所因生如來説是因集諦若法所因滅道諦若如智論聞三諦以入道諸法因緣生苦諦是法説因緣集諦諸緣及盡滅是滅諦大師如是説得入無憂處者謂解責故今證聖解故曰本所不見第三拂去譏嫌易解自下羯摩度人文三初明起過過有二緣一無師教授隨緣興犯此是無師之過不齊整來多羅葉等乞食不如法謂耶命等受不淨食者謂殘尊等及可惡宍受不淨鉢食不以澡豆洗等二病比丘已下無弟子損第二諸比丘已下舉以白世尊第三世尊言已下立有師徒制羯磨受戒攝養之方於中文四第一制立師及弟子羯磨受法即是所秉教法第二時諸比丘已下訖盡同上能秉之師德行具滿第三布薩已下所被弟子身器穢第四授法為請法求解生善行三報恩供養此三順攝受四呵責治罰違而攝受於中有三一有所呵之過二有能呵之藥三如不如義並如文辨廣説可知第五門對文説自下第二闍梨德行攝受方者文二初至行和上法來明依止師衣補和上處受之方二弟子於闍梨已下正明依止弟子行法此之二法如上更不煩説前文有三同前和上自下第二呵責弟子文三初不承事和上起過二舉以白佛三世尊言已下辨呵責法於中文三初至五事來呵責之藥第二世尊既聽呵責已下出所應呵過第三彼盡形壽已下二人違失之義凡呵責之要大法具三一弟子現前二出過現前三呵法現前得名如法反則非法文中先明和上呵文中三總舉其數次別列五名次復總結呵責法者準其所犯過重輕若過淺重呵過深輕責此乃隨心喜怒特秉法式何成師訓相利之道宜自思省停息此壞當復思已所以呵者為利彼故實宜內懷慈愍外現威肅準法以設不差所宜雖加切勒理深津益令彼改過從善方成師訓攝受之方然後五法呵之一汝去者謂以過重驅擯永去二莫入我房過是次輕得在寺住不入房於外作使容可得作三莫為我作使謂一切執使皆不得作容得入房四莫至我所外事雖少得勞正不得至師左右五不與汝語其過最輕得至師所不得以言誨及次依止呵大同和上唯換第四句言莫依止我住餘是如前此等並呵情過不得準罪重輕自有輕而須呵或有重而不呵落在七法故也又此別人行罰之軌如七羯磨罪處所等不禮捨教惡馬覆鉢斯乃得法折伏不在此收次所呵過二師合辨增數八五究其不同但有十五作惡不耻名無慚見善不修學無愧不祖師訓如説修行曰不受教犯下三篇名非威儀懈怠自居名不恭敬若作斯五情無耻愧雖犯小罪理合呵責若情恆命終已下闍梨行法和上中二初至如法治和上七法攝養之方二和上於弟子所行和上法已下弟子行法瞻供之軌前和上文三初至十歲已來簡小取大第二諸比丘聞已下簡愚取智第三諸比丘聞已下簡懈怠制攝受此三文中並各有三謂過呵制第三中三一起過二呵責第三告諸比丘已下立制於中文三初至應如是行對和上制法第二若弟子已下列七行法第三自今已去下違而結犯列行法中一先析伏其形有二初明弟子作過不從師教僧設治法勸令如法二明勸僧疾解第二復次犯僧殘已下除其業纍據可悔中重假僧故舉非謂下三不須斷理第三復次弟子得病已下瞻病人除其情惱第四弟子若不樂已下移閙就靜以安其形第五弟子有疑已下誨以法律決去疑滯第六若惡見生已下誨以真法反耶入正第七以二事已下衣食攝受免形心二苦第三結犯可知第二弟子行法中分文有三第一起過第二諸比丘聞已下呵第三爾時世尊已下制法制法中二初對人制法第二列共別兩行於中先明共行七法文二初列七法第二行結犯此律但言如法治五分共別行中盡言若不行突吉羅第二時弟子於和上所不行弟子法已下列其別行亦二初列別行二不行結犯別行中三初至不得至他方白事方法第二彼當清旦已下請誨稟承以資神解第三彼當除去已下如説修行亦名修敬報恩故也初白事者弟子年少未有間曉要須咨請白師取足白之法式如常威儀寄説可知師既受白因明師僧量宜弟子法有八句前七有過故不聽為第八無過方依所請又有事須白五分唯除大小便及用楊枝餘皆須白無事不須祗出寺門二十五肘來不須白已外須白次請法者為求解故清旦須請報恩供養如文可知所以須明弟子行者良以師有訓匠之能為成師德故爾次辨闍梨行法文三初無師起過第二諸比丘已下舉以啓佛第三世尊言已下制者闍梨依止弟子於中文二初明制有闍梨弟子第二諸比丘聞已下闍梨德行攝受之方前文有三第一立闍梨弟子西音闍梨此名正行𨲙補和上之處故曰如文等第二展轉已下有師徒之益前立和上已有兩益今有闍梨還無二損此乃重重故言倍增益廣大第三有益須請請之正文一大德一心念言對正行二我某甲自厈己名三今求大德為依止請祈攝受四願與我依止望師垂慈攝受於我五我依止大德住自彰依住表己勤勤一言至三依者馮也止者住也故言依止欲正行發言許攝有三可知辨依止五門分別第一定能依止人第二定所依止人謂師德行第三請攝受之方第四弟子別行之法第五依止失不失先解初門所以須依止者新受戒人暗於所緣猶若嬰兒若不教授乳養心神法身難以成立須依有德馮人取訓故律言新受戒比丘無人教授故乃至婆羅門聚會也無人教授略有五種一和上命終二和上休道三和上決意出界四和上捨於畜衆五謂自身更求勝緣以闕教授故須依止然有六人聽無依止一樂靜比丘二守護住處三病人四瞻病比丘此四四歲已下聽無依止五滿五歲已去六智無勝者此二五夏已上辨之此等人輩聽無依止須依止人者一未滿五歲二愚癡比丘盡形壽依止第二門闍梨有五除依止一餘之四種不得趣爾攝受弟子補依止師處補和上處要須加其請法方成依止説意可知論其德行解慧一位須十夏二有解慧三能七法攝養弟子廣如增五若反此者皆不合攝受弟子第三門欲請師時祗律要有四心一愛念二恭敬三慚愧四樂住具此心者闍梨如文請文如前次師攝弟子亦有四心一慈念二矜愍三訓誨四匠成具斯四心看弟子如兒想第四門有其四法一白事法謂離過行二請教世尊有是教一切汙辱已下正舉第二師僧秉初段法被第三受戒行者受戒方軌初文有四一對上過故立有師與弟子展轉已下有二人之益第三當如是請已下對益故請第四佛言自今已下止三語興羯磨受和上西音善見云知弟子有罪無罪人亦云力生如明了論西音優波陀呵此正梵語今翻為依學謂依師主學解學行故稱依學言弟子者學在我後故名弟解從我生或戒從我生曰子故稱弟子祇律和上有四心者弟子一慈念二矜愍三訓誨四匠成備此四心故曰者如兒想弟子亦有四心一親愛二尊重三畏難四敬順具四心瞻供師故名者和上如父想第二言展轉已下有二人益各興四心更相供瞻謂共行七法以教戒故不壞法身相瞻待故不損道器故名久住增益廣大第三有益故請者於中文兩一請師法二和上報言已下攝弟子法問沙彌受時所以不請答人是未滿容有轉易故不須請其具戒者滿足究竟更無移轉故不同彼又問所以僧中請者見聞具故第四止三語者以三語中無相攝法未有和上弟子別故文略不言捨一人秉法也自今已去已下聽滿十人者替前一人白四羯磨者替前三語所以不言止善來等者非弟子秉故又與三語羯磨並行故又復此對初緣未有教授撿挍及説相等但舉白四非謂略無第二能秉人中文二初至和上同下住二師之行第二有五法已下明二師之德問行德何別耶答行謂始修方便德據終成滿足要行德俱備方聽度人亦可德謂解慧識達法相未必有行亦不聽度人或能如説修行未必識達法相亦不聽度要具解行故知行德有別前文有三初至文同不異謂以七種行法更相瞻養攝弟子法第二時諸弟子不恭敬已下正明弟子不祖師命不受訓導教師呵責違而攝受第三樂師靜比丘已下正明人有合呵不合呵前文復二初至如法治和上行法第二和上謹攝失脫而已無其情過方便開曉教令懺除如前七法此初五竟難與語者謂師教誨一向解拒前不受教謂受師語不如説行與惡人為友好往淫女家婦女家大童女家黃門家尼精舍式叉等處者龜𩻪此等恐生譏妨修正業故隨所作一一呵之方能離惡行成有進修之益不要待滿此十五過中對尼反説者應云大童男家比丘精舍沙彌精舍等合呵餘通二衆第三呵違失中呵責已供給得罪者謂本第三時故今未施歡喜輒為作使反增觸惱故下言不為和上執事得罪者謂本作第二呵容得作使恨心不作所以得罪此弟子非次便受供給者和上非次故依止弟子非次與依止者闍梨非當下意隨順求方便解所犯者謂初受師下四呵責時全不得自理分雪唯得日三時懺悔後方濡言自雪其過故言方便解其所犯若勤求解犯師當教赦過不者得罪第三合呵不合呵人者文二初雜明依止失不失第二世尊遊羅閲城已下正明失依止法前文有七一樂靜等二人聽無依止以自行立故第二比丘決意出界已下兩對四句約心暫永失不失第三將受戒者出界外已下四句明須依止人合呵責者第四彼遣使受依止已下兩句師徒之失第五和上出界外已下兩句雖不永去去徑宿意故出界亦失并辨相簡第六病比丘已下二句聽無依止第七彼和上被羯磨已下五對治罰失不失第二約心暫永初之兩句決心出界作不還意雖即日還出界之時已失依止若第五段兩句者文言和上闍梨行不久當還我即依止而住便無依止而住佛言和上闍梨出界行日即應更依止不受如法治次弟子出界外遠行念言我不久還即以此依止和上闍梨住佛言新受戒人須依止者不得先飲水等乃至先當受依止者此之兩句雖不久還然亦去徑宿意同前兩句決意出界但是去徑宿故出界之時亦依止此等四句並是心隔故失以其依止唯一闕無攝受兩情相捨不待事隔故心隔為失分齊也若無暫出之心忽有徑宿事者難緣不失無難即失也無有心宿俱隔失以作永去之意者不待徑宿故爾若暫出界此亦不失即此文中下兩句是衣夏二事唯俱隔失宿隔同前依止説也問即日還失依止凡言失依止者失何等法耶答依止有三第一請依止師法第二相依住法第三請教授白事法若據作法而請以成師者前請為力生後請為依止若以下二法行軌相誨名依止者則力生正行俱名為依止故律云和上闍梨決意出界外佛言失依止令立失者失下二法非謂失請師法也如和上失者豈可失和上耶亦可言失者以闕下二法無作不相續起故言失依止後若還來不須更作法請師但作心依住白事等還有相依法無作續起若望衣夏四句之中心宿俱隔失不同依止直心隔及俱不隔此二不失第三宿隔有失不失對難説故問所以心隔失依止衣不爾者何答依止情道彼此各作相捨故出即失若不作兩捨意徑宿方失離衣及安居正可我有捨彼心彼無捨我意故要須心宿俱隔失問依止若離失而無罪衣夏離宿有罪者何解依止聽離至餘處已佛制更請依止順教而去失而無罪離衣破夏佛教不聽是以失破有罪問所以衣失罪重夏破罪輕答三衣道服正標資身要急故所以重安居雖破容不廢修故破罪輕第三四句正明無師教授不間法相制使依止咨稟法事見論一和上三羯磨師為三人受具一時得戒戒臘同無大小祇一和上一戒師二人三人一時受得不言為難但以憂婆離有二沙彌若先後受恐有恨心不知得一和上一戒師一衆二人一時受不佛言得十律亦言憂婆離二沙彌一陀薩二波羅當受戒時陀薩言汝先受我供汝所須次一人亦爾憂婆白佛得二沙彌一時受不佛言得即出羯磨此律八難餘緣聽二三人一時作羯磨不得過準祇一和上一戒師一衆者善受戒尚得餘類皆成五分憂婆問餘事亦得羯磨三人不佛言得不同持欲使命法故得過三人第四可知第五因制依止乘明簡釋進否五分若無依止不得乃至飲僧坊內衣得吉羅後為諸難佛言今聽不受依止乃至六夜十律同爾伽論三日第七師破七羯磨治不失依止者謂不失前二種法應失請教誡法以師有過被治行法在己弟子清淨若請白事令師得罪下三十五中不得受依止者謂不得請教授亦可被治不得受請作依止師若弟子被治三俱不失須師教誡順行僧法求僧疾解故二人相望無隨舉過若擯未擯俱失依止所以但舉已擯者謂對治前作法者不失人情意謂作擯亦謂不失為去此疑故須偏舉作法以彰失亦可得擯法者事既彰露無有相依教授義故文中言失雖可犯重但使未彰猶成相依故使不失
